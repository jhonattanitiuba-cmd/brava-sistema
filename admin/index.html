// PROJETOS CRM — Sprint G.1 + G.2
// Aba dedicada pra projetos (projetos): lista cards agrupados,
// filtros por status_fase, modal de criar/editar com parcelas
// ═════════════════════════════════════════════════════════════════
function ProjetosCRM() {
  const projetos = useRecorrencia();
  const { list: clientes } = useClientes();
  const { list: statusConfig } = useStatusConfig();
  const [editando, setEditando] = React.useState(null); // {} novo, projeto obj edit
  const [busca, setBusca] = React.useState('');
  const [filtroStatus, setFiltroStatus] = React.useState('todos');
  const [filtroCliente, setFiltroCliente] = React.useState('todos');

  const clientesById = React.useMemo(() => {
    const m = new Map();
    (clientes || []).forEach(c => m.set(c.id, c));
    return m;
  }, [clientes]);

  const filtrados = React.useMemo(() => {
    let arr = [...projetos];
    if (filtroStatus !== 'todos') arr = arr.filter(p => (p.status_fase || 'lead') === filtroStatus);
    if (filtroCliente !== 'todos') arr = arr.filter(p => p.cliente_id === filtroCliente);
    if (busca.trim()) {
      const q = busca.toLowerCase();
      arr = arr.filter(p =>
        (p.cliente || '').toLowerCase().includes(q) ||
        (p.servico || '').toLowerCase().includes(q) ||
        (p.nicho || '').toLowerCase().includes(q) ||
        (clientesById.get(p.cliente_id)?.nome || '').toLowerCase().includes(q)
      );
    }
    // Agrupa: status_fase asc + valor desc
    const cfgByKey = new Map((statusConfig || []).map(s => [s.key, s]));
    arr.sort((a, b) => {
      const oa = cfgByKey.get(a.status_fase)?.ordem ?? 99;
      const ob = cfgByKey.get(b.status_fase)?.ordem ?? 99;
      if (oa !== ob) return oa - ob;
      return Number(b.mensal||0) - Number(a.mensal||0);
    });
    return arr;
  }, [projetos, busca, filtroStatus, filtroCliente, clientesById, statusConfig]);

  const stats = React.useMemo(() => ({
    total: projetos.length,
    ativos: projetos.filter(p => p.status_fase === 'ativo').length,
    em_implantacao: projetos.filter(p => p.status_fase === 'em_implantacao').length,
    mrr_total: projetos.filter(p => p.status_fase === 'ativo').reduce((s,p) => s+Number(p.mensal||0), 0),
    impl_total: projetos.reduce((s,p) => s+Number(p.implementacao||0), 0),
    sem_cliente: projetos.filter(p => !p.cliente_id).length,
  }), [projetos]);

  const fmt = (v) => Number(v||0).toLocaleString('pt-BR', {minimumFractionDigits:0, maximumFractionDigits:0});

  return (
    <div className="page">
      <div className="page-head">
        <div>
          <div className="page-head__title">Projetos</div>
          <div className="page-head__sub">
            {stats.total} contratos · {stats.ativos} ativos · {stats.em_implantacao} em implantação · R$ {fmt(stats.mrr_total)}/mês recorrente
            {stats.sem_cliente > 0 && <> · <span style={{color:'#ff8585'}}>{stats.sem_cliente} sem cliente</span></>}
          </div>
        </div>
        <div className="page-head__actions">
          <button onClick={()=>setEditando({})} className="btn btn-primary">
            <Icon name="Plus" size={14}/>Novo projeto
          </button>
        </div>
      </div>

      {/* KPIs */}
      <div className="kpi-grid" style={{gridTemplateColumns:'repeat(4,1fr)', marginBottom:18}}>
        {[
          { label:'Total projetos', val: stats.total, icon:'Layers', cor:'var(--blue)' },
          { label:'Ativos faturando', val: stats.ativos, icon:'CheckCircle2', cor:'#1D9E75' },
          { label:'MRR ativo', val: 'R$ '+fmt(stats.mrr_total), icon:'Repeat', cor:'#1D9E75' },
          { label:'Implantação total', val: 'R$ '+fmt(stats.impl_total), icon:'Activity', cor:'#7B3FE4' },
        ].map((k,i) => (
          <div key={i} className="kpi">
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
              <div className="kpi__label">{k.label}</div>
              <div className="kpi__icon" style={{background:k.cor+'22'}}><Icon name={k.icon} size={17} style={{color:k.cor}}/></div>
            </div>
            <div className="kpi__value" style={{fontSize:22, color:'var(--t1)'}}>{k.val}</div>
          </div>
        ))}
      </div>

      {/* Filtros */}
      <div className="card" style={{padding:'14px 16px', marginBottom:14}}>
        <div style={{display:'flex', gap:10, alignItems:'center', flexWrap:'wrap'}}>
          <div style={{display:'flex', alignItems:'center', gap:8, padding:'7px 12px', background:'var(--bg-3)', border:'1px solid var(--border)', borderRadius:8, flex:1, minWidth:200}}>
            <Icon name="Search" size={13} style={{color:'var(--t3)'}}/>
            <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="Buscar por projeto, cliente, serviço, nicho..." style={{flex:1, background:'none', border:'none', outline:'none', fontSize:13, color:'var(--t1)'}}/>
          </div>
          <select value={filtroCliente} onChange={e=>setFiltroCliente(e.target.value)} style={{padding:'7px 10px', borderRadius:7, border:'1px solid var(--border)', background:'var(--bg-3)', color:'var(--t1)', fontSize:12.5, minWidth:180}}>
            <option value="todos">Todos clientes</option>
            {(clientes||[]).map(c => <option key={c.id} value={c.id}>{c.nome}</option>)}
          </select>
          {['todos', ...(statusConfig||[]).map(s=>s.key)].map(key => {
            const cfg = key === 'todos' ? null : (statusConfig||[]).find(s => s.key === key);
            const ativo = filtroStatus === key;
            const cor = ativo ? (cfg?.cor || 'var(--blue)') : 'var(--t3)';
            return (
              <button key={key} onClick={()=>setFiltroStatus(key)} style={{
                padding:'6px 10px', borderRadius:7, fontSize:11.5, fontWeight:500, cursor:'pointer',
                background: ativo ? cor+'22' : 'transparent', color: cor,
                border:`1px solid ${ativo ? cor : 'transparent'}`,
              }}>{key === 'todos' ? 'Todos' : (cfg?.label || key)}</button>
            );
          })}
        </div>
      </div>

      {/* Lista cards */}
      {filtrados.length === 0 ? (
        <div className="card" style={{padding:40, textAlign:'center', color:'var(--t3)'}}>
          <Icon name="Layers" size={32} style={{opacity:.4, marginBottom:8}}/>
          <div style={{fontSize:13, marginBottom:8}}>Nenhum projeto nesses filtros.</div>
          <button onClick={()=>setEditando({})} className="btn btn-primary">
            <Icon name="Plus" size={13}/>Criar primeiro projeto
          </button>
        </div>
      ) : (
        <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(330px, 1fr))', gap:12}}>
          {filtrados.map(p => {
            const cfg = getStatusByKey(statusConfig, p.status_fase || 'lead');
            const cliente = clientesById.get(p.cliente_id);
            return (
              <div key={p.id} onClick={()=>setEditando(p)} style={{
                padding:'14px 16px', background:'var(--bg-2)', border:'1px solid var(--border)',
                borderLeft:`3px solid ${cfg.cor}`, borderRadius:10, cursor:'pointer', transition:'all .15s',
              }}
                onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--blue)'; e.currentTarget.style.transform='translateY(-2px)';}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)'; e.currentTarget.style.transform='translateY(0)';}}>
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:8}}>
                  <div style={{minWidth:0, flex:1}}>
                    <div style={{fontSize:13.5, color:'var(--t1)', fontWeight:600, marginBottom:3, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{p.cliente}</div>
                    {cliente && <div style={{fontSize:11, color:'var(--blue)', marginBottom:5}}>👤 {cliente.nome}</div>}
                    {!cliente && <div style={{fontSize:11, color:'#ff8585', marginBottom:5}}>⚠ Sem cliente mestre</div>}
                    <div style={{display:'flex', gap:6, alignItems:'center', flexWrap:'wrap'}}>
                      <span style={{padding:'2px 7px', borderRadius:999, background:cfg.cor+'22', color:cfg.cor, fontWeight:600, fontSize:10, display:'inline-flex', alignItems:'center', gap:3}}>
                        <Icon name={cfg.icone} size={9}/>{cfg.label}
                      </span>
                      {p.tipo_projeto && <span style={{fontSize:10, padding:'1px 6px', borderRadius:5, background:'var(--bg-3)', color:'var(--t3)'}}>{p.tipo_projeto}</span>}
                      {p.e_repasse_terceiros && <span style={{fontSize:10, padding:'1px 6px', borderRadius:5, background:'rgba(186,117,23,.15)', color:'#BA7517', fontWeight:600}}>REPASSE</span>}
                    </div>
                  </div>
                </div>
                {/* mini stats */}
                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:8, paddingTop:10, borderTop:'1px solid var(--border-soft)', fontSize:11}}>
                  <div>
                    <div style={{color:'var(--t3)', fontSize:10, textTransform:'uppercase', letterSpacing:.4, fontWeight:600}}>Mensal</div>
                    <div style={{color: Number(p.mensal||0) > 0 ? '#1D9E75' : 'var(--t3)', fontFamily:'var(--f-m)', fontWeight:600, marginTop:2}}>R$ {fmt(p.mensal)}</div>
                  </div>
                  <div>
                    <div style={{color:'var(--t3)', fontSize:10, textTransform:'uppercase', letterSpacing:.4, fontWeight:600}}>Implantação</div>
                    <div style={{color:'var(--t2)', fontFamily:'var(--f-m)', fontWeight:600, marginTop:2}}>R$ {fmt(p.implementacao)}</div>
                  </div>
                  <div>
                    <div style={{color:'var(--t3)', fontSize:10, textTransform:'uppercase', letterSpacing:.4, fontWeight:600}}>Nicho</div>
                    <div style={{color:'var(--t2)', marginTop:2, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{p.nicho || '—'}</div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {editando && <ProjetoCadastroModal projeto={editando} clientes={clientes} statusConfig={statusConfig} onClose={()=>setEditando(null)}/>}
    </div>
  );
}

// ─── Modal de criar/editar projeto ───
function ProjetoCadastroModal({ projeto, clientes, statusConfig, onClose }) {
  const novo = !projeto?.id;
  const [form, setForm] = React.useState({
    cliente_id: projeto?.cliente_id || '',
    cliente: projeto?.cliente || '',
    servico: projeto?.servico || '',
    nicho: projeto?.nicho || '',
    tipo_projeto: projeto?.tipo_projeto || 'mensalidade',
    mensal: projeto?.mensal || 0,
    impl: projeto?.implementacao || projeto?.impl || 0,
    valor_total_acordado: projeto?.valor_total_acordado || 0,
    parcelas_planejadas: projeto?.parcelas_planejadas || null,
    e_repasse_terceiros: projeto?.e_repasse_terceiros || false,
    status_fase: projeto?.status_fase || 'lead',
    status: projeto?.status_fase || 'lead',
    nome_pagador_esperado: projeto?.nome_pagador_esperado || '',
    data_inicio: projeto?.data_inicio || '',
    data_fim_previsto: projeto?.data_fim_previsto || '',
    escopo: projeto?.escopo || '',
    centro_de_custo: projeto?.centro_de_custo || '',
    dia: projeto?.dia || '',
  });
  const [erro, setErro] = React.useState('');
  const [salvando, setSalvando] = React.useState(false);

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  // Auto-preenche cliente_grupo baseado no cliente mestre escolhido
  const clienteMestre = (clientes || []).find(c => c.id === form.cliente_id);

  const salvar = async () => {
    setErro(''); setSalvando(true);
    try {
      if (!form.cliente?.trim()) { setErro('Nome do projeto é obrigatório'); setSalvando(false); return; }
      const payload = {
        cliente: form.cliente.trim(),
        servico: form.servico || null,
        nicho: form.nicho || null,
        tipo_projeto: form.tipo_projeto,
        mensal: Number(form.mensal) || 0,
        impl: Number(form.impl) || 0,
        valor_total_acordado: Number(form.valor_total_acordado) || 0,
        parcelas_planejadas: form.parcelas_planejadas ? Number(form.parcelas_planejadas) : null,
        e_repasse_terceiros: !!form.e_repasse_terceiros,
        status_fase: form.status_fase,
        status: form.status_fase, // mantém legado em sync
        cliente_id: form.cliente_id || null,
        cliente_grupo: clienteMestre?.nome || null,
        nome_pagador_esperado: form.nome_pagador_esperado || null,
        data_inicio: form.data_inicio || null,
        data_fim_previsto: form.data_fim_previsto || null,
        escopo: form.escopo || null,
        centro_de_custo: form.centro_de_custo || null,
        dia: form.dia || '',
      };
      let projetoId;
      if (novo) {
        projetoId = await addRecorrencia(payload);
        if (!projetoId) throw new Error('Não foi possível criar projeto');
      } else {
        await editRecorrencia(projeto.id, payload);
        projetoId = projeto.id;
      }
      // Se for projeto parcelado e tiver parcelas_planejadas, gera projeto_parcelas (se ainda não tem)
      if (novo && form.tipo_projeto === 'parcelado' && form.parcelas_planejadas > 0 && form.valor_total_acordado > 0) {
        const cli = getSupa();
        if (cli) {
          const valorParcela = Number(form.valor_total_acordado) / Number(form.parcelas_planejadas);
          const parcelas = [];
          for (let i = 1; i <= form.parcelas_planejadas; i++) {
            const venc = form.data_inicio ? new Date(form.data_inicio) : new Date();
            venc.setMonth(venc.getMonth() + (i-1));
            parcelas.push({
              projeto_id: projetoId,
              numero: i,
              valor_esperado: valorParcela.toFixed(2),
              data_vencimento_esperada: venc.toISOString().slice(0,10),
              pago: false,
            });
          }
          await cli.from('projeto_parcelas').insert(parcelas);
        }
      }
      showToast?.(novo ? 'Projeto criado' : 'Projeto atualizado', 'success');
      onClose();
    } catch (e) {
      setErro(e.message || String(e));
    } finally { setSalvando(false); }
  };

  const remover = async () => {
    if (!confirm(`Remover projeto "${projeto.cliente}"?\n\nIsto NÃO remove o cliente mestre, só este contrato.`)) return;
    const cli = getSupa(); if (!cli) return;
    await cli.from('projetos').delete().eq('id', projeto.id);
    showToast?.('Projeto removido', 'success');
    onClose();
  };

  const inp = { width:'100%', padding:'10px 12px', background:'var(--bg-3)', border:'1px solid var(--border)', borderRadius:8, color:'var(--t1)', fontSize:13.5, outline:'none', fontFamily:'var(--f-b)' };

  return (
    <div onClick={(e)=>{if(e.target===e.currentTarget) onClose();}} style={{
      position:'fixed', inset:0, background:'rgba(0,0,0,.7)', backdropFilter:'blur(4px)',
      zIndex:9999, display:'flex', alignItems:'center', justifyContent:'center', padding:20,
    }}>
      <div style={{width:'min(720px, 95vw)', maxHeight:'92vh', background:'var(--bg)', border:'1px solid var(--border)', borderRadius:14, display:'flex', flexDirection:'column', overflow:'hidden'}}>
        {/* Header */}
        <div style={{padding:'18px 22px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', gap:12}}>
          <div style={{width:38, height:38, borderRadius:9, background:'rgba(30,144,255,.12)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0}}>
            <Icon name="Layers" size={17} style={{color:'var(--blue)'}}/>
          </div>
          <div style={{flex:1, minWidth:0}}>
            <h3 style={{margin:0, fontSize:17, color:'var(--t1)', fontFamily:'var(--f-d)', fontWeight:600}}>{novo ? 'Novo projeto' : 'Editar projeto'}</h3>
            <div style={{fontSize:12, color:'var(--t3)', marginTop:2}}>{novo ? 'Vincule a um cliente e configure o contrato' : projeto?.cliente}</div>
          </div>
          <button onClick={onClose} style={{width:32, height:32, borderRadius:8, border:'none', background:'transparent', color:'var(--t3)', cursor:'pointer', fontSize:18}}>×</button>
        </div>

        {/* Body */}
        <div style={{flex:1, overflowY:'auto', padding:'18px 22px'}}>
          {/* SEÇÃO 1: Cliente + Identificação */}
          <SecaoLabel icon="UserCircle">Cliente vinculado</SecaoLabel>
          <div style={{display:'grid', gridTemplateColumns:'1fr', gap:12, marginBottom:18}}>
            <div>
              <label style={{fontSize:11, color:'var(--t3)', marginBottom:5, display:'block'}}>Cliente mestre *</label>
              <select style={inp} value={form.cliente_id} onChange={e=>set('cliente_id', e.target.value)}>
                <option value="">— Selecione um cliente —</option>
                {(clientes||[]).map(c => <option key={c.id} value={c.id}>{c.nome} {c.cnpj_cpf ? `· ${c.cnpj_cpf}` : ''}</option>)}
              </select>
              {!form.cliente_id && <div style={{fontSize:10.5, color:'#ff8585', marginTop:4}}>⚠ Sem cliente, o projeto fica órfão e não aparece no Cliente 360</div>}
            </div>
          </div>

          <SecaoLabel icon="Layers">Identificação do projeto</SecaoLabel>
          <div style={{display:'grid', gridTemplateColumns:'2fr 1fr', gap:12, marginBottom:12}}>
            <div>
              <label style={{fontSize:11, color:'var(--t3)', marginBottom:5, display:'block'}}>Nome do projeto *</label>
              <input style={inp} value={form.cliente} onChange={e=>set('cliente', e.target.value)} placeholder="Ex: EstacionePark - Campanha" autoFocus/>
              <div style={{fontSize:10, color:'var(--t3)', marginTop:3}}>Use formato "Cliente - SubProjeto" pra conciliação automática identificar o projeto certo</div>
            </div>
            <div>
              <label style={{fontSize:11, color:'var(--t3)', marginBottom:5, display:'block'}}>Status / Fase</label>
              <select style={{...inp, borderLeft:`3px solid ${getStatusByKey(statusConfig, form.status_fase).cor}`}} value={form.status_fase} onChange={e=>{ set('status_fase', e.target.value); set('status', e.target.value); }}>
                {(statusConfig||[]).map(s => <option key={s.key} value={s.key}>{s.label}</option>)}
              </select>
            </div>
          </div>

          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:18}}>
            <div>
              <label style={{fontSize:11, color:'var(--t3)', marginBottom:5, display:'block'}}>Serviço (descrição curta)</label>
              <input style={inp} value={form.servico} onChange={e=>set('servico', e.target.value)} placeholder="IA + Sistema + GMB"/>
            </div>
            <div>
              <label style={{fontSize:11, color:'var(--t3)', marginBottom:5, display:'block'}}>Nicho</label>
              <input style={inp} value={form.nicho} onChange={e=>set('nicho', e.target.value)} placeholder="Estacionamento, Saúde..."/>
            </div>
          </div>

          {/* SEÇÃO 2: Valores */}
          <SecaoLabel icon="DollarSign">Valores e tipo</SecaoLabel>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:12}}>
            <div>
              <label style={{fontSize:11, color:'var(--t3)', marginBottom:5, display:'block'}}>Tipo de projeto</label>
              <select style={inp} value={form.tipo_projeto} onChange={e=>set('tipo_projeto', e.target.value)}>
                <option value="mensalidade">Mensalidade recorrente</option>
                <option value="implantacao_unica">Implantação única (sem mensal)</option>
                <option value="misto">Misto (implantação + mensal)</option>
                <option value="parcelado">Parcelado (ex: 50/50, 3x)</option>
              </select>
            </div>
            <div>
              <label style={{fontSize:11, color:'var(--t3)', marginBottom:5, display:'block'}}>Dia do vencimento</label>
              <input style={inp} value={form.dia} onChange={e=>set('dia', e.target.value)} placeholder="Ex: Dia 10"/>
            </div>
          </div>

          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:12}}>
            <div>
              <label style={{fontSize:11, color:'var(--t3)', marginBottom:5, display:'block'}}>Mensal (R$)</label>
              <input style={inp} type="number" step="0.01" value={form.mensal} onChange={e=>set('mensal', e.target.value)} placeholder="0,00"/>
            </div>
            <div>
              <label style={{fontSize:11, color:'var(--t3)', marginBottom:5, display:'block'}}>Implantação (R$)</label>
              <input style={inp} type="number" step="0.01" value={form.impl} onChange={e=>set('impl', e.target.value)} placeholder="0,00"/>
            </div>
          </div>

          {form.tipo_projeto === 'parcelado' && (
            <div style={{padding:'12px 14px', background:'rgba(123,63,228,.08)', border:'1px solid rgba(123,63,228,.25)', borderRadius:9, marginBottom:12}}>
              <div style={{fontSize:11, color:'#a78bfa', fontWeight:600, marginBottom:8, textTransform:'uppercase', letterSpacing:.4}}>Projeto parcelado</div>
              <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
                <div>
                  <label style={{fontSize:11, color:'var(--t3)', marginBottom:5, display:'block'}}>Valor total acordado (R$)</label>
                  <input style={inp} type="number" step="0.01" value={form.valor_total_acordado} onChange={e=>set('valor_total_acordado', e.target.value)} placeholder="Ex: 5000"/>
                </div>
                <div>
                  <label style={{fontSize:11, color:'var(--t3)', marginBottom:5, display:'block'}}>Qtd parcelas</label>
                  <input style={inp} type="number" value={form.parcelas_planejadas || ''} onChange={e=>set('parcelas_planejadas', e.target.value)} placeholder="Ex: 2, 3, 4..."/>
                </div>
              </div>
              {novo && form.parcelas_planejadas > 0 && form.valor_total_acordado > 0 && (
                <div style={{fontSize:11.5, color:'var(--t2)', marginTop:8}}>
                  Vai gerar <strong>{form.parcelas_planejadas} parcelas de R$ {(Number(form.valor_total_acordado)/Number(form.parcelas_planejadas)).toFixed(2)}</strong> a partir da data início.
                </div>
              )}
            </div>
          )}

          <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:18, padding:'10px 12px', background:'var(--bg-3)', border:'1px solid var(--border)', borderRadius:8}}>
            <input type="checkbox" id="e_repasse" checked={!!form.e_repasse_terceiros} onChange={e=>set('e_repasse_terceiros', e.target.checked)} style={{cursor:'pointer', accentColor:'#BA7517'}}/>
            <label htmlFor="e_repasse" style={{flex:1, fontSize:12.5, color:'var(--t2)', cursor:'pointer', userSelect:'none'}}>
              <strong style={{color:'var(--t1)'}}>Repasse a terceiros</strong>
              <div style={{fontSize:11, color:'var(--t3)', marginTop:2}}>Verba de mídia/tráfego que passa pela conta mas não é receita. Vira lançamento "Repasse mídia" no caixa.</div>
            </label>
          </div>

          {/* SEÇÃO 3: Conciliação */}
          <SecaoLabel icon="Wallet">Conciliação automática</SecaoLabel>
          <div style={{marginBottom:18}}>
            <label style={{fontSize:11, color:'var(--t3)', marginBottom:5, display:'block'}}>Nome do pagador no extrato</label>
            <input style={inp} value={form.nome_pagador_esperado} onChange={e=>set('nome_pagador_esperado', e.target.value.toUpperCase())} placeholder="Ex: ESTACIONEPARKAEROPORTO LTDA"/>
            <div style={{fontSize:10.5, color:'var(--t3)', marginTop:4}}>Como aparece no extrato bancário. Sistema usa pra reconhecer pagamentos automaticamente.</div>
          </div>

          {/* SEÇÃO 4: Datas e escopo */}
          <SecaoLabel icon="CalendarCheck">Datas e contexto</SecaoLabel>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:12, marginBottom:12}}>
            <div>
              <label style={{fontSize:11, color:'var(--t3)', marginBottom:5, display:'block'}}>Data início</label>
              <input style={inp} type="date" value={form.data_inicio || ''} onChange={e=>set('data_inicio', e.target.value)}/>
            </div>
            <div>
              <label style={{fontSize:11, color:'var(--t3)', marginBottom:5, display:'block'}}>Data fim prevista</label>
              <input style={inp} type="date" value={form.data_fim_previsto || ''} onChange={e=>set('data_fim_previsto', e.target.value)}/>
            </div>
            <div>
              <label style={{fontSize:11, color:'var(--t3)', marginBottom:5, display:'block'}}>Centro de custo</label>
              <input style={inp} value={form.centro_de_custo} onChange={e=>set('centro_de_custo', e.target.value)} placeholder="Opcional"/>
            </div>
          </div>

          <div>
            <label style={{fontSize:11, color:'var(--t3)', marginBottom:5, display:'block'}}>Escopo (opcional)</label>
            <textarea style={{...inp, resize:'vertical', minHeight:70, fontFamily:'inherit'}} value={form.escopo} onChange={e=>set('escopo', e.target.value)} placeholder="O que está incluso, observações..."/>
          </div>

          {erro && (
            <div style={{marginTop:14, padding:'10px 14px', background:'rgba(229,84,77,.10)', border:'1px solid rgba(229,84,77,.30)', borderRadius:7, fontSize:12.5, color:'#ff8585'}}>
              ⚠ {erro}
            </div>
          )}
        </div>

        {/* Footer */}
        <div style={{padding:'12px 22px', borderTop:'1px solid var(--border)', display:'flex', justifyContent:'space-between', gap:10}}>
          {!novo
            ? <button onClick={remover} style={{padding:'8px 14px', borderRadius:7, border:'none', background:'transparent', color:'#E5544D', fontSize:12.5, fontWeight:600, cursor:'pointer', display:'inline-flex', alignItems:'center', gap:5}}><Icon name="Trash2" size={12}/>Remover</button>
            : <span/>}
          <div style={{display:'flex', gap:10}}>
            <button onClick={onClose} style={{padding:'8px 16px', borderRadius:7, border:'1px solid var(--border)', background:'transparent', color:'var(--t2)', fontSize:13, fontWeight:500, cursor:'pointer'}}>Cancelar</button>
            <button onClick={salvar} disabled={salvando} style={{padding:'8px 18px', borderRadius:7, border:'none', background: salvando ? 'var(--bg-3)' : 'var(--blue)', color:'#fff', fontSize:13, fontWeight:600, cursor: salvando ? 'wait' : 'pointer', display:'inline-flex', alignItems:'center', gap:6}}>
              <Icon name={salvando ? 'RefreshCw' : 'Check'} size={13}/>
              {salvando ? 'Salvando...' : (novo ? 'Criar projeto' : 'Salvar')}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════
// CLIENTE 360 MODAL — Sprint E.5
// Modal grande com tabs Resumo / Projetos / Pagamentos / Anexos / Editar
// Quando cliente novo (sem id), vai direto pra Editar
// ═════════════════════════════════════════════════════════════════
function Cliente360Modal({ cliente: clienteProp, onClose }) {
  const novo = !clienteProp?.id;
  // Hooks SEMPRE antes de qualquer return condicional (regra do React)
  const [tab, setTab] = React.useState('resumo');
  const [editandoCad, setEditandoCad] = React.useState(false);
  // ✨ Reativo: cliente sempre sincronizado com o banco (atualiza após edit inline)
  const clienteAtualizado = useCliente(clienteProp?.id);
  const cliente = clienteAtualizado || clienteProp; // fallback durante load inicial
  const { list: statusConfig } = useStatusConfig();
  const { list: projetos, loading: loadingProj } = useProjetosResumoCliente(cliente?.id);
  const extrato = useExtratoPorCliente(cliente?.id);
  const stats = React.useMemo(() => {
    const mrr = projetos.reduce((s,p) => s + Number(p.mensal_esperado||0), 0);
    const recebidoTotal = projetos.reduce((s,p) => s + Number(p.total_recebido||0), 0);
    const implEsperada = projetos.reduce((s,p) => s + Number(p.implantacao_esperada||0), 0);
    const implRecebida = projetos.reduce((s,p) => s + Number(p.impl_parcela_recebido||0), 0);
    const atrasos = projetos.reduce((s,p) => s + Number(p.meses_em_atraso||0), 0);
    return { mrr, recebidoTotal, implEsperada, implRecebida, atrasos };
  }, [projetos]);
  // Se for novo (sem id), abre o modal tradicional de cadastro (hooks já chamados)
  if (novo) {
    return <ClienteCadastroModal cliente={clienteProp} onClose={onClose}/>;
  }
  const cfg = getStatusByKey(statusConfig, cliente?.status);

  const tabs = [
    { key:'resumo',     label:'Resumo',     icon:'LayoutDashboard' },
    { key:'projetos',   label:'Projetos',   icon:'Layers', badge: projetos.length },
    { key:'pagamentos', label:'Pagamentos', icon:'Wallet', badge: extrato.length },
    { key:'anexos',     label:'Anexos',     icon:'Paperclip' },
  ];

  return (
    <div onClick={(e)=>{if(e.target===e.currentTarget) onClose();}} style={{
      position:'fixed', inset:0, background:'rgba(0,0,0,.7)', backdropFilter:'blur(4px)',
      zIndex:9999, display:'flex', alignItems:'center', justifyContent:'center', padding:20,
    }}>
      <div style={{width:'min(960px, 96vw)', maxHeight:'92vh', background:'var(--bg)', border:'1px solid var(--border)', borderRadius:14, display:'flex', flexDirection:'column', overflow:'hidden'}}>
        {/* Header */}
        <div style={{padding:'18px 22px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', gap:12}}>
          <div style={{
            width:44, height:44, borderRadius:'50%', flexShrink:0,
            background: cliente.foto_url ? `url(${cliente.foto_url}) center/cover` : (cliente.cor || cfg?.cor || 'var(--blue)'),
            color:'#fff', display:'flex', alignItems:'center', justifyContent:'center',
            fontFamily:'var(--f-d)', fontWeight:700, fontSize:15,
          }}>{!cliente.foto_url && (cliente.nome || '?').split(' ').slice(0,2).map(n=>n[0]).join('').toUpperCase()}</div>
          <div style={{flex:1, minWidth:0}}>
            <h3 style={{margin:0, fontSize:17, color:'var(--t1)', fontFamily:'var(--f-d)', fontWeight:600, display:'flex', alignItems:'center', gap:6}}>
              {cliente.nome}
              {cliente.status_lock && <Icon name="Lock" size={12} style={{color:'#BA7517'}}/>}
            </h3>
            {cfg && (
              <div style={{fontSize:12, color:'var(--t3)', marginTop:3, display:'flex', alignItems:'center', gap:6, flexWrap:'wrap'}}>
                <span style={{padding:'2px 7px', borderRadius:999, background:cfg.cor+'22', color:cfg.cor, fontWeight:600, fontSize:10.5, display:'inline-flex', alignItems:'center', gap:4}}>
                  <Icon name={cfg.icone} size={9}/>{cfg.label}
                </span>
                {cliente.tipo_pessoa && <span>{cliente.tipo_pessoa}</span>}
                {cliente.nicho && <><span>·</span><span>{cliente.nicho}</span></>}
                <span>·</span><span>{projetos.length} projeto{projetos.length === 1 ? '' : 's'}</span>
              </div>
            )}
          </div>
          <button onClick={()=>setEditandoCad(true)} style={{padding:'7px 12px', borderRadius:7, border:'1px solid var(--border)', background:'var(--bg-3)', color:'var(--t2)', fontSize:12.5, fontWeight:500, cursor:'pointer', display:'inline-flex', alignItems:'center', gap:5}}>
            <Icon name="Pencil" size={12}/>Editar
          </button>
          <button onClick={onClose} style={{width:32, height:32, borderRadius:8, border:'none', background:'transparent', color:'var(--t3)', cursor:'pointer', fontSize:18}}>×</button>
        </div>

        {/* Tabs */}
        <div style={{display:'flex', gap:0, padding:'0 22px', borderBottom:'1px solid var(--border)', background:'var(--bg-2)'}}>
          {tabs.map(t => {
            const ativo = tab === t.key;
            return (
              <button key={t.key} onClick={()=>setTab(t.key)} style={{
                padding:'12px 16px', background:'transparent', border:'none', cursor:'pointer',
                color: ativo ? 'var(--blue)' : 'var(--t3)',
                fontSize:13, fontWeight: ativo ? 600 : 500,
                borderBottom: `2px solid ${ativo ? 'var(--blue)' : 'transparent'}`,
                marginBottom:-1,
                display:'inline-flex', alignItems:'center', gap:6,
              }}>
                <Icon name={t.icon} size={13}/>
                {t.label}
                {t.badge !== undefined && (
                  <span style={{padding:'1px 6px', borderRadius:999, background: ativo ? 'rgba(30,144,255,.18)' : 'var(--bg-3)', color: ativo ? 'var(--blue)' : 'var(--t3)', fontSize:10.5, fontWeight:600, lineHeight:1.4}}>{t.badge}</span>
                )}
              </button>
            );
          })}
        </div>

        {/* Body */}
        <div style={{flex:1, overflowY:'auto'}}>
          {tab === 'resumo'     && <Cliente360TabResumo cliente={cliente} projetos={projetos} stats={stats} extrato={extrato}/>}
          {tab === 'projetos'   && <Cliente360TabProjetos cliente={cliente} projetos={projetos} loading={loadingProj}/>}
          {tab === 'pagamentos' && <Cliente360TabPagamentos cliente={cliente} extrato={extrato} projetos={projetos}/>}
          {tab === 'anexos'     && <Cliente360TabAnexos cliente={cliente} projetos={projetos}/>}
        </div>
      </div>

      {editandoCad && <ClienteCadastroModal cliente={cliente} embedded onClose={()=>setEditandoCad(false)}/>}
    </div>
  );
}

// ─── TAB: Resumo ───
function Cliente360TabResumo({ cliente, projetos, stats, extrato }) {
  const fmt = (v) => Number(v||0).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
  const kpis = [
    { label:'MRR (mensalidade total)', val:'R$ '+fmt(stats.mrr), cor:'#1D9E75', icon:'Repeat' },
    { label:'Total recebido', val:'R$ '+fmt(stats.recebidoTotal), cor:'var(--blue)', icon:'ArrowDownCircle' },
    { label:'Implantação esperada', val:'R$ '+fmt(stats.implEsperada), cor:'#7B3FE4', icon:'Activity' },
    { label: stats.atrasos > 0 ? 'Meses em atraso' : 'Sem atrasos',
      val: stats.atrasos > 0 ? stats.atrasos : '✓',
      cor: stats.atrasos > 0 ? '#A32D2D' : '#1D9E75',
      icon: stats.atrasos > 0 ? 'AlertCircle' : 'CheckCircle2' },
  ];
  return (
    <div style={{padding:'18px 22px'}}>
      {/* KPIs */}
      <div style={{display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:10, marginBottom:18}}>
        {kpis.map((k,i) => (
          <div key={i} style={{padding:'14px', background:'var(--bg-2)', border:'1px solid var(--border)', borderRadius:10}}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:6}}>
              <div style={{fontSize:10.5, color:'var(--t3)', textTransform:'uppercase', letterSpacing:.4, fontWeight:600}}>{k.label}</div>
              <div style={{width:26, height:26, borderRadius:7, background:k.cor+'22', display:'flex', alignItems:'center', justifyContent:'center'}}>
                <Icon name={k.icon} size={13} style={{color:k.cor}}/>
              </div>
            </div>
            <div style={{fontFamily:'var(--f-m)', fontSize:18, fontWeight:600, color:'var(--t1)'}}>{k.val}</div>
          </div>
        ))}
      </div>

      {/* Identificação — TUDO editável inline */}
      <SecaoLabel icon="Building2">Identificação <span style={{fontSize:10, color:'var(--t3)', fontWeight:400}}>· clique em qualquer campo pra editar</span></SecaoLabel>
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:18}}>
        <InfoCardEdit label={cliente.tipo_pessoa === 'PF' ? 'CPF' : 'CNPJ'} value={cliente.cnpj_cpf} field="cnpj_cpf" clienteId={cliente.id} placeholder={cliente.tipo_pessoa === 'PF' ? '000.000.000-00' : '00.000.000/0000-00'}/>
        <InfoCardEdit label="Nome fantasia" value={cliente.nome_fantasia} field="nome_fantasia" clienteId={cliente.id}/>
        <InfoCardEdit label="Email" value={cliente.contato_email} field="contato_email" clienteId={cliente.id} type="email" placeholder="contato@empresa.com"/>
        <InfoCardEdit label="Telefone" value={cliente.contato_telefone} field="contato_telefone" clienteId={cliente.id} placeholder="(11) 99999-9999"/>
        <InfoCardEdit label="Contato (nome)" value={cliente.contato_nome} field="contato_nome" clienteId={cliente.id} placeholder="Nome de quem você fala"/>
        <InfoCardEdit label="Cargo do contato" value={cliente.contato_cargo} field="contato_cargo" clienteId={cliente.id} placeholder="Sócio, Gerente..."/>
        <InfoCardEdit label="Origem" value={cliente.origem} field="origem" clienteId={cliente.id} placeholder="Indicação, Inbound..."/>
        <InfoCardEdit label="Nicho" value={cliente.nicho} field="nicho" clienteId={cliente.id} placeholder="Estética, Saúde..."/>
        <InfoCardEdit label="Site" value={cliente.site} field="site" clienteId={cliente.id} placeholder="https://empresa.com.br"/>
        <InfoCardEdit label="Cidade / UF" value={cliente.endereco_cidade ? `${cliente.endereco_cidade}${cliente.endereco_estado ? '/'+cliente.endereco_estado : ''}` : null} field="endereco_cidade" clienteId={cliente.id} placeholder="São Paulo"/>
      </div>

      {/* Últimos lançamentos */}
      <SecaoLabel icon="Wallet">Últimos pagamentos vinculados</SecaoLabel>
      {extrato.length === 0 ? (

// Card editável inline — click pra editar, blur ou Enter pra salvar, Escape pra cancelar
function InfoCardEdit({ label, value, field, clienteId, type = 'text', placeholder, onAfter }) {
  const [editando, setEditando] = React.useState(false);
  const [val, setVal] = React.useState(value || '');
  const [saving, setSaving] = React.useState(false);
  React.useEffect(() => { setVal(value || ''); }, [value]);

  const salvar = async () => {
    if (val === (value || '')) { setEditando(false); return; }
    // Sanitiza por campo
    let cleanVal = val.trim();
    if (field === 'cnpj_cpf') cleanVal = cleanVal.replace(/\D/g, ''); // só números
    if (field === 'endereco_estado') cleanVal = cleanVal.toUpperCase().slice(0,2);
    if (field === 'contato_email') cleanVal = cleanVal.toLowerCase();
    setSaving(true);
    const r = await editCliente(clienteId, { [field]: cleanVal || null });
    setSaving(false);
    setEditando(false);
    if (r.ok) {
      showToast?.('✓ '+label+' atualizado','success');
      onAfter?.();
    } else {
      showToast?.('Erro: '+r.erro,'error');
      setVal(value || ''); // reverte
    }
  };

  const cancelar = () => { setVal(value || ''); setEditando(false); };

  return (
    <div style={{padding:'9px 12px', background:'var(--bg-2)', border:'1px solid var(--border)', borderRadius:8, position:'relative', cursor: editando ? 'text' : 'pointer'}}
      onClick={() => !editando && setEditando(true)}
      title="Clique para editar">
      <div style={{fontSize:10.5, color:'var(--t3)', textTransform:'uppercase', letterSpacing:.4, marginBottom:2, fontWeight:600, display:'flex', justifyContent:'space-between', alignItems:'center'}}>
        <span>{label}</span>
        {!editando && <Icon name="Pencil" size={10} style={{color:'var(--t3)', opacity:.5}}/>}
      </div>
      {editando ? (
        <input
          autoFocus
          type={type}
          value={val}
          disabled={saving}
          onChange={e => setVal(e.target.value)}
          onBlur={salvar}
          onKeyDown={e => { if (e.key === 'Enter') salvar(); if (e.key === 'Escape') cancelar(); }}
          placeholder={placeholder || ''}
          style={{
            width:'100%', background:'transparent', border:'none', outline:'none',
            color:'var(--t1)', fontSize:13, fontFamily:'inherit', padding:0,
          }}
        />
      ) : (
        <div style={{fontSize:13, color: value ? 'var(--t1)' : 'var(--t3)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
          {value || <span style={{fontStyle:'italic'}}>— clique pra preencher —</span>}
        </div>
      )}
    </div>
  );
}

// ─── TAB: Anexos — upload, link, delete, tudo dinâmico ───
function Cliente360TabAnexos({ cliente, projetos }) {
  const [anexos, setAnexos] = React.useState([]);
  const [projetoId, setProjetoId] = React.useState('');
  const [categoria, setCategoria] = React.useState('Outro');
  const [modoLink, setModoLink] = React.useState(false);
  const [linkNome, setLinkNome] = React.useState('');
  const [linkUrl, setLinkUrl] = React.useState('');
  const [uploading, setUploading] = React.useState(false);
  const fileRef = React.useRef(null);

  // Reativa: realtime nos anexos de TODOS os projetos do cliente
  React.useEffect(() => {
    if (!projetos.length) { setAnexos([]); return; }
    const cli = getSupa(); if (!cli) return;
    let alive = true;
    const ids = projetos.map(p => p.projeto_id);
    const load = async () => {
      const { data } = await cli.from('projeto_anexos').select('*').in('projeto_id', ids).order('uploaded_at', { ascending:false });
      if (alive) setAnexos(data || []);
    };
    load();
    const ch = cli.channel(`rt:anexos:cli:${cliente.id}`)
      .on('postgres_changes', { event:'*', schema:'public', table:'projeto_anexos' }, load)
      .subscribe();
    return () => { alive = false; cli.removeChannel(ch); };
  }, [projetos.length, cliente.id]);

  // Pré-seleciona o primeiro projeto disponível
  React.useEffect(() => {
    if (!projetoId && projetos.length > 0) setProjetoId(projetos[0].projeto_id);
  }, [projetos.length, projetoId]);

  const projetoNome = (id) => projetos.find(p => p.projeto_id === id)?.projeto_nome || '—';
  const CATEGORIAS = ['Proposta','Contrato','Diagrama','Briefing','Apresentação','Outro'];

  const onUploadFile = async (e) => {
    const f = e.target.files?.[0]; if (!f) return;
    if (!projetoId) { showToast?.('Escolha um projeto primeiro','error'); return; }
    setUploading(true);
    const result = await uploadAnexoProjeto(projetoId, f, categoria);
    setUploading(false);
    if (result) showToast?.(`✓ ${f.name} enviado`,'success');
    e.target.value = '';
  };

  const adicionarLink = async () => {
    if (!projetoId) { showToast?.('Escolha um projeto','error'); return; }
    if (!linkUrl.trim()) { showToast?.('Cole a URL','error'); return; }
    const r = await adicionarLinkAnexo(projetoId, linkNome.trim() || linkUrl, linkUrl, categoria);
    if (r) {
      showToast?.('✓ Link adicionado','success');
      setLinkNome(''); setLinkUrl(''); setModoLink(false);
    }
  };

  const removerAnexo = async (anexo) => {
    if (!confirm(`Remover "${anexo.nome}"?`)) return;
    await deletarAnexoProjeto(anexo);
    showToast?.('Anexo removido','success');
  };

  // Se não tem projeto algum no cliente, bloqueia
  if (projetos.length === 0) {
    return (
      <div style={{padding:40, textAlign:'center', color:'var(--t3)'}}>
        <Icon name="Paperclip" size={32} style={{opacity:.4, marginBottom:8}}/>
        <div style={{fontSize:13}}>Crie um projeto primeiro pra poder anexar arquivos.</div>
      </div>
    );
  }

  return (
    <div style={{padding:'18px 22px', display:'flex', flexDirection:'column', gap:12}}>
      {/* Toolbar: escolher projeto + categoria + ação */}
      <div style={{padding:'12px 14px', background:'var(--bg-2)', border:'1px solid var(--border)', borderRadius:10}}>
        <div style={{display:'grid', gridTemplateColumns:'2fr 1fr', gap:10, marginBottom:10}}>
          <div>
            <label style={{fontSize:10, color:'var(--t3)', textTransform:'uppercase', letterSpacing:.4, fontWeight:600, marginBottom:4, display:'block'}}>Projeto destino</label>
            <select value={projetoId} onChange={e=>setProjetoId(e.target.value)} style={{
              width:'100%', padding:'8px 10px', background:'var(--bg-3)', border:'1px solid var(--border)',
              borderRadius:7, color:'var(--t1)', fontSize:12.5,
            }}>
              {projetos.map(p => <option key={p.projeto_id} value={p.projeto_id}>{p.projeto_nome}</option>)}
            </select>
          </div>
          <div>
            <label style={{fontSize:10, color:'var(--t3)', textTransform:'uppercase', letterSpacing:.4, fontWeight:600, marginBottom:4, display:'block'}}>Categoria</label>
            <select value={categoria} onChange={e=>setCategoria(e.target.value)} style={{
              width:'100%', padding:'8px 10px', background:'var(--bg-3)', border:'1px solid var(--border)',
              borderRadius:7, color:'var(--t1)', fontSize:12.5,
            }}>
              {CATEGORIAS.map(c => <option key={c} value={c}>{c}</option>)}
            </select>
          </div>
        </div>

        {!modoLink ? (
          <div style={{display:'flex', gap:8}}>
            <input ref={fileRef} type="file" onChange={onUploadFile} style={{display:'none'}} accept="*/*"/>
            <button onClick={()=>fileRef.current?.click()} disabled={uploading} style={{
              flex:1, padding:'10px', borderRadius:8, border:'1px solid var(--blue)',
              background:'rgba(30,144,255,.10)', color:'var(--blue)', fontSize:13, fontWeight:600,
              cursor: uploading ? 'wait' : 'pointer', display:'inline-flex', alignItems:'center', justifyContent:'center', gap:6,
            }}>
              <Icon name={uploading ? 'RefreshCw' : 'Upload'} size={14}/>
              {uploading ? 'Enviando...' : 'Enviar arquivo'}
            </button>
            <button onClick={()=>setModoLink(true)} style={{
              padding:'10px 14px', borderRadius:8, border:'1px solid var(--border)',
              background:'var(--bg-3)', color:'var(--t2)', fontSize:13, cursor:'pointer',
              display:'inline-flex', alignItems:'center', gap:6,
            }}>
              <Icon name="Link" size={13}/>Link externo
            </button>
          </div>
        ) : (
          <div style={{display:'flex', flexDirection:'column', gap:8}}>
            <input type="text" placeholder="Nome do link (opcional)" value={linkNome} onChange={e=>setLinkNome(e.target.value)} style={{
              padding:'8px 10px', background:'var(--bg-3)', border:'1px solid var(--border)', borderRadius:7, color:'var(--t1)', fontSize:12.5, outline:'none',
            }}/>
            <input type="url" placeholder="https://drive.google.com/..." value={linkUrl} onChange={e=>setLinkUrl(e.target.value)} autoFocus style={{
              padding:'8px 10px', background:'var(--bg-3)', border:'1px solid var(--border)', borderRadius:7, color:'var(--t1)', fontSize:12.5, outline:'none',
            }}/>
            <div style={{display:'flex', gap:8}}>
              <button onClick={adicionarLink} style={{flex:1, padding:'8px', borderRadius:7, border:'none', background:'var(--blue)', color:'#fff', fontSize:12.5, fontWeight:600, cursor:'pointer'}}>Adicionar link</button>
              <button onClick={()=>{setModoLink(false); setLinkUrl(''); setLinkNome('');}} style={{padding:'8px 14px', borderRadius:7, border:'1px solid var(--border)', background:'transparent', color:'var(--t2)', fontSize:12.5, cursor:'pointer'}}>Cancelar</button>
            </div>
          </div>
        )}
      </div>

      {/* Lista de anexos */}
      {anexos.length === 0 ? (
        <div style={{padding:30, textAlign:'center', color:'var(--t3)', border:'1.5px dashed var(--border)', borderRadius:10}}>
          <Icon name="Paperclip" size={28} style={{opacity:.4, marginBottom:6}}/>
          <div style={{fontSize:12.5}}>Nenhum anexo ainda. Use o painel acima pra subir.</div>
        </div>
      ) : (
        <div style={{display:'flex', flexDirection:'column', gap:6}}>
          {anexos.map(a => (
            <div key={a.id} style={{
              padding:'10px 14px', background:'var(--bg-2)', border:'1px solid var(--border)', borderRadius:8,
              display:'flex', alignItems:'center', gap:10,
            }}>
              <Icon name={a.tipo === 'link' ? 'Link' : 'FileText'} size={15} style={{color:'var(--blue)', flexShrink:0}}/>
              <a href={a.url} target="_blank" rel="noreferrer" style={{flex:1, minWidth:0, textDecoration:'none', color:'var(--t1)'}}>
                <div style={{fontSize:13, fontWeight:600, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{a.nome}</div>
                <div style={{fontSize:11, color:'var(--t3)', marginTop:1}}>
                  {a.categoria || 'Outro'} · {projetoNome(a.projeto_id)}
                  {a.tamanho_bytes && <> · {(a.tamanho_bytes / 1024).toFixed(0)} KB</>}
                </div>
              </a>
              <a href={a.url} target="_blank" rel="noreferrer" title="Abrir" style={{color:'var(--t3)', padding:5}}>
                <Icon name="Download" size={13}/>
              </a>
              <button onClick={()=>removerAnexo(a)} title="Remover anexo" style={{padding:5, background:'transparent', border:'none', color:'#E5544D', cursor:'pointer'}}>
                <Icon name="Trash2" size={13}/>
              </button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// IMPORTAR EXTRATO BANCÁRIO — modal estilo black brava
// Parse 100% client-side via SheetJS. Arquivo NUNCA sai do browser.
// ─────────────────────────────────────────────────────────────────
function ImportarExtratoModal({ onClose }) {
  const [arquivo, setArquivo] = React.useState(null);
  const [parsed, setParsed] = React.useState(null);    // { meta, rows, sheetName }
  const [parseando, setParseando] = React.useState(false);
  const [importando, setImportando] = React.useState(false);
  const [resultado, setResultado] = React.useState(null); // { inseridos, duplicados }
  const [erro, setErro] = React.useState('');
  const fileRef = React.useRef(null);

  const onArquivo = async (e) => {
    setErro(''); setResultado(null); setParsed(null);
    const f = e.target.files?.[0];
    if (!f) return;
    if (!/\.(xlsx|xls)$/i.test(f.name)) { setErro('Use um arquivo .xlsx ou .xls'); return; }
    if (f.size > 5 * 1024 * 1024) { setErro('Arquivo maior que 5MB. Quebre em partes menores.'); return; }
    setArquivo(f); setParseando(true);
    try {
      const result = await parseExtratoXlsx(f);
      if (result.rows.length === 0) throw new Error('Nenhum lançamento detectado no arquivo.');
      setParsed(result);
    } catch (err) {
      setErro(err.message || String(err));
      setArquivo(null);
    } finally { setParseando(false); }
  };

  const importar = async () => {
    if (!parsed || importando) return;
    setImportando(true); setErro('');
    try {
      const res = await importarExtratoLancamentos(parsed.rows);
      if (res.erro) { setErro(res.erro); return; }
      setResultado(res);
      showToast?.(`${res.inseridos} lançamentos importados (${res.duplicados} já existiam)`, 'success');
    } catch (e) { setErro(e.message || String(e)); }
    finally { setImportando(false); }
  };

  const fechar = () => onClose?.();

  // Resumo do que será importado
  const totalEntradas = parsed ? parsed.rows.filter(r => r.valor > 0).reduce((s,r) => s + r.valor, 0) : 0;
  const totalSaidas   = parsed ? parsed.rows.filter(r => r.valor < 0).reduce((s,r) => s + r.valor, 0) : 0;
  const primeirosLanc = parsed ? parsed.rows.slice(0, 6) : [];

  return (
    <div onClick={(e)=>{if(e.target===e.currentTarget) fechar();}} style={{
      position:'fixed', inset:0, background:'rgba(0,0,0,.7)', backdropFilter:'blur(4px)',
      zIndex:9999, display:'flex', alignItems:'center', justifyContent:'center', padding:20,
    }}>
      <div style={{width:'min(640px, 95vw)', maxHeight:'90vh', background:'var(--bg)', border:'1px solid var(--border)', borderRadius:14, display:'flex', flexDirection:'column', overflow:'hidden'}}>
        {/* Header */}
        <div style={{padding:'18px 22px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', gap:12}}>
          <div style={{width:38, height:38, borderRadius:9, background:'rgba(30,144,255,.12)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0}}>
            <Icon name="Upload" size={17} style={{color:'var(--blue)'}}/>
          </div>
          <div style={{flex:1, minWidth:0}}>
            <h3 style={{margin:0, fontSize:17, color:'var(--t1)', fontFamily:'var(--f-d)', fontWeight:600}}>Importar extrato bancário</h3>
            <div style={{fontSize:12, color:'var(--t3)', marginTop:2}}>Arquivo XLSX processado no navegador · não sai do seu computador</div>
          </div>
          <button onClick={fechar} style={{width:32, height:32, borderRadius:8, border:'none', background:'transparent', color:'var(--t3)', cursor:'pointer', fontSize:18}}>×</button>
        </div>

        {/* Body */}
        <div style={{flex:1, overflowY:'auto', padding:'18px 22px'}}>
          {/* Estado 1: sem arquivo */}
          {!parsed && !resultado && (
            <>
              <SecaoLabel icon="FileText">Arquivo do extrato (.xlsx ou .xls)</SecaoLabel>
              <input ref={fileRef} type="file" accept=".xlsx,.xls" onChange={onArquivo} style={{display:'none'}}/>
              <div onClick={()=>!parseando && fileRef.current?.click()} style={{
                padding:'28px 14px', border:'1px dashed var(--border)', borderRadius:10,
                background:'var(--bg-3)', cursor: parseando ? 'wait' : 'pointer', textAlign:'center', transition:'border-color .15s',
              }}
                onMouseEnter={e=>{if(!parseando) e.currentTarget.style.borderColor='var(--blue)';}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';}}>
                <Icon name={parseando ? 'RefreshCw' : 'Upload'} size={28} style={{color:'var(--blue)', opacity:.8}}/>
                <div style={{marginTop:10, fontSize:14, color:'var(--t1)', fontWeight:500}}>
                  {parseando ? 'Lendo arquivo...' : (arquivo?.name || 'Clique aqui pra selecionar o arquivo')}
                </div>
                {!parseando && <div style={{fontSize:11.5, color:'var(--t3)', marginTop:4}}>Suporta extratos do BS2, Itaú, Inter, Nubank e similares · até 5MB</div>}
              </div>

              <div style={{marginTop:16, padding:'12px 14px', background:'rgba(30,144,255,.05)', border:'1px solid rgba(30,144,255,.18)', borderRadius:8, display:'flex', gap:10, alignItems:'flex-start'}}>
                <Icon name="Lock" size={14} style={{color:'var(--blue)', marginTop:2, flexShrink:0}}/>
                <div style={{fontSize:12, color:'var(--t2)', lineHeight:1.5}}>
                  <strong style={{color:'var(--blue)'}}>Segurança:</strong> o arquivo é lido no seu navegador. Apenas os lançamentos individuais (data, descrição, valor) vão pro banco de dados protegido por RLS. O arquivo XLSX nunca é enviado pra servidor algum.
                </div>
              </div>
            </>
          )}

          {/* Estado 2: parseado, mostra preview */}
          {parsed && !resultado && (
            <>
              <SecaoLabel icon="FileText">Arquivo processado</SecaoLabel>
              <div style={{padding:'12px 14px', background:'var(--bg-3)', borderRadius:8, marginBottom:18, border:'1px solid var(--border)'}}>
                <div style={{fontSize:13, color:'var(--t1)', fontWeight:500, marginBottom:6}}>{arquivo?.name}</div>
                <div style={{fontSize:11.5, color:'var(--t3)', display:'flex', gap:14, flexWrap:'wrap'}}>
                  {parsed.meta.banco   && <span>Banco <strong style={{color:'var(--t2)'}}>{parsed.meta.banco}</strong></span>}
                  {parsed.meta.agencia && <span>Ag <strong style={{color:'var(--t2)'}}>{parsed.meta.agencia}</strong></span>}
                  {parsed.meta.conta   && <span>Conta <strong style={{color:'var(--t2)'}}>{parsed.meta.conta}</strong></span>}
                  <span>Sheet <strong style={{color:'var(--t2)'}}>{parsed.sheetName}</strong></span>
                </div>
              </div>

              {/* KPIs do preview */}
              <SecaoLabel icon="BarChart3" count={parsed.rows.length}>Resumo</SecaoLabel>
              <div style={{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:10, marginBottom:18}}>
                {[
                  { label:'Lançamentos', val: parsed.rows.length, cor:'var(--blue)', icon:'FileText' },
                  { label:'Entradas',    val:`R$ ${totalEntradas.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2})}`, cor:'#1D9E75', icon:'ArrowDownCircle' },
                  { label:'Saídas',      val:`R$ ${Math.abs(totalSaidas).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2})}`, cor:'#A32D2D', icon:'ArrowUpCircle' },
                ].map((k,i) => (
                  <div key={i} style={{padding:'12px 14px', background:'var(--bg-3)', border:'1px solid var(--border)', borderRadius:8}}>
                    <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6}}>
                      <span style={{fontSize:11, color:'var(--t3)', textTransform:'uppercase', letterSpacing:'.05em', fontFamily:'var(--f-m)'}}>{k.label}</span>
                      <Icon name={k.icon} size={13} style={{color:k.cor}}/>
                    </div>
                    <div style={{fontSize:15, color:'var(--t1)', fontFamily:'var(--f-d)', fontWeight:600}}>{k.val}</div>
                  </div>
                ))}
              </div>

              <SecaoLabel icon="History">Primeiros lançamentos (preview)</SecaoLabel>
              <div style={{background:'var(--bg-3)', border:'1px solid var(--border)', borderRadius:8, overflow:'hidden', marginBottom:14}}>
                {primeirosLanc.map((l, i) => (
                  <div key={i} style={{display:'grid', gridTemplateColumns:'90px 1fr auto', gap:12, padding:'9px 12px', borderBottom: i < primeirosLanc.length - 1 ? '1px solid var(--border-soft)' : 'none', alignItems:'center'}}>
                    <div style={{fontSize:11.5, color:'var(--t3)', fontFamily:'var(--f-m)'}}>{formatBR(l.data)}</div>
                    <div style={{fontSize:12.5, color:'var(--t2)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{l.descricao}</div>
                    <div style={{fontSize:12.5, color: l.valor > 0 ? '#1D9E75' : '#ff8585', fontFamily:'var(--f-m)', fontWeight:600, whiteSpace:'nowrap'}}>
                      {l.valor > 0 ? '+' : '−'} R$ {Math.abs(l.valor).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2})}
                    </div>
                  </div>
                ))}
                {parsed.rows.length > primeirosLanc.length && (
                  <div style={{padding:'8px 12px', fontSize:11.5, color:'var(--t3)', textAlign:'center', borderTop:'1px solid var(--border-soft)'}}>
                    + {parsed.rows.length - primeirosLanc.length} lançamentos não exibidos no preview
                  </div>
                )}
              </div>

              <div style={{padding:'10px 12px', background:'rgba(186,117,23,.05)', border:'1px solid rgba(186,117,23,.20)', borderRadius:8, fontSize:11.5, color:'var(--t2)', display:'flex', gap:8, alignItems:'flex-start'}}>
                <Icon name="Info" size={13} style={{color:'#BA7517', marginTop:1, flexShrink:0}}/>
                <span>Lançamentos com mesmo hash (data + valor + descrição) já existentes serão <strong>ignorados automaticamente</strong>. Você pode reimportar o mesmo arquivo sem duplicar nada.</span>
              </div>
            </>
          )}

          {/* Estado 3: importação concluída */}
          {resultado && (
            <div style={{textAlign:'center', padding:'30px 10px'}}>
              <div style={{width:62, height:62, borderRadius:'50%', background:'rgba(29,158,117,.15)', display:'inline-flex', alignItems:'center', justifyContent:'center', marginBottom:14}}>
                <Icon name="CheckCircle2" size={32} style={{color:'#1D9E75'}}/>
              </div>
              <h3 style={{margin:'0 0 8px', fontSize:18, color:'var(--t1)', fontFamily:'var(--f-d)', fontWeight:600}}>Importação concluída!</h3>
              <div style={{fontSize:13.5, color:'var(--t2)', marginBottom:18, lineHeight:1.6}}>
                <strong style={{color:'#1D9E75'}}>{resultado.inseridos}</strong> lançamento{resultado.inseridos===1?'':'s'} novo{resultado.inseridos===1?'':'s'} adicionado{resultado.inseridos===1?'':'s'} ao banco.<br/>
                {resultado.duplicados > 0 && <><strong style={{color:'var(--t3)'}}>{resultado.duplicados}</strong> já existia{resultado.duplicados===1?'':'m'} e foi{resultado.duplicados===1?'':'ram'} ignorado{resultado.duplicados===1?'':'s'}.</>}
              </div>
              <div style={{fontSize:11.5, color:'var(--t3)'}}>Agora você pode vincular cada lançamento aos pagamentos do sistema na tab Fluxo de Caixa.</div>
            </div>
          )}

          {erro && (
            <div style={{marginTop:14, padding:'10px 14px', background:'rgba(229,84,77,.10)', border:'1px solid rgba(229,84,77,.30)', borderRadius:7, fontSize:12.5, color:'#ff8585'}}>{erro}</div>
          )}
        </div>

        {/* Footer */}
        <div style={{padding:'12px 22px', borderTop:'1px solid var(--border)', display:'flex', justifyContent:'flex-end', gap:10}}>
          {!resultado && (
            <button onClick={fechar} style={{padding:'8px 16px', borderRadius:7, border:'1px solid var(--border)', background:'transparent', color:'var(--t2)', fontSize:13, fontWeight:500, cursor:'pointer'}}>Cancelar</button>
          )}
          {parsed && !resultado && (
            <button onClick={importar} disabled={importando} style={{
              padding:'8px 18px', borderRadius:7, border:'none',
              background: importando ? 'var(--bg-3)' : 'var(--blue)',
              color:'#fff', fontSize:13, fontWeight:600, cursor: importando ? 'wait' : 'pointer',
              display:'inline-flex', alignItems:'center', gap:6,
            }}>
              <Icon name={importando ? 'RefreshCw' : 'Check'} size={13}/>
              {importando ? 'Importando...' : `Importar ${parsed.rows.length} lançamento${parsed.rows.length===1?'':'s'}`}
            </button>
          )}
          {resultado && (
            <button onClick={fechar} style={{padding:'8px 18px', borderRadius:7, border:'none', background:'var(--blue)', color:'#fff', fontSize:13, fontWeight:600, cursor:'pointer'}}>Fechar</button>
          )}
        </div>
      </div>
    </div>
  );
}
