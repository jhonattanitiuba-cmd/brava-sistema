        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────
// TAB 4: FLUXO DE CAIXA — extrato + lançamento avulso + projeção
// ─────────────────────────────────────────────────────────────────
function FinCaixa({ mesFiltro, recorrencia, pagamentos, despesas, despesasPag, caixa }) {
  const [editando, setEditando] = useState(null);
  const [importando, setImportando] = useState(false);
  const [conciliandoAberto, setConciliandoAberto] = useState(false);
  const [filtroTipo, setFiltroTipo] = useState('todos');
  const [sincronizandoBtg, setSincronizandoBtg] = useState(false);
  const extratoBancario = useExtratoBancario();
  const btgAccounts = useBtgAccounts();
  const ultimaSyncBtg = useBtgUltimaSync();
  const pendentesConciliacao = useConciliacoesPendentes();
  const ymHoje = mesFiltro || YM(new Date());
  const [ano, mes] = ymHoje.split('-').map(Number);
  const hoje = new Date(ano, mes - 1, 1);
  const inicioMesFiltro = new Date(ano, mes - 1, 1).toISOString().slice(0,10);
  const fimMesFiltro = new Date(ano, mes, 0).toISOString().slice(0,10);

  // Saldo total das contas BTG conectadas (somatório do saldo_atual mais recente)
  const saldoBtgTotal = btgAccounts.reduce((s, a) => s + (Number(a.saldo_atual) || 0), 0);

  // Texto amigável do "Última sync"
  const ultimaSyncTxt = (() => {
    if (!ultimaSyncBtg) return null;
    const dt = new Date(ultimaSyncBtg.concluido_em || ultimaSyncBtg.iniciado_em);
    const diffMin = Math.floor((Date.now() - dt.getTime()) / 60000);
    if (ultimaSyncBtg.status === 'rodando') return 'sincronizando...';
    if (ultimaSyncBtg.status === 'erro') return `erro há ${diffMin}min`;
    if (diffMin < 1) return 'agora mesmo';
    if (diffMin < 60) return `há ${diffMin}min`;
    const h = Math.floor(diffMin / 60);
    if (h < 24) return `há ${h}h`;
    return `há ${Math.floor(h/24)}d`;
  })();

  const onSincronizarBtg = async () => {
    if (sincronizandoBtg) return;
    setSincronizandoBtg(true);
    const res = await sincronizarBtg(30);
    setSincronizandoBtg(false);
    if (!res.ok) {
      showToast?.(`Erro na sincronização BTG: ${res.erro}`, 'error');
    } else {
      const partes = [`${res.novos} novo${res.novos===1?'':'s'}`];
      if (res.duplicados > 0) partes.push(`${res.duplicados} duplicado${res.duplicados===1?'':'s'} ignorado${res.duplicados===1?'':'s'}`);
      showToast?.(`BTG sincronizado: ${partes.join(', ')} em ${res.contas} conta${res.contas===1?'':'s'}`, 'success');
    }
  };

  // FLUXO DE CAIXA REAL — apenas extrato bancário + lançamentos manuais
  // Removida a simulação por recorrência/despesa (que duplicava com o real do BTG)
  const extrato = React.useMemo(() => {
    const itens = [];
    // 1) Lançamentos REAIS do extrato bancário (BTG/XLSX/manual importado)
    extratoBancario.forEach(l => {
      if (l.ignorado) return;
      itens.push({
        id: `bank:${l.id}`,
        tipo: l.valor > 0 ? 'entrada' : 'saida',
        descricao: l.descricao,
        categoria: l.banco ? `Banco ${l.banco}` : (l.fonte === 'btg_sync' || l.fonte === 'btg_webhook' ? 'BTG' : 'Extrato'),
        valor: Math.abs(Number(l.valor)),
        data: l.data,
        origem: 'banco',
        raw: l, editable: false,
        naoConciliado: !(l.conciliado_pagamento_id || l.conciliado_despesa_pagamento_id || l.conciliado_caixa_id),
        projeto_id: l.projeto_id,
        cliente_id: l.cliente_id,
      });
    });
    // 2) Lançamentos manuais avulsos (caixa_lancamentos sem vínculo com extrato)
    caixa.forEach(l => {
      // Pula se já foi gerado por conciliação de extrato (origem='banco') — evita duplicar
      const jaNoExtrato = (extratoBancario||[]).some(e => e.conciliado_caixa_id === l.id);
      if (jaNoExtrato) return;
      itens.push({
        id: 'c:'+l.id, tipo: l.tipo, descricao: l.descricao, categoria: l.categoria || 'Manual',
        valor: Number(l.valor), data: l.data, origem: l.origem || 'manual',
        raw: l, editable: true,
      });
    });
    // Ordena decrescente por data
    itens.sort((a,b) => (b.data || '').localeCompare(a.data || ''));
    return itens;
  }, [caixa, extratoBancario]);

  // Filtro pelo mês selecionado + tipo
  const filtrado = extrato.filter(i => {
    // Filtra por mês escolhido
    if (i.data && (i.data < inicioMesFiltro || i.data > fimMesFiltro)) return false;
    if (filtroTipo === 'todos') return true;
    if (filtroTipo === 'nao-conciliado') return i.naoConciliado === true;
    return i.tipo === filtroTipo;
  });

  // Saldo REAL = saldo_apos da última transação do extrato (vem do banco)
  const ultimaTransacao = [...extratoBancario].sort((a,b) => b.data.localeCompare(a.data))[0];
  const saldoAtual = Number(ultimaTransacao?.saldo_apos || saldoBtgTotal || 0);
  const totalEntradas = extrato.filter(l => l.tipo === 'entrada').reduce((s,l) => s + l.valor, 0);
  const totalSaidas = extrato.filter(l => l.tipo === 'saida').reduce((s,l) => s + l.valor, 0);
  const totalNaoConciliado = extrato.filter(l => l.naoConciliado).length;
  const nomeMesAtual = hoje.toLocaleDateString('pt-BR', { month:'long' });

  return (
    <div>
      {/* Header */}
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-end', marginBottom:14, gap:14, flexWrap:'wrap'}}>
        <div style={{fontSize:13, color:'var(--t3)'}}>
          {extrato.length} movimentações no extrato
          {totalNaoConciliado > 0 && <span style={{color:'#BA7517', marginLeft:8, fontWeight:500}}>· {totalNaoConciliado} do banco aguardando conciliação</span>}
        </div>
        <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>
          {pendentesConciliacao.length > 0 && (
            <button onClick={()=>setConciliandoAberto(true)} className="btn btn-outline" style={{
              display:'inline-flex', alignItems:'center', gap:6, position:'relative',
              borderColor:'#BA7517', color:'#BA7517',
            }}>
              <Icon name="Link" size={14}/>Conciliar
              <span style={{
                marginLeft:4, padding:'2px 7px', borderRadius:999, fontSize:11,
                background:'#BA7517', color:'#fff', fontWeight:700,
              }}>{pendentesConciliacao.length}</span>
            </button>
          )}
          <button onClick={onSincronizarBtg} disabled={sincronizandoBtg} className="btn btn-outline" style={{display:'inline-flex', alignItems:'center', gap:6}}>
            <Icon name={sincronizandoBtg ? 'RefreshCw' : 'Zap'} size={14} style={{color: sincronizandoBtg ? 'var(--t3)' : 'var(--blue)'}}/>
            {sincronizandoBtg ? 'Sincronizando BTG...' : 'Sincronizar BTG'}
          </button>
          <button onClick={()=>setImportando(true)} className="btn btn-outline"><Icon name="Upload" size={14}/>Importar XLSX</button>
          <button onClick={()=>setEditando({})} className="btn btn-primary"><Icon name="Plus" size={14}/>Novo lançamento</button>
        </div>
      </div>

      {/* Card de status BTG (só aparece se tem conta conectada) */}
      {(btgAccounts.length > 0 || ultimaSyncBtg) && (
        <div style={{
          display:'flex', alignItems:'center', gap:14, marginBottom:18,
          padding:'12px 16px', background:'linear-gradient(135deg, rgba(30,144,255,.08), transparent)',
          border:'1px solid rgba(30,144,255,.25)', borderRadius:10, flexWrap:'wrap',
        }}>
          <div style={{width:36, height:36, borderRadius:9, background:'rgba(30,144,255,.18)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0}}>
            <Icon name="Zap" size={17} style={{color:'var(--blue)'}}/>
          </div>
          <div style={{flex:1, minWidth:180}}>
            <div style={{fontSize:13, color:'var(--t1)', fontWeight:600}}>BTG Pactual conectado</div>
            <div style={{fontSize:11.5, color:'var(--t3)', marginTop:1}}>
              {btgAccounts.length} conta{btgAccounts.length===1?'':'s'} ·
              Saldo atual: <strong style={{color:'var(--t2)'}}>R$ {saldoBtgTotal.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2})}</strong>
              {ultimaSyncTxt && <> · Última sync <strong style={{color:'var(--t2)'}}>{ultimaSyncTxt}</strong></>}
            </div>
          </div>
          {ultimaSyncBtg?.status === 'erro' && (
            <div style={{fontSize:11.5, color:'#ff8585', padding:'4px 10px', background:'rgba(229,84,77,.10)', border:'1px solid rgba(229,84,77,.30)', borderRadius:6, maxWidth:280, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}} title={ultimaSyncBtg.erro}>
              {ultimaSyncBtg.erro}
            </div>
          )}
        </div>
      )}

      {/* KPIs — TUDO REAL do extrato (sem projeções/simulações) */}
      <div className="kpi-grid" style={{gridTemplateColumns:'repeat(4,1fr)', marginBottom:18}}>
        {[
          { label:'Saldo no banco (BTG)',    val:`R$ ${saldoAtual.toLocaleString('pt-BR', {minimumFractionDigits:2})}`,    icon:'Wallet',          color: saldoAtual >= 0 ? '#1D9E75' : '#A32D2D' },
          { label:'Entradas no extrato',     val:`R$ ${totalEntradas.toLocaleString('pt-BR', {minimumFractionDigits:2})}`, icon:'ArrowDownCircle', color:'#1D9E75' },
          { label:'Saídas no extrato',       val:`R$ ${totalSaidas.toLocaleString('pt-BR', {minimumFractionDigits:2})}`,   icon:'ArrowUpCircle',   color:'#A32D2D' },
          { label:'Aguardando conciliar',    val: String(totalNaoConciliado),                                              icon:'AlertCircle',     color: totalNaoConciliado > 0 ? '#BA7517' : '#1D9E75' },
        ].map((k,i)=>(
          <div key={i} className="kpi">
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
              <div className="kpi__label">{k.label}</div>
              <div className="kpi__icon" style={{background:k.color+'22'}}><Icon name={k.icon} size={17} style={{color:k.color}}/></div>
            </div>
            <div className="kpi__value" style={{fontSize:22, color:'var(--t1)'}}>{k.val}</div>
          </div>
        ))}
      </div>

      {/* Filtros */}
      <div className="card" style={{padding:'14px 16px', marginBottom:14, display:'flex', gap:10, alignItems:'center', flexWrap:'wrap'}}>
        {[
          { id:'todos',          label:'Tudo',                cor:'var(--blue)' },
          { id:'entrada',        label:'Entradas',            cor:'#1D9E75' },
          { id:'saida',          label:'Saídas',              cor:'#A32D2D' },
          { id:'nao-conciliado', label:`Não conciliado (${totalNaoConciliado})`, cor:'#BA7517' },
        ].map(o => (
          <button key={o.id} onClick={()=>setFiltroTipo(o.id)} style={{
            padding:'6px 14px', borderRadius:7, fontSize:12.5, fontWeight:500, cursor:'pointer',
            background: filtroTipo === o.id ? o.cor+'22' : 'transparent',
            color: filtroTipo === o.id ? o.cor : 'var(--t3)',
            border:`1px solid ${filtroTipo === o.id ? o.cor+'55' : 'transparent'}`,
          }}>{o.label}</button>
        ))}
        <div style={{marginLeft:'auto', fontSize:11.5, color:'var(--t3)'}}>* Recorrência, Despesas pagas e extrato do banco entram aqui automaticamente</div>
      </div>

      {/* Extrato */}
      <div className="card" style={{padding:0, overflow:'hidden'}}>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%', borderCollapse:'collapse', fontSize:13.5}}>
            <thead>
              <tr style={{background:'#000'}}>
                {['Data','Tipo','Descrição','Categoria','Valor','Origem','Ações'].map(h => (
                  <th key={h} style={{padding:'10px 14px', textAlign: h === 'Valor' || h === 'Ações' ? 'right' : 'left', fontFamily:'var(--f-b)', fontSize:13, color:'#F5F5F7', fontWeight:700, borderBottom:'1px solid #2A2A3A'}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtrado.length === 0 && (
                <tr><td colSpan={7} style={{padding:40, textAlign:'center', color:'var(--t3)'}}>Sem lançamentos</td></tr>
              )}
              {filtrado.map(l => (
                <tr key={l.id} style={{borderBottom:'1px solid var(--border-soft)'}}>
                  <td style={{padding:'10px 14px', color:'var(--t2)', fontFamily:'var(--f-m)', fontSize:12.5}}>{formatBR(l.data)}</td>
                  <td style={{padding:'10px 14px'}}>
                    <span style={{
                      display:'inline-flex', alignItems:'center', gap:4,
                      padding:'2px 9px', borderRadius:999, fontSize:11.5, fontWeight:600,
                      background: l.tipo === 'entrada' ? 'rgba(29,158,117,.15)' : 'rgba(163,45,45,.15)',
                      color: l.tipo === 'entrada' ? '#1D9E75' : '#ff8585',
                    }}>
                      <Icon name={l.tipo === 'entrada' ? 'ArrowDownCircle' : 'ArrowUpCircle'} size={11}/>
                      {l.tipo === 'entrada' ? 'Entrada' : 'Saída'}
                    </span>
                  </td>
                  <td style={{padding:'10px 14px', color:'var(--t1)'}}>
                    {l.descricao}
                    {l.naoConciliado && (
                      <span style={{marginLeft:8, padding:'1px 7px', borderRadius:999, fontSize:10, fontWeight:600, background:'rgba(186,117,23,.15)', color:'#BA7517', border:'1px solid rgba(186,117,23,.35)', verticalAlign:'middle'}}>
                        ⚠ não conciliado
                      </span>
                    )}
                  </td>
                  <td style={{padding:'10px 14px', color:'var(--t3)', fontSize:12.5}}>{l.categoria}</td>
                  <td style={{padding:'10px 14px', textAlign:'right', color: l.tipo === 'entrada' ? '#1D9E75' : '#ff8585', fontFamily:'var(--f-m)', fontWeight:600}}>
                    {l.tipo === 'entrada' ? '+' : '−'} R$ {l.valor.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2})}
                  </td>
                  <td style={{padding:'10px 14px', color:'var(--t3)', fontSize:11.5}}>
                    {l.origem === 'manual'  ? '✋ lançamento manual'
                     : l.origem === 'mrr'   ? '🔁 recorrência'
                     : l.origem === 'banco' ? '🏦 extrato bancário'
                                            : '📋 despesa fixa'}
                  </td>
                  <td style={{padding:'10px 14px', textAlign:'right'}}>
                    {l.editable
                      ? <button onClick={()=>setEditando(l.raw)} title="Editar" style={{background:'transparent', border:'none', cursor:'pointer', color:'var(--blue)', padding:4}}><Icon name="Pencil" size={14}/></button>
                      : l.origem === 'banco'
                        ? <span style={{fontSize:11, color:'#BA7517'}} title="Vincule no modal de conciliação">vincular</span>
                        : <span style={{fontSize:11, color:'var(--t3)'}}>auto</span>}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {editando && <CaixaLancamentoModal lancamento={editando} onClose={()=>setEditando(null)}/>}
      {importando && <ImportarExtratoModal onClose={()=>setImportando(false)}/>}
      {conciliandoAberto && <ConciliacaoModal onClose={()=>setConciliandoAberto(false)}/>}
    </div>
  );
}

function CaixaLancamentoModal({ lancamento, onClose }) {
  const novo = !lancamento.id;
  const [form, setForm] = useState({
    tipo: lancamento.tipo || 'entrada',
    descricao: lancamento.descricao || '',
    categoria: lancamento.categoria || 'Outro',
    valor: lancamento.valor ?? 0,
    data: lancamento.data || hojeISO(),
    observacao: lancamento.observacao || '',
  });
  const set = (k,v) => setForm(f => ({...f, [k]:v}));

  const salvar = async () => {
    if (!form.descricao.trim()) { showToast?.('Informe a descrição','warn'); return; }
    if (Number(form.valor) <= 0) { showToast?.('Valor precisa ser maior que zero','warn'); return; }
    const patch = { ...form, valor: Number(form.valor) };
    if (novo) await addCaixaLancamento(patch); else await editCaixaLancamento(lancamento.id, patch);
    showToast?.(novo ? 'Lançamento adicionado' : 'Lançamento atualizado', 'success');
    onClose();
  };
  const remover = async () => {
    if (!confirm('Remover este lançamento?')) return;
    await deleteCaixaLancamento(lancamento.id);
    showToast?.('Lançamento removido', 'success');
    onClose();
  };

  const inp = { width:'100%', padding:'10px 12px', background:'var(--bg-3)', border:'1px solid var(--border)', borderRadius:8, color:'var(--t1)', fontSize:13.5, outline:'none', fontFamily:'var(--f-b)' };

  return (
    <div onClick={onClose} style={{position:'fixed', inset:0, background:'rgba(0,0,0,.7)', backdropFilter:'blur(4px)', display:'grid', placeItems:'center', zIndex:9998, padding:20}}>
      <div onClick={e=>e.stopPropagation()} style={{width:'min(540px, 95vw)', maxHeight:'90vh', background:'var(--bg)', border:'1px solid var(--border)', borderRadius:14, display:'flex', flexDirection:'column', overflow:'hidden'}}>
        {/* Header */}
        <div style={{padding:'18px 22px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', gap:12}}>
          <div style={{width:38, height:38, borderRadius:9, background:'rgba(30,144,255,.12)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0}}>
            <Icon name="Wallet" size={17} style={{color:'var(--blue)'}}/>
          </div>
          <div style={{flex:1, minWidth:0}}>
            <h3 style={{margin:0, fontSize:17, color:'var(--t1)', fontFamily:'var(--f-d)', fontWeight:600}}>{novo ? 'Novo lançamento' : 'Editar lançamento'}</h3>
            <div style={{fontSize:12, color:'var(--t3)', marginTop:2}}>Entrada ou saída avulsa do caixa</div>
          </div>
          <button onClick={onClose} style={{width:32, height:32, borderRadius:8, border:'none', background:'transparent', color:'var(--t3)', cursor:'pointer', fontSize:18}}>×</button>
        </div>

        {/* Body */}
        <div style={{flex:1, overflowY:'auto', padding:'18px 22px'}}>
          <div style={{marginBottom:18}}>
            <SecaoLabel icon="Repeat">Tipo de movimentação</SecaoLabel>
            <div style={{display:'flex', gap:8}}>
              {[
                { v:'entrada', label:'Entrada', cor:'#1D9E75', icon:'ArrowDownCircle' },
                { v:'saida',   label:'Saída',   cor:'#A32D2D', icon:'ArrowUpCircle'   },
              ].map(o => (
                <button key={o.v} onClick={()=>set('tipo', o.v)} style={{
                  flex:1, padding:'10px', borderRadius:8,
                  background: form.tipo === o.v ? o.cor+'22' : 'var(--bg-3)',
                  color: form.tipo === o.v ? o.cor : 'var(--t2)',
                  border: form.tipo === o.v ? `1px solid ${o.cor}55` : '1px solid var(--border)',
                  fontSize:13, fontWeight:500, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:6,
                }}>
                  <Icon name={o.icon} size={13}/>{o.label}
                </button>
              ))}
            </div>
          </div>

          <div style={{marginBottom:18}}>
            <SecaoLabel icon="Pencil">Descrição</SecaoLabel>
            <input style={inp} value={form.descricao} onChange={e=>set('descricao', e.target.value)} placeholder="Ex: Venda avulsa, reembolso, ajuste de saldo..." autoFocus/>
          </div>

          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:14, marginBottom:18}}>
            <div>
              <SecaoLabel icon="Tag">Categoria</SecaoLabel>
              <input style={inp} value={form.categoria} onChange={e=>set('categoria', e.target.value)} placeholder="Ex: Venda extra"/>
            </div>
            <div>
              <SecaoLabel icon="DollarSign">Valor (R$)</SecaoLabel>
              <input style={inp} type="number" min="0.01" step="0.01" value={form.valor} onChange={e=>set('valor', e.target.value)}/>
            </div>
            <div>
              <SecaoLabel icon="Calendar">Data</SecaoLabel>
              <input style={inp} type="date" value={form.data} onChange={e=>set('data', e.target.value)}/>
            </div>
          </div>

          <div>
            <SecaoLabel icon="MessageCircle">Observação (opcional)</SecaoLabel>
            <textarea style={{...inp, resize:'vertical', fontFamily:'inherit', minHeight:62}} value={form.observacao} onChange={e=>set('observacao', e.target.value)} rows={2} placeholder="Detalhes que ajudem a entender o lançamento depois"/>
          </div>
        </div>

        {/* Footer */}
        <div style={{padding:'12px 22px', borderTop:'1px solid var(--border)', display:'flex', justifyContent:'space-between', gap:10}}>
          {!novo
            ? <button onClick={remover} style={{padding:'8px 14px', borderRadius:7, border:'none', background:'transparent', color:'#E5544D', fontSize:12.5, fontWeight:600, cursor:'pointer', display:'inline-flex', alignItems:'center', gap:5}}><Icon name="Trash2" size={12}/>Remover</button>
            : <span/>}
          <div style={{display:'flex', gap:10}}>
            <button onClick={onClose} style={{padding:'8px 16px', borderRadius:7, border:'1px solid var(--border)', background:'transparent', color:'var(--t2)', fontSize:13, fontWeight:500, cursor:'pointer'}}>Cancelar</button>
            <button onClick={salvar} style={{padding:'8px 18px', borderRadius:7, border:'none', background:'var(--blue)', color:'#fff', fontSize:13, fontWeight:600, cursor:'pointer', display:'inline-flex', alignItems:'center', gap:6}}>
              <Icon name="Check" size={13}/>{novo ? 'Adicionar' : 'Salvar'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// CONCILIAÇÃO INTELIGENTE — modal estilo black brava
// Lista lançamentos não conciliados com sugestões + ações manuais
// ─────────────────────────────────────────────────────────────────
function ConciliacaoModal({ onClose }) {
  const pendentes = useConciliacoesPendentes();
  const recorrencia = useRecorrencia();
  const despesas = useDespesas();
  const [confirmandoId, setConfirmandoId] = React.useState(null);
  const [escolhendoOutro, setEscolhendoOutro] = React.useState(null); // extrato_id
  // Novos filtros (Sprint A.8)
  const [filtroAba, setFiltroAba] = React.useState('sugestoes'); // sugestoes | entradas | saidas | todos
  const [busca, setBusca] = React.useState('');
  const [bulkMostrar, setBulkMostrar] = React.useState(false);
  const [bulkValorMax, setBulkValorMax] = React.useState(50);
  const [pagina, setPagina] = React.useState(1);
  const POR_PAGINA = 30;

  const handleConfirmarSugestao = async (sug) => {
    setConfirmandoId(sug.id);
    const res = await confirmarSugestaoConciliacao(sug.id);
    setConfirmandoId(null);
    if (res?.ok || res?.payment_id) {
      const cliente = recorrencia.find(r => r.__id === sug.cliente_id);
      showToast?.(`✓ Conciliado com ${cliente?.cliente || 'cliente'}`, 'success');
    } else {
      showToast?.(`Erro: ${res?.erro || 'falhou'}`, 'error');
    }
  };

  const handleVincularManual = async (extratoId, tipo, clienteId, despesaId) => {
    const res = await vincularManualConciliar(extratoId, tipo, clienteId, despesaId);
    setEscolhendoOutro(null);
    if (res?.ok || res?.payment_id || res?.caixa_id) {
      showToast?.('✓ Vinculado + alias salvo pra próxima vez', 'success');
    } else {
      showToast?.(`Erro: ${res?.erro || 'falhou'}`, 'error');
    }
  };

  const handleIgnorar = async (extratoId) => {
    if (!confirm('Marcar como ignorado? Não vai mais aparecer aqui.')) return;
    await ignorarLancamentoExtrato(extratoId);
    showToast?.('Lançamento ignorado', 'success');
  };

  const handleBulkIgnorar = async () => {
    const alvos = pendentes.filter(p => Math.abs(Number(p.extrato.valor)) <= Number(bulkValorMax));
    if (alvos.length === 0) { showToast?.('Nenhum lançamento abaixo desse valor', 'warn'); return; }
    if (!confirm(`Ignorar ${alvos.length} lançamento${alvos.length===1?'':'s'} abaixo de R$ ${bulkValorMax}? Esses não vão mais aparecer aqui.`)) return;
    const cli = getSupa();
    const ids = alvos.map(a => a.extrato.id);
    await cli.from('fin_extrato_bancario').update({ ignorado: true }).in('id', ids);
    setBulkMostrar(false);
    showToast?.(`${alvos.length} lançamentos ignorados em lote`, 'success');
  };

  // Computa contadores por aba + aplica filtros
  const stats = React.useMemo(() => {
    const entradas = pendentes.filter(p => Number(p.extrato.valor) > 0);
    const saidas = pendentes.filter(p => Number(p.extrato.valor) < 0);
    const comSugestao = pendentes.filter(p => p.sugestoes.length > 0);
    return { total: pendentes.length, entradas: entradas.length, saidas: saidas.length, sugestoes: comSugestao.length };
  }, [pendentes]);

  const filtrados = React.useMemo(() => {
    let arr = [...pendentes];
    if (filtroAba === 'sugestoes')      arr = arr.filter(p => p.sugestoes.length > 0);
    else if (filtroAba === 'entradas')  arr = arr.filter(p => Number(p.extrato.valor) > 0);
    else if (filtroAba === 'saidas')    arr = arr.filter(p => Number(p.extrato.valor) < 0);
    if (busca.trim()) {
      const q = busca.toLowerCase();
      arr = arr.filter(p => p.extrato.descricao?.toLowerCase().includes(q));
    }
    // Ordena: com sugestão de maior score primeiro, depois valor desc
    arr.sort((a, b) => {
      const aScore = a.sugestoes[0]?.score || 0;
      const bScore = b.sugestoes[0]?.score || 0;
      if (aScore !== bScore) return bScore - aScore;
      return Math.abs(Number(b.extrato.valor)) - Math.abs(Number(a.extrato.valor));
    });
    return arr;
  }, [pendentes, filtroAba, busca]);

  // Reset página quando filtro muda
  React.useEffect(() => { setPagina(1); }, [filtroAba, busca]);

  const paginados = filtrados.slice(0, pagina * POR_PAGINA);
  const temMais = filtrados.length > paginados.length;

  return (
    <div onClick={(e)=>{if(e.target===e.currentTarget) onClose();}} style={{
      position:'fixed', inset:0, background:'rgba(0,0,0,.7)', backdropFilter:'blur(4px)',
      zIndex:9999, display:'flex', alignItems:'center', justifyContent:'center', padding:20,
    }}>
      <div style={{width:'min(920px, 97vw)', maxHeight:'92vh', background:'var(--bg)', border:'1px solid var(--border)', borderRadius:14, display:'flex', flexDirection:'column', overflow:'hidden'}}>
        {/* Header */}
        <div style={{padding:'18px 22px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', gap:12}}>
          <div style={{width:38, height:38, borderRadius:9, background:'rgba(30,144,255,.12)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0}}>
            <Icon name="Link" size={17} style={{color:'var(--blue)'}}/>
          </div>
          <div style={{flex:1, minWidth:0}}>
            <h3 style={{margin:0, fontSize:17, color:'var(--t1)', fontFamily:'var(--f-d)', fontWeight:600}}>Conciliação inteligente</h3>
            <div style={{fontSize:12, color:'var(--t3)', marginTop:2}}>{stats.total} pendentes · {stats.sugestoes} com sugestão</div>
          </div>
          <button onClick={onClose} style={{width:32, height:32, borderRadius:8, border:'none', background:'transparent', color:'var(--t3)', cursor:'pointer', fontSize:18}}>×</button>
        </div>

        {/* Filtros / abas */}
        {stats.total > 0 && (
          <div style={{padding:'12px 22px', borderBottom:'1px solid var(--border-soft)', background:'var(--bg-2)'}}>
            <div style={{display:'flex', gap:6, marginBottom:10, flexWrap:'wrap'}}>
              {[
                { id:'sugestoes', label:'Com sugestão', count:stats.sugestoes, cor:'var(--blue)' },
                { id:'entradas',  label:'Entradas',     count:stats.entradas,  cor:'#1D9E75' },
                { id:'saidas',    label:'Saídas',       count:stats.saidas,    cor:'#A32D2D' },
                { id:'todos',     label:'Tudo',         count:stats.total,     cor:'var(--t2)' },
              ].map(t => {
                const ativo = filtroAba === t.id;
                return (
                  <button key={t.id} onClick={()=>setFiltroAba(t.id)} style={{
                    padding:'6px 12px', borderRadius:7, fontSize:12.5, fontWeight:500, cursor:'pointer',
                    background: ativo ? t.cor + '22' : 'transparent',
                    color: ativo ? t.cor : 'var(--t3)',
                    border: `1px solid ${ativo ? t.cor + '55' : 'var(--border-soft)'}`,
                    display:'inline-flex', alignItems:'center', gap:5,
                  }}>
                    {t.label}
                    <span style={{padding:'1px 7px', borderRadius:999, fontSize:10.5, fontWeight:700, background: ativo ? t.cor : 'var(--bg-3)', color: ativo ? '#fff' : 'var(--t3)'}}>{t.count}</span>
                  </button>
                );
              })}
            </div>

            <div style={{display:'flex', gap:8, alignItems:'center'}}>
              <div style={{flex:1, display:'flex', alignItems:'center', gap:8, padding:'7px 12px', background:'var(--bg-3)', border:'1px solid var(--border)', borderRadius:7}}>
                <Icon name="Search" size={13} style={{color:'var(--t3)'}}/>
                <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="Buscar por descrição..."
                  style={{flex:1, background:'none', border:'none', outline:'none', fontSize:13, color:'var(--t1)'}}/>
                {busca && <button onClick={()=>setBusca('')} style={{background:'none', border:'none', color:'var(--t3)', cursor:'pointer', padding:0}}><Icon name="X" size={11}/></button>}
              </div>
              <button onClick={()=>setBulkMostrar(v=>!v)} style={{
                padding:'7px 12px', borderRadius:7, border:`1px solid ${bulkMostrar ? 'var(--blue)' : 'var(--border-soft)'}`,
                background: bulkMostrar ? 'rgba(30,144,255,.12)' : 'transparent',
                color: bulkMostrar ? 'var(--blue)' : 'var(--t2)',
                fontSize:12.5, fontWeight:500, cursor:'pointer', display:'inline-flex', alignItems:'center', gap:5, whiteSpace:'nowrap',
              }}>
                <Icon name="Filter" size={12}/>Lote
              </button>
            </div>

            {bulkMostrar && (
              <div style={{marginTop:10, padding:'10px 12px', background:'var(--bg-3)', border:'1px solid var(--blue)', borderRadius:8, display:'flex', gap:10, alignItems:'center', flexWrap:'wrap'}}>
                <span style={{fontSize:12, color:'var(--t2)'}}>Ignorar todos abaixo de R$</span>
                <input type="number" value={bulkValorMax} onChange={e=>setBulkValorMax(e.target.value)}
                  style={{width:70, padding:'5px 8px', borderRadius:5, border:'1px solid var(--border)', background:'var(--bg)', color:'var(--t1)', fontSize:12, outline:'none'}}/>
                <span style={{fontSize:11.5, color:'var(--t3)'}}>
                  ({pendentes.filter(p => Math.abs(Number(p.extrato.valor)) <= Number(bulkValorMax)).length} lançamentos serão escondidos)
                </span>
                <button onClick={handleBulkIgnorar} style={{
                  padding:'5px 12px', borderRadius:5, border:'none', background:'var(--blue)', color:'#fff',
                  fontSize:12, fontWeight:600, cursor:'pointer',
                }}>Aplicar</button>
              </div>
            )}
          </div>
        )}

        {/* Body */}
        <div style={{flex:1, overflowY:'auto', padding:'14px 22px'}}>
          {stats.total === 0 && (
            <div style={{padding:40, textAlign:'center', color:'var(--t3)'}}>
              <Icon name="CheckCircle2" size={36} style={{color:'#1D9E75', opacity:.6, marginBottom:10}}/>
              <div style={{fontSize:14, color:'var(--t2)'}}>Tudo conciliado! 🎉</div>
              <div style={{fontSize:12, color:'var(--t3)', marginTop:4}}>Quando chegar movimentação nova do banco, aparece aqui se não conseguirmos vincular automaticamente.</div>
            </div>
          )}
          {stats.total > 0 && filtrados.length === 0 && (
            <div style={{padding:30, textAlign:'center', color:'var(--t3)', fontSize:13}}>
              Nenhum lançamento nesse filtro. <button onClick={()=>{setFiltroAba('todos'); setBusca('');}} style={{background:'none', border:'none', color:'var(--blue)', cursor:'pointer', textDecoration:'underline'}}>Ver tudo</button>
            </div>
          )}
          {paginados.map(({ extrato, sugestoes }) => {
            const isEntrada = Number(extrato.valor) > 0;
            const valorAbs = Math.abs(Number(extrato.valor));
            const escolhendoEsse = escolhendoOutro === extrato.id;
            return (
              <div key={extrato.id} style={{marginBottom:14, padding:'14px 16px', background:'var(--bg-3)', border:'1px solid var(--border)', borderRadius:10}}>
                {/* Cabeçalho do lançamento */}
                <div style={{display:'flex', gap:12, alignItems:'flex-start', marginBottom:10}}>
                  <div style={{
                    width:34, height:34, borderRadius:8, flexShrink:0,
                    background: isEntrada ? 'rgba(29,158,117,.15)' : 'rgba(163,45,45,.15)',
                    color: isEntrada ? '#1D9E75' : '#ff8585',
                    display:'flex', alignItems:'center', justifyContent:'center',
                  }}>
                    <Icon name={isEntrada ? 'ArrowDownCircle' : 'ArrowUpCircle'} size={16}/>
                  </div>
                  <div style={{flex:1, minWidth:0}}>
                    <div style={{fontSize:13.5, color:'var(--t1)', fontWeight:500, marginBottom:2, overflow:'hidden', textOverflow:'ellipsis'}}>
                      {extrato.descricao}
                    </div>
                    <div style={{fontSize:11.5, color:'var(--t3)', display:'flex', gap:10}}>
                      <span>{formatBR(extrato.data)}</span>
                      <span>·</span>
                      <span style={{color: isEntrada ? '#1D9E75' : '#ff8585', fontFamily:'var(--f-m)', fontWeight:600}}>
                        {isEntrada ? '+' : '−'} R$ {valorAbs.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2})}
                      </span>
                      {extrato.banco && <><span>·</span><span>{extrato.banco}</span></>}
                    </div>
                  </div>
                </div>

                {/* Sugestões */}
                {sugestoes.length > 0 && !escolhendoEsse && (
                  <div style={{marginTop:10, paddingTop:10, borderTop:'1px dashed var(--border-soft)'}}>
                    <SecaoLabel icon="Sparkles">Sugestões do sistema</SecaoLabel>
                    {sugestoes.slice(0, 3).map(sug => {
                      const cliente = sug.cliente_id ? recorrencia.find(r => r.__id === sug.cliente_id) : null;
                      const despesa = sug.despesa_id ? despesas.find(d => d.id === sug.despesa_id) : null;
                      const nome = cliente?.cliente || despesa?.descricao || 'Item';
                      const scoreColor = sug.score >= 80 ? '#1D9E75' : sug.score >= 65 ? 'var(--blue)' : '#BA7517';
                      return (
                        <div key={sug.id} style={{
                          display:'flex', alignItems:'center', gap:10, padding:'8px 10px',
                          background:'var(--bg)', border:'1px solid var(--border-soft)', borderRadius:7, marginBottom:6,
                        }}>
                          <div style={{flex:1, minWidth:0}}>
                            <div style={{fontSize:13, color:'var(--t1)', fontWeight:500}}>{nome}</div>
                            <div style={{fontSize:11, color:'var(--t3)', marginTop:1}}>{sug.motivo}</div>
                          </div>
                          <span style={{
                            padding:'2px 8px', borderRadius:999, fontSize:11, fontWeight:600,
                            background: scoreColor + '22', color: scoreColor, border:`1px solid ${scoreColor}44`,
                          }}>{sug.score}%</span>
                          <button onClick={()=>handleConfirmarSugestao(sug)} disabled={confirmandoId === sug.id} style={{
                            padding:'5px 12px', borderRadius:6, border:'none', background:'var(--blue)', color:'#fff',
                            fontSize:11.5, fontWeight:600, cursor: confirmandoId === sug.id ? 'wait' : 'pointer',
                          }}>{confirmandoId === sug.id ? '...' : 'Confirmar'}</button>
                        </div>
                      );
                    })}
                  </div>
                )}

                {/* Ações manuais */}
                {!escolhendoEsse ? (
                  <div style={{marginTop:10, display:'flex', gap:6, flexWrap:'wrap'}}>
                    <button onClick={()=>setEscolhendoOutro(extrato.id)} style={btnAcao('var(--blue)')}>
                      <Icon name="Link" size={11}/>Vincular manualmente
                    </button>
                    {isEntrada ? (
                      <>
                        <button onClick={()=>handleVincularManual(extrato.id, 'aporte_socio')} style={btnAcao('#7B3FE4')}>
                          <Icon name="UserCircle" size={11}/>Aporte sócio
                        </button>
                        <button onClick={()=>handleVincularManual(extrato.id, 'transferencia_interna')} style={btnAcao('var(--t3)')}>
                          <Icon name="Repeat" size={11}/>Transferência interna
                        </button>
                      </>
                    ) : (
                      <button onClick={()=>handleVincularManual(extrato.id, 'despesa_avulsa')} style={btnAcao('#BA7517')}>
                        <Icon name="CreditCard" size={11}/>Despesa avulsa
                      </button>
                    )}
                    <button onClick={()=>handleIgnorar(extrato.id)} style={btnAcao('var(--t3)')}>
                      <Icon name="X" size={11}/>Ignorar
                    </button>
                  </div>
                ) : (
                  <EscolherCliente
                    isEntrada={isEntrada}
                    recorrencia={recorrencia}
                    despesas={despesas}
                    onCancelar={()=>setEscolhendoOutro(null)}
                    onEscolher={(tipo, clienteId, despesaId)=>handleVincularManual(extrato.id, tipo, clienteId, despesaId)}
                  />
                )}
              </div>
            );
          })}
          {temMais && (
            <div style={{textAlign:'center', padding:'10px 0 20px'}}>
              <button onClick={()=>setPagina(p => p + 1)} style={{
                padding:'9px 22px', borderRadius:8, border:'1px solid var(--border)',
                background:'var(--bg-3)', color:'var(--t1)', fontSize:13, fontWeight:500, cursor:'pointer',
                display:'inline-flex', alignItems:'center', gap:6,
              }}>
                <Icon name="ChevronDown" size={13}/>
                Carregar mais ({filtrados.length - paginados.length} restantes)
              </button>
            </div>
          )}
        </div>

        {/* Footer */}
        <div style={{padding:'12px 22px', borderTop:'1px solid var(--border)', display:'flex', justifyContent:'space-between', alignItems:'center', gap:10, flexWrap:'wrap'}}>
          <div style={{fontSize:11.5, color:'var(--t3)'}}>
            💡 Toda confirmação cria alias pra próxima vez ser automática
            {stats.total > 0 && <> · Exibindo <strong style={{color:'var(--t2)'}}>{paginados.length}</strong> de <strong style={{color:'var(--t2)'}}>{filtrados.length}</strong></>}
          </div>
          <button onClick={onClose} style={{padding:'8px 18px', borderRadius:7, border:'1px solid var(--border)', background:'transparent', color:'var(--t2)', fontSize:13, fontWeight:500, cursor:'pointer'}}>Fechar</button>
        </div>
      </div>
    </div>
  );
}

function btnAcao(cor) {
  return {
    padding:'5px 10px', borderRadius:6, border:`1px solid ${cor}55`,
    background:'transparent', color: cor, fontSize:11.5, fontWeight:500,
    cursor:'pointer', display:'inline-flex', alignItems:'center', gap:5,
  };
}

// Sub-componente: escolher cliente/despesa pra vincular
function EscolherCliente({ isEntrada, recorrencia, despesas, onCancelar, onEscolher }) {
  const [busca, setBusca] = React.useState('');
  const opcoes = isEntrada
    ? recorrencia.filter(r => !busca || r.cliente.toLowerCase().includes(busca.toLowerCase()))
    : despesas.filter(d => !busca || d.descricao.toLowerCase().includes(busca.toLowerCase()));
  return (
    <div style={{marginTop:10, padding:10, background:'var(--bg)', border:'1px solid var(--blue)', borderRadius:8}}>
      <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder={`Buscar ${isEntrada?'cliente':'despesa'}...`} autoFocus
        style={{width:'100%', padding:'7px 10px', borderRadius:6, background:'var(--bg-3)', border:'1px solid var(--border)', color:'var(--t1)', fontSize:12.5, outline:'none', marginBottom:8}}/>
      <div style={{maxHeight:180, overflowY:'auto'}}>
        {opcoes.slice(0, 20).map(o => (
          <div key={o.__id || o.id} onClick={()=>onEscolher(isEntrada?'cliente':'despesa', isEntrada?o.__id:null, !isEntrada?o.id:null)}
            style={{padding:'6px 10px', borderRadius:5, cursor:'pointer', fontSize:12.5, color:'var(--t1)', display:'flex', justifyContent:'space-between'}}
            onMouseEnter={e=>e.currentTarget.style.background='var(--bg-3)'}
            onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
            <span>{isEntrada ? o.cliente : o.descricao}</span>
            <span style={{color:'var(--t3)', fontFamily:'var(--f-m)'}}>R$ {(isEntrada ? o.mensal : o.valor || 0).toLocaleString('pt-BR')}</span>
          </div>
        ))}
        {opcoes.length === 0 && <div style={{padding:14, textAlign:'center', fontSize:12, color:'var(--t3)'}}>Nenhum encontrado</div>}
      </div>
      <button onClick={onCancelar} style={{marginTop:6, padding:'5px 12px', borderRadius:6, border:'none', background:'transparent', color:'var(--t3)', fontSize:11.5, cursor:'pointer'}}>Cancelar</button>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// CLIENTES CRM — página principal de cadastro/gestão de clientes
// ═══════════════════════════════════════════════════════════════
function ClientesCRM() {
  const { list: clientes, loading } = useClientes();
  const { list: statusConfig } = useStatusConfig();
  const [editando, setEditando] = React.useState(null);     // {} pra novo, cliente obj pra edição
  const [busca, setBusca] = React.useState('');
  const [filtroStatus, setFiltroStatus] = React.useState('todos');
  const [filtroCompleto, setFiltroCompleto] = React.useState('todos'); // todos | completo | incompleto
  const [view, setView] = React.useState('cards'); // cards | tabela

  // Estatísticas dos clientes (projetos + MRR) — buscamos uma vez via SQL
  const recorrencia = useRecorrencia();
  const statsPorCliente = React.useMemo(() => {
    const m = new Map();
    (recorrencia || []).forEach(r => {
      if (!r.cliente_id) return;
      if (!m.has(r.cliente_id)) m.set(r.cliente_id, { projetos:0, mrr:0, impl:0 });
      const s = m.get(r.cliente_id);
      s.projetos += 1;
      s.mrr += Number(r.mensal || 0);
      s.impl += Number(r.impl || 0);
    });
    return m;
  }, [recorrencia]);

  // Mapa rápido status->config
  const cfgByKey = React.useMemo(() => {
    const m = new Map();
    (statusConfig || []).forEach(s => m.set(s.key, s));
    return m;
  }, [statusConfig]);

  const filtrados = React.useMemo(() => {
    let arr = [...clientes];
    if (filtroStatus !== 'todos') arr = arr.filter(c => c.status === filtroStatus);
    if (filtroCompleto === 'incompleto') arr = arr.filter(c => clienteEstaIncompleto(c));
    if (filtroCompleto === 'completo')   arr = arr.filter(c => !clienteEstaIncompleto(c));
    if (busca.trim()) {
      const q = busca.toLowerCase();
      arr = arr.filter(c =>
        (c.nome || '').toLowerCase().includes(q) ||
        (c.nome_fantasia || '').toLowerCase().includes(q) ||
        (c.cnpj_cpf || '').includes(q.replace(/\D/g, '')) ||
        (c.contato_email || '').toLowerCase().includes(q) ||
        (c.contato_telefone || '').includes(q.replace(/\D/g, '')) ||
        (c.nicho || '').toLowerCase().includes(q)
      );
    }
    // Ordena: usa ordem do fin_status_config + alfabético
    arr.sort((a, b) => {
      const ordemA = cfgByKey.get(a.status)?.ordem ?? 99;
      const ordemB = cfgByKey.get(b.status)?.ordem ?? 99;
      if (ordemA !== ordemB) return ordemA - ordemB;
      return (a.nome || '').localeCompare(b.nome || '');
    });
    return arr;
  }, [clientes, busca, filtroStatus, filtroCompleto, cfgByKey]);

  const stats = React.useMemo(() => ({
    total: clientes.length,
    ativos: clientes.filter(c => c.status === 'ativo').length,
    em_implantacao: clientes.filter(c => c.status === 'em_implantacao').length,
    em_negociacao: clientes.filter(c => c.status === 'em_negociacao' || c.status === 'proposta_enviada').length,
    leads: clientes.filter(c => c.status === 'lead').length,
    inadimplentes: clientes.filter(c => c.status === 'inadimplente').length,
    incompletos: clientes.filter(clienteEstaIncompleto).length,
  }), [clientes]);

  // Status disponíveis pros filtros (do banco) + 'todos'
  const statusFiltros = React.useMemo(() => {
    return ['todos', ...((statusConfig || []).map(s => s.key))];
  }, [statusConfig]);

  return (
    <div className="page">
      <div className="page-head">
        <div>
          <div className="page-head__title">Clientes</div>
          <div className="page-head__sub">{stats.total} cadastrados · {stats.ativos} ativos · {stats.em_implantacao} em implantação · {stats.em_negociacao} em negociação{stats.inadimplentes > 0 && <> · <span style={{color:'#ff8585'}}>{stats.inadimplentes} inadimplentes</span></>}{stats.incompletos > 0 && <> · {stats.incompletos} incompletos</>}</div>
        </div>
        <div className="page-head__actions">
          <button onClick={()=>setEditando({})} className="btn btn-primary">
            <Icon name="Plus" size={14}/>Novo cliente
          </button>
        </div>
      </div>

      {/* KPIs */}
      <div className="kpi-grid" style={{gridTemplateColumns:'repeat(4,1fr)', marginBottom:18}}>
        {[
          { label:'Total cadastrados', val: stats.total, icon:'UsersRound', cor:'var(--blue)' },
          { label:'Ativos', val: stats.ativos, icon:'CheckCircle2', cor:'#1D9E75' },
          { label:'Em implantação', val: stats.em_implantacao, icon:'Activity', cor:'#7B3FE4' },
          { label: stats.inadimplentes > 0 ? 'Inadimplentes' : 'Em negociação',
            val: stats.inadimplentes > 0 ? stats.inadimplentes : stats.em_negociacao,
            icon: stats.inadimplentes > 0 ? 'AlertCircle' : 'MessageCircle',
            cor: stats.inadimplentes > 0 ? '#A32D2D' : '#BA7517' },
        ].map((k,i) => (
          <div key={i} className="kpi">
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
              <div className="kpi__label">{k.label}</div>
              <div className="kpi__icon" style={{background:k.cor+'22'}}><Icon name={k.icon} size={17} style={{color:k.cor}}/></div>
            </div>
            <div className="kpi__value" style={{fontSize:24, color:'var(--t1)'}}>{k.val}</div>
          </div>
        ))}
      </div>

      {/* Filtros */}
      <div className="card" style={{padding:'14px 16px', marginBottom:14}}>
        <div style={{display:'flex', gap:10, alignItems:'center', flexWrap:'wrap'}}>
          <div style={{display:'flex', alignItems:'center', gap:8, padding:'7px 12px', background:'var(--bg-3)', border:'1px solid var(--border)', borderRadius:8, flex:1, minWidth:200}}>
            <Icon name="Search" size={13} style={{color:'var(--t3)'}}/>
            <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="Buscar por nome, CNPJ, email, telefone, nicho..." style={{flex:1, background:'none', border:'none', outline:'none', fontSize:13, color:'var(--t1)'}}/>
          </div>
          {statusFiltros.map(key => {
            const cfg = key === 'todos' ? null : cfgByKey.get(key);
            const ativo = filtroStatus === key;
            const cor = ativo ? (cfg?.cor || 'var(--blue)') : 'var(--t3)';
            return (
              <button key={key} onClick={()=>setFiltroStatus(key)} style={{
                padding:'6px 12px', borderRadius:7, fontSize:12, fontWeight:500, cursor:'pointer',
                background: ativo ? cor+'22' : 'transparent',
                color: cor,
                border:`1px solid ${ativo ? cor : 'transparent'}`,
                display:'inline-flex', alignItems:'center', gap:5,
              }}>
                {cfg?.icone && ativo && <Icon name={cfg.icone} size={11}/>}
                {key === 'todos' ? 'Todos status' : (cfg?.label || key)}
              </button>
            );
          })}
          <button onClick={()=>setFiltroCompleto(v => v === 'incompleto' ? 'todos' : 'incompleto')} style={{
            padding:'6px 12px', borderRadius:7, fontSize:12, fontWeight:500, cursor:'pointer',
            background: filtroCompleto === 'incompleto' ? 'rgba(163,45,45,.15)' : 'transparent',
            color: filtroCompleto === 'incompleto' ? '#ff8585' : 'var(--t3)',
            border:`1px solid ${filtroCompleto === 'incompleto' ? '#A32D2D55' : 'transparent'}`,
            display:'inline-flex', alignItems:'center', gap:5,
          }}>
            <Icon name="AlertCircle" size={11}/>
            {filtroCompleto === 'incompleto' ? 'Mostrando incompletos' : `Só incompletos (${stats.incompletos})`}
          </button>
        </div>
      </div>

      {/* Lista de clientes */}
      {loading ? (
        <div style={{padding:40, textAlign:'center', color:'var(--t3)'}}>Carregando clientes...</div>
      ) : filtrados.length === 0 ? (
        <div className="card" style={{padding:40, textAlign:'center', color:'var(--t3)'}}>
          <Icon name="UsersRound" size={36} style={{color:'var(--t3)', opacity:.4, marginBottom:10}}/>
          <div style={{fontSize:14, color:'var(--t2)', marginBottom:6}}>
            {busca || filtroStatus !== 'todos' || filtroCompleto !== 'todos'
              ? 'Nenhum cliente encontrado nesses filtros'
              : 'Você ainda não cadastrou nenhum cliente'}
          </div>
          {busca || filtroStatus !== 'todos' || filtroCompleto !== 'todos' ? (
            <button onClick={()=>{setBusca(''); setFiltroStatus('todos'); setFiltroCompleto('todos');}} style={{background:'none', border:'none', color:'var(--blue)', cursor:'pointer', textDecoration:'underline', fontSize:13}}>Limpar filtros</button>
          ) : (
            <button onClick={()=>setEditando({})} className="btn btn-primary" style={{marginTop:8}}>
              <Icon name="Plus" size={13}/>Cadastrar primeiro cliente
            </button>
          )}
        </div>
      ) : (
        <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(320px, 1fr))', gap:12}}>
          {filtrados.map(c => {
            const s = statsPorCliente.get(c.id) || { projetos:0, mrr:0, impl:0 };
            const incompleto = clienteEstaIncompleto(c);
            const cfg = getStatusByKey(statusConfig, c.status);
            const statusCor = cfg.cor;
            const iniciais = (c.nome || '?').split(' ').slice(0,2).map(n => n[0]).join('').toUpperCase();
            return (
              <div key={c.id} onClick={()=>setEditando(c)} style={{
                padding:'16px', background:'var(--bg-2)', border:'1px solid var(--border)', borderRadius:11,
                cursor:'pointer', transition:'all .15s',
                borderTop: `3px solid ${c.cor || statusCor}`,
              }}
                onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--blue)'; e.currentTarget.style.transform='translateY(-2px)';}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)'; e.currentTarget.style.transform='translateY(0)';}}>
                <div style={{display:'flex', gap:11, alignItems:'flex-start', marginBottom:10}}>
                  <div style={{
                    width:42, height:42, borderRadius:'50%', flexShrink:0,
                    background: c.foto_url ? `url(${c.foto_url}) center/cover` : (c.cor || 'var(--blue)'),
                    color:'#fff', display:'flex', alignItems:'center', justifyContent:'center',
                    fontFamily:'var(--f-d)', fontWeight:700, fontSize:14,
                  }}>{!c.foto_url && iniciais}</div>
                  <div style={{flex:1, minWidth:0}}>
                    <div style={{fontSize:14, color:'var(--t1)', fontWeight:600, marginBottom:2, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', display:'flex', alignItems:'center', gap:5}}>
                      {c.nome}
                      {c.status_lock && <Icon name="Lock" size={11} style={{color:'#BA7517', flexShrink:0}}/>}
                    </div>
                    <div style={{fontSize:11.5, color:'var(--t3)', display:'flex', gap:8, alignItems:'center', flexWrap:'wrap'}}>
                      <span style={{padding:'2px 7px', borderRadius:999, background:statusCor+'22', color:statusCor, fontWeight:600, fontSize:10.5, letterSpacing:.3, display:'inline-flex', alignItems:'center', gap:4}}>
                        <Icon name={cfg.icone} size={10}/>
                        {cfg.label}
                      </span>
                      {c.tipo_pessoa && <span>{c.tipo_pessoa}</span>}
                      {c.nicho && <><span>·</span><span>{c.nicho}</span></>}
                    </div>
                  </div>
                  {incompleto && (
                    <span title="Cadastro incompleto" style={{padding:'2px 7px', borderRadius:999, background:'rgba(163,45,45,.15)', color:'#ff8585', fontSize:10, fontWeight:700, border:'1px solid rgba(163,45,45,.35)'}}>!</span>
                  )}
                </div>

                {/* Mini-stats */}
                <div style={{display:'flex', gap:14, padding:'10px 0', borderTop:'1px solid var(--border-soft)', fontSize:12}}>
                  <div>
                    <div style={{color:'var(--t3)', fontSize:10.5, textTransform:'uppercase', letterSpacing:.4, marginBottom:1}}>Projetos</div>
                    <div style={{color:'var(--t1)', fontWeight:600, fontFamily:'var(--f-m)'}}>{s.projetos}</div>
                  </div>
                  <div>
                    <div style={{color:'var(--t3)', fontSize:10.5, textTransform:'uppercase', letterSpacing:.4, marginBottom:1}}>MRR</div>
                    <div style={{color: s.mrr > 0 ? '#1D9E75' : 'var(--t3)', fontWeight:600, fontFamily:'var(--f-m)'}}>R$ {s.mrr.toLocaleString('pt-BR')}</div>
                  </div>
                  <div>
                    <div style={{color:'var(--t3)', fontSize:10.5, textTransform:'uppercase', letterSpacing:.4, marginBottom:1}}>Implantação</div>
                    <div style={{color:'var(--t2)', fontWeight:600, fontFamily:'var(--f-m)'}}>R$ {s.impl.toLocaleString('pt-BR')}</div>
                  </div>
                </div>

                {/* Contato */}
                {(c.contato_nome || c.contato_email || c.contato_telefone) && (
                  <div style={{paddingTop:8, borderTop:'1px solid var(--border-soft)', fontSize:11.5, color:'var(--t3)'}}>
                    {c.contato_nome && <div>👤 {c.contato_nome}{c.contato_cargo ? ` · ${c.contato_cargo}` : ''}</div>}
                    {c.contato_email && <div style={{marginTop:2}}>✉ {c.contato_email}</div>}
                    {c.contato_telefone && <div style={{marginTop:2}}>📞 {c.contato_telefone}</div>}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {editando && <Cliente360Modal cliente={editando} onClose={()=>setEditando(null)}/>}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────
// CLIENTE CADASTRO MODAL — estilo black brava (Sprint C.1.4)
// 4 seções: Identificação, Contato, Endereço, Comercial
// ─────────────────────────────────────────────────────────────────
function ClienteCadastroModal({ cliente, onClose, embedded = false }) {
  const novo = !cliente?.id;
  const { list: statusConfig } = useStatusConfig();
  const [form, setForm] = React.useState({
    nome: cliente?.nome || '',
    nome_fantasia: cliente?.nome_fantasia || '',
    tipo_pessoa: cliente?.tipo_pessoa || 'PJ',
    cnpj_cpf: cliente?.cnpj_cpf || '',
    inscricao_estadual: cliente?.inscricao_estadual || '',
    inscricao_municipal: cliente?.inscricao_municipal || '',
    contato_nome: cliente?.contato_nome || '',
    contato_cargo: cliente?.contato_cargo || '',
    contato_email: cliente?.contato_email || '',
    contato_telefone: cliente?.contato_telefone || '',
    site: cliente?.site || '',
    endereco_cep: cliente?.endereco_cep || '',
    endereco_logradouro: cliente?.endereco_logradouro || '',
    endereco_numero: cliente?.endereco_numero || '',
    endereco_complemento: cliente?.endereco_complemento || '',
    endereco_bairro: cliente?.endereco_bairro || '',
    endereco_cidade: cliente?.endereco_cidade || '',
    endereco_estado: cliente?.endereco_estado || '',
    nicho: cliente?.nicho || '',
    porte: cliente?.porte || '',
    origem: cliente?.origem || '',
    data_aquisicao: cliente?.data_aquisicao || '',
    status: cliente?.status || 'lead',
    status_lock: cliente?.status_lock || false,
    tags: cliente?.tags || [],
    nota_interna: cliente?.nota_interna || '',
    cor: cliente?.cor || '#1E90FF',
  });
  const [erro, setErro] = React.useState('');
  const [salvando, setSalvando] = React.useState(false);
  const [buscandoCep, setBuscandoCep] = React.useState(false);
  const [novaTag, setNovaTag] = React.useState('');

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  // Auto-busca CEP quando digita os 8 dígitos
  React.useEffect(() => {
    const cep = String(form.endereco_cep || '').replace(/\D/g, '');
    if (cep.length === 8) {
      setBuscandoCep(true);
      buscarCep(cep).then(res => {
        setBuscandoCep(false);
        if (res) {
          setForm(f => ({
            ...f,
            endereco_logradouro: res.logradouro || f.endereco_logradouro,
            endereco_bairro:     res.bairro     || f.endereco_bairro,
            endereco_cidade:     res.cidade     || f.endereco_cidade,
            endereco_estado:     res.estado     || f.endereco_estado,
          }));
        }
      });
    }
  }, [form.endereco_cep]);

  const salvar = async () => {
    setErro(''); setSalvando(true);
    const res = novo ? await addCliente(form) : await editCliente(cliente.id, form);
    setSalvando(false);
    if (!res.ok) { setErro(res.erro); return; }
    showToast?.(novo ? 'Cliente cadastrado' : 'Cliente atualizado', 'success');
    onClose();
  };

  const remover = async () => {
    if (!confirm(`Remover "${cliente.nome}"? Os projetos vinculados ficarão sem cliente (não são apagados).`)) return;
    const res = await deleteCliente(cliente.id);
    if (res.ok) { showToast?.('Cliente removido', 'success'); onClose(); }
    else showToast?.(`Erro: ${res.erro}`, 'error');
  };

  const addTag = () => {
    if (!novaTag.trim()) return;
    if ((form.tags || []).includes(novaTag.trim())) return;
    set('tags', [...(form.tags || []), novaTag.trim()]);
    setNovaTag('');
  };
  const removeTag = (t) => set('tags', (form.tags || []).filter(x => x !== t));

  // Formata CNPJ/CPF on the fly pra visual
  const formatarDoc = (v) => {
    const d = String(v || '').replace(/\D/g, '');
    if (form.tipo_pessoa === 'PJ') {
      return d.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{0,2}).*/, '$1.$2.$3/$4-$5').replace(/[-/.]\s*$/, '');
    } else {
      return d.replace(/^(\d{3})(\d{3})(\d{3})(\d{0,2}).*/, '$1.$2.$3-$4').replace(/[-.]\s*$/, '');
    }
  };

  const inp = { width:'100%', padding:'10px 12px', background:'var(--bg-3)', border:'1px solid var(--border)', borderRadius:8, color:'var(--t1)', fontSize:13.5, outline:'none', fontFamily:'var(--f-b)' };

  return (
    <div onClick={(e)=>{if(e.target===e.currentTarget) onClose();}} style={{
      position:'fixed', inset:0, background:'rgba(0,0,0,.7)', backdropFilter:'blur(4px)',
      zIndex: embedded ? 10000 : 9999, display:'flex', alignItems:'center', justifyContent:'center', padding:20,
    }}>
      <div style={{width:'min(720px, 95vw)', maxHeight:'92vh', background:'var(--bg)', border:'1px solid var(--border)', borderRadius:14, display:'flex', flexDirection:'column', overflow:'hidden'}}>
        {/* Header */}
        <div style={{padding:'18px 22px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', gap:12}}>
          <div style={{width:38, height:38, borderRadius:9, background:'rgba(30,144,255,.12)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0}}>
            <Icon name="UserCircle" size={17} style={{color:'var(--blue)'}}/>
          </div>
          <div style={{flex:1, minWidth:0}}>
            <h3 style={{margin:0, fontSize:17, color:'var(--t1)', fontFamily:'var(--f-d)', fontWeight:600}}>{novo ? 'Novo cliente' : 'Editar cliente'}</h3>
            <div style={{fontSize:12, color:'var(--t3)', marginTop:2}}>{novo ? 'Os campos com * são obrigatórios' : cliente?.nome}</div>
          </div>
          <button onClick={onClose} style={{width:32, height:32, borderRadius:8, border:'none', background:'transparent', color:'var(--t3)', cursor:'pointer', fontSize:18}}>×</button>
        </div>

        {/* Body */}
        <div style={{flex:1, overflowY:'auto', padding:'18px 22px'}}>
          {/* SEÇÃO 1: IDENTIFICAÇÃO */}
          <div style={{marginBottom:22}}>
            <SecaoLabel icon="Building2">Identificação</SecaoLabel>

            <div style={{display:'grid', gridTemplateColumns:'2fr 1fr', gap:12, marginBottom:12}}>
              <div>
                <label style={{fontSize:11, color:'var(--t3)', marginBottom:5, display:'block'}}>{form.tipo_pessoa === 'PJ' ? 'Razão social' : 'Nome completo'} *</label>
                <input style={inp} value={form.nome} onChange={e=>set('nome', e.target.value)} placeholder={form.tipo_pessoa === 'PJ' ? 'Ex: EstacionePark Aeroporto LTDA' : 'Ex: João da Silva'} autoFocus/>
              </div>
              <div>
                <label style={{fontSize:11, color:'var(--t3)', marginBottom:5, display:'block'}}>Tipo *</label>
                <div style={{display:'flex', gap:6}}>
                  {['PJ','PF'].map(t => (
                    <button key={t} type="button" onClick={()=>set('tipo_pessoa', t)} style={{
                      flex:1, padding:'10px', borderRadius:8,
                      background: form.tipo_pessoa === t ? 'rgba(30,144,255,.15)' : 'var(--bg-3)',
                      color: form.tipo_pessoa === t ? 'var(--blue)' : 'var(--t2)',
                      border: `1px solid ${form.tipo_pessoa === t ? 'var(--blue)' : 'var(--border)'}`,
                      fontSize:12.5, fontWeight:600, cursor:'pointer',
                    }}>{t}</button>
                  ))}
                </div>
              </div>
            </div>

            <div style={{display:'grid', gridTemplateColumns: form.tipo_pessoa === 'PJ' ? '1fr 1fr' : '1fr', gap:12, marginBottom:12}}>
              <div>
                <label style={{fontSize:11, color:'var(--t3)', marginBottom:5, display:'block'}}>{form.tipo_pessoa === 'PJ' ? 'CNPJ' : 'CPF'} *</label>
                <input style={inp} value={formatarDoc(form.cnpj_cpf)} onChange={e=>set('cnpj_cpf', e.target.value)}
                  placeholder={form.tipo_pessoa === 'PJ' ? '00.000.000/0000-00' : '000.000.000-00'}/>
              </div>
              {form.tipo_pessoa === 'PJ' && (
                <div>
                  <label style={{fontSize:11, color:'var(--t3)', marginBottom:5, display:'block'}}>Nome fantasia</label>
                  <input style={inp} value={form.nome_fantasia} onChange={e=>set('nome_fantasia', e.target.value)} placeholder="Como o cliente é conhecido"/>
                </div>
              )}
            </div>

            {form.tipo_pessoa === 'PJ' && (
              <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12}}>
                <div>
                  <label style={{fontSize:11, color:'var(--t3)', marginBottom:5, display:'block'}}>Inscrição estadual</label>
                  <input style={inp} value={form.inscricao_estadual} onChange={e=>set('inscricao_estadual', e.target.value)} placeholder="Opcional"/>
                </div>
                <div>
                  <label style={{fontSize:11, color:'var(--t3)', marginBottom:5, display:'block'}}>Inscrição municipal</label>
                  <input style={inp} value={form.inscricao_municipal} onChange={e=>set('inscricao_municipal', e.target.value)} placeholder="Opcional"/>
                </div>
              </div>
            )}
          </div>

          {/* SEÇÃO 2: CONTATO */}
          <div style={{marginBottom:22}}>
            <SecaoLabel icon="Phone">Contato principal (email OU telefone obrigatório)</SecaoLabel>

            <div style={{display:'grid', gridTemplateColumns:'2fr 1fr', gap:12, marginBottom:12}}>
              <div>
                <label style={{fontSize:11, color:'var(--t3)', marginBottom:5, display:'block'}}>Nome do contato</label>
                <input style={inp} value={form.contato_nome} onChange={e=>set('contato_nome', e.target.value)} placeholder="Quem você fala"/>
              </div>
              <div>
                <label style={{fontSize:11, color:'var(--t3)', marginBottom:5, display:'block'}}>Cargo</label>
                <input style={inp} value={form.contato_cargo} onChange={e=>set('contato_cargo', e.target.value)} placeholder="Diretor, Sócio..."/>
              </div>
            </div>

            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:12}}>
              <div>
                <label style={{fontSize:11, color:'var(--t3)', marginBottom:5, display:'block'}}>E-mail *</label>
                <input style={inp} type="email" value={form.contato_email} onChange={e=>set('contato_email', e.target.value)} placeholder="contato@empresa.com.br"/>
              </div>
              <div>
                <label style={{fontSize:11, color:'var(--t3)', marginBottom:5, display:'block'}}>Telefone / WhatsApp *</label>
                <input style={inp} value={form.contato_telefone} onChange={e=>set('contato_telefone', e.target.value)} placeholder="(11) 99876-5432"/>
              </div>
            </div>

            <div>
              <label style={{fontSize:11, color:'var(--t3)', marginBottom:5, display:'block'}}>Site (opcional)</label>
              <input style={inp} value={form.site} onChange={e=>set('site', e.target.value)} placeholder="https://empresa.com.br"/>
            </div>
          </div>

          {/* SEÇÃO 3: ENDEREÇO */}
          <div style={{marginBottom:22}}>
            <SecaoLabel icon="MapPin">Endereço (opcional)</SecaoLabel>

            <div style={{display:'grid', gridTemplateColumns:'160px 1fr', gap:12, marginBottom:12}}>
              <div>
                <label style={{fontSize:11, color:'var(--t3)', marginBottom:5, display:'block'}}>CEP {buscandoCep && <span style={{color:'var(--blue)'}}>buscando...</span>}</label>
                <input style={inp} value={form.endereco_cep} onChange={e=>set('endereco_cep', e.target.value)} placeholder="00000-000" maxLength={9}/>
              </div>
              <div>
                <label style={{fontSize:11, color:'var(--t3)', marginBottom:5, display:'block'}}>Logradouro</label>
                <input style={inp} value={form.endereco_logradouro} onChange={e=>set('endereco_logradouro', e.target.value)} placeholder="Rua, Av..."/>
              </div>
            </div>

            <div style={{display:'grid', gridTemplateColumns:'100px 1fr', gap:12, marginBottom:12}}>
              <div>
                <label style={{fontSize:11, color:'var(--t3)', marginBottom:5, display:'block'}}>Número</label>
                <input style={inp} value={form.endereco_numero} onChange={e=>set('endereco_numero', e.target.value)} placeholder="123"/>
              </div>
              <div>
                <label style={{fontSize:11, color:'var(--t3)', marginBottom:5, display:'block'}}>Complemento</label>
                <input style={inp} value={form.endereco_complemento} onChange={e=>set('endereco_complemento', e.target.value)} placeholder="Sala, andar..."/>
              </div>
            </div>

            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 80px', gap:12}}>
              <div>
                <label style={{fontSize:11, color:'var(--t3)', marginBottom:5, display:'block'}}>Bairro</label>
                <input style={inp} value={form.endereco_bairro} onChange={e=>set('endereco_bairro', e.target.value)}/>
              </div>
              <div>
                <label style={{fontSize:11, color:'var(--t3)', marginBottom:5, display:'block'}}>Cidade</label>
                <input style={inp} value={form.endereco_cidade} onChange={e=>set('endereco_cidade', e.target.value)}/>
              </div>
              <div>
                <label style={{fontSize:11, color:'var(--t3)', marginBottom:5, display:'block'}}>UF</label>

                  <option value="pequena">Pequena</option>
                  <option value="media">Média</option>
                  <option value="grande">Grande</option>

              <div>

                <input style={inp} value={form.origem} onChange={e=>set('origem', e.target.value)} placeholder="Indicação, Inbound..." list="origens-sugestao"/>
                <datalist id="origens-sugestao">

                  Status
                  {form.status_lock && <span style={{color:'#BA7517', fontSize:10, display:'inline-flex', alignItems:'center', gap:3}}><Icon name="Lock" size={9}/>travado manualmente</span>}

                </label>
                <select style={{...inp, borderLeft: `3px solid ${getStatusByKey(statusConfig, form.status).cor}`}} value={form.status} onChange={e=>set('status', e.target.value)}>

                  ))}
                </select>
              </div>
              <div>
                <label style={{fontSize:11, color:'var(--t3)', marginBottom:5, display:'block'}}>Data de aquisição</label>

            <div style={{marginTop:14, padding:'10px 14px', background:'rgba(229,84,77,.10)', border:'1px solid rgba(229,84,77,.30)', borderRadius:7, fontSize:12.5, color:'#ff8585'}}>
              ⚠ {erro}

          )}
        </div>

        {/* Footer */}
        <div style={{padding:'12px 22px', borderTop:'1px solid var(--border)', display:'flex', justifyContent:'space-between', gap:10}}>
          {!novo
            ? <button onClick={remover} style={{padding:'8px 14px', borderRadius:7, border:'none', background:'transparent', color:'#E5544D', fontSize:12.5, fontWeight:600, cursor:'pointer', display:'inline-flex', alignItems:'center', gap:5}}><Icon name="Trash2" size={12}/>Remover</button>
            : <span/>}

            <button onClick={salvar} disabled={salvando} style={{padding:'8px 18px', borderRadius:7, border:'none', background: salvando ? 'var(--bg-3)' : 'var(--blue)', color:'#fff', fontSize:13, fontWeight:600, cursor: salvando ? 'wait' : 'pointer', display:'inline-flex', alignItems:'center', gap:6}}>
              <Icon name={salvando ? 'RefreshCw' : 'Check'} size={13}/>
              {salvando ? 'Salvando...' : (novo ? 'Cadastrar' : 'Salvar')}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}
