/* Sincroniza EVO_KEY_CFG (legado, usado por evoFetch) com a instancia ativa.
   Garante que evoFetch sempre pegue a apikey/url certa quando o usuario
   troca de WhatsApp via switcher OU quando o app monta.
   Tambem: se a instancia ativa nao for visivel pro user logado (ex: user
   trocou e o admin tem instancia privada de outro user no localStorage),
   reseta pra primeira instancia visivel (Brava Principal por padrao).

   CUIDADO COM RACE: ao criar uma nova instancia, o switcher chama
   setActiveInstanceId(novoId) ANTES do useWaInstances receber o INSERT
   via Realtime. Pra nao forcar fallback prematuro, esperamos:
   1. loading == false (lista ja carregou pelo menos uma vez)
   2. grace period de 1.5s desde a ultima mudanca de activeId
   Se depois disso a instancia ainda nao apareceu, ai sim faz fallback. */
function useSyncEvoConfig() {
  const { instances, loading } = useWaInstances();
  const activeId = useActiveInstanceId();
  React.useEffect(() => {
    if (loading) return;                              // ainda carregando lista
    if (!instances || instances.length === 0) return;
    let inst = instances.find(i => i.id === activeId);
    if (inst) {
      // Instancia encontrada — sincroniza EVO_KEY_CFG se mudou
      const cur = getEvoConfig();
      if (!cur || cur.url !== inst.evolution_url || cur.instance !== inst.evolution_instance_name || cur.apikey !== inst.evolution_apikey) {
        setEvoConfigStore({
          url: inst.evolution_url,
          instance: inst.evolution_instance_name,
          apikey: inst.evolution_apikey,
        });
      }
      // Sincroniza foto do perfil WhatsApp como foto do usuario logado.
      // Se a instancia ativa tem profile_pic_url (foto do WhatsApp do dono),
      // salva em brava_user_photo:<email> pra SidebarUserCard + HeaderUserAvatar
      // mostrarem a foto real em vez de app/jhonattan.jpg
      if (inst.profile_pic_url && inst.owner_email) {
        try {
          const key = 'brava_user_photo:' + inst.owner_email.toLowerCase().trim();
          const atual = localStorage.getItem(key);
          if (atual !== inst.profile_pic_url) {
            localStorage.setItem(key, inst.profile_pic_url);
            window.dispatchEvent(new Event('brava_photo_changed'));
          }
        } catch {}
      }
      return;
    }
    // Instancia nao encontrada — espera grace period pra ver se aparece via Realtime
    // (cobre o caso de INSERT recente que ainda nao propagou)
    const graceTimer = setTimeout(() => {
      // Re-checa: alguma instancia com esse id apareceu?
      const ainda = (instances || []).find(i => i.id === activeId);
      if (ainda) return; // ja foi pego no proximo render
      const fallback = instances[0];
      if (fallback) {
        setActiveInstanceId(fallback.id);
        showToast?.(`Trocou pra ${fallback.nome} (instancia anterior nao disponivel)`, 'info');
      }
    }, 1500);
    return () => clearTimeout(graceTimer);
  }, [instances, activeId, loading]);
}

function App() {
  // ✨ Auth gate: se nao houver sessao Supabase Auth, mostra modal de login
  //    (necessario pra JWT chegar nas queries e RLS funcionar)
  const { needLogin, loading: authLoading } = useSupaAuthGate();
  // Gera notificacoes automaticas a partir de eventos reais do banco (erros IA, etc)
  useNotifGenerator();
  // ✨ Sync das fotos de usuário do banco (realtime)
  useUserFotoSync();
  // Mantem credenciais Evolution sincronizadas com instancia ativa
  useSyncEvoConfig();
  // ✨ Toca som + notif quando alguem atribui um card do Pipeline pra mim
  const _meuUserIdApp = useUsuarioLogadoId();
  usePipelineAssignWatcher(_meuUserIdApp);
  // ✨ Notif + som quando o sistema concilia um lançamento sozinho (Sprint A)
  useConciliacaoAutoWatcher();

  // Persistência via localStorage
  // Sempre comeca em Dashboard ao logar (ignora ultima pagina salva)
  const [page, setPage] = useState('dashboard');
  const [collapsed, setCollapsed] = useState(() => localStorage.getItem('brava_collapsed') === '1');
  const [impersonate, setImpersonate] = useState(null);
  const [pipelineCols, setPipelineCols] = useState(() => {
    try { const s = localStorage.getItem('brava_pipeline'); if (s) return JSON.parse(s); } catch(e){}
    return PIPELINE_INIT;
  });
  const [busca, setBusca] = useState('');
  const [notifAberta, setNotifAberta] = useState(false);
  const [novoClienteAberto, setNovoClienteAberto] = useState(false);
  const [extraCRM, setExtraCRM] = useState(() => {
    try { const s = localStorage.getItem('brava_extra_crm'); if (s) return JSON.parse(s); } catch(e){}
    return [];
  });

  // Persistir
  useEffect(() => { localStorage.setItem('brava_page', page); }, [page]);
  useEffect(() => { localStorage.setItem('brava_collapsed', collapsed?'1':'0'); }, [collapsed]);
  useEffect(() => { localStorage.setItem('brava_pipeline', JSON.stringify(pipelineCols)); }, [pipelineCols]);
  useEffect(() => { localStorage.setItem('brava_extra_crm', JSON.stringify(extraCRM)); }, [extraCRM]);

  // moverNoPipeline aceita string (nome) OU objeto contato/cliente.
  // - Se for objeto E nao existir card com aquele nome, CRIA o card na coluna.
  // - Se ja existir, MOVE pra coluna indicada.
  const moverNoPipeline = (clienteOuNome, paraColId) => {
    const nomeCliente = typeof clienteOuNome === 'string' ? clienteOuNome : clienteOuNome?.nome || clienteOuNome?.name;
    if (!nomeCliente) return;
    setPipelineCols(cs => {
      const existing = cs.flatMap(c=>c.cards).find(k=>k.nome===nomeCliente);
      if (existing) {
        // MOVE card existente
        return cs.map(c => {
          if (c.cards.some(k=>k.nome===nomeCliente)) return {...c, cards: c.cards.filter(k=>k.nome!==nomeCliente)};
          if (c.id === paraColId) return {...c, cards:[...c.cards, existing]};
          return c;
        });
      }
      // CRIA card novo a partir do objeto contato (ou stub se for so nome)
      if (typeof clienteOuNome !== 'object') return cs;
      const c0 = clienteOuNome;
      const novoCard = {
        id: (c0.id || nomeCliente) + '_' + Date.now(),
        nome: nomeCliente,
        sub: c0.empresa || c0.servico || c0.via || c0.canal || 'WhatsApp',
        nicho: c0.nicho || c0.tag || null,
        color: c0.color || '#7B3FE4',
        init: c0.init || (nomeCliente.split(' ').map(p=>p[0]).join('').slice(0,2).toUpperCase()),
        logoUrl: c0.logoUrl || c0.profile_pic_url || null,
        jid: c0.id || null,    // mantem ref pro chat WhatsApp
      };
      return cs.map(c => c.id === paraColId ? {...c, cards:[...c.cards, novoCard]} : c);
    });
  };

  const [shortcutsOpen, setShortcutsOpen] = useState(false);
  useKeyboardShortcuts({ setNovoCliente: setNovoClienteAberto, setShortcutsOpen });

  // Cadastrar novo cliente
  const cadastrarCliente = (cliente) => {
    setExtraCRM(arr => [...arr, cliente]);
    const colMap = { 'Comercial':'lead', 'Proposta Apresentada':'proposta', 'Implementação':'impl', 'Ativo':'ativo', 'Em Prod':'prod', 'Em breve':'lead' };
    const colId = colMap[cliente.status] || 'lead';
    setPipelineCols(cs => cs.map(c => c.id === colId ? {...c, cards:[...c.cards, {id:cliente.nome+Date.now(), nome:cliente.nome, sub:cliente.servico, nicho:cliente.nicho, color:cliente.color, init:cliente.init, logoUrl:cliente.logoUrl}]} : c));
    showToast(`Cliente ${cliente.nome} cadastrado com sucesso`, 'success');
  };

  useEffect(() => {
    const app = document.querySelector('.app');
    if (app) app.style.gridTemplateColumns = collapsed ? '0 1fr' : 'var(--sidebar) 1fr';
  }, [collapsed]);

  // Toast de boas-vindas no primeiro acesso pós-checkout
  useEffect(() => {
    if (SESSAO.welcome) {
      setTimeout(() => {
        showToast(`Bem-vindo à Brava, ${SESSAO.nome.split(' ')[0]}! Seu workspace está pronto.`, 'success');
        // Marca como já visto pra não mostrar de novo
        const s = JSON.parse(localStorage.getItem('brava_sessao') || '{}');
        s.welcome = false;
        localStorage.setItem('brava_sessao', JSON.stringify(s));
      }, 1200);
    }
  }, []);

  // Fechar notificações ao clicar fora
  useEffect(() => {
    if (!notifAberta) return;
    const close = e => { if (!e.target.closest('.header__actions')) setNotifAberta(false); };
    document.addEventListener('click', close);
    return () => document.removeEventListener('click', close);
  }, [notifAberta]);

  // ✨ Auth gate: precisa de sessao Supabase Auth pra RLS funcionar
  if (authLoading) return (
    <div style={{
      position:'fixed', inset:0, background:'#05050D', display:'flex',
      alignItems:'center', justifyContent:'center', color:'#A0A0AA',
      fontFamily:'Inter, sans-serif', fontSize:14,
    }}>Carregando sessão…</div>
  );
  if (needLogin) return <SupaLoginModal defaultEmail={SESSAO?.email || 'diretoria@brava.company'} onSuccess={() => window.location.reload()} />;

  if (impersonate) return (
    <>
      <ImpersonateBanner cliente={impersonate} onSair={() => setImpersonate(null)}/>
      <ClientWorkspace cliente={impersonate}/>
    </>
  );

  return (
    <div className="app">
      {/* Toggle de tema agora vive no SidebarUserCard */}
      <Sidebar page={page} setPage={setPage} collapsed={collapsed} setCollapsed={setCollapsed}/>
      <Header page={page} collapsed={collapsed} setCollapsed={setCollapsed} setPage={setPage} busca={busca} setBusca={setBusca} notifAberta={notifAberta} setNotifAberta={setNotifAberta}/>
      <main className="main">
        {page === 'dashboard' ? <Dashboard onImpersonate={setImpersonate} pipelineCols={pipelineCols} setPage={setPage} onNovoCliente={()=>setNovoClienteAberto(true)} onExportar={exportarCSV} busca={busca}/>
          : page === 'clientes' ? <Conversas pipelineCols={pipelineCols} moverNoPipeline={moverNoPipeline}/>
          : page === 'monitoramento' ? <Monitoramento pipelineCols={pipelineCols} onImpersonate={setImpersonate}/>
          : page === 'mrr'      ? <Financeiro/>
          : page === 'pipeline' ? <PipelineProjetos/>
          : page === 'clientes_crm' ? <ClientesCRM/>
          : page === 'projetos' ? <ProjetosCRM/>
          : page === 'agenda'   ? <Agenda/>
          : page === 'analytics'? <Analytics/>
          : page === 'chamados' ? <Chamados/>
          : page === 'equipe'   ? <Equipe/>
          : page === 'logs'     ? <Logs/>
          : page === 'config'   ? <Config/>
          : <Placeholder page={page}/>}
      </main>
      {novoClienteAberto && <NovoClienteModal onClose={()=>setNovoClienteAberto(false)} onSalvar={cadastrarCliente}/>}
      <ShortcutsModal open={shortcutsOpen} onClose={()=>setShortcutsOpen(false)}/>
      <AIChat/>
      <ToastContainer/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

// Splash de login → ao sumir, marca body.boot-ready (libera animacoes CSS)
// e dispara evento "brava_boot_ready" (libera os contadores useCount).
const BOOT_SPLASH_MS = 1400;
function bravaRevealApp() {
  if (document.body.classList.contains('boot-ready')) return;
  const l = document.getElementById('brava-loading');
  if (l) { l.style.opacity = '0'; setTimeout(() => l.remove(), 400); }
  // Espera o fade do splash antes de liberar as animacoes do dashboard
  setTimeout(() => {
    document.body.classList.add('boot-ready');
    window.dispatchEvent(new Event('brava_boot_ready'));
  }, 380);
}
setTimeout(bravaRevealApp, BOOT_SPLASH_MS);
// Fail-safe: se algo travar, ainda libera em 8s
setTimeout(bravaRevealApp, 8000);
</script>
</body>
</html>
