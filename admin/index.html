/* ── WebSocket Socket.IO da Evolution (real-time) ── */
const _evoSocketState = { socket:null, cfgKey:null, listeners:new Set(), connected:false };
function _evoSocketEmit(evt) { _evoSocketState.listeners.forEach(fn => { try { fn(evt); } catch {} }); }

function _evoBindSocket(socket) {
  socket.on('connect', () => {
    _evoSocketState.connected = true;
    _evoSocketEmit({ type:'connect' });
  });
  socket.on('disconnect', () => {
    _evoSocketState.connected = false;
    _evoSocketEmit({ type:'disconnect' });
  });
  socket.on('connect_error', (err) => {
    _evoSocketEmit({ type:'error', error: err?.message || 'connect error' });
  });
  ['messages.upsert','messages.update','chats.upsert','chats.update','chats.delete','connection.update','contacts.upsert','contacts.update','send.message','presence.update']
    .forEach(evt => socket.on(evt, (payload) => _evoSocketEmit({ type:'message', event:evt, payload })));
  socket.on('presence.update', (payload) => evoApplyPresenceUpdate(payload));
  // Auto-indexa contatos recebidos via socket (mantem o mapa lid->phone fresco)
  const indexarPayload = (p) => {
    const data = p?.data || p;
    const arr = Array.isArray(data) ? data : (data?.contacts || [data]);
    arr.forEach(c => _evoIndexContact(c));
    _evoNotifyContacts();
  };
  socket.on('contacts.upsert', indexarPayload);
  socket.on('contacts.update', indexarPayload);
  socket.onAny?.((evt, payload) => _evoSocketEmit({ type:'any', event:evt, payload }));
}

function evoSocketConnect(cfg) {
  if (!cfg || typeof io === 'undefined') return;
  const key = cfg.url + '|' + cfg.instance;
  if (_evoSocketState.cfgKey === key && _evoSocketState.socket?.connected) return;
  if (_evoSocketState.socket) { try { _evoSocketState.socket.disconnect(); } catch {} }

  const base = evoNormalizeUrl(cfg.url);
  const commonOpts = {
    transports: ['websocket','polling'],
    reconnection: true,
    reconnectionAttempts: 5,
    reconnectionDelay: 2000,
    timeout: 8000,
    auth: { apikey: cfg.apikey },
    query: { apikey: cfg.apikey },
  };

  // Tenta primeiro com namespace por instancia (Evolution v2 padrao)
  let socket = io(`${base}/${encodeURIComponent(cfg.instance)}`, commonOpts);
  _evoSocketState.socket = socket;
  _evoSocketState.cfgKey = key;
  _evoBindSocket(socket);

  // Fallback: se nao conectar em 5s, tenta raiz (Evolution global mode)
  let tentouFallback = false;
  const tentarFallback = () => {
    if (tentouFallback || _evoSocketState.connected) return;
    tentouFallback = true;
    try { socket.disconnect(); } catch {}
    const sk2 = io(base, commonOpts);
    _evoSocketState.socket = sk2;
    _evoBindSocket(sk2);
  };
  setTimeout(tentarFallback, 5000);
}

function useEvoSocket() {
  const cfg = useEvoConfig();
  const [connected, setConnected] = React.useState(_evoSocketState.connected);
  React.useEffect(() => {
    if (!cfg) return;
    evoSocketConnect(cfg);
    const fn = (e) => {
      if (e.type === 'connect') setConnected(true);
      if (e.type === 'disconnect') setConnected(false);
    };
    _evoSocketState.listeners.add(fn);
    setConnected(_evoSocketState.connected);
    return () => { _evoSocketState.listeners.delete(fn); };
  }, [cfg?.url, cfg?.instance, cfg?.apikey]);
  return { connected };
}

// Subscribe a eventos do socket (callback dispara em cada mensagem nova)
function useEvoSocketEvent(eventNames, callback) {
  React.useEffect(() => {
    if (!callback) return;
    const names = Array.isArray(eventNames) ? eventNames : [eventNames];
    const fn = (e) => {
      if (e.type !== 'message' && e.type !== 'any') return;
      if (names.includes('*') || names.includes(e.event)) callback(e.event, e.payload);
    };
    _evoSocketState.listeners.add(fn);
    return () => { _evoSocketState.listeners.delete(fn); };
  }, [callback, JSON.stringify(eventNames)]);
}

// Hook: polling do estado de conexao da instancia
function useEvoStatus(intervalMs = 15000) {
  const cfg = useEvoConfig();
  const [state, setState] = React.useState({ loading:false, status:null, error:null, instanceInfo:null });
  React.useEffect(() => {
    if (!cfg) { setState({ loading:false, status:null, error:null, instanceInfo:null }); return; }
    let alive = true;
    const tick = async () => {
      if (!alive) return;
      setState(s => ({...s, loading:true}));
      try {
        // 1. connectionState (status open/close/connecting)
        const cs = await evo.connectionState(cfg);
        const status = cs?.instance?.state || cs?.state || cs?.status || 'unknown';
        // 2. fetchInstances (puxa profile, contatos, msgs)
        const all = await evo.fetchInstances(cfg);
        const list = Array.isArray(all) ? all : (all?.instance ? [all.instance] : []);
        const found = list.find(i =>
          (i.name && i.name === cfg.instance) ||
          (i.instance && i.instance.instanceName === cfg.instance) ||
          (i.instanceName === cfg.instance)
        ) || list[0];
        if (alive) setState({ loading:false, status, error:null, instanceInfo: found || null });
      } catch (e) {
        if (alive) setState({ loading:false, status:null, error: e.message || 'Erro', instanceInfo:null });
      }
    };
    tick();
    const id = setInterval(tick, intervalMs);
    return () => { alive = false; clearInterval(id); };
  }, [cfg?.url, cfg?.instance, cfg?.apikey, intervalMs]);
  return state;
}

/* ── Helpers para normalizar dados da Evolution para o shape esperado pelo UI ── */
const EVO_PALETA = ['#7B3FE4','#1E90FF','#1D9E75','#BA7517','#A32D2D','#E040FB','#185FA5','#FF6D00','#00BCD4','#9C27B0'];
function evoColorFromString(s) {
  let h = 0; for (let i = 0; i < (s||'').length; i++) h = ((h<<5) - h) + s.charCodeAt(i);
  return EVO_PALETA[Math.abs(h) % EVO_PALETA.length];
}
function evoInitials(name) {
  const parts = (name||'?').trim().split(/\s+/).filter(Boolean);
  if (parts.length === 0) return '?';
  if (parts.length === 1) return parts[0].slice(0,2).toUpperCase();
  return (parts[0][0] + parts[parts.length-1][0]).toUpperCase();
}
// Formato para LISTA de conversas (igual WhatsApp Web):
//  - hoje      -> HH:MM (ex: 01:00)
//  - ontem     -> "ontem"
//  - <7 dias   -> dia da semana COMPLETO (sexta-feira, quarta-feira)
//  - mais antigo -> DD/MM/YYYY (06/05/2026)
function evoTimeFormat(ts) {
  if (!ts) return '';
  const d = typeof ts === 'number' ? new Date(ts < 1e12 ? ts*1000 : ts) : new Date(ts);
  if (isNaN(d.getTime())) return '';
  const now = new Date();
  const ehHoje = d.toDateString() === now.toDateString();
  if (ehHoje) return d.toLocaleTimeString('pt-BR',{hour:'2-digit', minute:'2-digit'});
  const ontem = new Date(now); ontem.setDate(ontem.getDate()-1);
  if (d.toDateString() === ontem.toDateString()) return 'ontem';
  const diasAtras = Math.floor((now - d) / (24*60*60*1000));
  if (diasAtras < 7) return d.toLocaleDateString('pt-BR',{weekday:'long'}); // sexta-feira
  return d.toLocaleDateString('pt-BR',{day:'2-digit', month:'2-digit', year:'numeric'}); // 06/05/2026
}

// Formato para BOLHA de mensagem (SEMPRE HH:MM como o WhatsApp)
function evoHHMM(ts) {
  if (!ts) return '';
  const d = typeof ts === 'number' ? new Date(ts < 1e12 ? ts*1000 : ts) : new Date(ts);
  if (isNaN(d.getTime())) return '';
  return d.toLocaleTimeString('pt-BR',{hour:'2-digit', minute:'2-digit'});
}

// Label para SEPARADOR DE DATA na conversa (HOJE / ONTEM / 18/04/2026)
function evoDayLabel(ts) {
  if (!ts) return '';
  const d = typeof ts === 'number' ? new Date(ts < 1e12 ? ts*1000 : ts) : new Date(ts);
  if (isNaN(d.getTime())) return '';
  const now = new Date();
  const ehHoje = d.toDateString() === now.toDateString();
  if (ehHoje) return 'HOJE';
  const ontem = new Date(now); ontem.setDate(ontem.getDate()-1);
  if (d.toDateString() === ontem.toDateString()) return 'ONTEM';
  const diasAtras = Math.floor((now - d) / (24*60*60*1000));
  if (diasAtras < 7) {
    const dia = d.toLocaleDateString('pt-BR',{weekday:'long'});
    return dia.charAt(0).toUpperCase() + dia.slice(1);
  }
  return d.toLocaleDateString('pt-BR',{day:'2-digit', month:'2-digit', year:'numeric'});
}

// Chave do dia (YYYY-MM-DD) pra agrupar mensagens
function evoDayKey(ts) {
  if (!ts) return '0';
  const d = typeof ts === 'number' ? new Date(ts < 1e12 ? ts*1000 : ts) : new Date(ts);
  if (isNaN(d.getTime())) return '0';
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// Extrai texto de qualquer tipo de message Baileys
function evoExtractText(msg) {
  if (!msg) return '';
  if (typeof msg === 'string') return msg;
  const m = msg.message || msg;
  if (!m) return '';
  if (m.conversation) return m.conversation;
  if (m.extendedTextMessage?.text) return m.extendedTextMessage.text;
  if (m.imageMessage)    return m.imageMessage.caption    ? `📷 ${m.imageMessage.caption}` : '📷 Foto';
  if (m.videoMessage)    return m.videoMessage.caption    ? `🎥 ${m.videoMessage.caption}` : '🎥 Vídeo';
  if (m.audioMessage)    return m.audioMessage.ptt ? '🎤 Mensagem de voz' : '🎵 Áudio';
  if (m.documentMessage) return `📄 ${m.documentMessage.fileName || 'Documento'}`;
  if (m.stickerMessage)  return '😀 Figurinha';
  if (m.contactMessage)  return '👤 Contato';
  if (m.locationMessage) return '📍 Localização';
  if (m.buttonsResponseMessage?.selectedDisplayText) return m.buttonsResponseMessage.selectedDisplayText;
  if (m.listResponseMessage?.title) return m.listResponseMessage.title;
  return '';
}

// Util: detecta se um valor "parece um nome" (tem letras, nao e so digitos/JID)
function evoTemNomeReal(s) {
  if (!s) return false;
  return /[a-zA-ZÀ-ÿ]/.test(String(s));
}

// Identifica chat "ruido": @lid (LinkedDevice) sem identificacao util, broadcasts e status
function evoIsRuido(chat) {
  const jid = chat.remoteJid || chat.id || chat.key?.remoteJid || '';
  const rawName = chat.pushName || chat.name || chat.profileName || chat.subject || '';
  if (jid.includes('@broadcast')) return true;
  if (jid === 'status@broadcast') return true;
  if (jid.includes('@lid')) {
    // Considera "OK" (nao ruido) se:
    //  - tem nome com letras
    //  - OU temos um telefone real resolvido via tabela de contatos
    const contato = evoGetContact(jid);
    const nomeUtil = evoTemNomeReal(rawName)
                  || evoTemNomeReal(contato?.pushName || contato?.profileName || contato?.verifiedName || contato?.notify || '');
    const temPhone = !!evoResolveJid(jid)?.endsWith('@s.whatsapp.net') && evoResolveJid(jid) !== jid;
    if (!nomeUtil && !temPhone) return true;
  }
  return false;
}

// Detalhes do tipo de mensagem (pra renderizacao especial)
function evoMessageMeta(msg) {
  const m = msg?.message || msg;
  if (!m) return { kind: 'text' };
  if (m.imageMessage)    return { kind: 'image',    caption: m.imageMessage.caption || '', mimetype: m.imageMessage.mimetype, fileLength: m.imageMessage.fileLength };
  if (m.videoMessage)    return { kind: 'video',    caption: m.videoMessage.caption || '', mimetype: m.videoMessage.mimetype, seconds: m.videoMessage.seconds };
  if (m.audioMessage)    return { kind: 'audio',    ptt: !!m.audioMessage.ptt, mimetype: m.audioMessage.mimetype, seconds: m.audioMessage.seconds };
  if (m.documentMessage) return { kind: 'document', fileName: m.documentMessage.fileName || 'Documento', mimetype: m.documentMessage.mimetype, fileLength: m.documentMessage.fileLength };
  if (m.stickerMessage)  return { kind: 'sticker',  mimetype: m.stickerMessage.mimetype };
  if (m.locationMessage) return { kind: 'location', lat: m.locationMessage.degreesLatitude, lng: m.locationMessage.degreesLongitude };
  if (m.contactMessage)  return { kind: 'contact',  displayName: m.contactMessage.displayName };
  return { kind: 'text' };
}

// Converte um chat do Evolution v2 para o shape do UI (espelhamento WhatsApp Web)
function evoNormalizeChat(c) {
  const remoteJid = c.remoteJid || c.id || c.key?.remoteJid || '';
  const isGroup = remoteJid.endsWith('@g.us');
  const ehLid = remoteJid.includes('@lid');

  // Cruza com tabela de contatos pra recuperar nome / telefone real do @lid
  const contato = !isGroup ? evoGetContact(remoteJid) : null;
  const jidResolvido = !isGroup ? evoResolveJid(remoteJid) : remoteJid; // se for lid, tenta achar @s.whatsapp.net

  const rawName = c.pushName || c.name || c.profileName || c.subject
               || contato?.pushName || contato?.profileName || contato?.verifiedName || contato?.notify || '';

  // Contato salvo manualmente sempre tem prioridade maxima
  const salvo = getContatoSalvo(remoteJid) || getContatoSalvo(jidResolvido);

  // Nome final (em ordem de prioridade):
  //  1. Nome salvo manualmente pelo usuario
  //  2. Grupo com subject -> nome do grupo
  //  3. Contato com nome real (com letras)
  //  4. Telefone formatado (+55 DDD NNNNN-NNNN)
  let name;
  if (salvo?.nome) {
    name = salvo.nome;
  } else if (isGroup) {
    name = rawName || 'Grupo';
  } else if (evoTemNomeReal(rawName)) {
    name = rawName;
  } else {
    // Tenta formatar o telefone resolvido; se nao, formata o proprio remoteJid
    name = evoFormatPhone(jidResolvido) || evoLabelContato(remoteJid);
  }

  // Preview com prefixo igual WhatsApp:
  //  - Voce enviou      -> "Voce: <texto>"
  //  - Outro em grupo   -> "Primeiro Nome: <texto>" (so se for nome real)
  //  - Outro em direto  -> "<texto>"
  const lm = c.lastMessage;
  let preview = lm ? evoExtractText(lm) : '';
  if (lm) {
    if (lm.key?.fromMe || lm.fromMe) {
      preview = `Você: ${preview || ''}`;
    } else if (isGroup) {
      const remetente = lm.pushName || lm.participant || lm.key?.participant || '';
      const primeiroNome = String(remetente).split(/\s+/)[0];
      // So prefixa se tiver letras (evita "153644016115862: Combinado")
      if (evoTemNomeReal(primeiroNome)) {
        preview = `${primeiroNome}: ${preview || ''}`;
      }
    }
  }
  preview = (preview || '').trim() || '...';

  const ts = c.updatedAt || lm?.messageTimestamp || c.messageTimestamp;
  return {
    id: remoteJid,
    name,
    init: evoInitials(name),
    color: evoColorFromString(remoteJid),
    preview,
    time: evoTimeFormat(ts),
    timestamp: typeof ts === 'number' ? ts : (ts ? new Date(ts).getTime() : 0),
    unread: c.unreadCount || 0,
    status: 'online',
    tag: null,
    via: isGroup ? 'Grupo' : 'WhatsApp',
    canal: 'WhatsApp',
    isGroup,
    ehLid,
    raw: c,
  };
}

// Status de mensagem do Baileys/Evolution (varia por versao da API):
//   0=ERROR  1=PENDING  2=SERVER_ACK(enviado)  3=DELIVERY_ACK(entregue)  4=READ(lida)  5=PLAYED
// Aceita: numero (0..5) OU string (PENDING/SENT/RECEIVED/DELIVERY_ACK/SERVER_ACK/READ/PLAYED/etc)
function evoParseStatus(raw) {
  if (raw == null) return 2; // default: assume enviado (1 check) · minimo elegante
  if (typeof raw === 'number') return raw;
  const s = String(raw).toUpperCase();
  if (s === 'READ' || s === 'PLAYED')          return 4;
  if (s === 'DELIVERY_ACK' || s === 'DELIVERED' || s === 'RECEIVED') return 3;
  if (s === 'SERVER_ACK' || s === 'SENT' || s === 'ACK')             return 2;
  if (s === 'PENDING' || s === 'WAITING')      return 1;
  if (s === 'ERROR' || s === 'FAILED')         return 0;
  return 2;
}

function evoNormalizeMessage(m) {
  const text = evoExtractText(m);
  const fromMe = m.key?.fromMe || m.fromMe;
  const ts = m.messageTimestamp || m.timestamp || m.createdAt;
  const meta = evoMessageMeta(m);
  const statusNum = evoParseStatus(m.status);
  return {
    id: m.key?.id || m.id,
    from: fromMe ? 'out' : 'in',
    text: text || '',
    time: evoHHMM(ts),             // SEMPRE HH:MM na bolha (igual WhatsApp)
    timestamp: typeof ts === 'number' ? (ts < 1e12 ? ts*1000 : ts) : (ts ? new Date(ts).getTime() : 0),
    ia: false,
    statusNum,                     // 0..5 (vide tabela acima)
    kind: meta.kind,               // text|image|video|audio|document|sticker|location|contact
    meta,                          // detalhes do tipo
    raw: m,
  };
}

// Preferencia: ocultar chats ruido (@lid sem nome). Default: true.
const evoGetEscondeRuido = () => { try { return localStorage.getItem('brava_evo_esconde_ruido') !== '0'; } catch { return true; } };
const evoSetEscondeRuido = (v) => { localStorage.setItem('brava_evo_esconde_ruido', v ? '1' : '0'); window.dispatchEvent(new Event('brava_evo_pref_changed')); };
function useEvoEscondeRuido() {
  const [v, setV] = React.useState(evoGetEscondeRuido);
  React.useEffect(() => {
    const fn = () => setV(evoGetEscondeRuido());
    window.addEventListener('brava_evo_pref_changed', fn);
    return () => window.removeEventListener('brava_evo_pref_changed', fn);
  }, []);
  return [v, evoSetEscondeRuido];
}

// Hook: lista de conversas reais (polling + websocket pra real-time)
function useEvoChats(intervalMs = 15000) {
  const cfg = useEvoConfig();
  useEvoSocket(); // garante que o socket esta conectado
  useEvoContacts(); // garante que contatos foram carregados (resolucao de @lid)
  const contatosSalvos = useTodosContatosSalvos(); // re-render reativo
  const [escondeRuido] = useEvoEscondeRuido();
  const [raw, setRaw] = React.useState({ loading:false, arr:[], error:null });
  const fetchRef = React.useRef(null);

  React.useEffect(() => {
    if (!cfg) { setRaw({loading:false, arr:[], error:null}); return; }
    let alive = true;
    // Snapshot do instance no inicio do effect — usado pra descartar
    // responses tardios se o usuario trocou de WhatsApp no meio do fetch.
    const cfgSnapshot = cfg;
    const tick = async () => {
      if (!alive) return;
      try {
        // Garante contatos antes pra resolver @lid -> telefone no normalizer
        if (!_evoContacts.loaded && !_evoContacts.loading) await evoLoadContacts();
        const data = await evo.findChats();
        if (!alive) return;
        // Se trocou de instancia no meio, descarta o response
        const cfgAfter = getEvoConfig();
        if (!cfgAfter || cfgAfter.instance !== cfgSnapshot.instance) {
          console.warn('[Brava] useEvoChats: instancia trocou, descartando response');
          return;
        }
        const arr = Array.isArray(data) ? data : (data?.chats || []);
        setRaw({ loading:false, arr, error:null });
      } catch (e) {
        if (alive) setRaw(s => ({...s, loading:false, error: e.message || 'Erro ao listar conversas'}));
      }
    };
    fetchRef.current = tick;
    setRaw(s => ({...s, loading:true, arr:[]})); // limpa array antigo ao trocar
    tick();
    const id = setInterval(tick, intervalMs);
    return () => { alive = false; clearInterval(id); };
  }, [cfg?.url, cfg?.instance, cfg?.apikey, intervalMs]);

  // Reage a eventos do socket pra refetch quase imediato (debounced)
  const debouncedRefetch = React.useMemo(() => {
    let t = null;
    return () => { clearTimeout(t); t = setTimeout(() => fetchRef.current?.(), 250); };
  }, []);
  useEvoSocketEvent(['messages.upsert','chats.upsert','chats.update','chats.delete','send.message'], debouncedRefetch);

  // Normaliza reativamente · re-roda quando RAW muda OU quando user salva/edita contato
  const chatsAll = React.useMemo(
    () => raw.arr.map(evoNormalizeChat).sort((a,b) => (b.timestamp||0) - (a.timestamp||0)),
    [raw.arr, contatosSalvos]
  );
  const chatsVisiveis = React.useMemo(
    () => chatsAll.filter(c => !evoIsRuido(c.raw)),
    [chatsAll]
  );
  const chats = escondeRuido ? chatsVisiveis : chatsAll;
  return { loading: raw.loading, error: raw.error, chats, chatsAll };
}

// Hook lightweight: retorna total de mensagens nao lidas (para badge global)
function useEvoUnreadTotal() {
  const { chats } = useEvoChats(30000); // intervalo mais longo (o socket atualiza tb)
  return React.useMemo(() => chats.reduce((s,c) => s + (c.unread || 0), 0), [chats]);
}

/* Notificacao do navegador quando chega mensagem nova (com permissao) */
const _evoNotifSeen = new Set(); // dedup por message id
function evoBrowserNotify(titulo, corpo, tag, icone) {
  try {
    if (typeof Notification === 'undefined') return;
    if (Notification.permission !== 'granted') return;
    if (document.hasFocus()) return; // nao incomodar se a aba ja esta aberta
    const n = new Notification(titulo, { body: corpo, tag: tag || titulo, icon: icone || '/admin/app/brava-logo-white.png' });
    n.onclick = () => { window.focus(); n.close(); };
    setTimeout(() => n.close(), 7000);
  } catch {}
}
function evoPedirPermissaoNotif() {
  try {
    if (typeof Notification === 'undefined') return;
    if (Notification.permission === 'default') Notification.requestPermission();
  } catch {}
}

// Hook que escuta socket e dispara notificacoes ao receber mensagem nova de outros
function useEvoMessageNotifications() {
  React.useEffect(() => { evoPedirPermissaoNotif(); }, []);
  const cb = React.useCallback((evt, payload) => {
    const data = payload?.data || payload;
    const arr = Array.isArray(data) ? data : (data?.messages ? data.messages : [data]);
    arr.forEach(m => {
      if (!m || m.key?.fromMe || m.fromMe) return; // so notifica entrada
      const id = m.key?.id || m.id;
      if (!id || _evoNotifSeen.has(id)) return;
      _evoNotifSeen.add(id);
      const remoteJid = m.key?.remoteJid || m.remoteJid;
      const contato = remoteJid ? evoGetContact(remoteJid) : null;
      const isGroup = remoteJid?.endsWith('@g.us');
      const senderName = m.pushName
        || contato?.pushName || contato?.profileName || contato?.verifiedName
        || (isGroup ? 'Grupo' : evoFormatPhone(remoteJid) || 'Contato');
      const texto = evoExtractText(m) || '';
      evoBrowserNotify(senderName, texto.slice(0, 140), remoteJid);
    });
  }, []);
  useEvoSocketEvent(['messages.upsert'], cb);
}

// Hook: mensagens de uma conversa especifica (polling fallback + websocket pra real-time)
function useEvoMessages(remoteJid, intervalMs = 12000) {
  const cfg = useEvoConfig();
  useEvoSocket();
  const [state, setState] = React.useState({ loading:false, messages:[], error:null });
  const fetchRef = React.useRef(null);
  const jidRef = React.useRef(remoteJid);
  React.useEffect(() => { jidRef.current = remoteJid; }, [remoteJid]);

  React.useEffect(() => {
    if (!cfg || !remoteJid) { setState({loading:false, messages:[], error:null}); return; }
    let alive = true;
    // Snapshot do instance no inicio do effect (protege contra race ao trocar)
    const cfgSnapshot = cfg;
    const tick = async () => {
      if (!alive) return;
      try {
        const data = await evo.findMessages(remoteJid, 100);
        if (!alive) return;
        // Descarta response se trocou de instancia
        const cfgAfter = getEvoConfig();
        if (!cfgAfter || cfgAfter.instance !== cfgSnapshot.instance) {
          console.warn('[Brava] useEvoMessages: instancia trocou, descartando response');
          return;
        }
        const arr = Array.isArray(data) ? data : (data?.messages?.records || data?.messages || []);
        const norm = arr.map(evoNormalizeMessage)
          .filter(m => m.text || m.raw?.message || m.kind !== 'text')
          .sort((a,b) => (a.timestamp||0) - (b.timestamp||0));
        setState({ loading:false, messages:norm, error:null });
      } catch (e) {
        if (alive) setState(s => ({...s, loading:false, error: e.message || 'Erro ao listar mensagens'}));
      }
    };
    fetchRef.current = tick;
    setState({loading:true, messages:[], error:null}); // limpa msgs antigas ao trocar
    tick();
    const id = setInterval(tick, intervalMs);
    return () => { alive = false; clearInterval(id); };
  }, [cfg?.url, cfg?.instance, cfg?.apikey, remoteJid, intervalMs]);

  // Socket: ao receber qualquer evento de mensagem cuja conversa seja a ativa, refetch
  const onSocketMsg = React.useCallback((evt, payload) => {
    if (!jidRef.current) return;
    const data = payload?.data || payload;
    const arr = Array.isArray(data) ? data : (data?.messages ? data.messages : [data]);
    const matches = arr.some(m => {
      const jid = m?.key?.remoteJid || m?.remoteJid;
      return jid === jidRef.current;
    });
    if (matches) fetchRef.current?.();
  }, []);
  useEvoSocketEvent(['messages.upsert','messages.update','send.message'], onSocketMsg);

  return state;
}

/* Modal: configurar conexao com a Evolution */
function EvoConfigModal({ onClose }) {
  const cur = getEvoConfig() || { url:'', instance:'', apikey:'' };
  const [form, setForm] = useState({ url: cur.url, instance: cur.instance, apikey: cur.apikey });
  const [testando, setTestando] = useState(false);
  const [resultado, setResultado] = useState(null); // {ok, msg, detail}
  const set = (k,v) => { setForm(f => ({...f, [k]:v})); setResultado(null); };

  const testar = async () => {
    if (!form.url || !form.instance || !form.apikey) {
      setResultado({ ok:false, msg:'Preencha URL, instancia e token' }); return;
    }
    setTestando(true); setResultado(null);
    try {
      const all = await evo.fetchInstances({ url: form.url, instance: form.instance, apikey: form.apikey });
      const list = Array.isArray(all) ? all : (all?.instance ? [all.instance] : []);
      const found = list.find(i =>
        (i.name && i.name === form.instance) ||
        (i.instance && i.instance.instanceName === form.instance) ||
        (i.instanceName === form.instance)
      );
      if (!found) {
        const nomes = list.map(i => i.name || i.instanceName || i.instance?.instanceName).filter(Boolean).slice(0,8).join(', ');
        setResultado({ ok:false, msg:`Conectou na API mas nao achou a instancia "${form.instance}". Instancias disponiveis: ${nomes || '(nenhuma)'}` });
      } else {
        const num = found.ownerJid || found.owner || found.number || '';
        setResultado({ ok:true, msg:`Conectado! Instancia encontrada${num ? ' · ' + num : ''}` });
      }
    } catch (e) {
      const isCORS = /Failed to fetch|NetworkError|CORS/i.test(e.message || '');
      setResultado({
        ok:false,
        msg: isCORS
          ? 'Falha de rede/CORS. A Evolution precisa permitir requisicoes deste dominio. Verifique a config CORS_ORIGIN da Evolution.'
          : (e.message || 'Erro desconhecido'),
        detail: e.status ? `Status HTTP ${e.status}` : null,
      });
    } finally {
      setTestando(false);
    }
  };

  const salvar = () => {
    if (!form.url || !form.instance || !form.apikey) {
      setResultado({ ok:false, msg:'Preencha todos os campos antes de salvar' }); return;
    }
    setEvoConfigStore({ url: evoNormalizeUrl(form.url), instance: form.instance.trim(), apikey: form.apikey.trim() });
    showToast?.('Evolution configurada', 'success');
    onClose();
  };

  const limpar = () => {
    if (!confirm('Remover configuracao da Evolution?')) return;
    setEvoConfigStore(null);
    onClose();
  };

  const lbl = { display:'block', fontSize:11, color:'var(--t3)', fontFamily:'var(--f-m)', textTransform:'uppercase', letterSpacing:'.06em', marginBottom:6 };
  const inp = { width:'100%', padding:'9px 12px', background:'var(--bg-3)', border:'1px solid var(--border)', borderRadius:8, color:'var(--t1)', fontSize:14, outline:'none', fontFamily:'var(--f-b)' };

  return (
    <div onClick={onClose} style={{position:'fixed', inset:0, background:'rgba(0,0,0,.65)', display:'grid', placeItems:'center', zIndex:9998, animation:'fade-in .15s'}}>
      <div onClick={e=>e.stopPropagation()} style={{
        width:'min(560px, 94vw)', maxHeight:'90vh', overflow:'auto',
        background:'var(--bg-2)', border:'1px solid var(--border)',
        borderRadius:14, padding:'22px 24px', boxShadow:'0 24px 60px rgba(0,0,0,.5)'
      }}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:18}}>
          <div>
            <div style={{fontFamily:'var(--f-d)', fontSize:18, fontWeight:600, color:'var(--t1)'}}>Conectar Evolution API</div>
            <div style={{fontSize:12, color:'var(--t3)', marginTop:3, lineHeight:1.5}}>
              Token armazenado localmente no seu navegador (fase de teste).
              Para producao migrar para proxy backend.
            </div>
          </div>
          <button onClick={onClose} style={{background:'none', border:'none', cursor:'pointer', color:'var(--t3)', padding:6}}><Icon name="XCircle" size={18}/></button>
        </div>

        <div style={{display:'grid', gap:14}}>
          <div>
            <label style={lbl}>URL da Evolution</label>
            <input style={inp} value={form.url} onChange={e=>set('url', e.target.value)} placeholder="lickingbuffalo-evolution.cloudfy.live" autoFocus/>
          </div>
          <div>
            <label style={lbl}>Nome da Instancia</label>
            <input style={inp} value={form.instance} onChange={e=>set('instance', e.target.value)} placeholder="SistemaBravaCompany"/>
          </div>
          <div>
            <label style={lbl}>Token (apikey)</label>
            <input style={inp} type="password" value={form.apikey} onChange={e=>set('apikey', e.target.value)} placeholder="token da instancia"/>
            <div style={{fontSize:11, color:'var(--t3)', marginTop:6}}>Pode ser a apikey global ou o token especifico da instancia.</div>
          </div>

          {resultado && (
            <div style={{
              padding:'10px 14px', borderRadius:8,
              background: resultado.ok ? 'rgba(29,158,117,.12)' : 'rgba(163,45,45,.12)',
              border: `1px solid ${resultado.ok ? '#1D9E7555' : '#A32D2D55'}`,
              color: resultado.ok ? '#6ee7b7' : '#ff8585',
              fontSize:13, lineHeight:1.5,
            }}>
              <div style={{display:'flex', alignItems:'flex-start', gap:8}}>
                <Icon name={resultado.ok ? 'CheckCircle2' : 'AlertCircle'} size={15} style={{marginTop:2, flexShrink:0}}/>
                <div>
                  {resultado.msg}
                  {resultado.detail && <div style={{fontSize:11, opacity:.7, marginTop:3, fontFamily:'var(--f-m)'}}>{resultado.detail}</div>}
                </div>
              </div>
            </div>
          )}
        </div>

        <div style={{display:'flex', gap:10, justifyContent:'space-between', marginTop:20, paddingTop:16, borderTop:'1px solid var(--border-soft)'}}>
          <div>
            {cur.url && <button onClick={limpar} className="btn" style={{background:'transparent', color:'#ff8585', border:'1px solid #A32D2D55'}}><Icon name="Trash2" size={14}/>Desconectar</button>}
          </div>
          <div style={{display:'flex', gap:10}}>
            <button onClick={testar} disabled={testando} className="btn btn-outline">
              {testando ? 'Testando...' : <><Icon name="Activity" size={14}/>Testar conexao</>}
            </button>
            <button onClick={salvar} className="btn btn-primary"><Icon name="Check" size={14}/>Salvar</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function EvoAvatar({ remoteJid, size = 40, name, init, color, fallbackUrl }) {
  const pic = useEvoProfilePic(remoteJid);
  const src = fallbackUrl || pic;
  const i = init || evoInitials(name);
  const c = color || evoColorFromString(remoteJid || name || '');
  const [erro, setErro] = React.useState(false);
  React.useEffect(() => { setErro(false); }, [src]);
  const isGroup = remoteJid?.endsWith('@g.us');
  return (
    <div style={{
      width:size, height:size, borderRadius:'50%',
      background: c,
      display:'flex', alignItems:'center', justifyContent:'center',

      color:'#fff',
      flexShrink:0, overflow:'hidden',
      position:'relative',

          ? <span style={{fontSize: Math.round(size*0.5)}}>👥</span>

/* ─── Configuracoes > Aba IA ───
   Edita prompt, modelo e toggle global da IA da instancia ativa.
   Salva direto em wa_instancias via Supabase JS client (RLS anon). */
function ConfigIATab() {
  const [cfg, setCfg] = useState(null);             // dados atuais da instancia
  const [form, setForm] = useState({ ai_prompt:'', ai_model:'claude-sonnet-4-5', ai_enabled_global:true });
  const [loading, setLoading] = useState(true);
  const [salvando, setSalvando] = useState(false);
  const [stats, setStats] = useState({ replied:0, errors:0, lastReply:null });
  const [testando, setTestando] = useState(false);
  const [testInput, setTestInput] = useState('Oi, queria saber sobre os planos');
  const [testOutput, setTestOutput] = useState(null);

  const carregar = React.useCallback(async () => {
    const cli = getSupa();
    if (!cli) return;
    const { data, error } = await cli.from('wa_instancias')
      .select('id, nome, ai_prompt, ai_model, ai_enabled_global, ai_typing_enabled, ai_thinking_seconds, ai_split_enabled, ai_reading_seconds')
      .eq('id', SUPA_CFG.instanciaId).single();
    if (error) { showToast?.('Erro: ' + error.message, 'error'); return; }
    setCfg(data);
    setForm({
      ai_prompt: data.ai_prompt || '',
      ai_model: data.ai_model || 'claude-sonnet-4-5',
      ai_enabled_global: data.ai_enabled_global ?? true,
      ai_typing_enabled: data.ai_typing_enabled ?? true,
      ai_thinking_seconds: Number(data.ai_thinking_seconds ?? 3),
      ai_split_enabled: data.ai_split_enabled ?? true,
      ai_reading_seconds: Number(data.ai_reading_seconds ?? 2.5),
    });
    setLoading(false);

    // Stats: contagem de respostas e erros
    const { count: replied } = await cli.from('wa_eventos_log')
      .select('id', { count:'exact', head:true })
      .eq('instancia_id', SUPA_CFG.instanciaId).eq('event_type', 'ai.replied');
    const { count: errors } = await cli.from('wa_eventos_log')
      .select('id', { count:'exact', head:true })
      .eq('instancia_id', SUPA_CFG.instanciaId).in('event_type', ['ai.error','ai.send_error']);
    const { data: last } = await cli.from('wa_eventos_log')
      .select('received_at, payload')
      .eq('instancia_id', SUPA_CFG.instanciaId).eq('event_type', 'ai.replied')
      .order('id', { ascending:false }).limit(1).maybeSingle();
    setStats({ replied: replied||0, errors: errors||0, lastReply: last });
  }, []);

  useEffect(() => { carregar(); }, [carregar]);

  const salvar = async () => {
    setSalvando(true);
    try {
      const cli = getSupa();
      // .select() no fim devolve as linhas atualizadas · se for [], significa
      // que RLS bloqueou silenciosamente o UPDATE
      const { data, error } = await cli.from('wa_instancias').update({
        ai_prompt: form.ai_prompt,
        ai_model: form.ai_model,
        ai_enabled_global: form.ai_enabled_global,
        ai_typing_enabled: form.ai_typing_enabled,
        ai_thinking_seconds: form.ai_thinking_seconds,
        ai_split_enabled: form.ai_split_enabled,
        ai_reading_seconds: form.ai_reading_seconds,
      }).eq('id', SUPA_CFG.instanciaId).select();
      if (error) throw error;
      if (!data || data.length === 0) {
        throw new Error('Banco aceitou mas nao salvou nenhuma linha. Provavelmente RLS bloqueou o UPDATE · rode a SQL de "wa_inst_anon_write" no editor.');
      }
      showToast?.('Configuração da IA salva ✓', 'success');
      carregar();
    } catch (e) {
      showToast?.('Erro ao salvar: ' + (e.message || e), 'error');
    } finally { setSalvando(false); }
  };

  const testar = async () => {
    if (!testInput.trim()) return;
    setTestando(true); setTestOutput(null);
    try {
      // Chama Claude direto via Anthropic (so pra teste) · usa o prompt do form atual
      // Por seguranca a key nao esta no browser, entao chamamos via wa-proxy "fake":
      // criamos uma rota especial que faz isso. Por enquanto: salva e testa via WhatsApp real.
      // Workaround: simula chamando o wa-ia-responder com um payload fake.
      const res = await fetch(`${SUPA_CFG.url}/functions/v1/wa-ia-responder`, {
        method: 'POST',
        headers: { 'content-type':'application/json', apikey: SUPA_CFG.publishableKey, authorization: `Bearer ${SUPA_CFG.publishableKey}` },
        body: JSON.stringify({
          record: {
            instancia_id: SUPA_CFG.instanciaId,
            message_id: '__test__' + Date.now(),
            chat_jid: '__test__@dryrun',
            from_me: false,
            ia_generated: false,
            kind: 'text',
            text: testInput,
          },
        }),
      });
      const out = await res.json();
      setTestOutput(out);
    } catch (e) {
      setTestOutput({ error: e.message });
    } finally { setTestando(false); }
  };

  if (loading) return <div style={{padding:20, color:'var(--t2)'}}>Carregando…</div>;
  if (!cfg) return <div style={{padding:20, color:'#ff8585'}}>Não conseguiu carregar a instância no Supabase.</div>;

  const modelos = [
    { v:'claude-sonnet-4-5', l:'Sonnet 4.5 (qualidade alta · ~R$ 0,02 por resposta)' },
    { v:'claude-haiku-4-5',  l:'Haiku 4.5 (rápido e barato · ~R$ 0,005 por resposta)' },
    { v:'claude-opus-4-5',   l:'Opus 4.5 (top tier · ~R$ 0,10 por resposta)' },
  ];

  return (
    <div style={{display:'flex', flexDirection:'column', gap:18}}>
      <div>
        <div className="card__title" style={{marginBottom:6, display:'flex', alignItems:'center', gap:8}}>
          <Icon name="Sparkles" size={16} style={{color:'var(--purple)'}}/>
          Configuração da IA · {cfg.nome}
        </div>
        <div style={{fontSize:13, color:'var(--t2)'}}>O Claude responde automaticamente mensagens recebidas no WhatsApp dessa instância. Mudanças aqui afetam todas as conversas (a menos que você tenha desativado a IA num chat específico).</div>
      </div>

      {/* Stats */}
      <div style={{display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:10}}>
        {[
          {l:'Respostas enviadas', v: stats.replied.toLocaleString('pt-BR'), c:'#1D9E75'},
          {l:'Erros', v: stats.errors.toLocaleString('pt-BR'), c: stats.errors > 0 ? '#A32D2D' : 'var(--t3)'},
          {l:'Última resposta', v: stats.lastReply ? new Date(stats.lastReply.received_at).toLocaleString('pt-BR') : '–', c:'var(--t2)'},
        ].map((s,i) => (
          <div key={i} style={{padding:'14px 16px', background:'var(--bg-3)', borderRadius:10, border:'1px solid var(--border-soft)'}}>
            <div style={{fontSize:10.5, color:'var(--t3)', fontFamily:'var(--f-m)', textTransform:'uppercase', letterSpacing:'.06em'}}>{s.l}</div>
            <div style={{fontSize:18, fontFamily:'var(--f-d)', fontWeight:600, color:s.c, marginTop:4}}>{s.v}</div>
          </div>
        ))}
      </div>

      {/* Toggle global */}
      <div style={{display:'flex', alignItems:'center', gap:14, padding:'14px 18px', background:'var(--bg-3)', borderRadius:10, border:'1px solid var(--border-soft)'}}>
        <div style={{flex:1}}>
          <div style={{fontWeight:600, fontSize:14, color:'var(--t1)'}}>IA ativa nesta instância</div>
          <div style={{fontSize:12, color:'var(--t3)', marginTop:2}}>Quando OFF, nenhuma mensagem recebida vai disparar o Claude. Use pra pausar tudo de uma vez (ex: fim de semana, manutenção).</div>
        </div>
        <button onClick={() => setForm(f => ({...f, ai_enabled_global: !f.ai_enabled_global}))} style={{
          width:46, height:26, borderRadius:999,
          background: form.ai_enabled_global ? 'var(--wa-green)' : 'rgba(110,110,120,.4)',
          border:'none', cursor:'pointer', position:'relative', transition:'background .2s',
        }}>
          <div style={{

        </div>
        <div style={{display:'flex', gap:8}}>
          <input style={inp} value={testInput} onChange={e=>setTestInput(e.target.value)} placeholder="Digite uma mensagem de teste"/>
          <button onClick={testar} disabled={testando} className="btn btn-outline" style={{flexShrink:0}}>
            {testando ? 'Testando…' : 'Testar'}
          </button>
        </div>
        {testOutput && (
          <div style={{marginTop:12, padding:12, background:'var(--bg-3)', borderRadius:8, fontSize:13, color:'var(--t1)', fontFamily:'var(--f-m)', whiteSpace:'pre-wrap', maxHeight:240, overflowY:'auto'}}>
            {testOutput.replied
              ? <><div style={{fontSize:10, color:'var(--t3)', marginBottom:6, textTransform:'uppercase'}}>Resposta da IA</div><div>{testOutput.replied}</div></>
              : testOutput.skipped
              ? <span style={{color:'#BA7517'}}>Pulou: {testOutput.skipped}</span>
              : testOutput.error
              ? <span style={{color:'#ff8585'}}>Erro: {testOutput.error || JSON.stringify(testOutput.detail)}</span>
              : <pre style={{margin:0}}>{JSON.stringify(testOutput, null, 2)}</pre>}
          </div>
        )}
      </div>
    </div>
  );
}

function Config() {

  const [foto, setFoto] = useState(() => getUserPhoto());

  // Inputs CONTROLADOS pelo perfil reativo: ao salvar, o store atualiza,
  // o evento brava_perfil_changed dispara e o campo reflete o valor salvo
  const perfilStore = useUserPerfil();
  const [perfilForm, setPerfilForm] = useState({
    nome: perfilStore.nome, cargo: perfilStore.cargo,
    email: perfilStore.email, telefone: perfilStore.telefone,
  });
  // Quando o store muda (saved!), reflete nos inputs
  useEffect(() => {
    setPerfilForm({
      nome: perfilStore.nome, cargo: perfilStore.cargo,
      email: perfilStore.email, telefone: perfilStore.telefone,
    });
  }, [perfilStore.nome, perfilStore.cargo, perfilStore.email, perfilStore.telefone]);
  const setPF = (k,v) => setPerfilForm(p => ({...p, [k]:v}));

  const onSelectFile = (file) => {
    if (!file) return;
    if (!file.type.startsWith('image/')) { setMsg('Arquivo precisa ser uma imagem.'); return; }
    if (file.size > 5 * 1024 * 1024) { setMsg('Imagem muito grande (máx 5MB).'); return; }
    setSalvando(true); setMsg('');
    const reader = new FileReader();
    reader.onload = e => {
      const dataUrl = e.target.result;
      setFoto(dataUrl);
      setUserPhoto(dataUrl);
      setSalvando(false);
      setMsg('Foto atualizada com sucesso.');
      setTimeout(() => setMsg(''), 3000);
    };
    reader.onerror = () => { setSalvando(false); setMsg('Erro ao ler arquivo.'); };
    reader.readAsDataURL(file);
  };

  const onRemove = () => {
    if (!confirm('Remover sua foto de perfil?')) return;
    setFoto(null);
    setUserPhoto(null);
    setMsg('Foto removida.');

/* ─── Toast system (global) ─── */
let toastSetters = [];
function showToast(msg, tipo='success') {
  toastSetters.forEach(fn => fn(msg, tipo));
}

function ToastContainer() {
  const [toasts, setToasts] = useState([]);
  useEffect(() => {
    const fn = (msg, tipo) => {
      const id = Date.now() + Math.random();
      setToasts(t => [...t, {id, msg, tipo}]);
      setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
    };
    toastSetters.push(fn);
    return () => { toastSetters = toastSetters.filter(f => f !== fn); };
  }, []);
  const cores = {success:'#1D9E75', warn:'#BA7517', error:'#A32D2D', info:'#1E90FF'};
  const icones = {success:'Check', warn:'AlertTriangle', error:'AlertCircle', info:'Info'};

function useKeyboardShortcuts({ setNovoCliente, setShortcutsOpen }) {
  useEffect(() => {
    const onKey = e => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key === '/') { e.preventDefault(); document.querySelector('.header__search input')?.focus(); }
      else if (e.key === 'n') { e.preventDefault(); setNovoCliente(true); }
      else if (e.key === '?') { e.preventDefault(); setShortcutsOpen(v => !v); }
      else if (e.key === 'Escape') { setShortcutsOpen(false); }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [setNovoCliente, setShortcutsOpen]);
}

/* ─── Store MRR — Supabase (tabela projetos) ────────────────────────
   Substituiu o store localStorage anterior.
   __id = campo id do Supabase (UUID) para compatibilidade com o componente MRR.

   Mapeamentos:
   DB  implementacao        → UI impl
   DB  vencimento_dia (int) → UI dia (string "Dia 30" ou "")
   DB  id (uuid)            → UI __id
*/

// DB → UI
function _mrrFromDB(r) {
  return {
    ...r,
    __id:   r.id,
    impl:   parseFloat(r.implementacao)  || 0,
    mensal: parseFloat(r.mensal)         || 0,
    dia:    r.vencimento_dia ? `Dia ${r.vencimento_dia}` : '',
  };
}

// UI patch → DB patch (remove campos UI-only, normaliza nomes)
function _mrrToDB(patch) {
  const out = { ...patch };
  if ('impl'   in out) { out.implementacao = parseFloat(out.impl) || 0;  delete out.impl; }
  if ('dia'    in out) {
    const n = parseInt(String(out.dia || '').replace(/\D/g,''));
    out.vencimento_dia = isNaN(n) || n < 1 || n > 31 ? null : n;
    delete out.dia;
  }
  // Remove campos que só existem no UI
  delete out.__id; delete out.id; delete out.created_at; delete out.updated_at;
  return out;
}

/* ═══════════════════════════════════════════════════════════════════
   Sprint K: helper central de evento cross-component
   Toda mutation (add/edit/delete) dispara brava:{tabela}_changed.
   Hooks de listagem escutam e re-load.
   Garante propagação total mesmo se realtime do Supabase atrasar.
   ═══════════════════════════════════════════════════════════════════ */
function _bravaEmit(tabela, payload = {}) {
  try {
    window.dispatchEvent(new CustomEvent(`brava:${tabela}_changed`, { detail: payload }));
    // Event genérico pra dashboards/loggers
    window.dispatchEvent(new CustomEvent('brava:db_changed', { detail: { tabela, ...payload } }));
  } catch {}
}
// Hook utilitário: re-roda load() quando recebe brava:{tabela}_changed
function useBravaChangeListener(tabela, load) {
  React.useEffect(() => {
    const handler = () => load?.();
    const evt = `brava:${tabela}_changed`;
    window.addEventListener(evt, handler);
    return () => window.removeEventListener(evt, handler);
  }, [tabela, load]);
}

/* ─── Store EXTRATO BANCÁRIO — Supabase (tabela fin_extrato_bancario) ─── */

// Normaliza descrição pra calcular hash de dedup determinístico (espaços, case, acentos)
function _normalizeDesc(s) {
  return (s || '')
    .normalize('NFD').replace(/[̀-ͯ]/g, '')   // tira acentos
    .toLowerCase()
    .replace(/[^a-z0-9 ]/g, ' ')                          // só alfanum + espaço
    .replace(/\s+/g, ' ').trim();
}

// SHA-1 via Web Crypto (síncrono no caller via await)
async function _sha1(text) {
  const buf = new TextEncoder().encode(text);
  const hash = await crypto.subtle.digest('SHA-1', buf);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function calcHashLancamento({ data, valor, descricao }) {
  const norm = `${data}|${Number(valor).toFixed(2)}|${_normalizeDesc(descricao)}`;
  return _sha1(norm);
}

// Insert em batch com upsert por hash_dedup (ignora duplicados automaticamente)
// Retorna { inseridos, duplicados }
async function importarExtratoLancamentos(rows) {
  const cli = getSupa(); if (!cli) return { inseridos: 0, duplicados: 0, erro: 'Sem conexão' };
  const { data: sess } = await cli.auth.getSession();
  const userId = sess?.session?.user?.id || null;
  // Garante hash em todos
  const prepped = [];
  for (const r of rows) {
    const hash = r.hash_dedup || await calcHashLancamento(r);
    prepped.push({
      data: r.data,
      descricao: r.descricao,
      valor: Number(r.valor),
      saldo_apos: r.saldo_apos ?? null,
      banco: r.banco || null,
      agencia: r.agencia || null,
      conta: r.conta || null,
      hash_dedup: hash,
      importado_por: userId,
    });
  }
  // Upsert com onConflict hash_dedup → duplicados são silenciosamente ignorados
  const { data, error } = await cli.from('fin_extrato_bancario')
    .upsert(prepped, { onConflict: 'hash_dedup', ignoreDuplicates: true })
    .select('id, hash_dedup');
  if (error) return { inseridos: 0, duplicados: 0, erro: error.message };
  const inseridos = (data || []).length;
  return { inseridos, duplicados: prepped.length - inseridos };
}

// ─── Indicador visual de Realtime: pisca verde quando recebe mudança ───
// Mostra "● live" no header. Confirma visualmente que o sistema está
// sincronizando entre abas em tempo real (Sprint H).
function RealtimeIndicator() {
  const [piscando, setPiscando] = React.useState(false);
  const [ultima, setUltima] = React.useState(null); // nome da tabela
  const [conectado, setConectado] = React.useState(false);
  React.useEffect(() => {
    const cli = getSupa(); if (!cli) return;
    const tabelas = [
      'projetos','projeto_pagamentos','clientes','fin_extrato_bancario',
      'fin_caixa_lancamentos','fin_despesas','fin_despesas_pagamentos',
      'projeto_parcelas','fin_status_config','usuarios','etiquetas','chat_etiquetas',
    ];
    let ch = cli.channel('rt:global-pulse');
    tabelas.forEach(t => {
      ch = ch.on('postgres_changes', { event:'*', schema:'public', table:t }, (payload) => {
        setUltima(t);
        setPiscando(true);
        setTimeout(() => setPiscando(false), 700);
      });
    });
    ch.subscribe((status) => {
      setConectado(status === 'SUBSCRIBED');
    });
    return () => { cli.removeChannel(ch); };
  }, []);
  const cor = !conectado ? '#6E6E78' : (piscando ? '#1D9E75' : '#1D9E75');
  return (
    <div title={conectado ? (ultima ? `Última mudança: ${ultima}` : 'Sincronizando em tempo real') : 'Desconectado do realtime'}
      style={{
        display:'flex', alignItems:'center', gap:6, padding:'4px 10px',
        borderRadius:999, background:'rgba(29,158,117,.08)',
        border:'1px solid rgba(29,158,117,.20)',
        marginRight:8, marginLeft:6, transition:'all .3s',
      }}>
      <span style={{
        width:7, height:7, borderRadius:'50%', background: cor,
        boxShadow: piscando ? `0 0 8px ${cor}, 0 0 14px ${cor}` : 'none',
        transition:'box-shadow .3s, transform .3s',
        transform: piscando ? 'scale(1.3)' : 'scale(1)',
      }}/>
      <span style={{fontSize:10.5, color:'#F5F5F7', fontWeight:600, letterSpacing:.3, textTransform:'uppercase'}}>
        {conectado ? 'Live' : 'Off'}
      </span>
    </div>
  );
}

// Valida obrigatórios e formata payload pro insert/update
function _clienteValidar(form) {
  const erros = [];
  if (!form.nome?.trim()) erros.push('Nome é obrigatório');
  if (!form.tipo_pessoa) erros.push('Tipo (PJ ou PF) é obrigatório');
  const doc = (form.cnpj_cpf || '').replace(/\D/g, '');
  if (!doc) erros.push(form.tipo_pessoa === 'PF' ? 'CPF é obrigatório' : 'CNPJ é obrigatório');
  else if (form.tipo_pessoa === 'PJ' && doc.length !== 14) erros.push('CNPJ deve ter 14 dígitos');
  else if (form.tipo_pessoa === 'PF' && doc.length !== 11) erros.push('CPF deve ter 11 dígitos');
  const temContato = form.contato_email?.trim() || form.contato_telefone?.trim();
  if (!temContato) erros.push('Informe email OU telefone do contato');
  return { ok: erros.length === 0, erros, cnpj_cpf: doc };
}

async function addCliente(form) {
  const cli = getSupa(); if (!cli) return { ok:false, erro:'Sem conexão' };
  const val = _clienteValidar(form);
  if (!val.ok) return { ok:false, erro: val.erros.join(' · ') };
  const { data: sess } = await cli.auth.getSession();
  const payload = {
    ...form,
    cnpj_cpf: val.cnpj_cpf || null,
    tags: form.tags || [],
    created_by: sess?.session?.user?.id,
  };
  // remove campos vazios pra não validar mal
  Object.keys(payload).forEach(k => { if (payload[k] === '') payload[k] = null; });
  const { data, error } = await cli.from('clientes').insert(payload).select().single();
  if (error) return { ok:false, erro: error.message };
  _bravaEmit('cliente', { op:'insert', id: data?.id });
  return { ok:true, cliente: data };
}

// Autocomplete CEP via ViaCEP (público, sem auth)
async function buscarCep(cep) {
  const c = String(cep || '').replace(/\D/g, '');
  if (c.length !== 8) return null;
  try {
    const res = await fetch(`https://viacep.com.br/ws/${c}/json/`);
    if (!res.ok) return null;
    const data = await res.json();
    if (data.erro) return null;
    return {
      cep: data.cep,
      logradouro: data.logradouro,
      bairro: data.bairro,
      cidade: data.localidade,
      estado: data.uf,
    };
  } catch { return null; }
}

// Lista de "clientes-grupo" agregando seus projetos (contratos)
function useClientesGrupos() {
  const recorrencia = useRecorrencia();
  return React.useMemo(() => {
    const grupos = new Map();
    (recorrencia || []).forEach(r => {
      const grupo = r.cliente_grupo || r.cliente || 'Sem grupo';
      if (!grupos.has(grupo)) {
        grupos.set(grupo, { grupo, projetos: [], mensal_total:0, impl_total:0, valor_total:0 });
      }
      const g = grupos.get(grupo);
      g.projetos.push(r);
      g.mensal_total += Number(r.mensal || 0);
      g.impl_total   += Number(r.impl || 0);
      g.valor_total  += Number(r.mensal || 0) + Number(r.impl || 0);
    });
    return Array.from(grupos.values()).sort((a,b) => b.valor_total - a.valor_total);
  }, [recorrencia]);
}

// Upload de arquivo (PDF/DOC/imagem) pro bucket mrr-anexos + cadastra na tabela
async function uploadAnexoProjeto(projetoId, file, categoria) {
  const cli = getSupa(); if (!cli) return null;
  if (file.size > 25 * 1024 * 1024) { showToast?.('Arquivo > 25MB', 'error'); return null; }
  const { data: sess } = await cli.auth.getSession();
  const userId = sess?.session?.user?.id;
  const ext = file.name.split('.').pop()?.toLowerCase() || 'bin';
  const path = `${projetoId}/${Date.now()}_${Math.random().toString(36).slice(2,8)}.${ext}`;
  const { error: upErr } = await cli.storage.from('mrr-anexos').upload(path, file, { cacheControl:'3600', upsert:false, contentType: file.type });
  if (upErr) { showToast?.('Erro upload: '+upErr.message,'error'); return null; }
  // Pra bucket privado, gera signed URL com validade 1 ano
  const { data: signed } = await cli.storage.from('mrr-anexos').createSignedUrl(path, 60*60*24*365);
  const url = signed?.signedUrl;
  if (!url) { showToast?.('Erro ao gerar URL', 'error'); return null; }
  const { data, error } = await cli.from('projeto_anexos').insert({
    projeto_id: projetoId, tipo:'file', nome: file.name, url, mime: file.type,
    tamanho_bytes: file.size, storage_path: path, categoria: categoria || 'Outro',
    uploaded_by: userId,
  }).select().single();
  if (error) { showToast?.('Erro cadastro: '+error.message,'error'); return null; }
  _bravaEmit('anexo', { op:'insert', id: data?.id, projeto_id: projetoId });
  return data;
}

// Lista de sugestões pendentes (score 50-84%) + lançamentos sem sugestão (< 50% / nenhum match)
function useConciliacoesPendentes() {
  const [pendentes, setPendentes] = React.useState([]);     // [{ extrato, sugestoes:[...] }]
  React.useEffect(() => {
    const cli = getSupa(); if (!cli) return;
    let alive = true;
    const load = async () => {
      // 1. Lançamentos do extrato não conciliados nem ignorados
      const { data: extratos } = await cli.from('fin_extrato_bancario')
        .select('*')
        .is('conciliado_pagamento_id', null)
        .is('conciliado_despesa_pagamento_id', null)
        .is('conciliado_caixa_id', null)
        .eq('ignorado', false)
        .order('data', { ascending: false });
      if (!alive) return;
      const extratoIds = (extratos || []).map(e => e.id);
      // 2. Sugestões pendentes pra esses lançamentos
      const { data: sugs } = extratoIds.length > 0
        ? await cli.from('fin_conciliacao_sugestao')
            .select('*')
            .in('extrato_id', extratoIds)
            .eq('status', 'pendente')
            .order('score', { ascending: false })
        : { data: [] };
      if (!alive) return;
      // 3. Agrupa por extrato_id
      const byExtrato = new Map((extratos || []).map(e => [e.id, { extrato: e, sugestoes: [] }]));
      (sugs || []).forEach(s => {
        if (byExtrato.has(s.extrato_id)) byExtrato.get(s.extrato_id).sugestoes.push(s);
      });
      setPendentes(Array.from(byExtrato.values()));
    };
    load();
    const ch = cli.channel('rt:fin_concil_pendentes')
      .on('postgres_changes', { event:'*', schema:'public', table:'fin_extrato_bancario' }, load)
      .on('postgres_changes', { event:'*', schema:'public', table:'fin_conciliacao_sugestao' }, load)
      .subscribe();
    return () => { alive = false; cli.removeChannel(ch); };
  }, []);
  return pendentes;
}

// Converte data BR (DD/MM/AAAA) ou Date pra ISO (YYYY-MM-DD)
function _toIsoDate(v) {
  if (!v) return null;
  if (v instanceof Date) return v.toISOString().slice(0,10);
  const s = String(v).trim();
  // DD/MM/AAAA
  const m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  // Já no formato ISO?
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
  return null;
}

/* Parser de extrato XLSX (client-side via SheetJS).
   Detecta automaticamente o layout do BS2 (Banco 208) e bancos similares.
   File NUNCA sai do browser — tudo processado localmente.
   Retorna: { meta: {banco, agencia, conta, periodo}, rows: [{data, descricao, valor, saldo_apos, hash_dedup}] } */
async function parseExtratoXlsx(file) {
  if (!window.XLSX) throw new Error('Biblioteca XLSX não carregou. Recarregue a página.');
  const ab = await file.arrayBuffer();
  const wb = window.XLSX.read(ab, { type: 'array', cellDates: true });
  const sheetName = wb.SheetNames.find(n => /extrato/i.test(n)) || wb.SheetNames[0];
  const ws = wb.Sheets[sheetName];
  const data = window.XLSX.utils.sheet_to_json(ws, { header: 1, defval: null, raw: true });

  // Extrai metadados do header (linhas 1-12)
  const meta = { banco: null, agencia: null, conta: null, periodo: null };
  let headerRowIdx = -1;
  for (let i = 0; i < Math.min(20, data.length); i++) {
    const row = data[i] || [];
    const txt = row.map(c => c == null ? '' : String(c)).join(' ').toLowerCase();
    if (/banco/i.test(txt) && !meta.banco) {
      const v = row.find((c,j) => j>0 && c != null && String(c).match(/\d+/));
      if (v) meta.banco = String(v);
    }
    if (/ag[êe]ncia/i.test(txt) && !meta.agencia) {
      const v = row.find((c,j) => j>0 && c != null && String(c).match(/\d+/));
      if (v) meta.agencia = String(v);
    }
    if (/conta/i.test(txt) && !meta.conta) {
      const v = row.find((c,j) => j>0 && c != null && String(c).match(/\d+/));
      if (v) meta.conta = String(v);
    }
    // Detecta header da tabela ("Data de lançamento" ou "Data" + "Descrição" + "Valor")
    const cellsLower = row.map(c => (c == null ? '' : String(c)).toLowerCase());
    if (cellsLower.some(c => c.includes('data')) &&
        cellsLower.some(c => c.includes('descri')) &&
        cellsLower.some(c => c.match(/valor|entrad|s[aã]ida|cr[eé]dito|d[eé]bito/i))) {
      headerRowIdx = i;
      break;
    }
  }
  if (headerRowIdx < 0) throw new Error('Não foi possível detectar o cabeçalho do extrato (procurando Data + Descrição + Valor).');

  // Identifica colunas pelo header
  const headerRow = data[headerRowIdx].map(c => (c == null ? '' : String(c)).toLowerCase());
  const idxData  = headerRow.findIndex(c => c.includes('data'));
  const idxDesc  = headerRow.findIndex(c => c.includes('descri'));
  const idxValor = headerRow.findIndex(c => /entrad|s[aã]ida|valor|cr[eé]dito|d[eé]bito/i.test(c));
  const idxSaldo = headerRow.findIndex(c => /saldo/i.test(c));
  if (idxData < 0 || idxDesc < 0 || idxValor < 0) {
    throw new Error('Colunas obrigatórias não encontradas (data/descrição/valor).');
  }

  // Lê as linhas de lançamento + calcula hash
  const rows = [];
  for (let i = headerRowIdx + 1; i < data.length; i++) {
    const r = data[i] || [];
    const dataIso = _toIsoDate(r[idxData]);
    if (!dataIso) continue;
    const desc = r[idxDesc] != null ? String(r[idxDesc]).trim() : '';
    const valorRaw = r[idxValor];
    if (valorRaw == null || valorRaw === '') continue;
    const valor = typeof valorRaw === 'number' ? valorRaw : parseFloat(String(valorRaw).replace(',','.'));
    if (isNaN(valor)) continue;
    const saldo = idxSaldo >= 0 ? (typeof r[idxSaldo] === 'number' ? r[idxSaldo] : null) : null;
    const hash_dedup = await calcHashLancamento({ data: dataIso, valor, descricao: desc });
    rows.push({
      data: dataIso,
      descricao: desc,
      valor,
      saldo_apos: saldo,
      banco: meta.banco,
      agencia: meta.agencia,
      conta: meta.conta,
      hash_dedup,
    });
  }
  return { meta, rows, sheetName };
}

// Algoritmo de match: sugere quais pagamentos/despesas do sistema podem corresponder
// a um lançamento do extrato. Retorna { pagamentos:[], despesas:[] } ordenado por confiança.
function sugerirMatch(lancamentoExtrato, opts) {
  const { recorrencia = [], pagamentos = {}, despesas = [], despesasPag = {} } = opts;
  const { data, valor, descricao } = lancamentoExtrato;
  const isEntrada = valor > 0;
  const valorAbs = Math.abs(Number(valor) || 0);
  const descNorm = _normalizeDesc(descricao);
  const dataMs = new Date(data + 'T00:00:00').getTime();

  const matches = [];

  if (isEntrada) {
    // Procura em projeto_pagamentos: pagamentos com data próxima (±7d) e valor próximo (±2%)
    Object.entries(pagamentos).forEach(([clienteId, meses]) => {
      const cliente = recorrencia.find(r => r.__id === clienteId);
      if (!cliente) return;
      const nomeNorm = _normalizeDesc(cliente.cliente);
      // Score por nome (palavras em comum)
      const palavrasCliente = nomeNorm.split(' ').filter(w => w.length >= 4);
      const nomeMatch = palavrasCliente.some(w => descNorm.includes(w));
      // Pra cada mês pago: testa valor
      Object.entries(meses).forEach(([ym, info]) => {
        if (!info?.pago) return;
        const diffValor = Math.abs(cliente.mensal - valorAbs);
        const diffPercent = diffValor / Math.max(valorAbs, 1);
        if (nomeMatch && diffPercent < 0.05) {
          matches.push({ tipo:'pagamento', cliente_id: clienteId, cliente_nome: cliente.cliente, ym, valor: cliente.mensal, score: 100 - diffPercent*100 });
        } else if (nomeMatch) {
          matches.push({ tipo:'pagamento', cliente_id: clienteId, cliente_nome: cliente.cliente, ym, valor: cliente.mensal, score: 70 });
        }
      });
    });
  } else {
    // Saída: procura em despesas pagas
    Object.entries(despesasPag).forEach(([despId, meses]) => {
      const desp = despesas.find(d => d.id === despId);
      if (!desp) return;
      const nomeNorm = _normalizeDesc(desp.descricao);
      const palavras = nomeNorm.split(' ').filter(w => w.length >= 4);
      const nomeMatch = palavras.some(w => descNorm.includes(w));
      Object.entries(meses).forEach(([ym, info]) => {
        if (!info?.pago) return;
        const valorReal = Number(info.valor_pago ?? desp.valor) || 0;
        const diff = Math.abs(valorReal - valorAbs) / Math.max(valorAbs, 1);
        if (nomeMatch && diff < 0.05) {
          matches.push({ tipo:'despesa_pag', despesa_id: despId, descricao: desp.descricao, ym, valor: valorReal, score: 100 - diff*100 });
        }
      });
    });
  }

  return matches.sort((a,b) => b.score - a.score).slice(0, 5);
}

/* Helpers de competencia/atraso */
const YM = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
const ymToDate = (ym) => { const [y,m] = ym.split('-').map(Number); return new Date(y, m-1, 1); };

// extrai dia numerico de strings tipo "Dia 30", "30", "todo dia 10"
function parseDiaVenc(dia) {
  if (dia == null) return null;
  const m = String(dia).match(/\d+/);
  if (!m) return null;
  const d = parseInt(m[0], 10);
  return (d >= 1 && d <= 31) ? d : null;
}

// Calcula dias de atraso (positivo = atrasado, 0 = vence hoje, negativo = ainda no prazo)
// Retorna null se nao tem cobranca mensal ou dia de vencimento
function diasAtraso(rec, hoje = new Date()) {
  if (!rec || !rec.mensal || rec.mensal <= 0) return null;
  const diaVenc = parseDiaVenc(rec.dia);
  if (!diaVenc) return null;
  const venc = new Date(hoje.getFullYear(), hoje.getMonth(), Math.min(diaVenc, ultimoDiaMes(hoje.getFullYear(), hoje.getMonth())));
  const msDia = 24 * 60 * 60 * 1000;
  const h = new Date(hoje.getFullYear(), hoje.getMonth(), hoje.getDate());
  return Math.round((h - venc) / msDia);
}
const ultimoDiaMes = (y, m) => new Date(y, m+1, 0).getDate();

// Status sintetizado do pagamento do mes atual
// returns: { kind: 'pago'|'pendente'|'atrasado'|'sem-cobranca', dias: number, label, color }
function statusPagamentoMes(rec, pagamentos, hoje = new Date()) {
  if (!rec.mensal || rec.mensal <= 0) return { kind:'sem-cobranca', dias:0, label:'Sem mensalidade', color:'#6E6E78' };
  const diaVenc = parseDiaVenc(rec.dia);
  if (!diaVenc) return { kind:'sem-cobranca', dias:0, label:'Sem vencimento', color:'#6E6E78' };
  const ym = YM(hoje);
  const reg = pagamentos[rec.__id]?.[ym];
  if (reg?.pago) return { kind:'pago', dias:0, label:`Pago em ${formatBR(reg.data)}`, color:'#1D9E75' };
  const d = diasAtraso(rec, hoje);
  if (d < 0)  return { kind:'pendente', dias:-d, label:`Vence em ${-d} ${-d===1?'dia':'dias'}`, color:'#BA7517' };
  if (d === 0) return { kind:'pendente', dias:0, label:'Vence hoje', color:'#BA7517' };
  return { kind:'atrasado', dias:d, label:`Atrasado ${d} ${d===1?'dia':'dias'}`, color:'#A32D2D' };
}
const formatBR = (iso) => { if (!iso) return ''; const [y,m,d] = iso.split('-'); return `${d}/${m}/${y.slice(2)}`; };
const hojeISO = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };

/* ─── Projeção MRR 12 meses (empilhada por status) — agora data-driven ─── */
function ProjecaoMRR({ data }) {
  const corStatus = { 'Em Prod':'#1D9E75', 'Ativo':'#1E90FF', 'Implementação':'#7B3FE4', 'Comercial':'#BA7517', 'Proposta Apresentada':'#A32D2D', 'Em breve':'#6E6E78' };
  const statusOrdem = ['Em Prod','Ativo','Implementação','Comercial','Proposta Apresentada','Em breve'];

  // Gera 13 meses começando 5 meses atrás → fim 8 meses no futuro (mês atual fica no meio)
  const hoje = new Date();
  const mesesArr = React.useMemo(() => {
    const arr = [];
    const monthsBack = 4; // 4 meses pra trás + atual + 8 meses adiante
    for (let i = -monthsBack; i <= 8; i++) {
      const d = new Date(hoje.getFullYear(), hoje.getMonth() + i, 1);
      arr.push({
        date: d,
        offset: i,
        label: d.toLocaleDateString('pt-BR', { month: 'short' }).replace('.','') +
               (d.getFullYear() !== hoje.getFullYear() ? '/' + String(d.getFullYear()).slice(2) : ''),
      });
    }
    return arr;
  }, [hoje.getMonth(), hoje.getFullYear()]);
  const mesAtualIdx = mesesArr.findIndex(m => m.offset === 0);

  const lista = data || [];
  const mrrPorStatus = {};
  lista.forEach(r => {
    if (!r.mensal) return;
    mrrPorStatus[r.status] = (mrrPorStatus[r.status] || 0) + r.mensal;
  });

  // Cronograma calculado pelo offset (não hardcoded por mês do ano).
  // Hipóteses:
  // - Em Prod / Ativo: 100% faturam todos os meses (faturamento atual). No passado escalonam (curva de crescimento).
  // - Implementação: começam a faturar 2 meses adiante (entrega ~60d), 30% / 65% / 100%.
  // - Comercial: pipeline com conversão de ~50% em 4 meses (10/25/40/50/50/50/50/50/50).
  // - Proposta Apresentada: conversão ~40% em 4 meses.
  // - Em breve: conversão ~30% em 6 meses.
  const fatorPara = (statusIdx, offset) => {
    if (statusIdx === 0 || statusIdx === 1) { // Em Prod / Ativo
      if (offset < 0) return Math.max(0.55, 1 + offset * 0.10); // curva ascendente passada
      return 1.0;
    }
    if (statusIdx === 2) { // Implementação — começa 2 meses adiante
      if (offset < 2) return 0;
      if (offset === 2) return 0.30;
      if (offset === 3) return 0.65;
      return 1.0;
    }
    if (statusIdx === 3) { // Comercial — conversão lenta
      if (offset <= 0) return 0;
      const tabela = [0, 0.10, 0.25, 0.40, 0.50, 0.50, 0.55, 0.55, 0.60];
      return tabela[Math.min(offset, tabela.length - 1)];
    }
    if (statusIdx === 4) { // Proposta Apresentada — conversão média
      if (offset <= 0) return 0;
      const tabela = [0, 0.05, 0.15, 0.30, 0.40, 0.40, 0.40, 0.45, 0.45];
      return tabela[Math.min(offset, tabela.length - 1)];
    }
    if (statusIdx === 5) { // Em breve — conversão lenta
      if (offset <= 0) return 0;
      const tabela = [0, 0, 0, 0.10, 0.20, 0.30, 0.30, 0.35, 0.40];
      return tabela[Math.min(offset, tabela.length - 1)];
    }
    return 0;
  };

  const dados = mesesArr.map((m, idx) => {
    const stack = {};
    let total = 0;
    statusOrdem.forEach((st, i) => {
      const valor = Math.round((mrrPorStatus[st] || 0) * fatorPara(i, m.offset));
      if (valor > 0) { stack[st] = valor; total += valor; }
    });
    return { mes: m.label, total, stack, eAtual: idx === mesAtualIdx, ePassado: idx < mesAtualIdx, eFuturo: idx > mesAtualIdx };
  });

  const maxTotal = Math.max(1, ...dados.map(d => d.total));
  const totalAcumulado = dados.slice(mesAtualIdx).reduce((s,d) => s + d.total, 0);
  const ultimoIdx = dados.length - 1;
  const projUltimo = dados[ultimoIdx].total;
  const mrrHoje = dados[mesAtualIdx].total || 1;
  const crescimento = Math.round(((projUltimo - mrrHoje) / mrrHoje) * 100);

  return (
    <div className="card" style={{marginBottom:14, padding:'22px 24px'}}>
      <div className="card__head" style={{marginBottom:18}}>
        <div>
          <div className="card__title" style={{fontSize:15}}>Projeção de receita recorrente · {dados.length} meses</div>
          <div style={{fontSize:12, color:'var(--t3)', marginTop:3}}>Considera entrada gradual dos contratos em implantação e conversão do funil comercial</div>
        </div>
        <div style={{display:'flex', gap:14, alignItems:'center'}}>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:11, color:'var(--t3)', fontFamily:'var(--f-m)', textTransform:'uppercase', letterSpacing:'.05em'}}>Receita prevista · {dados[ultimoIdx].mes}</div>
            <div style={{fontFamily:'var(--f-d)', fontSize:22, fontWeight:700, color:'#1D9E75', letterSpacing:'-.02em', marginTop:2}}>R$ {projUltimo.toLocaleString('pt-BR')}</div>
          </div>
          <div style={{width:1, height:38, background:'var(--border-soft)'}}/>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:11, color:'var(--t3)', fontFamily:'var(--f-m)', textTransform:'uppercase', letterSpacing:'.05em'}}>Crescimento esperado</div>
            <div style={{fontFamily:'var(--f-d)', fontSize:22, fontWeight:700, background:'var(--grad)', WebkitBackgroundClip:'text', backgroundClip:'text', WebkitTextFillColor:'transparent', letterSpacing:'-.02em', marginTop:2}}>{crescimento >= 0 ? '+' : ''}{crescimento}%</div>
          </div>
          <div style={{width:1, height:38, background:'var(--border-soft)'}}/>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:11, color:'var(--t3)', fontFamily:'var(--f-m)', textTransform:'uppercase', letterSpacing:'.05em'}}>Total previsto a entrar</div>
            <div style={{fontFamily:'var(--f-d)', fontSize:22, fontWeight:700, color:'var(--t1)', letterSpacing:'-.02em', marginTop:2}}>R$ {totalAcumulado.toLocaleString('pt-BR')}</div>
          </div>
        </div>
      </div>

      {/* Gráfico empilhado */}
      <div style={{display:'flex', alignItems:'flex-end', gap:8, height:220, padding:'0 4px', position:'relative'}}>
        {/* Linha pontilhada do mês atual */}
        <div style={{
          position:'absolute', left:`${(mesAtualIdx+0.5)/dados.length*100}%`, top:0, bottom:24,
          borderLeft:'2px dashed var(--blue)', opacity:.5, pointerEvents:'none'
        }}/>

        {dados.map((d, i) => {
          const altura = (d.total / maxTotal) * 100;
          return (
            <div key={i} style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:6, height:'100%'}}>
              {/* Valor topo */}
              <div style={{
                fontFamily:'var(--f-m)', fontSize:9.5,
                color: d.eAtual ? 'var(--blue)' : d.eFuturo ? 'var(--t3)' : 'var(--t2)',
                fontWeight: d.eAtual ? 700 : 500,
                opacity: d.total > 0 ? 1 : 0,
              }}>
                {d.total >= 1000 ? `${(d.total/1000).toFixed(1)}k` : d.total}
              </div>

              {/* Barra empilhada */}
              <div style={{flex:1, width:'100%', display:'flex', flexDirection:'column', justifyContent:'flex-end', position:'relative'}}>
                <div style={{
                  width:'100%', height:`${altura}%`, minHeight:4,
                  display:'flex', flexDirection:'column-reverse',
                  borderRadius:'5px 5px 0 0', overflow:'hidden',
                  border: d.eAtual ? '2px solid var(--blue)' : 'none',
                  boxShadow: d.eAtual ? '0 0 12px rgba(30,144,255,.4)' : 'none',
                  transition:'opacity .2s',
                  opacity: d.eFuturo ? 0.85 : 1,
                  cursor:'default',
                }}
                  title={`${d.mes} · R$ ${d.total.toLocaleString('pt-BR')}\n${Object.entries(d.stack).map(([k,v]) => `${k}: R$ ${v.toLocaleString('pt-BR')}`).join('\n')}`}
                >
                  {statusOrdem.map(st => d.stack[st] ? (
                    <div key={st} style={{
                      width:'100%',
                      height:`${(d.stack[st]/d.total)*100}%`,
                      background: corStatus[st],
                    }}/>
                  ) : null)}
                </div>
              </div>

              {/* Mês */}
              <div style={{
                fontFamily:'var(--f-m)', fontSize:10,
                color: d.eAtual ? 'var(--blue)' : 'var(--t3)',
                fontWeight: d.eAtual ? 700 : 500,
              }}>{d.mes}</div>
            </div>
          );
        })}
      </div>

      {/* Legenda */}
      <div style={{display:'flex', gap:18, marginTop:18, paddingTop:14, borderTop:'1px solid var(--border-soft)', flexWrap:'wrap', alignItems:'center'}}>
        {statusOrdem.map(st => {
          const total = lista.filter(r => r.status === st).reduce((s,r) => s+r.mensal, 0);
          if (total === 0) return null;
          return (
            <div key={st} style={{display:'flex', alignItems:'center', gap:6}}>
              <div style={{width:12, height:12, borderRadius:3, background:corStatus[st]}}/>
              <span style={{fontSize:12, color:'var(--t2)', fontWeight:500}}>{st}</span>
              <span style={{fontSize:11, color:'var(--t3)', fontFamily:'var(--f-m)'}}>R$ {total.toLocaleString('pt-BR')}/mês</span>
            </div>
          );
        })}
        <div style={{marginLeft:'auto', display:'flex', alignItems:'center', gap:6, fontSize:11, color:'var(--t3)'}}>
          <div style={{width:14, height:0, borderTop:'2px dashed var(--blue)'}}/>
          <span>Mês atual ({dados[mesAtualIdx]?.mes || '—'})</span>
        </div>
      </div>
    </div>
  );
}
