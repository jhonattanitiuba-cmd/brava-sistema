<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Brava Company © Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ─── Tokens fixos ─── */
:root {
  --purple:#7B3FE4; --blue:#1E90FF;
  --grad:linear-gradient(90deg,#7B3FE4 0%,#1E90FF 100%);
  --success:#1D9E75; --warning:#BA7517; --danger:#A32D2D; --info:#185FA5;
  --f-d:"Space Grotesk",sans-serif; --f-b:"Inter",sans-serif; --f-m:"JetBrains Mono",monospace;
  --sidebar:240px; --header:60px;
}

/* ─── Modo escuro (default) ─── */
:root, [data-theme="dark"] {
  --bg:#000000; --bg-1:#0E0E14; --bg-2:#15151E; --bg-3:#1B1B27;
  --border:#2A2A3A; --border-soft:#1F1F2A;
  --t1:#F5F5F7; --t2:#A0A0AA; --t3:#6E6E78;
  --shadow:0 1px 0 rgba(255,255,255,.04) inset,0 8px 24px rgba(0,0,0,.45);
  --logo:url("app/brava-logo-white.png");
}

/* ─── Modo claro ─── */
[data-theme="light"] {
  --bg:#F0F0F0; --bg-1:#F0F0F0; --bg-2:#FFFFFF; --bg-3:#F5F5F5;
  --border:#D8D8D8; --border-soft:#E6E6E6;
  --t1:#0A0A0F; --t2:#4A4A52; --t3:#8E8E94;
  --shadow:0 1px 2px rgba(20,20,40,.06),0 6px 20px rgba(20,20,40,.06);
  --logo:url("app/brava-logo-dark.png");
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:var(--f-b);font-size:15px;-webkit-font-smoothing:antialiased;transition:background .2s,color .2s;}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,select,textarea{font:inherit;color:inherit;}
a{color:inherit;text-decoration:none;}
svg{display:block;flex-shrink:0;}

/* ─── WhatsApp tokens ─── */
:root, [data-theme="dark"] {
  --wa-sidebar-bg:    #111B21;
  --wa-sidebar-hover: rgba(255,255,255,.05);
  --wa-header-bg:     #202C33;
  --wa-chat-bg:       #0B141A;
  --wa-input-bg:      #202C33;
  --wa-msg-out-bg:    #005C4B;
  --wa-msg-in-bg:     #202C33;
  --wa-msg-out-text:  #E9EDEF;
  --wa-msg-in-text:   #E9EDEF;
  --wa-text-primary:  #E9EDEF;
  --wa-text-secondary:#8696A0;
  --wa-border:        #313D45;
  --wa-search-bg:     #2A3942;
  --wa-active-bg:     #2A3942;
  --wa-green:         #25D366;
  --wa-green-dark:    #00A884;
  --wa-unread-bg:     #00A884;
}
[data-theme="light"] {
  --wa-sidebar-bg:    #F0F2F5;
  --wa-sidebar-hover: rgba(0,0,0,.04);
  --wa-header-bg:     #F0F2F5;
  --wa-chat-bg:       #EFEAE2;
  --wa-input-bg:      #F0F2F5;
  --wa-msg-out-bg:    #D9FDD3;
  --wa-msg-in-bg:     #FFFFFF;
  --wa-msg-out-text:  #111B21;
  --wa-msg-in-text:   #111B21;
  --wa-text-primary:  #111B21;
  --wa-text-secondary:#667781;
  --wa-border:        #D1D7DB;
  --wa-search-bg:     #FFFFFF;
  --wa-active-bg:     #FFFFFF;
  --wa-green:         #25D366;
  --wa-green-dark:    #128C7E;
  --wa-unread-bg:     #25D366;
}

/* ─── Layout ─── */
.app{display:grid;grid-template-columns:var(--sidebar) 1fr;grid-template-rows:var(--header) 1fr;height:100vh;overflow:hidden;}

/* ─── Sidebar — sempre preta ─── */
.sidebar{
  grid-row:1/-1;
  background:#000000;
  border-right:1px solid #1F1F2A;
  display:flex;flex-direction:column;
  overflow:hidden;
  transition:width .25s cubic-bezier(.22,1,.36,1);
}
.sidebar.collapsed{width:0;overflow:hidden;border-right:none;}

.sidebar__nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 10px;border-radius:10px;
  font-size:13.5px;color:#A0A0AA;font-weight:500;
  cursor:pointer;transition:background .15s,color .15s;
  position:relative;
}
.nav-item:hover{background:rgba(255,255,255,.06);color:#F5F5F7;}
.nav-item.active{
  background:rgba(123,63,228,.18);
  color:#F5F5F7;
}
.nav-item.active::before{
  content:'';position:absolute;left:0;top:20%;bottom:20%;
  width:2.5px;border-radius:999px;
  background:var(--grad);
}
.nav-badge{
  margin-left:auto;min-width:18px;height:18px;
  padding:0 5px;border-radius:999px;
  background:var(--grad);color:#fff;
  font-family:var(--f-m);font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
}
.nav-divider{height:1px;background:#1F1F2A;margin:8px 10px;}
.nav-item.danger:hover{background:rgba(163,45,45,.18);color:#fca5a5;}

/* ─── Header ─── */
/* ─── Header — sempre preto ─── */
.header{
  background:#000000;
  border-bottom:1px solid #1F1F2A;
  display:flex;align-items:center;gap:16px;
  padding:0 28px;
}
.header__breadcrumb{flex:1;display:flex;align-items:center;gap:8px;font-size:13px;color:#6E6E78;}
.header__breadcrumb span{color:#F5F5F7;font-weight:600;}
.header__search{
  display:flex;align-items:center;gap:8px;
  padding:7px 14px;
  background:#0E0E14;border:1px solid #2A2A3A;border-radius:8px;
  font-size:13px;color:#6E6E78;
  width:260px;white-space:nowrap;flex-shrink:0;
  cursor:text;transition:border-color .15s;
}
.header__search:hover{border-color:#A0A0AA;}
.header__actions{display:flex;align-items:center;gap:8px;}
.header__icon{
  width:34px;height:34px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  color:#A0A0AA;cursor:pointer;transition:background .15s,color .15s;
  position:relative;
}
.header__icon:hover{background:#1B1B27;color:#F5F5F7;}
.header__notif{
  position:absolute;top:5px;right:5px;
  width:8px;height:8px;border-radius:50%;
  background:var(--purple);border:2px solid #000;
}
.header__avatar{
  width:32px;height:32px;border-radius:50%;
  background:var(--grad);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--f-d);font-weight:700;font-size:12px;color:#fff;
  cursor:pointer;flex-shrink:0;
}

/* ─── Main content ─── */
.main{overflow-y:auto;padding:28px 32px;background:var(--bg);color:var(--t1);}
.page{max-width:1440px;margin:0 auto;}

/* ─── Page header ─── */
.page-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;gap:16px;}
.page-head__title{font-family:var(--f-d);font-size:22px;font-weight:600;letter-spacing:-.02em;}
.page-head__sub{font-size:13px;color:var(--t2);margin-top:3px;}
.page-head__actions{display:flex;gap:8px;flex-shrink:0;}

/* ─── Botões ─── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:7px;
  padding:0 16px;height:36px;border-radius:9px;
  font-size:13.5px;font-weight:500;
  transition:transform .12s,box-shadow .15s,opacity .15s;
  white-space:nowrap;
}
.btn:hover{transform:translateY(-1px);}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--grad);color:#fff;box-shadow:0 4px 14px rgba(123,63,228,.3);}
.btn-primary:hover{box-shadow:0 8px 20px rgba(123,63,228,.45);}
.btn-outline{border:1px solid var(--border);color:var(--t2);background:transparent;}
.btn-outline:hover{border-color:var(--t2);color:var(--t1);}
.btn-ghost{color:var(--t2);}
.btn-ghost:hover{background:var(--bg-2);color:var(--t1);}

/* ─── KPI Cards ─── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.kpi{
  background:var(--bg-2);border:1px solid var(--border-soft);border-radius:14px;
  padding:20px 22px;
  transition:border-color .2s,transform .2s;
  cursor:default;
}
.kpi:hover{border-color:rgba(123,63,228,.3);transform:translateY(-2px);}
.kpi__label{font-size:12.5px;color:var(--t2);font-weight:500;font-family:var(--f-b);letter-spacing:0;text-transform:none;}
.kpi__value{font-family:var(--f-d);font-size:32px;font-weight:700;letter-spacing:-.03em;margin:8px 0 4px;line-height:1;color:var(--t1);}
.kpi__value.grad{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.kpi__delta{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:500;}
.kpi__delta.up{color:var(--success);}
.kpi__delta.down{color:var(--danger);}
.kpi__icon{float:right;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-top:-4px;}

/* ─── Grid 2 colunas ─── */
.grid-2{display:grid;grid-template-columns:1.4fr 1fr;gap:14px;margin-bottom:14px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px;}

/* ─── Card genérico ─── */
.card{background:var(--bg-2);border:1px solid var(--border-soft);border-radius:14px;padding:22px;}
.card__head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.card__title{font-family:var(--f-d);font-size:14px;font-weight:600;letter-spacing:-.01em;color:var(--t1);}
.card__action{font-size:12px;color:var(--blue);font-weight:500;cursor:pointer;}
.card__action:hover{text-decoration:underline;}

/* ─── Gráfico de barras ─── */
.chart{display:flex;align-items:flex-end;gap:8px;height:120px;padding-top:8px;}
.chart-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;}
.chart-bar{width:100%;border-radius:5px 5px 0 0;min-height:4px;transition:opacity .2s;}
.chart-bar:hover{opacity:.8;}
.chart-bar.today{background:var(--grad);}
.chart-bar.past{background:rgba(123,63,228,.45);}
.chart-label{font-family:var(--f-m);font-size:9.5px;color:var(--t2);}
[data-theme="light"] .chart-bar.past{background:rgba(123,63,228,.3);}
[data-theme="light"] .chart-bar{min-height:6px;}

/* ─── Lista de conversas ─── */
.conv-list{display:flex;flex-direction:column;gap:0;}
.conv-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 0;border-bottom:1px solid var(--border-soft);
  cursor:pointer;transition:background .15s;border-radius:8px;
  padding-left:6px;padding-right:6px;
}
.conv-item:last-child{border-bottom:none;}
.conv-item:hover{background:var(--status-bg,rgba(255,255,255,.03));}
[data-theme="light"] .conv-item:hover{background:rgba(0,0,0,.04);}
.conv-avatar{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--f-d);font-weight:700;font-size:11.5px;color:#fff;
  flex-shrink:0;
}
.conv-meta{flex:1;min-width:0;}
.conv-name{font-size:13.5px;font-weight:600;color:var(--t1);}
.conv-preview{font-size:12px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.conv-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.conv-time{font-family:var(--f-m);font-size:10px;color:var(--t3);}
.conv-badge{min-width:18px;height:18px;padding:0 5px;border-radius:999px;background:var(--grad);color:#fff;font-size:10px;font-weight:700;font-family:var(--f-m);display:flex;align-items:center;justify-content:center;}
.conv-tag{font-size:10px;padding:2px 7px;border-radius:4px;font-family:var(--f-m);}
.conv-tag.ia{background:rgba(123,63,228,.2);color:#c4a8ff;}
.conv-tag.hot{background:rgba(163,45,45,.18);color:#fca5a5;}
.conv-tag.ok{background:rgba(29,158,117,.15);color:#6ee7b7;}

/* ─── Agente IA card ─── */
.ia-status{display:flex;align-items:center;gap:10px;padding:14px 16px;background:rgba(123,63,228,.08);border:1px solid rgba(123,63,228,.2);border-radius:12px;margin-bottom:14px;}
.ia-dot{width:10px;height:10px;border-radius:50%;background:var(--success);box-shadow:0 0 8px var(--success);flex-shrink:0;animation:pulse-dot 2s ease infinite;}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 0 0 rgba(29,158,117,.6);}50%{box-shadow:0 0 0 5px rgba(29,158,117,0);}}
.ia-info{flex:1;}
.ia-name{font-size:13.5px;font-weight:600;}
.ia-sub{font-size:11.5px;color:var(--t2);margin-top:1px;}

/* ─── Stat row ─── */
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border-soft);}
.stat-row:last-child{border-bottom:none;}
.stat-label{font-size:13px;color:#A0A0AA;}
.stat-val{font-family:var(--f-d);font-size:14px;font-weight:600;color:#F5F5F7;}

/* ─── Badge plano ─── */
.plan-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;background:rgba(123,63,228,.15);border:1px solid rgba(123,63,228,.25);font-size:11.5px;font-family:var(--f-m);color:#c4a8ff;letter-spacing:.04em;}

/* ─── Progress bar ─── */
.progress{height:6px;background:var(--border);border-radius:999px;overflow:hidden;margin-top:8px;}
.progress__fill{height:100%;border-radius:999px;background:var(--grad);transition:width .6s cubic-bezier(.22,1,.36,1);}

/* ─── Empty / Placeholder ─── */
.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:60px 24px;color:var(--t3);text-align:center;}
.placeholder svg{opacity:.35;}
.placeholder p{font-size:14px;max-width:280px;line-height:1.5;}

/* ─── Scrollbar ─── */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:999px;}

/* ─── Animações globais ─── */
@keyframes fade-up{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes fade-in{from{opacity:0;}to{opacity:1;}}
@keyframes scale-in{from{opacity:0;transform:scale(.96);}to{opacity:1;transform:scale(1);}}
@keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
@keyframes glow-pulse{0%,100%{box-shadow:0 0 0 0 rgba(123,63,228,.4);}50%{box-shadow:0 0 0 6px rgba(123,63,228,0);}}
@keyframes ripple{from{transform:scale(0);opacity:.6;}to{transform:scale(2);opacity:0;}}
@keyframes toast-in{from{opacity:0;transform:translateY(20px) scale(.95);}to{opacity:1;transform:translateY(0) scale(1);}}

.page{animation:fade-up .35s cubic-bezier(.22,1,.36,1);}
.kpi{animation:fade-up .4s cubic-bezier(.22,1,.36,1) both;}
.kpi:nth-child(1){animation-delay:.05s;}
.kpi:nth-child(2){animation-delay:.1s;}
.kpi:nth-child(3){animation-delay:.15s;}
.kpi:nth-child(4){animation-delay:.2s;}
.grid-2 > *,.grid-3 > *{animation:fade-up .45s cubic-bezier(.22,1,.36,1) both;}
.grid-2 > *:nth-child(2){animation-delay:.1s;}
.grid-3 > *:nth-child(2){animation-delay:.08s;}
.grid-3 > *:nth-child(3){animation-delay:.16s;}

/* Skeleton */
.skeleton{
  background:linear-gradient(90deg, var(--bg-3) 0%, var(--bg-2) 50%, var(--bg-3) 100%);
  background-size:200% 100%;
  animation:shimmer 1.4s infinite linear;
  border-radius:6px;
}

/* Hover unificado em links/itens clicáveis */
.card__action{position:relative;}
.card__action:hover{color:var(--blue);}

/* Premium glow nos planos */
.glow-premium{box-shadow:0 0 0 1px rgba(123,63,228,.3),0 8px 32px rgba(123,63,228,.18);}

/* Fade nas mensagens do chat */
.fade-msg{animation:fade-up .25s cubic-bezier(.22,1,.36,1);}
</style>
</head>

<script>
// Fail-safe: garante que o loading some mesmo se React falhar
window.addEventListener('error', function(e) {
  console.error('[Brava] Erro carregando:', e.message);
  var l = document.getElementById('brava-loading');
  if (l) { l.style.opacity = '0'; setTimeout(function(){ l.remove(); }, 400); }
});
setTimeout(function() {
  var l = document.getElementById('brava-loading');
  if (l) { l.style.opacity = '0'; setTimeout(function(){ l.remove(); }, 400); }
}, 3000);
</script>
<div id="brava-loading" style="position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:99999;transition:opacity .4s ease;">
  <div style="display:flex;flex-direction:column;align-items:center;gap:18px;">
    <img src="/admin/app/brava-logo-white.png" alt="Brava" style="height:32px;animation:brava-pulse 1.6s ease-in-out infinite;" onerror="this.onerror=null;this.src='app/brava-logo-white.png'"/>
    <div style="width:120px;height:2px;background:#1F1F2A;border-radius:99px;overflow:hidden;">
      <div style="width:40%;height:100%;background:linear-gradient(90deg,#7B3FE4,#1E90FF);border-radius:99px;animation:brava-bar 1.2s ease infinite;"></div>
    </div>
  </div>
  <style>
    @keyframes brava-pulse { 0%,100%{opacity:.6;}50%{opacity:1;} }
    @keyframes brava-bar { 0%{transform:translateX(-200%);}100%{transform:translateX(450%);} }
  </style>
</div>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script type="text/babel" src="app/icons.jsx"></script>
<script type="text/babel" src="app/components.jsx"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ─── Sessão (lida da URL na primeira carga, persistida em localStorage) ─── */
const DEFAULT_SESSAO = { nome: 'Jhonattan Itiuba', email: 'diretoria@brava.company', plano: 'admin', role: 'Diretoria', welcome: false };

function carregarSessao() {
  try {
    const url = new URLSearchParams(window.location.search);
    const userUrl = url.get('user');
    const emailUrl = url.get('email');
    if (userUrl && emailUrl) {
      const sessao = {
        nome: userUrl,
        email: emailUrl,
        plano: url.get('plano') || 'performance',
        role: url.get('role') || 'Owner',
        welcome: url.get('welcome') === '1',
        logado_em: new Date().toISOString(),
      };
      const tema = url.get('theme');
      if (tema) document.documentElement.setAttribute('data-theme', tema);
      localStorage.setItem('brava_sessao', JSON.stringify(sessao));
      window.history.replaceState({}, '', '/');
      return sessao;
    }
    const s = localStorage.getItem('brava_sessao');
    if (s) {
      const parsed = JSON.parse(s);
      // Garante que campos obrigatórios existam
      return { ...DEFAULT_SESSAO, ...parsed };
    }
  } catch(e) {
    console.warn('[Brava] Erro ao carregar sessão, usando default:', e);
  }
  return DEFAULT_SESSAO;
}

const SESSAO = carregarSessao();
const ehDiretoria = (SESSAO.role || '') === 'Diretoria';
const safeNome = SESSAO.nome || 'Cliente';
const safeEmail = SESSAO.email || 'usuario@brava.company';

/* ─── Brava Admin context ─── */
const TENANT = {
  name: ehDiretoria ? 'Brava Company' : safeNome,
  slug: ehDiretoria ? 'admin' : (safeEmail.split('@')[0] || 'cliente').toLowerCase(),
  initials: (safeNome.split(' ').slice(0,2).map(n => n[0] || '').join('') || 'BC').toUpperCase(),
  role: SESSAO.role || 'Owner',
  email: safeEmail,
};

/* ─── Counter animado ─── */
function useCount(target, duration = 1600) {
  const [v, setV] = useState(0);
  useEffect(() => {
    let s = null, raf;
    const step = ts => {
      if (!s) s = ts;
      const p = Math.min((ts - s) / duration, 1);
      setV(Math.round((1 - Math.pow(1 - p, 3)) * target));
      if (p < 1) raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [target]);
  return v;
}

/* ─── Nav items ─── */
const NAV = [
  { key:'dashboard',  label:'Dashboard',   icon:'LayoutDashboard', badge:null },
  { key:'clientes',   label:'WhatsApp',    icon:'MessageCircle',   badge:23 },
  { key:'pipeline',   label:'Pipeline',    icon:'KanbanSquare',    badge:5 },
  { key:'mrr',        label:'MRR',         icon:'TrendingUp',      badge:null },

function Sidebar({ page, setPage, collapsed, setCollapsed }) {
  return (
    <aside className={`sidebar${collapsed ? ' collapsed' : ''}`}>

      <div style={{height:4, background:'var(--grad)', flexShrink:0}}/>

      {/* Logo Brava em destaque */}
      <div id="sidebar-logo-wrap" style={{
        padding:'18px 20px 16px',
        borderBottom:'1px solid #1F1F2A',
        flexShrink:0,
        display:'flex', alignItems:'center', justifyContent:'space-between',
        background: 'linear-gradient(180deg, rgba(123,63,228,0.05), transparent)',
      }}>
        <img
          src="/admin/app/brava-logo-white.png"
          alt="BRAVA"
          id="sidebar-logo"
          style={{ height: 26, objectFit: 'contain', display: 'block' }}
          onError={(e) => {
            // Fallback: tenta caminho relativo
            if (!e.target.dataset.retry) {
              e.target.dataset.retry = '1';
              e.target.src = 'app/brava-logo-white.png';
            } else if (e.target.dataset.retry === '1') {
              e.target.dataset.retry = '2';
              e.target.src = '/app/app/assets/brava-logo-white.png';
            }
          }}
        />
        <button onClick={() => setCollapsed(true)} title="Fechar" style={{
          width:26, height:26, borderRadius:6, border:'1px solid #2A2A3A',

          color:'var(--t3)', cursor:'pointer', background:'transparent', transition:'all .15s', flexShrink:0,
        }}
          onMouseEnter={e=>{e.currentTarget.style.borderColor='#A0A0AA';e.currentTarget.style.color='#F5F5F7';}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor='#2A2A3A';e.currentTarget.style.color='#6E6E78';}}
        >
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
      </div>

      <nav className="sidebar__nav">
        {NAV.map(n => (
          <div key={n.key} className={`nav-item${page === n.key ? ' active' : ''}`} onClick={() => setPage(n.key)}>
            <Icon name={n.icon} size={16} />
            {n.label}
            {n.badge && <span className="nav-badge">{n.badge}</span>}
          </div>
        ))}

        <div className="nav-divider" />

        {NAV_BOTTOM.map(n => (
          <div key={n.key} className={`nav-item${n.danger ? ' danger' : ''}`}
            onClick={() => {
              if (n.key === 'sair') {
                if (confirm('Sair da plataforma?')) {
                  localStorage.removeItem('brava_sessao');
                  const tema = document.documentElement.getAttribute('data-theme') || 'dark';
                  window.location.href = `/?logout=1&theme=${tema}`;
                }
              }
              else setPage(n.key);
            }}>
            <Icon name={n.icon} size={16} />
            {n.label}
          </div>
        ))}
      </nav>
    </aside>
  );
}

    return `Há **${SYSTEM_DATA.clientes} clientes** na base. **5 em produção** (Clínica Reunidas, Garcia Sadler, Dra. Thalita, Ldccell, VapoCamping), **2 ativos** (EstacionePark, Master Aviação), **5 em implementação**, **7 em negociação comercial** e 2 em prospecção.`;
  if (p.includes('chamado') || p.includes('suporte'))
    return `Existem **${SYSTEM_DATA.chamados} chamados abertos** no momento, 2 aguardando resposta da equipe. Tempo médio de resolução: 3h.`;
  if (p.includes('conversa') || p.includes('atendimento') || p.includes('mensagem'))
    return `Foram processadas **${SYSTEM_DATA.conversas.toLocaleString('pt-BR')} conversas** hoje em todos os tenants. A IA assumiu 91% delas com tempo médio de resposta de 22 segundos.`;
  if (p.includes('saúde') || p.includes('uptime') || p.includes('sistema') || p.includes('erro'))
    return `Plataforma **operacional**. Uptime de ${SYSTEM_DATA.saude.uptime} nos últimos 30 dias, latência média de ${SYSTEM_DATA.saude.latencia} e **${SYSTEM_DATA.saude.erros} erros** nas últimas 24h.`;
  if (p.includes('plano') || p.includes('performance') || p.includes('scale') || p.includes('essencial'))
    return `Por status: **5 em produção**, 2 ativos, 5 em implementação, 7 em negociação comercial, 2 em proposta/prospecção. Nichos: Automobilístico, Indústria, Imobiliário, Turismo, Arquitetura, Saúde, Estética, Agro, Aviação e mais. Ticket médio estimado: R$ ${Math.round(SYSTEM_DATA.mrr/SYSTEM_DATA.clientes).toLocaleString('pt-BR')}/mês.`;
  if (p.includes('equipe') || p.includes('time'))
    return `A equipe Brava tem **${SYSTEM_DATA.equipe.length} membros**: ${SYSTEM_DATA.equipe.join(', ')}. Todos online agora.`;
  if (p.includes('churn') || p.includes('cancelamento') || p.includes('saiu'))
    return `Nenhum cancelamento este mês. Taxa de churn: **0%**. O cliente mais antigo está há 8 meses na plataforma.`;
  return `Posso te ajudar com informações sobre **clientes, MRR, chamados, conversas, saúde da plataforma, planos e equipe**. O que você quer saber?`;
}

function Chamados() {

    try { const s = localStorage.getItem('brava_chamados'); if (s) return JSON.parse(s); } catch(e){}
    return CHAMADOS_INIT;
  });
  useEffect(() => { localStorage.setItem('brava_chamados', JSON.stringify(chamados)); }, [chamados]);
  const [filtro, setFiltro] = useState('todos');
  const [aberto, setAberto] = useState(chamados[0]?.id);

  const filtrados = chamados.filter(c => filtro==='todos' ? true : c.status===filtro);
  const ativo = chamados.find(c => c.id===aberto) || chamados[0];

  const mudarStatus = (id, novo) => setChamados(cs => cs.map(c => c.id===id ? {...c, status:novo} : c));

  return (
    <div className="page">
      <div className="page-head">
        <div>
          <div className="page-head__title">Chamados</div>

                  <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', gap:8}}>
                    <span style={{fontSize:13.5, fontWeight:600, color:'var(--t1)'}}>{c.cliente}</span>
                    <span style={{fontSize:10.5, color:'var(--t3)', fontFamily:'var(--f-m)'}}>#{c.id}</span>
                  </div>
                  <div style={{fontSize:12.5, color:'var(--t2)', marginTop:3, lineHeight:1.4}}>{c.titulo}</div>
                  <div style={{display:'flex', gap:6, marginTop:8, alignItems:'center', flexWrap:'wrap'}}>

                    <span style={{fontSize:10.5, color:'var(--t3)'}}>{c.aberto}</span>
                    {c.resps > 0 && <span style={{fontSize:10.5, color:'var(--t3)', display:'flex', alignItems:'center', gap:3}}><Icon name="MessageCircle" size={10}/>{c.resps}</span>}

                </div>
              </div>
            </div>
          ))}
        </div>

        {/* Detalhe */}
        {ativo && (
          <div className="card" style={{padding:0, display:'flex', flexDirection:'column', maxHeight:'calc(100vh - 240px)'}}>
            <div style={{padding:'18px 22px', borderBottom:'1px solid var(--border-soft)'}}>
              <div style={{display:'flex', alignItems:'center', gap:12, marginBottom:10}}>
                <div style={{width:42, height:42, borderRadius:'50%', background:ativo.cor, display:'flex', alignItems:'center', justifyContent:'center', fontFamily:'var(--f-d)', fontWeight:700, fontSize:14, color:'#fff'}}>{ativo.init}</div>

                    padding:'6px 12px', borderRadius:7, fontSize:12, fontWeight:500, cursor:'pointer',

            </div>

            <div style={{flex:1, padding:'16px 22px', overflowY:'auto', display:'flex', flexDirection:'column', gap:12}}>
              <div style={{padding:'12px 14px', background:'var(--bg-3)', borderRadius:10, fontSize:13.5, color:'var(--t2)', lineHeight:1.55}}>
                <div style={{fontSize:11, color:'var(--t3)', marginBottom:6, fontFamily:'var(--f-m)'}}>{ativo.cliente} · {ativo.aberto}</div>
                Olá! Preciso de ajuda com isso. Há alguns dias venho enfrentando esse problema e gostaria de uma orientação. Aguardo retorno.
              </div>
              {ativo.resps > 0 && (
                <div style={{padding:'12px 14px', background:'rgba(123,63,228,.08)', border:'1px solid rgba(123,63,228,.2)', borderRadius:10, fontSize:13.5, color:'var(--t1)', lineHeight:1.55}}>

            <div style={{padding:'12px 16px', borderTop:'1px solid var(--border-soft)', display:'flex', gap:8}}>

        )}
      </div>
    </div>
  );
}

/* ─── Toast system (global) ─── */
let toastSetters = [];
function showToast(msg, tipo='success') {
  toastSetters.forEach(fn => fn(msg, tipo));
}

function ToastContainer() {
  const [toasts, setToasts] = useState([]);
  useEffect(() => {
    const fn = (msg, tipo) => {
      const id = Date.now() + Math.random();
      setToasts(t => [...t, {id, msg, tipo}]);
      setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
    };
    toastSetters.push(fn);
    return () => { toastSetters = toastSetters.filter(f => f !== fn); };
  }, []);
  const cores = {success:'#1D9E75', warn:'#BA7517', error:'#A32D2D', info:'#1E90FF'};
  const icones = {success:'Check', warn:'AlertTriangle', error:'AlertCircle', info:'Info'};
  return (
    <div style={{position:'fixed', bottom:84, right:16, zIndex:99999, display:'flex', flexDirection:'column', gap:8}}>
      {toasts.map(t => (
        <div key={t.id} style={{
          minWidth:280, maxWidth:380, padding:'12px 16px',
          background:'var(--bg-2)', border:`1px solid ${cores[t.tipo]}55`,
          borderLeft:`3px solid ${cores[t.tipo]}`, borderRadius:10,
          boxShadow:'0 12px 32px rgba(0,0,0,.4)',
          display:'flex', alignItems:'center', gap:10,
          animation:'toast-in .25s cubic-bezier(.22,1,.36,1)',
        }}>
          <div style={{width:24, height:24, borderRadius:'50%', background:cores[t.tipo]+'22', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0}}>
            <Icon name={icones[t.tipo]} size={14} style={{color:cores[t.tipo]}}/>
          </div>
          <span style={{fontSize:13, color:'var(--t1)', flex:1}}>{t.msg}</span>
        </div>
      ))}
    </div>
  );
}

/* ─── Atalhos de teclado ─── */
function useKeyboardShortcuts({ setNovoCliente, setShortcutsOpen }) {
  useEffect(() => {
    const onKey = e => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key === '/') { e.preventDefault(); document.querySelector('.header__search input')?.focus(); }
      else if (e.key === 'n') { e.preventDefault(); setNovoCliente(true); }
      else if (e.key === '?') { e.preventDefault(); setShortcutsOpen(v => !v); }
      else if (e.key === 'Escape') { setShortcutsOpen(false); }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [setNovoCliente, setShortcutsOpen]);
}

  if (!open) return null;

/* ─── Projeção MRR 12 meses (empilhada por status) ─── */
function ProjecaoMRR() {
  const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez','Jan/27'];
  const mesAtual = 4; // maio
  const corStatus = { 'Em Prod':'#1D9E75', 'Ativo':'#1E90FF', 'Implementação':'#7B3FE4', 'Comercial':'#BA7517', 'Proposta Apresentada':'#A32D2D', 'Em breve':'#6E6E78' };
  const statusOrdem = ['Em Prod','Ativo','Implementação','Comercial','Proposta Apresentada','Em breve'];

  // Agrupar MRR por status atual (snapshot real do CRM)
  const mrrPorStatus = {};
  RECORRENCIA.forEach(r => {
    if (!r.mensal) return;
    mrrPorStatus[r.status] = (mrrPorStatus[r.status] || 0) + r.mensal;
  });

  // Curva histórica: clientes Em Prod e Ativo entram gradualmente do início do ano até maio
  // Curva futura: Implementação ativa em jun-jul, Comercial converte ao longo do ano, Proposta/Em breve fecham no fim
  // Cada mês: % de cada bucket que está faturando
  // Formato: [Em Prod %, Ativo %, Implementação %, Comercial %, Proposta %, Em breve %]
  const cronograma = [
    /* Jan */ [0.55, 0.40, 0,    0,    0,    0   ],
    /* Fev */ [0.70, 0.55, 0,    0,    0,    0   ],
    /* Mar */ [0.85, 0.75, 0,    0,    0,    0   ],
    /* Abr */ [0.95, 0.90, 0,    0,    0,    0   ],
    /* Mai */ [1.00, 1.00, 0,    0,    0,    0   ], // ATUAL
    /* Jun */ [1.00, 1.00, 0.30, 0.10, 0,    0   ],
    /* Jul */ [1.00, 1.00, 0.65, 0.20, 0,    0   ],
    /* Ago */ [1.00, 1.00, 1.00, 0.40, 0.20, 0   ],
    /* Set */ [1.00, 1.00, 1.00, 0.60, 0.45, 0.15],
    /* Out */ [1.00, 1.00, 1.00, 0.85, 0.75, 0.40],
    /* Nov */ [1.00, 1.00, 1.00, 1.00, 1.00, 0.75],
    /* Dez */ [1.00, 1.00, 1.00, 1.00, 1.00, 1.00],
    /* Jan/27 */ [1.10, 1.10, 1.20, 1.30, 1.40, 1.20], // crescimento orgânico + novos
  ];

  const dados = meses.map((mes, idx) => {
    const fatores = cronograma[idx];
    const stack = {};
    let total = 0;
    statusOrdem.forEach((st, i) => {
      const valor = Math.round((mrrPorStatus[st] || 0) * fatores[i]);
      if (valor > 0) { stack[st] = valor; total += valor; }
    });
    return { mes, total, stack, eAtual: idx === mesAtual, ePassado: idx < mesAtual, eFuturo: idx > mesAtual };
  });

  const maxTotal = Math.max(...dados.map(d => d.total));
  const totalAcumulado = dados.slice(mesAtual, 12).reduce((s,d) => s + d.total, 0);
  const projDezembro = dados[11].total;
  const mrrHoje = dados[mesAtual].total;
  const crescimento = Math.round(((projDezembro - mrrHoje) / mrrHoje) * 100);

  return (
    <div className="card" style={{marginBottom:14, padding:'22px 24px'}}>
      <div className="card__head" style={{marginBottom:18}}>
        <div>
          <div className="card__title" style={{fontSize:15}}>Projeção de MRR · 12 meses</div>
          <div style={{fontSize:12, color:'var(--t3)', marginTop:3}}>Empilhada por estágio do cliente · baseado em conversões esperadas</div>
        </div>
        <div style={{display:'flex', gap:14, alignItems:'center'}}>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:11, color:'var(--t3)', fontFamily:'var(--f-m)', textTransform:'uppercase', letterSpacing:'.05em'}}>MRR projetado dez/26</div>
            <div style={{fontFamily:'var(--f-d)', fontSize:22, fontWeight:700, color:'#1D9E75', letterSpacing:'-.02em', marginTop:2}}>R$ {projDezembro.toLocaleString('pt-BR')}</div>
          </div>
          <div style={{width:1, height:38, background:'var(--border-soft)'}}/>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:11, color:'var(--t3)', fontFamily:'var(--f-m)', textTransform:'uppercase', letterSpacing:'.05em'}}>Crescimento</div>
            <div style={{fontFamily:'var(--f-d)', fontSize:22, fontWeight:700, background:'var(--grad)', WebkitBackgroundClip:'text', backgroundClip:'text', WebkitTextFillColor:'transparent', letterSpacing:'-.02em', marginTop:2}}>+{crescimento}%</div>
          </div>
          <div style={{width:1, height:38, background:'var(--border-soft)'}}/>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:11, color:'var(--t3)', fontFamily:'var(--f-m)', textTransform:'uppercase', letterSpacing:'.05em'}}>Acumulado 8 meses</div>
            <div style={{fontFamily:'var(--f-d)', fontSize:22, fontWeight:700, color:'var(--t1)', letterSpacing:'-.02em', marginTop:2}}>R$ {totalAcumulado.toLocaleString('pt-BR')}</div>
          </div>
        </div>
      </div>

      {/* Gráfico empilhado */}
      <div style={{display:'flex', alignItems:'flex-end', gap:8, height:220, padding:'0 4px', position:'relative'}}>
        {/* Linha pontilhada do mês atual */}
        <div style={{
          position:'absolute', left:`${(mesAtual+0.5)/13*100}%`, top:0, bottom:24,
          borderLeft:'2px dashed var(--purple)', opacity:.5, pointerEvents:'none'
        }}/>

        {dados.map((d, i) => {
          const altura = (d.total / maxTotal) * 100;
          return (
            <div key={i} style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:6, height:'100%'}}>
              {/* Valor topo */}
              <div style={{
                fontFamily:'var(--f-m)', fontSize:9.5,
                color: d.eAtual ? 'var(--purple)' : d.eFuturo ? 'var(--t3)' : 'var(--t2)',
                fontWeight: d.eAtual ? 700 : 500,
                opacity: d.total > 0 ? 1 : 0,
              }}>
                {d.total >= 1000 ? `${(d.total/1000).toFixed(1)}k` : d.total}
              </div>

              {/* Barra empilhada */}
              <div style={{flex:1, width:'100%', display:'flex', flexDirection:'column', justifyContent:'flex-end', position:'relative'}}>
                <div style={{
                  width:'100%', height:`${altura}%`, minHeight:4,
                  display:'flex', flexDirection:'column-reverse',
                  borderRadius:'5px 5px 0 0', overflow:'hidden',
                  border: d.eAtual ? '2px solid var(--purple)' : 'none',
                  boxShadow: d.eAtual ? '0 0 12px rgba(123,63,228,.4)' : 'none',
                  transition:'opacity .2s',
                  opacity: d.eFuturo ? 0.85 : 1,
                  cursor:'default',
                }}
                  title={`${d.mes}/26 · R$ ${d.total.toLocaleString('pt-BR')}\n${Object.entries(d.stack).map(([k,v]) => `${k}: R$ ${v.toLocaleString('pt-BR')}`).join('\n')}`}
                >
                  {statusOrdem.map(st => d.stack[st] ? (
                    <div key={st} style={{
                      width:'100%',
                      height:`${(d.stack[st]/d.total)*100}%`,
                      background: corStatus[st],
                    }}/>
                  ) : null)}
                </div>
              </div>

              {/* Mês */}
              <div style={{
                fontFamily:'var(--f-m)', fontSize:10,
                color: d.eAtual ? 'var(--purple)' : 'var(--t3)',
                fontWeight: d.eAtual ? 700 : 500,
              }}>{d.mes}</div>
            </div>
          );
        })}
      </div>

      {/* Legenda */}
      <div style={{display:'flex', gap:18, marginTop:18, paddingTop:14, borderTop:'1px solid var(--border-soft)', flexWrap:'wrap', alignItems:'center'}}>
        {statusOrdem.map(st => {
          const total = RECORRENCIA.filter(r => r.status === st).reduce((s,r) => s+r.mensal, 0);
          if (total === 0) return null;
          return (
            <div key={st} style={{display:'flex', alignItems:'center', gap:6}}>
              <div style={{width:12, height:12, borderRadius:3, background:corStatus[st]}}/>
              <span style={{fontSize:12, color:'var(--t2)', fontWeight:500}}>{st}</span>
              <span style={{fontSize:11, color:'var(--t3)', fontFamily:'var(--f-m)'}}>R$ {total.toLocaleString('pt-BR')}/mês</span>
            </div>
          );
        })}
        <div style={{marginLeft:'auto', display:'flex', alignItems:'center', gap:6, fontSize:11, color:'var(--t3)'}}>
          <div style={{width:14, height:0, borderTop:'2px dashed var(--purple)'}}/>
          <span>Mês atual (Maio/26)</span>
        </div>
      </div>
    </div>
  );
}

function MRR() {
  const [filtro, setFiltro] = useState('todos');
  const [busca, setBusca] = useState('');
  const [sortCol, setSortCol] = useState('impl');
  const [sortAsc, setSortAsc] = useState(false);

  const totalImpl = RECORRENCIA.reduce((s,r) => s+r.impl, 0);
  const totalMRR  = RECORRENCIA.reduce((s,r) => s+r.mensal, 0);
  const ativos    = RECORRENCIA.filter(r=>['Em Prod','Ativo'].includes(r.status));
  const mrrAtivo  = ativos.reduce((s,r) => s+r.mensal, 0);

  const filtrados = RECORRENCIA
    .filter(r => {
      if (filtro !== 'todos' && r.status !== filtro) return false;
      if (busca && !r.cliente.toLowerCase().includes(busca.toLowerCase()) && !r.nicho.toLowerCase().includes(busca.toLowerCase())) return false;
      return true;
    })
    .sort((a,b) => {
      const v = sortAsc ? 1 : -1;
      if (sortCol === 'impl') return (a.impl - b.impl) * v;
      if (sortCol === 'mensal') return (a.mensal - b.mensal) * v;
      return a.cliente.localeCompare(b.cliente) * v;
    });

  const col = (label, key) => (
    <th onClick={()=>{ if(sortCol===key) setSortAsc(v=>!v); else { setSortCol(key); setSortAsc(false); }}}

      {label} {sortCol===key ? (sortAsc?'↑':'↓') : ''}
    </th>
  );

  const fmt = v => v > 0 ? `R$ ${v.toLocaleString('pt-BR')}` : '—';

  return (
    <div className="page">
      <div className="page-head">
        <div>
          <div className="page-head__title">MRR · Controle de Recorrência</div>

          <button className="btn btn-outline"><Icon name="Download" size={14}/>Exportar</button>
        </div>
      </div>

      {/* KPIs */}
      <div className="kpi-grid" style={{gridTemplateColumns:'repeat(4,1fr)',marginBottom:24}}>
        {[
          {label:'Total Implementação',val:`R$ ${totalImpl.toLocaleString('pt-BR')}`,icon:'Briefcase',color:'#7B3FE4'},
          {label:'MRR Total',          val:`R$ ${totalMRR.toLocaleString('pt-BR')}`, icon:'TrendingUp', color:'#1E90FF'},
          {label:'MRR Ativo (Em Prod + Ativo)', val:`R$ ${mrrAtivo.toLocaleString('pt-BR')}`, icon:'CheckCircle', color:'#1D9E75'},
          {label:'Ticket médio mensal', val:`R$ ${Math.round(totalMRR/RECORRENCIA.filter(r=>r.mensal>0).length).toLocaleString('pt-BR')}`, icon:'BarChart3', color:'#BA7517'},

          <div key={i} className="kpi">

                  <td style={{padding:'11px 14px',color:'var(--t2)',whiteSpace:'nowrap'}}>{r.servico||'—'}</td>
                  <td style={{padding:'11px 14px',color:'var(--t2)'}}>{r.nicho}</td>
                  <td style={{padding:'11px 14px',fontFamily:'var(--f-m)',color: r.impl>0?'#F5F5F7':'#6E6E78',textAlign:'right'}}>{fmt(r.impl)}</td>
                  <td style={{padding:'11px 14px',fontFamily:'var(--f-m)',color: r.mensal>0?'#1D9E75':'#6E6E78',fontWeight:r.mensal>0?600:400,textAlign:'right'}}>{fmt(r.mensal)}</td>
                  <td style={{padding:'11px 14px',color:'var(--t2)',fontFamily:'var(--f-m)',fontSize:12}}>{r.dia||'—'}</td>
                  <td style={{padding:'11px 14px'}}>
                    {r.status && <span style={{fontSize:11,padding:'3px 9px',borderRadius:999,background:(SC[r.status]||'#6E6E78')+'18',color:SC[r.status]||'#6E6E78',border:`1px solid ${(SC[r.status]||'#6E6E78')}33`,fontWeight:500}}>{r.status}</span>}
                  </td>
                </tr>
              ))}
            </tbody>
            <tfoot>
              <tr style={{background:'var(--bg-3)',borderTop:'2px solid var(--border)'}}>
                <td style={{padding:'12px 14px',fontWeight:700,color:'var(--t1)',fontFamily:'var(--f-d)'}} colSpan={3}>TOTAL ({filtrados.length} contratos)</td>
                <td style={{padding:'12px 14px',fontFamily:'var(--f-m)',fontWeight:700,color:'var(--t1)',textAlign:'right'}}>R$ {filtrados.reduce((s,r)=>s+r.impl,0).toLocaleString('pt-BR')}</td>
                <td style={{padding:'12px 14px',fontFamily:'var(--f-m)',fontWeight:700,color:'#1D9E75',textAlign:'right'}}>R$ {filtrados.reduce((s,r)=>s+r.mensal,0).toLocaleString('pt-BR')}/mês</td>
                <td colSpan={2}/>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>
    </div>
  );
}

  { id:'ativo',      nome:'Ativo',       cor:'#1E90FF', cards: CLIENTES_CRM.filter(c=>c.status==='Ativo').map(c=>({id:c.nome,nome:c.nome,sub:c.servico,nicho:c.nicho,color:c.color,init:c.init})) },

];

const CORES = ['#6E6E78','#7B3FE4','#1E90FF','#1D9E75','#BA7517','#A32D2D','#185FA5','#E040FB','#FF6D00','#00BCD4'];

// Placeholder visual durante drag (renomeado pra não conflitar com PageEmBreve)
function DragPlaceholder({ cor, h }) {
  return (
    <div style={{
      height: h, borderRadius: 10,
      background: `${cor}15`,
      border: `2px dashed ${cor}66`,
      animation: 'fade-in .12s ease',
      transition: 'all .2s',
    }}/>
  );
}

function Pipeline({ cols, setCols }) {
  const [editando, setEditando] = useState(null);
  const [novoNome, setNovoNome] = useState('');
  // dragState: { card, fromCol, fromIdx, height }
  const [drag, setDrag] = useState(null);
  // dropTarget: { colId, idx }  → onde vai inserir
  const [dropTarget, setDropTarget] = useState(null);
  // colHover: id da coluna sendo hover
  const [colHover, setColHover] = useState(null);

  const updateCol = (id, patch) => setCols(cs => cs.map(c => c.id===id ? {...c,...patch} : c));
  const addCol = () => {
    const id = 'col_'+Date.now();
    setCols(cs => [...cs, {id, nome:'Nova coluna', cor:'#6E6E78', cards:[]}]);
    setEditando({colId:id, tipo:'nome'});
    setNovoNome('Nova coluna');
  };
  const removeCol = id => {
    if (!confirm('Remover esta coluna e todos os cards dela?')) return;
    setCols(cs => cs.filter(c => c.id!==id));
  };
  const addCard = colId => {
    const nome = prompt('Nome do cliente:');
    if (!nome) return;
    setCols(cs => cs.map(c => c.id===colId ? {...c, cards:[...c.cards, {id:Date.now()+'', nome, sub:'', nicho:'', color:'#7B3FE4', init:nome.slice(0,2).toUpperCase()}]} : c));
  };

  // Move com posição específica (suporta reordenar dentro da mesma coluna)
  const moveTo = (cardId, fromColId, toColId, toIdx) => {
    setCols(cs => {
      const novas = cs.map(c => ({...c, cards: [...c.cards]}));
      const fromC = novas.find(c => c.id === fromColId);
      const toC   = novas.find(c => c.id === toColId);
      if (!fromC || !toC) return cs;
      const fromIdx = fromC.cards.findIndex(k => k.id === cardId);
      if (fromIdx < 0) return cs;
      const [card] = fromC.cards.splice(fromIdx, 1);
      // ajusta o índice se mover dentro da mesma coluna pra trás
      const insertAt = (fromColId === toColId && toIdx > fromIdx) ? toIdx - 1 : toIdx;
      toC.cards.splice(Math.min(insertAt, toC.cards.length), 0, card);
      return novas;
    });
  };

  const onDragStart = (e, card, colId, idx) => {
    setDrag({ card, fromCol: colId, fromIdx: idx });
    e.dataTransfer.effectAllowed = 'move';
    // Cria um ghost transparente customizado
    try {
      const ghost = e.currentTarget.cloneNode(true);
      ghost.style.position = 'absolute';
      ghost.style.top = '-9999px';
      ghost.style.left = '-9999px';
      ghost.style.width = e.currentTarget.offsetWidth + 'px';
      ghost.style.transform = 'rotate(3deg)';
      ghost.style.opacity = '0.95';
      ghost.style.boxShadow = '0 16px 40px rgba(0,0,0,.5)';
      document.body.appendChild(ghost);
      e.dataTransfer.setDragImage(ghost, 20, 20);
      setTimeout(() => ghost.remove(), 0);
    } catch (err) {}
  };

  const onCardDragOver = (e, colId, idx) => {
    e.preventDefault();
    e.stopPropagation();
    if (!drag) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const meio = rect.top + rect.height / 2;
    const novoIdx = e.clientY < meio ? idx : idx + 1;
    if (dropTarget?.colId !== colId || dropTarget?.idx !== novoIdx) {
      setDropTarget({ colId, idx: novoIdx });
    }
  };

  const onColDragOver = (e, colId) => {
    e.preventDefault();
    setColHover(colId);
    // Se não tem dropTarget na coluna, coloca no final
    if (drag && (!dropTarget || dropTarget.colId !== colId)) {
      const col = cols.find(c => c.id === colId);
      if (col) setDropTarget({ colId, idx: col.cards.length });
    }
  };

  const onDrop = (e) => {
    e.preventDefault();
    if (drag && dropTarget) {
      moveTo(drag.card.id, drag.fromCol, dropTarget.colId, dropTarget.idx);
      if (drag.fromCol !== dropTarget.colId) {
        showToast(`${drag.card.nome} movido para "${cols.find(c=>c.id===dropTarget.colId)?.nome}"`, 'success');
      }
    }
    setDrag(null); setDropTarget(null); setColHover(null);
  };

  const onDragEnd = () => { setDrag(null); setDropTarget(null); setColHover(null); };

  return (
    <div style={{padding:'28px 32px',overflowX:'auto',height:'calc(100vh - 60px)',display:'flex',flexDirection:'column'}}>
      <div className="page-head" style={{flexShrink:0}}>
        <div>
          <div className="page-head__title">Pipeline de Clientes</div>
          <div className="page-head__sub">{cols.reduce((s,c)=>s+c.cards.length,0)} clientes · {cols.length} colunas · arraste cards entre colunas ou reordene dentro da mesma</div>
        </div>
        <div className="page-head__actions">
          <button className="btn btn-outline" onClick={addCol}><Icon name="Plus" size={14}/>Nova coluna</button>
        </div>
      </div>

      <div style={{display:'flex',gap:14,flex:1,overflowX:'auto',overflowY:'hidden',paddingBottom:16}}
        onDragEnd={onDragEnd}>
        {cols.map(col => {
          const isHover = colHover === col.id && drag;
          return (
          <div key={col.id} style={{
              width:280, flexShrink:0, display:'flex', flexDirection:'column', gap:0,
              transition:'transform .15s',
              transform: isHover ? 'translateY(-2px)' : 'none',
            }}
            onDragOver={e => onColDragOver(e, col.id)}
            onDragLeave={e => { if (!e.currentTarget.contains(e.relatedTarget)) setColHover(null); }}
            onDrop={onDrop}>

            {/* Header coluna */}
            <div style={{
              display:'flex',alignItems:'center',gap:8,
              padding:'10px 14px',marginBottom:10,
              background:'var(--bg-2)',
              border:`1px solid ${isHover ? col.cor : col.cor+'44'}`,
              borderTop:`3px solid ${col.cor}`,
              borderRadius:'10px 10px 0 0',
              boxShadow: isHover ? `0 0 0 2px ${col.cor}33` : 'none',
              transition:'all .2s',
            }}>
              <div style={{position:'relative'}}>
                <div onClick={()=>setEditando(editando?.colId===col.id&&editando?.tipo==='cor'?null:{colId:col.id,tipo:'cor'})}
                  style={{width:16,height:16,borderRadius:'50%',background:col.cor,cursor:'pointer',border:'2px solid rgba(255,255,255,.2)',flexShrink:0}}/>
                {editando?.colId===col.id && editando?.tipo==='cor' && (
                  <div style={{position:'absolute',top:24,left:0,zIndex:100,background:'var(--bg-3)',border:'1px solid var(--border)',borderRadius:10,padding:10,display:'flex',gap:6,flexWrap:'wrap',width:140,boxShadow:'0 8px 24px rgba(0,0,0,.4)'}}>
                    {CORES.map(c=>(
                      <div key={c} onClick={()=>{updateCol(col.id,{cor:c});setEditando(null);}}
                        style={{width:22,height:22,borderRadius:'50%',background:c,cursor:'pointer',border:col.cor===c?'2px solid #fff':'2px solid transparent',transition:'border .15s'}}/>
                    ))}
                  </div>
                )}
              </div>

              {editando?.colId===col.id && editando?.tipo==='nome'
                ? <input autoFocus value={novoNome} onChange={e=>setNovoNome(e.target.value)}
                    onBlur={()=>{updateCol(col.id,{nome:novoNome});setEditando(null);}}
                    onKeyDown={e=>{if(e.key==='Enter'){updateCol(col.id,{nome:novoNome});setEditando(null);}if(e.key==='Escape')setEditando(null);}}
                    style={{flex:1,background:'var(--bg-3)',border:'1px solid var(--purple)',borderRadius:6,padding:'2px 8px',fontSize:13,color:'var(--t1)',outline:'none'}}/>
                : <span onClick={()=>{setEditando({colId:col.id,tipo:'nome'});setNovoNome(col.nome);}}
                    style={{flex:1,fontFamily:'var(--f-d)',fontWeight:600,fontSize:13.5,color:'var(--t1)',cursor:'pointer'}}
                    title="Clique para renomear">{col.nome}</span>
              }

              <span style={{fontFamily:'var(--f-m)',fontSize:11,color:'var(--t3)',background:'var(--bg-3)',padding:'2px 7px',borderRadius:999}}>{col.cards.length}</span>
              <button onClick={()=>removeCol(col.id)} title="Remover coluna"
                style={{width:20,height:20,borderRadius:4,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--t3)',cursor:'pointer',transition:'color .15s'}}
                onMouseEnter={e=>e.currentTarget.style.color='#fca5a5'}
                onMouseLeave={e=>e.currentTarget.style.color='var(--t3)'}>
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
              </button>
            </div>

            {/* Cards */}
            <div style={{
              flex:1, overflowY:'auto', display:'flex', flexDirection:'column', gap:8, paddingRight:2,
              padding:'2px 4px 2px 0',
              borderRadius:8,
              background: isHover ? `${col.cor}08` : 'transparent',
              transition:'background .2s',
            }}>
              {col.cards.length === 0 && !isHover && (
                <div style={{padding:'30px 16px', textAlign:'center', border:'1.5px dashed var(--border)', borderRadius:10, color:'var(--t3)', fontSize:12}}>
                  <Icon name="Inbox" size={28} style={{color:'var(--t3)', opacity:.4, margin:'0 auto 8px'}}/>
                  <div>Arraste um card aqui<br/>ou clique em + Adicionar</div>
                </div>
              )}
              {col.cards.map((card, idx) => {
                const showPlaceholderBefore = dropTarget?.colId === col.id && dropTarget?.idx === idx && drag?.card.id !== card.id;
                const isDragging = drag?.card.id === card.id;
                return (
                  <React.Fragment key={card.id}>
                    {showPlaceholderBefore && <DragPlaceholder cor={col.cor} h={drag?.height || 60}/>}
                    <div draggable
                      onDragStart={e => {
                        const h = e.currentTarget.offsetHeight;
                        setDrag({ card, fromCol: col.id, fromIdx: idx, height: h });
                        e.dataTransfer.effectAllowed = 'move';
                      }}
                      onDragEnd={onDragEnd}
                      onDragOver={e => onCardDragOver(e, col.id, idx)}
                      style={{
                        background:'var(--bg-2)', border:'1px solid var(--border-soft)',
                        borderLeft:`3px solid ${card.color}`, borderRadius:10,
                        padding:'12px 14px', cursor:'grab',
                        transition:'all .18s cubic-bezier(.22,1,.36,1)',
                        opacity: isDragging ? 0.35 : 1,
                        transform: isDragging ? 'scale(.97)' : 'scale(1)',
                        boxShadow: isDragging ? 'none' : '0 1px 0 rgba(0,0,0,.05)',
                      }}
                      onMouseDown={e => e.currentTarget.style.cursor = 'grabbing'}
                      onMouseUp={e => e.currentTarget.style.cursor = 'grab'}
                      onMouseEnter={e => { if (!drag) { e.currentTarget.style.borderColor = 'rgba(123,63,228,.4)'; e.currentTarget.style.transform = 'translateY(-1px)'; e.currentTarget.style.boxShadow = '0 4px 12px rgba(0,0,0,.15)'; }}}
                      onMouseLeave={e => { if (!drag) { e.currentTarget.style.borderColor = 'var(--border-soft)'; e.currentTarget.style.transform = 'translateY(0)'; e.currentTarget.style.boxShadow = '0 1px 0 rgba(0,0,0,.05)'; }}}>
                      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:card.sub?6:0}}>
                        <div style={{width:26,height:26,borderRadius:'50%',background:card.color,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--f-d)',fontWeight:700,fontSize:10,color:'#fff',flexShrink:0}}>{card.init}</div>
                        <div style={{fontWeight:600,fontSize:13,color:'var(--t1)',flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{card.nome}</div>
                      </div>
                      {card.sub && <div style={{fontSize:11.5,color:'var(--t3)',marginLeft:34}}>{card.sub}</div>}
                      {card.nicho && <div style={{fontSize:11,color:'var(--t2)',marginLeft:34,marginTop:2}}>{card.nicho}</div>}
                    </div>
                  </React.Fragment>
                );
              })}
              {/* Placeholder no fim da lista */}
              {dropTarget?.colId === col.id && dropTarget?.idx >= col.cards.length && drag && drag.fromCol !== col.id && (
                <DragPlaceholder cor={col.cor} h={drag.height || 60}/>
              )}
              {dropTarget?.colId === col.id && dropTarget?.idx >= col.cards.length && drag?.fromCol === col.id && drag?.fromIdx !== col.cards.length - 1 && (
                <DragPlaceholder cor={col.cor} h={drag.height || 60}/>
              )}

              {/* Adicionar card */}
              <button onClick={()=>addCard(col.id)} style={{
                width:'100%',padding:'9px',borderRadius:9,border:'1px dashed var(--border)',
                background:'transparent',color:'var(--t3)',fontSize:12.5,cursor:'pointer',
                display:'flex',alignItems:'center',justifyContent:'center',gap:5,
                transition:'all .15s',
              }}
                onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--purple)';e.currentTarget.style.color='#c4a8ff';}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--t3)';}}>
                <Icon name="Plus" size={13}/>Adicionar
              </button>
            </div>
          </div>
        );})}
      </div>
    </div>
  );
}

                      <Icon name={k.icon} size={17} style={{color:cliente.color}}/>
                    </div>
                  </div>
                  <div className="kpi__value" style={{color:'var(--t1)'}}>{k.val}{k.suf}</div>
                  <div className="kpi__delta up"><Icon name="TrendingUp" size={12}/>em alta</div>
                </div>
              ))}
            </div>

            <div className="grid-2">
              <div className="card">
                <div className="card__head">
                  <div className="card__title">Conversas — últimos 7 dias</div>
                </div>
                <div className="chart">
                  {chartData.map((d,i) => (
                    <div key={i} className="chart-bar-wrap">
                      <div className={`chart-bar ${d.today?'today':'past'}`} style={{height:`${(d.v/maxV)*100}%`, background: d.today ? cliente.color : cliente.color+'55'}}/>
                      <div className="chart-label">{d.day}</div>
                    </div>
                  ))}
                </div>
              </div>
              <div className="card">
                <div className="card__head">
                  <div className="card__title">Status do Agente IA</div>
                  <span style={{fontSize:11,padding:'3px 9px',borderRadius:999,background:'rgba(29,158,117,.15)',color:'#6ee7b7',fontFamily:'var(--f-m)'}}>ATIVO</span>
                </div>
                <div className="ia-status">
                  <div className="ia-dot"/>
                  <div className="ia-info">
                    <div className="ia-name">Agente IA · {cliente.servico.includes('CRM')?'Vendas & Suporte':'Atendimento'}</div>
                    <div className="ia-sub">Respondendo em média 22 seg</div>
                  </div>
                </div>
                {[['Uptime hoje','100%'],['Conversas assumidas',`${conv} / ${conv+3}`],['Plano atual',cliente.servico],['Nicho',cliente.nicho]].map(([k,v])=>(
                  <div key={k} className="stat-row">
                    <div className="stat-label">{k}</div>
                    <div className="stat-val">{v}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}
        {page !== 'dashboard' && (
          <div className="placeholder" style={{marginTop:80}}>
            <Icon name={NAV_CLIENT.find(n=>n.key===page)?.icon||'LayoutDashboard'} size={52} color="var(--t3)"/>
            <div style={{fontFamily:'var(--f-d)',fontSize:18,fontWeight:600,color:'var(--t2)'}}>{NAV_CLIENT.find(n=>n.key===page)?.label}</div>
            <p>Disponível no workspace real de {cliente.nome} após deploy.</p>
          </div>
        )}
      </main>
    </div>
  );
}

/* ─── Exportar CSV ─── */
function exportarCSV() {
  const rows = [['Cliente','Serviço','Nicho','Status','Implementação','Mensal','Dia Pagamento']];
  RECORRENCIA.forEach(r => rows.push([r.cliente, r.servico, r.nicho, r.status, r.impl, r.mensal, r.dia]));
  const csv = rows.map(r => r.map(c => `"${(''+c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `brava_relatorio_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  showToast('Relatório exportado com sucesso', 'success');
}

/* ─── App ─── */
function App() {
  // Persistência via localStorage
  const [page, setPage] = useState(() => localStorage.getItem('brava_page') || 'dashboard');
  const [collapsed, setCollapsed] = useState(() => localStorage.getItem('brava_collapsed') === '1');
  const [impersonate, setImpersonate] = useState(null);
  const [pipelineCols, setPipelineCols] = useState(() => {
    try { const s = localStorage.getItem('brava_pipeline'); if (s) return JSON.parse(s); } catch(e){}
    return PIPELINE_INIT;
  });
  const [busca, setBusca] = useState('');
  const [notifAberta, setNotifAberta] = useState(false);
  const [novoClienteAberto, setNovoClienteAberto] = useState(false);
  const [extraCRM, setExtraCRM] = useState(() => {
    try { const s = localStorage.getItem('brava_extra_crm'); if (s) return JSON.parse(s); } catch(e){}
    return [];
  });

  // Persistir
  useEffect(() => { localStorage.setItem('brava_page', page); }, [page]);
  useEffect(() => { localStorage.setItem('brava_collapsed', collapsed?'1':'0'); }, [collapsed]);
  useEffect(() => { localStorage.setItem('brava_pipeline', JSON.stringify(pipelineCols)); }, [pipelineCols]);
  useEffect(() => { localStorage.setItem('brava_extra_crm', JSON.stringify(extraCRM)); }, [extraCRM]);

  const moverNoPipeline = (nomeCliente, paraColId) => {
    setPipelineCols(cs => {
      const card = cs.flatMap(c=>c.cards).find(k=>k.nome===nomeCliente);
      if (!card) return cs;
      return cs.map(c => {
        if (c.cards.some(k=>k.nome===nomeCliente)) return {...c, cards: c.cards.filter(k=>k.nome!==nomeCliente)};
        if (c.id === paraColId) return {...c, cards:[...c.cards, card]};
        return c;
      });
    });
  };

  const [shortcutsOpen, setShortcutsOpen] = useState(false);
  useKeyboardShortcuts({ setNovoCliente: setNovoClienteAberto, setShortcutsOpen });

  // Cadastrar novo cliente
  const cadastrarCliente = (cliente) => {
    setExtraCRM(arr => [...arr, cliente]);
    const colMap = { 'Comercial':'lead', 'Proposta Apresentada':'proposta', 'Implementação':'impl', 'Ativo':'ativo', 'Em Prod':'prod', 'Em breve':'lead' };
    const colId = colMap[cliente.status] || 'lead';
    setPipelineCols(cs => cs.map(c => c.id === colId ? {...c, cards:[...c.cards, {id:cliente.nome+Date.now(), nome:cliente.nome, sub:cliente.servico, nicho:cliente.nicho, color:cliente.color, init:cliente.init}]} : c));
    showToast(`Cliente ${cliente.nome} cadastrado com sucesso`, 'success');
  };

  useEffect(() => {
    const app = document.querySelector('.app');
    if (app) app.style.gridTemplateColumns = collapsed ? '0 1fr' : 'var(--sidebar) 1fr';
  }, [collapsed]);

  // Toast de boas-vindas no primeiro acesso pós-checkout
  useEffect(() => {
    if (SESSAO.welcome) {
      setTimeout(() => {
        showToast(`Bem-vindo à Brava, ${SESSAO.nome.split(' ')[0]}! Seu workspace está pronto.`, 'success');
        // Marca como já visto pra não mostrar de novo
        const s = JSON.parse(localStorage.getItem('brava_sessao') || '{}');
        s.welcome = false;
        localStorage.setItem('brava_sessao', JSON.stringify(s));
      }, 1200);
    }
  }, []);

  // Fechar notificações ao clicar fora
  useEffect(() => {
    if (!notifAberta) return;
    const close = e => { if (!e.target.closest('.header__actions')) setNotifAberta(false); };
    document.addEventListener('click', close);
    return () => document.removeEventListener('click', close);
  }, [notifAberta]);

  if (impersonate) return (
    <>
      <ImpersonateBanner cliente={impersonate} onSair={() => setImpersonate(null)}/>
      <ClientWorkspace cliente={impersonate}/>
    </>
  );

  return (
    <div className="app">
      <ThemeToggle/>
      <Sidebar page={page} setPage={setPage} collapsed={collapsed} setCollapsed={setCollapsed}/>
      <Header page={page} collapsed={collapsed} setCollapsed={setCollapsed} setPage={setPage} busca={busca} setBusca={setBusca} notifAberta={notifAberta} setNotifAberta={setNotifAberta}/>
      <main className="main">
        {page === 'dashboard' ? <Dashboard onImpersonate={setImpersonate} pipelineCols={pipelineCols} setPage={setPage} onNovoCliente={()=>setNovoClienteAberto(true)} onExportar={exportarCSV} busca={busca}/>
          : page === 'clientes' ? <Conversas pipelineCols={pipelineCols} moverNoPipeline={moverNoPipeline}/>
          : page === 'mrr'      ? <MRR/>
          : page === 'pipeline' ? <Pipeline cols={pipelineCols} setCols={setPipelineCols}/>
          : page === 'analytics'? <Analytics/>
          : page === 'chamados' ? <Chamados/>
          : page === 'equipe'   ? <Equipe/>
          : page === 'logs'     ? <Logs/>
          : page === 'config'   ? <Config/>
          : <Placeholder page={page}/>}
      </main>
      {novoClienteAberto && <NovoClienteModal onClose={()=>setNovoClienteAberto(false)} onSalvar={cadastrarCliente}/>}
      <ShortcutsModal open={shortcutsOpen} onClose={()=>setShortcutsOpen(false)}/>
      <AIChat/>
      <ToastContainer/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
setTimeout(() => {
  const l = document.getElementById('brava-loading');
  if (l) { l.style.opacity = '0'; setTimeout(() => l.remove(), 400); }
}, 700);
</script>
</body>
</html>
