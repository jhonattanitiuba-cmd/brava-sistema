        <div style={{display:'flex', gap:8}}>
          <input style={inp} value={testInput} onChange={e=>setTestInput(e.target.value)} placeholder="Digite uma mensagem de teste"/>
          <button onClick={testar} disabled={testando} className="btn btn-outline" style={{flexShrink:0}}>
            {testando ? 'Testando…' : 'Testar'}
          </button>
        </div>
        {testOutput && (
          <div style={{marginTop:12, padding:12, background:'var(--bg-3)', borderRadius:8, fontSize:13, color:'var(--t1)', fontFamily:'var(--f-m)', whiteSpace:'pre-wrap', maxHeight:240, overflowY:'auto'}}>
            {testOutput.replied
              ? <><div style={{fontSize:10, color:'var(--t3)', marginBottom:6, textTransform:'uppercase'}}>Resposta da IA</div><div>{testOutput.replied}</div></>
              : testOutput.skipped
              ? <span style={{color:'#BA7517'}}>Pulou: {testOutput.skipped}</span>
              : testOutput.error
              ? <span style={{color:'#ff8585'}}>Erro: {testOutput.error || JSON.stringify(testOutput.detail)}</span>
              : <pre style={{margin:0}}>{JSON.stringify(testOutput, null, 2)}</pre>}
          </div>
        )}
      </div>
    </div>
  );
}

function Config() {
  const [aba, setAba] = useState('geral');
  const abas = [
    {key:'geral',      label:'Geral',          icon:'Settings'},
    {key:'perfil',     label:'Perfil',         icon:'User'},
    {key:'ia',         label:'IA',             icon:'Sparkles'},
    {key:'integracoes',label:'Integrações',    icon:'Plug'},
    {key:'webhooks',   label:'Webhooks',       icon:'Webhook'},
    {key:'api',        label:'API Keys',       icon:'Key'},
    {key:'billing',    label:'Billing Brava',  icon:'CreditCard'},
    {key:'lgpd',       label:'LGPD & Dados',   icon:'Shield'},
  ];

  // State da foto (sincroniza com localStorage)
  const [foto, setFoto] = useState(() => getUserPhoto());
  const [salvando, setSalvando] = useState(false);
  const [msg, setMsg] = useState('');
  const fileRef = React.useRef(null);

  // Inputs CONTROLADOS pelo perfil reativo: ao salvar, o store atualiza,
  // o evento brava_perfil_changed dispara e o campo reflete o valor salvo
  const perfilStore = useUserPerfil();
  const [perfilForm, setPerfilForm] = useState({
    nome: perfilStore.nome, cargo: perfilStore.cargo,
    email: perfilStore.email, telefone: perfilStore.telefone,
  });
  // Quando o store muda (saved!), reflete nos inputs
  useEffect(() => {
    setPerfilForm({
      nome: perfilStore.nome, cargo: perfilStore.cargo,
      email: perfilStore.email, telefone: perfilStore.telefone,
    });
  }, [perfilStore.nome, perfilStore.cargo, perfilStore.email, perfilStore.telefone]);
  const setPF = (k,v) => setPerfilForm(p => ({...p, [k]:v}));

  const onSelectFile = (file) => {
    if (!file) return;
    if (!file.type.startsWith('image/')) { setMsg('Arquivo precisa ser uma imagem.'); return; }
    if (file.size > 5 * 1024 * 1024) { setMsg('Imagem muito grande (máx 5MB).'); return; }
    setSalvando(true); setMsg('');
    const reader = new FileReader();
    reader.onload = e => {
      const dataUrl = e.target.result;
      setFoto(dataUrl);
      setUserPhoto(dataUrl);
      setSalvando(false);
      setMsg('Foto atualizada com sucesso.');
      setTimeout(() => setMsg(''), 3000);
    };
    reader.onerror = () => { setSalvando(false); setMsg('Erro ao ler arquivo.'); };
    reader.readAsDataURL(file);
  };

  const onRemove = () => {
    if (!confirm('Remover sua foto de perfil?')) return;
    setFoto(null);
    setUserPhoto(null);
    setMsg('Foto removida.');
    setTimeout(() => setMsg(''), 3000);
  };

  const iniciais = (perfilStore.nome || 'JI').split(' ').slice(0,2).map(n=>n[0]).join('').toUpperCase();

  return (
    <div className="page">
      <div className="page-head">
        <div>
          <div className="page-head__title">Configurações</div>
          <div className="page-head__sub">Configurações da plataforma Brava Company</div>
        </div>
      </div>

      <div style={{display:'grid', gridTemplateColumns:'200px 1fr', gap:18}}>
        {/* Tabs */}
        <div className="card" style={{padding:8, height:'fit-content'}}>
          {abas.map(a => (
            <div key={a.key} onClick={()=>setAba(a.key)} style={{
              padding:'10px 12px', borderRadius:8, cursor:'pointer',
              display:'flex', alignItems:'center', gap:10,
              background: aba===a.key ? 'rgba(123,63,228,.12)' : 'transparent',
              color: aba===a.key ? 'var(--t1)' : 'var(--t2)',
              fontWeight: aba===a.key ? 600 : 500, fontSize:13,
              transition:'all .15s',
            }}>
              <Icon name={a.icon} size={15}/>
              {a.label}
            </div>
          ))}
        </div>

        {/* Conteúdo */}
        <div className="card">
          {aba==='perfil' && (
            <div style={{display:'flex', flexDirection:'column', gap:24}}>
              <div>
                <div className="card__title" style={{marginBottom:6}}>Perfil do usuário</div>
                <div style={{fontSize:13, color:'var(--t2)'}}>Atualize sua foto, nome e dados de acesso. As alterações são aplicadas em todas as telas onde você aparece.</div>
              </div>

              {/* Foto */}
              <div style={{display:'flex', alignItems:'center', gap:24, padding:'20px', background:'var(--bg-3)', borderRadius:12, border:'1px solid var(--border-soft)'}}>
                <div style={{
                  width:96, height:96, borderRadius:'50%',
                  background: foto ? `var(--bg-3) url('${foto}') center 25%/cover no-repeat` : 'linear-gradient(135deg, var(--purple), var(--blue))',
                  display:'flex', alignItems:'center', justifyContent:'center',
                  fontFamily:'var(--f-d)', fontWeight:700, fontSize:32,
                  color: foto ? 'transparent' : '#fff',
                  flexShrink:0, overflow:'hidden',
                  boxShadow:'0 8px 24px rgba(0,0,0,.3)'
                }}>{iniciais}</div>

                <div style={{flex:1, minWidth:0}}>
                  <div style={{fontWeight:600, fontSize:16, color:'var(--t1)', marginBottom:4}}>Foto de perfil</div>
                  <div style={{fontSize:12.5, color:'var(--t3)', marginBottom:12}}>JPG, PNG ou WEBP. Máx 5MB. Recomendado 256×256.</div>

                  <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>
                    <input
                      ref={fileRef}
                      type="file"
                      accept="image/jpeg,image/png,image/webp"
                      style={{display:'none'}}
                      onChange={e => onSelectFile(e.target.files?.[0])}
                    />
                    <button
                      className="btn btn-primary"
                      onClick={() => fileRef.current?.click()}
                      disabled={salvando}
                    >
                      <Icon name={foto ? 'Pencil' : 'Upload'} size={14}/>
                      {salvando ? 'Salvando...' : (foto ? 'Trocar foto' : 'Enviar foto')}
                    </button>
                    {foto && (
                      <button className="btn btn-outline" onClick={onRemove}>
                        <Icon name="Trash2" size={14}/>Remover
                      </button>
                    )}
                  </div>

                  {msg && (() => {
                    const isErr = msg.includes('Erro')||msg.includes('grande')||msg.includes('precisa');
                    return (
                      <div style={{
                        marginTop:10, padding:'10px 14px',
                        background: isErr ? 'rgba(163,45,45,.15)' : 'rgba(29,158,117,.15)',
                        color: isErr ? '#fca5a5' : '#6ee7b7',
                        borderRadius:8, fontSize:13, fontWeight:500,
                        display:'flex', alignItems:'center', justifyContent:'space-between', gap:10
                      }}>
                        <span style={{display:'flex', alignItems:'center', gap:8}}>
                          <Icon name={isErr ? 'AlertCircle' : 'CheckCircle2'} size={15}/>
                          {msg}
                        </span>
                        <button onClick={() => setMsg('')} style={{background:'transparent', border:'none', color:'inherit', cursor:'pointer', padding:4, display:'flex', alignItems:'center', opacity:.7}} title="Fechar">
                          <Icon name="X" size={14}/>
                        </button>
                      </div>
                    );
                  })()}
                </div>
              </div>

              {/* Dados pessoais · inputs controlados pelo state */}
              <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:14}}>
                {[
                  ['nome',     'Nome completo'],
                  ['cargo',    'Cargo / Função'],
                  ['email',    'E-mail'],
                  ['telefone', 'Telefone / WhatsApp'],
                ].map(([k, label]) => (
                  <div key={k}>
                    <label style={{fontSize:12, fontWeight:500, color:'var(--t2)', marginBottom:6, display:'block'}}>{label}</label>
                    <input
                      value={perfilForm[k] || ''}
                      onChange={e => setPF(k, e.target.value)}
                      style={{width:'100%', height:42, padding:'0 14px', background:'var(--bg-3)', border:'1px solid var(--border)', borderRadius:8, fontSize:14, color:'var(--t1)', outline:'none'}}
                    />
                  </div>
                ))}
              </div>

              {/* Senha */}
              <div style={{padding:'16px 18px', border:'1px solid var(--border-soft)', borderRadius:10, background:'rgba(123,63,228,.04)'}}>
                <div style={{fontWeight:600, fontSize:14, color:'var(--t1)', marginBottom:4}}>Segurança</div>
                <div style={{fontSize:12.5, color:'var(--t3)', marginBottom:12}}>Alteração de senha será feita via Supabase Auth (envio por e-mail).</div>
                <button className="btn btn-outline"><Icon name="Lock" size={14}/>Alterar senha</button>
              </div>

              <div style={{display:'flex', gap:10, paddingTop:8, borderTop:'1px solid var(--border-soft)'}}>
                <button
                  className="btn btn-primary"
                  disabled={salvando}
                  onClick={() => {
                    if (!perfilForm.nome?.trim()) { setMsg('Erro: nome nao pode ficar em branco.'); return; }
                    setSalvando(true);
                    try {
                      const dados = {
                        nome:     perfilForm.nome.trim(),
                        cargo:    perfilForm.cargo?.trim()    || '',
                        email:    perfilForm.email?.trim()    || '',
                        telefone: perfilForm.telefone?.trim() || '',
                      };
                      setUserPerfilStore(dados);
                      setSalvando(false);
                      setMsg(`Perfil salvo. Agora aparece como "${dados.nome.split(' ')[0]}" na saudacao.`);
                      showToast?.(`Perfil atualizado`, 'success');
                      setTimeout(() => setMsg(''), 3500);
                    } catch (e) {
                      console.error(e);
                      setSalvando(false);
                      setMsg('Erro ao salvar: ' + e.message);
                    }
                  }}
                ><Icon name="Check" size={14}/>{salvando ? 'Salvando…' : 'Salvar alterações'}</button>
                <button className="btn btn-ghost" onClick={() => {
                  // Reseta o form para os valores salvos
                  setPerfilForm({
                    nome: perfilStore.nome, cargo: perfilStore.cargo,
                    email: perfilStore.email, telefone: perfilStore.telefone,
                  });
                  setMsg('');
                }}>Cancelar</button>
              </div>
            </div>
          )}
          {aba==='geral' && <ConfigGeralTab/>}
          {aba==='ia' && <ConfigIATab/>}
          {aba==='integracoes' && <ConfigIntegracoesTab/>}
          {aba==='webhooks' && (
            <div>
              <div className="card__title" style={{marginBottom:14}}>Webhooks ativos</div>
              <div style={{padding:14, background:'var(--bg-3)', borderRadius:10, fontFamily:'var(--f-m)', fontSize:12, color:'var(--t2)', border:'1px solid var(--border-soft)'}}>
                <div style={{color:'var(--success)', marginBottom:6}}>● POST https://bravacompany.app/api/webhooks/stripe</div>
                <div style={{color:'var(--success)', marginBottom:6}}>● POST https://bravacompany.app/api/webhooks/evolution</div>
                <div style={{color:'var(--t3)'}}>○ POST https://bravacompany.app/api/webhooks/cloud-api (inativo)</div>
              </div>
            </div>
          )}
          {aba==='api' && (
            <div>
              <div className="card__title" style={{marginBottom:14}}>Chaves de API</div>
              <div style={{padding:14, background:'var(--bg-3)', borderRadius:10, fontFamily:'var(--f-m)', fontSize:12, color:'var(--t2)', border:'1px solid var(--border-soft)', marginBottom:10}}>
                <div style={{color:'var(--t3)', marginBottom:4}}>Production</div>
                <div style={{color:'var(--t1)'}}>brava_live_sk_•••••••••••••••••••••aXkj9</div>
              </div>
              <div style={{padding:14, background:'var(--bg-3)', borderRadius:10, fontFamily:'var(--f-m)', fontSize:12, color:'var(--t2)', border:'1px solid var(--border-soft)'}}>
                <div style={{color:'var(--t3)', marginBottom:4}}>Test</div>
                <div style={{color:'var(--t1)'}}>brava_test_sk_•••••••••••••••••••••pL2mn</div>
              </div>
            </div>
          )}
          {aba==='billing' && (
            <div>
              <div className="card__title" style={{marginBottom:14}}>Faturamento Brava (interno)</div>
              <div className="stat-row"><div className="stat-label">MRR</div><div className="stat-val" style={{color:'var(--success)'}}>R$ 18.710</div></div>
              <div className="stat-row"><div className="stat-label">Custos infra</div><div className="stat-val">R$ 720</div></div>
              <div className="stat-row"><div className="stat-label">Margem operacional</div><div className="stat-val" style={{color:'var(--success)'}}>96%</div></div>
              <div className="stat-row"><div className="stat-label">Ticket médio</div><div className="stat-val">R$ 891</div></div>
            </div>
          )}
          {aba==='lgpd' && (
            <div>
              <div className="card__title" style={{marginBottom:14}}>LGPD & Privacidade</div>
              <p style={{fontSize:13, color:'var(--t2)', lineHeight:1.6, marginBottom:14}}>Dados dos clientes são armazenados em servidores brasileiros. Toda conversa é criptografada em repouso e em trânsito. Política de retenção: 24 meses. Backup diário com retenção de 30 dias.</p>
              <div className="stat-row"><div className="stat-label">DPO responsável</div><div className="stat-val">Jhonattan Itiuba</div></div>
              <div className="stat-row"><div className="stat-label">E-mail DPO</div><div className="stat-val">dpo@bravacompany.app</div></div>
              <div className="stat-row"><div className="stat-label">Última auditoria</div><div className="stat-val">{(() => { const d=new Date(); d.setDate(d.getDate()-30); return new Intl.DateTimeFormat('pt-BR').format(d); })()}</div></div>
            </div>
          )}
        </div>
      </div>
    </div>
  );

function Analytics() {
  const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const mrrEvol = [12000,14200,15800,17500,19200,21000,22500,24100,25800,26900,27500,28400];
  const conv    = [820,940,1060,1180,1340,1480,1620,1780,1920,2050,2180,2340];
  const max1 = Math.max(...mrrEvol);
  const max2 = Math.max(...conv);

  return (
    <div className="page">
      <div className="page-head">
        <div>
          <div className="page-head__title">Analytics</div>
          <div className="page-head__sub">Visão analítica · últimos 12 meses</div>
        </div>
      </div>

      <div className="kpi-grid">
        {[
          {l:'Crescimento MRR',  v:'+136%', d:'vs Jan/2026', c:'#1D9E75'},
          {l:'Churn rate',       v:'2.1%', d:'média 12 meses', c:'#BA7517'},
          {l:'LTV médio',        v:'R$ 14.250', d:'12x ticket médio', c:'#7B3FE4'},
          {l:'CAC',              v:'R$ 380',  d:'payback em 4 meses', c:'#1E90FF'},
        ].map((k,i) => (
          <div key={i} className="kpi">
            <div className="kpi__label">{k.l}</div>
            <div className="kpi__value" style={{color:k.c}}>{k.v}</div>
            <div className="kpi__delta" style={{color:'var(--t3)'}}>{k.d}</div>
          </div>
        ))}
      </div>

      <div className="grid-2">
        <div className="card">
          <div className="card__head"><div className="card__title">Evolução MRR · 12 meses</div></div>
          <div className="chart" style={{height:160}}>
            {mrrEvol.map((v,i) => (
              <div key={i} className="chart-bar-wrap">
                <div className={`chart-bar ${i===11?'today':'past'}`} style={{height:`${(v/max1)*100}%`}} title={`R$ ${v.toLocaleString('pt-BR')}`}/>
                <div className="chart-label">{meses[i]}</div>
              </div>
            ))}
          </div>
        </div>
        <div className="card">
          <div className="card__head"><div className="card__title">Conversas processadas · 12 meses</div></div>
          <div className="chart" style={{height:160}}>

function useKeyboardShortcuts({ setNovoCliente, setShortcutsOpen }) {
  useEffect(() => {
    const onKey = e => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key === '/') { e.preventDefault(); document.querySelector('.header__search input')?.focus(); }
      else if (e.key === 'n') { e.preventDefault(); setNovoCliente(true); }
      else if (e.key === '?') { e.preventDefault(); setShortcutsOpen(v => !v); }
      else if (e.key === 'Escape') { setShortcutsOpen(false); }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [setNovoCliente, setShortcutsOpen]);
}

/* ─── Store MRR — Supabase (tabela mrr_clients) ────────────────────────
   Substituiu o store localStorage anterior.
   __id = campo id do Supabase (UUID) para compatibilidade com o componente MRR.

   Mapeamentos:
   DB  implementacao        → UI impl
   DB  vencimento_dia (int) → UI dia (string "Dia 30" ou "")
   DB  id (uuid)            → UI __id
*/

// DB → UI
function _mrrFromDB(r) {
  return {
    ...r,
    __id:   r.id,
    impl:   parseFloat(r.implementacao)  || 0,
    mensal: parseFloat(r.mensal)         || 0,
    dia:    r.vencimento_dia ? `Dia ${r.vencimento_dia}` : '',
  };
}

// UI patch → DB patch (remove campos UI-only, normaliza nomes)
function _mrrToDB(patch) {
  const out = { ...patch };
  if ('impl'   in out) { out.implementacao = parseFloat(out.impl) || 0;  delete out.impl; }
  if ('dia'    in out) {
    const n = parseInt(String(out.dia || '').replace(/\D/g,''));
    out.vencimento_dia = isNaN(n) || n < 1 || n > 31 ? null : n;
    delete out.dia;
  }
  // Remove campos que só existem no UI
  delete out.__id; delete out.id; delete out.created_at; delete out.updated_at;
  return out;
}

async function setPagamento(recId, ym, info) {

  }
}

/* Helpers de competencia/atraso */
const YM = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
const ymToDate = (ym) => { const [y,m] = ym.split('-').map(Number); return new Date(y, m-1, 1); };

// extrai dia numerico de strings tipo "Dia 30", "30", "todo dia 10"
function parseDiaVenc(dia) {
  if (dia == null) return null;
  const m = String(dia).match(/\d+/);
  if (!m) return null;
  const d = parseInt(m[0], 10);
  return (d >= 1 && d <= 31) ? d : null;
}

// Calcula dias de atraso (positivo = atrasado, 0 = vence hoje, negativo = ainda no prazo)
// Retorna null se nao tem cobranca mensal ou dia de vencimento
function diasAtraso(rec, hoje = new Date()) {
  if (!rec || !rec.mensal || rec.mensal <= 0) return null;
  const diaVenc = parseDiaVenc(rec.dia);
  if (!diaVenc) return null;
  const venc = new Date(hoje.getFullYear(), hoje.getMonth(), Math.min(diaVenc, ultimoDiaMes(hoje.getFullYear(), hoje.getMonth())));
  const msDia = 24 * 60 * 60 * 1000;
  const h = new Date(hoje.getFullYear(), hoje.getMonth(), hoje.getDate());
  return Math.round((h - venc) / msDia);
}
const ultimoDiaMes = (y, m) => new Date(y, m+1, 0).getDate();

// Status sintetizado do pagamento do mes atual
// returns: { kind: 'pago'|'pendente'|'atrasado'|'sem-cobranca', dias: number, label, color }
function statusPagamentoMes(rec, pagamentos, hoje = new Date()) {
  if (!rec.mensal || rec.mensal <= 0) return { kind:'sem-cobranca', dias:0, label:'Sem mensalidade', color:'#6E6E78' };
  const diaVenc = parseDiaVenc(rec.dia);
  if (!diaVenc) return { kind:'sem-cobranca', dias:0, label:'Sem vencimento', color:'#6E6E78' };
  const ym = YM(hoje);
  const reg = pagamentos[rec.__id]?.[ym];
  if (reg?.pago) return { kind:'pago', dias:0, label:`Pago em ${formatBR(reg.data)}`, color:'#1D9E75' };
  const d = diasAtraso(rec, hoje);
  if (d < 0)  return { kind:'pendente', dias:-d, label:`Vence em ${-d} ${-d===1?'dia':'dias'}`, color:'#BA7517' };
  if (d === 0) return { kind:'pendente', dias:0, label:'Vence hoje', color:'#BA7517' };
  return { kind:'atrasado', dias:d, label:`Atrasado ${d} ${d===1?'dia':'dias'}`, color:'#A32D2D' };
}
const formatBR = (iso) => { if (!iso) return ''; const [y,m,d] = iso.split('-'); return `${d}/${m}/${y.slice(2)}`; };
const hojeISO = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };

  const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez','Jan/27'];
  const mesAtual = 4; // maio
  const corStatus = { 'Em Prod':'#1D9E75', 'Ativo':'#1E90FF', 'Implementação':'#7B3FE4', 'Comercial':'#BA7517', 'Proposta Apresentada':'#A32D2D', 'Em breve':'#6E6E78' };
  const statusOrdem = ['Em Prod','Ativo','Implementação','Comercial','Proposta Apresentada','Em breve'];

  // Agrupar MRR por status atual · recebe lista reativa via prop
  const lista = data || [];
  const mrrPorStatus = {};
  lista.forEach(r => {
    if (!r.mensal) return;
    mrrPorStatus[r.status] = (mrrPorStatus[r.status] || 0) + r.mensal;
  });

  // Curva histórica: clientes Em Prod e Ativo entram gradualmente do início do ano até maio
  // Curva futura: Implementação ativa em jun-jul, Comercial converte ao longo do ano, Proposta/Em breve fecham no fim
  // Cada mês: % de cada bucket que está faturando
  // Formato: [Em Prod %, Ativo %, Implementação %, Comercial %, Proposta %, Em breve %]
  const cronograma = [
    /* Jan */ [0.55, 0.40, 0,    0,    0,    0   ],
    /* Fev */ [0.70, 0.55, 0,    0,    0,    0   ],
    /* Mar */ [0.85, 0.75, 0,    0,    0,    0   ],
    /* Abr */ [0.95, 0.90, 0,    0,    0,    0   ],
    /* Mai */ [1.00, 1.00, 0,    0,    0,    0   ], // ATUAL
    /* Jun */ [1.00, 1.00, 0.30, 0.10, 0,    0   ],
    /* Jul */ [1.00, 1.00, 0.65, 0.20, 0,    0   ],
    /* Ago */ [1.00, 1.00, 1.00, 0.40, 0.20, 0   ],
    /* Set */ [1.00, 1.00, 1.00, 0.60, 0.45, 0.15],
    /* Out */ [1.00, 1.00, 1.00, 0.85, 0.75, 0.40],
    /* Nov */ [1.00, 1.00, 1.00, 1.00, 1.00, 0.75],
    /* Dez */ [1.00, 1.00, 1.00, 1.00, 1.00, 1.00],
    /* Jan/27 */ [1.10, 1.10, 1.20, 1.30, 1.40, 1.20], // crescimento orgânico + novos
  ];

  const dados = meses.map((mes, idx) => {
    const fatores = cronograma[idx];
    const stack = {};
    let total = 0;
    statusOrdem.forEach((st, i) => {
      const valor = Math.round((mrrPorStatus[st] || 0) * fatores[i]);
      if (valor > 0) { stack[st] = valor; total += valor; }
    });
    return { mes, total, stack, eAtual: idx === mesAtual, ePassado: idx < mesAtual, eFuturo: idx > mesAtual };
  });

  const maxTotal = Math.max(...dados.map(d => d.total));
  const totalAcumulado = dados.slice(mesAtual, 12).reduce((s,d) => s + d.total, 0);
  const projDezembro = dados[11].total;
  const mrrHoje = dados[mesAtual].total;
  const crescimento = Math.round(((projDezembro - mrrHoje) / mrrHoje) * 100);

  return (
    <div className="card" style={{marginBottom:14, padding:'22px 24px'}}>
      <div className="card__head" style={{marginBottom:18}}>
        <div>
          <div className="card__title" style={{fontSize:15}}>Projeção de MRR · 12 meses</div>
          <div style={{fontSize:12, color:'var(--t3)', marginTop:3}}>Empilhada por estágio do cliente · baseado em conversões esperadas</div>
        </div>
        <div style={{display:'flex', gap:14, alignItems:'center'}}>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:11, color:'var(--t3)', fontFamily:'var(--f-m)', textTransform:'uppercase', letterSpacing:'.05em'}}>MRR projetado dez/26</div>
            <div style={{fontFamily:'var(--f-d)', fontSize:22, fontWeight:700, color:'#1D9E75', letterSpacing:'-.02em', marginTop:2}}>R$ {projDezembro.toLocaleString('pt-BR')}</div>
          </div>
          <div style={{width:1, height:38, background:'var(--border-soft)'}}/>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:11, color:'var(--t3)', fontFamily:'var(--f-m)', textTransform:'uppercase', letterSpacing:'.05em'}}>Crescimento</div>
            <div style={{fontFamily:'var(--f-d)', fontSize:22, fontWeight:700, background:'var(--grad)', WebkitBackgroundClip:'text', backgroundClip:'text', WebkitTextFillColor:'transparent', letterSpacing:'-.02em', marginTop:2}}>+{crescimento}%</div>
          </div>
          <div style={{width:1, height:38, background:'var(--border-soft)'}}/>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:11, color:'var(--t3)', fontFamily:'var(--f-m)', textTransform:'uppercase', letterSpacing:'.05em'}}>Acumulado 8 meses</div>
            <div style={{fontFamily:'var(--f-d)', fontSize:22, fontWeight:700, color:'var(--t1)', letterSpacing:'-.02em', marginTop:2}}>R$ {totalAcumulado.toLocaleString('pt-BR')}</div>
          </div>
        </div>
      </div>

      {/* Gráfico empilhado */}
      <div style={{display:'flex', alignItems:'flex-end', gap:8, height:220, padding:'0 4px', position:'relative'}}>
        {/* Linha pontilhada do mês atual */}
        <div style={{
          position:'absolute', left:`${(mesAtual+0.5)/13*100}%`, top:0, bottom:24,
          borderLeft:'2px dashed var(--purple)', opacity:.5, pointerEvents:'none'
        }}/>

        {dados.map((d, i) => {
          const altura = (d.total / maxTotal) * 100;
          return (
            <div key={i} style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:6, height:'100%'}}>
              {/* Valor topo */}
              <div style={{
                fontFamily:'var(--f-m)', fontSize:9.5,
                color: d.eAtual ? 'var(--purple)' : d.eFuturo ? 'var(--t3)' : 'var(--t2)',
                fontWeight: d.eAtual ? 700 : 500,
                opacity: d.total > 0 ? 1 : 0,
              }}>
                {d.total >= 1000 ? `${(d.total/1000).toFixed(1)}k` : d.total}
              </div>

              {/* Barra empilhada */}
              <div style={{flex:1, width:'100%', display:'flex', flexDirection:'column', justifyContent:'flex-end', position:'relative'}}>
                <div style={{
                  width:'100%', height:`${altura}%`, minHeight:4,
                  display:'flex', flexDirection:'column-reverse',
                  borderRadius:'5px 5px 0 0', overflow:'hidden',
                  border: d.eAtual ? '2px solid var(--purple)' : 'none',
                  boxShadow: d.eAtual ? '0 0 12px rgba(123,63,228,.4)' : 'none',
                  transition:'opacity .2s',
                  opacity: d.eFuturo ? 0.85 : 1,
                  cursor:'default',
                }}
                  title={`${d.mes}/26 · R$ ${d.total.toLocaleString('pt-BR')}\n${Object.entries(d.stack).map(([k,v]) => `${k}: R$ ${v.toLocaleString('pt-BR')}`).join('\n')}`}
                >
                  {statusOrdem.map(st => d.stack[st] ? (
                    <div key={st} style={{
                      width:'100%',
                      height:`${(d.stack[st]/d.total)*100}%`,
                      background: corStatus[st],
                    }}/>
                  ) : null)}
                </div>
              </div>

              {/* Mês */}
              <div style={{
                fontFamily:'var(--f-m)', fontSize:10,
                color: d.eAtual ? 'var(--purple)' : 'var(--t3)',
                fontWeight: d.eAtual ? 700 : 500,
              }}>{d.mes}</div>
            </div>
          );
        })}
      </div>

      {/* Legenda */}
      <div style={{display:'flex', gap:18, marginTop:18, paddingTop:14, borderTop:'1px solid var(--border-soft)', flexWrap:'wrap', alignItems:'center'}}>
        {statusOrdem.map(st => {
          const total = lista.filter(r => r.status === st).reduce((s,r) => s+r.mensal, 0);
          if (total === 0) return null;
          return (
            <div key={st} style={{display:'flex', alignItems:'center', gap:6}}>
              <div style={{width:12, height:12, borderRadius:3, background:corStatus[st]}}/>
              <span style={{fontSize:12, color:'var(--t2)', fontWeight:500}}>{st}</span>
              <span style={{fontSize:11, color:'var(--t3)', fontFamily:'var(--f-m)'}}>R$ {total.toLocaleString('pt-BR')}/mês</span>
            </div>
          );
        })}
        <div style={{marginLeft:'auto', display:'flex', alignItems:'center', gap:6, fontSize:11, color:'var(--t3)'}}>
          <div style={{width:14, height:0, borderTop:'2px dashed var(--purple)'}}/>
          <span>Mês atual (Maio/26)</span>
        </div>
      </div>
    </div>
  );
}

/* Modal de edicao/criacao de cliente da aba MRR */
function ModalRec({ rec, onClose }) {
  const novo = !rec.__id;
  const [form, setForm] = useState({
    cliente: rec.cliente || '',
    servico: rec.servico || '',
    nicho:   rec.nicho || '',
    impl:    rec.impl || 0,
    mensal:  rec.mensal || 0,
    dia:     rec.dia || '',
    status:  rec.status || 'Comercial',
  });
  const set = (k,v) => setForm(f => ({...f, [k]:v}));

  const salvar = () => {
    if (!form.cliente.trim()) { showToast?.('Informe o nome do cliente','warn'); return; }
    const patch = { ...form, impl: Number(form.impl)||0, mensal: Number(form.mensal)||0 };
    if (novo) addRecorrencia(patch);
    else      editRecorrencia(rec.__id, patch);
    showToast?.(novo ? 'Cliente adicionado' : 'Cliente atualizado', 'success');

              {novo ? 'Novo contrato' : 'Editar contrato'}

/* Modal de historico/gestao de pagamentos do cliente */
function ModalPagamentos({ rec, pagamentos, onClose }) {
  const [refresh, setRefresh] = useState(0);
  const hoje = new Date();
  const diaVenc = parseDiaVenc(rec.dia);

  // Lista os ultimos 12 meses para gerir
  const meses = React.useMemo(() => {
    const arr = [];
    for (let i = 11; i >= 0; i--) {
      const d = new Date(hoje.getFullYear(), hoje.getMonth() - i, 1);
      arr.push({
        ym: YM(d),
        label: d.toLocaleDateString('pt-BR',{month:'short', year:'numeric'}).replace('.','').replace(' de ','/'),
        date: d,
        isAtual: i === 0,
        isFuturo: false,
      });
    }
    return arr;
  }, [refresh]);

  const togglePago = (ym, atualReg) => {
    if (atualReg?.pago) {
      setPagamento(rec.__id, ym, null); // desmarca
    } else {
      setPagamento(rec.__id, ym, { pago:true, data: hojeISO() });
    }
    setRefresh(r => r+1);
  };

  if (!rec.mensal || rec.mensal <= 0) {
    return (
      <div onClick={onClose} style={{position:'fixed', inset:0, background:'rgba(0,0,0,.65)', display:'grid', placeItems:'center', zIndex:9998}}>
        <div onClick={e=>e.stopPropagation()} style={{width:'min(460px,92vw)', background:'var(--bg-2)', border:'1px solid var(--border)', borderRadius:14, padding:24}}>
          <div style={{fontFamily:'var(--f-d)', fontSize:16, fontWeight:600, color:'var(--t1)', marginBottom:8}}>{rec.cliente}</div>
          <div style={{fontSize:13, color:'var(--t2)'}}>Este contrato nao tem mensalidade configurada. Edite o cliente para definir um valor mensal e dia de vencimento.</div>
          <button onClick={onClose} className="btn btn-primary" style={{marginTop:18, width:'100%'}}>Fechar</button>
        </div>
      </div>
    );
  }

  return (
    <div onClick={onClose} style={{position:'fixed', inset:0, background:'rgba(0,0,0,.65)', display:'grid', placeItems:'center', zIndex:9998, animation:'fade-in .15s'}}>
      <div onClick={e=>e.stopPropagation()} style={{
        width:'min(560px, 94vw)', maxHeight:'88vh', overflow:'auto',
        background:'var(--bg-2)', border:'1px solid var(--border)',
        borderRadius:14, padding:'22px 24px'
      }}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:18}}>
          <div>
            <div style={{fontFamily:'var(--f-d)', fontSize:18, fontWeight:600, color:'var(--t1)'}}>{rec.cliente}</div>
            <div style={{fontSize:13, color:'var(--t3)', marginTop:3}}>
              R$ {rec.mensal.toLocaleString('pt-BR')}/mês · vence dia {diaVenc || '–'}
            </div>
          </div>
          <button onClick={onClose} style={{background:'none', border:'none', cursor:'pointer', color:'var(--t3)', padding:6}}><Icon name="XCircle" size={18}/></button>
        </div>

        <div style={{fontSize:11, color:'var(--t3)', fontFamily:'var(--f-m)', textTransform:'uppercase', letterSpacing:'.06em', marginBottom:10}}>Histórico (12 meses)</div>
        <div style={{display:'grid', gap:6}}>
          {meses.map(m => {
            const reg = pagamentos[rec.__id]?.[m.ym];
            const refForStatus = { ...rec };
            // calcula status pra cada mes considerando vencimento do mes
            let badge;
            if (reg?.pago) {
              badge = { label:`Pago · ${formatBR(reg.data)}`, color:'#1D9E75' };
            } else if (diaVenc) {
              const venc = new Date(m.date.getFullYear(), m.date.getMonth(), Math.min(diaVenc, ultimoDiaMes(m.date.getFullYear(), m.date.getMonth())));
              const h = new Date(hoje.getFullYear(), hoje.getMonth(), hoje.getDate());
              const dDias = Math.round((h - venc) / (24*60*60*1000));
              if (dDias < 0) badge = { label:`Vence em ${-dDias}d`, color:'#BA7517' };
              else if (dDias === 0) badge = { label:'Vence hoje', color:'#BA7517' };
              else badge = { label:`Atrasado ${dDias}d`, color:'#A32D2D' };
            } else {
              badge = { label:'Sem vencimento', color:'#6E6E78' };
            }
            return (
              <div key={m.ym} style={{
                display:'grid', gridTemplateColumns:'90px 1fr auto', gap:12, alignItems:'center',
                padding:'10px 12px', background: m.isAtual ? 'rgba(123,63,228,.08)' : 'var(--bg-3)',
                border: m.isAtual ? '1px solid rgba(123,63,228,.35)' : '1px solid var(--border-soft)',
                borderRadius:8
              }}>
                <div style={{fontFamily:'var(--f-m)', fontSize:12, color:'var(--t2)', textTransform:'capitalize'}}>{m.label}</div>
                <div>
                  <span style={{fontSize:11, padding:'3px 9px', borderRadius:999, background:badge.color+'22', color:badge.color, border:`1px solid ${badge.color}44`, fontWeight:500}}>{badge.label}</span>
                </div>
                <button onClick={()=>togglePago(m.ym, reg)} className="btn btn-sm" style={{
                  background: reg?.pago ? 'transparent' : '#1D9E75',
                  color: reg?.pago ? '#6E6E78' : '#fff',
                  border: reg?.pago ? '1px solid var(--border)' : 'none',
                  padding:'5px 11px', fontSize:12,
                }}>
                  {reg?.pago ? 'Desmarcar' : 'Marcar pago'}
                </button>
              </div>
            );
          })}
        </div>

        <button onClick={onClose} className="btn btn-outline" style={{marginTop:18, width:'100%'}}>Fechar</button>
      </div>
    </div>
  );
}

function MRR() {
  const recorrencia = useRecorrencia();
  const pagamentos = usePagamentos();

  const [filtro, setFiltro] = useState('todos');
  const [busca, setBusca] = useState('');
  const [sortCol, setSortCol] = useState('impl');
  const [sortAsc, setSortAsc] = useState(false);
  const [editando, setEditando] = useState(null);       // rec sendo editado ou {} para novo (modal)
  const [gerindoPag, setGerindoPag] = useState(null);   // rec para abrir modal pagamentos

  // ─── Inline editing ────────────────────────────────────────────────────────
  // inlineEdit: { rowId, field: 'cliente'|'servico'|...|'all' } ou null
  // field='all' = modo linha inteira (botao lápis)
  const [inlineEdit, setInlineEdit] = useState(null);
  const [inlineVals, setInlineVals] = useState({});     // { [campo]: string }
  const [flashRow,   setFlashRow]   = useState(null);   // rowId pra flash verde 600ms

  const _parseInlineField = (field, raw) => {
    if (['impl','mensal'].includes(field))
      return parseFloat(String(raw).replace(/[^\d.,]/g,'').replace(',','.')) || 0;
    if (field === 'dia') {
      const n = parseInt(raw);
      return (!isNaN(n) && n >= 1 && n <= 31) ? `Dia ${n}` : '';
    }
    return String(raw).trim();
  };

  const startInlineRow = (r) => {
    setInlineEdit({ rowId: r.__id, field: 'all' });
    setInlineVals({
      cliente: r.cliente || '',
      servico: r.servico || '',
      nicho:   r.nicho   || '',
      impl:    String(r.impl   || 0),
      mensal:  String(r.mensal || 0),
      dia:     r.dia ? String(parseInt(r.dia)) : '',
      status:  r.status  || 'Comercial',
    });
  };

  const startInlineCell = (r, field) => {
    if (inlineEdit?.rowId === r.__id) return; // ja em edicao dessa linha
    let val = r[field];
    if (field === 'dia') val = val ? String(parseInt(val)) : '';
    setInlineEdit({ rowId: r.__id, field });
    setInlineVals({ [field]: String(val ?? '') });
  };

  const cancelInline = React.useCallback(() => {
    setInlineEdit(null);
    setInlineVals({});
  }, []);

  const _flashAndClear = (rowId) => {
    setFlashRow(rowId);
    setTimeout(() => setFlashRow(null), 600);
  };

  const saveInlineRow = React.useCallback(async (rowId) => {
    const vals = inlineVals; // snapshot
    cancelInline();
    const patch = {};
    ['cliente','servico','nicho','impl','mensal','dia','status'].forEach(f => {
      if (vals[f] !== undefined) patch[f] = _parseInlineField(f, vals[f]);
    });
    if (!patch.cliente) return; // campo obrigatorio
    await editRecorrencia(rowId, patch);
    _flashAndClear(rowId);
  }, [inlineVals, cancelInline]);

  const saveInlineCell = React.useCallback(async (rowId, field) => {
    const raw = inlineVals[field];
    cancelInline();
    if (raw === undefined) return;
    await editRecorrencia(rowId, { [field]: _parseInlineField(field, raw) });
    _flashAndClear(rowId);
  }, [inlineVals, cancelInline]);

  const handleCellKey = (e, rowId, field, isRowMode) => {
    if (e.key === 'Enter')  { e.preventDefault(); isRowMode ? saveInlineRow(rowId) : saveInlineCell(rowId, field); }
    if (e.key === 'Escape') { e.preventDefault(); cancelInline(); }
    if (e.key === 'Tab')    { e.preventDefault(); saveInlineCell(rowId, field); }
  };

  // Fechar edição ao clicar fora da tabela
  React.useEffect(() => {
    if (!inlineEdit) return;
    const onOut = (e) => { if (!e.target.closest('.mrr-table')) cancelInline(); };
    document.addEventListener('mousedown', onOut);
    return () => document.removeEventListener('mousedown', onOut);
  }, [inlineEdit, cancelInline]);

  // Estilos reutilizáveis
  const inpStyle = (field) => ({
    background:'transparent', border:'1px solid rgba(123,63,228,.6)',
    borderRadius:4, color:'var(--t1)', fontSize:13, outline:'none',
    padding:'2px 6px', width:'100%', fontFamily:'var(--f-b)',
    textAlign: ['impl','mensal'].includes(field) ? 'right' : 'left',
  });

  const totalImpl = recorrencia.reduce((s,r) => s+(r.impl||0), 0);
  const totalMRR  = recorrencia.reduce((s,r) => s+(r.mensal||0), 0);
  const ativos    = recorrencia.filter(r=>['Em Prod','Ativo'].includes(r.status));
  const mrrAtivo  = ativos.reduce((s,r) => s+(r.mensal||0), 0);

  // Pagamentos do mes atual: total atrasado + numero de contratos atrasados
  const { totalAtrasado, qtdAtrasados, qtdPendentes, qtdPagosMes } = React.useMemo(() => {
    let totalA = 0, qtdA = 0, qtdP = 0, qtdPg = 0;
    recorrencia.forEach(r => {
      const st = statusPagamentoMes(r, pagamentos);
      if (st.kind === 'atrasado') { totalA += r.mensal; qtdA++; }
      else if (st.kind === 'pendente') qtdP++;
      else if (st.kind === 'pago') qtdPg++;
    });
    return { totalAtrasado: totalA, qtdAtrasados: qtdA, qtdPendentes: qtdP, qtdPagosMes: qtdPg };
  }, [recorrencia, pagamentos]);

  const filtrados = recorrencia
    .filter(r => {
      if (filtro === 'atrasados') {
        const st = statusPagamentoMes(r, pagamentos);
        if (st.kind !== 'atrasado') return false;
      } else if (filtro !== 'todos' && r.status !== filtro) {
        return false;
      }
      if (busca && !r.cliente.toLowerCase().includes(busca.toLowerCase()) && !r.nicho.toLowerCase().includes(busca.toLowerCase())) return false;
      return true;
    })
    .sort((a,b) => {
      const v = sortAsc ? 1 : -1;
      if (sortCol === 'impl') return ((a.impl||0) - (b.impl||0)) * v;
      if (sortCol === 'mensal') return ((a.mensal||0) - (b.mensal||0)) * v;
      if (sortCol === 'atraso') {
        const da = diasAtraso(a) ?? -999;
        const db = diasAtraso(b) ?? -999;
        return (da - db) * v;
      }
      return a.cliente.localeCompare(b.cliente) * v;
    });

  const col = (label, key) => (
    <th onClick={()=>{ if(sortCol===key) setSortAsc(v=>!v); else { setSortCol(key); setSortAsc(false); }}}
      style={{padding:'10px 14px',textAlign:'left',fontFamily:'var(--f-b)',fontSize:13,color:'#F5F5F7',fontWeight:700,cursor:'pointer',userSelect:'none',whiteSpace:'nowrap',borderBottom:'1px solid #2A2A3A'}}>
      {label} {sortCol===key ? (sortAsc?'↑':'↓') : ''}
    </th>
  );

  const fmt = v => v > 0 ? `R$ ${v.toLocaleString('pt-BR')}` : '–';

  const tickMensalPorContrato = recorrencia.filter(r=>r.mensal>0).length || 1;

  return (
    <div className="page">
      <div className="page-head">
        <div>
          <div className="page-head__title">MRR · Controle de Recorrência</div>
          <div className="page-head__sub">Base: CRM TECNOLOGIA · {recorrencia.length} contratos</div>
        </div>
        <div className="page-head__actions" style={{display:'flex',gap:10}}>
          <button onClick={()=>setEditando({})} className="btn btn-primary"><Icon name="Plus" size={14}/>Novo contrato</button>
          <button onClick={exportarCSV} className="btn btn-outline"><Icon name="Download" size={14}/>Exportar</button>
        </div>
      </div>

      {/* KPIs · incluindo Atrasados em destaque */}
      <div className="kpi-grid" style={{gridTemplateColumns:'repeat(5,1fr)',marginBottom:24}}>
        {[
          {label:'MRR Total',          val:`R$ ${totalMRR.toLocaleString('pt-BR')}`, icon:'TrendingUp', color:'#1E90FF'},
          {label:'MRR Ativo (Prod+Ativo)', val:`R$ ${mrrAtivo.toLocaleString('pt-BR')}`, icon:'CheckCircle2', color:'#1D9E75'},
          {label:'Implementação total',val:`R$ ${totalImpl.toLocaleString('pt-BR')}`,icon:'ScrollText',color:'#7B3FE4'},
          {label:'Ticket médio mensal',val:`R$ ${Math.round(totalMRR/tickMensalPorContrato).toLocaleString('pt-BR')}`, icon:'BarChart3', color:'#BA7517'},
          {label:`Em atraso (${qtdAtrasados})`, val:`R$ ${totalAtrasado.toLocaleString('pt-BR')}`, icon:'AlertCircle', color:'#A32D2D', highlight:qtdAtrasados>0, onClick:()=>setFiltro('atrasados')},
        ].map((k,i) => (
          <div key={i} className="kpi" onClick={k.onClick} style={{
            cursor:k.onClick?'pointer':'default',
            border: k.highlight ? '1px solid #A32D2D66' : '1px solid var(--border)',
            background: k.highlight ? 'linear-gradient(135deg, rgba(163,45,45,.08), transparent)' : undefined,
          }}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
              <div className="kpi__label">{k.label}</div>
              <div className="kpi__icon" style={{background:k.color+'22'}}><Icon name={k.icon} size={17} style={{color:k.color}}/></div>
            </div>
            <div className="kpi__value" style={{color:k.highlight?'#ff8585':'var(--t1)',fontSize:22}}>{k.val}</div>
          </div>
        ))}
      </div>

      {/* Banner alerta de atraso */}
      {qtdAtrasados > 0 && filtro !== 'atrasados' && (
        <div onClick={()=>setFiltro('atrasados')} style={{
          padding:'12px 16px', marginBottom:14, cursor:'pointer',
          background:'rgba(163,45,45,.08)', border:'1px solid #A32D2D55',
          borderRadius:10, display:'flex', alignItems:'center', gap:12,
        }}>
          <Icon name="AlertCircle" size={18} style={{color:'#ff8585'}}/>
          <div style={{flex:1, fontSize:13.5, color:'var(--t1)'}}>
            <strong style={{color:'#ff8585'}}>{qtdAtrasados} {qtdAtrasados===1?'contrato em atraso':'contratos em atraso'}</strong>
            {' '}somando <strong>R$ {totalAtrasado.toLocaleString('pt-BR')}</strong> · clique para filtrar
          </div>
          <Icon name="ChevronRight" size={16} style={{color:'var(--t3)'}}/>
        </div>
      )}

      {/* Projeção 12 meses · empilhada por status */}
      <ProjecaoMRR data={recorrencia}/>

      {/* Filtros + busca */}
      <div className="card" style={{padding:'16px 18px',marginBottom:14}}>
        <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
          <div style={{display:'flex',alignItems:'center',gap:8,padding:'7px 12px',background:'var(--bg-3)',border:'1px solid var(--border)',borderRadius:8,flex:'1',minWidth:180}}>
            <Icon name="Search" size={13} style={{color:'var(--t3)'}}/>
            <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="Buscar cliente ou nicho…" style={{background:'none',border:'none',outline:'none',fontSize:13,color:'var(--t1)',width:'100%'}}/>
          </div>
          {['todos','atrasados','Em Prod','Ativo','Implementação','Comercial','Proposta Apresentada','Em breve'].map(f => {
            const isAtraso = f === 'atrasados';
            const cor = isAtraso ? '#A32D2D' : (SC[f]||'var(--purple)');
            const count = isAtraso ? qtdAtrasados : recorrencia.filter(r=>r.status===f).length;
            return (
              <button key={f} onClick={()=>setFiltro(f)} style={{
                padding:'6px 12px',borderRadius:7,fontSize:12,fontWeight:500,cursor:'pointer',
                background:filtro===f ? cor+'22' : 'transparent',
                color:filtro===f ? (isAtraso?'#ff8585':(SC[f]||'#c4a8ff')) : '#6E6E78',
                border:`1px solid ${filtro===f ? cor+'55' : 'transparent'}`,
                transition:'all .15s',
              }}>{f==='todos'?'Todos':isAtraso?'Em atraso':f} {filtro===f && f!=='todos' && `(${count})`}</button>
            );
          })}
        </div>
      </div>

      {/* Tabela */}
      <div className="card" style={{padding:0,overflow:'hidden'}}>
        <div style={{overflowX:'auto'}}>
          <table className="mrr-table" style={{width:'100%',borderCollapse:'collapse',fontSize:13.5}}>
            <thead>
              <tr style={{background:'#000000'}}>
                {col('Cliente','cliente')}
                <th style={{padding:'10px 14px',textAlign:'left',fontFamily:'var(--f-b)',fontSize:13,color:'#F5F5F7',fontWeight:700,borderBottom:'1px solid #2A2A3A'}}>Serviço</th>
                <th style={{padding:'10px 14px',textAlign:'left',fontFamily:'var(--f-b)',fontSize:13,color:'#F5F5F7',fontWeight:700,borderBottom:'1px solid #2A2A3A'}}>Nicho</th>
                {col('Implementação','impl')}
                {col('Mensal','mensal')}
                <th style={{padding:'10px 14px',textAlign:'left',fontFamily:'var(--f-b)',fontSize:13,color:'#F5F5F7',fontWeight:700,borderBottom:'1px solid #2A2A3A'}}>Venc.</th>
                {col('Pagamento (mês atual)','atraso')}
                <th style={{padding:'10px 14px',textAlign:'left',fontFamily:'var(--f-b)',fontSize:13,color:'#F5F5F7',fontWeight:700,borderBottom:'1px solid #2A2A3A'}}>Status</th>
                <th style={{padding:'10px 14px',textAlign:'right',fontFamily:'var(--f-b)',fontSize:13,color:'#F5F5F7',fontWeight:700,borderBottom:'1px solid #2A2A3A'}}>Ações</th>
              </tr>
            </thead>
            <tbody>
              {filtrados.map((r,i) => {
                const stPag    = statusPagamentoMes(r, pagamentos);
                const ymAtual  = YM(new Date());
                const regAtual = pagamentos[r.__id]?.[ymAtual];
                const isRowEd  = inlineEdit?.rowId === r.__id && inlineEdit?.field === 'all';
                const isCellEd = (f) => inlineEdit?.rowId === r.__id && (inlineEdit?.field === f || isRowEd);
                const isFlash  = flashRow === r.__id;
                const rowBg    = isFlash ? 'rgba(29,158,117,.08)'
                               : stPag.kind === 'atrasado' ? 'rgba(163,45,45,.05)' : 'transparent';

                // Helper: render célula editável
                const EditCell = ({field, value, style={}, children}) => (
                  isCellEd(field) ? (
                    <input
                      autoFocus={inlineEdit?.field === field || (isRowEd && field === 'cliente')}
                      value={inlineVals[field] ?? String(value ?? '')}
                      onChange={e => setInlineVals(v => ({...v, [field]: e.target.value}))}
                      onKeyDown={e => handleCellKey(e, r.__id, field, isRowEd)}
                      onBlur={() => !isRowEd && saveInlineCell(r.__id, field)}
                      style={{...inpStyle(field), ...style}}
                    />
                  ) : (
                    <span
                      onClick={() => startInlineCell(r, field)}
                      title="Clique para editar"
                      style={{display:'block', cursor:'text', minWidth:40, ...style}}
                    >{children ?? (value || '–')}</span>
                  )
                );

                return (
                  <tr key={r.__id||i} style={{
                    borderBottom:'1px solid var(--border-soft)',
                    transition:'background .2s',
                    background: rowBg,
                    outline: isRowEd ? '1px solid rgba(123,63,228,.3)' : 'none',
                  }}
                    onMouseEnter={e=>{ if (!isRowEd) e.currentTarget.style.background = stPag.kind==='atrasado' ? 'rgba(163,45,45,.10)' : 'rgba(255,255,255,.03)'; }}
                    onMouseLeave={e=>{ if (!isRowEd) e.currentTarget.style.background = rowBg; }}>

                    {/* Cliente */}
                    <td style={{padding:'11px 14px',fontWeight:600,color:'var(--t1)',whiteSpace:'nowrap'}}>
                      <EditCell field="cliente" value={r.cliente}/>
                    </td>

                    {/* Serviço */}
                    <td style={{padding:'11px 14px',color:'var(--t2)',whiteSpace:'nowrap'}}>
                      <EditCell field="servico" value={r.servico}/>
                    </td>

                    {/* Nicho */}
                    <td style={{padding:'11px 14px',color:'var(--t2)'}}>
                      <EditCell field="nicho" value={r.nicho}/>
                    </td>

                    {/* Implementação */}
                    <td style={{padding:'11px 14px',fontFamily:'var(--f-m)',textAlign:'right',color: r.impl>0?'#F5F5F7':'#6E6E78'}}>
                      {isCellEd('impl') ? (
                        <input autoFocus={inlineEdit?.field==='impl'}
                          value={inlineVals.impl ?? String(r.impl||0)}
                          onChange={e=>setInlineVals(v=>({...v, impl:e.target.value}))}
                          onKeyDown={e=>handleCellKey(e,r.__id,'impl',isRowEd)}
                          onBlur={()=>!isRowEd&&saveInlineCell(r.__id,'impl')}
                          style={{...inpStyle('impl'),width:90}}/>
                      ) : (
                        <span onClick={()=>startInlineCell(r,'impl')} title="Clique para editar" style={{cursor:'text',display:'block'}}>{fmt(r.impl)}</span>
                      )}
                    </td>

                    {/* Mensal */}
                    <td style={{padding:'11px 14px',fontFamily:'var(--f-m)',textAlign:'right',color:r.mensal>0?'#1D9E75':'#6E6E78',fontWeight:r.mensal>0?600:400}}>
                      {isCellEd('mensal') ? (
                        <input autoFocus={inlineEdit?.field==='mensal'}
                          value={inlineVals.mensal ?? String(r.mensal||0)}
                          onChange={e=>setInlineVals(v=>({...v,mensal:e.target.value}))}
                          onKeyDown={e=>handleCellKey(e,r.__id,'mensal',isRowEd)}
                          onBlur={()=>!isRowEd&&saveInlineCell(r.__id,'mensal')}
                          style={{...inpStyle('mensal'),width:90}}/>
                      ) : (
                        <span onClick={()=>startInlineCell(r,'mensal')} title="Clique para editar" style={{cursor:'text',display:'block'}}>{fmt(r.mensal)}</span>
                      )}
                    </td>

                    {/* Venc. */}
                    <td style={{padding:'11px 14px',color:'var(--t2)',fontFamily:'var(--f-m)',fontSize:12}}>
                      {isCellEd('dia') ? (
                        <input autoFocus={inlineEdit?.field==='dia'}
                          value={inlineVals.dia ?? (r.dia?String(parseInt(r.dia)):'')}
                          onChange={e=>setInlineVals(v=>({...v,dia:e.target.value}))}
                          onKeyDown={e=>handleCellKey(e,r.__id,'dia',isRowEd)}
                          onBlur={()=>!isRowEd&&saveInlineCell(r.__id,'dia')}
                          placeholder="1-31"
                          style={{...inpStyle('dia'),width:50}}/>
                      ) : (
                        <span onClick={()=>startInlineCell(r,'dia')} title="Clique para editar" style={{cursor:'text',display:'block'}}>{r.dia||'–'}</span>
                      )}
                    </td>

                    {/* Pagamento mês atual */}
                    <td style={{padding:'11px 14px'}}>
                      <span style={{fontSize:11,padding:'3px 9px',borderRadius:999,background:stPag.color+'22',color:stPag.color,border:`1px solid ${stPag.color}44`,fontWeight:500,whiteSpace:'nowrap'}}>{stPag.label}</span>
                    </td>

                    {/* Status — select inline */}
                    <td style={{padding:'11px 14px'}}>
                      {isCellEd('status') ? (
                        <select autoFocus={inlineEdit?.field==='status'}
                          value={inlineVals.status ?? r.status}
                          onChange={e=>setInlineVals(v=>({...v,status:e.target.value}))}
                          onKeyDown={e=>{ if(e.key==='Escape') cancelInline(); if(e.key==='Enter'){e.preventDefault();isRowEd?saveInlineRow(r.__id):saveInlineCell(r.__id,'status');} }}
                          onBlur={()=>!isRowEd&&saveInlineCell(r.__id,'status')}
                          style={{background:'var(--bg-3)',border:'1px solid rgba(123,63,228,.6)',borderRadius:4,color:'var(--t1)',fontSize:11,outline:'none',padding:'3px 6px'}}>
                          {STATUS_OPTS.map(s=><option key={s} value={s}>{s}</option>)}
                        </select>
                      ) : (
                        <span onClick={()=>startInlineCell(r,'status')} title="Clique para editar" style={{cursor:'pointer'}}>
                          {r.status && <span style={{fontSize:11,padding:'3px 9px',borderRadius:999,background:(SC[r.status]||'#6E6E78')+'18',color:SC[r.status]||'#6E6E78',border:`1px solid ${(SC[r.status]||'#6E6E78')}33`,fontWeight:500}}>{r.status}</span>}
                        </span>
                      )}
                    </td>

                    {/* Ações */}
                    <td style={{padding:'11px 14px',textAlign:'right',whiteSpace:'nowrap'}}>
                      {r.mensal > 0 && (
                        <button onClick={()=>{
                          if (regAtual?.pago) setPagamento(r.__id, ymAtual, null);
                          else setPagamento(r.__id, ymAtual, { pago:true, data: hojeISO() });
                        }} title={regAtual?.pago?'Desmarcar pagamento do mês':'Marcar como pago (mês atual)'}
                          style={{
                            background: regAtual?.pago ? 'transparent' : '#1D9E7522',
                            color:'#1D9E75',
                            border:'1px solid #1D9E7555',
                            borderRadius:6, padding:'5px 9px', fontSize:11, cursor:'pointer', marginRight:6,
                          }}>
                          {regAtual?.pago ? '✓ Pago' : 'Marcar pago'}
                        </button>
                      )}
                      <button onClick={()=>setGerindoPag(r)} title="Gerir pagamentos / histórico"
                        style={{background:'transparent',border:'1px solid var(--border)',borderRadius:6,padding:'5px 8px',cursor:'pointer',color:'var(--t2)',marginRight:6}}>
                        <Icon name="CalendarCheck" size={13}/>
                      </button>
                      {/* Lápis: modo linha inteira — sem modal */}
                      {isRowEd ? (
                        <button onClick={()=>saveInlineRow(r.__id)} title="Salvar edições"
                          style={{background:'rgba(29,158,117,.15)',border:'1px solid #1D9E7555',borderRadius:6,padding:'5px 8px',cursor:'pointer',color:'#1D9E75'}}>
                          <Icon name="Check" size={13}/>
                        </button>
                      ) : (
                        <button onClick={()=>startInlineRow(r)} title="Editar linha inteira"
                          style={{background:'transparent',border:'1px solid var(--border)',borderRadius:6,padding:'5px 8px',cursor:'pointer',color:'var(--t2)'}}>
                          <Icon name="Pencil" size={13}/>
                        </button>
                      )}
                    </td>
                  </tr>
                );
              })}
              {filtrados.length === 0 && (
                <tr><td colSpan={9} style={{padding:'40px 20px', textAlign:'center', color:'var(--t3)', fontSize:13}}>Nenhum contrato encontrado para os filtros atuais.</td></tr>
              )}
            </tbody>
            <tfoot>
              <tr style={{background:'var(--bg-3)',borderTop:'2px solid var(--border)'}}>
                <td style={{padding:'12px 14px',fontWeight:700,color:'var(--t1)',fontFamily:'var(--f-d)'}} colSpan={3}>TOTAL ({filtrados.length} contratos)</td>
                <td style={{padding:'12px 14px',fontFamily:'var(--f-m)',fontWeight:700,color:'var(--t1)',textAlign:'right'}}>R$ {filtrados.reduce((s,r)=>s+(r.impl||0),0).toLocaleString('pt-BR')}</td>
                <td style={{padding:'12px 14px',fontFamily:'var(--f-m)',fontWeight:700,color:'#1D9E75',textAlign:'right'}}>R$ {filtrados.reduce((s,r)=>s+(r.mensal||0),0).toLocaleString('pt-BR')}/mês</td>
                <td colSpan={4}/>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>

      {/* Resumo do mes */}
      <div style={{display:'flex', gap:14, marginTop:14, flexWrap:'wrap', fontSize:12.5, color:'var(--t2)'}}>
        <div>✓ <strong style={{color:'#1D9E75'}}>{qtdPagosMes}</strong> pagos no mês</div>
        <div>● <strong style={{color:'#BA7517'}}>{qtdPendentes}</strong> pendentes</div>
        <div>⚠ <strong style={{color:'#ff8585'}}>{qtdAtrasados}</strong> atrasados</div>
      </div>

      {editando && <ModalRec rec={editando} onClose={()=>setEditando(null)}/>}
      {gerindoPag && <ModalPagamentos rec={gerindoPag} pagamentos={pagamentos} onClose={()=>setGerindoPag(null)}/>}
    </div>
  );
}

/* ─── Pipeline Kanban ─── */
const PIPELINE_INIT = [
  { id:'lead',       nome:'Lead',        cor:'#6E6E78', cards: CLIENTES_CRM.filter(c=>c.status==='Comercial').map(c=>({id:c.nome,nome:c.nome,sub:c.servico,nicho:c.nicho,color:c.color,init:c.init,logoUrl:c.logoUrl})) },
  { id:'proposta',   nome:'Proposta',    cor:'#BA7517', cards: CLIENTES_CRM.filter(c=>c.status==='Proposta Apresentada').map(c=>({id:c.nome,nome:c.nome,sub:c.servico,nicho:c.nicho,color:c.color,init:c.init,logoUrl:c.logoUrl})) },
  { id:'impl',       nome:'Implementação',cor:'#7B3FE4',cards: CLIENTES_CRM.filter(c=>c.status==='Implementação').map(c=>({id:c.nome,nome:c.nome,sub:c.servico,nicho:c.nicho,color:c.color,init:c.init,logoUrl:c.logoUrl})) },
  { id:'ativo',      nome:'Ativo',       cor:'#1E90FF', cards: CLIENTES_CRM.filter(c=>c.status==='Ativo').map(c=>({id:c.nome,nome:c.nome,sub:c.servico,nicho:c.nicho,color:c.color,init:c.init,logoUrl:c.logoUrl})) },
  { id:'prod',       nome:'Em Produção', cor:'#1D9E75', cards: CLIENTES_CRM.filter(c=>c.status==='Em Prod').map(c=>({id:c.nome,nome:c.nome,sub:c.servico,nicho:c.nicho,color:c.color,init:c.init,logoUrl:c.logoUrl})) },
];

const CORES = ['#6E6E78','#7B3FE4','#1E90FF','#1D9E75','#BA7517','#A32D2D','#185FA5','#E040FB','#FF6D00','#00BCD4'];

// Placeholder visual durante drag (renomeado pra não conflitar com PageEmBreve)
function DragPlaceholder({ cor, h }) {
  return (
    <div style={{
      height: h, borderRadius: 10,
      background: `${cor}15`,
      border: `2px dashed ${cor}66`,
      animation: 'fade-in .12s ease',
      transition: 'all .2s',
    }}/>
  );
}

function Pipeline({ cols, setCols }) {
  const [editando, setEditando] = useState(null);
  const [novoNome, setNovoNome] = useState('');
  // dragState: { card, fromCol, fromIdx, height }
  const [drag, setDrag] = useState(null);
  // dropTarget: { colId, idx }  → onde vai inserir
  const [dropTarget, setDropTarget] = useState(null);
  // colHover: id da coluna sendo hover
  const [colHover, setColHover] = useState(null);

  const updateCol = (id, patch) => setCols(cs => cs.map(c => c.id===id ? {...c,...patch} : c));
  const addCol = () => {
    const id = 'col_'+Date.now();
    setCols(cs => [...cs, {id, nome:'Nova coluna', cor:'#6E6E78', cards:[]}]);
    setEditando({colId:id, tipo:'nome'});
    setNovoNome('Nova coluna');
  };
  const removeCol = id => {
    if (!confirm('Remover esta coluna e todos os cards dela?')) return;
    setCols(cs => cs.filter(c => c.id!==id));
  };
  const addCard = colId => {
    const nome = prompt('Nome do cliente:');
    if (!nome) return;
    setCols(cs => cs.map(c => c.id===colId ? {...c, cards:[...c.cards, {id:Date.now()+'', nome, sub:'', nicho:'', color:'#7B3FE4', init:nome.slice(0,2).toUpperCase()}]} : c));
  };

  // Move com posição específica (suporta reordenar dentro da mesma coluna)
  const moveTo = (cardId, fromColId, toColId, toIdx) => {
    setCols(cs => {
      const novas = cs.map(c => ({...c, cards: [...c.cards]}));
      const fromC = novas.find(c => c.id === fromColId);
      const toC   = novas.find(c => c.id === toColId);
      if (!fromC || !toC) return cs;
      const fromIdx = fromC.cards.findIndex(k => k.id === cardId);
      if (fromIdx < 0) return cs;
      const [card] = fromC.cards.splice(fromIdx, 1);
      // ajusta o índice se mover dentro da mesma coluna pra trás
      const insertAt = (fromColId === toColId && toIdx > fromIdx) ? toIdx - 1 : toIdx;
      toC.cards.splice(Math.min(insertAt, toC.cards.length), 0, card);
      return novas;
    });
  };

  const onDragStart = (e, card, colId, idx) => {
    setDrag({ card, fromCol: colId, fromIdx: idx });
    e.dataTransfer.effectAllowed = 'move';
    // Cria um ghost transparente customizado
    try {
      const ghost = e.currentTarget.cloneNode(true);
      ghost.style.position = 'absolute';
      ghost.style.top = '-9999px';
      ghost.style.left = '-9999px';
      ghost.style.width = e.currentTarget.offsetWidth + 'px';
      ghost.style.transform = 'rotate(3deg)';
      ghost.style.opacity = '0.95';
      ghost.style.boxShadow = '0 16px 40px rgba(0,0,0,.5)';
      document.body.appendChild(ghost);
      e.dataTransfer.setDragImage(ghost, 20, 20);
      setTimeout(() => ghost.remove(), 0);
    } catch (err) {}
  };

  const onCardDragOver = (e, colId, idx) => {
    e.preventDefault();
    e.stopPropagation();
    if (!drag) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const meio = rect.top + rect.height / 2;
    const novoIdx = e.clientY < meio ? idx : idx + 1;
    if (dropTarget?.colId !== colId || dropTarget?.idx !== novoIdx) {
      setDropTarget({ colId, idx: novoIdx });
    }
  };

  const onColDragOver = (e, colId) => {
    e.preventDefault();
    setColHover(colId);
    // Se não tem dropTarget na coluna, coloca no final
    if (drag && (!dropTarget || dropTarget.colId !== colId)) {
      const col = cols.find(c => c.id === colId);
      if (col) setDropTarget({ colId, idx: col.cards.length });
    }
  };

  const onDrop = (e) => {
    e.preventDefault();
    if (drag && dropTarget) {
      moveTo(drag.card.id, drag.fromCol, dropTarget.colId, dropTarget.idx);
      if (drag.fromCol !== dropTarget.colId) {
        showToast(`${drag.card.nome} movido para "${cols.find(c=>c.id===dropTarget.colId)?.nome}"`, 'success');
      }
    }
    setDrag(null); setDropTarget(null); setColHover(null);
  };

  const onDragEnd = () => { setDrag(null); setDropTarget(null); setColHover(null); };

  return (
    <div style={{padding:'28px 32px',overflowX:'auto',height:'calc(100vh - 60px)',display:'flex',flexDirection:'column'}}>
      <div className="page-head" style={{flexShrink:0}}>
        <div>
          <div className="page-head__title">Pipeline de Clientes</div>
          <div className="page-head__sub">{cols.reduce((s,c)=>s+c.cards.length,0)} clientes · {cols.length} colunas · arraste cards entre colunas ou reordene dentro da mesma</div>
        </div>
        <div className="page-head__actions">
          <button className="btn btn-outline" onClick={addCol}><Icon name="Plus" size={14}/>Nova coluna</button>
        </div>
      </div>

      <div style={{display:'flex',gap:14,flex:1,overflowX:'auto',overflowY:'hidden',paddingBottom:16}}
        onDragEnd={onDragEnd}>
        {cols.map(col => {
          const isHover = colHover === col.id && drag;
          return (
          <div key={col.id} style={{
              width:280, flexShrink:0, display:'flex', flexDirection:'column', gap:0,
              transition:'transform .15s',
              transform: isHover ? 'translateY(-2px)' : 'none',
            }}
            onDragOver={e => onColDragOver(e, col.id)}
            onDragLeave={e => { if (!e.currentTarget.contains(e.relatedTarget)) setColHover(null); }}
            onDrop={onDrop}>

            {/* Header coluna */}
            <div style={{
              display:'flex',alignItems:'center',gap:8,
              padding:'10px 14px',marginBottom:10,
              background:'var(--bg-2)',
              border:`1px solid ${isHover ? col.cor : col.cor+'44'}`,
              borderTop:`3px solid ${col.cor}`,
              borderRadius:'10px 10px 0 0',
              boxShadow: isHover ? `0 0 0 2px ${col.cor}33` : 'none',
              transition:'all .2s',
            }}>
              <div style={{position:'relative'}}>
                <div onClick={()=>setEditando(editando?.colId===col.id&&editando?.tipo==='cor'?null:{colId:col.id,tipo:'cor'})}
                  style={{width:16,height:16,borderRadius:'50%',background:col.cor,cursor:'pointer',border:'2px solid rgba(255,255,255,.2)',flexShrink:0}}/>
                {editando?.colId===col.id && editando?.tipo==='cor' && (
                  <div style={{position:'absolute',top:24,left:0,zIndex:100,background:'var(--bg-3)',border:'1px solid var(--border)',borderRadius:10,padding:10,display:'flex',gap:6,flexWrap:'wrap',width:140,boxShadow:'0 8px 24px rgba(0,0,0,.4)'}}>
                    {CORES.map(c=>(
                      <div key={c} onClick={()=>{updateCol(col.id,{cor:c});setEditando(null);}}
                        style={{width:22,height:22,borderRadius:'50%',background:c,cursor:'pointer',border:col.cor===c?'2px solid #fff':'2px solid transparent',transition:'border .15s'}}/>
                    ))}
                  </div>
                )}
              </div>

              {editando?.colId===col.id && editando?.tipo==='nome'
                ? <input autoFocus value={novoNome} onChange={e=>setNovoNome(e.target.value)}
                    onBlur={()=>{updateCol(col.id,{nome:novoNome});setEditando(null);}}
                    onKeyDown={e=>{if(e.key==='Enter'){updateCol(col.id,{nome:novoNome});setEditando(null);}if(e.key==='Escape')setEditando(null);}}
                    style={{flex:1,background:'var(--bg-3)',border:'1px solid var(--purple)',borderRadius:6,padding:'2px 8px',fontSize:13,color:'var(--t1)',outline:'none'}}/>
                : <span onClick={()=>{setEditando({colId:col.id,tipo:'nome'});setNovoNome(col.nome);}}
                    style={{flex:1,fontFamily:'var(--f-d)',fontWeight:600,fontSize:13.5,color:'var(--t1)',cursor:'pointer'}}
                    title="Clique para renomear">{col.nome}</span>
              }

              <span style={{fontFamily:'var(--f-m)',fontSize:11,color:'var(--t3)',background:'var(--bg-3)',padding:'2px 7px',borderRadius:999}}>{col.cards.length}</span>
              <button onClick={()=>removeCol(col.id)} title="Remover coluna"
                style={{width:20,height:20,borderRadius:4,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--t3)',cursor:'pointer',transition:'color .15s'}}
                onMouseEnter={e=>e.currentTarget.style.color='#fca5a5'}
                onMouseLeave={e=>e.currentTarget.style.color='var(--t3)'}>
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
              </button>
            </div>

            {/* Cards */}
            <div style={{
              flex:1, overflowY:'auto', display:'flex', flexDirection:'column', gap:8, paddingRight:2,
              padding:'2px 4px 2px 0',
              borderRadius:8,
              background: isHover ? `${col.cor}08` : 'transparent',
              transition:'background .2s',
            }}>
              {col.cards.length === 0 && !isHover && (
                <div style={{padding:'30px 16px', textAlign:'center', border:'1.5px dashed var(--border)', borderRadius:10, color:'var(--t3)', fontSize:12}}>
                  <Icon name="Inbox" size={28} style={{color:'var(--t3)', opacity:.4, margin:'0 auto 8px'}}/>
                  <div>Arraste um card aqui<br/>ou clique em + Adicionar</div>
                </div>
              )}
              {col.cards.map((card, idx) => {
                const showPlaceholderBefore = dropTarget?.colId === col.id && dropTarget?.idx === idx && drag?.card.id !== card.id;
                const isDragging = drag?.card.id === card.id;
                return (
                  <React.Fragment key={card.id}>
                    {showPlaceholderBefore && <DragPlaceholder cor={col.cor} h={drag?.height || 60}/>}
                    <div draggable
                      onDragStart={e => {
                        const h = e.currentTarget.offsetHeight;
                        setDrag({ card, fromCol: col.id, fromIdx: idx, height: h });
                        e.dataTransfer.effectAllowed = 'move';
                      }}
                      onDragEnd={onDragEnd}
                      onDragOver={e => onCardDragOver(e, col.id, idx)}
                      style={{
                        background:'var(--bg-2)', border:'1px solid var(--border-soft)',
                        borderLeft:`3px solid ${card.color}`, borderRadius:10,
                        padding:'12px 14px', cursor:'grab',
                        transition:'all .18s cubic-bezier(.22,1,.36,1)',
                        opacity: isDragging ? 0.35 : 1,
                        transform: isDragging ? 'scale(.97)' : 'scale(1)',
                        boxShadow: isDragging ? 'none' : '0 1px 0 rgba(0,0,0,.05)',
                      }}
                      onMouseDown={e => e.currentTarget.style.cursor = 'grabbing'}
                      onMouseUp={e => e.currentTarget.style.cursor = 'grab'}
                      onMouseEnter={e => { if (!drag) { e.currentTarget.style.borderColor = 'rgba(123,63,228,.4)'; e.currentTarget.style.transform = 'translateY(-1px)'; e.currentTarget.style.boxShadow = '0 4px 12px rgba(0,0,0,.15)'; }}}
                      onMouseLeave={e => { if (!drag) { e.currentTarget.style.borderColor = 'var(--border-soft)'; e.currentTarget.style.transform = 'translateY(0)'; e.currentTarget.style.boxShadow = '0 1px 0 rgba(0,0,0,.05)'; }}}>
                      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:card.sub?6:0}}>
                        <ClienteAvatar nome={card.nome} init={card.init} color={card.color} logoUrl={card.logoUrl} size={28}/>
                        <div style={{fontWeight:600,fontSize:13,color:'var(--t1)',flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{card.nome}</div>
                      </div>
                      {card.sub && <div style={{fontSize:11.5,color:'var(--t3)',marginLeft:34}}>{card.sub}</div>}
                      {card.nicho && <div style={{fontSize:11,color:'var(--t2)',marginLeft:34,marginTop:2}}>{card.nicho}</div>}
                    </div>
                  </React.Fragment>
                );
              })}
              {/* Placeholder no fim da lista */}
              {dropTarget?.colId === col.id && dropTarget?.idx >= col.cards.length && drag && drag.fromCol !== col.id && (
                <DragPlaceholder cor={col.cor} h={drag.height || 60}/>
              )}
              {dropTarget?.colId === col.id && dropTarget?.idx >= col.cards.length && drag?.fromCol === col.id && drag?.fromIdx !== col.cards.length - 1 && (
                <DragPlaceholder cor={col.cor} h={drag.height || 60}/>
              )}

              {/* Adicionar card */}
              <button onClick={()=>addCard(col.id)} style={{
                width:'100%',padding:'9px',borderRadius:9,border:'1px dashed var(--border)',
                background:'transparent',color:'var(--t3)',fontSize:12.5,cursor:'pointer',
                display:'flex',alignItems:'center',justifyContent:'center',gap:5,
                transition:'all .15s',
              }}
                onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--purple)';e.currentTarget.style.color='#c4a8ff';}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--t3)';}}>
                <Icon name="Plus" size={13}/>Adicionar
              </button>
            </div>
          </div>
        );})}
      </div>
    </div>
  );
}

/* ─── Exportar CSV ─── */
function exportarCSV() {
  const lista = getRecorrencia();
  const pagamentos = getPagamentos();
  const ym = YM(new Date());
  const rows = [['Cliente','Serviço','Nicho','Status','Implementação','Mensal','Dia Pagamento','Pago no mês','Dias atraso']];
  lista.forEach(r => {
    const stPag = statusPagamentoMes(r, pagamentos);
    const pagoMes = pagamentos[r.__id]?.[ym]?.pago ? 'Sim' : 'Não';
    const dAtraso = stPag.kind === 'atrasado' ? stPag.dias : 0;
    rows.push([r.cliente, r.servico, r.nicho, r.status, r.impl, r.mensal, r.dia, pagoMes, dAtraso]);
  });
  const csv = rows.map(r => r.map(c => `"${(''+c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `brava_relatorio_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  showToast('Relatório exportado com sucesso', 'success');
}

/* ══════════════════════════════════════════════════════════════════════════
   AGENDA · inspirada no Google Calendar
   - Store reativo de eventos com persistencia em localStorage
   - Visualizacoes: Mes / Semana / Dia
   - Mini-calendario lateral (sidebar)
   - Modal de criar/editar evento com cor, hora inicio/fim, descricao
   ══════════════════════════════════════════════════════════════════════════ */

const AGENDA_KEY = 'brava_agenda_events';
const fireAgendaChanged = () => window.dispatchEvent(new Event('brava_agenda_changed'));

function _readAgenda() {
  try { return JSON.parse(localStorage.getItem(AGENDA_KEY) || '[]'); } catch { return []; }
}
function _writeAgenda(arr) {
  localStorage.setItem(AGENDA_KEY, JSON.stringify(arr));
  fireAgendaChanged();
}
function addAgendaEvent(ev) {
  const arr = _readAgenda();
  const novo = { id: `ev_${Date.now()}_${Math.random().toString(36).slice(2,7)}`, ...ev };
  arr.push(novo);
  _writeAgenda(arr);
  return novo.id;
}
function updateAgendaEvent(id, patch) {
  const arr = _readAgenda();
  const i = arr.findIndex(e => e.id === id);
  if (i < 0) return;
  arr[i] = { ...arr[i], ...patch };
  _writeAgenda(arr);
}
function deleteAgendaEvent(id) {
  _writeAgenda(_readAgenda().filter(e => e.id !== id));
}
function useAgenda() {
  const [list, setList] = React.useState(() => _readAgenda());
  React.useEffect(() => {
    const refresh = () => setList(_readAgenda());
    window.addEventListener('brava_agenda_changed', refresh);
    window.addEventListener('storage', refresh);
    return () => {
      window.removeEventListener('brava_agenda_changed', refresh);
      window.removeEventListener('storage', refresh);
    };
  }, []);
  return list;
}

/* ── Helpers de data ── */
const AG_MESES = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
const AG_MESES_CURTO = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
const AG_DIAS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const AG_DIAS_LONGO = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
const agISO = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const agParseISO = s => { if (!s) return new Date(); const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); };
const agSameDay = (a,b) => a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
const agAddDays = (d, n) => { const x = new Date(d); x.setDate(x.getDate()+n); return x; };
const agStartOfWeek = d => { const x = new Date(d); x.setDate(x.getDate() - x.getDay()); x.setHours(0,0,0,0); return x; };
const agStartOfMonth = d => new Date(d.getFullYear(), d.getMonth(), 1);
const agEndOfMonth = d => new Date(d.getFullYear(), d.getMonth()+1, 0);
const agMinutosDoDia = hhmm => { if (!hhmm) return 0; const [h,m]=hhmm.split(':').map(Number); return h*60 + (m||0); };
const agMinAHHMM = min => `${String(Math.floor(min/60)).padStart(2,'0')}:${String(min%60).padStart(2,'0')}`;

  { id:'roxo',    nome:'Roxo Brava', hex:'#7B3FE4' },

];
const AG_COR_HEX = id => (AG_CORES.find(c => c.id === id) || AG_CORES[0]).hex;
