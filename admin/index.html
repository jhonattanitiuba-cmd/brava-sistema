/* ── Mini calendario na sidebar ── */
function AgendaMiniCal({ refDate, selected, onPick, events }) {
  const inicioMes = agStartOfMonth(refDate);
  const fimMes = agEndOfMonth(refDate);
  const firstWeekday = inicioMes.getDay();
  const totalDias = fimMes.getDate();
  const cells = [];
  for (let i = 0; i < firstWeekday; i++) cells.push(null);
  for (let i = 1; i <= totalDias; i++) cells.push(new Date(refDate.getFullYear(), refDate.getMonth(), i));
  while (cells.length % 7) cells.push(null);

  const hoje = new Date();
  const eventDays = new Set(events.map(e => e.data));

  return (
    <div style={{marginBottom:18}}>
      <div style={{
        display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:2, marginBottom:6,
      }}>
        {AG_DIAS.map(d => (
          <div key={d} style={{textAlign:'center', fontSize:10, color:'var(--t3)', fontFamily:'var(--f-m)', textTransform:'uppercase', letterSpacing:'.06em', padding:'4px 0'}}>{d[0]}</div>
        ))}
      </div>
      <div style={{display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:2}}>
        {cells.map((d, i) => {
          if (!d) return <div key={i} style={{aspectRatio:'1', }}/>;
          const isHoje = agSameDay(d, hoje);
          const isSel  = agSameDay(d, selected);
          const tem    = eventDays.has(agISO(d));
          return (
            <button key={i} onClick={()=>onPick(d)} style={{
              aspectRatio:'1', minHeight:28,
              display:'flex', alignItems:'center', justifyContent:'center',
              fontSize:11.5, fontFamily:'var(--f-b)',
              borderRadius:'50%',
              background: isSel ? 'var(--purple)' : isHoje ? 'rgba(123,63,228,.15)' : 'transparent',
              color: isSel ? '#fff' : isHoje ? 'var(--purple)' : 'var(--t1)',
              border:'none', cursor:'pointer',
              fontWeight: isSel || isHoje ? 700 : 500,
              position:'relative',
              transition:'background .15s',
            }}
              onMouseEnter={e => { if (!isSel) e.currentTarget.style.background = 'rgba(255,255,255,.06)'; }}
              onMouseLeave={e => { if (!isSel) e.currentTarget.style.background = isHoje ? 'rgba(123,63,228,.15)' : 'transparent'; }}
            >
              {d.getDate()}
              {tem && !isSel && <span style={{position:'absolute', bottom:3, width:3, height:3, borderRadius:'50%', background:'var(--blue)'}}/>}
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* ── Vista MES ── */
function AgendaVistaMes({ refDate, events, onSelectDay, onEditEvent, onNew }) {
  const inicio = agStartOfMonth(refDate);
  const fim = agEndOfMonth(refDate);
  const inicioGrade = agAddDays(inicio, -inicio.getDay());
  const semanas = [];
  let d = new Date(inicioGrade);
  while (d <= fim || semanas.length < 5 || (semanas.length === 5 && d.getDay() !== 0)) {
    const linha = [];
    for (let i = 0; i < 7; i++) { linha.push(new Date(d)); d = agAddDays(d, 1); }
    semanas.push(linha);
    if (semanas.length >= 6) break;
  }

  const hoje = new Date();
  const evPorDia = {};
  events.forEach(e => {
    (evPorDia[e.data] = evPorDia[e.data] || []).push(e);
  });
  Object.values(evPorDia).forEach(arr => arr.sort((a,b) => agMinutosDoDia(a.inicio) - agMinutosDoDia(b.inicio)));

  return (
    <div style={{display:'flex', flexDirection:'column', height:'100%', minHeight:0}}>
      <div style={{display:'grid', gridTemplateColumns:'repeat(7,1fr)', borderBottom:'1px solid var(--border-soft)'}}>
        {AG_DIAS_LONGO.map((d,i) => (
          <div key={d} style={{padding:'10px 12px', fontSize:11, color:'var(--t3)', fontFamily:'var(--f-m)', textTransform:'uppercase', letterSpacing:'.08em'}}>
            {d.slice(0,3)}
          </div>
        ))}
      </div>
      <div style={{flex:1, display:'grid', gridTemplateRows:`repeat(${semanas.length}, 1fr)`, minHeight:0}}>
        {semanas.map((semana, si) => (
          <div key={si} style={{display:'grid', gridTemplateColumns:'repeat(7,1fr)', borderBottom: si===semanas.length-1 ? 'none' : '1px solid var(--border-soft)'}}>
            {semana.map((dia, di) => {
              const isHoje = agSameDay(dia, hoje);
              const isMesAtual = dia.getMonth() === refDate.getMonth();
              const evs = evPorDia[agISO(dia)] || [];
              const visiveis = evs.slice(0,3);
              const ocultos  = evs.length - visiveis.length;
              return (
                <div key={di} onClick={()=>onSelectDay(dia)} style={{
                  borderRight: di===6 ? 'none' : '1px solid var(--border-soft)',
                  padding:'6px 6px 4px',
                  background: isHoje ? 'rgba(123,63,228,.05)' : 'transparent',
                  cursor:'pointer',
                  overflow:'hidden',
                  display:'flex', flexDirection:'column',
                  minHeight:0,
                }}
                  onDoubleClick={(e) => { e.stopPropagation(); onNew(dia); }}>
                  <div style={{display:'flex', justifyContent:'flex-end', marginBottom:4}}>
                    <span style={{
                      width:24, height:24, borderRadius:'50%',
                      display:'flex', alignItems:'center', justifyContent:'center',
                      fontSize:12, fontWeight: isHoje?700:500,
                      background: isHoje ? 'var(--purple)' : 'transparent',
                      color: isHoje ? '#fff' : isMesAtual ? 'var(--t1)' : 'var(--t3)',
                      fontFamily:'var(--f-m)',
                    }}>{dia.getDate()}</span>
                  </div>
                  <div style={{display:'flex', flexDirection:'column', gap:2, overflow:'hidden'}}>
                    {visiveis.map(ev => {
                      const hex = AG_COR_HEX(ev.cor);
                      return (
                        <button key={ev.id} onClick={e => { e.stopPropagation(); onEditEvent(ev); }} style={{
                          textAlign:'left', display:'flex', alignItems:'center', gap:5,
                          background: ev.diaTodo ? hex : 'transparent',
                          color: ev.diaTodo ? '#fff' : 'var(--t1)',
                          border:'none', padding: ev.diaTodo ? '2px 6px' : '1px 4px',
                          borderRadius:4, cursor:'pointer',
                          fontSize:11.5, fontWeight:500, fontFamily:'var(--f-b)',
                          whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis',
                        }}>
                          {!ev.diaTodo && <span style={{width:6, height:6, borderRadius:'50%', background:hex, flexShrink:0}}/>}
                          {!ev.diaTodo && <span style={{color:'var(--t2)', fontSize:11}}>{ev.inicio}</span>}
                          <span style={{overflow:'hidden', textOverflow:'ellipsis'}}>{ev.titulo}</span>
                        </button>
                      );
                    })}
                    {ocultos > 0 && (
                      <button onClick={e=>{e.stopPropagation(); onSelectDay(dia);}} style={{
                        background:'transparent', border:'none', cursor:'pointer',
                        textAlign:'left', padding:'1px 4px',
                        fontSize:11, color:'var(--t3)', fontWeight:500,
                      }}>+ {ocultos} mais</button>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── Vista SEMANA / DIA (timeline) ── */
function AgendaVistaTimeline({ refDate, events, onEditEvent, onNew, dias = 7 }) {
  const inicio = dias === 7 ? agStartOfWeek(refDate) : new Date(refDate);
  const colunas = Array.from({length:dias}, (_,i) => agAddDays(inicio, i));
  const horas = Array.from({length:24}, (_,i) => i); // 0-23
  const ROW_H = 48; // altura de cada hora
  const hoje = new Date();
  const agora = hoje.getHours() * 60 + hoje.getMinutes();

  // Mapeia eventos por coluna (data ISO)
  const porData = {};
  events.forEach(e => { (porData[e.data] = porData[e.data] || []).push(e); });

  return (
    <div style={{display:'flex', flexDirection:'column', height:'100%', minHeight:0, overflow:'hidden'}}>
      {/* Cabecalho dias */}
      <div style={{display:'grid', gridTemplateColumns:`60px repeat(${dias}, 1fr)`, borderBottom:'1px solid var(--border-soft)', flexShrink:0}}>
        <div/>
        {colunas.map((d,i) => {
          const isHoje = agSameDay(d, hoje);
          return (
            <div key={i} style={{padding:'10px 8px', textAlign:'center', borderLeft:'1px solid var(--border-soft)'}}>
              <div style={{fontSize:11, color:'var(--t3)', textTransform:'uppercase', fontFamily:'var(--f-m)', letterSpacing:'.06em'}}>{AG_DIAS[d.getDay()]}</div>
              <div style={{
                marginTop:4, fontSize:22, fontFamily:'var(--f-d)', fontWeight:600,
                color: isHoje ? 'var(--purple)' : 'var(--t1)',
                display:'inline-flex', alignItems:'center', justifyContent:'center',
                width:34, height:34, borderRadius:'50%',
                background: isHoje ? 'rgba(123,63,228,.15)' : 'transparent',
              }}>{d.getDate()}</div>
            </div>
          );
        })}
      </div>

      {/* Grid de horas com scroll */}
      <div className="agenda-timeline-grid" style={{flex:1, overflow:'auto', position:'relative'}}>
        <div style={{display:'grid', gridTemplateColumns:`60px repeat(${dias}, 1fr)`, position:'relative'}}>
          {/* Coluna de horas */}
          <div>
            {horas.map(h => (
              <div key={h} style={{height:ROW_H, borderBottom:'1px solid var(--border-soft)', position:'relative'}}>
                <span style={{
                  position:'absolute', top:-7, right:8,
                  fontSize:10, color:'var(--t3)', fontFamily:'var(--f-m)',
                  background:'var(--bg-2)', padding:'0 4px',
                }}>{String(h).padStart(2,'0')}:00</span>
              </div>
            ))}
          </div>

          {/* Colunas dos dias */}
          {colunas.map((dia, ci) => {
            const isoData = agISO(dia);
            const evs = (porData[isoData] || []).filter(e => !e.diaTodo);
            const isHoje = agSameDay(dia, hoje);
            return (
              <div key={ci} style={{borderLeft:'1px solid var(--border-soft)', position:'relative'}}>
                {horas.map(h => (
                  <div key={h} onClick={()=>onNew({data: isoData, inicio: agMinAHHMM(h*60), fim: agMinAHHMM((h+1)*60)})}
                    style={{
                      height:ROW_H, borderBottom:'1px solid var(--border-soft)',
                      cursor:'pointer', transition:'background .12s',
                    }}
                    onMouseEnter={e=>e.currentTarget.style.background='rgba(123,63,228,.04)'}
                    onMouseLeave={e=>e.currentTarget.style.background='transparent'}
                  />
                ))}
                {/* Linha "agora" */}
                {isHoje && (
                  <div style={{
                    position:'absolute', left:0, right:0,
                    top: (agora / 60) * ROW_H,
                    borderTop:'2px solid #A32D2D',
                    zIndex:2, pointerEvents:'none',
                  }}>
                    <div style={{width:8, height:8, borderRadius:'50%', background:'#A32D2D', marginLeft:-4, marginTop:-5}}/>
                  </div>
                )}
                {/* Eventos posicionados absolute */}
                {evs.map(ev => {
                  const ini = agMinutosDoDia(ev.inicio);
                  const fim = agMinutosDoDia(ev.fim);
                  const top = (ini / 60) * ROW_H;
                  const altura = Math.max(((fim - ini) / 60) * ROW_H - 2, 22);
                  const hex = AG_COR_HEX(ev.cor);
                  return (
                    <button key={ev.id} onClick={e=>{e.stopPropagation(); onEditEvent(ev);}} style={{
                      position:'absolute', left:4, right:4,
                      top, height:altura,
                      background: `${hex}22`,
                      borderLeft: `3px solid ${hex}`,
                      borderRadius:6,
                      padding:'4px 8px',
                      textAlign:'left',
                      display:'flex', flexDirection:'column', gap:2,
                      overflow:'hidden',
                      cursor:'pointer',
                      transition:'background .15s, box-shadow .15s',
                    }}
                      onMouseEnter={e=>{e.currentTarget.style.background = `${hex}33`; e.currentTarget.style.boxShadow=`0 4px 12px ${hex}33`;}}
                      onMouseLeave={e=>{e.currentTarget.style.background = `${hex}22`; e.currentTarget.style.boxShadow='none';}}
                    >
                      <div style={{fontSize:12, fontWeight:600, color:'var(--t1)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>{ev.titulo}</div>
                      <div style={{fontSize:11, color:'var(--t2)', fontFamily:'var(--f-m)'}}>{ev.inicio} - {ev.fim}</div>
                      {ev.local && altura > 50 && (
                        <div style={{fontSize:10.5, color:'var(--t3)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>📍 {ev.local}</div>
                      )}
                    </button>
                  );
                })}
                {/* Eventos dia inteiro no topo */}
                {(porData[isoData] || []).filter(e => e.diaTodo).slice(0,2).map((ev, idx) => {
                  const hex = AG_COR_HEX(ev.cor);
                  return (
                    <button key={ev.id} onClick={e=>{e.stopPropagation(); onEditEvent(ev);}} style={{
                      position:'absolute', left:4, right:4, top: 2 + idx*22,
                      background:hex, color:'#fff',
                      border:'none', borderRadius:4,
                      padding:'2px 6px',
                      textAlign:'left',
                      fontSize:11, fontWeight:600,
                      whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis',
                      cursor:'pointer', zIndex:3,
                    }}>{ev.titulo}</button>
                  );
                })}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function Agenda() {
  const events = useAgenda();
  const [refDate, setRefDate] = useState(() => new Date());
  const [vista, setVista] = useState(() => localStorage.getItem('brava_agenda_vista') || 'semana'); // mes / semana / dia
  const [editando, setEditando] = useState(null);

  React.useEffect(() => { localStorage.setItem('brava_agenda_vista', vista); }, [vista]);

  // Scroll inicial pra hora 7h na timeline
  React.useEffect(() => {
    if (vista === 'semana' || vista === 'dia') {
      const t = setTimeout(() => {
        const scroller = document.querySelector('.agenda-timeline-grid');
        if (scroller) scroller.scrollTop = 7 * 48; // 7h * 48px
      }, 50);
      return () => clearTimeout(t);
    }
  }, [vista, refDate]);

  const tituloPeriodo = React.useMemo(() => {
    if (vista === 'mes') {
      return `${AG_MESES[refDate.getMonth()]} de ${refDate.getFullYear()}`;
    }
    if (vista === 'dia') {
      return `${AG_DIAS_LONGO[refDate.getDay()]}, ${refDate.getDate()} de ${AG_MESES[refDate.getMonth()]}`;
    }
    // semana
    const ini = agStartOfWeek(refDate);
    const fim = agAddDays(ini, 6);
    if (ini.getMonth() === fim.getMonth()) {
      return `${ini.getDate()} a ${fim.getDate()} de ${AG_MESES[ini.getMonth()]} de ${ini.getFullYear()}`;
    }
    return `${ini.getDate()} ${AG_MESES_CURTO[ini.getMonth()]} – ${fim.getDate()} ${AG_MESES_CURTO[fim.getMonth()]} de ${fim.getFullYear()}`;
  }, [refDate, vista]);

  const navPeriodo = (d) => {
    const x = new Date(refDate);
    if (vista === 'mes') x.setMonth(x.getMonth() + d);
    else if (vista === 'semana') x.setDate(x.getDate() + 7*d);
    else x.setDate(x.getDate() + d);
    setRefDate(x);
  };

  const novoEvento = (preset = {}) => {
    const base = { data: agISO(refDate), inicio:'09:00', fim:'10:00', cor:'roxo' };
    setEditando({ ...base, ...preset });
  };

  return (
    <div className="page" style={{display:'flex', flexDirection:'column', minHeight:'calc(100vh - 130px)', paddingBottom:0}}>
      <div className="page-head">
        <div>
          <div className="page-head__title">Agenda</div>
          <div className="page-head__sub">
            {events.length === 0
              ? 'Crie seu primeiro evento clicando em uma data ou no botao abaixo'
              : `${events.length} evento${events.length===1?'':'s'} na sua agenda`}
          </div>
        </div>
        <div className="page-head__actions" style={{display:'flex', gap:10}}>
          <button onClick={()=>setRefDate(new Date())} className="btn btn-outline">Hoje</button>
          <button onClick={()=>novoEvento()} className="btn btn-primary"><Icon name="Plus" size={14}/>Novo evento</button>
        </div>
      </div>

      {/* Toolbar de navegacao */}
      <div style={{display:'flex', alignItems:'center', gap:14, marginBottom:14, flexWrap:'wrap'}}>
        <div style={{display:'flex', alignItems:'center', gap:4}}>
          <button onClick={()=>navPeriodo(-1)} title="Anterior" style={{
            width:34, height:34, borderRadius:'50%', border:'1px solid var(--border)',
            background:'transparent', color:'var(--t1)', cursor:'pointer',
            display:'flex', alignItems:'center', justifyContent:'center',
          }}><Icon name="ChevronLeft" size={16}/></button>
          <button onClick={()=>navPeriodo(1)} title="Próximo" style={{
            width:34, height:34, borderRadius:'50%', border:'1px solid var(--border)',
            background:'transparent', color:'var(--t1)', cursor:'pointer',
            display:'flex', alignItems:'center', justifyContent:'center',
          }}><Icon name="ChevronRight" size={16}/></button>
        </div>
        <div style={{fontFamily:'var(--f-d)', fontSize:20, fontWeight:600, color:'var(--t1)', textTransform:'capitalize', flex:1}}>
          {tituloPeriodo}
        </div>
        <div style={{display:'flex', background:'var(--bg-3)', border:'1px solid var(--border)', borderRadius:8, padding:3}}>
          {[
            {k:'dia',    l:'Dia'},
            {k:'semana', l:'Semana'},
            {k:'mes',    l:'Mês'},
          ].map(o => (
            <button key={o.k} onClick={()=>setVista(o.k)} style={{
              padding:'6px 14px', borderRadius:6,
              border:'none', cursor:'pointer',
              fontSize:13, fontWeight:500, fontFamily:'var(--f-b)',
              background: vista===o.k ? 'var(--purple)' : 'transparent',
              color:    vista===o.k ? '#fff' : 'var(--t2)',
              transition:'all .15s',
            }}>{o.l}</button>
          ))}
        </div>
      </div>

      {/* Layout: sidebar (mini-cal) + main */}
      <div style={{display:'grid', gridTemplateColumns:'240px 1fr', gap:16, flex:1, minHeight:0}} className="agenda-layout">
        {/* Sidebar */}
        <aside style={{
          background:'var(--bg-2)', border:'1px solid var(--border-soft)',
          borderRadius:12, padding:14,
          display:'flex', flexDirection:'column',
          minHeight:0, overflow:'hidden',
        }}>
          <button onClick={()=>novoEvento()} className="btn btn-primary" style={{marginBottom:14, justifyContent:'center'}}>
            <Icon name="Plus" size={14}/>Criar
          </button>
          <AgendaMiniCal refDate={refDate} selected={refDate} onPick={d=>setRefDate(d)} events={events}/>

          <div style={{fontSize:11, color:'var(--t3)', fontFamily:'var(--f-m)', textTransform:'uppercase', letterSpacing:'.06em', marginBottom:8}}>Próximos eventos</div>
          <div style={{flex:1, overflowY:'auto', display:'flex', flexDirection:'column', gap:6}}>
            {events
              .filter(e => agParseISO(e.data) >= new Date(new Date().setHours(0,0,0,0)))
              .sort((a,b) => agParseISO(a.data) - agParseISO(b.data) || agMinutosDoDia(a.inicio) - agMinutosDoDia(b.inicio))
              .slice(0,8)
              .map(ev => {
                const hex = AG_COR_HEX(ev.cor);
                const d = agParseISO(ev.data);
                return (
                  <button key={ev.id} onClick={()=>setEditando(ev)} style={{
                    display:'flex', gap:8, alignItems:'flex-start',
                    background:'transparent', border:'none', cursor:'pointer',
                    textAlign:'left', padding:'6px 4px', borderRadius:6,
                  }}
                    onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,.04)'}
                    onMouseLeave={e=>e.currentTarget.style.background='transparent'}
                  >
                    <div style={{width:3, alignSelf:'stretch', background:hex, borderRadius:2, flexShrink:0}}/>
                    <div style={{minWidth:0, flex:1}}>
                      <div style={{fontSize:12.5, fontWeight:600, color:'var(--t1)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>{ev.titulo}</div>
                      <div style={{fontSize:11, color:'var(--t3)', fontFamily:'var(--f-m)', marginTop:1}}>
                        {d.getDate()}/{String(d.getMonth()+1).padStart(2,'0')} · {ev.diaTodo ? 'Dia todo' : ev.inicio}
                      </div>
                    </div>
                  </button>
                );
              })}
            {events.length === 0 && (
              <div style={{fontSize:12, color:'var(--t3)', padding:'12px 0', textAlign:'center'}}>Nenhum evento agendado</div>
            )}
          </div>
        </aside>

        {/* Main view */}
        <section style={{
          background:'var(--bg-2)', border:'1px solid var(--border-soft)',
          borderRadius:12, overflow:'hidden',
          display:'flex', flexDirection:'column', minHeight:0,
        }}>
          {vista === 'mes' && <AgendaVistaMes refDate={refDate} events={events} onSelectDay={d=>{setRefDate(d); setVista('dia');}} onEditEvent={setEditando} onNew={(d)=>novoEvento({data: agISO(d)})}/>}
          {vista === 'semana' && <AgendaVistaTimeline refDate={refDate} events={events} onEditEvent={setEditando} onNew={novoEvento} dias={7}/>}
          {vista === 'dia' && <AgendaVistaTimeline refDate={refDate} events={events} onEditEvent={setEditando} onNew={novoEvento} dias={1}/>}
        </section>
      </div>

      <style>{`
        @media (max-width: 980px) {
          .agenda-layout { grid-template-columns: 1fr !important; }
          .agenda-layout > aside { display: none !important; }
        }
      `}</style>

      {editando && <AgendaEventoModal ev={editando} onClose={()=>setEditando(null)}/>}
    </div>
  );
}

/* Sincroniza EVO_KEY_CFG (legado, usado por evoFetch) com a instancia ativa.
   Garante que evoFetch sempre pegue a apikey/url certa quando o usuario
   troca de WhatsApp via switcher OU quando o app monta.
   Tambem: se a instancia ativa nao for visivel pro user logado (ex: user
   trocou e o admin tem instancia privada de outro user no localStorage),
   reseta pra primeira instancia visivel (Brava Principal por padrao).

   CUIDADO COM RACE: ao criar uma nova instancia, o switcher chama
   setActiveInstanceId(novoId) ANTES do useWaInstances receber o INSERT
   via Realtime. Pra nao forcar fallback prematuro, esperamos:
   1. loading == false (lista ja carregou pelo menos uma vez)
   2. grace period de 1.5s desde a ultima mudanca de activeId
   Se depois disso a instancia ainda nao apareceu, ai sim faz fallback. */
function useSyncEvoConfig() {
  const { instances, loading } = useWaInstances();
  const activeId = useActiveInstanceId();
  React.useEffect(() => {
    if (loading) return;                              // ainda carregando lista
    if (!instances || instances.length === 0) return;
    let inst = instances.find(i => i.id === activeId);
    if (inst) {
      // Instancia encontrada — sincroniza EVO_KEY_CFG se mudou
      const cur = getEvoConfig();
      if (!cur || cur.url !== inst.evolution_url || cur.instance !== inst.evolution_instance_name || cur.apikey !== inst.evolution_apikey) {
        setEvoConfigStore({
          url: inst.evolution_url,
          instance: inst.evolution_instance_name,
          apikey: inst.evolution_apikey,
        });
      }
      // Sincroniza foto do perfil WhatsApp como foto do usuario logado.
      // Se a instancia ativa tem profile_pic_url (foto do WhatsApp do dono),
      // salva em brava_user_photo:<email> pra SidebarUserCard + HeaderUserAvatar
      // mostrarem a foto real em vez de app/jhonattan.jpg
      if (inst.profile_pic_url && inst.owner_email) {
        try {
          const key = 'brava_user_photo:' + inst.owner_email.toLowerCase().trim();
          const atual = localStorage.getItem(key);
          if (atual !== inst.profile_pic_url) {
            localStorage.setItem(key, inst.profile_pic_url);
            window.dispatchEvent(new Event('brava_photo_changed'));
          }
        } catch {}
      }
      return;
    }
    // Instancia nao encontrada — espera grace period pra ver se aparece via Realtime
    // (cobre o caso de INSERT recente que ainda nao propagou)
    const graceTimer = setTimeout(() => {
      // Re-checa: alguma instancia com esse id apareceu?
      const ainda = (instances || []).find(i => i.id === activeId);
      if (ainda) return; // ja foi pego no proximo render
      const fallback = instances[0];
      if (fallback) {
        setActiveInstanceId(fallback.id);
        showToast?.(`Trocou pra ${fallback.nome} (instancia anterior nao disponivel)`, 'info');
      }
    }, 1500);
    return () => clearTimeout(graceTimer);
  }, [instances, activeId, loading]);
}

function App() {
  // ✨ Auth gate: se nao houver sessao Supabase Auth, mostra modal de login
  //    (necessario pra JWT chegar nas queries e RLS funcionar)
  const { needLogin, loading: authLoading } = useSupaAuthGate();
  // Gera notificacoes automaticas a partir de eventos reais do banco (erros IA, etc)
  useNotifGenerator();
  // Mantem credenciais Evolution sincronizadas com instancia ativa
  useSyncEvoConfig();

  // Persistência via localStorage
  // Sempre comeca em Dashboard ao logar (ignora ultima pagina salva)
  const [page, setPage] = useState('dashboard');
  const [collapsed, setCollapsed] = useState(() => localStorage.getItem('brava_collapsed') === '1');
  const [impersonate, setImpersonate] = useState(null);
  const [pipelineCols, setPipelineCols] = useState(() => {
    try { const s = localStorage.getItem('brava_pipeline'); if (s) return JSON.parse(s); } catch(e){}
    return PIPELINE_INIT;
  });
  const [busca, setBusca] = useState('');
  const [notifAberta, setNotifAberta] = useState(false);
  const [novoClienteAberto, setNovoClienteAberto] = useState(false);
  const [extraCRM, setExtraCRM] = useState(() => {
    try { const s = localStorage.getItem('brava_extra_crm'); if (s) return JSON.parse(s); } catch(e){}
    return [];
  });

  // Persistir
  useEffect(() => { localStorage.setItem('brava_page', page); }, [page]);
  useEffect(() => { localStorage.setItem('brava_collapsed', collapsed?'1':'0'); }, [collapsed]);
  useEffect(() => { localStorage.setItem('brava_pipeline', JSON.stringify(pipelineCols)); }, [pipelineCols]);
  useEffect(() => { localStorage.setItem('brava_extra_crm', JSON.stringify(extraCRM)); }, [extraCRM]);

  // moverNoPipeline aceita string (nome) OU objeto contato/cliente.
  // - Se for objeto E nao existir card com aquele nome, CRIA o card na coluna.
  // - Se ja existir, MOVE pra coluna indicada.
  const moverNoPipeline = (clienteOuNome, paraColId) => {
    const nomeCliente = typeof clienteOuNome === 'string' ? clienteOuNome : clienteOuNome?.nome || clienteOuNome?.name;
    if (!nomeCliente) return;
    setPipelineCols(cs => {
      const existing = cs.flatMap(c=>c.cards).find(k=>k.nome===nomeCliente);
      if (existing) {
        // MOVE card existente
        return cs.map(c => {
          if (c.cards.some(k=>k.nome===nomeCliente)) return {...c, cards: c.cards.filter(k=>k.nome!==nomeCliente)};
          if (c.id === paraColId) return {...c, cards:[...c.cards, existing]};
          return c;
        });
      }
      // CRIA card novo a partir do objeto contato (ou stub se for so nome)
      if (typeof clienteOuNome !== 'object') return cs;
      const c0 = clienteOuNome;
      const novoCard = {
        id: (c0.id || nomeCliente) + '_' + Date.now(),
        nome: nomeCliente,
        sub: c0.empresa || c0.servico || c0.via || c0.canal || 'WhatsApp',
        nicho: c0.nicho || c0.tag || null,
        color: c0.color || '#7B3FE4',
        init: c0.init || (nomeCliente.split(' ').map(p=>p[0]).join('').slice(0,2).toUpperCase()),
        logoUrl: c0.logoUrl || c0.profile_pic_url || null,
        jid: c0.id || null,    // mantem ref pro chat WhatsApp
      };
      return cs.map(c => c.id === paraColId ? {...c, cards:[...c.cards, novoCard]} : c);
    });
  };

  const [shortcutsOpen, setShortcutsOpen] = useState(false);
  useKeyboardShortcuts({ setNovoCliente: setNovoClienteAberto, setShortcutsOpen });

  // Cadastrar novo cliente
  const cadastrarCliente = (cliente) => {
    setExtraCRM(arr => [...arr, cliente]);
    const colMap = { 'Comercial':'lead', 'Proposta Apresentada':'proposta', 'Implementação':'impl', 'Ativo':'ativo', 'Em Prod':'prod', 'Em breve':'lead' };
    const colId = colMap[cliente.status] || 'lead';
    setPipelineCols(cs => cs.map(c => c.id === colId ? {...c, cards:[...c.cards, {id:cliente.nome+Date.now(), nome:cliente.nome, sub:cliente.servico, nicho:cliente.nicho, color:cliente.color, init:cliente.init, logoUrl:cliente.logoUrl}]} : c));
    showToast(`Cliente ${cliente.nome} cadastrado com sucesso`, 'success');
  };

  useEffect(() => {
    const app = document.querySelector('.app');
    if (app) app.style.gridTemplateColumns = collapsed ? '0 1fr' : 'var(--sidebar) 1fr';
  }, [collapsed]);

  // Toast de boas-vindas no primeiro acesso pós-checkout
  useEffect(() => {
    if (SESSAO.welcome) {
      setTimeout(() => {
        showToast(`Bem-vindo à Brava, ${SESSAO.nome.split(' ')[0]}! Seu workspace está pronto.`, 'success');
        // Marca como já visto pra não mostrar de novo
        const s = JSON.parse(localStorage.getItem('brava_sessao') || '{}');
        s.welcome = false;
        localStorage.setItem('brava_sessao', JSON.stringify(s));
      }, 1200);
    }
  }, []);

  // Fechar notificações ao clicar fora
  useEffect(() => {
    if (!notifAberta) return;
    const close = e => { if (!e.target.closest('.header__actions')) setNotifAberta(false); };
    document.addEventListener('click', close);
    return () => document.removeEventListener('click', close);
  }, [notifAberta]);

  // ✨ Auth gate: precisa de sessao Supabase Auth pra RLS funcionar
  if (authLoading) return (
    <div style={{
      position:'fixed', inset:0, background:'#05050D', display:'flex',
      alignItems:'center', justifyContent:'center', color:'#A0A0AA',
      fontFamily:'Inter, sans-serif', fontSize:14,
    }}>Carregando sessão…</div>
  );
  if (needLogin) return <SupaLoginModal defaultEmail={SESSAO?.email || 'diretoria@brava.company'} onSuccess={() => window.location.reload()} />;

  if (impersonate) return (
    <>
      <ImpersonateBanner cliente={impersonate} onSair={() => setImpersonate(null)}/>
      <ClientWorkspace cliente={impersonate}/>
    </>
  );

  return (
    <div className="app">
      <ThemeToggle/>
      <Sidebar page={page} setPage={setPage} collapsed={collapsed} setCollapsed={setCollapsed}/>
      <Header page={page} collapsed={collapsed} setCollapsed={setCollapsed} setPage={setPage} busca={busca} setBusca={setBusca} notifAberta={notifAberta} setNotifAberta={setNotifAberta}/>
      <main className="main">
        {page === 'dashboard' ? <Dashboard onImpersonate={setImpersonate} pipelineCols={pipelineCols} setPage={setPage} onNovoCliente={()=>setNovoClienteAberto(true)} onExportar={exportarCSV} busca={busca}/>
          : page === 'clientes' ? <Conversas pipelineCols={pipelineCols} moverNoPipeline={moverNoPipeline}/>
          : page === 'mrr'      ? <MRR/>
          : page === 'pipeline' ? <Pipeline cols={pipelineCols} setCols={setPipelineCols}/>
          : page === 'agenda'   ? <Agenda/>
          : page === 'analytics'? <Analytics/>
          : page === 'chamados' ? <Chamados/>
          : page === 'equipe'   ? <Equipe/>
          : page === 'logs'     ? <Logs/>
          : page === 'config'   ? <Config/>
          : <Placeholder page={page}/>}
      </main>
      {novoClienteAberto && <NovoClienteModal onClose={()=>setNovoClienteAberto(false)} onSalvar={cadastrarCliente}/>}
      <ShortcutsModal open={shortcutsOpen} onClose={()=>setShortcutsOpen(false)}/>
      <AIChat/>
      <ToastContainer/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

// Splash de login → ao sumir, marca body.boot-ready (libera animacoes CSS)
// e dispara evento "brava_boot_ready" (libera os contadores useCount).
const BOOT_SPLASH_MS = 1400;
function bravaRevealApp() {
  if (document.body.classList.contains('boot-ready')) return;
  const l = document.getElementById('brava-loading');
  if (l) { l.style.opacity = '0'; setTimeout(() => l.remove(), 400); }
  // Espera o fade do splash antes de liberar as animacoes do dashboard
  setTimeout(() => {
    document.body.classList.add('boot-ready');
    window.dispatchEvent(new Event('brava_boot_ready'));
  }, 380);
}
setTimeout(bravaRevealApp, BOOT_SPLASH_MS);
// Fail-safe: se algo travar, ainda libera em 8s
setTimeout(bravaRevealApp, 8000);
</script>
</body>
</html>
