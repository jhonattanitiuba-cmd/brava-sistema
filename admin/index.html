          contato.isGroup
            ? ['Tipo', `Grupo · ${grupo?.participants?.length || '?'} membros`]
            : ['Telefone', telefone],
          salvo?.empresa ? ['Empresa', salvo.empresa] : null,
          salvo?.tag ? ['Etiqueta', salvo.tag] : null,
          ['Origem',   origem],
          ['Não lidas',contato.unread > 0 ? String(contato.unread) : '–'],
          ['1ª msg',   primMsgFmt],
          ['Última',   ultMsg?.time || '–'],
          ['Total',    totalMsgs > 0 ? `${totalMsgs} mensagem${totalMsgs===1?'':'s'}` : '–'],
        ].filter(Boolean).map(([k,v]) => (
          <div key={k} style={{ display:'flex', justifyContent:'space-between', marginBottom:8, gap:8 }}>
            <span style={{ fontSize:12.5, color:S.textSec, flexShrink:0 }}>{k}</span>
            <span style={{ fontSize:12.5, color:S.textPrimary, fontWeight:500, textAlign:'right', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{v}</span>
          </div>
        ))}
      </div>

      {/* Nota salva no contato */}
      {salvo?.nota && (
        <div style={{ background:'rgba(123,63,228,.06)', border:'1px solid rgba(123,63,228,.2)', borderRadius:10, padding:'12px 14px' }}>
          <div style={{ fontSize:11, color:'var(--purple)', fontWeight:600, marginBottom:6, letterSpacing:'.04em' }}>📝 NOTA DO CONTATO</div>
          <div style={{ fontSize:13, color:S.textPrimary, lineHeight:1.5, whiteSpace:'pre-wrap' }}>{salvo.nota}</div>
        </div>
      )}

      {/* Membros (se for grupo) */}
      {contato.isGroup && grupo?.participants && grupo.participants.length > 0 && (
        <div style={{ background:S.headerBg, borderRadius:10, padding:'12px 14px' }}>
          <div style={{ fontSize:11, color:S.textSec, fontWeight:600, marginBottom:10, letterSpacing:'.04em' }}>MEMBROS · {grupo.participants.length}</div>
          <div style={{display:'flex', flexDirection:'column', gap:6, maxHeight:200, overflowY:'auto'}}>
            {grupo.participants.slice(0, 30).map((p, i) => {
              const jid = p.id || p;
              const nome = p.notify || p.name || evoFormatPhone(jid);
              const isAdmin = p.admin === 'admin' || p.admin === 'superadmin';
              return (
                <div key={jid+'-'+i} style={{display:'flex', alignItems:'center', gap:8}}>
                  <EvoAvatar remoteJid={jid} name={nome} size={24}/>
                  <span style={{fontSize:12.5, color:S.textPrimary, flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{nome}</span>
                  {isAdmin && <span style={{fontSize:9.5, padding:'1px 5px', borderRadius:3, background:'rgba(123,63,228,.18)', color:'var(--purple)', fontFamily:'var(--f-m)'}}>ADMIN</span>}
                </div>
              );
            })}
            {grupo.participants.length > 30 && (
              <div style={{fontSize:11, color:S.textSec, textAlign:'center', paddingTop:6}}>
                +{grupo.participants.length - 30} outros
              </div>
            )}
          </div>
        </div>
      )}

      {/* Notas */}
      <div style={{ background:S.headerBg, borderRadius:10, padding:'12px 14px' }}>

// Hook: carrega checkpoints e métricas agregadas por cliente
function useMonitoramento() {
  const [data, setData] = React.useState({ checkpoints:[], waMetrics:{}, loading:true });
  React.useEffect(() => {
    const cli = getSupa();
    if (!cli) { setData(d => ({...d, loading:false})); return; }
    let alive = true;
    const carregar = async () => {
      try {
        // Checkpoints de todos os clientes
        const { data: checkpoints } = await cli.from('project_checkpoints').select('*').order('cliente_nome', { ascending:true }).order('ordem');
        // Métricas WhatsApp dos últimos 7 dias por instância
        const { data: msgs7d } = await cli.from('wa_mensagens')
          .select('instancia_id, from_me, ia_generated, timestamp')
          .gte('timestamp', new Date(Date.now() - 7*86400000).toISOString())
          .limit(20000);
        const waMetrics = {};
        (msgs7d || []).forEach(m => {
          if (!waMetrics[m.instancia_id]) waMetrics[m.instancia_id] = { total:0, in:0, out:0, ia:0, ultima:0 };
          waMetrics[m.instancia_id].total++;
          if (m.from_me) waMetrics[m.instancia_id].out++; else waMetrics[m.instancia_id].in++;
          if (m.ia_generated) waMetrics[m.instancia_id].ia++;
          const t = new Date(m.timestamp).getTime();
          if (t > waMetrics[m.instancia_id].ultima) waMetrics[m.instancia_id].ultima = t;
        });
        if (alive) setData({ checkpoints: checkpoints || [], waMetrics, loading:false });
      } catch (e) {
        if (alive) { console.warn('monitoramento:', e); setData(d => ({...d, loading:false})); }
      }
    };
    carregar();
    const t = setInterval(carregar, 30000); // refresh suave 30s
    return () => { alive = false; clearInterval(t); };
  }, []);
  return data;
}

// Calcula saúde geral 0-100 baseado em 4 fatores
function calcSaude({ percentEntreg, msgsUltimos7d, mrrAtivo, diasNaFase }) {
  const f1 = (percentEntreg || 0) * 0.40;
  const f2 = (msgsUltimos7d > 5 ? 100 : msgsUltimos7d * 20) * 0.30;
  const f3 = (mrrAtivo ? 100 : 0) * 0.20;
  const f4 = (diasNaFase <= 14 ? 100 : Math.max(0, 100 - (diasNaFase-14)*5)) * 0.10;
  return Math.round(f1 + f2 + f3 + f4);
}
function saudeCor(score) {
  if (score >= 75) return { cor:'#1D9E75', label:'Saudável' };
  if (score >= 50) return { cor:'#BA7517', label:'Atenção' };
  return { cor:'#A32D2D', label:'Crítico' };
}

function Monitoramento({ pipelineCols, onImpersonate }) {
  const { checkpoints, waMetrics, loading } = useMonitoramento();
  const clientes = useClientesReactivos();
  const [filtroFase, setFiltroFase] = React.useState('todas');
  const [detalheCliente, setDetalheCliente] = React.useState(null);

  // Agrupa checkpoints por cliente_slug
  const checkpointsByCliente = React.useMemo(() => {
    const map = {};
    checkpoints.forEach(c => {
      if (!map[c.cliente_slug]) map[c.cliente_slug] = [];
      map[c.cliente_slug].push(c);
    });
    return map;
  }, [checkpoints]);

  // Constrói lista de projetos enriquecida
  const projetos = React.useMemo(() => {
    return clientes.map(c => {
      const slug = c.slug || c.nome.toLowerCase().replace(/[^a-z0-9]/g, '');
      const cks = checkpointsByCliente[slug] || [];
      const done = cks.filter(k => k.done).length;
      const total = cks.length || 1;
      const percentEntreg = Math.round((done / total) * 100);
      const proxAcao = cks.find(k => !k.done);
      // Fase atual: usa do cliente OU primeira fase com checkpoint pendente
      const faseAtual = proxAcao?.fase || 'prod';
      const faseObj = (pipelineCols || []).find(f => f.id === faseAtual);
      // Métricas WhatsApp (busca pela instância vinculada — TODO: melhor join)
      const wa = waMetrics[c.instancia_id] || { total:0, in:0, out:0, ia:0, ultima:0 };
      const horasUltimaMsg = wa.ultima ? Math.round((Date.now() - wa.ultima) / 3600000) : 999;
      const mrrAtivo = c.status === 'Ativo' || c.status === 'Em Prod';
      const saude = calcSaude({ percentEntreg, msgsUltimos7d: wa.total, mrrAtivo, diasNaFase: 5 });
      const saudeInfo = saudeCor(saude);
      return { ...c, slug, cks, done, total, percentEntreg, proxAcao, faseAtual, faseObj, wa, horasUltimaMsg, mrrAtivo, saude, saudeInfo };
    });
  }, [clientes, checkpointsByCliente, waMetrics, pipelineCols]);

  const projetosFiltrados = filtroFase === 'todas' ? projetos : projetos.filter(p => p.faseAtual === filtroFase);

  // KPIs do topo
  const mrrTotal = projetos.filter(p => p.mrrAtivo).length * 1990; // estimativa simples
  const totalCheckpoints = checkpoints.length;
  const totalDone = checkpoints.filter(c => c.done).length;
  const totalMsgs = Object.values(waMetrics).reduce((s, w) => s + w.total, 0);
  const totalIa = Object.values(waMetrics).reduce((s, w) => s + w.ia, 0);
  const percentIa = totalMsgs ? Math.round((totalIa / totalMsgs) * 100) : 0;
  const projetosCriticos = projetos.filter(p => p.saude < 50).length;

  return (
    <div style={{padding:'0 8px'}}>
      <h2 style={{margin:'0 0 24px', fontSize:24, fontWeight:600, color:'var(--t1)', fontFamily:'var(--f-d)'}}>
        Monitoramento de Progresso
      </h2>

      {/* KPIs topo */}
      <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(200px, 1fr))', gap:14, marginBottom:24}}>
        <KpiCard label="MRR Ativo" value={`R$ ${mrrTotal.toLocaleString('pt-BR')}`} sub={`${projetos.filter(p=>p.mrrAtivo).length} clientes pagando`} icon="DollarSign" cor="#1D9E75"/>
        <KpiCard label="Entregáveis" value={`${totalDone}/${totalCheckpoints}`} sub={totalCheckpoints ? `${Math.round((totalDone/totalCheckpoints)*100)}% concluídos` : 'Sem checkpoints'} icon="CheckCircle" cor="#1E90FF"/>
        <KpiCard label="Msgs 7 dias" value={totalMsgs.toLocaleString('pt-BR')} sub={`${percentIa}% pela IA`} icon="MessageCircle" cor="#7B3FE4"/>
        <KpiCard label="Projetos críticos" value={String(projetosCriticos)} sub={projetosCriticos > 0 ? 'Precisam de atenção' : 'Tudo no controle'} icon="AlertCircle" cor={projetosCriticos > 0 ? '#A32D2D' : '#1D9E75'}/>
      </div>

      {/* Filtros */}
      <div style={{display:'flex', gap:8, marginBottom:18, flexWrap:'wrap', alignItems:'center'}}>
        <span style={{fontSize:13, color:'var(--t3)', marginRight:4}}>Fase:</span>
        <button onClick={()=>setFiltroFase('todas')} style={_filtroBtn(filtroFase==='todas')}>Todas ({projetos.length})</button>
        {(pipelineCols || []).map(f => {
          const n = projetos.filter(p => p.faseAtual === f.id).length;
          return n > 0 ? (
            <button key={f.id} onClick={()=>setFiltroFase(f.id)} style={_filtroBtn(filtroFase===f.id, f.cor)}>
              {f.nome} ({n})
            </button>
          ) : null;
        })}
      </div>

      {loading && <div style={{padding:40, textAlign:'center', color:'var(--t3)'}}>Carregando...</div>}

      {/* Cards de projeto */}
      <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(380px, 1fr))', gap:16}}>
        {projetosFiltrados.map(p => (
          <ProjetoCard key={p.nome} projeto={p} onClick={() => setDetalheCliente(p)} onImpersonate={onImpersonate}/>
        ))}
      </div>

      {projetosFiltrados.length === 0 && !loading && (
        <div style={{padding:40, textAlign:'center', color:'var(--t3)'}}>
          Nenhum projeto nessa fase.
        </div>
      )}

      {/* Modal de detalhe */}
      {detalheCliente && <ProjetoDetalheModal projeto={detalheCliente} pipelineCols={pipelineCols} onClose={()=>setDetalheCliente(null)} onChange={() => window.dispatchEvent(new Event('brava_checkpoints_changed'))}/>}
    </div>
  );
}

function ProjetoDetalheModal({ projeto: p, pipelineCols, onClose, onChange }) {
  const [cks, setCks] = React.useState(p.cks);
  const [novoTitulo, setNovoTitulo] = React.useState('');

  const toggleDone = async (ck) => {
    const novo = !ck.done;
    setCks(arr => arr.map(c => c.id === ck.id ? {...c, done: novo, done_at: novo ? new Date().toISOString() : null} : c));
    try {
      const cli = getSupa();
      await cli.from('project_checkpoints').update({ done: novo, done_at: novo ? new Date().toISOString() : null }).eq('id', ck.id);
      onChange?.();
    } catch (e) { showToast?.('Erro ao salvar', 'error'); }
  };

  const adicionar = async () => {
    if (!novoTitulo.trim()) return;
    try {
      const cli = getSupa();
      const { data: ws } = await cli.from('workspaces').select('id').limit(1).maybeSingle();
      const { data: novo } = await cli.from('project_checkpoints').insert({
        workspace_id: ws?.id,
        cliente_slug: p.slug,
        cliente_nome: p.nome,
        servico_categoria: 'custom',
        fase: 'impl',
        titulo: novoTitulo.trim(),
        ordem: cks.length + 1,
      }).select().single();
      if (novo) {
        setCks(arr => [...arr, novo]);
        setNovoTitulo('');
        onChange?.();
      }
    } catch (e) { showToast?.('Erro ao adicionar', 'error'); }
  };

  const removeCk = async (ck) => {
    if (!confirm(`Remover "${ck.titulo}"?`)) return;
    try {
      const cli = getSupa();
      await cli.from('project_checkpoints').delete().eq('id', ck.id);
      setCks(arr => arr.filter(c => c.id !== ck.id));
      onChange?.();
    } catch (e) { showToast?.('Erro ao remover', 'error'); }
  };

  // Agrupa por fase
  const porFase = {};
  cks.forEach(c => {
    if (!porFase[c.fase]) porFase[c.fase] = [];
    porFase[c.fase].push(c);
  });
  const fasesOrdem = (pipelineCols || []).map(f => f.id).filter(id => porFase[id]?.length);

  return (
    <div onClick={(e)=>{if(e.target===e.currentTarget) onClose();}} style={{
      position:'fixed', inset:0, background:'rgba(0,0,0,.7)', backdropFilter:'blur(4px)',
      zIndex:10000, display:'flex', alignItems:'center', justifyContent:'center', padding:20,
    }}>
      <div style={{
        background:'var(--bg)', borderRadius:14, width:680, maxWidth:'95vw', maxHeight:'88vh',
        border:'1px solid var(--border)', display:'flex', flexDirection:'column', overflow:'hidden',
      }}>
        {/* Header */}
        <div style={{padding:'18px 22px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', gap:12}}>
          <ClienteAvatar nome={p.nome} init={p.init} color={p.color} logoUrl={p.logoUrl} size={42}/>
          <div style={{flex:1, minWidth:0}}>
            <h3 style={{margin:0, fontSize:17, color:'var(--t1)', fontFamily:'var(--f-d)', fontWeight:600}}>{p.nome}</h3>
            <div style={{fontSize:12, color:'var(--t3)', marginTop:2}}>
              {p.done}/{p.total} entregues · {p.percentEntreg}% · {p.faseObj?.nome || p.faseAtual}
            </div>
          </div>
          <button onClick={onClose} style={{
            width:32, height:32, borderRadius:8, border:'none', background:'transparent',
            color:'var(--t3)', cursor:'pointer', fontSize:18,
          }}>×</button>
        </div>

        {/* Sub-header: progresso visual */}
        <div style={{padding:'14px 22px', borderBottom:'1px solid var(--border-soft)', background:'var(--bg-2)'}}>
          <SecaoLabel icon="Activity" count={p.total > 0 ? `${p.done}/${p.total}` : null}>Progresso geral</SecaoLabel>

            <div style={{height:'100%', width:`${p.percentEntreg}%`, background:'var(--blue)', transition:'width .25s'}}/>
          </div>
        </div>

        {/* Lista por fase */}
        <div style={{flex:1, overflowY:'auto', padding:'8px 0'}}>
          {fasesOrdem.map(faseId => {
            const fase = (pipelineCols || []).find(f => f.id === faseId);

            const doneCount = items.filter(c => c.done).length;
            return (

                  display:'flex', alignItems:'center', gap:8, marginBottom:8, marginTop:6,

                    display:'flex', alignItems:'center', gap:10, padding:'8px 10px',

                    onMouseLeave={e => e.currentTarget.style.background='transparent'}

                    <input type="checkbox" checked={ck.done} onChange={() => toggleDone(ck)}

                      title="Remover"
                    >
                      <Icon name="X" size={12}/>
                    </button>
                  </div>
                ))}
              </div>
            );
          })}
        </div>

        {/* Adicionar novo */}
        <div style={{padding:'12px 22px', borderTop:'1px solid var(--border)', display:'flex', gap:8}}>
          <input
            value={novoTitulo}
            onChange={e=>setNovoTitulo(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter') adicionar();}}
            placeholder="Adicionar nova tarefa..."
            style={{
              flex:1, padding:'9px 12px', borderRadius:7,
              border:'1px solid var(--border)', background:'var(--bg-3)',
              color:'var(--t1)', fontSize:13, outline:'none',
            }}
          />
          <button onClick={adicionar} disabled={!novoTitulo.trim()} style={{

function useTeamMembers() {
  const [membros, setMembros] = React.useState([]);
  const [convites, setConvites] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  React.useEffect(() => {
    const cli = getSupa();
    if (!cli) { setLoading(false); return; }
    let alive = true;
    const carregar = async () => {
      try {
        const [m, c] = await Promise.all([
          cli.from('workspace_team').select('*'),
          cli.from('convites').select('*').is('accepted_at', null).order('invited_at', { ascending: false }),
        ]);
        if (alive) {
          setMembros(m.data || []);
          setConvites(c.data || []);
          setLoading(false);
        }
      } catch (e) { console.warn('team:', e); if (alive) setLoading(false); }
    };
    carregar();
    const ch = cli.channel('rt:team')
      .on('postgres_changes', { event:'*', schema:'public', table:'convites' }, carregar)
      .on('postgres_changes', { event:'*', schema:'public', table:'workspace_members' }, carregar)
      .on('postgres_changes', { event:'*', schema:'public', table:'usuarios' }, carregar)
      .subscribe();
    return () => { alive = false; cli.removeChannel(ch); };
  }, []);
  return { membros, convites, loading };
}

function ConviteCard({ convite, podeGerenciar }) {
  const cancelar = async () => {
    if (!confirm(`Cancelar convite pra ${convite.email}?`)) return;
    const cli = getSupa();
    await cli.from('convites').delete().eq('id', convite.id);
    showToast?.('Convite cancelado', 'success');
  };
  const reenviar = async () => {
    try {
      const cli = getSupa();
      const { data: sess } = await cli.auth.getSession();
      const token = sess?.session?.access_token;
      const res = await fetch(`${SUPA_CFG.url}/functions/v1/invite-user`, {
        method:'POST',
        headers:{'content-type':'application/json', 'apikey':SUPA_CFG.publishableKey, 'authorization':`Bearer ${token}`},
        body: JSON.stringify({ email: convite.email, role: convite.role, workspace_id: convite.workspace_id }),
      });
      const data = await res.json();
      if (data.ok) showToast?.('Convite reenviado', 'success');
      else showToast?.('Erro: ' + (data.error || data.detail), 'error');
    } catch (e) { showToast?.('Erro: ' + e.message, 'error'); }
  };

  const expirado = new Date(convite.expires_at) < new Date();
  return (
    <div style={{
      padding:'12px 14px', background:'var(--bg-2)', borderRadius:10,
      border:`1px dashed ${expirado ? '#A32D2D55' : 'var(--border)'}`,
      display:'flex', alignItems:'center', gap:10,
    }}>
      <div style={{
        width:32, height:32, borderRadius:'50%',
        background: 'linear-gradient(135deg, var(--purple), var(--blue))',
        display:'flex', alignItems:'center', justifyContent:'center',
        color:'#fff', fontWeight:700, fontSize:13,
      }}>{convite.email[0].toUpperCase()}</div>
      <div style={{flex:1, minWidth:0}}>
        <div style={{fontSize:13, color:'var(--t1)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>
          {convite.email}
        </div>
        <div style={{fontSize:11, color:'var(--t3)'}}>
          {ROLE_LABEL[convite.role]} · {expirado ? 'Expirado' : `expira em ${Math.ceil((new Date(convite.expires_at) - Date.now()) / 86400000)}d`}
        </div>
      </div>
      {podeGerenciar && (
        <>
          <button onClick={reenviar} title="Reenviar convite" style={_iconBtn('var(--blue)')}><Icon name="RefreshCw" size={13}/></button>
          <button onClick={cancelar} title="Cancelar" style={_iconBtn('#E5544D')}><Icon name="X" size={13}/></button>
        </>
      )}

  );

function ConvidarMembroModal({ onClose }) {
  const [email, setEmail] = React.useState('');
  const [role, setRole] = React.useState('agent');
  const [enviando, setEnviando] = React.useState(false);
  const [erro, setErro] = React.useState('');

  const enviar = async (e) => {
    e?.preventDefault?.();
    if (!email.includes('@')) { setErro('Email inválido'); return; }
    setEnviando(true); setErro('');
    try {
      const cli = getSupa();
      const { data: sess } = await cli.auth.getSession();
      const token = sess?.session?.access_token;
      // Pega o workspace_id do user logado
      const { data: ws } = await cli.from('workspace_members').select('workspace_id').limit(1).maybeSingle();
      const workspace_id = ws?.workspace_id;
      if (!workspace_id) throw new Error('Workspace não encontrado');

      const res = await fetch(`${SUPA_CFG.url}/functions/v1/invite-user`, {
        method:'POST',
        headers:{'content-type':'application/json', 'apikey':SUPA_CFG.publishableKey, 'authorization':`Bearer ${token}`},
        body: JSON.stringify({ email: email.toLowerCase().trim(), role, workspace_id }),
      });
      const data = await res.json();
      if (!res.ok || data.error) { setErro(data.error || data.detail || 'Erro desconhecido'); return; }
      showToast?.(`Convite enviado pra ${email}`, 'success');
      onClose();

const CACHE_VERSION = 'v=8'; // bump quando trocar assets (logos, fotos, etc.)
const ASSET = (url) => url + (url.indexOf('?') >= 0 ? '&' : '?') + CACHE_VERSION;

/* ─── Helper: perfil do usuario (nome, cargo, email, telefone) ─── */
function getUserPerfil() {
  try {
    const s = localStorage.getItem('brava_user_perfil');
    return s ? JSON.parse(s) : {};
  } catch { return {}; }
}
function setUserPerfilStore(perfil) {
  try {
    // 1. Persiste perfil "rico" (nome, cargo, email, telefone)
    localStorage.setItem('brava_user_perfil', JSON.stringify(perfil));
    // 2. Sincroniza com a SESSAO em memoria + storage (para SaudacaoDinamica
    //    e tudo que le SESSAO.nome / SESSAO.email ver o valor novo na hora
    //    e tambem apos um reload).
    if (typeof SESSAO === 'object' && SESSAO) {
      if (perfil.nome)     SESSAO.nome  = perfil.nome;
      if (perfil.email)    SESSAO.email = perfil.email;
      if (perfil.cargo)    SESSAO.role  = perfil.cargo;
    }
    try {
      const s = JSON.parse(localStorage.getItem('brava_sessao') || '{}');
      if (perfil.nome)  s.nome  = perfil.nome;
      if (perfil.email) s.email = perfil.email;
      if (perfil.cargo) s.role  = perfil.cargo;
      localStorage.setItem('brava_sessao', JSON.stringify(s));
    } catch {}
    // 3. Notifica componentes
    window.dispatchEvent(new Event('brava_perfil_changed'));
  } catch (e) { console.warn('Falha ao salvar perfil', e); }
}
function getNomeExibicao() {
  const p = getUserPerfil();
  return p.nome || SESSAO.nome || 'Jhonattan Itiuba';
}
function useNomeExibicao() {
  const [nome, setNome] = React.useState(() => getNomeExibicao());
  React.useEffect(() => {
    const refresh = () => setNome(getNomeExibicao());
    window.addEventListener('brava_perfil_changed', refresh);
    window.addEventListener('storage', refresh);
    return () => {
      window.removeEventListener('brava_perfil_changed', refresh);
      window.removeEventListener('storage', refresh);
    };
  }, []);
  return nome;
}
// Hook generico: retorna o perfil completo reativo (nome, cargo, email, telefone)
function useUserPerfil() {
  const get = () => {
    const p = getUserPerfil();
    return {
      nome:     p.nome     || SESSAO.nome  || 'Jhonattan Itiuba',
      cargo:    p.cargo    || SESSAO.role  || 'Diretoria',
      email:    p.email    || SESSAO.email || 'diretoria@brava.company',
      telefone: p.telefone || '+55 11 96334-2541',
    };
  };
  const [perfil, setPerfil] = React.useState(get);
  React.useEffect(() => {
    const refresh = () => setPerfil(get());
    window.addEventListener('brava_perfil_changed', refresh);
    window.addEventListener('storage', refresh);
    return () => {
      window.removeEventListener('brava_perfil_changed', refresh);
      window.removeEventListener('storage', refresh);
    };
  }, []);
  return perfil;
}

/* ─── Helper: foto do usuario (por email, nao vaza foto de outro user).
   Prioridade:
   1) upload do user logado (localStorage 'brava_user_photo:<email>')
   2) foto default do mapa BRAVA_USERS pelo email
   3) null (vira iniciais coloridas) ─── */
function _emailAtual() {
  try {
    const s = JSON.parse(localStorage.getItem('brava_sessao') || '{}');
    return String(s.email || '').toLowerCase().trim();
  } catch { return ''; }
}

/* Hook: ID do usuario logado (resolve via email -> usuarios.id).
   Resiliente: re-resolve quando email muda no localStorage (perfil editado)
   e quando SDK Supabase carrega tarde. */
function useUsuarioLogadoId() {
  const [id, setId] = React.useState(null);
  const [email, setEmail] = React.useState(() => _emailAtual());

  // Escuta mudancas de perfil/sessao
  React.useEffect(() => {
    const refresh = () => setEmail(_emailAtual());
    window.addEventListener('brava_perfil_changed', refresh);
    window.addEventListener('storage', refresh);
    return () => {
      window.removeEventListener('brava_perfil_changed', refresh);
      window.removeEventListener('storage', refresh);
    };
  }, []);

  React.useEffect(() => {
    if (!email) return;
    let alive = true;
    let timer = null;
    const tentar = async () => {
      const cli = getSupa();
      if (!cli) {
        // SDK ainda nao carregou, tenta de novo em 200ms
        timer = setTimeout(tentar, 200);
        return;
      }
      try {
        const { data } = await cli.from('usuarios').select('id').eq('email', email).maybeSingle();
        if (alive && data?.id) {
          setId(data.id);
          console.log('[Brava] Usuario logado resolvido:', email, '->', data.id);
        } else if (alive) {
          console.warn('[Brava] Usuario nao encontrado pra email:', email);
        }
      } catch (e) {
        console.warn('[Brava] Erro resolvendo usuario:', e.message);
      }
    };
    tentar();
    return () => { alive = false; if (timer) clearTimeout(timer); };
  }, [email]);

  return id;
}
function getUserPhoto() {
  try {
    const email = _emailAtual();
    if (!email) return null;
    // ✨ Centralizado: usa helper que consulta banco > localStorage > BRAVA_USERS
    const foto = (typeof getUserFoto === 'function') ? getUserFoto(email) : null;
    if (foto) return foto;
    // Legacy fallback (chave antiga sem email) — só pra diretoria
    if (email === 'diretoria@brava.company') {
      const legacy = localStorage.getItem('brava_user_photo');
      if (legacy) return legacy;
    }
    return null;
  } catch { return null; }
}
function setUserPhoto(dataUrl) {
  try {
    const email = _emailAtual();
    if (!email) {
      console.warn('Sem email na sessao, nao salvou foto');
      return;
    }
    const key = 'brava_user_photo:' + email;
    if (dataUrl) localStorage.setItem(key, dataUrl);
    else localStorage.removeItem(key);
    window.dispatchEvent(new Event('brava_photo_changed'));
  } catch (e) { console.warn('Falha ao salvar foto', e); }
}

/* Hook reativo da foto do usuario (atualiza quando troca foto OU quando muda perfil) */
function useUserPhoto() {
  const [foto, setFoto] = React.useState(() => getUserPhoto());

}

// ─── INSTANCIA ATIVA (multi-WhatsApp) ──────────────────────────────────

// O id da instancia ativa fica no localStorage. Todos os hooks abaixo (que
// usam SUPA_CFG.instanciaId via getter) re-renderizam ao trocar.
const ACTIVE_INSTANCE_KEY = 'brava_active_instance_id';
const DEFAULT_INSTANCE_ID = 'a7133174-d7f5-4623-ab0a-9938f5827f32'; // Brava Principal (fallback)
function getActiveInstanceId() {
  try { return localStorage.getItem(ACTIVE_INSTANCE_KEY) || DEFAULT_INSTANCE_ID; }
  catch { return DEFAULT_INSTANCE_ID; }
}
function setActiveInstanceId(id) {
  if (!id) localStorage.removeItem(ACTIVE_INSTANCE_KEY);
  else     localStorage.setItem(ACTIVE_INSTANCE_KEY, id);
  window.dispatchEvent(new Event('brava_active_instance_changed'));
}
function useActiveInstanceId() {
  const [id, setId] = React.useState(getActiveInstanceId);
  React.useEffect(() => {
    const fn = () => setId(getActiveInstanceId());
    window.addEventListener('brava_active_instance_changed', fn);
    window.addEventListener('storage', fn);
    return () => {
      window.removeEventListener('brava_active_instance_changed', fn);
      window.removeEventListener('storage', fn);
    };
  }, []);
  return id;
}

let _supa = null;
function getSupa() {
  if (_supa) return _supa;
  if (typeof window.supabase === 'undefined') return null;
  // ✨ persistSession + autoRefreshToken TRUE → JWT vai junto nas queries (RLS funciona)
  _supa = window.supabase.createClient(SUPA_CFG.url, SUPA_CFG.publishableKey, {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      storageKey: 'brava_sb_auth',
      detectSessionInUrl: false,
    },
    realtime: { params: { eventsPerSecond: 20 } },
  });
  return _supa;
}

// ✨ Hook: garante que ha uma sessao Supabase Auth ativa.
// Se nao houver, mostra modal de login (email pre-preenchido).
// Apos login, JWT eh persistido e queries com RLS funcionam.
function useSupaAuthGate() {
  const [needLogin, setNeedLogin] = React.useState(false);
  const [loading, setLoading] = React.useState(true);
  const [userId, setUserId] = React.useState(null);

  React.useEffect(() => {
    const cli = getSupa();
    if (!cli) { setLoading(false); return; }
    let alive = true;
    cli.auth.getSession().then(({ data }) => {
      if (!alive) return;
      const sess = data?.session;
      if (sess?.user?.id) {
        setUserId(sess.user.id);
        setNeedLogin(false);
      } else {
        setNeedLogin(true);
      }
      setLoading(false);
    });
    const { data: sub } = cli.auth.onAuthStateChange((_evt, session) => {
      if (!alive) return;
      if (session?.user?.id) {
        setUserId(session.user.id);
        setNeedLogin(false);
      } else {
        setUserId(null);
        setNeedLogin(true);
      }
    });
    return () => { alive = false; sub?.subscription?.unsubscribe?.(); };
  }, []);

  return { needLogin, loading, userId };
}

/* ── Chamada da Edge Function wa-proxy (envia comandos pra Evolution) ──
   IMPORTANTE: a instancia_id e capturada AGORA (antes do await), nao no
   momento do request. Se o usuario trocar de WhatsApp entre o disparo da
   chamada e a chegada da resposta, garantimos que a operacao foi feita
   na instancia que o usuario via quando clicou. */
async function supaProxyCall({ path, method = 'GET', body, instanceId }) {
  // Snapshot da instancia ativa no momento da chamada
  const instanciaIdAtCall = instanceId || SUPA_CFG.instanciaId;
  // ✨ Pega JWT da sessao Supabase Auth (precisa ser JWT real, nao publishable key)
  let bearer = SUPA_CFG.publishableKey;
  try {
    const cli = getSupa();
    if (cli) {
      const { data } = await cli.auth.getSession();
      if (data?.session?.access_token) bearer = data.session.access_token;
    }
  } catch {}
  const res = await fetch(`${SUPA_CFG.url}/functions/v1/wa-proxy`, {
    method: 'POST',
    headers: {
      'content-type': 'application/json',
      'apikey': SUPA_CFG.publishableKey,
      'authorization': `Bearer ${bearer}`,
    },
    body: JSON.stringify({ instancia_id: instanciaIdAtCall, path, method, body }),
  });
  const text = await res.text();
  let data; try { data = text ? JSON.parse(text) : null; } catch { data = text; }
  if (!res.ok) {
    const msg = (data && (data.error || data.message)) || text || `HTTP ${res.status}`;
    throw new Error(typeof msg === 'string' ? msg : JSON.stringify(msg));
  }
  return data;
}

/* ── Hooks Realtime: chats e mensagens do banco com push automatico ── */
function useSupaChats() {
  const [chats, setChats] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [error, setError] = React.useState(null);
  const activeInstanceId = useActiveInstanceId(); // re-render ao trocar de WhatsApp

  React.useEffect(() => {
    const cli = getSupa();
    if (!cli) {
      // Aguarda o SDK carregar
      const t = setInterval(() => { if (getSupa()) { clearInterval(t); setLoading(l => l); } }, 200);
      return () => clearInterval(t);
    }
    // Limpa chats antes de carregar a nova instancia (evita flash do conteudo antigo)
    setChats([]); setLoading(true);
    let alive = true;
    const carregar = async () => {
      try {
        const { data, error } = await cli
          .from('wa_chats').select('*')
          .eq('instancia_id', activeInstanceId)
          .order('last_message_ts', { ascending: false, nullsFirst: false })
          .limit(300);
        if (!alive) return;
        if (error) throw error;
        setChats(data || []);
        setError(null);

        // ✨ Carrega FOTOS + NOMES dos contatos e popula caches compartilhados
        //    EvoAvatar lê de _evoPicCache; nomes vão pra _evoContacts.byJid
        //    IMPORTANTE: só notifica subs se houver MUDANÇA real (evita piscar).
        try {
          const { data: contatos } = await cli
            .from('wa_contatos')
            .select('jid, profile_pic_url, push_name, profile_name, verified_name, phone_jid, is_group')
            .eq('instancia_id', activeInstanceId)
            .limit(2000);
          if (alive && contatos) {
            let picsChanged = 0;
            let contatosChanged = 0;
            for (const ct of contatos) {
              if (!ct.jid) continue;
              // Foto: só seta no cache se URL mudou (evita piscar nas re-renders)
              if (ct.profile_pic_url && typeof _evoPicCache !== 'undefined') {
                const atual = _evoPicCache.get(ct.jid);
                if (!atual || atual.url !== ct.profile_pic_url) {
                  _evoPicCache.set(ct.jid, { url: ct.profile_pic_url, ts: Date.now() });
                  picsChanged++;
                }
              }
              // Contato: nome real (push_name > profile_name > verified_name)
              if (typeof _evoContacts !== 'undefined') {
                const nomeReal = ct.push_name || ct.profile_name || ct.verified_name || null;
                if (nomeReal) {
                  const existing = _evoContacts.byJid.get(ct.jid);
                  const novoObj = {
                    id: ct.jid,
                    pushName: ct.push_name,
                    profileName: ct.profile_name,
                    verifiedName: ct.verified_name,
                    profilePicUrl: ct.profile_pic_url,
                    lid: ct.jid.endsWith('@lid') ? ct.jid : null,
                  };
                  // Só atualiza se houver mudança real (comparando nome principal)
                  if (!existing || existing.pushName !== ct.push_name || existing.profileName !== ct.profile_name) {
                    _evoContacts.byJid.set(ct.jid, novoObj);
                    contatosChanged++;
                  }
                  // Mapeamento @lid -> @s.whatsapp.net (se aplicável)
                  if (ct.jid.endsWith('@lid') && ct.phone_jid) {
                    _evoContacts.lidToPhone.set(ct.jid, ct.phone_jid);
                  }
                }
              }
            }
            // Notifica APENAS se algo mudou de verdade (corta o flicker)
            if (picsChanged > 0 && typeof _evoPicSubs !== 'undefined') {
              _evoPicSubs.forEach(fn => { try { fn(); } catch {} });
            }
            if (contatosChanged > 0 && typeof _evoNotifyContacts === 'function') {
              _evoNotifyContacts();
            }
          }
        } catch (picErr) {
          console.warn('[supaChats] contatos/fotos:', picErr);
        }
      } catch (e) { if (alive) setError(e.message || String(e)); }
      finally { if (alive) setLoading(false); }
    };
    carregar();

    // Realtime: re-fetch suave a cada mudanca
    let debounceT = null;
    const refetch = () => { clearTimeout(debounceT); debounceT = setTimeout(carregar, 250); };
    const channel = cli
      .channel(`rt:wa_chats:${activeInstanceId}`)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'wa_chats', filter: `instancia_id=eq.${activeInstanceId}` }, refetch)
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'wa_mensagens', filter: `instancia_id=eq.${activeInstanceId}` }, refetch)
      .subscribe();

    // Evento manual de refresh (botao Atualizar no header)
    window.addEventListener('brava_wa_refresh', refetch);

    return () => {
      alive = false; clearTimeout(debounceT);
      cli.removeChannel(channel);
      window.removeEventListener('brava_wa_refresh', refetch);
    };
  }, [activeInstanceId]);

  return { chats, loading, error };
}

/* Hook: lista de instancias WhatsApp visiveis pro user logado.
   Regra de visibilidade:
     - owner_email IS NULL       -> publica do workspace (todos veem)
     - owner_email = user logado  -> privada, so o dono ve
   Filtragem feita no Postgres (server-side) via `.or()`. Quando migrarmos
   pra Supabase Auth real, a RLS policy `wa_instancias_select_policy` ja
   filtra pelo `auth.uid()` automaticamente. */
function useWaInstances() {
  const [instances, setInstances] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const userEmail = (SESSAO?.email || '').toLowerCase().trim();
  // Memoriza quais instancias ja foram auto-sincronizadas nesta sessao
  // (evita re-sync infinito quando Realtime trouxer o UPDATE)
  const syncedRef = React.useRef(new Set());

  React.useEffect(() => {
    const cli = getSupa();
    if (!cli) {
      const t = setInterval(() => { if (getSupa()) { clearInterval(t); } }, 200);
      return () => clearInterval(t);
    }
    let alive = true;
    const carregar = async () => {
      try {
        // Filtro server-side: owner_email IS NULL OR owner_email = userEmail
        let q = cli.from('wa_instancias')
          .select('id, nome, evolution_url, evolution_instance_name, evolution_apikey, status, profile_name, profile_pic_url, owner_jid, ai_enabled_global, workspace_id, owner_email, owner_user_id')
          .order('created_at', { ascending: true });
        if (userEmail) {
          q = q.or(`owner_email.is.null,owner_email.eq.${userEmail}`);
        } else {
          // sem user logado, so as publicas
          q = q.is('owner_email', null);
        }
        const { data } = await q;
        if (alive) {
          setInstances(data || []);
          setLoading(false);
          // Auto-sync background: pra cada instancia 'open' que estiver
          // SEM profile/foto cadastrados, dispara fetchInfo em paralelo.
          // Garante que toda instancia visivel mostre dados completos
          // (foto + nome + telefone), mesmo se foi criada antes de termos
          // o fluxo de sync automatico. Idempotente.
          (data || []).forEach((inst) => {
            const precisaSync = inst.status === 'open' && (
              !inst.profile_pic_url || !inst.owner_jid
            );
            const ja = syncedRef.current.has(inst.id);
            if (precisaSync && !ja) {
              syncedRef.current.add(inst.id);
              if (typeof evoAdmin !== 'undefined' && evoAdmin.fetchInfo) {
                evoAdmin.fetchInfo(inst.evolution_instance_name).catch(() => {});
              }
            }
          });
        }
      } catch { if (alive) setLoading(false); }
    };
    carregar();

    // Realtime: refetch ao mudar qualquer instancia
    const ch = cli.channel('rt:wa_instancias')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'wa_instancias' }, carregar)
      .subscribe();

    return () => { alive = false; cli.removeChannel(ch); };
  }, [userEmail]);

  return { instances, loading };
}

/* Som de transferencia estilo Chatwoot (Web Audio API, sintetico, sem arquivo).
   Toca 2 notas curtas suaves: pim-pom. */
let _bravaAudioCtx = null;
function _getAudioCtx() {
  if (_bravaAudioCtx) return _bravaAudioCtx;
  try { _bravaAudioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
  catch { _bravaAudioCtx = null; }
  return _bravaAudioCtx;
}
function playTransferSound() {
  // Respeita preferencia do user (default: ligado)
  try { if (localStorage.getItem('brava_som_transferencia') === 'off') return; } catch {}
  const ctx = _getAudioCtx();
  if (!ctx) return;
  if (ctx.state === 'suspended') { try { ctx.resume(); } catch {} }
  const now = ctx.currentTime;
  // Nota 1 (Mi5 = 659Hz)
  const o1 = ctx.createOscillator(), g1 = ctx.createGain();
  o1.type = 'sine'; o1.frequency.value = 659;
  g1.gain.setValueAtTime(0.0001, now);
  g1.gain.exponentialRampToValueAtTime(0.18, now + 0.02);
  g1.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);
  o1.connect(g1).connect(ctx.destination);
  o1.start(now); o1.stop(now + 0.2);
  // Nota 2 (Sol5 = 784Hz, levemente atrasada)
  const o2 = ctx.createOscillator(), g2 = ctx.createGain();
  o2.type = 'sine'; o2.frequency.value = 784;
  g2.gain.setValueAtTime(0.0001, now + 0.15);
  g2.gain.exponentialRampToValueAtTime(0.18, now + 0.17);
  g2.gain.exponentialRampToValueAtTime(0.0001, now + 0.36);
  o2.connect(g2).connect(ctx.destination);
  o2.start(now + 0.15); o2.stop(now + 0.4);
}

/* Hook: notifica + toca som quando agentee_id de QUALQUER chat passa a ser do user atual.
   Roda no nivel global da Conversas/App. Subscribe Realtime amplo em wa_chats UPDATE. */
function useTransferenciaWatcher(meuUserId) {
  // Re-cria channel ao trocar de instancia (o filter precisa do id ativo)
  const activeInstanceId = useActiveInstanceId();
  React.useEffect(() => {
    if (!meuUserId || !activeInstanceId) return;
    const cli = getSupa();
    if (!cli) return;
    console.log('[Brava] Transfer watcher armado pra:', meuUserId, 'instancia:', activeInstanceId);
    // Cache pra dedup: chat -> ultimoAgenteId conhecido
    const cache = new Map();
    const ch = cli.channel(`rt:transfer-watch:${activeInstanceId}:${meuUserId}`)
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'wa_chats', filter: `instancia_id=eq.${activeInstanceId}` }, (p) => {
        const jid = p.new?.jid; if (!jid) return;
        const novoAgente = p.new?.agente_id || null;
        const antigoAgente = cache.has(jid) ? cache.get(jid) : (p.old?.agente_id || null);
        cache.set(jid, novoAgente);
        // Disparou quando: antes era outro/null E agora e o user atual
        if (novoAgente === meuUserId && antigoAgente !== meuUserId) {
          console.log('[Brava] Chat transferido pra mim! Tocando som.');
          playTransferSound();

              icon: 'UserCircle',
              cor: '#00A884',
              link: 'clientes',
            });
          }
        }
      })
      .subscribe();
    return () => cli.removeChannel(ch);
  }, [meuUserId, activeInstanceId]);
}

/* Hook: notifica + toca som quando uma conciliacao automatica acontece.
   Escuta INSERT em projeto_pagamentos e fin_despesas_pagamentos.
   Como o trigger no banco insere/atualiza esses registros via auto-conciliacao,
   o user fica sabendo em tempo real quando o sistema bate algo sozinho. */
function useConciliacaoAutoWatcher() {
  React.useEffect(() => {
    const cli = getSupa(); if (!cli) return;
    const startedAt = Date.now();
    let bootstrapped = false;
    setTimeout(() => { bootstrapped = true; }, 2000); // evita disparar pra registros antigos no replay inicial

    const ch = cli.channel('rt:conciliacao-auto-watch')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'projeto_pagamentos' }, async (p) => {
        if (!bootstrapped || !p.new?.pago) return;
        try {
          const { data: cliente } = await cli.from('projetos').select('cliente, mensal').eq('id', p.new.cliente_id).maybeSingle();
          if (!cliente) return;
          playTransferSound();
          if (typeof adicionarNotificacao === 'function') {
            adicionarNotificacao({
              tipo: 'conciliacao_auto',
              titulo: `${cliente.cliente} pagou`,
              sub: `R$ ${Number(cliente.mensal||0).toLocaleString('pt-BR')} · referente a ${p.new.competencia}`,
              icon: 'CheckCircle2', cor: '#1D9E75',
              link: 'mrr',
            });
          }
        } catch {}
      })
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'fin_despesas_pagamentos' }, async (p) => {
        if (!bootstrapped || !p.new?.pago) return;
        try {
          const { data: desp } = await cli.from('fin_despesas').select('descricao').eq('id', p.new.despesa_id).maybeSingle();
          if (!desp) return;
          if (typeof adicionarNotificacao === 'function') {
            adicionarNotificacao({
              tipo: 'conciliacao_auto',
              titulo: `Despesa paga: ${desp.descricao}`,
              sub: `R$ ${Number(p.new.valor_pago||0).toLocaleString('pt-BR')} · ${p.new.competencia}`,
              icon: 'CreditCard', cor: '#BA7517',
              link: 'mrr',
            });
          }
        } catch {}
      })
      .subscribe();
    return () => cli.removeChannel(ch);
  }, []);
}

/* Hook: notifica + toca som quando um card do Pipeline e atribuido ao user atual.
   Roda no nivel do <App/>, escuta TODOS os UPDATEs em pipeline_cards. */
function usePipelineAssignWatcher(meuUserId) {
  React.useEffect(() => {
    if (!meuUserId) return;
    const cli = getSupa();
    if (!cli) return;

    // Cache pra dedup: cardId -> ultimoAgenteId conhecido
    // Pre-popula com estado atual pro UPDATE inicial nao disparar falsamente
    const cache = new Map();
    let bootstrapped = false;
    (async () => {
      try {
        const { data } = await cli.from('pipeline_cards').select('id, agente_id').is('archived_at', null);
        (data || []).forEach(c => cache.set(c.id, c.agente_id || null));
      } catch {}
      bootstrapped = true;
    })();

    // Quem atribuiu — busca nome real do autor (created_by/updated_by não existem aqui;
    // usamos titulo do card + nome do agente novo)
    const ch = cli.channel(`rt:pipe-assign-watch:${meuUserId}`)
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'pipeline_cards' }, async (p) => {
        const cardId = p.new?.id; if (!cardId) return;
        const novoAgente = p.new?.agente_id || null;
        // Antes do bootstrap, só popula cache (evita falso positivo no replay inicial)
        if (!bootstrapped) { cache.set(cardId, novoAgente); return; }
        const antigoAgente = cache.has(cardId) ? cache.get(cardId) : (p.old?.agente_id || null);
        cache.set(cardId, novoAgente);

        // Card foi arquivado nesse update? Ignora.
        if (p.new?.archived_at) return;

        // Disparou quando: antes era outro/null E agora é o user atual
        if (novoAgente === meuUserId && antigoAgente !== meuUserId) {
          const titulo = p.new?.titulo || 'um card';
          // Tenta resolver coluna + serviço pra um sub mais informativo
          let sub = 'Você foi atribuído a este card no Pipeline';
          try {
            const { data: col } = await cli.from('pipeline_colunas')
              .select('nome').eq('id', p.new.coluna_id).maybeSingle();
            if (col?.nome) sub = `Card "${titulo}" · coluna ${col.nome}`;
            else sub = `Card "${titulo}"`;
          } catch {}

          playTransferSound();
          if (typeof adicionarNotificacao === 'function') {
            adicionarNotificacao({
              tipo: 'pipeline_atribuicao',
              titulo: 'Card atribuído a você',
              sub,
              icon: 'KanbanSquare',
              cor: '#7B3FE4',
              link: 'pipeline',
            });
          }
          // Tenta notif do navegador também (mesmo padrão de evoBrowserNotify)
          try {
            if (typeof evoBrowserNotify === 'function') {
              evoBrowserNotify('Card atribuído a você', sub, `pipe:${cardId}`);
            }
          } catch {}
        }
      })
      .subscribe();
    return () => cli.removeChannel(ch);
  }, [meuUserId]);
}

/* Hook: agente atribuido + status do chat (wa_chats.agente_id, status).
   Le do banco + Realtime + retorna funcoes pra atribuir/desatribuir. */
function useSupaChatAgente(chatJid) {
  const [info, setInfo] = React.useState({ agenteId: null, status: 'pendente' });
  const activeInstanceId = useActiveInstanceId(); // reativo a troca de instancia

  React.useEffect(() => {
    if (!chatJid) return;
    const cli = getSupa();
    if (!cli) return;
    let alive = true;
    setInfo({ agenteId: null, status: 'pendente' }); // reset ao trocar
    const carregar = async () => {
      try {
        const { data } = await cli.from('wa_chats')
          .select('agente_id, status').eq('instancia_id', activeInstanceId).eq('jid', chatJid).maybeSingle();
        if (alive) setInfo({ agenteId: data?.agente_id || null, status: data?.status || 'pendente' });
      } catch {}
    };
    carregar();
    const ch = cli.channel(`rt:chatagente:${activeInstanceId}:${chatJid}`)
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'wa_chats', filter: `jid=eq.${chatJid}` }, (p) => {
        // Garante que e da instancia ativa (msg-update pode chegar de outras)
        if (alive && p.new && p.new.instancia_id === activeInstanceId) {
          setInfo({ agenteId: p.new.agente_id || null, status: p.new.status || 'pendente' });
        }
      })
      .subscribe();
    return () => { alive = false; cli.removeChannel(ch); };
  }, [chatJid, activeInstanceId]);

  const atribuir = React.useCallback(async (usuarioId) => {
    if (!chatJid) return;
    setInfo(s => ({ ...s, agenteId: usuarioId, status: usuarioId ? 'aberto' : 'pendente' }));
    const cli = getSupa();
    try {
      await cli.from('wa_chats').update({
        agente_id: usuarioId,
        agente_atribuido_em: usuarioId ? new Date().toISOString() : null,
        status: usuarioId ? 'aberto' : 'pendente',
      }).eq('instancia_id', activeInstanceId).eq('jid', chatJid);
    } catch (e) { console.warn('Erro atribuir agente:', e); }
  }, [chatJid, activeInstanceId]);

  const setStatus = React.useCallback(async (novoStatus) => {
    if (!chatJid) return;
    setInfo(s => ({ ...s, status: novoStatus }));
    const cli = getSupa();
    try {
      await cli.from('wa_chats').update({ status: novoStatus })
        .eq('instancia_id', activeInstanceId).eq('jid', chatJid);
    } catch (e) { console.warn('Erro setStatus:', e); }
  }, [chatJid, activeInstanceId]);

  return { agenteId: info.agenteId, status: info.status, atribuir, setStatus };
}

// Cache global de etiquetas por chat (pra renderizar nos cards da lista sem N queries)
const _chatEtiquetasCache = new Map(); // "instId|jid" -> [etiquetaId]
const _chatEtiquetasSubs = new Set();
function _notifyEtiquetas() { _chatEtiquetasSubs.forEach(fn => { try { fn(); } catch {} }); }

function useTodasChatEtiquetas() {
  const [, force] = React.useState(0);
  const activeInstanceId = useActiveInstanceId();
  React.useEffect(() => {
    if (!activeInstanceId) return;
    const cli = getSupa();
    if (!cli) return;
    let alive = true;
    const carregar = async () => {
      const { data } = await cli.from('chat_etiquetas')
        .select('chat_jid, etiqueta_id')
        .eq('instancia_id', activeInstanceId);
      if (!alive) return;
      _chatEtiquetasCache.clear();
      (data || []).forEach(r => {
        const k = activeInstanceId + '|' + r.chat_jid;
        if (!_chatEtiquetasCache.has(k)) _chatEtiquetasCache.set(k, []);
        _chatEtiquetasCache.get(k).push(r.etiqueta_id);
      });
      _notifyEtiquetas();
    };
    carregar();
    const fn = () => force(x => x+1);
    _chatEtiquetasSubs.add(fn);
    const ch = cli.channel(`rt:chat_etiquetas:all:${activeInstanceId}`)
      .on('postgres_changes', { event:'*', schema:'public', table:'chat_etiquetas', filter:`instancia_id=eq.${activeInstanceId}` }, carregar)
      .subscribe();
    return () => { alive = false; _chatEtiquetasSubs.delete(fn); cli.removeChannel(ch); };
  }, [activeInstanceId]);
  return _chatEtiquetasCache;
}

function useSupaChatIa(chatJid) {
  const [ativa, setAtiva] = React.useState(false);  // ✨ default FALSE (seguro)
  const [globalAtiva, setGlobalAtiva] = React.useState(false);
  const [loading, setLoading] = React.useState(false);
  const activeInstanceId = useActiveInstanceId();

  React.useEffect(() => {
    if (!chatJid || !activeInstanceId) return;
    const cli = getSupa();
    if (!cli) return;
    let alive = true;

    const carregar = async () => {
      setLoading(true);
      try {
        // 1. Verifica IA global da instancia
        const { data: inst } = await cli.from('wa_instancias')
          .select('ai_enabled_global').eq('id', activeInstanceId).maybeSingle();
        const globalOn = inst?.ai_enabled_global === true;
        if (!alive) return;
        setGlobalAtiva(globalOn);

        if (!globalOn) {
          // IA da instancia esta off → forca PAUSADA pra todos os chats dela
          setAtiva(false);
        } else {
          // IA da instancia esta on → respeita flag do chat (default true)
          const { data: chat } = await cli.from('wa_chats')
            .select('ai_enabled').eq('instancia_id', activeInstanceId).eq('jid', chatJid).maybeSingle();
          if (alive) setAtiva(chat?.ai_enabled !== false);
        }
      } catch {}
      finally { if (alive) setLoading(false); }
    };
    carregar();

    // Realtime: reage a mudancas DESTA instancia + DESTE chat
    const ch = cli.channel(`rt:chatia:${activeInstanceId}:${chatJid}`)
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'wa_chats', filter: `jid=eq.${chatJid}` }, (p) => {
        if (alive && p.new && typeof p.new.ai_enabled === 'boolean' && p.new.instancia_id === activeInstanceId && globalAtiva) {
          setAtiva(p.new.ai_enabled);
        }
      })
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'wa_instancias', filter: `id=eq.${activeInstanceId}` }, (p) => {
        if (alive && p.new && typeof p.new.ai_enabled_global === 'boolean') {
          setGlobalAtiva(p.new.ai_enabled_global);
          if (!p.new.ai_enabled_global) setAtiva(false);
        }
      })
      .subscribe();

    return () => { alive = false; cli.removeChannel(ch); };
  }, [chatJid, activeInstanceId]);

  const setIaAtiva = React.useCallback(async (valor) => {
    if (!chatJid) return;
    // Se quer ATIVAR mas a instancia tem IA global OFF, alerta e nao deixa
    if (valor && !globalAtiva) {
      showToast?.('Esta instância está com IA desativada globalmente. Ative em Configurações > IA primeiro.', 'warning');
      return;
    }
    setAtiva(valor); // otimista
    const cli = getSupa();
    try {
      await cli.from('wa_chats').update({ ai_enabled: valor }).eq('instancia_id', activeInstanceId).eq('jid', chatJid);
    } catch (e) {
      console.warn('Erro ao atualizar ai_enabled:', e);
      setAtiva(!valor); // rollback
    }
  }, [chatJid, activeInstanceId, globalAtiva]);

  return { ativa, setIaAtiva, loading, globalAtiva };
}

function useSupaMessages(chatJid) {
  const [messages, setMessages] = React.useState([]);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState(null);
  const activeInstanceId = useActiveInstanceId();

  React.useEffect(() => {
    const cli = getSupa();
    if (!cli || !chatJid) { setMessages([]); return; }
    let alive = true;
    setMessages([]); setLoading(true); // limpa ao trocar de instancia/chat
    const carregar = async () => {
      try {
        const { data, error } = await cli
          .from('wa_mensagens').select('*')
          .eq('instancia_id', activeInstanceId)
          .eq('chat_jid', chatJid)
          .order('timestamp', { ascending: true })
          .limit(300);
        if (!alive) return;
        if (error) throw error;
        setMessages(data || []);
        setError(null);
      } catch (e) { if (alive) setError(e.message || String(e)); }
      finally { if (alive) setLoading(false); }
    };
    carregar();

    const channel = cli
      .channel(`rt:msgs:${activeInstanceId}:${chatJid}`)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'wa_mensagens', filter: `chat_jid=eq.${chatJid}` }, carregar)
      .subscribe();

    // Evento manual de refresh (botao Atualizar no header)
    window.addEventListener('brava_wa_refresh', carregar);

    return () => {
      alive = false;
      cli.removeChannel(channel);
      window.removeEventListener('brava_wa_refresh', carregar);
    };
  }, [chatJid, activeInstanceId]);

  return { messages, loading, error };
}

/* Hook: contadores globais em tempo real (todas as msgs do dia + total de chats).
   Usado pelo Dashboard. Re-fetch automatico ao chegar msg nova via Realtime. */
function useSupaGlobalStats() {
  const [stats, setStats] = React.useState({ msgsHoje: 0, msgsTotal: 0, chatsTotal: 0, loading: true });
  const activeInstanceId = useActiveInstanceId();

  React.useEffect(() => {
    const cli = getSupa();
    if (!cli) {
      const t = setInterval(() => { if (getSupa()) { clearInterval(t); } }, 200);
      return () => clearInterval(t);
    }
    setStats(s => ({ ...s, loading: true })); // reset ao trocar
    let alive = true;

    const carregar = async () => {
      try {
        const hoje = new Date(); hoje.setHours(0,0,0,0);
        const [{ count: msgsHoje }, { count: msgsTotal }, { count: chatsTotal }] = await Promise.all([
          cli.from('wa_mensagens').select('*', { count: 'exact', head: true })
            .eq('instancia_id', activeInstanceId)
            .gte('timestamp', hoje.toISOString()),
          cli.from('wa_mensagens').select('*', { count: 'exact', head: true })
            .eq('instancia_id', activeInstanceId),
          cli.from('wa_chats').select('*', { count: 'exact', head: true })
            .eq('instancia_id', activeInstanceId),
        ]);
        if (!alive) return;
        setStats({ msgsHoje: msgsHoje || 0, msgsTotal: msgsTotal || 0, chatsTotal: chatsTotal || 0, loading: false });
      } catch (e) {
        if (alive) setStats(s => ({ ...s, loading: false }));
      }
    };
    carregar();

    // Realtime: refetch ao chegar msg/chat nova (debounced)
    let t = null;
    const refetch = () => { clearTimeout(t); t = setTimeout(carregar, 400); };
    const channel = cli.channel(`rt:global-stats:${activeInstanceId}`)
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'wa_mensagens', filter: `instancia_id=eq.${activeInstanceId}` }, refetch)
      .on('postgres_changes', { event: '*',      schema: 'public', table: 'wa_chats',     filter: `instancia_id=eq.${activeInstanceId}` }, refetch)
      .subscribe();

    return () => { alive = false; clearTimeout(t); cli.removeChannel(channel); };
  }, [activeInstanceId]);

  return stats;
}

// Normaliza chat do Supabase para o shape esperado pelo UI atual (mesmo de evoNormalizeChat)
function supaNormalizeChat(c) {
  // Importante reutilizar evoFormatPhone/evoLabelContato/evoTemNomeReal/evoColorFromString
  // · eles vivem mais abaixo no arquivo mas estarao definidos em runtime.
  const remoteJid = c.jid;
  const isGroup = !!c.is_group;
  const rawName = c.last_message_sender_name || '';
  // OVERRIDE: se o admin salvou contato manualmente (nome, empresa, tag),
  // usa esse nome em vez do telefone/pushName. Acessa direto do localStorage
  // (sem hook aqui, mas re-render acontece via dependency em contatosSalvos no useMemo).
  const salvo = (typeof getContatoSalvo === 'function') ? getContatoSalvo(remoteJid) : null;
  // ✨ Tenta usar nome real do contato (pushName/profileName/verifiedName) antes do telefone
  let nomeContato = null;
  if (!isGroup && typeof _evoContacts !== 'undefined') {
    const ct = _evoContacts.byJid.get(remoteJid);
    nomeContato = ct?.pushName || ct?.profileName || ct?.verifiedName || null;
    // Filtra nomes "falsos" tipo "@5511..." ou só números
    if (nomeContato && (nomeContato.startsWith('@') || /^[\d\s+\-()]+$/.test(nomeContato))) {
      nomeContato = null;
    }
  }
  const nomeBase = isGroup
    ? (rawName || 'Grupo')
    : (nomeContato || evoFormatPhone(remoteJid) || 'Contato');
  const name = salvo?.nome || nomeBase;
  return {
    id: remoteJid,
    name,
    init: evoInitials(name),
    color: evoColorFromString(remoteJid),
    preview: c.last_message_from_me
      ? `Você: ${c.last_message_text || ''}`
      : (c.last_message_text || '...'),
    time: evoTimeFormat(c.last_message_ts),
    timestamp: c.last_message_ts ? new Date(c.last_message_ts).getTime() : 0,
    unread: c.unread_count || 0,
    status: 'online',
    tag: salvo?.tag || null,
    empresa: salvo?.empresa || null,
    nota: salvo?.nota || null,
    agenteId: c.agente_id || null,
    statusChat: c.status || 'pendente',
    via: isGroup ? 'Grupo' : 'WhatsApp',
    canal: 'WhatsApp',
    isGroup,
    ehLid: remoteJid.includes('@lid'),
    raw: c,
  };
}

function supaNormalizeMessage(m) {
  return {
    id: m.message_id,
    from: m.from_me ? 'out' : 'in',
    text: m.text || '',
    time: evoHHMM(m.timestamp),
    timestamp: m.timestamp ? new Date(m.timestamp).getTime() : 0,
    ia: !!m.ia_generated,
    statusNum: m.status ?? 2,
    kind: m.kind || 'text',
    meta: {
      kind: m.kind,
      caption: m.text || '',
      mimetype: m.media_mimetype,
      fileName: m.media_filename,
      fileLength: m.media_size,
      seconds: m.media_seconds,
      ptt: m.kind === 'audio',
    },
    raw: m.raw || m,
  };
}

const EVO_KEY_CFG = 'brava_evolution_config';
const fireEvoChanged = () => window.dispatchEvent(new Event('brava_evo_changed'));

function getEvoConfig() {
  try { return JSON.parse(localStorage.getItem(EVO_KEY_CFG) || 'null'); } catch { return null; }
}
function setEvoConfigStore(cfg) {
  if (cfg) localStorage.setItem(EVO_KEY_CFG, JSON.stringify(cfg));
  else     localStorage.removeItem(EVO_KEY_CFG);
  fireEvoChanged();
}
function useEvoConfig() {
  const [cfg, setCfg] = React.useState(() => getEvoConfig());
  React.useEffect(() => {
    const refresh = () => setCfg(getEvoConfig());
    window.addEventListener('brava_evo_changed', refresh);
    window.addEventListener('storage', refresh);
    return () => {
      window.removeEventListener('brava_evo_changed', refresh);
      window.removeEventListener('storage', refresh);
    };
  }, []);
  return cfg;

// Garante URL com schema (https) e sem barra final
function evoNormalizeUrl(u) {
  if (!u) return '';
  let s = u.trim();
  if (!/^https?:\/\//i.test(s)) s = 'https://' + s;
  return s.replace(/\/+$/, '');
}

async function evoFetch(path, opts = {}, overrideCfg = null) {
  const cfg = overrideCfg || getEvoConfig();
  if (!cfg) throw new Error('Evolution nao configurada');
  const url = evoNormalizeUrl(cfg.url) + path;
  const res = await fetch(url, {
    method: opts.method || 'GET',
    headers: {
      'Content-Type': 'application/json',
      'apikey': cfg.apikey,
      ...(opts.headers || {}),
    },
    body: opts.body,
  });
  const text = await res.text();
  let data; try { data = text ? JSON.parse(text) : null; } catch { data = text; }
  if (!res.ok) {
    const msg = (data && (data.message || data.error)) || text || `HTTP ${res.status}`;
    const e = new Error(typeof msg === 'string' ? msg : JSON.stringify(msg));
    e.status = res.status; e.data = data;
    throw e;
  }
  return data;
}

/* Cache de fotos de perfil + hook reativo */
const _evoPicCache = new Map(); // remoteJid -> {url|null, ts}
const _evoPicSubs = new Set();
function evoNotifyPic() { _evoPicSubs.forEach(fn => { try { fn(); } catch {} }); }

// Tempo minimo antes de tentar de novo apos falha (5 minutos)
const _PIC_RETRY_AFTER = 5 * 60 * 1000;
// Tempo minimo antes de tentar de novo se ainda esta pendente (10s — significa que travou)
const _PIC_PENDING_TIMEOUT = 10 * 1000;

async function evoEnsurePic(remoteJid) {
  if (!remoteJid) return null;
  const cached = _evoPicCache.get(remoteJid);
  const agora = Date.now();
  // Se ja tem url valida cacheada, retorna
  if (cached?.url) return cached.url;
  // Se cached.failed=true mas faz mais de 5min, re-tenta (recupera de erro transitorio)
  if (cached?.failed && (agora - (cached.ts || 0)) < _PIC_RETRY_AFTER) return null;
  // Se cached.pending mas ja faz mais de 10s, considera dead e re-tenta
  if (cached?.pending && (agora - (cached.ts || 0)) < _PIC_PENDING_TIMEOUT) return null;
  // marca como "fetching" pra nao disparar duplicado
  _evoPicCache.set(remoteJid, { url:null, ts:agora, pending:true });
  // Snapshot do cfg pra detectar se trocou de instancia durante o fetch
  const cfgAtCall = getEvoConfig();
  if (!cfgAtCall) {
    _evoPicCache.delete(remoteJid); // sem cfg, nao cacheia — tenta de novo no proximo render
    return null;
  }
  try {
    const number = remoteJid.replace('@s.whatsapp.net','').replace('@c.us','').replace('@g.us','');
    const data = await evo.fetchProfilePicture(number);
    // Se trocou de instancia durante o fetch, descarta (vai ser limpo pelo listener mesmo)
    const cfgAfter = getEvoConfig();
    if (!cfgAfter || cfgAfter.instance !== cfgAtCall.instance) {
      _evoPicCache.delete(remoteJid);
      return null;
    }
    const url = data?.profilePictureUrl || null;
    _evoPicCache.set(remoteJid, { url, ts:Date.now() });
    evoNotifyPic();
    return url;
  } catch (e) {
    // Erros 404 (contato sem foto OU nao registrado na sessao Baileys) — cacheia null
    // mas com timestamp pra re-tentar depois (sync da Baileys pode trazer depois)
    _evoPicCache.set(remoteJid, { url:null, ts:Date.now(), failed:true, error: e.message });
    evoNotifyPic();
    return null;
  }
}
function useEvoProfilePic(remoteJid) {
  const [, force] = React.useState(0);

  return _evoPicCache.get(remoteJid)?.url || null;
}

/* ── Tabela de CONTATOS (canonical) ──
   Resolve o @lid (anonymized id) para o telefone real (@s.whatsapp.net) +
   da acesso a pushName/profileName/verifiedName que muitas vezes faltam no chat.
   Esquemas comuns de contato no Evolution v2:
     { id: '55XXXXXXXXX@s.whatsapp.net', pushName, profileName, verifiedName, profilePicUrl, lid? }
     { id: 'XXXXXX@lid', pushName, ... }
*/
const _evoContacts = {
  byJid: new Map(),       // qualquer JID -> contact
  lidToPhone: new Map(),  // @lid -> @s.whatsapp.net
  loaded: false,
  loading: false,
  subs: new Set(),
  // Qual instance carregou esse cache (pra invalidar ao trocar)
  loadedFor: null,
};
function _evoNotifyContacts() { _evoContacts.subs.forEach(fn => { try { fn(); } catch {} }); }

/* ─── Invalidacao de caches in-memory ao trocar de instancia ───────────
   Cada instancia WhatsApp tem:
   - Sua propria sessao Baileys na Evolution (instance name unico)
   - Seus proprios @lid (anonymized ids gerados por sessao)
   - Seus proprios contatos (Baileys cache local da sessao)
   - Suas fotos de perfil cacheadas (privacy varia por instancia)
   Por isso quando o usuario troca de WhatsApp no switcher, TODOS os caches
   in-memory precisam ser limpos. Caso contrario teriamos vazamento:
   contato @lid da Brava aparecendo resolvido como telefone na Jhonattan,
   foto cacheada de @lid X resolvendo como contato Y, etc. */
window.addEventListener('brava_active_instance_changed', () => {
  // Reset cache de contatos (incluindo lid<->phone)
  _evoContacts.byJid.clear();
  _evoContacts.lidToPhone.clear();
  _evoContacts.loaded = false;
  _evoContacts.loadedFor = null;
  _evoNotifyContacts();
  // Reset cache de fotos de perfil (pode mudar entre instancias por @lid)
  if (typeof _evoPicCache !== 'undefined') {
    _evoPicCache.clear();
    if (typeof evoNotifyPic === 'function') evoNotifyPic();
  }
  console.log('[Brava] Caches in-memory invalidados (troca de instancia)');
});

function _evoIndexContact(c) {
  if (!c) return;
  const ids = [];
  if (c.id) ids.push(c.id);
  if (c.remoteJid) ids.push(c.remoteJid);
  if (c.jid) ids.push(c.jid);
  if (c.lid) ids.push(c.lid);
  ids.forEach(id => _evoContacts.byJid.set(id, c));
  // Mapeamento bidirecional lid <-> phone, se presente
  if (c.lid && (c.id || c.remoteJid)) {
    const phoneJid = (c.id || c.remoteJid).endsWith('@s.whatsapp.net') ? (c.id || c.remoteJid) : null;
    if (phoneJid) _evoContacts.lidToPhone.set(c.lid, phoneJid);
  }
  // Algumas versoes trazem "senderPn" ou "phoneNumber"
  const phoneFromExtra = c.phoneNumber || c.senderPn;
  if (phoneFromExtra && (c.id || c.remoteJid || c.jid)?.includes('@lid')) {
    const phoneJid = phoneFromExtra.includes('@') ? phoneFromExtra : `${phoneFromExtra.replace(/\D/g,'')}@s.whatsapp.net`;
    _evoContacts.lidToPhone.set(c.id || c.remoteJid || c.jid, phoneJid);
  }
}

async function evoLoadContacts(force = false) {
  const cfg = getEvoConfig();
  if (!cfg) return;
  // Detecta drift: se o cache foi carregado pra outra instance, invalida
  if (_evoContacts.loadedFor && _evoContacts.loadedFor !== cfg.instance) {
    _evoContacts.byJid.clear();
    _evoContacts.lidToPhone.clear();
    _evoContacts.loaded = false;
    _evoContacts.loadedFor = null;
  }
  if ((_evoContacts.loading || _evoContacts.loaded) && !force) return;
  _evoContacts.loading = true;
  const instanceAtCall = cfg.instance; // snapshot
  try {
    const data = await evo.findContacts();
    // Verifica se a instancia ainda eh a mesma (usuario pode ter trocado no meio)
    const cfgAfter = getEvoConfig();
    if (!cfgAfter || cfgAfter.instance !== instanceAtCall) {
      console.warn('[Brava] Instancia trocada durante load de contatos, descartando');
      return;
    }
    const list = Array.isArray(data) ? data : (data?.contacts || []);
    list.forEach(_evoIndexContact);
    _evoContacts.loaded = true;
    _evoContacts.loadedFor = instanceAtCall;
    _evoNotifyContacts();
  } catch (e) {
    console.warn('[Brava] Erro carregando contatos:', e.message);
  } finally {
    _evoContacts.loading = false;
  }
}

  if (!jid) return jid;

/* ── Presenca (online/digitando/gravando) ── */
// state: 'available'|'unavailable'|'composing'|'recording'|'paused' | null
const _evoPresenceCache = new Map(); // remoteJid -> { state, ts, lastSeen? }
const _evoPresenceSubs = new Set();
function _evoNotifyPresence() { _evoPresenceSubs.forEach(fn => { try { fn(); } catch {} }); }

// chamada quando socket emite presence.update
function evoApplyPresenceUpdate(payload) {
  if (!payload) return;
  const data = payload.data || payload;
  const jid = data.id || data.jid || data.remoteJid;
  const presences = data.presences || {};
  if (jid && Object.keys(presences).length === 0) return;
  // O payload pode trazer presences indexadas por participantJid (em grupos)
  // OU diretamente {lastKnownPresence} sob a propria entry. Aceitamos as duas formas.
  let state = null;
  for (const k of Object.keys(presences)) {
    const p = presences[k];
    if (p?.lastKnownPresence) { state = p.lastKnownPresence; break; }
  }
  if (!state && data.lastKnownPresence) state = data.lastKnownPresence;
  if (!jid || !state) return;
  _evoPresenceCache.set(jid, { state, ts: Date.now() });
  _evoNotifyPresence();
}

    }).catch(()=>{});
  } catch {}
}

  }, [remoteJid]);
  return _evoPresenceCache.get(remoteJid) || null;
}

/* ── Download de midia (cache base64 por message id) ── */
const _evoMediaCache = new Map(); // msgId -> { base64, mimetype, fileName, loading, error }
const _evoMediaSubs = new Set();
function _evoNotifyMedia(msgId) { _evoMediaSubs.forEach(fn => { try { fn(msgId); } catch {} }); }

async function evoEnsureMedia(message) {
  const id = message?.id || message?.key?.id;
  if (!id) return null;
  const cached = _evoMediaCache.get(id);
  if (cached && (cached.base64 || cached.error)) return cached;
  if (cached?.loading) return cached;
  _evoMediaCache.set(id, { loading:true });
  _evoNotifyMedia(id);
  try {
    const raw = message.raw || message;
    // ✨ Constrói o key + message correto pro Evolution descriptografar.
    // wa_mensagens.raw guarda o payload original do webhook (com key + message).
    const evoKey = raw?.key || (raw?.message_id ? {
      id: raw.message_id,
      remoteJid: raw.chat_jid,
      fromMe: !!raw.from_me,
      participant: raw.sender_jid || undefined,
    } : null);
    const evoMessage = raw?.message || raw?.raw?.message || null;
    if (!evoKey) throw new Error('Sem key da mensagem');

    let data;
    // ✨ MODO SUPABASE: usa wa-proxy (apikey fica no server)
    if (typeof supa !== 'undefined' && typeof supaProxyCall === 'function') {
      try {
        data = await supaProxyCall({
          path: `/chat/getBase64FromMediaMessage/{{instance}}`,
          method: 'POST',
          body: {
            message: evoMessage ? { key: evoKey, message: evoMessage } : { key: evoKey },
            convertToMp4: false,
          },
        });
      } catch (proxyErr) {
        console.warn('[media] supaProxy falhou, tentando evo direto:', proxyErr.message);
        // fallback pra evo direto (legado)
        data = await evo.getBase64FromMedia(raw);
      }
    } else {
      data = await evo.getBase64FromMedia(raw);
    }
    const base64 = data?.base64 || data?.media || data?.data;
    const mimetype = data?.mimetype || message.meta?.mimetype || raw?.media_mimetype || 'application/octet-stream';
    const fileName = data?.fileName || message.meta?.fileName || raw?.media_filename || `arquivo`;
    if (!base64) throw new Error('Sem base64 no retorno');
    _evoMediaCache.set(id, { base64, mimetype, fileName });
    _evoNotifyMedia(id);
    return _evoMediaCache.get(id);
  } catch (e) {
    _evoMediaCache.set(id, { error: e.message || 'Erro ao baixar' });
    _evoNotifyMedia(id);
    return _evoMediaCache.get(id);
  }
}

function useEvoMedia(message, autoLoad = true) {
  const id = message?.id || message?.key?.id;
  const [, force] = React.useState(0);
  React.useEffect(() => {
    if (!id) return;
    const fn = (mid) => { if (mid === id) force(x => x+1); };
    _evoMediaSubs.add(fn);
    if (autoLoad && !_evoMediaCache.has(id)) evoEnsureMedia(message);
    return () => { _evoMediaSubs.delete(fn); };
  }, [id, autoLoad]);
  return _evoMediaCache.get(id) || null;
}

// Trigger download no browser (gera <a download> a partir do base64)
async function evoDownloadMessage(message) {
  const r = await evoEnsureMedia(message);
  if (!r?.base64) { showToast?.('Falha ao baixar arquivo: ' + (r?.error||''), 'error'); return; }
  const blob = await (await fetch(`data:${r.mimetype};base64,${r.base64}`)).blob();
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = r.fileName || 'arquivo';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

/* ── Metadados de grupo (cache) ── */
const _evoGroupCache = new Map(); // groupJid -> { subject, owner, participants, desc }
const _evoGroupSubs = new Set();
function _evoNotifyGroup() { _evoGroupSubs.forEach(fn => { try { fn(); } catch {} }); }

async function evoEnsureGroupMeta(groupJid) {
  if (!groupJid?.endsWith('@g.us')) return null;
  const cached = _evoGroupCache.get(groupJid);
  if (cached) return cached;
  _evoGroupCache.set(groupJid, { loading:true });
  try {
    // Tenta endpoint v2
    const data = await evoFetch(`/group/findGroupInfos/${encodeURIComponent(getEvoConfig().instance)}?groupJid=${encodeURIComponent(groupJid)}`).catch(async () => {
      return evoFetch(`/group/fetchAllGroups/${encodeURIComponent(getEvoConfig().instance)}`).then(arr => (Array.isArray(arr) ? arr.find(g => g.id === groupJid) : null));
    });
    if (data) {
      _evoGroupCache.set(groupJid, {
        subject: data.subject,
        owner: data.owner,
        participants: data.participants || [],
        desc: data.desc,
      });
      _evoNotifyGroup();
    }
    return _evoGroupCache.get(groupJid);
  } catch (e) {
    _evoGroupCache.set(groupJid, { error: e.message });
    return _evoGroupCache.get(groupJid);
  }
}

function useEvoGroupMeta(groupJid) {
  const [, force] = React.useState(0);
  React.useEffect(() => {
    if (!groupJid?.endsWith('@g.us')) return;
    const fn = () => force(x => x+1);
    _evoGroupSubs.add(fn);
    if (!_evoGroupCache.has(groupJid)) evoEnsureGroupMeta(groupJid);
    return () => { _evoGroupSubs.delete(fn); };
  }, [groupJid]);
  return _evoGroupCache.get(groupJid) || null;
}

/* Exporta a conversa atual em CSV (downloaded como arquivo) */
function exportarConversaCsv(contato, msgs) {
  if (!contato || !msgs?.length) { showToast?.('Sem mensagens para exportar', 'warn'); return; }
  const linhas = [['data_hora', 'direcao', 'autor', 'tipo', 'texto']];
  msgs.forEach(m => {
    const dt = m.timestamp ? new Date(m.timestamp).toLocaleString('pt-BR') : '';
    const dir = m.from === 'out' ? 'enviada' : 'recebida';
    const autor = m.from === 'out' ? (m.ia ? 'IA Brava' : 'Voce') : (contato.name || 'Contato');
    const txt = (m.text || '').replace(/"/g, '""').replace(/\n/g, ' ');
    linhas.push([dt, dir, autor, m.kind || 'text', '"' + txt + '"']);
  });
  const csv = linhas.map(r => r.join(',')).join('\n');
  const blob = new Blob(['﻿' + csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'conversa_' + (contato.name || 'contato').replace(/[^a-zA-Z0-9]/g, '_') + '_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast?.('Conversa exportada', 'success');
}

/* Formatar numero SEMPRE no padrao BR: +55 DDD NNNNN-NNNN */
function evoFormatPhone(jid) {
  if (!jid) return '';
  if (jid.includes('@broadcast') || jid.endsWith('@g.us')) return '';
  const n = (jid || '').replace(/@.+$/, '').replace(/\D/g, '');
  if (!n) return '';
  // 11+ digitos: usa os ultimos 11 como celular (BR padrao novo)
  if (n.length >= 11) {
    const u = n.slice(-11);
    return `+55 ${u.slice(0,2)} ${u.slice(2,7)}-${u.slice(7)}`;
  }
  // 10 digitos: telefone fixo
  if (n.length === 10) {
    return `+55 ${n.slice(0,2)} ${n.slice(2,6)}-${n.slice(6)}`;
  }
  // Muito curto: nao da pra formatar
  return '';
}

// Label do contato · agora sempre cai no formato +55 DDD NNNNN-NNNN
function evoLabelContato(jid) {
  return evoFormatPhone(jid) || 'Contato';
}

   Permite "Salvar contato" direto da conversa, dando nome a um chat
   sem cadastro (@lid ou telefone sem nome no WhatsApp). */

const fireContatosSalvos = () => window.dispatchEvent(new Event('brava_contatos_salvos_changed'));

function getContatoSalvo(jid) {

function salvarContato(jid, dados) {

function useContatoSalvo(jid) {

function useTodosContatosSalvos() {
