/* Hook: lista de instancias WhatsApp visiveis pro user logado.
   Regra de visibilidade:
     - owner_email IS NULL       -> publica do workspace (todos veem)
     - owner_email = user logado  -> privada, so o dono ve
   Filtragem feita no Postgres (server-side) via `.or()`. Quando migrarmos
   pra Supabase Auth real, a RLS policy `wa_instancias_select_policy` ja
   filtra pelo `auth.uid()` automaticamente. */
function useWaInstances() {
  const [instances, setInstances] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const userEmail = (SESSAO?.email || '').toLowerCase().trim();
  // Memoriza quais instancias ja foram auto-sincronizadas nesta sessao
  // (evita re-sync infinito quando Realtime trouxer o UPDATE)
  const syncedRef = React.useRef(new Set());

  React.useEffect(() => {
    const cli = getSupa();
    if (!cli) {
      const t = setInterval(() => { if (getSupa()) { clearInterval(t); } }, 200);
      return () => clearInterval(t);
    }
    let alive = true;
    const carregar = async () => {
      try {
        // Filtro server-side: owner_email IS NULL OR owner_email = userEmail
        let q = cli.from('wa_instancias')
          .select('id, nome, evolution_url, evolution_instance_name, evolution_apikey, status, profile_name, profile_pic_url, owner_jid, ai_enabled_global, workspace_id, owner_email, owner_user_id')
          .order('created_at', { ascending: true });
        if (userEmail) {
          q = q.or(`owner_email.is.null,owner_email.eq.${userEmail}`);
        } else {
          // sem user logado, so as publicas
          q = q.is('owner_email', null);
        }
        const { data } = await q;
        if (alive) {
          setInstances(data || []);
          setLoading(false);
          // Auto-sync background: pra cada instancia 'open' que estiver
          // SEM profile/foto cadastrados, dispara fetchInfo em paralelo.
          // Garante que toda instancia visivel mostre dados completos
          // (foto + nome + telefone), mesmo se foi criada antes de termos
          // o fluxo de sync automatico. Idempotente.
          (data || []).forEach((inst) => {
            const precisaSync = inst.status === 'open' && (
              !inst.profile_pic_url || !inst.owner_jid
            );
            const ja = syncedRef.current.has(inst.id);
            if (precisaSync && !ja) {
              syncedRef.current.add(inst.id);
              if (typeof evoAdmin !== 'undefined' && evoAdmin.fetchInfo) {
                evoAdmin.fetchInfo(inst.evolution_instance_name).catch(() => {});
              }
            }
          });
        }
      } catch { if (alive) setLoading(false); }
    };
    carregar();

    // Realtime: refetch ao mudar qualquer instancia
    const ch = cli.channel('rt:wa_instancias')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'wa_instancias' }, carregar)
      .subscribe();

    return () => { alive = false; cli.removeChannel(ch); };
  }, [userEmail]);

  return { instances, loading };
}

/* Som de transferencia estilo Chatwoot (Web Audio API, sintetico, sem arquivo).
   Toca 2 notas curtas suaves: pim-pom. */
let _bravaAudioCtx = null;
function _getAudioCtx() {
  if (_bravaAudioCtx) return _bravaAudioCtx;
  try { _bravaAudioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
  catch { _bravaAudioCtx = null; }
  return _bravaAudioCtx;
}
function playTransferSound() {
  // Respeita preferencia do user (default: ligado)
  try { if (localStorage.getItem('brava_som_transferencia') === 'off') return; } catch {}
  const ctx = _getAudioCtx();
  if (!ctx) return;
  if (ctx.state === 'suspended') { try { ctx.resume(); } catch {} }
  const now = ctx.currentTime;
  // Nota 1 (Mi5 = 659Hz)
  const o1 = ctx.createOscillator(), g1 = ctx.createGain();
  o1.type = 'sine'; o1.frequency.value = 659;
  g1.gain.setValueAtTime(0.0001, now);
  g1.gain.exponentialRampToValueAtTime(0.18, now + 0.02);
  g1.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);
  o1.connect(g1).connect(ctx.destination);
  o1.start(now); o1.stop(now + 0.2);
  // Nota 2 (Sol5 = 784Hz, levemente atrasada)
  const o2 = ctx.createOscillator(), g2 = ctx.createGain();
  o2.type = 'sine'; o2.frequency.value = 784;
  g2.gain.setValueAtTime(0.0001, now + 0.15);
  g2.gain.exponentialRampToValueAtTime(0.18, now + 0.17);
  g2.gain.exponentialRampToValueAtTime(0.0001, now + 0.36);
  o2.connect(g2).connect(ctx.destination);
  o2.start(now + 0.15); o2.stop(now + 0.4);
}

/* Hook: notifica + toca som quando agentee_id de QUALQUER chat passa a ser do user atual.
   Roda no nivel global da Conversas/App. Subscribe Realtime amplo em wa_chats UPDATE. */
function useTransferenciaWatcher(meuUserId) {
  // Re-cria channel ao trocar de instancia (o filter precisa do id ativo)
  const activeInstanceId = useActiveInstanceId();
  React.useEffect(() => {
    if (!meuUserId || !activeInstanceId) return;
    const cli = getSupa();
    if (!cli) return;
    console.log('[Brava] Transfer watcher armado pra:', meuUserId, 'instancia:', activeInstanceId);
    // Cache pra dedup: chat -> ultimoAgenteId conhecido
    const cache = new Map();
    const ch = cli.channel(`rt:transfer-watch:${activeInstanceId}:${meuUserId}`)
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'wa_chats', filter: `instancia_id=eq.${activeInstanceId}` }, (p) => {
        const jid = p.new?.jid; if (!jid) return;
        const novoAgente = p.new?.agente_id || null;
        const antigoAgente = cache.has(jid) ? cache.get(jid) : (p.old?.agente_id || null);
        cache.set(jid, novoAgente);
        // Disparou quando: antes era outro/null E agora e o user atual
        if (novoAgente === meuUserId && antigoAgente !== meuUserId) {
          console.log('[Brava] Chat transferido pra mim! Tocando som.');
          playTransferSound();
          // Notifica visualmente tambem
          if (typeof adicionarNotificacao === 'function') {
            adicionarNotificacao({
              tipo: 'transferencia',
              titulo: 'Chat transferido para você',
              sub: 'Um chat foi atribuído à sua fila',
              icon: 'UserCircle',
              cor: '#00A884',
              link: 'clientes',
            });
          }
        }
      })
      .subscribe();
    return () => cli.removeChannel(ch);
  }, [meuUserId, activeInstanceId]);
}

/* Hook: agente atribuido + status do chat (wa_chats.agente_id, status).
   Le do banco + Realtime + retorna funcoes pra atribuir/desatribuir. */
function useSupaChatAgente(chatJid) {
  const [info, setInfo] = React.useState({ agenteId: null, status: 'pendente' });
  const activeInstanceId = useActiveInstanceId(); // reativo a troca de instancia

  React.useEffect(() => {
    if (!chatJid) return;
    const cli = getSupa();
    if (!cli) return;
    let alive = true;
    setInfo({ agenteId: null, status: 'pendente' }); // reset ao trocar
    const carregar = async () => {
      try {
        const { data } = await cli.from('wa_chats')
          .select('agente_id, status').eq('instancia_id', activeInstanceId).eq('jid', chatJid).maybeSingle();
        if (alive) setInfo({ agenteId: data?.agente_id || null, status: data?.status || 'pendente' });
      } catch {}
    };
    carregar();
    const ch = cli.channel(`rt:chatagente:${activeInstanceId}:${chatJid}`)
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'wa_chats', filter: `jid=eq.${chatJid}` }, (p) => {
        // Garante que e da instancia ativa (msg-update pode chegar de outras)
        if (alive && p.new && p.new.instancia_id === activeInstanceId) {
          setInfo({ agenteId: p.new.agente_id || null, status: p.new.status || 'pendente' });
        }
      })
      .subscribe();
    return () => { alive = false; cli.removeChannel(ch); };
  }, [chatJid, activeInstanceId]);

  const atribuir = React.useCallback(async (usuarioId) => {
    if (!chatJid) return;
    setInfo(s => ({ ...s, agenteId: usuarioId, status: usuarioId ? 'aberto' : 'pendente' }));
    const cli = getSupa();
    try {
      await cli.from('wa_chats').update({
        agente_id: usuarioId,
        agente_atribuido_em: usuarioId ? new Date().toISOString() : null,
        status: usuarioId ? 'aberto' : 'pendente',
      }).eq('instancia_id', activeInstanceId).eq('jid', chatJid);
    } catch (e) { console.warn('Erro atribuir agente:', e); }
  }, [chatJid, activeInstanceId]);

  const setStatus = React.useCallback(async (novoStatus) => {
    if (!chatJid) return;
    setInfo(s => ({ ...s, status: novoStatus }));
    const cli = getSupa();
    try {
      await cli.from('wa_chats').update({ status: novoStatus })
        .eq('instancia_id', activeInstanceId).eq('jid', chatJid);
    } catch (e) { console.warn('Erro setStatus:', e); }
  }, [chatJid, activeInstanceId]);

  return { agenteId: info.agenteId, status: info.status, atribuir, setStatus };
}

/* Hook: estado de IA ATIVA/PAUSADA por chat (wa_chats.ai_enabled).
   Le do banco + escuta Realtime + retorna funcao pra toggle. */
function useSupaChatIa(chatJid) {
  const [ativa, setAtiva] = React.useState(true);
  const [loading, setLoading] = React.useState(false);
  const activeInstanceId = useActiveInstanceId(); // reativo a troca de instancia

  React.useEffect(() => {
    if (!chatJid) return;
    const cli = getSupa();
    if (!cli) return;
    let alive = true;

    const carregar = async () => {
      setLoading(true);
      try {
        const { data } = await cli.from('wa_chats')
          .select('ai_enabled').eq('instancia_id', activeInstanceId).eq('jid', chatJid).maybeSingle();
        if (alive) setAtiva(data?.ai_enabled !== false);
      } catch {}
      finally { if (alive) setLoading(false); }
    };
    carregar();

    // Realtime: reage a mudancas DESTA instancia + DESTE chat
    const ch = cli.channel(`rt:chatia:${activeInstanceId}:${chatJid}`)
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'wa_chats', filter: `jid=eq.${chatJid}` }, (p) => {
        if (alive && p.new && typeof p.new.ai_enabled === 'boolean' && p.new.instancia_id === activeInstanceId) {
          setAtiva(p.new.ai_enabled);
        }
      })
      .subscribe();

    return () => { alive = false; cli.removeChannel(ch); };
  }, [chatJid, activeInstanceId]);

  const setIaAtiva = React.useCallback(async (valor) => {
    if (!chatJid) return;
    setAtiva(valor); // otimista
    const cli = getSupa();
    try {
      await cli.from('wa_chats').update({ ai_enabled: valor }).eq('instancia_id', activeInstanceId).eq('jid', chatJid);
    } catch (e) {
      console.warn('Erro ao atualizar ai_enabled:', e);
      setAtiva(!valor); // rollback
    }
  }, [chatJid, activeInstanceId]);

  return { ativa, setIaAtiva, loading };
}

function useSupaMessages(chatJid) {
  const [messages, setMessages] = React.useState([]);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState(null);
  const activeInstanceId = useActiveInstanceId();

  React.useEffect(() => {
    const cli = getSupa();
    if (!cli || !chatJid) { setMessages([]); return; }
    let alive = true;
    setMessages([]); setLoading(true); // limpa ao trocar de instancia/chat
    const carregar = async () => {
      try {
        const { data, error } = await cli
          .from('wa_mensagens').select('*')
          .eq('instancia_id', activeInstanceId)
          .eq('chat_jid', chatJid)
          .order('timestamp', { ascending: true })
          .limit(300);
        if (!alive) return;
        if (error) throw error;
        setMessages(data || []);
        setError(null);
      } catch (e) { if (alive) setError(e.message || String(e)); }
      finally { if (alive) setLoading(false); }
    };
    carregar();

    const channel = cli
      .channel(`rt:msgs:${activeInstanceId}:${chatJid}`)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'wa_mensagens', filter: `chat_jid=eq.${chatJid}` }, carregar)
      .subscribe();

    // Evento manual de refresh (botao Atualizar no header)
    window.addEventListener('brava_wa_refresh', carregar);

    return () => {
      alive = false;
      cli.removeChannel(channel);
      window.removeEventListener('brava_wa_refresh', carregar);
    };
  }, [chatJid, activeInstanceId]);

  return { messages, loading, error };
}

/* Hook: contadores globais em tempo real (todas as msgs do dia + total de chats).
   Usado pelo Dashboard. Re-fetch automatico ao chegar msg nova via Realtime. */
function useSupaGlobalStats() {
  const [stats, setStats] = React.useState({ msgsHoje: 0, msgsTotal: 0, chatsTotal: 0, loading: true });
  const activeInstanceId = useActiveInstanceId();

  React.useEffect(() => {
    const cli = getSupa();
    if (!cli) {
      const t = setInterval(() => { if (getSupa()) { clearInterval(t); } }, 200);
      return () => clearInterval(t);
    }
    setStats(s => ({ ...s, loading: true })); // reset ao trocar
    let alive = true;

    const carregar = async () => {
      try {
        const hoje = new Date(); hoje.setHours(0,0,0,0);
        const [{ count: msgsHoje }, { count: msgsTotal }, { count: chatsTotal }] = await Promise.all([
          cli.from('wa_mensagens').select('*', { count: 'exact', head: true })
            .eq('instancia_id', activeInstanceId)
            .gte('timestamp', hoje.toISOString()),
          cli.from('wa_mensagens').select('*', { count: 'exact', head: true })
            .eq('instancia_id', activeInstanceId),
          cli.from('wa_chats').select('*', { count: 'exact', head: true })
            .eq('instancia_id', activeInstanceId),
        ]);
        if (!alive) return;
        setStats({ msgsHoje: msgsHoje || 0, msgsTotal: msgsTotal || 0, chatsTotal: chatsTotal || 0, loading: false });
      } catch (e) {
        if (alive) setStats(s => ({ ...s, loading: false }));
      }
    };
    carregar();

    // Realtime: refetch ao chegar msg/chat nova (debounced)
    let t = null;
    const refetch = () => { clearTimeout(t); t = setTimeout(carregar, 400); };
    const channel = cli.channel(`rt:global-stats:${activeInstanceId}`)
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'wa_mensagens', filter: `instancia_id=eq.${activeInstanceId}` }, refetch)
      .on('postgres_changes', { event: '*',      schema: 'public', table: 'wa_chats',     filter: `instancia_id=eq.${activeInstanceId}` }, refetch)
      .subscribe();

    return () => { alive = false; clearTimeout(t); cli.removeChannel(channel); };
  }, [activeInstanceId]);

  return stats;
}

// Normaliza chat do Supabase para o shape esperado pelo UI atual (mesmo de evoNormalizeChat)
function supaNormalizeChat(c) {
  // Importante reutilizar evoFormatPhone/evoLabelContato/evoTemNomeReal/evoColorFromString
  // · eles vivem mais abaixo no arquivo mas estarao definidos em runtime.
  const remoteJid = c.jid;
  const isGroup = !!c.is_group;
  const rawName = c.last_message_sender_name || '';
  // OVERRIDE: se o admin salvou contato manualmente (nome, empresa, tag),
  // usa esse nome em vez do telefone/pushName. Acessa direto do localStorage
  // (sem hook aqui, mas re-render acontece via dependency em contatosSalvos no useMemo).
  const salvo = (typeof getContatoSalvo === 'function') ? getContatoSalvo(remoteJid) : null;
  const nomeBase = isGroup ? (rawName || 'Grupo') : (evoFormatPhone(remoteJid) || 'Contato');
  const name = salvo?.nome || nomeBase;
  return {
    id: remoteJid,
    name,
    init: evoInitials(name),
    color: evoColorFromString(remoteJid),
    preview: c.last_message_from_me
      ? `Você: ${c.last_message_text || ''}`
      : (c.last_message_text || '...'),
    time: evoTimeFormat(c.last_message_ts),
    timestamp: c.last_message_ts ? new Date(c.last_message_ts).getTime() : 0,
    unread: c.unread_count || 0,
    status: 'online',
    tag: salvo?.tag || null,
    empresa: salvo?.empresa || null,
    nota: salvo?.nota || null,
    agenteId: c.agente_id || null,
    statusChat: c.status || 'pendente',
    via: isGroup ? 'Grupo' : 'WhatsApp',
    canal: 'WhatsApp',
    isGroup,
    ehLid: remoteJid.includes('@lid'),
    raw: c,
  };
}

function supaNormalizeMessage(m) {
  return {
    id: m.message_id,
    from: m.from_me ? 'out' : 'in',
    text: m.text || '',
    time: evoHHMM(m.timestamp),
    timestamp: m.timestamp ? new Date(m.timestamp).getTime() : 0,
    ia: !!m.ia_generated,
    statusNum: m.status ?? 2,
    kind: m.kind || 'text',
    meta: {
      kind: m.kind,
      caption: m.text || '',
      mimetype: m.media_mimetype,
      fileName: m.media_filename,
      fileLength: m.media_size,
      seconds: m.media_seconds,
      ptt: m.kind === 'audio',
    },
    raw: m.raw || m,
  };
}

const EVO_KEY_CFG = 'brava_evolution_config';

function getEvoConfig() {
  try { return JSON.parse(localStorage.getItem(EVO_KEY_CFG) || 'null'); } catch { return null; }
}
function setEvoConfigStore(cfg) {
  if (cfg) localStorage.setItem(EVO_KEY_CFG, JSON.stringify(cfg));
  else     localStorage.removeItem(EVO_KEY_CFG);
  fireEvoChanged();
}
function useEvoConfig() {
  const [cfg, setCfg] = React.useState(() => getEvoConfig());
  React.useEffect(() => {

    window.addEventListener('brava_evo_changed', refresh);

    return () => {
      window.removeEventListener('brava_evo_changed', refresh);
      window.removeEventListener('storage', refresh);
    };
  }, []);
  return cfg;

// Garante URL com schema (https) e sem barra final
function evoNormalizeUrl(u) {
  if (!u) return '';
  let s = u.trim();
  if (!/^https?:\/\//i.test(s)) s = 'https://' + s;
  return s.replace(/\/+$/, '');
}

async function evoFetch(path, opts = {}, overrideCfg = null) {
  const cfg = overrideCfg || getEvoConfig();
  if (!cfg) throw new Error('Evolution nao configurada');
  const url = evoNormalizeUrl(cfg.url) + path;
  const res = await fetch(url, {
    method: opts.method || 'GET',
    headers: {
      'Content-Type': 'application/json',
      'apikey': cfg.apikey,
      ...(opts.headers || {}),
    },
    body: opts.body,
  });
  const text = await res.text();
  let data; try { data = text ? JSON.parse(text) : null; } catch { data = text; }
  if (!res.ok) {
    const msg = (data && (data.message || data.error)) || text || `HTTP ${res.status}`;
    const e = new Error(typeof msg === 'string' ? msg : JSON.stringify(msg));
    e.status = res.status; e.data = data;
    throw e;
  }
  return data;
}

/* ─── evoAdmin: cliente da Edge Function wa-instance-admin ──────────────

  const text = await res.text();
  let data; try { data = text ? JSON.parse(text) : null; } catch { data = text; }
  if (!res.ok) {
    const msg = (data && (data.message || data.error)) || text || `HTTP ${res.status}`;
    const e = new Error(typeof msg === 'string' ? msg : JSON.stringify(msg));
    e.status = res.status; e.data = data;
    throw e;
  }
  return data;
}
const evoAdmin = {

/* Cache de fotos de perfil + hook reativo */
const _evoPicCache = new Map(); // remoteJid -> {url|null, ts}
const _evoPicSubs = new Set();
function evoNotifyPic() { _evoPicSubs.forEach(fn => { try { fn(); } catch {} }); }

// Tempo minimo antes de tentar de novo apos falha (5 minutos)
const _PIC_RETRY_AFTER = 5 * 60 * 1000;
// Tempo minimo antes de tentar de novo se ainda esta pendente (10s — significa que travou)
const _PIC_PENDING_TIMEOUT = 10 * 1000;

async function evoEnsurePic(remoteJid) {
  if (!remoteJid) return null;
  const cached = _evoPicCache.get(remoteJid);
  const agora = Date.now();
  // Se ja tem url valida cacheada, retorna
  if (cached?.url) return cached.url;
  // Se cached.failed=true mas faz mais de 5min, re-tenta (recupera de erro transitorio)
  if (cached?.failed && (agora - (cached.ts || 0)) < _PIC_RETRY_AFTER) return null;
  // Se cached.pending mas ja faz mais de 10s, considera dead e re-tenta
  if (cached?.pending && (agora - (cached.ts || 0)) < _PIC_PENDING_TIMEOUT) return null;
  // marca como "fetching" pra nao disparar duplicado
  _evoPicCache.set(remoteJid, { url:null, ts:agora, pending:true });
  // Snapshot do cfg pra detectar se trocou de instancia durante o fetch
  const cfgAtCall = getEvoConfig();
  if (!cfgAtCall) {
    _evoPicCache.delete(remoteJid); // sem cfg, nao cacheia — tenta de novo no proximo render
    return null;
  }
  try {
    const number = remoteJid.replace('@s.whatsapp.net','').replace('@c.us','').replace('@g.us','');
    const data = await evo.fetchProfilePicture(number);
    // Se trocou de instancia durante o fetch, descarta (vai ser limpo pelo listener mesmo)
    const cfgAfter = getEvoConfig();
    if (!cfgAfter || cfgAfter.instance !== cfgAtCall.instance) {
      _evoPicCache.delete(remoteJid);
      return null;
    }
    const url = data?.profilePictureUrl || null;
    _evoPicCache.set(remoteJid, { url, ts:Date.now() });
    evoNotifyPic();
    return url;
  } catch (e) {
    // Erros 404 (contato sem foto OU nao registrado na sessao Baileys) — cacheia null
    // mas com timestamp pra re-tentar depois (sync da Baileys pode trazer depois)
    _evoPicCache.set(remoteJid, { url:null, ts:Date.now(), failed:true, error: e.message });
    evoNotifyPic();
    return null;
  }
}
function useEvoProfilePic(remoteJid) {
  const [, force] = React.useState(0);
  // Re-renderiza ao trocar de instancia (cache foi limpo)
  const activeInstanceId = useActiveInstanceId();
  React.useEffect(() => {
    if (!remoteJid) return;
    const fn = () => force(x => x + 1);
    _evoPicSubs.add(fn);
    // Dispara fetch (que ja faz retry inteligente baseado no estado do cache)
    evoEnsurePic(remoteJid);
    return () => { _evoPicSubs.delete(fn); };
  }, [remoteJid, activeInstanceId]); // re-dispara ao trocar de instancia
  return _evoPicCache.get(remoteJid)?.url || null;
}

/* ── Tabela de CONTATOS (canonical) ──
   Resolve o @lid (anonymized id) para o telefone real (@s.whatsapp.net) +
   da acesso a pushName/profileName/verifiedName que muitas vezes faltam no chat.
   Esquemas comuns de contato no Evolution v2:
     { id: '55XXXXXXXXX@s.whatsapp.net', pushName, profileName, verifiedName, profilePicUrl, lid? }
     { id: 'XXXXXX@lid', pushName, ... }
*/
const _evoContacts = {
  byJid: new Map(),       // qualquer JID -> contact
  lidToPhone: new Map(),  // @lid -> @s.whatsapp.net
  loaded: false,
  loading: false,
  subs: new Set(),
  // Qual instance carregou esse cache (pra invalidar ao trocar)
  loadedFor: null,
};
function _evoNotifyContacts() { _evoContacts.subs.forEach(fn => { try { fn(); } catch {} }); }

/* ─── Invalidacao de caches in-memory ao trocar de instancia ───────────
   Cada instancia WhatsApp tem:
   - Sua propria sessao Baileys na Evolution (instance name unico)
   - Seus proprios @lid (anonymized ids gerados por sessao)
   - Seus proprios contatos (Baileys cache local da sessao)
   - Suas fotos de perfil cacheadas (privacy varia por instancia)
   Por isso quando o usuario troca de WhatsApp no switcher, TODOS os caches
   in-memory precisam ser limpos. Caso contrario teriamos vazamento:
   contato @lid da Brava aparecendo resolvido como telefone na Jhonattan,
   foto cacheada de @lid X resolvendo como contato Y, etc. */
window.addEventListener('brava_active_instance_changed', () => {
  // Reset cache de contatos (incluindo lid<->phone)
  _evoContacts.byJid.clear();
  _evoContacts.lidToPhone.clear();
  _evoContacts.loaded = false;
  _evoContacts.loadedFor = null;
  _evoNotifyContacts();
  // Reset cache de fotos de perfil (pode mudar entre instancias por @lid)
  if (typeof _evoPicCache !== 'undefined') {
    _evoPicCache.clear();
    if (typeof evoNotifyPic === 'function') evoNotifyPic();
  }
  console.log('[Brava] Caches in-memory invalidados (troca de instancia)');
});

function _evoIndexContact(c) {
  if (!c) return;
  const ids = [];
  if (c.id) ids.push(c.id);
  if (c.remoteJid) ids.push(c.remoteJid);
  if (c.jid) ids.push(c.jid);
  if (c.lid) ids.push(c.lid);
  ids.forEach(id => _evoContacts.byJid.set(id, c));
  // Mapeamento bidirecional lid <-> phone, se presente
  if (c.lid && (c.id || c.remoteJid)) {
    const phoneJid = (c.id || c.remoteJid).endsWith('@s.whatsapp.net') ? (c.id || c.remoteJid) : null;
    if (phoneJid) _evoContacts.lidToPhone.set(c.lid, phoneJid);
  }
  // Algumas versoes trazem "senderPn" ou "phoneNumber"
  const phoneFromExtra = c.phoneNumber || c.senderPn;
  if (phoneFromExtra && (c.id || c.remoteJid || c.jid)?.includes('@lid')) {
    const phoneJid = phoneFromExtra.includes('@') ? phoneFromExtra : `${phoneFromExtra.replace(/\D/g,'')}@s.whatsapp.net`;
    _evoContacts.lidToPhone.set(c.id || c.remoteJid || c.jid, phoneJid);
  }
}

async function evoLoadContacts(force = false) {
  const cfg = getEvoConfig();
  if (!cfg) return;
  // Detecta drift: se o cache foi carregado pra outra instance, invalida
  if (_evoContacts.loadedFor && _evoContacts.loadedFor !== cfg.instance) {
    _evoContacts.byJid.clear();
    _evoContacts.lidToPhone.clear();
    _evoContacts.loaded = false;
    _evoContacts.loadedFor = null;
  }
  if ((_evoContacts.loading || _evoContacts.loaded) && !force) return;
  _evoContacts.loading = true;
  const instanceAtCall = cfg.instance; // snapshot
  try {
    const data = await evo.findContacts();
    // Verifica se a instancia ainda eh a mesma (usuario pode ter trocado no meio)
    const cfgAfter = getEvoConfig();
    if (!cfgAfter || cfgAfter.instance !== instanceAtCall) {
      console.warn('[Brava] Instancia trocada durante load de contatos, descartando');
      return;
    }
    const list = Array.isArray(data) ? data : (data?.contacts || []);
    list.forEach(_evoIndexContact);
    _evoContacts.loaded = true;
    _evoContacts.loadedFor = instanceAtCall;
    _evoNotifyContacts();
  } catch (e) {
    console.warn('[Brava] Erro carregando contatos:', e.message);
  } finally {
    _evoContacts.loading = false;
  }
}

/* ── Presenca (online/digitando/gravando) ── */
// state: 'available'|'unavailable'|'composing'|'recording'|'paused' | null
const _evoPresenceCache = new Map(); // remoteJid -> { state, ts, lastSeen? }
const _evoPresenceSubs = new Set();
function _evoNotifyPresence() { _evoPresenceSubs.forEach(fn => { try { fn(); } catch {} }); }

// chamada quando socket emite presence.update
function evoApplyPresenceUpdate(payload) {
  if (!payload) return;
  const data = payload.data || payload;
  const jid = data.id || data.jid || data.remoteJid;
  const presences = data.presences || {};
  if (jid && Object.keys(presences).length === 0) return;
  // O payload pode trazer presences indexadas por participantJid (em grupos)
  // OU diretamente {lastKnownPresence} sob a propria entry. Aceitamos as duas formas.
  let state = null;
  for (const k of Object.keys(presences)) {
    const p = presences[k];
    if (p?.lastKnownPresence) { state = p.lastKnownPresence; break; }
  }
  if (!state && data.lastKnownPresence) state = data.lastKnownPresence;
  if (!jid || !state) return;
  _evoPresenceCache.set(jid, { state, ts: Date.now() });
  _evoNotifyPresence();
}

// Tenta assinar presenca de um chat (endpoint varia por versao Evolution; falha silenciosa)

    await evoFetch(`/chat/presence/${encodeURIComponent(getEvoConfig().instance)}`, {

}

}

/* ── Download de midia (cache base64 por message id) ── */
const _evoMediaCache = new Map(); // msgId -> { base64, mimetype, fileName, loading, error }
const _evoMediaSubs = new Set();
function _evoNotifyMedia(msgId) { _evoMediaSubs.forEach(fn => { try { fn(msgId); } catch {} }); }

async function evoEnsureMedia(message) {
  const id = message?.id || message?.key?.id;
  if (!id) return null;
  const cached = _evoMediaCache.get(id);
  if (cached && (cached.base64 || cached.error)) return cached;
  if (cached?.loading) return cached;
  _evoMediaCache.set(id, { loading:true });
  _evoNotifyMedia(id);
  try {
    const raw = message.raw || message; // permite passar o normalizado ou o cru
    const data = await evo.getBase64FromMedia(raw);
    const base64 = data?.base64 || data?.media || data?.data;
    const mimetype = data?.mimetype || message.meta?.mimetype || 'application/octet-stream';
    const fileName = data?.fileName || message.meta?.fileName || `arquivo`;
    if (!base64) throw new Error('Sem base64 no retorno');
    _evoMediaCache.set(id, { base64, mimetype, fileName });
    _evoNotifyMedia(id);
    return _evoMediaCache.get(id);
  } catch (e) {
    _evoMediaCache.set(id, { error: e.message || 'Erro ao baixar' });
    _evoNotifyMedia(id);
    return _evoMediaCache.get(id);
  }
}

function useEvoMedia(message, autoLoad = true) {
  const id = message?.id || message?.key?.id;
  const [, force] = React.useState(0);
  React.useEffect(() => {
    if (!id) return;
    const fn = (mid) => { if (mid === id) force(x => x+1); };
    _evoMediaSubs.add(fn);
    if (autoLoad && !_evoMediaCache.has(id)) evoEnsureMedia(message);
    return () => { _evoMediaSubs.delete(fn); };
  }, [id, autoLoad]);
  return _evoMediaCache.get(id) || null;
}

// Trigger download no browser (gera <a download> a partir do base64)
async function evoDownloadMessage(message) {
  const r = await evoEnsureMedia(message);
  if (!r?.base64) { showToast?.('Falha ao baixar arquivo: ' + (r?.error||''), 'error'); return; }
  const blob = await (await fetch(`data:${r.mimetype};base64,${r.base64}`)).blob();
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = r.fileName || 'arquivo';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

/* ── Metadados de grupo (cache) ── */
const _evoGroupCache = new Map(); // groupJid -> { subject, owner, participants, desc }
const _evoGroupSubs = new Set();
function _evoNotifyGroup() { _evoGroupSubs.forEach(fn => { try { fn(); } catch {} }); }

async function evoEnsureGroupMeta(groupJid) {
  if (!groupJid?.endsWith('@g.us')) return null;
  const cached = _evoGroupCache.get(groupJid);
  if (cached) return cached;
  _evoGroupCache.set(groupJid, { loading:true });
  try {
    // Tenta endpoint v2
    const data = await evoFetch(`/group/findGroupInfos/${encodeURIComponent(getEvoConfig().instance)}?groupJid=${encodeURIComponent(groupJid)}`).catch(async () => {
      return evoFetch(`/group/fetchAllGroups/${encodeURIComponent(getEvoConfig().instance)}`).then(arr => (Array.isArray(arr) ? arr.find(g => g.id === groupJid) : null));
    });
    if (data) {
      _evoGroupCache.set(groupJid, {
        subject: data.subject,
        owner: data.owner,
        participants: data.participants || [],
        desc: data.desc,
      });
      _evoNotifyGroup();
    }
    return _evoGroupCache.get(groupJid);
  } catch (e) {
    _evoGroupCache.set(groupJid, { error: e.message });
    return _evoGroupCache.get(groupJid);
  }
}

function useEvoGroupMeta(groupJid) {
  const [, force] = React.useState(0);

    const fn = () => force(x => x+1);
    _evoGroupSubs.add(fn);
    if (!_evoGroupCache.has(groupJid)) evoEnsureGroupMeta(groupJid);
    return () => { _evoGroupSubs.delete(fn); };
  }, [groupJid]);
  return _evoGroupCache.get(groupJid) || null;
}

/* Exporta a conversa atual em CSV (downloaded como arquivo) */
function exportarConversaCsv(contato, msgs) {
  if (!contato || !msgs?.length) { showToast?.('Sem mensagens para exportar', 'warn'); return; }
  const linhas = [['data_hora', 'direcao', 'autor', 'tipo', 'texto']];
  msgs.forEach(m => {
    const dt = m.timestamp ? new Date(m.timestamp).toLocaleString('pt-BR') : '';
    const dir = m.from === 'out' ? 'enviada' : 'recebida';
    const autor = m.from === 'out' ? (m.ia ? 'IA Brava' : 'Voce') : (contato.name || 'Contato');
    const txt = (m.text || '').replace(/"/g, '""').replace(/\n/g, ' ');
    linhas.push([dt, dir, autor, m.kind || 'text', '"' + txt + '"']);
  });
  const csv = linhas.map(r => r.join(',')).join('\n');
  const blob = new Blob(['﻿' + csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'conversa_' + (contato.name || 'contato').replace(/[^a-zA-Z0-9]/g, '_') + '_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast?.('Conversa exportada', 'success');
}

/* Formatar numero SEMPRE no padrao BR: +55 DDD NNNNN-NNNN */
function evoFormatPhone(jid) {
  if (!jid) return '';
  if (jid.includes('@broadcast') || jid.endsWith('@g.us')) return '';
  const n = (jid || '').replace(/@.+$/, '').replace(/\D/g, '');
  if (!n) return '';
  // 11+ digitos: usa os ultimos 11 como celular (BR padrao novo)
  if (n.length >= 11) {
    const u = n.slice(-11);
    return `+55 ${u.slice(0,2)} ${u.slice(2,7)}-${u.slice(7)}`;
  }
  // 10 digitos: telefone fixo
  if (n.length === 10) {
    return `+55 ${n.slice(0,2)} ${n.slice(2,6)}-${n.slice(6)}`;
  }
  // Muito curto: nao da pra formatar
  return '';
}

// Label do contato · agora sempre cai no formato +55 DDD NNNNN-NNNN
function evoLabelContato(jid) {
  return evoFormatPhone(jid) || 'Contato';
}

/* ── WebSocket Socket.IO da Evolution (real-time) ── */
const _evoSocketState = { socket:null, cfgKey:null, listeners:new Set(), connected:false };
function _evoSocketEmit(evt) { _evoSocketState.listeners.forEach(fn => { try { fn(evt); } catch {} }); }

function _evoBindSocket(socket) {
  socket.on('connect', () => {
    _evoSocketState.connected = true;
    _evoSocketEmit({ type:'connect' });
  });
  socket.on('disconnect', () => {
    _evoSocketState.connected = false;
    _evoSocketEmit({ type:'disconnect' });
  });
  socket.on('connect_error', (err) => {
    _evoSocketEmit({ type:'error', error: err?.message || 'connect error' });
  });
  ['messages.upsert','messages.update','chats.upsert','chats.update','chats.delete','connection.update','contacts.upsert','contacts.update','send.message','presence.update']
    .forEach(evt => socket.on(evt, (payload) => _evoSocketEmit({ type:'message', event:evt, payload })));
  socket.on('presence.update', (payload) => evoApplyPresenceUpdate(payload));
  // Auto-indexa contatos recebidos via socket (mantem o mapa lid->phone fresco)
  const indexarPayload = (p) => {
    const data = p?.data || p;
    const arr = Array.isArray(data) ? data : (data?.contacts || [data]);
    arr.forEach(c => _evoIndexContact(c));
    _evoNotifyContacts();
  };
  socket.on('contacts.upsert', indexarPayload);
  socket.on('contacts.update', indexarPayload);
  socket.onAny?.((evt, payload) => _evoSocketEmit({ type:'any', event:evt, payload }));
}

function evoSocketConnect(cfg) {
  if (!cfg || typeof io === 'undefined') return;
  const key = cfg.url + '|' + cfg.instance;
  if (_evoSocketState.cfgKey === key && _evoSocketState.socket?.connected) return;
  if (_evoSocketState.socket) { try { _evoSocketState.socket.disconnect(); } catch {} }

  const base = evoNormalizeUrl(cfg.url);
  const commonOpts = {
    transports: ['websocket','polling'],
    reconnection: true,
    reconnectionAttempts: 5,
    reconnectionDelay: 2000,
    timeout: 8000,
    auth: { apikey: cfg.apikey },
    query: { apikey: cfg.apikey },
  };

  // Tenta primeiro com namespace por instancia (Evolution v2 padrao)
  let socket = io(`${base}/${encodeURIComponent(cfg.instance)}`, commonOpts);
  _evoSocketState.socket = socket;
  _evoSocketState.cfgKey = key;
  _evoBindSocket(socket);

  // Fallback: se nao conectar em 5s, tenta raiz (Evolution global mode)
  let tentouFallback = false;
  const tentarFallback = () => {
    if (tentouFallback || _evoSocketState.connected) return;
    tentouFallback = true;
    try { socket.disconnect(); } catch {}
    const sk2 = io(base, commonOpts);
    _evoSocketState.socket = sk2;
    _evoBindSocket(sk2);
  };
  setTimeout(tentarFallback, 5000);
}

function useEvoSocket() {
  const cfg = useEvoConfig();
  const [connected, setConnected] = React.useState(_evoSocketState.connected);
  React.useEffect(() => {
    if (!cfg) return;
    evoSocketConnect(cfg);
    const fn = (e) => {
      if (e.type === 'connect') setConnected(true);
      if (e.type === 'disconnect') setConnected(false);
    };
    _evoSocketState.listeners.add(fn);
    setConnected(_evoSocketState.connected);
    return () => { _evoSocketState.listeners.delete(fn); };
  }, [cfg?.url, cfg?.instance, cfg?.apikey]);
  return { connected };
}

// Subscribe a eventos do socket (callback dispara em cada mensagem nova)
function useEvoSocketEvent(eventNames, callback) {
  React.useEffect(() => {
    if (!callback) return;
    const names = Array.isArray(eventNames) ? eventNames : [eventNames];
    const fn = (e) => {
      if (e.type !== 'message' && e.type !== 'any') return;
      if (names.includes('*') || names.includes(e.event)) callback(e.event, e.payload);
    };
    _evoSocketState.listeners.add(fn);
    return () => { _evoSocketState.listeners.delete(fn); };
  }, [callback, JSON.stringify(eventNames)]);
}

// Hook: polling do estado de conexao da instancia
function useEvoStatus(intervalMs = 15000) {
  const cfg = useEvoConfig();
  const [state, setState] = React.useState({ loading:false, status:null, error:null, instanceInfo:null });
  React.useEffect(() => {
    if (!cfg) { setState({ loading:false, status:null, error:null, instanceInfo:null }); return; }
    let alive = true;
    const tick = async () => {
      if (!alive) return;
      setState(s => ({...s, loading:true}));
      try {
        // 1. connectionState (status open/close/connecting)
        const cs = await evo.connectionState(cfg);
        const status = cs?.instance?.state || cs?.state || cs?.status || 'unknown';
        // 2. fetchInstances (puxa profile, contatos, msgs)
        const all = await evo.fetchInstances(cfg);
        const list = Array.isArray(all) ? all : (all?.instance ? [all.instance] : []);
        const found = list.find(i =>
          (i.name && i.name === cfg.instance) ||
          (i.instance && i.instance.instanceName === cfg.instance) ||
          (i.instanceName === cfg.instance)
        ) || list[0];
        if (alive) setState({ loading:false, status, error:null, instanceInfo: found || null });
      } catch (e) {
        if (alive) setState({ loading:false, status:null, error: e.message || 'Erro', instanceInfo:null });
      }
    };
    tick();
    const id = setInterval(tick, intervalMs);
    return () => { alive = false; clearInterval(id); };
  }, [cfg?.url, cfg?.instance, cfg?.apikey, intervalMs]);
  return state;
}

/* ── Helpers para normalizar dados da Evolution para o shape esperado pelo UI ── */
const EVO_PALETA = ['#7B3FE4','#1E90FF','#1D9E75','#BA7517','#A32D2D','#E040FB','#185FA5','#FF6D00','#00BCD4','#9C27B0'];
function evoColorFromString(s) {
  let h = 0; for (let i = 0; i < (s||'').length; i++) h = ((h<<5) - h) + s.charCodeAt(i);
  return EVO_PALETA[Math.abs(h) % EVO_PALETA.length];
}
function evoInitials(name) {
  const parts = (name||'?').trim().split(/\s+/).filter(Boolean);
  if (parts.length === 0) return '?';
  if (parts.length === 1) return parts[0].slice(0,2).toUpperCase();
  return (parts[0][0] + parts[parts.length-1][0]).toUpperCase();
}
// Formato para LISTA de conversas (igual WhatsApp Web):
//  - hoje      -> HH:MM (ex: 01:00)
//  - ontem     -> "ontem"
//  - <7 dias   -> dia da semana COMPLETO (sexta-feira, quarta-feira)
//  - mais antigo -> DD/MM/YYYY (06/05/2026)
function evoTimeFormat(ts) {
  if (!ts) return '';
  const d = typeof ts === 'number' ? new Date(ts < 1e12 ? ts*1000 : ts) : new Date(ts);
  if (isNaN(d.getTime())) return '';
  const now = new Date();
  const ehHoje = d.toDateString() === now.toDateString();
  if (ehHoje) return d.toLocaleTimeString('pt-BR',{hour:'2-digit', minute:'2-digit'});
  const ontem = new Date(now); ontem.setDate(ontem.getDate()-1);
  if (d.toDateString() === ontem.toDateString()) return 'ontem';
  const diasAtras = Math.floor((now - d) / (24*60*60*1000));
  if (diasAtras < 7) return d.toLocaleDateString('pt-BR',{weekday:'long'}); // sexta-feira
  return d.toLocaleDateString('pt-BR',{day:'2-digit', month:'2-digit', year:'numeric'}); // 06/05/2026
}

// Formato para BOLHA de mensagem (SEMPRE HH:MM como o WhatsApp)
function evoHHMM(ts) {
  if (!ts) return '';
  const d = typeof ts === 'number' ? new Date(ts < 1e12 ? ts*1000 : ts) : new Date(ts);
  if (isNaN(d.getTime())) return '';
  return d.toLocaleTimeString('pt-BR',{hour:'2-digit', minute:'2-digit'});
}

// Label para SEPARADOR DE DATA na conversa (HOJE / ONTEM / 18/04/2026)
function evoDayLabel(ts) {
  if (!ts) return '';
  const d = typeof ts === 'number' ? new Date(ts < 1e12 ? ts*1000 : ts) : new Date(ts);
  if (isNaN(d.getTime())) return '';
  const now = new Date();
  const ehHoje = d.toDateString() === now.toDateString();
  if (ehHoje) return 'HOJE';
  const ontem = new Date(now); ontem.setDate(ontem.getDate()-1);
  if (d.toDateString() === ontem.toDateString()) return 'ONTEM';
  const diasAtras = Math.floor((now - d) / (24*60*60*1000));
  if (diasAtras < 7) {
    const dia = d.toLocaleDateString('pt-BR',{weekday:'long'});
    return dia.charAt(0).toUpperCase() + dia.slice(1);
  }
  return d.toLocaleDateString('pt-BR',{day:'2-digit', month:'2-digit', year:'numeric'});
}

// Chave do dia (YYYY-MM-DD) pra agrupar mensagens
function evoDayKey(ts) {
  if (!ts) return '0';
  const d = typeof ts === 'number' ? new Date(ts < 1e12 ? ts*1000 : ts) : new Date(ts);
  if (isNaN(d.getTime())) return '0';
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// Extrai texto de qualquer tipo de message Baileys
function evoExtractText(msg) {
  if (!msg) return '';
  if (typeof msg === 'string') return msg;
  const m = msg.message || msg;
  if (!m) return '';
  if (m.conversation) return m.conversation;
  if (m.extendedTextMessage?.text) return m.extendedTextMessage.text;
  if (m.imageMessage)    return m.imageMessage.caption    ? `📷 ${m.imageMessage.caption}` : '📷 Foto';
  if (m.videoMessage)    return m.videoMessage.caption    ? `🎥 ${m.videoMessage.caption}` : '🎥 Vídeo';
  if (m.audioMessage)    return m.audioMessage.ptt ? '🎤 Mensagem de voz' : '🎵 Áudio';
  if (m.documentMessage) return `📄 ${m.documentMessage.fileName || 'Documento'}`;
  if (m.stickerMessage)  return '😀 Figurinha';
  if (m.contactMessage)  return '👤 Contato';
  if (m.locationMessage) return '📍 Localização';
  if (m.buttonsResponseMessage?.selectedDisplayText) return m.buttonsResponseMessage.selectedDisplayText;
  if (m.listResponseMessage?.title) return m.listResponseMessage.title;
  return '';
}

// Util: detecta se um valor "parece um nome" (tem letras, nao e so digitos/JID)
function evoTemNomeReal(s) {
  if (!s) return false;
  return /[a-zA-ZÀ-ÿ]/.test(String(s));
}

// Identifica chat "ruido": @lid (LinkedDevice) sem identificacao util, broadcasts e status
function evoIsRuido(chat) {
  const jid = chat.remoteJid || chat.id || chat.key?.remoteJid || '';
  const rawName = chat.pushName || chat.name || chat.profileName || chat.subject || '';
  if (jid.includes('@broadcast')) return true;
  if (jid === 'status@broadcast') return true;
  if (jid.includes('@lid')) {
    // Considera "OK" (nao ruido) se:
    //  - tem nome com letras
    //  - OU temos um telefone real resolvido via tabela de contatos
    const contato = evoGetContact(jid);
    const nomeUtil = evoTemNomeReal(rawName)
                  || evoTemNomeReal(contato?.pushName || contato?.profileName || contato?.verifiedName || contato?.notify || '');
    const temPhone = !!evoResolveJid(jid)?.endsWith('@s.whatsapp.net') && evoResolveJid(jid) !== jid;
    if (!nomeUtil && !temPhone) return true;
  }
  return false;
}

// Detalhes do tipo de mensagem (pra renderizacao especial)
function evoMessageMeta(msg) {
  const m = msg?.message || msg;
  if (!m) return { kind: 'text' };
  if (m.imageMessage)    return { kind: 'image',    caption: m.imageMessage.caption || '', mimetype: m.imageMessage.mimetype, fileLength: m.imageMessage.fileLength };
  if (m.videoMessage)    return { kind: 'video',    caption: m.videoMessage.caption || '', mimetype: m.videoMessage.mimetype, seconds: m.videoMessage.seconds };
  if (m.audioMessage)    return { kind: 'audio',    ptt: !!m.audioMessage.ptt, mimetype: m.audioMessage.mimetype, seconds: m.audioMessage.seconds };
  if (m.documentMessage) return { kind: 'document', fileName: m.documentMessage.fileName || 'Documento', mimetype: m.documentMessage.mimetype, fileLength: m.documentMessage.fileLength };
  if (m.stickerMessage)  return { kind: 'sticker',  mimetype: m.stickerMessage.mimetype };
  if (m.locationMessage) return { kind: 'location', lat: m.locationMessage.degreesLatitude, lng: m.locationMessage.degreesLongitude };
  if (m.contactMessage)  return { kind: 'contact',  displayName: m.contactMessage.displayName };
  return { kind: 'text' };
}

// Converte um chat do Evolution v2 para o shape do UI (espelhamento WhatsApp Web)
function evoNormalizeChat(c) {
  const remoteJid = c.remoteJid || c.id || c.key?.remoteJid || '';
  const isGroup = remoteJid.endsWith('@g.us');
  const ehLid = remoteJid.includes('@lid');

  // Cruza com tabela de contatos pra recuperar nome / telefone real do @lid
  const contato = !isGroup ? evoGetContact(remoteJid) : null;
  const jidResolvido = !isGroup ? evoResolveJid(remoteJid) : remoteJid; // se for lid, tenta achar @s.whatsapp.net

  const rawName = c.pushName || c.name || c.profileName || c.subject
               || contato?.pushName || contato?.profileName || contato?.verifiedName || contato?.notify || '';

  // Contato salvo manualmente sempre tem prioridade maxima
  const salvo = getContatoSalvo(remoteJid) || getContatoSalvo(jidResolvido);

  // Nome final (em ordem de prioridade):
  //  1. Nome salvo manualmente pelo usuario
  //  2. Grupo com subject -> nome do grupo
  //  3. Contato com nome real (com letras)
  //  4. Telefone formatado (+55 DDD NNNNN-NNNN)
  let name;
  if (salvo?.nome) {
    name = salvo.nome;
  } else if (isGroup) {
    name = rawName || 'Grupo';
  } else if (evoTemNomeReal(rawName)) {
    name = rawName;
  } else {
    // Tenta formatar o telefone resolvido; se nao, formata o proprio remoteJid
    name = evoFormatPhone(jidResolvido) || evoLabelContato(remoteJid);
  }

  // Preview com prefixo igual WhatsApp:
  //  - Voce enviou      -> "Voce: <texto>"
  //  - Outro em grupo   -> "Primeiro Nome: <texto>" (so se for nome real)
  //  - Outro em direto  -> "<texto>"
  const lm = c.lastMessage;
  let preview = lm ? evoExtractText(lm) : '';
  if (lm) {
    if (lm.key?.fromMe || lm.fromMe) {
      preview = `Você: ${preview || ''}`;
    } else if (isGroup) {
      const remetente = lm.pushName || lm.participant || lm.key?.participant || '';
      const primeiroNome = String(remetente).split(/\s+/)[0];
      // So prefixa se tiver letras (evita "153644016115862: Combinado")
      if (evoTemNomeReal(primeiroNome)) {
        preview = `${primeiroNome}: ${preview || ''}`;
      }
    }
  }
  preview = (preview || '').trim() || '...';

  const ts = c.updatedAt || lm?.messageTimestamp || c.messageTimestamp;
  return {
    id: remoteJid,
    name,
    init: evoInitials(name),
    color: evoColorFromString(remoteJid),
    preview,
    time: evoTimeFormat(ts),
    timestamp: typeof ts === 'number' ? ts : (ts ? new Date(ts).getTime() : 0),
    unread: c.unreadCount || 0,
    status: 'online',
    tag: null,
    via: isGroup ? 'Grupo' : 'WhatsApp',
    canal: 'WhatsApp',
    isGroup,
    ehLid,
    raw: c,
  };
}

// Status de mensagem do Baileys/Evolution (varia por versao da API):
//   0=ERROR  1=PENDING  2=SERVER_ACK(enviado)  3=DELIVERY_ACK(entregue)  4=READ(lida)  5=PLAYED
// Aceita: numero (0..5) OU string (PENDING/SENT/RECEIVED/DELIVERY_ACK/SERVER_ACK/READ/PLAYED/etc)
function evoParseStatus(raw) {
  if (raw == null) return 2; // default: assume enviado (1 check) · minimo elegante
  if (typeof raw === 'number') return raw;
  const s = String(raw).toUpperCase();
  if (s === 'READ' || s === 'PLAYED')          return 4;
  if (s === 'DELIVERY_ACK' || s === 'DELIVERED' || s === 'RECEIVED') return 3;
  if (s === 'SERVER_ACK' || s === 'SENT' || s === 'ACK')             return 2;
  if (s === 'PENDING' || s === 'WAITING')      return 1;
  if (s === 'ERROR' || s === 'FAILED')         return 0;
  return 2;
}

function evoNormalizeMessage(m) {
  const text = evoExtractText(m);
  const fromMe = m.key?.fromMe || m.fromMe;
  const ts = m.messageTimestamp || m.timestamp || m.createdAt;
  const meta = evoMessageMeta(m);
  const statusNum = evoParseStatus(m.status);
  return {
    id: m.key?.id || m.id,
    from: fromMe ? 'out' : 'in',
    text: text || '',
    time: evoHHMM(ts),             // SEMPRE HH:MM na bolha (igual WhatsApp)
    timestamp: typeof ts === 'number' ? (ts < 1e12 ? ts*1000 : ts) : (ts ? new Date(ts).getTime() : 0),
    ia: false,
    statusNum,                     // 0..5 (vide tabela acima)
    kind: meta.kind,               // text|image|video|audio|document|sticker|location|contact
    meta,                          // detalhes do tipo
    raw: m,
  };
}

// Preferencia: ocultar chats ruido (@lid sem nome). Default: true.
const evoGetEscondeRuido = () => { try { return localStorage.getItem('brava_evo_esconde_ruido') !== '0'; } catch { return true; } };
const evoSetEscondeRuido = (v) => { localStorage.setItem('brava_evo_esconde_ruido', v ? '1' : '0'); window.dispatchEvent(new Event('brava_evo_pref_changed')); };
function useEvoEscondeRuido() {
  const [v, setV] = React.useState(evoGetEscondeRuido);
  React.useEffect(() => {
    const fn = () => setV(evoGetEscondeRuido());
    window.addEventListener('brava_evo_pref_changed', fn);
    return () => window.removeEventListener('brava_evo_pref_changed', fn);
  }, []);
  return [v, evoSetEscondeRuido];
}

// Hook: lista de conversas reais (polling + websocket pra real-time)
function useEvoChats(intervalMs = 15000) {
  const cfg = useEvoConfig();
  useEvoSocket(); // garante que o socket esta conectado
  useEvoContacts(); // garante que contatos foram carregados (resolucao de @lid)
  const contatosSalvos = useTodosContatosSalvos(); // re-render reativo
  const [escondeRuido] = useEvoEscondeRuido();
  const [raw, setRaw] = React.useState({ loading:false, arr:[], error:null });
  const fetchRef = React.useRef(null);

  React.useEffect(() => {
    if (!cfg) { setRaw({loading:false, arr:[], error:null}); return; }
    let alive = true;
    // Snapshot do instance no inicio do effect — usado pra descartar
    // responses tardios se o usuario trocou de WhatsApp no meio do fetch.
    const cfgSnapshot = cfg;
    const tick = async () => {
      if (!alive) return;
      try {
        // Garante contatos antes pra resolver @lid -> telefone no normalizer
        if (!_evoContacts.loaded && !_evoContacts.loading) await evoLoadContacts();
        const data = await evo.findChats();
        if (!alive) return;
        // Se trocou de instancia no meio, descarta o response
        const cfgAfter = getEvoConfig();
        if (!cfgAfter || cfgAfter.instance !== cfgSnapshot.instance) {
          console.warn('[Brava] useEvoChats: instancia trocou, descartando response');
          return;
        }
        const arr = Array.isArray(data) ? data : (data?.chats || []);
        setRaw({ loading:false, arr, error:null });
      } catch (e) {
        if (alive) setRaw(s => ({...s, loading:false, error: e.message || 'Erro ao listar conversas'}));
      }
    };
    fetchRef.current = tick;
    setRaw(s => ({...s, loading:true, arr:[]})); // limpa array antigo ao trocar
    tick();
    const id = setInterval(tick, intervalMs);
    return () => { alive = false; clearInterval(id); };
  }, [cfg?.url, cfg?.instance, cfg?.apikey, intervalMs]);

  // Reage a eventos do socket pra refetch quase imediato (debounced)
  const debouncedRefetch = React.useMemo(() => {
    let t = null;
    return () => { clearTimeout(t); t = setTimeout(() => fetchRef.current?.(), 250); };
  }, []);
  useEvoSocketEvent(['messages.upsert','chats.upsert','chats.update','chats.delete','send.message'], debouncedRefetch);

  // Normaliza reativamente · re-roda quando RAW muda OU quando user salva/edita contato
  const chatsAll = React.useMemo(
    () => raw.arr.map(evoNormalizeChat).sort((a,b) => (b.timestamp||0) - (a.timestamp||0)),
    [raw.arr, contatosSalvos]
  );
  const chatsVisiveis = React.useMemo(
    () => chatsAll.filter(c => !evoIsRuido(c.raw)),
    [chatsAll]
  );
  const chats = escondeRuido ? chatsVisiveis : chatsAll;
  return { loading: raw.loading, error: raw.error, chats, chatsAll };
}

// Hook lightweight: retorna total de mensagens nao lidas (para badge global)
function useEvoUnreadTotal() {
  const { chats } = useEvoChats(30000); // intervalo mais longo (o socket atualiza tb)
  return React.useMemo(() => chats.reduce((s,c) => s + (c.unread || 0), 0), [chats]);
}

/* Notificacao do navegador quando chega mensagem nova (com permissao) */
const _evoNotifSeen = new Set(); // dedup por message id
function evoBrowserNotify(titulo, corpo, tag, icone) {
  try {
    if (typeof Notification === 'undefined') return;
    if (Notification.permission !== 'granted') return;
    if (document.hasFocus()) return; // nao incomodar se a aba ja esta aberta
    const n = new Notification(titulo, { body: corpo, tag: tag || titulo, icon: icone || '/admin/app/brava-logo-white.png' });
    n.onclick = () => { window.focus(); n.close(); };
    setTimeout(() => n.close(), 7000);
  } catch {}
}
function evoPedirPermissaoNotif() {
  try {
    if (typeof Notification === 'undefined') return;
    if (Notification.permission === 'default') Notification.requestPermission();
  } catch {}
}

// Hook que escuta socket e dispara notificacoes ao receber mensagem nova de outros
function useEvoMessageNotifications() {
  React.useEffect(() => { evoPedirPermissaoNotif(); }, []);
  const cb = React.useCallback((evt, payload) => {
    const data = payload?.data || payload;
    const arr = Array.isArray(data) ? data : (data?.messages ? data.messages : [data]);
    arr.forEach(m => {
      if (!m || m.key?.fromMe || m.fromMe) return; // so notifica entrada
      const id = m.key?.id || m.id;
      if (!id || _evoNotifSeen.has(id)) return;
      _evoNotifSeen.add(id);
      const remoteJid = m.key?.remoteJid || m.remoteJid;
      const contato = remoteJid ? evoGetContact(remoteJid) : null;
      const isGroup = remoteJid?.endsWith('@g.us');
      const senderName = m.pushName
        || contato?.pushName || contato?.profileName || contato?.verifiedName
        || (isGroup ? 'Grupo' : evoFormatPhone(remoteJid) || 'Contato');
      const texto = evoExtractText(m) || '';
      evoBrowserNotify(senderName, texto.slice(0, 140), remoteJid);
    });
  }, []);
  useEvoSocketEvent(['messages.upsert'], cb);
}

// Hook: mensagens de uma conversa especifica (polling fallback + websocket pra real-time)
function useEvoMessages(remoteJid, intervalMs = 12000) {
  const cfg = useEvoConfig();
  useEvoSocket();
  const [state, setState] = React.useState({ loading:false, messages:[], error:null });
  const fetchRef = React.useRef(null);
  const jidRef = React.useRef(remoteJid);
  React.useEffect(() => { jidRef.current = remoteJid; }, [remoteJid]);

  React.useEffect(() => {
    if (!cfg || !remoteJid) { setState({loading:false, messages:[], error:null}); return; }
    let alive = true;
    // Snapshot do instance no inicio do effect (protege contra race ao trocar)
    const cfgSnapshot = cfg;
    const tick = async () => {
      if (!alive) return;
      try {
        const data = await evo.findMessages(remoteJid, 100);
        if (!alive) return;
        // Descarta response se trocou de instancia
        const cfgAfter = getEvoConfig();
        if (!cfgAfter || cfgAfter.instance !== cfgSnapshot.instance) {
          console.warn('[Brava] useEvoMessages: instancia trocou, descartando response');
          return;
        }
        const arr = Array.isArray(data) ? data : (data?.messages?.records || data?.messages || []);
        const norm = arr.map(evoNormalizeMessage)
          .filter(m => m.text || m.raw?.message || m.kind !== 'text')
          .sort((a,b) => (a.timestamp||0) - (b.timestamp||0));
        setState({ loading:false, messages:norm, error:null });
      } catch (e) {
        if (alive) setState(s => ({...s, loading:false, error: e.message || 'Erro ao listar mensagens'}));
      }
    };
    fetchRef.current = tick;
    setState({loading:true, messages:[], error:null}); // limpa msgs antigas ao trocar
    tick();
    const id = setInterval(tick, intervalMs);
    return () => { alive = false; clearInterval(id); };
  }, [cfg?.url, cfg?.instance, cfg?.apikey, remoteJid, intervalMs]);

  // Socket: ao receber qualquer evento de mensagem cuja conversa seja a ativa, refetch
  const onSocketMsg = React.useCallback((evt, payload) => {
    if (!jidRef.current) return;
    const data = payload?.data || payload;
    const arr = Array.isArray(data) ? data : (data?.messages ? data.messages : [data]);
    const matches = arr.some(m => {
      const jid = m?.key?.remoteJid || m?.remoteJid;
      return jid === jidRef.current;
    });
    if (matches) fetchRef.current?.();
  }, []);
  useEvoSocketEvent(['messages.upsert','messages.update','send.message'], onSocketMsg);

  return state;
}

/* Modal: configurar conexao com a Evolution */
function EvoConfigModal({ onClose }) {
  const cur = getEvoConfig() || { url:'', instance:'', apikey:'' };
  const [form, setForm] = useState({ url: cur.url, instance: cur.instance, apikey: cur.apikey });
  const [testando, setTestando] = useState(false);
  const [resultado, setResultado] = useState(null); // {ok, msg, detail}
  const set = (k,v) => { setForm(f => ({...f, [k]:v})); setResultado(null); };

  const testar = async () => {
    if (!form.url || !form.instance || !form.apikey) {
      setResultado({ ok:false, msg:'Preencha URL, instancia e token' }); return;
    }
    setTestando(true); setResultado(null);
    try {
      const all = await evo.fetchInstances({ url: form.url, instance: form.instance, apikey: form.apikey });
      const list = Array.isArray(all) ? all : (all?.instance ? [all.instance] : []);
      const found = list.find(i =>
        (i.name && i.name === form.instance) ||
        (i.instance && i.instance.instanceName === form.instance) ||
        (i.instanceName === form.instance)
      );
      if (!found) {
        const nomes = list.map(i => i.name || i.instanceName || i.instance?.instanceName).filter(Boolean).slice(0,8).join(', ');
        setResultado({ ok:false, msg:`Conectou na API mas nao achou a instancia "${form.instance}". Instancias disponiveis: ${nomes || '(nenhuma)'}` });
      } else {
        const num = found.ownerJid || found.owner || found.number || '';
        setResultado({ ok:true, msg:`Conectado! Instancia encontrada${num ? ' · ' + num : ''}` });
      }
    } catch (e) {
      const isCORS = /Failed to fetch|NetworkError|CORS/i.test(e.message || '');
      setResultado({
        ok:false,
        msg: isCORS
          ? 'Falha de rede/CORS. A Evolution precisa permitir requisicoes deste dominio. Verifique a config CORS_ORIGIN da Evolution.'
          : (e.message || 'Erro desconhecido'),
        detail: e.status ? `Status HTTP ${e.status}` : null,
      });
    } finally {
      setTestando(false);
    }
  };

  const salvar = () => {
    if (!form.url || !form.instance || !form.apikey) {
      setResultado({ ok:false, msg:'Preencha todos os campos antes de salvar' }); return;
    }
    setEvoConfigStore({ url: evoNormalizeUrl(form.url), instance: form.instance.trim(), apikey: form.apikey.trim() });
    showToast?.('Evolution configurada', 'success');
    onClose();
  };

  const limpar = () => {
    if (!confirm('Remover configuracao da Evolution?')) return;
    setEvoConfigStore(null);
    onClose();
  };

  const lbl = { display:'block', fontSize:11, color:'var(--t3)', fontFamily:'var(--f-m)', textTransform:'uppercase', letterSpacing:'.06em', marginBottom:6 };
  const inp = { width:'100%', padding:'9px 12px', background:'var(--bg-3)', border:'1px solid var(--border)', borderRadius:8, color:'var(--t1)', fontSize:14, outline:'none', fontFamily:'var(--f-b)' };

  return (
    <div onClick={onClose} style={{position:'fixed', inset:0, background:'rgba(0,0,0,.65)', display:'grid', placeItems:'center', zIndex:9998, animation:'fade-in .15s'}}>
      <div onClick={e=>e.stopPropagation()} style={{
        width:'min(560px, 94vw)', maxHeight:'90vh', overflow:'auto',
        background:'var(--bg-2)', border:'1px solid var(--border)',
        borderRadius:14, padding:'22px 24px', boxShadow:'0 24px 60px rgba(0,0,0,.5)'
      }}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:18}}>
          <div>
            <div style={{fontFamily:'var(--f-d)', fontSize:18, fontWeight:600, color:'var(--t1)'}}>Conectar Evolution API</div>
            <div style={{fontSize:12, color:'var(--t3)', marginTop:3, lineHeight:1.5}}>
              Token armazenado localmente no seu navegador (fase de teste).
              Para producao migrar para proxy backend.
            </div>
          </div>
          <button onClick={onClose} style={{background:'none', border:'none', cursor:'pointer', color:'var(--t3)', padding:6}}><Icon name="XCircle" size={18}/></button>
        </div>

        <div style={{display:'grid', gap:14}}>
          <div>
            <label style={lbl}>URL da Evolution</label>
            <input style={inp} value={form.url} onChange={e=>set('url', e.target.value)} placeholder="lickingbuffalo-evolution.cloudfy.live" autoFocus/>
          </div>
          <div>
            <label style={lbl}>Nome da Instancia</label>
            <input style={inp} value={form.instance} onChange={e=>set('instance', e.target.value)} placeholder="SistemaBravaCompany"/>
          </div>
          <div>
            <label style={lbl}>Token (apikey)</label>
            <input style={inp} type="password" value={form.apikey} onChange={e=>set('apikey', e.target.value)} placeholder="token da instancia"/>
            <div style={{fontSize:11, color:'var(--t3)', marginTop:6}}>Pode ser a apikey global ou o token especifico da instancia.</div>
          </div>

          {resultado && (
            <div style={{
              padding:'10px 14px', borderRadius:8,
              background: resultado.ok ? 'rgba(29,158,117,.12)' : 'rgba(163,45,45,.12)',
              border: `1px solid ${resultado.ok ? '#1D9E7555' : '#A32D2D55'}`,
              color: resultado.ok ? '#6ee7b7' : '#ff8585',
              fontSize:13, lineHeight:1.5,
            }}>
              <div style={{display:'flex', alignItems:'flex-start', gap:8}}>
                <Icon name={resultado.ok ? 'CheckCircle2' : 'AlertCircle'} size={15} style={{marginTop:2, flexShrink:0}}/>
                <div>
                  {resultado.msg}
                  {resultado.detail && <div style={{fontSize:11, opacity:.7, marginTop:3, fontFamily:'var(--f-m)'}}>{resultado.detail}</div>}
                </div>
              </div>
            </div>
          )}
        </div>

        <div style={{display:'flex', gap:10, justifyContent:'space-between', marginTop:20, paddingTop:16, borderTop:'1px solid var(--border-soft)'}}>
          <div>
            {cur.url && <button onClick={limpar} className="btn" style={{background:'transparent', color:'#ff8585', border:'1px solid #A32D2D55'}}><Icon name="Trash2" size={14}/>Desconectar</button>}
          </div>
          <div style={{display:'flex', gap:10}}>
            <button onClick={testar} disabled={testando} className="btn btn-outline">
              {testando ? 'Testando...' : <><Icon name="Activity" size={14}/>Testar conexao</>}
            </button>
            <button onClick={salvar} className="btn btn-primary"><Icon name="Check" size={14}/>Salvar</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function EvoAvatar({ remoteJid, size = 40, name, init, color, fallbackUrl }) {
  const pic = useEvoProfilePic(remoteJid);
  const src = fallbackUrl || pic;
  const i = init || evoInitials(name);
  const c = color || evoColorFromString(remoteJid || name || '');
  const [erro, setErro] = React.useState(false);
  React.useEffect(() => { setErro(false); }, [src]);

    <div style={{

      position:'relative',

        : (isGroup
          ? <span style={{fontSize: Math.round(size*0.5)}}>👥</span>

}

/* Card status (mostrado dentro da aba Integracoes quando Evolution configurada) */
function EvoStatusPanel() {

  const { loading, status, error, instanceInfo } = useEvoStatus(15000);
  const { connected: socketConnected } = useEvoSocket();
  useEvoContacts(); // garante carregamento
  const [, forceRefresh] = React.useState(0);
  const [sincronizando, setSincronizando] = React.useState(false);

  const sincronizar = async () => {

    try {
      // 1. limpa cache e re-carrega contatos
      _evoContacts.byJid.clear();
      _evoContacts.lidToPhone.clear();
      _evoContacts.loaded = false;
      await evoLoadContacts(true);
      showToast?.(`Contatos sincronizados: ${_evoContacts.byJid.size} contatos, ${_evoContacts.lidToPhone.size} mapeamentos @lid->telefone`, 'success');
      forceRefresh(x => x+1);
    } catch (e) {
      showToast?.('Erro ao sincronizar: ' + (e.message||''), 'error');
    } finally { setSincronizando(false); }
  };

  if (!cfg) return null;

  const statusOk = status === 'open' || status === 'connected';
  const cor = statusOk ? '#1D9E75' : status === 'connecting' ? '#BA7517' : '#A32D2D';
  const label = statusOk ? 'CONECTADO' : (status || 'DESCONHECIDO').toUpperCase();
  const num = instanceInfo?.ownerJid || instanceInfo?.owner || instanceInfo?.number || '';
  const numFmt = num.replace('@s.whatsapp.net','').replace(/^(\d{2})(\d{2})(\d{5})(\d{4})$/, '+$1 $2 $3-$4');
  const profileName = instanceInfo?.profileName || instanceInfo?.profile?.name || '';

  return (
    <div style={{
      marginTop:14, padding:'16px 18px', borderRadius:10,
      background:'var(--bg-3)', border:`1px solid ${cor}55`,
    }}>
      <div style={{display:'flex', alignItems:'center', gap:12, marginBottom:14}}>
        <div style={{width:8, height:8, borderRadius:'50%', background:cor, boxShadow:`0 0 8px ${cor}`}}/>
        <div style={{fontSize:13, fontFamily:'var(--f-m)', color:cor, fontWeight:700, letterSpacing:'.04em'}}>{label}</div>
        {loading && <div style={{fontSize:11, color:'var(--t3)'}}>atualizando...</div>}
        {error && <div style={{fontSize:11, color:'#ff8585'}} title={error}>· erro: {error.slice(0,60)}</div>}
        <div style={{marginLeft:'auto', fontSize:11, color:'var(--t3)', fontFamily:'var(--f-m)', display:'flex', alignItems:'center', gap:6}}>
          <div style={{width:6, height:6, borderRadius:'50%', background: socketConnected ? '#1D9E75' : '#6E6E78', boxShadow: socketConnected ? '0 0 6px #1D9E75' : ''}}/>
          {socketConnected ? 'tempo real ativo (websocket)' : 'polling 15s'}
        </div>
      </div>

      {(profileName || numFmt) && (
        <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:14}}>
          <div style={{
            width:38, height:38, borderRadius:'50%',
            background:'linear-gradient(135deg, var(--purple), var(--blue))',
            display:'flex', alignItems:'center', justifyContent:'center',
            color:'#fff', fontFamily:'var(--f-d)', fontWeight:700, fontSize:14,
          }}>{(profileName || 'WA').slice(0,2).toUpperCase()}</div>
          <div>
            <div style={{fontWeight:600, fontSize:14, color:'var(--t1)'}}>{profileName || cfg.instance}</div>
            <div style={{fontSize:12, color:'var(--t3)', fontFamily:'var(--f-m)'}}>{numFmt || num || cfg.instance}</div>
          </div>
        </div>
      )}

      <div style={{display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:10}}>
        {[
          {l:'Contatos',  v: instanceInfo?._count?.Contact ?? instanceInfo?.contactCount ?? '–'},
          {l:'Conversas', v: instanceInfo?._count?.Chat    ?? instanceInfo?.chatCount    ?? '–'},
          {l:'Mensagens', v: instanceInfo?._count?.Message ?? instanceInfo?.messageCount ?? '–'},
        ].map((s,i) => (
          <div key={i} style={{padding:'10px 12px', background:'var(--bg-2)', borderRadius:8, border:'1px solid var(--border-soft)'}}>
            <div style={{fontSize:10.5, color:'var(--t3)', fontFamily:'var(--f-m)', textTransform:'uppercase', letterSpacing:'.06em'}}>{s.l}</div>
            <div style={{fontSize:18, fontFamily:'var(--f-d)', fontWeight:600, color:'var(--t1)', marginTop:2}}>{typeof s.v === 'number' ? s.v.toLocaleString('pt-BR') : s.v}</div>
          </div>
        ))}
      </div>

      {/* Stats da tabela de contatos local + botao sincronizar */}
      <div style={{marginTop:14, padding:'12px 14px', background:'var(--bg-2)', border:'1px solid var(--border-soft)', borderRadius:8}}>
        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', flexWrap:'wrap', gap:10}}>
          <div>
            <div style={{fontSize:11, color:'var(--t3)', fontFamily:'var(--f-m)', textTransform:'uppercase', letterSpacing:'.06em', marginBottom:6}}>
              Tabela de contatos (resolucao @lid -&gt; telefone)
            </div>
            <div style={{display:'flex', gap:18, fontSize:13, color:'var(--t1)'}}>
              <div><span style={{color:'var(--t3)'}}>Contatos indexados:</span> <strong style={{fontFamily:'var(--f-m)'}}>{_evoContacts.byJid.size}</strong></div>
              <div><span style={{color:'var(--t3)'}}>Mapas @lid-&gt;phone:</span> <strong style={{fontFamily:'var(--f-m)', color: _evoContacts.lidToPhone.size > 0 ? '#1D9E75' : '#BA7517'}}>{_evoContacts.lidToPhone.size}</strong></div>
            </div>
            {_evoContacts.loaded && _evoContacts.lidToPhone.size === 0 && (
              <div style={{fontSize:11.5, color:'#BA7517', marginTop:6, lineHeight:1.4, display:'flex', alignItems:'flex-start', gap:6}}>
                <Icon name="AlertCircle" size={13} style={{flexShrink:0, marginTop:1}}/>
                <span>Evolution nao retornou mapeamentos @lid-&gt;telefone. Os contatos novos do WhatsApp aparecem como "Contato •••XXXX". Veja sugestoes no botao.</span>
              </div>
            )}
          </div>
          <div style={{display:'flex', gap:8, flexShrink:0}}>
            <button onClick={sincronizar} disabled={sincronizando} className="btn btn-outline" style={{padding:'8px 12px'}}>
              <Icon name="Activity" size={13}/>{sincronizando ? 'Sincronizando...' : 'Sincronizar contatos'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── Configuracoes > Aba IA ───
   Edita prompt, modelo e toggle global da IA da instancia ativa.
   Salva direto em wa_instancias via Supabase JS client (RLS anon). */
function ConfigIATab() {
  const [cfg, setCfg] = useState(null);             // dados atuais da instancia
  const [form, setForm] = useState({ ai_prompt:'', ai_model:'claude-sonnet-4-5', ai_enabled_global:true });
  const [loading, setLoading] = useState(true);
  const [salvando, setSalvando] = useState(false);
  const [stats, setStats] = useState({ replied:0, errors:0, lastReply:null });
  const [testando, setTestando] = useState(false);
  const [testInput, setTestInput] = useState('Oi, queria saber sobre os planos');
  const [testOutput, setTestOutput] = useState(null);

  const carregar = React.useCallback(async () => {
    const cli = getSupa();
    if (!cli) return;
    const { data, error } = await cli.from('wa_instancias')
      .select('id, nome, ai_prompt, ai_model, ai_enabled_global, ai_typing_enabled, ai_thinking_seconds, ai_split_enabled, ai_reading_seconds')
      .eq('id', SUPA_CFG.instanciaId).single();
    if (error) { showToast?.('Erro: ' + error.message, 'error'); return; }
    setCfg(data);
    setForm({
      ai_prompt: data.ai_prompt || '',
      ai_model: data.ai_model || 'claude-sonnet-4-5',
      ai_enabled_global: data.ai_enabled_global ?? true,
      ai_typing_enabled: data.ai_typing_enabled ?? true,
      ai_thinking_seconds: Number(data.ai_thinking_seconds ?? 3),
      ai_split_enabled: data.ai_split_enabled ?? true,
      ai_reading_seconds: Number(data.ai_reading_seconds ?? 2.5),
    });
    setLoading(false);

    // Stats: contagem de respostas e erros
    const { count: replied } = await cli.from('wa_eventos_log')
      .select('id', { count:'exact', head:true })
      .eq('instancia_id', SUPA_CFG.instanciaId).eq('event_type', 'ai.replied');
    const { count: errors } = await cli.from('wa_eventos_log')
      .select('id', { count:'exact', head:true })
      .eq('instancia_id', SUPA_CFG.instanciaId).in('event_type', ['ai.error','ai.send_error']);
    const { data: last } = await cli.from('wa_eventos_log')
      .select('received_at, payload')
      .eq('instancia_id', SUPA_CFG.instanciaId).eq('event_type', 'ai.replied')
      .order('id', { ascending:false }).limit(1).maybeSingle();
    setStats({ replied: replied||0, errors: errors||0, lastReply: last });
  }, []);

  useEffect(() => { carregar(); }, [carregar]);

  const salvar = async () => {
    setSalvando(true);
    try {
      const cli = getSupa();
      // .select() no fim devolve as linhas atualizadas · se for [], significa
      // que RLS bloqueou silenciosamente o UPDATE
      const { data, error } = await cli.from('wa_instancias').update({
        ai_prompt: form.ai_prompt,
        ai_model: form.ai_model,
        ai_enabled_global: form.ai_enabled_global,
        ai_typing_enabled: form.ai_typing_enabled,
        ai_thinking_seconds: form.ai_thinking_seconds,
        ai_split_enabled: form.ai_split_enabled,
        ai_reading_seconds: form.ai_reading_seconds,
      }).eq('id', SUPA_CFG.instanciaId).select();
      if (error) throw error;
      if (!data || data.length === 0) {
        throw new Error('Banco aceitou mas nao salvou nenhuma linha. Provavelmente RLS bloqueou o UPDATE · rode a SQL de "wa_inst_anon_write" no editor.');
      }
      showToast?.('Configuração da IA salva ✓', 'success');
      carregar();
    } catch (e) {
      showToast?.('Erro ao salvar: ' + (e.message || e), 'error');
    } finally { setSalvando(false); }
  };

  const testar = async () => {
    if (!testInput.trim()) return;
    setTestando(true); setTestOutput(null);
    try {
      // Chama Claude direto via Anthropic (so pra teste) · usa o prompt do form atual
      // Por seguranca a key nao esta no browser, entao chamamos via wa-proxy "fake":
      // criamos uma rota especial que faz isso. Por enquanto: salva e testa via WhatsApp real.
      // Workaround: simula chamando o wa-ia-responder com um payload fake.
      const res = await fetch(`${SUPA_CFG.url}/functions/v1/wa-ia-responder`, {
        method: 'POST',
        headers: { 'content-type':'application/json', apikey: SUPA_CFG.publishableKey, authorization: `Bearer ${SUPA_CFG.publishableKey}` },
        body: JSON.stringify({
          record: {
            instancia_id: SUPA_CFG.instanciaId,
            message_id: '__test__' + Date.now(),
            chat_jid: '__test__@dryrun',
            from_me: false,
            ia_generated: false,
            kind: 'text',
            text: testInput,
          },
        }),
      });
      const out = await res.json();
      setTestOutput(out);
    } catch (e) {
      setTestOutput({ error: e.message });
    } finally { setTestando(false); }
  };

  if (loading) return <div style={{padding:20, color:'var(--t2)'}}>Carregando…</div>;
  if (!cfg) return <div style={{padding:20, color:'#ff8585'}}>Não conseguiu carregar a instância no Supabase.</div>;

  const lbl = { display:'block', fontSize:11, color:'var(--t3)', fontFamily:'var(--f-m)', textTransform:'uppercase', letterSpacing:'.06em', marginBottom:6 };
  const inp = { width:'100%', padding:'9px 12px', background:'var(--bg-3)', border:'1px solid var(--border)', borderRadius:8, color:'var(--t1)', fontSize:14, outline:'none', fontFamily:'var(--f-b)' };
  const modelos = [
    { v:'claude-sonnet-4-5', l:'Sonnet 4.5 (qualidade alta · ~R$ 0,02 por resposta)' },
    { v:'claude-haiku-4-5',  l:'Haiku 4.5 (rápido e barato · ~R$ 0,005 por resposta)' },
    { v:'claude-opus-4-5',   l:'Opus 4.5 (top tier · ~R$ 0,10 por resposta)' },
  ];

  return (
    <div style={{display:'flex', flexDirection:'column', gap:18}}>
      <div>
        <div className="card__title" style={{marginBottom:6, display:'flex', alignItems:'center', gap:8}}>
          <Icon name="Sparkles" size={16} style={{color:'var(--purple)'}}/>
          Configuração da IA · {cfg.nome}
        </div>
        <div style={{fontSize:13, color:'var(--t2)'}}>O Claude responde automaticamente mensagens recebidas no WhatsApp dessa instância. Mudanças aqui afetam todas as conversas (a menos que você tenha desativado a IA num chat específico).</div>
      </div>

      {/* Stats */}
      <div style={{display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:10}}>
        {[
          {l:'Respostas enviadas', v: stats.replied.toLocaleString('pt-BR'), c:'#1D9E75'},
          {l:'Erros', v: stats.errors.toLocaleString('pt-BR'), c: stats.errors > 0 ? '#A32D2D' : 'var(--t3)'},
          {l:'Última resposta', v: stats.lastReply ? new Date(stats.lastReply.received_at).toLocaleString('pt-BR') : '–', c:'var(--t2)'},
        ].map((s,i) => (
          <div key={i} style={{padding:'14px 16px', background:'var(--bg-3)', borderRadius:10, border:'1px solid var(--border-soft)'}}>
            <div style={{fontSize:10.5, color:'var(--t3)', fontFamily:'var(--f-m)', textTransform:'uppercase', letterSpacing:'.06em'}}>{s.l}</div>
            <div style={{fontSize:18, fontFamily:'var(--f-d)', fontWeight:600, color:s.c, marginTop:4}}>{s.v}</div>
          </div>
        ))}
      </div>

      {/* Toggle global */}
      <div style={{display:'flex', alignItems:'center', gap:14, padding:'14px 18px', background:'var(--bg-3)', borderRadius:10, border:'1px solid var(--border-soft)'}}>
        <div style={{flex:1}}>
          <div style={{fontWeight:600, fontSize:14, color:'var(--t1)'}}>IA ativa nesta instância</div>
          <div style={{fontSize:12, color:'var(--t3)', marginTop:2}}>Quando OFF, nenhuma mensagem recebida vai disparar o Claude. Use pra pausar tudo de uma vez (ex: fim de semana, manutenção).</div>
        </div>
        <button onClick={() => setForm(f => ({...f, ai_enabled_global: !f.ai_enabled_global}))} style={{
          width:46, height:26, borderRadius:999,
          background: form.ai_enabled_global ? 'var(--wa-green)' : 'rgba(110,110,120,.4)',

          <div style={{

              minWidth:60, padding:'6px 12px', textAlign:'center',

              {Number(form.ai_thinking_seconds).toFixed(1)}s

          <input
            type="range"
            min="0"
            max="10"
            step="0.5"
            value={form.ai_thinking_seconds}
            onChange={e => setForm(f => ({...f, ai_thinking_seconds: parseFloat(e.target.value)}))}
            style={{width:'100%', accentColor:'var(--purple)', cursor:'pointer'}}

          <div style={{display:'flex', justifyContent:'space-between', fontSize:10.5, color:'var(--t3)', fontFamily:'var(--f-m)', marginTop:4}}>

      {/* Teste rapido */}
      <div style={{padding:'16px 18px', background:'rgba(123,63,228,.06)', border:'1px solid rgba(123,63,228,.25)', borderRadius:10}}>
        <div style={{fontWeight:600, fontSize:14, color:'var(--t1)', marginBottom:6, display:'flex', alignItems:'center', gap:6}}>
          <Icon name="Sparkles" size={14} style={{color:'var(--purple)'}}/>
