// Helper: gera URL de login do cliente. Externos abrem em outra aba.
function clienteLoginUrl(c) {
  if (c.loginUrl) return c.loginUrl;
  const slug = c.slug || c.nome.toLowerCase().replace(/[^a-z0-9]/g,'');
  return `/app/?login=1&workspace=${slug}`;
}

// Helper: busca a logoUrl do cliente pelo nome (usado em Chamados, Pipeline, etc.)
function getClienteLogo(nome) {
  if (!nome) return null;
  const c = CLIENTES_CRM.find(x => x.nome === nome || nome.indexOf(x.nome) === 0);
  return c?.logoUrl || null;
}

/* ─── Store reativo de clientes (CRUD + persist + events) ─── */
function getClientesReactivos() {
  let edits = {}, deleted = [], extras = [];
  try { edits = JSON.parse(localStorage.getItem('brava_edits_crm') || '{}'); } catch {}
  try { deleted = JSON.parse(localStorage.getItem('brava_deleted_crm') || '[]'); } catch {}
  try { extras = JSON.parse(localStorage.getItem('brava_extra_crm') || '[]'); } catch {}
  const merged = [...CLIENTES_CRM, ...extras].filter(c => !deleted.includes(c.nome));
  return merged.map(c => edits[c.nome] ? {...c, ...edits[c.nome]} : c);
}

const fireClientesChanged = () => window.dispatchEvent(new Event('brava_clientes_changed'));

function editClienteStore(nome, patch) {
  let edits = {};
  try { edits = JSON.parse(localStorage.getItem('brava_edits_crm') || '{}'); } catch {}
  edits[nome] = { ...(edits[nome] || {}), ...patch };
  localStorage.setItem('brava_edits_crm', JSON.stringify(edits));
  fireClientesChanged();
}

function deleteClienteStore(nome) {
  let deleted = [];
  try { deleted = JSON.parse(localStorage.getItem('brava_deleted_crm') || '[]'); } catch {}
  if (!deleted.includes(nome)) {
    deleted.push(nome);
    localStorage.setItem('brava_deleted_crm', JSON.stringify(deleted));
  }
  // Tambem remove dos extras se foi adicionado pelo usuario
  let extras = [];
  try { extras = JSON.parse(localStorage.getItem('brava_extra_crm') || '[]'); } catch {}
  const novosExtras = extras.filter(c => c.nome !== nome);
  if (novosExtras.length !== extras.length) {
    localStorage.setItem('brava_extra_crm', JSON.stringify(novosExtras));
  }
  fireClientesChanged();
}

function undoDeleteClienteStore(nome) {
  let deleted = [];
  try { deleted = JSON.parse(localStorage.getItem('brava_deleted_crm') || '[]'); } catch {}
  localStorage.setItem('brava_deleted_crm', JSON.stringify(deleted.filter(n => n !== nome)));
  fireClientesChanged();
}

function useClientesReactivos() {
  const [list, setList] = React.useState(() => getClientesReactivos());
  React.useEffect(() => {
    const refresh = () => setList(getClientesReactivos());
    window.addEventListener('brava_clientes_changed', refresh);
    window.addEventListener('storage', refresh);
    return () => {
      window.removeEventListener('brava_clientes_changed', refresh);
      window.removeEventListener('storage', refresh);
    };
  }, []);
  return list;
}

/* Hook: detecta se IA esta processando (heuristica frontend, sem precisar mexer no banco)
   Logica: cliente acabou de mandar msg (< 15s) e IA ta ativa no chat => "IA digitando" */
function useIaProcessando(msgs, iaAtivaNoChat) {
  const [agora, setAgora] = React.useState(Date.now());
  React.useEffect(() => {
    if (!iaAtivaNoChat) return;
    const t = setInterval(() => setAgora(Date.now()), 1000);
    return () => clearInterval(t);
  }, [iaAtivaNoChat]);
  if (!iaAtivaNoChat || !msgs?.length) return false;
  const last = msgs[msgs.length - 1];
  if (!last || last.from !== 'in') return false;
  const dt = agora - (last.timestamp || 0);
  // Janela de 15s · cobre leitura (~2.5s) + debounce (~2.5s) + Claude (~3-5s) + typing (~3s) com folga
  return dt > 800 && dt < 15000;
}

/* Label de presenca em tempo real: online/digitando/gravando/visto por ultimo
   + override pra "IA digitando..." quando IA ta processando uma resposta */
function PresenceLabel({ contato, usandoReal, iaProcessando }) {
  const presence = useEvoPresence(usandoReal ? contato?.id : null);
  if (!contato) return null;
  // Prioridade maxima: IA processando (sobrescreve qualquer outro estado)
  if (iaProcessando) {
    return (
      <span style={{fontSize:12, color:'var(--wa-green)', marginTop:1, display:'inline-flex', alignItems:'center', gap:4}}>
        <Icon name="Sparkles" size={11}/> IA digitando<DotsAnim color="var(--wa-green)"/>
      </span>
    );
  }
  if (!usandoReal) return <span style={{fontSize:12, color:'var(--wa-green)', marginTop:1}}>{contato?.status==='online' ? 'online' : 'visto por último às 22:30'}</span>;
  if (!presence) return <span style={{fontSize:12, color:'var(--wa-text-secondary)', marginTop:1}}>clique para ver perfil</span>;
  const s = presence.state;
  let label = 'online', cor = 'var(--wa-green)';
  if (s === 'composing')      label = 'digitando...';
  else if (s === 'recording') label = 'gravando áudio...';
  else if (s === 'paused')    { label = 'pausou de digitar'; cor = 'var(--wa-text-secondary)'; }
  else if (s === 'unavailable') { label = 'offline'; cor = 'var(--wa-text-secondary)'; }
  return <span style={{fontSize:12, color:cor, marginTop:1}}>{label}</span>;
}

          {m?.error ? m.error.slice(0,40) : (m?.loading ? 'baixando áudio…' : 'áudio')}
          {message.meta?.seconds ? ` · ${Math.floor(message.meta.seconds/60)}:${String(message.meta.seconds%60).padStart(2,'0')}` : ''}
        </span>
      </div>
    </div>
  );
}

function Conversas({ pipelineCols, moverNoPipeline }) {
  // === Instancia WhatsApp ativa (pra tela vazia mostrar nome/foto/numero corretos) ===
  const activeInstanceId = useActiveInstanceId();
  const { instances: waInstances } = useWaInstances();
  const activeInstance = React.useMemo(
    () => waInstances.find(i => i.id === activeInstanceId) || waInstances[0] || null,
    [waInstances, activeInstanceId]
  );

  // === Sync histórico (puxa conversas dos últimos N dias do Evolution) ===
  const [syncOpen, setSyncOpen] = React.useState(false);
  const [syncState, setSyncState] = React.useState({
    running:false, days:10, processed:0, total:0, chats:0, messages:0, errors:[], done:false,
  });

  async function runSyncHistory(days) {
    const instanceName = activeInstance?.evolution_instance_name;
    if (!instanceName) {
      showToast?.('Instância sem nome Evolution configurado', 'error');
      return;
    }
    setSyncState({ running:true, days, processed:0, total:0, chats:0, messages:0, errors:[], done:false });

    let offset = 0;
    let totalMessages = 0;
    let totalChats = 0;
    let errorsAcc = [];
    let isDone = false;
    let totalChatsReported = 0;
    let safety = 0;

    while (!isDone && safety < 100) {
      safety++;
      try {
        const res = await fetch(`${SUPA_CFG.url}/functions/v1/wa-sync-history`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ instanceName, daysBack: days, offset, batchSize: 15 }),
        });
        const data = await res.json();
        if (!data.ok) {
          errorsAcc.push(data.error || 'erro desconhecido');
          break;
        }
        totalMessages += data.messages || 0;
        totalChats = Math.max(totalChats, data.chats || 0);
        totalChatsReported = data.totalChats || totalChatsReported;
        if (data.errors?.length) errorsAcc = errorsAcc.concat(data.errors);
        isDone = !!data.done;
        const nextOffset = data.nextOffset != null ? data.nextOffset : (offset + (data.processed || 1));

        setSyncState({
          running:!isDone, days,
          processed: nextOffset,
          total: totalChatsReported,
          chats: totalChats,
          messages: totalMessages,
          errors: errorsAcc,
          done: isDone,
        });

        if (nextOffset === offset && !isDone) break; // não avançou — break
        offset = nextOffset;
      } catch (e) {
        errorsAcc.push(String(e));
        break;
      }
    }

    setSyncState(s => ({ ...s, running:false, done:true, errors: errorsAcc, chats: totalChats, messages: totalMessages, total: totalChatsReported }));

    // Garante que o admin esteja lendo do Supabase (sync alimenta Supabase, faz sentido)
    try {
      if (localStorage.getItem('brava_supa_enabled') === '0') {
        setSupaEnabledStore(true);
      }
    } catch {}

    window.dispatchEvent(new Event('brava_wa_refresh'));
    window.dispatchEvent(new Event('brava_supa_changed'));
    showToast?.(`Sincronizado: ${totalMessages} mensagens em ${totalChats} chats`, 'success');
  }

  // === Backend toggle: Supabase (Realtime) vs Evolution direto (legado) ===
  const [supaEnabled, setSupaEnabled] = useSupaEnabled();
  const supaChatsState = useSupaChats();        // sempre roda (cheap), mas so usa se supaEnabled
  // Reage a mudancas nos contatos salvos (nome editado, etc) re-normalizando os chats
  const contatosSalvosMap = useTodosContatosSalvos();
  const supaChats = React.useMemo(() => {
    // Filtro de seguranca: descarta chats fantasma (sem ultima msg E sem unread)
    // Tipicamente sao @lid de Linked Devices sem conversa real.
    return supaChatsState.chats
      .filter(c => c.last_message_ts || c.last_message_text || (c.unread_count > 0))
      .map(supaNormalizeChat);
  }, [supaChatsState.chats, contatosSalvosMap]);

  // Auto-ativa Supabase se temos dados lá mas o toggle está em Evolution direto
  // (fix pra casos onde localStorage ficou com brava_supa_enabled=0 antigo)
  React.useEffect(() => {
    if (!supaEnabled && supaChatsState.chats.length > 0) {
      setSupaEnabledStore(true);
    }
  }, [supaEnabled, supaChatsState.chats.length]);

  // === Fluxo Evolution direto (legado) ===
  const evoCfg = useEvoConfig();
  const { chats: evoRealChats, loading: realChatsLoading, error: realChatsError } = useEvoChats(15000);
  const { connected: socketConnected } = useEvoSocket();
  const [escondeRuido, setEscondeRuido] = useEvoEscondeRuido();

  // Source of truth conforme o modo
  const usandoReal = supaEnabled ? true : !!evoCfg;
  const realChats = supaEnabled ? supaChats : evoRealChats;
  const fonteContatos = usandoReal ? realChats : CONTATOS;

  // ID inicial: nenhum (mostra tela vazia "Brava Inbox" ate o user clicar)
  const [ativo, setAtivo] = useState(null);
  // Se o chat selecionado some da lista (ex: removeu fantasma), limpa selecao
  useEffect(() => {
    if (ativo && fonteContatos.length && !fonteContatos.some(c => c.id === ativo)) {
      setAtivo(null);
    }
  }, [fonteContatos.length, ativo]);

  const [filtro, setFiltro] = useState('todas');
  const [msg, setMsg] = useState('');
  const [busca, setBusca] = useState('');
  const [buscaMsg, setBuscaMsg] = useState('');           // texto da busca dentro da conversa
  const [buscaMsgAberta, setBuscaMsgAberta] = useState(false);
  const [menuMaisAberto, setMenuMaisAberto] = useState(false);
  const menuMaisRef = useRef(null);
  const [sidebarAberta, setSidebarAberta] = useState(true);

  // Fecha menu "mais" ao clicar fora
  useEffect(() => {
    if (!menuMaisAberto) return;
    const onClick = (e) => { if (menuMaisRef.current && !menuMaisRef.current.contains(e.target)) setMenuMaisAberto(false); };
    document.addEventListener('mousedown', onClick);
    return () => document.removeEventListener('mousedown', onClick);
  }, [menuMaisAberto]);
  const [enviando, setEnviando] = useState(false);
  const [gravando, setGravando] = useState(false);
  const [gravandoSec, setGravandoSec] = useState(0);
  const recorderRef = useRef(null);
  const fileImgRef = useRef(null);
  const [msgsOtimistas, setMsgsOtimistas] = useState([]); // adicionadas localmente antes de confirmar no servidor
  const bottomRef = useRef(null);
  const contato = fonteContatos.find(c => c.id === ativo);

  // Mensagens · Supabase (Realtime) tem prioridade sobre Evolution direto
  const supaMsgsState = useSupaMessages(supaEnabled ? ativo : null);
  const supaMsgs = React.useMemo(() => supaMsgsState.messages.map(supaNormalizeMessage), [supaMsgsState.messages]);
  const { messages: realMsgsEvo, loading: realMsgsLoading, error: realMsgsError } = useEvoMessages((!supaEnabled && usandoReal) ? ativo : null, 5000);
  const realMsgs = supaEnabled ? supaMsgs : realMsgsEvo;
  const msgsBase = usandoReal ? realMsgs : (MENSAGENS[ativo] || MENSAGENS[1] || []);
  // Junta otimistas (sem duplicar se o real ja contem)
  const msgs = [...msgsBase, ...msgsOtimistas.filter(o => o.conversaId === ativo)];

  // Limpa otimistas quando o real refletir (heuristica: removeu otimistas com timestamp anterior ao maior do real)
  useEffect(() => {
    if (!usandoReal || !realMsgs.length) return;
    const maxRealTs = Math.max(...realMsgs.map(m => m.timestamp || 0));
    setMsgsOtimistas(arr => arr.filter(o => (o.timestamp||0) > maxRealTs));
  }, [realMsgs.length, usandoReal]);

  // Estado IA ATIVA/PAUSADA por chat (sincronizado com banco via Realtime)
  const { ativa: iaAtiva, setIaAtiva } = useSupaChatIa(supaEnabled ? ativo : null);

  // Agente atribuido + status do chat (Realtime)
  const { agenteId, status: statusChat, atribuir: atribuirAgente, setStatus: setStatusChat } = useSupaChatAgente(supaEnabled ? ativo : null);
  const usuariosLista = useUsuariosLista();
  const meuUserId = useUsuarioLogadoId();
  // Toca som + notif quando alguem transfere um chat pra mim
  useTransferenciaWatcher(meuUserId);
  const agenteAtual = React.useMemo(() => usuariosLista.find(u => u.id === agenteId), [usuariosLista, agenteId]);
  const [agenteDropAberto, setAgenteDropAberto] = useState(false);
  const agenteDropRef = useRef(null);
  useEffect(() => {
    if (!agenteDropAberto) return;
    const onClick = (e) => { if (agenteDropRef.current && !agenteDropRef.current.contains(e.target)) setAgenteDropAberto(false); };
    document.addEventListener('mousedown', onClick);
    return () => document.removeEventListener('mousedown', onClick);
  }, [agenteDropAberto]);

  // IA esta processando? (frontend heuristic) · pra mostrar "IA digitando..." no header do chat
  const iaProcessando = useIaProcessando(msgs, iaAtiva);

  // Presence do contato ativo (so funciona com socket Evolution, e null em modo Supabase)
  const presenceContato = useEvoPresence(usandoReal && !supaEnabled ? contato?.id : null);

  // Fase atual do contato no pipeline
  const faseAtual = (pipelineCols||[]).find(col =>
    col.cards.some(k => k.nome === contato?.name)
  );
  const mudarFase = (colId) => {
    if (!moverNoPipeline || !contato) return;
    // Passa o contato COMPLETO pra moverNoPipeline criar o card se ainda nao existir
    moverNoPipeline(contato, colId);
    const colNome = (pipelineCols||[]).find(c => c.id === colId)?.nome || colId;
    showToast?.(`${contato.name} → ${colNome}`, 'success');
  };

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior:'smooth' }); }, [ativo, msgs.length]);

  // ESC: desseleciona a conversa atual (volta pra tela vazia "Brava Inbox")
  useEffect(() => {
    const onKey = (e) => {
      if (e.key !== 'Escape') return;
      // So fecha se nao tiver modal aberto e o foco nao for input/textarea
      const tag = (e.target?.tagName || '').toLowerCase();
      if (tag === 'input' || tag === 'textarea') return;
      if (document.querySelector('[role="dialog"]')) return;
      if (ativo) setAtivo(null);
    };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [ativo]);

  // Envio de mensagem real
  const enviar = async () => {
    const texto = msg.trim();
    if (!texto || !contato) return;

    // ─── GATILHOS DE CONTROLE DA IA (so pausa/reativa, nao envia msg) ───
    // PAUSAR: "vamos la" (e variantes) -> admin assume este chat
    // REATIVAR: "." (ponto sozinho) -> devolve atendimento pra IA
    const lower = texto.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '').trim();
    if (['vamos la', 'vamosla', '/vamos', '/assumir', 'assumir'].includes(lower)) {
      await setIaAtiva(false);
      // Auto-atribui o agente atual (quem digitou) como responsavel
      if (meuUserId) await atribuirAgente(meuUserId);
      showToast?.('IA pausada e voce assumiu este chat.', 'success');
      setMsg('');
      return;
    }
    // Reativar: apenas "." (ponto sozinho) ou variantes longas
    if (texto === '.' || ['/ia on', '/ia ativar', '/reativar', 'reativar ia'].includes(lower)) {
      await setIaAtiva(true);
      // Desatribui agente (volta pra pendente) quando devolve pra IA
      await atribuirAgente(null);
      showToast?.('IA reativada. Atribuicao removida.', 'success');
      setMsg('');
      return;
    }

    if (!usandoReal) { setMsg(''); return; } // mock: nao tenta enviar
    const numero = (contato.id || '').replace('@s.whatsapp.net','').replace('@c.us','');
    const tsAgora = Date.now();
    // UI otimista
    setMsgsOtimistas(arr => [...arr, {
      id: 'opt_' + tsAgora,
      conversaId: contato.id,
      from: 'out',
      text: texto,
      time: evoHHMM(tsAgora),
      timestamp: tsAgora,
      pending: true,
      kind: 'text',
    }]);
    setMsg('');
    setEnviando(true);
    try {
      const client = supaEnabled ? supa : evo;
      await client.sendText(numero, texto);
    } catch (e) {
      showToast?.('Erro ao enviar: ' + (e.message || 'desconhecido'), 'error');
      setMsgsOtimistas(arr => arr.map(o => o.id === 'opt_' + tsAgora ? {...o, failed:true, pending:false} : o));
    } finally {
      setEnviando(false);
    }
  };

  // Envio universal (imagem, video, audio, doc · detecta pelo mimetype)
  const enviarArquivo = async (file) => {
    if (!file || !contato || !usandoReal) return;
    if (file.size > 64 * 1024 * 1024) { showToast?.('Arquivo muito grande (max 64MB)', 'warn'); return; }
    const mime = file.type || 'application/octet-stream';
    let mediatype = 'document';
    let kindUI = 'document';
    if (mime.startsWith('image/')) { mediatype = 'image'; kindUI = 'image'; }
    else if (mime.startsWith('video/')) { mediatype = 'video'; kindUI = 'video'; }
    else if (mime.startsWith('audio/')) { mediatype = 'audio'; kindUI = 'audio'; }
    const caption = msg.trim();
    const numero = (contato.id || '').replace('@s.whatsapp.net','').replace('@c.us','');
    const tsAgora = Date.now();
    const reader = new FileReader();
    reader.onload = async (e) => {
      const dataUrl = e.target.result;
      const base64  = dataUrl.split(',')[1];
      setMsgsOtimistas(arr => [...arr, {
        id: 'opt_' + tsAgora, conversaId: contato.id, from:'out',
        text: caption, time: evoHHMM(tsAgora), timestamp: tsAgora, pending:true,
        kind: kindUI, meta:{ kind:kindUI, caption, fileName: file.name, mimetype: mime, fileLength: file.size },
        previewDataUrl: kindUI === 'image' ? dataUrl : undefined,
      }]);
      setMsg('');
      setEnviando(true);
      try {
        const client = supaEnabled ? supa : evo;
        await client.sendMedia(numero, base64, mediatype, caption, file.name, mime);
        showToast?.(`${file.name} enviado`, 'success');
      } catch (err) {
        showToast?.('Erro ao enviar: ' + (err.message || ''), 'error');
        setMsgsOtimistas(arr => arr.map(o => o.id === 'opt_' + tsAgora ? {...o, failed:true, pending:false} : o));
      } finally { setEnviando(false); }
    };
    reader.readAsDataURL(file);
  };
  // alias para compat
  const enviarImagem = enviarArquivo;

  // Gravar e enviar audio (PTT)
  const toggleGravacao = async () => {
    if (!usandoReal || !contato) { showToast?.('Configure a Evolution primeiro', 'warn'); return; }
    if (gravando) {
      // Parar gravacao
      try { recorderRef.current?.mediaRecorder?.stop(); } catch {}
      return;
    }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio:true });
      const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus'
                 : MediaRecorder.isTypeSupported('audio/ogg;codecs=opus')  ? 'audio/ogg;codecs=opus'
                 : 'audio/webm';
      const mediaRecorder = new MediaRecorder(stream, { mimeType: mime });
      const chunks = [];
      const inicioTs = Date.now();
      recorderRef.current = { mediaRecorder, stream, inicioTs };
      mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
      mediaRecorder.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        setGravando(false); setGravandoSec(0);
        if (!chunks.length) return;
        const blob = new Blob(chunks, { type: mime });
        const reader = new FileReader();
        reader.onload = async (ev) => {
          const dataUrl = ev.target.result;
          const base64 = dataUrl.split(',')[1];
          const numero = (contato.id || '').replace('@s.whatsapp.net','').replace('@c.us','');
          const tsAgora = Date.now();
          const dur = Math.round((Date.now() - inicioTs) / 1000);
          setMsgsOtimistas(arr => [...arr, {
            id: 'opt_' + tsAgora, conversaId: contato.id, from:'out',
            text:'', time: evoHHMM(tsAgora), timestamp: tsAgora, pending:true,
            kind:'audio', meta:{ kind:'audio', ptt:true, seconds: dur },
          }]);
          setEnviando(true);
          try {
            const client = supaEnabled ? supa : evo;
            await client.sendWhatsAppAudio(numero, base64);
          } catch (err) {
            showToast?.('Erro ao enviar audio: ' + (err.message || ''), 'error');
            setMsgsOtimistas(arr => arr.map(o => o.id === 'opt_' + tsAgora ? {...o, failed:true, pending:false} : o));
          } finally { setEnviando(false); }
        };
        reader.readAsDataURL(blob);
      };
      mediaRecorder.start();
      setGravando(true);
      setGravandoSec(0);
      const timerId = setInterval(() => {
        if (!recorderRef.current) { clearInterval(timerId); return; }
        setGravandoSec(Math.round((Date.now() - recorderRef.current.inicioTs) / 1000));
      }, 250);
    } catch (e) {
      showToast?.('Permissao de microfone negada', 'warn');
    }
  };
  const cancelarGravacao = () => {
    try { recorderRef.current?.stream?.getTracks().forEach(t => t.stop()); } catch {}
    recorderRef.current = null;
    setGravando(false); setGravandoSec(0);
  };

  const filtrados = fonteContatos.filter(c => {
    if (busca && !c.name.toLowerCase().includes(busca.toLowerCase())) return false;
    if (filtro === 'nao_lidas') return c.unread > 0;
    if (filtro === 'ia') return !c.agenteId; // sem agente = IA cuidando
    if (filtro === 'minhas') return meuUserId && c.agenteId === meuUserId;
    return true;
  });

  const S = { // atalhos para tokens WA via CSS vars (usados via style)
    sidebarBg:   'var(--wa-sidebar-bg)',
    headerBg:    'var(--wa-header-bg)',
    chatBg:      'var(--wa-chat-bg)',
    inputBg:     'var(--wa-input-bg)',
    msgOut:      'var(--wa-msg-out-bg)',
    msgIn:       'var(--wa-msg-in-bg)',
    textPrimary: 'var(--wa-text-primary)',
    textSec:     'var(--wa-text-secondary)',
    border:      'var(--wa-border)',
    searchBg:    'var(--wa-search-bg)',
    activeBg:    'var(--wa-active-bg)',
    green:       'var(--wa-green)',
    unread:      'var(--wa-unread-bg)',
  };

  return (
    <div style={{ display:'grid', gridTemplateColumns:`320px 1fr ${sidebarAberta?'264px':'0'}`, height:'calc(100vh - 60px)', overflow:'hidden', margin:'-28px -32px', transition:'grid-template-columns .25s cubic-bezier(.22,1,.36,1)' }}>

      {/* ── Coluna 1: Lista ── */}
      <div style={{ display:'flex', flexDirection:'column', background:S.sidebarBg, borderRight:`1px solid ${S.border}`, overflow:'hidden' }}>
        {/* Header */}
        <div style={{ padding:'14px 16px 10px', background:S.headerBg, borderBottom:`1px solid ${S.border}`, flexShrink:0 }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10 }}>
            <span style={{ fontFamily:'var(--f-d)', fontWeight:700, fontSize:17, color:S.textPrimary, display:'flex', alignItems:'center', gap:8 }}>
              WhatsApp
              {/* Indicador de saude (verde=ok, vermelho=erro). So um pontinho. */}
              {(() => {
                const erroAtual = supaEnabled ? supaChatsState.error : realChatsError;
                const corPonto = erroAtual ? '#ff8585' : 'var(--wa-green)';
                return (
                  <span title={erroAtual ? `Erro: ${String(erroAtual).slice(0,60)}` : `${realChats.length} conversa${realChats.length===1?'':'s'} sincronizada${realChats.length===1?'':'s'}`} style={{
                    width:8, height:8, borderRadius:'50%', background:corPonto,
                    boxShadow:`0 0 6px ${corPonto}`, transition:'background .2s',
                  }}/>
                );
              })()}
            </span>
            <div style={{ display:'flex', gap:6, alignItems:'center' }}>
              {/* Atualizar conversas (so refetch do WhatsApp, nao recarrega pagina) */}
              <button onClick={(e)=>{
                const btn = e.currentTarget;
                btn.style.animation = 'spin-once .8s linear';
                window.dispatchEvent(new Event('brava_wa_refresh'));
                showToast?.('Conversas atualizadas', 'success');
                setTimeout(() => { btn.style.animation = ''; }, 800);
              }} title="Atualizar conversas (sem recarregar pagina)" style={{
                width:34, height:34, borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center',
                color: S.textSec, background:'none', border:'none', cursor:'pointer', transition:'background .15s',
              }}
                onMouseEnter={e=>e.currentTarget.style.background='rgba(128,128,128,.1)'}
                onMouseLeave={e=>e.currentTarget.style.background='transparent'}
              >
                <Icon name="RefreshCw" size={16}/>
              </button>
              {/* Sincronizar histórico — puxa conversas/mensagens dos últimos N dias do Evolution */}
              <button onClick={()=>setSyncOpen(true)} title="Sincronizar histórico do WhatsApp" style={{
                width:34, height:34, borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center',
                color: S.textSec, background:'none', border:'none', cursor:'pointer', transition:'background .15s',
              }}
                onMouseEnter={e=>e.currentTarget.style.background='rgba(128,128,128,.1)'}
                onMouseLeave={e=>e.currentTarget.style.background='transparent'}
              >
                <Icon name="History" size={17}/>
              </button>
              <button onClick={()=>setEscondeRuido(!escondeRuido)} title={escondeRuido ? 'Mostrando apenas conversas reais' : 'Mostrar tudo (inclusive ruido tecnico)'} style={{
                width:34, height:34, borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center',
                color: escondeRuido ? 'var(--wa-green)' : S.textSec,
                background:'none', border:'none', cursor:'pointer', transition:'background .15s',

            <React.Fragment key={m.id || i}>
              {mostraSeparador && (
                <div style={{display:'flex', justifyContent:'center', margin:'12px 0 8px'}}>
                  <div style={{
                    background:S.msgIn, color:S.textSec,
                    fontSize:11.5, fontFamily:'var(--f-m)', fontWeight:600, letterSpacing:'.04em',
                    padding:'5px 12px', borderRadius:7, boxShadow:'0 1px 2px rgba(0,0,0,.15)',
                    textTransform:'uppercase',
                  }}>{evoDayLabel(m.timestamp)}</div>
                </div>
              )}
            <div style={{ display:'flex', flexDirection: m.from==='out' ? 'row-reverse' : 'row', gap:6, marginBottom:2, alignItems:'flex-end' }}>
              {/* Avatar do CLIENTE nas msgs IN (igual app WhatsApp) */}
              {m.from==='in' && (!contato?.isGroup || i === 0 || (msgs[i-1] && msgs[i-1].from !== 'in')) && (
                <div style={{ flexShrink:0, marginBottom:4 }}>
                  {usandoReal
                    ? <EvoAvatar remoteJid={contato?.id} name={contato?.name} init={contato?.init} color={contato?.color} size={28}/>
                    : <div style={{ width:28, height:28, borderRadius:'50%', background:contato?.color, display:'flex', alignItems:'center', justifyContent:'center', fontSize:10, fontWeight:700, color:'#fff' }}>{contato?.init}</div>
                  }
                </div>
              )}
              {/* Spacer pra alinhar msgs IN consecutivas (sem avatar repetido) */}
              {m.from==='in' && !(!contato?.isGroup || i === 0 || (msgs[i-1] && msgs[i-1].from !== 'in')) && (
                <div style={{ width:28, flexShrink:0 }}/>
              )}
              {/* Avatar da IA nas msgs OUT (logo Brava em circulo preto) */}
              {m.from==='out' && m.ia && (
                <div title="Mensagem enviada pela IA Brava" style={{
                  width:28, height:28, borderRadius:'50%',
                  background:'#000',
                  display:'flex', alignItems:'center', justifyContent:'center',
                  flexShrink:0, marginBottom:4, padding:5,
                  boxShadow:'0 2px 4px rgba(0,0,0,.4)',
                  border:'1px solid rgba(255,255,255,.08)',
                  overflow:'hidden',
                }}>
                  <img src="/admin/app/brava-logo-white.png" alt="Brava"
                    style={{width:'100%', height:'auto', display:'block'}}
                    onError={(e) => {
                      // Fallback 1: caminho relativo
                      if (!e.target.dataset.r) { e.target.dataset.r='1'; e.target.src='app/brava-logo-white.png'; return; }
                      // Fallback 2: render BRAVA "B" se logo nao carrega
                      e.target.style.display='none';
                      e.target.parentElement.innerHTML = '<span style="color:#fff;font-size:13px;font-weight:800;font-family:Montserrat,sans-serif;letter-spacing:.5px">B</span>';
                    }}
                  />
                </div>
              )}
              <div style={{
                maxWidth:'65%', padding: m.kind === 'image' ? '4px' : '7px 12px 6px', fontSize:13.5, lineHeight:1.5,
                borderRadius: m.from==='out' ? '8px 0px 8px 8px' : '0px 8px 8px 8px',
                background: m.from==='out' ? S.msgOut : S.msgIn,
                color: m.from==='out' ? 'var(--wa-msg-out-text)' : 'var(--wa-msg-in-text)',
                boxShadow:'0 1px 2px rgba(0,0,0,.1)',
                opacity: m.pending ? .65 : (m.failed ? .8 : 1),
                position:'relative',
              }}>
                {/* Sender em grupo */}
                {m.from==='in' && contato?.isGroup && m.raw?.pushName && (
                  <div style={{fontSize:11.5, fontWeight:600, color: evoColorFromString(m.raw.key?.participant || m.raw.pushName), marginBottom:2}}>
                    {m.raw.pushName}
                  </div>
                )}
                {/* Imagem */}
                {m.kind === 'image' && (
                  <div>
                    {m.previewDataUrl
                      ? <img src={m.previewDataUrl} alt="" style={{maxWidth:'100%', borderRadius:6, display:'block'}}/>
                      : <MediaImage message={m} S={S}/>
                    }
                    {m.meta?.caption && <div style={{padding:'6px 8px 2px'}}>{m.meta.caption}</div>}
                  </div>
                )}
                {/* Audio */}
                {m.kind === 'audio' && <MediaAudio message={m} S={S}/>}
                {/* Documento com botao baixar real */}
                {m.kind === 'document' && <MediaDocument message={m} S={S}/>}
                {/* Outros tipos (video, sticker, location, contact) · Icons na paleta WhatsApp */}
                {(m.kind === 'video' || m.kind === 'sticker' || m.kind === 'location' || m.kind === 'contact') && (() => {
                  const tipoIcon =
                    m.kind === 'video'    ? 'Video'    :
                    m.kind === 'location' ? 'MapPin'   :
                    m.kind === 'contact'  ? 'UserCircle' : 'Smile';
                  const tipoLabel =
                    m.kind === 'video'    ? 'Vídeo'        :
                    m.kind === 'location' ? 'Localização'  :
                    m.kind === 'contact'  ? 'Contato'      : 'Figurinha';
                  return (
                    <div style={{display:'flex', alignItems:'center', gap:8, padding:'2px 0'}}>
                      <Icon name={tipoIcon} size={16} style={{color:'currentColor', opacity:.85}}/>
                      <span>{m.text || m.meta?.displayName || tipoLabel}</span>
                    </div>
                  );
                })()}
                {/* Texto puro */}
                {m.kind === 'text' && m.text}
                {/* Status/hora */}
                <div style={{ fontSize:10.5, color:S.textSec, marginTop:3, textAlign:'right', display:'flex', alignItems:'center', gap:4, justifyContent:'flex-end', padding: m.kind === 'image' ? '0 8px 4px' : 0 }}>
                  {m.failed && <span style={{color:'#ff8585', fontSize:9.5}}>falhou</span>}
                  {m.pending && !m.failed && <Icon name="Clock" size={10}/>}
                  {m.ia && <span style={{ fontSize:9.5, background:'rgba(37,211,102,.2)', color:'var(--wa-green)', padding:'1px 5px', borderRadius:3, fontFamily:'var(--f-m)' }}>IA</span>}
                  {m.time}
                  {m.from==='out' && !m.pending && !m.failed && (() => {
                    // 0=erro 1=pendente 2=enviado(✓) 3=entregue(✓✓) 4/5=lido(✓✓ azul)
                    // Heuristica: se status veio do banco, usa. Se nao, infere pelo tempo:
                    //   - < 5s   = enviado (1 check)
                    //   - >= 5s  = entregue (2 checks cinza) · quase sempre true em WhatsApp
                    // Isso espelha o comportamento visual do WhatsApp Web mesmo sem update real-time.
                    const idadeSeg = (Date.now() - (m.timestamp || 0)) / 1000;
                    let s = m.statusNum;
                    if (s == null) s = idadeSeg >= 5 ? 3 : 2;        // sem status: usa heuristica de tempo
                    else if (s <= 2 && idadeSeg >= 5) s = 3;          // upgrade visual: msg antiga com status enviado vira entregue
                    const cor = s >= 4 ? '#53BDEB' : 'currentColor';
                    if (s === 0) return <span style={{color:'#ff8585', fontSize:9.5}}>!</span>;
                    if (s === 1) return <Icon name="Clock" size={9} style={{opacity:.6}}/>;
                    if (s === 2) {
                      // 1 check (enviado, ainda nao entregue)
                      return <svg width="12" height="10" viewBox="0 0 12 11" fill={cor}><path d="M9.071.653a.75.75 0 0 0-1.036.218l-5.64 8.65-2.28-2.28a.75.75 0 0 0-1.06 1.06l2.95 2.95a.75.75 0 0 0 1.11-.077l6.17-9.46a.75.75 0 0 0-.214-1.061z"/></svg>;
                    }
                    // s >= 3 (entregue/lido) · 2 checks (azul se lido)
                    return <svg width="15" height="10" viewBox="0 0 16 11" fill={cor}><path d="M11.071.653a.75.75 0 0 0-1.036.218l-5.64 8.65-2.28-2.28a.75.75 0 0 0-1.06 1.06l2.95 2.95a.75.75 0 0 0 1.11-.077l6.17-9.46a.75.75 0 0 0-.214-1.061zm3 0a.75.75 0 0 0-1.036.218l-5.64 8.65-.52-.52a.75.75 0 1 0-1.06 1.06l1.19 1.19a.75.75 0 0 0 1.11-.077l6.17-9.46a.75.75 0 0 0-.214-1.061z"/></svg>;
                  })()}
                </div>
              </div>
            </div>
            </React.Fragment>
            );
          })}
          {/* Bolha "cliente digitando" (in) quando presence === 'composing' */}
          {presenceContato?.state === 'composing' && !iaProcessando && (
            <TypingBubble side="in" contato={contato} usandoReal={usandoReal} S={S}/>
          )}
          {/* Bolha "IA digitando" (out) quando IA esta processando */}
          {iaProcessando && (
            <TypingBubble side="out" showAvatar={true} S={S}/>
          )}
          <div ref={bottomRef}/>
        </div>

        {/* Input */}
        <div style={{ padding:'8px 12px', background:S.inputBg, borderTop:`1px solid ${S.border}`, flexShrink:0 }}>
          {iaAtiva ? (
            <div style={{ display:'flex', alignItems:'center', gap:6, padding:'5px 10px', marginBottom:6, background:'rgba(37,211,102,.08)', border:'1px solid rgba(37,211,102,.2)', borderRadius:6, fontSize:12, color:'var(--wa-green)' }}>
              <Icon name="Sparkles" size={12}/>
              <span>IA ativa · Para assumir, digite <strong style={{fontWeight:700}}>"Vamos lá"</strong></span>
            </div>
          ) : (
            <div style={{ display:'flex', alignItems:'center', gap:6, padding:'5px 10px', marginBottom:6, background:'rgba(186,117,23,.10)', border:'1px solid rgba(186,117,23,.28)', borderRadius:6, fontSize:12, color:'#E5A24A' }}>
              <Icon name="Pencil" size={12}/>
              <span>Você assumiu este chat · IA pausada. Pra devolver pra IA digite <strong style={{fontWeight:700}}>"."</strong></span>
            </div>
          )}
          {gravando ? (
            <div style={{display:'flex', alignItems:'center', gap:10, padding:'4px 4px'}}>
              <div onClick={cancelarGravacao} title="Cancelar gravacao" style={{
                width:36, height:36, borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center',
                color:'#A32D2D', cursor:'pointer',
              }}><Icon name="Trash2" size={18}/></div>
              <div style={{flex:1, display:'flex', alignItems:'center', gap:10, padding:'10px 14px', background:'rgba(163,45,45,.08)', borderRadius:21}}>
                <div style={{width:8, height:8, borderRadius:'50%', background:'#A32D2D', animation:'fade-up .8s infinite alternate'}}/>
                <span style={{fontSize:13, color:S.textPrimary, fontFamily:'var(--f-m)'}}>Gravando · {Math.floor(gravandoSec/60)}:{String(gravandoSec%60).padStart(2,'0')}</span>
              </div>
              <div onClick={toggleGravacao} title="Enviar" style={{
                width:42, height:42, borderRadius:'50%', background:'var(--wa-green)',
                display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', flexShrink:0,
              }}>
                <Icon name="Send" size={18} style={{color:'#fff'}}/>
              </div>
            </div>
          ) : (
            <div style={{ display:'flex', gap:8, alignItems:'center' }}>
              <div style={{ width:36, height:36, borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', color:S.textSec, cursor:'default', opacity:.5 }} title="Em breve">
                <Icon name="Smile" size={20}/>
              </div>
              <input ref={fileImgRef} type="file"
                accept="image/*,video/*,audio/*,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.csv,.zip,.rar,application/*"
                style={{display:'none'}}
                onChange={e=>{ const f = e.target.files?.[0]; e.target.value = ''; if (f) enviarArquivo(f); }}/>
              <div onClick={() => usandoReal ? fileImgRef.current?.click() : showToast?.('Configure a Evolution primeiro', 'warn')}
                style={{ width:36, height:36, borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', color:S.textSec, cursor:'pointer', transition:'background .15s' }}
                onMouseEnter={e=>e.currentTarget.style.background='rgba(128,128,128,.1)'}
                onMouseLeave={e=>e.currentTarget.style.background='transparent'}
                title="Anexar imagem, vídeo, áudio ou documento (PDF, Word, Excel...)"
              >
                <Icon name="Paperclip" size={20}/>
              </div>
              <input value={msg} onChange={e=>setMsg(e.target.value)}
                onKeyDown={e=>{ if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); enviar(); } }}
                placeholder={
                  iaProcessando ? 'IA está digitando…'
                  : (usandoReal ? `Digite uma mensagem para ${contato?.name || ''}` : 'Digite uma mensagem')
                }
                disabled={enviando}
                style={{
                  flex:1, height:42, padding:'0 16px', borderRadius:21,
                  background:S.searchBg, border:'none', outline:'none',
                  fontSize:14, color:S.textPrimary,
                  opacity: enviando ? .6 : 1,
                }}/>
              <div onClick={msg.trim() ? enviar : toggleGravacao} style={{
                width:42, height:42, borderRadius:'50%',
                background: 'var(--wa-green)',
                display:'flex', alignItems:'center', justifyContent:'center',
                cursor: 'pointer',
                flexShrink:0,
                opacity: enviando ? .6 : 1,
                transition:'background .15s',
              }} title={msg.trim() ? 'Enviar' : 'Gravar audio'}>
                <Icon name={msg.trim() ? 'Send' : 'Mic'} size={18} style={{color:'#fff'}}/>
              </div>
            </div>
          )}
        </div>
        </>)}
      </div>

      {/* ── Coluna 3: Contexto ── */}
      <PainelContato
        contato={contato}
        usandoReal={usandoReal}
        msgs={msgs}
        iaProcessando={iaProcessando}
        pipelineCols={pipelineCols}
        faseAtual={faseAtual}
        mudarFase={mudarFase}
        S={S}
      />

      {/* ── Modal: Sincronizar histórico ── */}
      {syncOpen && (
        <div onClick={(e) => { if (!syncState.running && e.target === e.currentTarget) setSyncOpen(false); }}
             style={{ position:'fixed', inset:0, background:'rgba(0,0,0,.65)', backdropFilter:'blur(4px)',
                      zIndex:10000, display:'flex', alignItems:'center', justifyContent:'center' }}>
          <div style={{ background:S.cardBg, borderRadius:14, padding:24, width:440, maxWidth:'92vw',
                        border:`1px solid ${S.border}`, boxShadow:'0 24px 60px rgba(0,0,0,.5)' }}>
            <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:14 }}>
              <Icon name="History" size={18} style={{color:'var(--wa-green)'}}/>
              <h3 style={{ margin:0, fontSize:16, color:S.textPrimary, fontFamily:'var(--f-d)', fontWeight:600 }}>
                Sincronizar histórico
              </h3>
            </div>
            <p style={{ fontSize:13, color:S.textSec, margin:'0 0 18px', lineHeight:1.55 }}>
              Puxa as conversas e mensagens dos últimos dias direto do Evolution.<br/>
              Instância: <b style={{color:S.textPrimary}}>{activeInstance?.nome || activeInstance?.evolution_instance_name || '—'}</b>
            </p>

            {!syncState.running && !syncState.done && (
              <div style={{ display:'flex', gap:8, marginBottom:8 }}>
                {[7, 10, 30].map(d => (
                  <button key={d} onClick={() => runSyncHistory(d)}
                    style={{ flex:1, padding:'12px 0', borderRadius:8, border:`1px solid ${S.border}`,
                             background:S.searchBg, color:S.textPrimary, fontFamily:'var(--f-d)',
                             fontSize:13.5, fontWeight:600, cursor:'pointer', transition:'all .15s' }}
                    onMouseEnter={e=>{ e.currentTarget.style.borderColor='var(--wa-green)'; e.currentTarget.style.background='rgba(37,211,102,.08)'; }}
                    onMouseLeave={e=>{ e.currentTarget.style.borderColor=S.border; e.currentTarget.style.background=S.searchBg; }}>
                    {d} dias
                  </button>
                ))}
              </div>
            )}

            {(syncState.running || syncState.done) && (
              <div style={{ margin:'14px 0' }}>
                <div style={{ display:'flex', justifyContent:'space-between', fontSize:12.5,
                              color:S.textSec, marginBottom:6, fontFamily:'var(--f-d)' }}>
                  <span>{syncState.processed}/{syncState.total || '?'} chats processados</span>
                  <span>{syncState.messages} msgs</span>
                </div>
                <div style={{ height:6, background:S.border, borderRadius:3, overflow:'hidden' }}>
                  <div style={{
                    height:'100%',
                    width: syncState.total ? `${Math.min(100, (syncState.processed/syncState.total)*100)}%` : '5%',
                    background: syncState.done ? 'var(--wa-green)' : 'linear-gradient(90deg,#7B3FE4,#1E90FF)',
                    transition:'width .35s ease',
                  }}/>
                </div>
              </div>
            )}

            {syncState.done && (
              <div style={{ padding:'12px 14px', background:'rgba(37,211,102,.08)', borderRadius:8,
                            border:'1px solid rgba(37,211,102,.25)', marginBottom:14 }}>
                <div style={{ fontSize:13, color:'var(--wa-green)', fontFamily:'var(--f-d)', fontWeight:600, marginBottom:3 }}>
                  ✓ Sincronização concluída
                </div>
                <div style={{ fontSize:12, color:S.textSec, lineHeight:1.5 }}>
                  {syncState.chats} chats · {syncState.messages} mensagens · últimos {syncState.days} dias
                </div>
                {syncState.errors.length > 0 && (
                  <div style={{ fontSize:11, color:'#ff8585', marginTop:6 }}>
                    {syncState.errors.length} alerta{syncState.errors.length>1?'s':''} (ver console)
                  </div>
                )}
              </div>
            )}

            <div style={{ display:'flex', justifyContent:'flex-end', gap:8, marginTop:6 }}>
              <button onClick={() => { if (!syncState.running) { setSyncOpen(false); setSyncState({ running:false, days:10, processed:0, total:0, chats:0, messages:0, errors:[], done:false }); } }}
                disabled={syncState.running}
                style={{ padding:'9px 18px', borderRadius:8, border:'none',
                         background: syncState.running ? 'rgba(128,128,128,.15)' : S.searchBg,
                         color: syncState.running ? S.textSec : S.textPrimary,
                         fontSize:13, fontFamily:'var(--f-d)', fontWeight:500,
                         cursor: syncState.running ? 'not-allowed' : 'pointer',
                         opacity: syncState.running ? .5 : 1, transition:'all .15s' }}>
                {syncState.done ? 'Fechar' : (syncState.running ? 'Sincronizando…' : 'Cancelar')}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* Modal Salvar/Editar contato manualmente */
function SalvarContatoModal({ jid, sugestaoNome, onClose }) {
  const existente = getContatoSalvo(jid);
  const [nome, setNome] = useState(existente?.nome || sugestaoNome || '');
  const [empresa, setEmpresa] = useState(existente?.empresa || '');
  const [tag, setTag] = useState(existente?.tag || '');
  const [nota, setNota] = useState(existente?.nota || '');

  const salvar = () => {
    if (!nome.trim()) { showToast?.('Informe o nome', 'warn'); return; }
    salvarContato(jid, {
      nome: nome.trim(),
      empresa: empresa.trim(),
      tag: tag.trim(),
      nota: nota.trim(),
    });
    showToast?.(`${nome.trim()} salvo`, 'success');
    onClose();
  };

  const remover = () => {
    if (!confirm(`Remover "${existente?.nome}" dos contatos salvos?`)) return;
    removerContatoSalvo(jid);
    showToast?.('Contato removido', 'success');
    onClose();
  };

  const lbl = { display:'block', fontSize:11, color:'var(--t3)', fontFamily:'var(--f-m)', textTransform:'uppercase', letterSpacing:'.06em', marginBottom:6 };
  const inp = { width:'100%', padding:'9px 12px', background:'var(--bg-3)', border:'1px solid var(--border)', borderRadius:8, color:'var(--t1)', fontSize:14, outline:'none', fontFamily:'var(--f-b)' };

  return (
    <div onClick={onClose} style={{position:'fixed', inset:0, background:'rgba(0,0,0,.65)', display:'grid', placeItems:'center', zIndex:9998, animation:'fade-in .15s'}}>
      <div onClick={e=>e.stopPropagation()} style={{
        width:'min(480px, 92vw)', background:'var(--bg-2)', border:'1px solid var(--border)',
        borderRadius:14, padding:'22px 24px', boxShadow:'0 24px 60px rgba(0,0,0,.5)'
      }}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:18}}>
          <div>
            <div style={{fontFamily:'var(--f-d)', fontSize:18, fontWeight:600, color:'var(--t1)'}}>
              {existente ? 'Editar contato' : 'Salvar contato'}
            </div>
            <div style={{fontSize:12, color:'var(--t3)', marginTop:3, fontFamily:'var(--f-m)'}}>{evoFormatPhone(jid) || jid}</div>
          </div>
          <button onClick={onClose} style={{background:'none', border:'none', cursor:'pointer', color:'var(--t3)', padding:6}}><Icon name="XCircle" size={18}/></button>
        </div>

        <div style={{display:'grid', gap:14}}>
          <div>
            <label style={lbl}>Nome *</label>
            <input style={inp} value={nome} onChange={e=>setNome(e.target.value)} placeholder="Nome completo" autoFocus/>
          </div>
          <div>
            <label style={lbl}>Empresa <span style={{color:'var(--t3)', textTransform:'none', letterSpacing:0, fontFamily:'var(--f-b)'}}>(opcional)</span></label>
            <input style={inp} value={empresa} onChange={e=>setEmpresa(e.target.value)} placeholder="Ex: Garcia Sadler"/>
          </div>
          <div>
            <label style={lbl}>Etiqueta <span style={{color:'var(--t3)', textTransform:'none', letterSpacing:0, fontFamily:'var(--f-b)'}}>(opcional)</span></label>
            <input style={inp} value={tag} onChange={e=>setTag(e.target.value)} placeholder="Cliente, Lead, Fornecedor..."/>
          </div>
          <div>
            <label style={lbl}>Nota <span style={{color:'var(--t3)', textTransform:'none', letterSpacing:0, fontFamily:'var(--f-b)'}}>(opcional)</span></label>
            <textarea style={{...inp, minHeight:60, resize:'vertical'}} value={nota} onChange={e=>setNota(e.target.value)} placeholder="Lembrete sobre este contato..."/>
          </div>
        </div>

        <div style={{display:'flex', gap:10, justifyContent:'space-between', marginTop:22, paddingTop:16, borderTop:'1px solid var(--border-soft)'}}>
          {existente
            ? <button onClick={remover} className="btn" style={{background:'transparent', color:'#ff8585', border:'1px solid #A32D2D55'}}><Icon name="Trash2" size={14}/>Remover</button>
            : <span/>}
          <div style={{display:'flex', gap:10}}>
            <button onClick={onClose} className="btn btn-outline">Cancelar</button>
            <button onClick={salvar} className="btn btn-primary"><Icon name="Check" size={14}/>{existente ? 'Salvar' : 'Salvar contato'}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* Painel direito reativo · dados reais do contato (numero, 1a msg, total),
   pipeline funcional, suporte a grupos com lista de participantes. */
function PainelContato({ contato, usandoReal, msgs, iaProcessando, pipelineCols, faseAtual, mudarFase, S }) {
  const presence = useEvoPresence(usandoReal ? contato?.id : null);
  const grupo = useEvoGroupMeta(usandoReal && contato?.isGroup ? contato.id : null);
  const salvo = useContatoSalvo(usandoReal && !contato?.isGroup ? contato?.id : null);
  const [salvarAberto, setSalvarAberto] = useState(false);

  if (!contato) {
    return (
      <div style={{ borderLeft:`1px solid ${S.border}`, overflowY:'auto', background:S.sidebarBg, padding:'16px 14px', color:S.textSec, fontSize:13, textAlign:'center' }}>
        Nenhuma conversa selecionada
      </div>
    );
  }

  // Dados reais derivados das mensagens carregadas
  const primMsg = msgs?.[0];
  const ultMsg = msgs?.[msgs.length-1];
  const totalMsgs = msgs?.length || 0;
  const primMsgDate = primMsg?.timestamp ? new Date(primMsg.timestamp) : null;
  const primMsgFmt = primMsgDate
    ? `${primMsgDate.toLocaleDateString('pt-BR')} ${primMsgDate.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}`
    : '–';

  const telefone = usandoReal
    ? (contato.isGroup ? '–' : (evoFormatPhone(evoResolveJid(contato.id)) || evoFormatPhone(contato.id) || '–'))
    : '+55 11 99999-9999';
  const origem = contato.isGroup ? 'Grupo WhatsApp' : (contato.ehLid ? 'Linked Device' : 'WhatsApp');

  // Pipeline default + match por nome
  const colsRender = pipelineCols || [
    {id:'lead',     nome:'Lead',          cor:'#6E6E78'},
    {id:'proposta', nome:'Proposta',      cor:'#BA7517'},
    {id:'impl',     nome:'Implementação', cor:'#7B3FE4'},
    {id:'ativo',    nome:'Ativo',         cor:'#1E90FF'},
    {id:'prod',     nome:'Em Produção',   cor:'#1D9E75'},
  ];

  return (
    <div style={{ borderLeft:`1px solid ${S.border}`, overflowY:'auto', background:S.sidebarBg, padding:'16px 14px', display:'flex', flexDirection:'column', gap:14 }}>
      {/* Header avatar + nome + presenca/membros */}
      <div style={{ textAlign:'center', paddingBottom:14, borderBottom:`1px solid ${S.border}` }}>
        <div style={{margin:'0 auto 10px', display:'flex', justifyContent:'center'}}>
          {usandoReal
            ? <EvoAvatar remoteJid={contato?.id} name={contato?.name} init={contato?.init} color={contato?.color} size={72}/>
            : <div style={{ width:72, height:72, borderRadius:'50%', background:contato?.color, display:'flex', alignItems:'center', justifyContent:'center', fontFamily:'var(--f-d)', fontWeight:700, fontSize:24, color:'#fff' }}>{contato?.init}</div>
          }
        </div>
        <div style={{ fontWeight:600, fontSize:16, color:S.textPrimary, display:'flex', alignItems:'center', justifyContent:'center', gap:6 }}>
          {contato?.name}
          {contato?.isGroup && <span style={{fontSize:9.5, padding:'1px 6px', borderRadius:4, background:'rgba(123,63,228,.18)', color:'var(--purple)', fontFamily:'var(--f-m)', fontWeight:600, letterSpacing:'.04em'}}>GRUPO</span>}
        </div>
        {usandoReal && !contato.isGroup && telefone && telefone !== '–' && telefone !== contato?.name && (
          <div style={{ fontSize:12, color:S.textSec, marginTop:4, fontFamily:'var(--f-m)' }}>{telefone}</div>
        )}
        {usandoReal && contato.isGroup && grupo?.participants && (
          <div style={{ fontSize:12, color:S.textSec, marginTop:4 }}>{grupo.participants.length} participantes</div>
        )}
        {iaProcessando ? (
          <div style={{ fontSize:11.5, color:'var(--wa-green)', marginTop:5, fontWeight:500, display:'inline-flex', alignItems:'center', gap:5 }}>
            <Icon name="Sparkles" size={11}/> IA digitando<DotsAnim color="var(--wa-green)"/>
          </div>
        ) : presence && (() => {
          const s = presence.state;
          const isComp = s === 'composing', isRec = s === 'recording';
          const isOnline = s === 'available', isOffline = s === 'unavailable';
          const cor = (isOnline || isComp || isRec) ? 'var(--wa-green)' : 'var(--wa-text-secondary)';
          return (
            <div style={{ fontSize:11.5, color:cor, marginTop:5, fontWeight:500, display:'inline-flex', alignItems:'center', gap:5, justifyContent:'center' }}>
              {isComp && <><Icon name="Pencil" size={11}/> digitando<DotsAnim color={cor}/></>}
              {isRec && <><Icon name="Mic" size={11}/> gravando áudio<DotsAnim color={cor}/></>}
              {isOnline && <><span style={{width:6, height:6, borderRadius:'50%', background:cor, display:'inline-block'}}/> online</>}
              {isOffline && <>offline</>}
              {!isComp && !isRec && !isOnline && !isOffline && <>{s}</>}
            </div>
          );
        })()}

        {/* Botao Salvar/Editar contato */}
        {usandoReal && !contato.isGroup && (
          <button onClick={() => setSalvarAberto(true)} style={{
            marginTop:12, padding:'7px 14px', borderRadius:8,
            background: salvo ? 'transparent' : 'var(--wa-green)',
            color: salvo ? 'var(--wa-green)' : '#fff',
            border: salvo ? '1px solid var(--wa-green)' : 'none',
            fontSize:12.5, fontWeight:600, fontFamily:'var(--f-b)',
            cursor:'pointer', display:'inline-flex', alignItems:'center', gap:6,
            transition:'all .15s',
          }}>
            <Icon name={salvo ? 'Pencil' : 'Plus'} size={13}/>
            {salvo ? 'Editar contato' : 'Salvar contato'}
          </button>
        )}
      </div>

      {/* Pipeline */}
      <div style={{ background:S.headerBg, borderRadius:10, padding:'12px 14px' }}>
        <div style={{ fontSize:11, color:S.textSec, fontWeight:600, marginBottom:10, letterSpacing:'.04em', display:'flex', justifyContent:'space-between' }}>
          <span>PIPELINE</span>
          {faseAtual && <span style={{color:faseAtual.cor||'var(--purple)', fontSize:10}}>● {faseAtual.nome}</span>}
        </div>
        {colsRender.map((col) => {
          const isAtual = faseAtual?.id === col.id;
          return (
            <div key={col.id} onClick={()=>mudarFase(col.id)} style={{
              display:'flex', alignItems:'center', gap:8, marginBottom:6,
              padding:'7px 9px', borderRadius:7, cursor:'pointer',
              background: isAtual ? (col.cor||'var(--purple)')+'18' : 'transparent',
              border: isAtual ? `1px solid ${(col.cor||'var(--purple)')}44` : '1px solid transparent',
              transition:'all .15s',
            }}
              onMouseEnter={e=>{ if(!isAtual) e.currentTarget.style.background='rgba(128,128,128,.08)'; }}
              onMouseLeave={e=>{ if(!isAtual) e.currentTarget.style.background='transparent'; }}
            >
              <div style={{ width:8, height:8, borderRadius:'50%', background: isAtual ? (col.cor||'var(--purple)') : S.border, flexShrink:0, transition:'background .15s' }}/>
              <span style={{ fontSize:13, color: isAtual ? S.textPrimary : S.textSec, fontWeight: isAtual ? 600 : 400 }}>{col.nome}</span>
              {isAtual && <span style={{ marginLeft:'auto', fontSize:10, color:col.cor||'var(--purple)', fontFamily:'var(--f-m)', fontWeight:700 }}>ATUAL</span>}
            </div>
          );
        })}
        {!faseAtual && usandoReal && (
          <div style={{ marginTop:4, fontSize:11, color:S.textSec }}>
            Clique numa fase para adicionar este contato ao pipeline
          </div>
        )}
      </div>

      {/* Informacoes reais */}
      <div style={{ background:S.headerBg, borderRadius:10, padding:'12px 14px' }}>
        <div style={{ fontSize:11, color:S.textSec, fontWeight:600, marginBottom:10, letterSpacing:'.04em' }}>INFORMAÇÕES</div>
        {[
          contato.isGroup
            ? ['Tipo', `Grupo · ${grupo?.participants?.length || '?'} membros`]
            : ['Telefone', telefone],
          salvo?.empresa ? ['Empresa', salvo.empresa] : null,
          salvo?.tag ? ['Etiqueta', salvo.tag] : null,
          ['Origem',   origem],
          ['Não lidas',contato.unread > 0 ? String(contato.unread) : '–'],
          ['1ª msg',   primMsgFmt],
          ['Última',   ultMsg?.time || '–'],
          ['Total',    totalMsgs > 0 ? `${totalMsgs} mensagem${totalMsgs===1?'':'s'}` : '–'],
        ].filter(Boolean).map(([k,v]) => (
          <div key={k} style={{ display:'flex', justifyContent:'space-between', marginBottom:8, gap:8 }}>
            <span style={{ fontSize:12.5, color:S.textSec, flexShrink:0 }}>{k}</span>
            <span style={{ fontSize:12.5, color:S.textPrimary, fontWeight:500, textAlign:'right', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{v}</span>
          </div>
        ))}
      </div>

      {/* Nota salva no contato */}
      {salvo?.nota && (
        <div style={{ background:'rgba(123,63,228,.06)', border:'1px solid rgba(123,63,228,.2)', borderRadius:10, padding:'12px 14px' }}>
          <div style={{ fontSize:11, color:'var(--purple)', fontWeight:600, marginBottom:6, letterSpacing:'.04em' }}>📝 NOTA DO CONTATO</div>
          <div style={{ fontSize:13, color:S.textPrimary, lineHeight:1.5, whiteSpace:'pre-wrap' }}>{salvo.nota}</div>
        </div>
      )}

      {/* Membros (se for grupo) */}
      {contato.isGroup && grupo?.participants && grupo.participants.length > 0 && (
        <div style={{ background:S.headerBg, borderRadius:10, padding:'12px 14px' }}>
          <div style={{ fontSize:11, color:S.textSec, fontWeight:600, marginBottom:10, letterSpacing:'.04em' }}>MEMBROS · {grupo.participants.length}</div>
          <div style={{display:'flex', flexDirection:'column', gap:6, maxHeight:200, overflowY:'auto'}}>
            {grupo.participants.slice(0, 30).map((p, i) => {
              const jid = p.id || p;
              const nome = p.notify || p.name || evoFormatPhone(jid);
              const isAdmin = p.admin === 'admin' || p.admin === 'superadmin';
              return (
                <div key={jid+'-'+i} style={{display:'flex', alignItems:'center', gap:8}}>
                  <EvoAvatar remoteJid={jid} name={nome} size={24}/>
                  <span style={{fontSize:12.5, color:S.textPrimary, flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{nome}</span>
                  {isAdmin && <span style={{fontSize:9.5, padding:'1px 5px', borderRadius:3, background:'rgba(123,63,228,.18)', color:'var(--purple)', fontFamily:'var(--f-m)'}}>ADMIN</span>}
                </div>
              );
            })}
            {grupo.participants.length > 30 && (
              <div style={{fontSize:11, color:S.textSec, textAlign:'center', paddingTop:6}}>
                +{grupo.participants.length - 30} outros
              </div>
            )}
          </div>
        </div>
      )}

      {/* Notas */}
      <div style={{ background:S.headerBg, borderRadius:10, padding:'12px 14px' }}>
        <div style={{ fontSize:11, color:S.textSec, fontWeight:600, marginBottom:8, letterSpacing:'.04em' }}>ANOTAÇÕES</div>
        <textarea placeholder="Adicionar nota..." style={{
          width:'100%', minHeight:60, background:'transparent', border:'none', outline:'none',
          fontSize:13, color:S.textPrimary, resize:'vertical', lineHeight:1.6,
        }}/>
      </div>

      {salvarAberto && (
        <SalvarContatoModal
          jid={contato.id}
          sugestaoNome={evoTemNomeReal(contato.name) ? contato.name : ''}
          onClose={() => setSalvarAberto(false)}
        />
      )}
    </div>
  );
}

                    <span style={{fontSize:10.5, color:'var(--t3)', fontFamily:'var(--f-m)'}}>#{c.id}</span>
                  </div>
                  <div style={{fontSize:12.5, color:'var(--t2)', marginTop:3, lineHeight:1.4}}>{c.titulo}</div>

              </div>

                <div style={{padding:'12px 14px', background:'rgba(123,63,228,.08)', border:'1px solid rgba(123,63,228,.2)', borderRadius:10, fontSize:13.5, color:'var(--t1)', lineHeight:1.55}}>

              <button className="btn btn-primary"><Icon name="Send" size={14}/>Enviar</button>

        )}
      </div>
    </div>
  );
}

/* ─── Helper: perfil do usuario (nome, cargo, email, telefone) ─── */
function getUserPerfil() {
  try {
    const s = localStorage.getItem('brava_user_perfil');
    return s ? JSON.parse(s) : {};
  } catch { return {}; }
}
function setUserPerfilStore(perfil) {
  try {
    // 1. Persiste perfil "rico" (nome, cargo, email, telefone)
    localStorage.setItem('brava_user_perfil', JSON.stringify(perfil));
    // 2. Sincroniza com a SESSAO em memoria + storage (para SaudacaoDinamica
    //    e tudo que le SESSAO.nome / SESSAO.email ver o valor novo na hora
    //    e tambem apos um reload).
    if (typeof SESSAO === 'object' && SESSAO) {
      if (perfil.nome)     SESSAO.nome  = perfil.nome;
      if (perfil.email)    SESSAO.email = perfil.email;
      if (perfil.cargo)    SESSAO.role  = perfil.cargo;
    }
    try {
      const s = JSON.parse(localStorage.getItem('brava_sessao') || '{}');
      if (perfil.nome)  s.nome  = perfil.nome;
      if (perfil.email) s.email = perfil.email;
      if (perfil.cargo) s.role  = perfil.cargo;
      localStorage.setItem('brava_sessao', JSON.stringify(s));
    } catch {}
    // 3. Notifica componentes
    window.dispatchEvent(new Event('brava_perfil_changed'));
  } catch (e) { console.warn('Falha ao salvar perfil', e); }
}
function getNomeExibicao() {
  const p = getUserPerfil();
  return p.nome || SESSAO.nome || 'Jhonattan Itiuba';
}
function useNomeExibicao() {
  const [nome, setNome] = React.useState(() => getNomeExibicao());
  React.useEffect(() => {
    const refresh = () => setNome(getNomeExibicao());
    window.addEventListener('brava_perfil_changed', refresh);
    window.addEventListener('storage', refresh);
    return () => {
      window.removeEventListener('brava_perfil_changed', refresh);
      window.removeEventListener('storage', refresh);
    };
  }, []);
  return nome;
}

/* ─── Helper: foto do usuario (por email, nao vaza foto de outro user).
   Prioridade:
   1) upload do user logado (localStorage 'brava_user_photo:<email>')
   2) foto default do mapa BRAVA_USERS pelo email
   3) null (vira iniciais coloridas) ─── */
function _emailAtual() {
  try {
    const s = JSON.parse(localStorage.getItem('brava_sessao') || '{}');
    return String(s.email || '').toLowerCase().trim();
  } catch { return ''; }
}

/* Hook: ID do usuario logado (resolve via email -> usuarios.id).
   Resiliente: re-resolve quando email muda no localStorage (perfil editado)
   e quando SDK Supabase carrega tarde. */
function useUsuarioLogadoId() {
  const [id, setId] = React.useState(null);
  const [email, setEmail] = React.useState(() => _emailAtual());

  // Escuta mudancas de perfil/sessao
  React.useEffect(() => {
    const refresh = () => setEmail(_emailAtual());
    window.addEventListener('brava_perfil_changed', refresh);
    window.addEventListener('storage', refresh);
    return () => {
      window.removeEventListener('brava_perfil_changed', refresh);
      window.removeEventListener('storage', refresh);
    };
  }, []);

  React.useEffect(() => {
    if (!email) return;
    let alive = true;
    let timer = null;
    const tentar = async () => {
      const cli = getSupa();
      if (!cli) {
        // SDK ainda nao carregou, tenta de novo em 200ms
        timer = setTimeout(tentar, 200);
        return;
      }
      try {
        const { data } = await cli.from('usuarios').select('id').eq('email', email).maybeSingle();
        if (alive && data?.id) {
          setId(data.id);
          console.log('[Brava] Usuario logado resolvido:', email, '->', data.id);
        } else if (alive) {
          console.warn('[Brava] Usuario nao encontrado pra email:', email);
        }
      } catch (e) {
        console.warn('[Brava] Erro resolvendo usuario:', e.message);
      }
    };
    tentar();
    return () => { alive = false; if (timer) clearTimeout(timer); };
  }, [email]);

  return id;
}
function getUserPhoto() {
  try {
    const email = _emailAtual();
    // 1) upload local do user atual
    if (email) {
      const local = localStorage.getItem('brava_user_photo:' + email);
      if (local) return local;
    }
    // 2) fallback legacy (chave antiga sem email) - so usa se for o user diretoria@
    //    (pra nao mostrar foto antiga do Jhonattan quando Priscilla logar)
    if (email === 'diretoria@brava.company') {
      const legacy = localStorage.getItem('brava_user_photo');
      if (legacy) return legacy;
    }
    // 3) foto default do mapa BRAVA_USERS
    const found = BRAVA_USERS[email];
    if (found?.foto) return found.foto;
    return null;
  } catch { return null; }
}
function setUserPhoto(dataUrl) {
  try {
    const email = _emailAtual();
    if (!email) {
      console.warn('Sem email na sessao, nao salvou foto');
      return;
    }
    const key = 'brava_user_photo:' + email;
    if (dataUrl) localStorage.setItem(key, dataUrl);
    else localStorage.removeItem(key);
    window.dispatchEvent(new Event('brava_photo_changed'));
  } catch (e) { console.warn('Falha ao salvar foto', e); }
}

// ─── INSTANCIA ATIVA (multi-WhatsApp) ──────────────────────────────────
// Permite trocar entre WhatsApps (Brava Principal, Jhonattan, etc) no header.
// O id da instancia ativa fica no localStorage. Todos os hooks abaixo (que
// usam SUPA_CFG.instanciaId via getter) re-renderizam ao trocar.
const ACTIVE_INSTANCE_KEY = 'brava_active_instance_id';
const DEFAULT_INSTANCE_ID = 'a7133174-d7f5-4623-ab0a-9938f5827f32'; // Brava Principal (fallback)
function getActiveInstanceId() {
  try { return localStorage.getItem(ACTIVE_INSTANCE_KEY) || DEFAULT_INSTANCE_ID; }
  catch { return DEFAULT_INSTANCE_ID; }
}
function setActiveInstanceId(id) {
  if (!id) localStorage.removeItem(ACTIVE_INSTANCE_KEY);
  else     localStorage.setItem(ACTIVE_INSTANCE_KEY, id);
  window.dispatchEvent(new Event('brava_active_instance_changed'));
}
function useActiveInstanceId() {
  const [id, setId] = React.useState(getActiveInstanceId);
  React.useEffect(() => {
    const fn = () => setId(getActiveInstanceId());
    window.addEventListener('brava_active_instance_changed', fn);
    window.addEventListener('storage', fn);
    return () => {
      window.removeEventListener('brava_active_instance_changed', fn);
      window.removeEventListener('storage', fn);
    };
  }, []);
  return id;
}

let _supa = null;
function getSupa() {
  if (_supa) return _supa;
  if (typeof window.supabase === 'undefined') return null;
  // ✨ persistSession + autoRefreshToken TRUE → JWT vai junto nas queries (RLS funciona)
  _supa = window.supabase.createClient(SUPA_CFG.url, SUPA_CFG.publishableKey, {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      storageKey: 'brava_sb_auth',
      detectSessionInUrl: false,
    },
    realtime: { params: { eventsPerSecond: 20 } },
  });
  return _supa;
}

// ✨ Hook: garante que ha uma sessao Supabase Auth ativa.
// Se nao houver, mostra modal de login (email pre-preenchido).
// Apos login, JWT eh persistido e queries com RLS funcionam.
function useSupaAuthGate() {
  const [needLogin, setNeedLogin] = React.useState(false);
  const [loading, setLoading] = React.useState(true);
  const [userId, setUserId] = React.useState(null);

  React.useEffect(() => {
    const cli = getSupa();
    if (!cli) { setLoading(false); return; }
    let alive = true;
    cli.auth.getSession().then(({ data }) => {
      if (!alive) return;
      const sess = data?.session;
      if (sess?.user?.id) {
        setUserId(sess.user.id);
        setNeedLogin(false);
      } else {
        setNeedLogin(true);
      }
      setLoading(false);
    });
    const { data: sub } = cli.auth.onAuthStateChange((_evt, session) => {
      if (!alive) return;
      if (session?.user?.id) {
        setUserId(session.user.id);
        setNeedLogin(false);
      } else {
        setUserId(null);
        setNeedLogin(true);
      }
    });
    return () => { alive = false; sub?.subscription?.unsubscribe?.(); };
  }, []);

  return { needLogin, loading, userId };
}

/* ── Chamada da Edge Function wa-proxy (envia comandos pra Evolution) ──
   IMPORTANTE: a instancia_id e capturada AGORA (antes do await), nao no
   momento do request. Se o usuario trocar de WhatsApp entre o disparo da
   chamada e a chegada da resposta, garantimos que a operacao foi feita
   na instancia que o usuario via quando clicou. */
async function supaProxyCall({ path, method = 'GET', body, instanceId }) {
  // Snapshot da instancia ativa no momento da chamada
  const instanciaIdAtCall = instanceId || SUPA_CFG.instanciaId;
  // ✨ Pega JWT da sessao Supabase Auth (precisa ser JWT real, nao publishable key)
  let bearer = SUPA_CFG.publishableKey;
  try {
    const cli = getSupa();
    if (cli) {
      const { data } = await cli.auth.getSession();
      if (data?.session?.access_token) bearer = data.session.access_token;
    }
  } catch {}
  const res = await fetch(`${SUPA_CFG.url}/functions/v1/wa-proxy`, {
    method: 'POST',
    headers: {
      'content-type': 'application/json',
      'apikey': SUPA_CFG.publishableKey,
      'authorization': `Bearer ${bearer}`,
    },
    body: JSON.stringify({ instancia_id: instanciaIdAtCall, path, method, body }),
  });
  const text = await res.text();
  let data; try { data = text ? JSON.parse(text) : null; } catch { data = text; }
  if (!res.ok) {
    const msg = (data && (data.error || data.message)) || text || `HTTP ${res.status}`;
    throw new Error(typeof msg === 'string' ? msg : JSON.stringify(msg));
  }
  return data;
}

/* ── Hooks Realtime: chats e mensagens do banco com push automatico ── */
function useSupaChats() {
  const [chats, setChats] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [error, setError] = React.useState(null);
  const activeInstanceId = useActiveInstanceId(); // re-render ao trocar de WhatsApp

  React.useEffect(() => {
    const cli = getSupa();
    if (!cli) {
      // Aguarda o SDK carregar
      const t = setInterval(() => { if (getSupa()) { clearInterval(t); setLoading(l => l); } }, 200);
      return () => clearInterval(t);
    }
    // Limpa chats antes de carregar a nova instancia (evita flash do conteudo antigo)
    setChats([]); setLoading(true);
    let alive = true;
    const carregar = async () => {
      try {
        const { data, error } = await cli
          .from('wa_chats').select('*')
          .eq('instancia_id', activeInstanceId)
          .order('last_message_ts', { ascending: false, nullsFirst: false })
          .limit(300);
        if (!alive) return;
        if (error) throw error;
        setChats(data || []);
        setError(null);

        // ✨ Carrega fotos de perfil dos contatos e popula o cache compartilhado
        //    (EvoAvatar lê de _evoPicCache; modo Supabase precisa popular ele)
        try {
          const { data: contatos } = await cli
            .from('wa_contatos')
            .select('jid, profile_pic_url')
            .eq('instancia_id', activeInstanceId)
            .not('profile_pic_url', 'is', null)
            .limit(2000);
          if (alive && contatos && typeof _evoPicCache !== 'undefined') {
            for (const ct of contatos) {
              if (ct.jid && ct.profile_pic_url) {
                _evoPicCache.set(ct.jid, { url: ct.profile_pic_url, ts: Date.now() });
              }
            }
            if (typeof evoNotifyPic === 'function') evoNotifyPic();
            else if (typeof _evoPicSubs !== 'undefined') {
              _evoPicSubs.forEach(fn => { try { fn(); } catch {} });
            }
          }
        } catch (picErr) {
          console.warn('[supaChats] fotos:', picErr);
        }
      } catch (e) { if (alive) setError(e.message || String(e)); }
      finally { if (alive) setLoading(false); }
    };
    carregar();

    // Realtime: re-fetch suave a cada mudanca
    let debounceT = null;
    const refetch = () => { clearTimeout(debounceT); debounceT = setTimeout(carregar, 250); };
    const channel = cli
      .channel(`rt:wa_chats:${activeInstanceId}`)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'wa_chats', filter: `instancia_id=eq.${activeInstanceId}` }, refetch)
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'wa_mensagens', filter: `instancia_id=eq.${activeInstanceId}` }, refetch)
      .subscribe();

    // Evento manual de refresh (botao Atualizar no header)
    window.addEventListener('brava_wa_refresh', refetch);

    return () => {
      alive = false; clearTimeout(debounceT);
      cli.removeChannel(channel);
      window.removeEventListener('brava_wa_refresh', refetch);
    };
  }, [activeInstanceId]);

  return { chats, loading, error };
}
