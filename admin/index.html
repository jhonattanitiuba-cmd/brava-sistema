<!DOCTYPE html>
<!--
  ╔═══════════════════════════════════════════════════════════════════════╗
  ║  REGRAS DE ESTILO DESTE ARQUIVO (NUNCA QUEBRAR)                       ║
  ║                                                                       ║
  ║  1. NUNCA usar travessão longo (—) em texto, UI ou comentários.       ║
  ║     Usar separador centro-ponto (·), dois-pontos (:), parênteses,     ║
  ║     ponto-final ou hífen normal (-).                                  ║
  ║     Motivo: travessão dá cara de texto gerado por IA.                 ║
  ║                                                                       ║
  ║  2. NUNCA usar fontStyle:italic em nenhum elemento.                   ║
  ║     Itálico em UI parece artigo de blog, não software.                ║
  ║                                                                       ║
  ║  3. Fonte única no sistema inteiro: Montserrat.                       ║
  ║     Nada de Inter, Space Grotesk, JetBrains Mono.                     ║
  ║                                                                       ║
  ║  4. Emojis genéricos (😊 😉 🎤 ✏️) são PROIBIDOS na UI.               ║
  ║     Usar componente <Icon name="..."/> sempre.                        ║
  ║     Exceção: preview de tipo de mídia na lista de conversas           ║
  ║              (📷 Foto, 🎥 Vídeo) que imita WhatsApp Web.              ║
  ║                                                                       ║
  ║  5. Paleta:                                                           ║
  ║     - Inbox WhatsApp -> tokens --wa-* (paleta do app WhatsApp)        ║
  ║     - Resto do admin -> tokens --purple/--blue (identidade Brava)     ║
  ╚═══════════════════════════════════════════════════════════════════════╝
-->
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Brava Company © Admin</title>
<link rel="icon" type="image/png" href="/clientes/_logos/faveicon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
/* ─── Tokens fixos ─── */
:root {
  --purple:#7B3FE4; --blue:#1E90FF;
  --grad:linear-gradient(90deg,#7B3FE4 0%,#1E90FF 100%);
  --success:#1D9E75; --warning:#BA7517; --danger:#A32D2D; --info:#185FA5;
  --f-d:"Montserrat",sans-serif; --f-b:"Montserrat",sans-serif; --f-m:"Montserrat",sans-serif;
  --sidebar:240px; --header:60px;
}

/* ─── Modo escuro (default) ─── */
:root, [data-theme="dark"] {
  --bg:#000000; --bg-1:#0E0E14; --bg-2:#15151E; --bg-3:#1B1B27;
  --border:#2A2A3A; --border-soft:#1F1F2A;
  --t1:#F5F5F7; --t2:#A0A0AA; --t3:#6E6E78;
  --shadow:0 1px 0 rgba(255,255,255,.04) inset,0 8px 24px rgba(0,0,0,.45);
  --logo:url("app/brava-logo-white.png");
}

/* ─── Modo claro ─── */
[data-theme="light"] {
  --bg:#F0F0F0; --bg-1:#F0F0F0; --bg-2:#FFFFFF; --bg-3:#F5F5F5;
  --border:#D8D8D8; --border-soft:#E6E6E6;
  --t1:#0A0A0F; --t2:#4A4A52; --t3:#8E8E94;
  --shadow:0 1px 2px rgba(20,20,40,.06),0 6px 20px rgba(20,20,40,.06);
  --logo:url("app/brava-logo-dark.png");
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:var(--f-b);font-size:15px;-webkit-font-smoothing:antialiased;transition:background .2s,color .2s;}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,select,textarea{font:inherit;color:inherit;}
a{color:inherit;text-decoration:none;}
svg{display:block;flex-shrink:0;}

/* ─── WhatsApp tokens (paleta OFICIAL WhatsApp Web dark, conforme print do usuario) ─── */
:root, [data-theme="dark"] {
  --wa-sidebar-bg:    #111B21;             /* sidebar lista de conversas */
  --wa-sidebar-hover: rgba(255,255,255,.04);
  --wa-header-bg:     #202C33;             /* topo do chat + topo da lista */
  --wa-chat-bg:       #0B141A;             /* area das mensagens (com pattern branco translucido) */
  --wa-input-bg:      #202C33;             /* barra de digitar */
  --wa-msg-out-bg:    #005C4B;             /* bolha saida (verde escuro oficial Web) */
  --wa-msg-in-bg:     #202C33;             /* bolha entrada (mesmo do header) */
  --wa-msg-out-text:  #E9EDEF;
  --wa-msg-in-text:   #E9EDEF;
  --wa-text-primary:  #E9EDEF;
  --wa-text-secondary:#8696A0;
  --wa-border:        #1F2C34;             /* separadores sutis (mais escuro que header) */
  --wa-search-bg:     #202C33;             /* search igual header */
  --wa-active-bg:     #2A3942;             /* conversa selecionada (cinza mais claro) */
  --wa-green:         #00A884;             /* verde teal oficial do app (botoes, mic, send) */
  --wa-green-dark:    #008069;
  --wa-green-bright:  #25D366;             /* verde vivo usado SO no badge de nao-lidas */
  --wa-unread-bg:     #25D366;             /* badge nao-lidas (verde vivo, intencional) */
}
[data-theme="light"] {
  --wa-sidebar-bg:    #FFFFFF;             /* lista branca pura */
  --wa-sidebar-hover: rgba(11,20,26,.04);
  --wa-header-bg:     #F0F2F5;             /* topo cinza sutil */
  --wa-chat-bg:       #EFEAE2;             /* chat bege */
  --wa-input-bg:      #F0F2F5;
  --wa-msg-out-bg:    #D9FDD3;             /* verde claro saida */
  --wa-msg-in-bg:     #FFFFFF;
  --wa-msg-out-text:  #111B21;
  --wa-msg-in-text:   #111B21;
  --wa-text-primary:  #111B21;
  --wa-text-secondary:#667781;
  --wa-border:        #E9EDEF;
  --wa-search-bg:     #F0F2F5;
  --wa-active-bg:     #F0F2F5;
  --wa-green:         #008069;             /* verde escuro oficial WhatsApp Web light (botoes, mic, send) */
  --wa-green-dark:    #128C7E;
  --wa-green-bright:  #25D366;             /* verde vivo usado SO no badge de nao-lidas */
  --wa-unread-bg:     #25D366;
}

/* Pattern do fundo do chat · branco translucido em dark (igual WhatsApp Web), preto sutil em light */
.wa-chat-pattern {
  background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.035'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
[data-theme="light"] .wa-chat-pattern {
  background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23000000' fill-opacity='0.025'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4h-4z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}

/* ─── Layout ─── */
.app{display:grid;grid-template-columns:var(--sidebar) 1fr;grid-template-rows:var(--header) 1fr;height:100vh;overflow:hidden;}

/* ─── Sidebar · slide horizontal natural (esquerda quando fecha, da esquerda quando abre) ─── */
.sidebar{
  grid-row:1/-1;
  background:#000000;
  border-right:1px solid #1F1F2A;
  display:flex;flex-direction:column;
  overflow:hidden;
  transition: width .5s cubic-bezier(.65,0,.35,1),
              opacity .4s cubic-bezier(.22,1,.36,1),
              transform .5s cubic-bezier(.65,0,.35,1),
              border-color .35s ease;
  transform-origin: left center;
}
.sidebar.collapsed{
  /* Fechando: encolhe largura E desliza pra esquerda E fade */
  width:0; overflow:hidden; border-right:none;
  opacity:0; transform: translateX(-32px);
}
.sidebar.collapsed > * { pointer-events: none; }
/* Abrindo: children entram da esquerda em cascata */
.sidebar:not(.collapsed) > * {
  animation: sidebar-slide-in .5s cubic-bezier(.22,1,.36,1) both;
}
.sidebar:not(.collapsed) > *:nth-child(1) { animation-delay: .05s; }
.sidebar:not(.collapsed) > *:nth-child(2) { animation-delay: .12s; }
.sidebar:not(.collapsed) > *:nth-child(3) { animation-delay: .20s; }
.sidebar:not(.collapsed) > *:nth-child(4) { animation-delay: .28s; }
@keyframes sidebar-slide-in {
  0% { opacity: 0; transform: translateX(-20px); }
  100% { opacity: 1; transform: translateX(0); }
}

/* ─── Animacoes de entrada do Dashboard ───
   Importante: o splash de login (#brava-loading) fica visivel por uns segundos
   no boot. As animacoes ficam PAUSADAS ate o splash sumir (body.boot-ready),
   pra que o usuario as veja efetivamente. */
@keyframes dash-fade-up {
  0%   { opacity: 0; transform: translateY(16px); }
  100% { opacity: 1; transform: translateY(0); }
}
.page-head           { opacity: 0; }
.kpi-grid > *        { opacity: 0; }
.grid-mrr > *        { opacity: 0; }
.grid-3 > *          { opacity: 0; }

body.boot-ready .page-head    { animation: dash-fade-up .6s cubic-bezier(.22,1,.36,1) both; }
body.boot-ready .kpi-grid > * { animation: dash-fade-up .55s cubic-bezier(.22,1,.36,1) both; }
body.boot-ready .kpi-grid > *:nth-child(1) { animation-delay: .08s; }
body.boot-ready .kpi-grid > *:nth-child(2) { animation-delay: .16s; }
body.boot-ready .kpi-grid > *:nth-child(3) { animation-delay: .24s; }
body.boot-ready .kpi-grid > *:nth-child(4) { animation-delay: .32s; }
body.boot-ready .grid-mrr > * { animation: dash-fade-up .6s cubic-bezier(.22,1,.36,1) both; animation-delay: .45s; }
body.boot-ready .grid-mrr > *:nth-child(2) { animation-delay: .55s; }
body.boot-ready .grid-3 > * { animation: dash-fade-up .6s cubic-bezier(.22,1,.36,1) both; animation-delay: .7s; }
body.boot-ready .grid-3 > *:nth-child(2) { animation-delay: .78s; }
body.boot-ready .grid-3 > *:nth-child(3) { animation-delay: .86s; }

/* Respeita prefers-reduced-motion */
@media (prefers-reduced-motion: reduce) {
  .page-head, .kpi-grid > *, .grid-mrr > *, .grid-3 > * { animation: none !important; opacity: 1 !important; }
  .sidebar:not(.collapsed) > * { animation: none !important; }
}

.sidebar__nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 10px;border-radius:10px;
  font-size:13.5px;color:#A0A0AA;font-weight:500;
  cursor:pointer;transition:background .15s,color .15s;
  position:relative;
}
.nav-item:hover{background:rgba(255,255,255,.06);color:#F5F5F7;}
.nav-item.active{
  background:rgba(123,63,228,.18);
  color:#F5F5F7;
}
.nav-item.active::before{
  content:'';position:absolute;left:0;top:20%;bottom:20%;
  width:2.5px;border-radius:999px;
  background:var(--grad);
}
.nav-badge{
  margin-left:auto;min-width:18px;height:18px;
  padding:0 5px;border-radius:999px;
  background:var(--grad);color:#fff;
  font-family:var(--f-m);font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
}
.nav-divider{height:1px;background:#1F1F2A;margin:8px 10px;}
.nav-item.danger:hover{background:rgba(163,45,45,.18);color:#fca5a5;}

/* ─── Header ─── */
/* ─── Header · sempre preto ─── */
.header{
  background:#000000;
  border-bottom:1px solid #1F1F2A;
  display:flex;align-items:center;gap:16px;
  padding:0 28px;
}
.header__breadcrumb{flex:0 0 auto;display:flex;align-items:center;gap:8px;font-size:13px;color:#6E6E78;}
.header__breadcrumb span{color:#F5F5F7;font-weight:600;}
.header__search{
  display:flex;align-items:center;gap:8px;
  padding:7px 14px;
  background:#0E0E14;border:1px solid #2A2A3A;border-radius:8px;
  font-size:13px;color:#6E6E78;
  width:260px;white-space:nowrap;flex-shrink:0;
  cursor:text;transition:border-color .15s;
}
.header__search:hover{border-color:#A0A0AA;}
.header__actions{display:flex;align-items:center;gap:8px;}
.header__icon{
  width:34px;height:34px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  color:#A0A0AA;cursor:pointer;transition:background .15s,color .15s;
  position:relative;
}
.header__icon:hover{background:#1B1B27;color:#F5F5F7;}
.header__notif{
  position:absolute;top:5px;right:5px;
  width:8px;height:8px;border-radius:50%;
  background:var(--purple);border:2px solid #000;
}
.header__avatar{
  width:32px;height:32px;border-radius:50%;
  background:var(--grad);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--f-d);font-weight:700;font-size:12px;color:#fff;
  cursor:pointer;flex-shrink:0;
}

/* ─── Main content ─── */
.main{overflow-y:auto;padding:28px 32px;background:var(--bg);color:var(--t1);}
.page{max-width:1440px;margin:0 auto;}

/* ─── Page header ─── */
.page-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;gap:16px;}
.page-head__title{font-family:var(--f-d);font-size:22px;font-weight:600;letter-spacing:-.02em;}
.page-head__sub{font-size:13px;color:var(--t2);margin-top:3px;}
.page-head__actions{display:flex;gap:8px;flex-shrink:0;}

/* ─── Botões ─── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:7px;
  padding:0 16px;height:36px;border-radius:9px;
  font-size:13.5px;font-weight:500;
  transition:transform .12s,box-shadow .15s,opacity .15s;
  white-space:nowrap;
}
.btn:hover{transform:translateY(-1px);}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--grad);color:#fff;box-shadow:0 4px 14px rgba(123,63,228,.3);}
.btn-primary:hover{box-shadow:0 8px 20px rgba(123,63,228,.45);}
.btn-outline{border:1px solid var(--border);color:var(--t2);background:transparent;}
.btn-outline:hover{border-color:var(--t2);color:var(--t1);}
.btn-ghost{color:var(--t2);}
.btn-ghost:hover{background:var(--bg-2);color:var(--t1);}

/* ─── KPI Cards ─── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.kpi{
  background:var(--bg-2);border:1px solid var(--border-soft);border-radius:14px;
  padding:20px 22px;
  transition:border-color .2s,transform .2s;
  cursor:default;
}
.kpi:hover{border-color:rgba(123,63,228,.3);transform:translateY(-2px);}
.kpi__label{font-size:12.5px;color:var(--t2);font-weight:500;font-family:var(--f-b);letter-spacing:0;text-transform:none;}
.kpi__value{font-family:var(--f-d);font-size:32px;font-weight:700;letter-spacing:-.03em;margin:8px 0 4px;line-height:1;color:var(--t1);}
.kpi__value.grad{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.kpi__delta{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:500;}
.kpi__delta.up{color:var(--success);}
.kpi__delta.down{color:var(--danger);}
.kpi__icon{float:right;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-top:-4px;}

/* Responsivo: 4 col → 2 col em tablet → 1 col em mobile */
@media (max-width: 1080px){
  .kpi-grid{grid-template-columns:repeat(2,1fr);}
  .kpi__value{font-size:26px;}
}
@media (max-width: 560px){
  .kpi-grid{grid-template-columns:1fr;gap:10px;}
  .kpi{padding:16px 18px;}
  .kpi__value{font-size:24px;}
}

/* ─── Grid 2 colunas ─── */
.grid-2{display:grid;grid-template-columns:1.4fr 1fr;gap:14px;margin-bottom:14px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px;}
@media (max-width: 1080px){ .grid-2{grid-template-columns:1fr;} .grid-3{grid-template-columns:1fr;} }

/* ─── Card genérico ─── */
.card{background:var(--bg-2);border:1px solid var(--border-soft);border-radius:14px;padding:22px;}
.card__head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.card__title{font-family:var(--f-d);font-size:14px;font-weight:600;letter-spacing:-.01em;color:var(--t1);}
.card__action{font-size:12px;color:var(--blue);font-weight:500;cursor:pointer;}
.card__action:hover{text-decoration:underline;}

/* ─── Gráfico de barras ─── */
.chart{display:flex;align-items:flex-end;gap:8px;height:120px;padding-top:8px;}
.chart-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;}
.chart-bar{width:100%;border-radius:5px 5px 0 0;min-height:4px;transition:opacity .2s;}
.chart-bar:hover{opacity:.8;}
.chart-bar.today{background:var(--grad);}
.chart-bar.past{background:rgba(123,63,228,.45);}
.chart-label{font-family:var(--f-m);font-size:9.5px;color:var(--t2);}
[data-theme="light"] .chart-bar.past{background:rgba(123,63,228,.3);}
[data-theme="light"] .chart-bar{min-height:6px;}

/* ─── Lista de conversas ─── */
.conv-list{display:flex;flex-direction:column;gap:0;}
.conv-list--scroll {
  max-height: 480px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: rgba(123,63,228,.35) transparent;
  padding-right: 4px;
}
.conv-list--scroll::-webkit-scrollbar { width: 6px; }
.conv-list--scroll::-webkit-scrollbar-track { background: transparent; }
.conv-list--scroll::-webkit-scrollbar-thumb {
  background: rgba(123,63,228,.35);
  border-radius: 999px;
  transition: background .15s;
}
.conv-list--scroll::-webkit-scrollbar-thumb:hover { background: rgba(123,63,228,.6); }
.conv-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 0;border-bottom:1px solid var(--border-soft);
  cursor:pointer;transition:background .15s;border-radius:8px;
  padding-left:6px;padding-right:6px;
}
.conv-item:last-child{border-bottom:none;}
.conv-item:hover{background:var(--status-bg,rgba(255,255,255,.03));}
[data-theme="light"] .conv-item:hover{background:rgba(0,0,0,.04);}
.conv-avatar{
  width:44px;height:44px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--f-d);font-weight:700;font-size:14px;color:#fff;
  flex-shrink:0;overflow:hidden;
}
.conv-avatar img { display:block; }
.conv-meta{flex:1;min-width:0;}
.conv-name{font-size:13.5px;font-weight:600;color:var(--t1);}
.conv-preview{font-size:12px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.conv-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.conv-time{font-family:var(--f-m);font-size:10px;color:var(--t3);}
.conv-badge{min-width:18px;height:18px;padding:0 5px;border-radius:999px;background:var(--grad);color:#fff;font-size:10px;font-weight:700;font-family:var(--f-m);display:flex;align-items:center;justify-content:center;}
.conv-tag{font-size:10px;padding:2px 7px;border-radius:4px;font-family:var(--f-m);}
.conv-tag.ia{background:rgba(123,63,228,.2);color:#c4a8ff;}
.conv-tag.hot{background:rgba(163,45,45,.18);color:#fca5a5;}
.conv-tag.ok{background:rgba(29,158,117,.15);color:#6ee7b7;}

/* ─── Agente IA card ─── */
.ia-status{display:flex;align-items:center;gap:10px;padding:14px 16px;background:rgba(123,63,228,.08);border:1px solid rgba(123,63,228,.2);border-radius:12px;margin-bottom:14px;}
.ia-dot{width:10px;height:10px;border-radius:50%;background:var(--success);box-shadow:0 0 8px var(--success);flex-shrink:0;animation:pulse-dot 2s ease infinite;}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 0 0 rgba(29,158,117,.6);}50%{box-shadow:0 0 0 5px rgba(29,158,117,0);}}
.ia-info{flex:1;}
.ia-name{font-size:13.5px;font-weight:600;}
.ia-sub{font-size:11.5px;color:var(--t2);margin-top:1px;}

/* ─── Stat row ─── */
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border-soft);}
.stat-row:last-child{border-bottom:none;}
.stat-label{font-size:13px;color:#A0A0AA;}

// Fail-safe: garante que o loading some mesmo se React falhar
window.addEventListener('error', function(e) {
  console.error('[Brava] Erro carregando:', e.message);
  var l = document.getElementById('brava-loading');
  if (l) { l.style.opacity = '0'; setTimeout(function(){ l.remove(); }, 400); }
});
// Fail-safe duplo: se nada mais escondeu o splash em 9.5s, escondemos forcado
setTimeout(function() {
  var l = document.getElementById('brava-loading');
  if (l) { l.style.opacity = '0'; setTimeout(function(){ l.remove(); }, 400); }
  if (!document.body.classList.contains('boot-ready')) {
    document.body.classList.add('boot-ready');
    window.dispatchEvent(new Event('brava_boot_ready'));
  }
}, 9500);
// Aplica modo claro por padrao no boot
if (!document.documentElement.getAttribute('data-theme')) {
  document.documentElement.setAttribute('data-theme', 'light');
}

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ─── Sessão (lida da URL na primeira carga, persistida em localStorage) ─── */
const DEFAULT_SESSAO = { nome: 'Jhonattan Itiuba', email: 'diretoria@brava.company', plano: 'admin', role: 'Diretoria', welcome: false };

// Mapa fonte-da-verdade dos usuarios internos Brava.
// SEMPRE sobrescreve nome/cargo baseado no email (mesmo se URL/cache tiver outra coisa).
// Pra adicionar mais usuarios: incluir email aqui.
const BRAVA_USERS = {
  'diretoria@brava.company':  { nome: 'Jhonattan Itiuba',  cargo: 'Owner', telefone: '+55 11 96334-2541', foto: 'app/jhonattan.jpg' },
  'financeiro@brava.company': { nome: 'Priscilla Cardoso', cargo: 'Admin', telefone: '',                  foto: 'app/priscilla.jpg' },
};

// ✨ Cache global de fotos vindas do banco (usuarios.foto_url)
// Populado por useUserFotoSync() (1x no boot do App) + realtime
const _userFotoCache = new Map(); // email lower → URL
const _userFotoSubs = new Set();
function _notifyUserFoto() { _userFotoSubs.forEach(fn => { try { fn(); } catch {} }); }

/* Helper central pra resolver foto de qualquer usuário pelo email.
   Ordem de prioridade:
   1. Banco (usuarios.foto_url) — fonte da verdade
   2. localStorage upload local (brava_user_photo:<email>) — legacy
   3. BRAVA_USERS map hardcoded — fallback final
   Retorna null se não tiver nenhuma. */
function getUserFoto(email) {
  if (!email) return null;
  const lower = String(email).toLowerCase().trim();
  // 1. Banco
  const dbUrl = _userFotoCache.get(lower);
  if (dbUrl) return dbUrl;
  // 2. localStorage (foto enviada pelo próprio user)
  try {
    const local = localStorage.getItem('brava_user_photo:' + lower);
    if (local) return local;
  } catch {}
  // 3. Hardcoded
  return BRAVA_USERS[lower]?.foto || null;
}

// Hook: sincroniza cache de fotos do banco (carrega 1x e escuta realtime)
function useUserFotoSync() {
  React.useEffect(() => {
    const cli = (typeof getSupa === 'function') ? getSupa() : null;
    if (!cli) return;
    let alive = true;
    const carregar = async () => {
      const { data } = await cli.from('usuarios').select('email, foto_url');
      if (!alive || !data) return;
      _userFotoCache.clear();
      data.forEach(u => {
        if (u.email && u.foto_url) {
          _userFotoCache.set(u.email.toLowerCase().trim(), u.foto_url);
        }
      });
      _notifyUserFoto();
    };
    carregar();
    const ch = cli.channel('rt:user_fotos')
      .on('postgres_changes', { event:'*', schema:'public', table:'usuarios' }, carregar)
      .subscribe();
    return () => { alive = false; cli.removeChannel(ch); };
  }, []);
}

// Hook reativo: re-renderiza quando alguma foto muda
function useUserFotoTick() {
  const [tick, setTick] = React.useState(0);
  React.useEffect(() => {
    const fn = () => setTick(t => t+1);
    _userFotoSubs.add(fn);
    return () => _userFotoSubs.delete(fn);
  }, []);
  return tick;
}

function aplicarPerfilBrava(email) {
  if (!email) return null;
  const found = BRAVA_USERS[String(email).toLowerCase().trim()];
  if (!found) return null;
  // Forca atualizacao do localStorage com os dados corretos do mapa
  try {
    const perfilAtual = JSON.parse(localStorage.getItem('brava_user_perfil') || '{}');
    const novo = {
      ...perfilAtual,
      nome: found.nome,
      email: email,
      cargo: found.cargo,
      telefone: perfilAtual.telefone || found.telefone || '',
    };
    localStorage.setItem('brava_user_perfil', JSON.stringify(novo));
  } catch {}
  return found;
}

function carregarSessao() {
  try {
    const url = new URLSearchParams(window.location.search);
    const userUrl = url.get('user');
    const emailUrl = url.get('email');
    if (userUrl && emailUrl) {
      // Se for um email Brava conhecido, usa o mapa como fonte da verdade
      const brava = aplicarPerfilBrava(emailUrl);
      const nomeReal  = brava?.nome  || userUrl;
      const cargoReal = brava?.cargo || url.get('role') || 'Owner';
      const sessao = {
        nome: nomeReal,
        email: emailUrl,
        plano: url.get('plano') || 'performance',
        role: cargoReal,
        welcome: url.get('welcome') === '1',
        logado_em: new Date().toISOString(),
      };
      const tema = url.get('theme');
      if (tema) document.documentElement.setAttribute('data-theme', tema);
      localStorage.setItem('brava_sessao', JSON.stringify(sessao));
      window.history.replaceState({}, '', '/');
      return sessao;
    }
    const s = localStorage.getItem('brava_sessao');
    if (s) {
      const parsed = JSON.parse(s);
      // SEMPRE valida pelo email: se conhece o user, sobrescreve nome/cargo errados que estavam em cache.
      const brava = aplicarPerfilBrava(parsed.email);
      if (brava) {
        parsed.nome = brava.nome;
        parsed.role = brava.cargo;
        localStorage.setItem('brava_sessao', JSON.stringify(parsed));
      }
      return { ...DEFAULT_SESSAO, ...parsed };
    }
  } catch(e) {
    console.warn('[Brava] Erro ao carregar sessão, usando default:', e);
  }
  // Fallback final: aplica default e sincroniza perfil
  aplicarPerfilBrava(DEFAULT_SESSAO.email);
  return DEFAULT_SESSAO;
}

const SESSAO = carregarSessao();
const ehDiretoria = (SESSAO.role || '') === 'Diretoria';
const safeNome = SESSAO.nome || 'Cliente';
const safeEmail = SESSAO.email || 'usuario@brava.company';

/* ─── Counter animado ─── */
// useCount com suporte a delay (stagger) e transicoes suaves em updates.
// Primeira renderizacao: anima 0 -> target somente APOS o splash de login sumir
// (evento "brava_boot_ready" emitido por bravaRevealApp). Assim os numeros
// realmente sobem na frente do usuario.
// Atualizacoes (target muda depois): interpola valor anterior -> novo (~420ms)
function useCount(target, duration = 1200, delay = 0) {
  const [v, setV] = useState(0);
  const fromRef = React.useRef(0);
  const firstRef = React.useRef(true);
  useEffect(() => {
    let raf, timer, cleanup;
    const from = firstRef.current ? 0 : fromRef.current;
    const dur  = firstRef.current ? duration : 420;
    const isFirst = firstRef.current;
    firstRef.current = false;

    const run = () => {
      let s = null;
      const step = ts => {
        if (!s) s = ts;
        const p = Math.min((ts - s) / dur, 1);
        const eased = 1 - Math.pow(1 - p, 3);
        const val = Math.round(from + (target - from) * eased);
        setV(val);
        fromRef.current = val;
        if (p < 1) raf = requestAnimationFrame(step);
      };
      timer = setTimeout(() => { raf = requestAnimationFrame(step); }, isFirst ? delay : 0);
    };

    if (isFirst && !document.body.classList.contains('boot-ready')) {
      // Espera o splash sumir antes de comecar a animacao
      const start = () => { window.removeEventListener('brava_boot_ready', start); run(); };
      window.addEventListener('brava_boot_ready', start);
      cleanup = () => window.removeEventListener('brava_boot_ready', start);
    } else {
      run();
    }

    return () => {
      if (cleanup) cleanup();
      clearTimeout(timer);
      if (raf) cancelAnimationFrame(raf);
    };
  }, [target, duration, delay]);
  return v;
}

/* ─── Nav items ─── */
const NAV = [
  { key:'dashboard',  label:'Dashboard',   icon:'LayoutDashboard', badge:null },
  { key:'clientes',   label:'WhatsApp',    icon:'MessageCircle',   badge:23 },
  { key:'monitoramento', label:'Monitoramento', icon:'Activity',   badge:null },
  { key:'pipeline',   label:'Pipeline',    icon:'KanbanSquare',    badge:5 },
  { key:'clientes_crm', label:'Clientes',  icon:'UsersRound',      badge:null },
  { key:'projetos',   label:'Projetos',    icon:'Layers',          badge:null },
  { key:'agenda',     label:'Agenda',      icon:'CalendarCheck',   badge:null },
  { key:'mrr',        label:'Financeiro',  icon:'DollarSign',      badge:null },
  { key:'analytics',  label:'Analytics',   icon:'BarChart3',       badge:null },
  { key:'chamados',   label:'Chamados',    icon:'LifeBuoy',        badge:3 },
  { key:'equipe',     label:'Equipe',      icon:'UsersRound',      badge:null },
  { key:'logs',       label:'Logs',        icon:'ScrollText',      badge:null },
];
const NAV_BOTTOM = [
  { key:'config',     label:'Configurações', icon:'Settings',      badge:null },

];

/* ─── Sidebar ─── */
/* Badge que mostra total de nao-lidas reais do WhatsApp (Evolution).
   Quando Evolution nao esta configurada, usa o fallback (mock numerico). */
function SidebarUnreadBadge({ fallback }) {
  const cfg = useEvoConfig();
  const total = useEvoUnreadTotal();
  // Tambem dispara notificacoes do browser para mensagens novas que chegam
  useEvoMessageNotifications();
  if (cfg) {
    if (total <= 0) return null;
    return <span className="nav-badge">{total > 99 ? '99+' : total}</span>;
  }
  return fallback ? <span className="nav-badge">{fallback}</span> : null;
}

/* Card discreto no rodape da sidebar com foto + nome + cargo do usuario logado.
   Clique abre Configuracoes > Perfil. */
function SidebarUserCard({ setPage }) {
  const foto = useUserPhoto();
  const { nome, cargo } = useUserPerfil();
  const iniciais = (nome || 'JI').split(' ').slice(0,2).map(n=>n[0]||'').join('').toUpperCase();

  );

    e.stopPropagation();
    const next = !dark;
    setDark(next);
    document.documentElement.setAttribute('data-theme', next ? 'dark' : 'light');

      transition:'background .15s',

      <div onClick={() => setPage && setPage('config')} title="Editar perfil"

          fontSize:11, fontWeight:700,

          <div style={{fontSize:12.5, fontWeight:600, color:'var(--t1)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>{primeiroNome || 'Usuário'}</div>
          <div style={{fontSize:10.5, color:'var(--t2)', letterSpacing:'.04em', textTransform:'uppercase', fontWeight:600, marginTop:1}}>{cargo || 'membro'}</div>
        </div>
      </div>
      {/* ✨ Toggle tema (sol/lua) — substitui o antigo ícone de config */}
      <button onClick={toggleTema} title={dark ? 'Modo claro' : 'Modo escuro'} style={{
        width:30, height:30, padding:0, borderRadius:'50%', flexShrink:0,
        background:'transparent', border:'1px solid var(--border)',
        color:'var(--t2)', cursor:'pointer',
        display:'flex', alignItems:'center', justifyContent:'center',
        transition:'all .15s',
      }}
        onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--blue)'; e.currentTarget.style.color='var(--blue)';}}
        onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)'; e.currentTarget.style.color='var(--t2)';}}

/* ─── Header ─── */
/* ══════════════════════════════════════════════════════════════════════════
   NOTIFICACOES (persistente em localStorage + auto-geradas via Realtime).
   - Cada notif tem id, tipo, titulo, sub, icon, cor, ts, lida.
   - Eventos do banco (wa_eventos_log INSERT) viram notificacoes automaticamente.
   - Botao "Marcar como lidas" marca todas como lidas (badge some).
   ══════════════════════════════════════════════════════════════════════════ */
const NOTIF_KEY = 'brava_notificacoes';
const NOTIF_MAX = 30;

function getNotificacoes() {
  try { return JSON.parse(localStorage.getItem(NOTIF_KEY) || '[]'); } catch { return []; }
}
function saveNotificacoes(list) {
  const trimmed = list.slice(0, NOTIF_MAX);
  localStorage.setItem(NOTIF_KEY, JSON.stringify(trimmed));
  window.dispatchEvent(new Event('brava_notifs_changed'));
}
function adicionarNotificacao(n) {
  const lista = getNotificacoes();
  if (n.id && lista.some(x => x.id === n.id)) return; // dedup
  lista.unshift({
    id: n.id || ('n_' + Date.now() + '_' + Math.random().toString(36).slice(2,6)),
    tipo: n.tipo || 'info',
    titulo: n.titulo || 'Notificação',
    sub: n.sub || '',
    icon: n.icon || 'Bell',
    cor: n.cor || 'var(--purple)',
    ts: n.ts || Date.now(),
    lida: false,
    link: n.link || null,
  });
  saveNotificacoes(lista);
}
function marcarTodasLidas() {
  const lista = getNotificacoes().map(n => ({ ...n, lida: true }));
  saveNotificacoes(lista);
}
function limparNotificacoes() {
  saveNotificacoes([]);
}
function useNotificacoes() {
  const [lista, setLista] = React.useState(getNotificacoes);
  React.useEffect(() => {
    const refresh = () => setLista(getNotificacoes());
    window.addEventListener('brava_notifs_changed', refresh);
    window.addEventListener('storage', refresh);
    return () => {
      window.removeEventListener('brava_notifs_changed', refresh);
      window.removeEventListener('storage', refresh);
    };
  }, []);
  const naoLidas = React.useMemo(() => lista.filter(n => !n.lida).length, [lista]);
  return { lista, naoLidas };
}

/* Gerador: monitora wa_eventos_log via Realtime e cria notificacoes em eventos relevantes.
   Roda 1x no boot do admin (montado em <App/>) */
function useNotifGenerator() {
  React.useEffect(() => {
    const cli = (typeof getSupa === 'function') ? getSupa() : null;
    if (!cli) return;
    const channel = cli.channel('rt:notif-gen')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'wa_eventos_log' }, (p) => {
        const ev = p.new;
        if (!ev) return;
        if (ev.event_type === 'ai.error' || ev.event_type === 'ai.send_error') {
          adicionarNotificacao({
            id: 'evt_' + ev.id,
            tipo: 'erro',
            titulo: 'Erro na IA',
            sub: (ev.payload?.message || ev.payload?.error || 'Falha ao processar resposta').slice(0,80),
            icon: 'AlertCircle',
            cor: '#A32D2D',
            ts: new Date(ev.received_at).getTime(),
            link: 'logs',
          });
        }
      })
      .subscribe();
    return () => cli.removeChannel(channel);
  }, []);
}

function tempoRelativo(ts) {
  const s = Math.round((Date.now() - ts) / 1000);
  if (s < 60) return 'agora';
  if (s < 3600) return 'há ' + Math.floor(s/60) + ' min';
  if (s < 86400) return 'há ' + Math.floor(s/3600) + 'h';
  return 'há ' + Math.floor(s/86400) + 'd';
}

/* Dropdown de notificacoes: reativo + Marcar como lidas funcional + estado vazio. */
// Helper: formata JID do WhatsApp pra "+55 11 99999-9999" legivel
function formatPhoneFromJid(jid) {
  if (!jid) return '';
  const num = String(jid).replace(/@.*$/, '').replace(/\D/g, '');
  // Brasil (55 + DDD 2 dig + 9 dig)
  const m13 = num.match(/^(55)(\d{2})(\d{5})(\d{4})$/);
  if (m13) return `+${m13[1]} ${m13[2]} ${m13[3]}-${m13[4]}`;
  // Brasil (55 + DDD + 8 dig fixo)
  const m12 = num.match(/^(55)(\d{2})(\d{4})(\d{4})$/);
  if (m12) return `+${m12[1]} ${m12[2]} ${m12[3]}-${m12[4]}`;
  return '+' + num;
}

/* ─── Modal de pareamento QR (Evolution API) ──────────────────────────
   Fluxo:
   1. Tenta connectInstance({name}) - se a instance existe na Evo, retorna QR
   2. Se 404, chama createInstance({name}) que cria e retorna QR no response
   3. Exibe QR base64 -> usuario abre WhatsApp -> Aparelhos conectados -> escaneia
   4. Polling de connectionState a cada 2s
   5. Quando state === 'open', UPDATE no wa_instancias e fecha modal */
function WhatsAppPairingModal({ instance, onClose }) {
  const [qrBase64, setQrBase64] = React.useState(null);
  // setup = escolhendo nome | loading | qr | connecting | open | error
  const [state, setState] = React.useState('checking');
  const [errorMsg, setErrorMsg] = React.useState('');
  const [attempt, setAttempt] = React.useState(0); // pra forcar re-fetch do QR
  // Nome editavel da instancia (default vem do banco, user pode trocar antes de criar)
  const [customName, setCustomName] = React.useState(instance.evolution_instance_name || '');
  // Nome efetivamente usado (so muda ao confirmar no setup)
  const [activeName, setActiveName] = React.useState(instance.evolution_instance_name || '');
  const [validandoNome, setValidandoNome] = React.useState(false);

  const cfg = React.useMemo(() => ({
    url: instance.evolution_url,
    instance: activeName,
    apikey: instance.evolution_apikey,
  }), [instance.id, activeName]);

  // 0) Checagem inicial: instancia ja existe na Evolution? Se sim, pula direto pro QR.
  //    Se nao, mostra a tela de setup pro user escolher o nome.
  React.useEffect(() => {
    let alive = true;
    if (attempt > 0) return; // re-tentativas pulam essa checagem
    (async () => {
      try {
        const st = await evoAdmin.state(activeName).catch(e => ({ _err: e }));
        if (!alive) return;
        const stReal = st?.instance?.state || st?.state;
        if (stReal === 'open') {
          setState('open');
          return;
        }
        if (stReal === 'close' || stReal === 'connecting') {
          // Ja existe na Evolution, so falta parear
          setState('loading');
          return;
        }
        // 404 ou nao identificado: precisa setup
        setState('setup');
      } catch {
        if (alive) setState('setup');
      }
    })();
    return () => { alive = false; };
  }, [instance.id]);

  // Validacao do nome: alfanumerico, underscore, hifen. Sem espacos.
  const nomeValido = /^[A-Za-z0-9_-]{3,32}$/.test(customName.trim());

  // Submit do setup: cria instancia na Evolution + atualiza Supabase com o nome escolhido
  const confirmarSetup = async () => {
    const nomeFinal = customName.trim();
    if (!nomeValido) return;
    setValidandoNome(true); setErrorMsg('');
    try {
      // 1. Se o nome mudou, atualiza no Supabase
      if (nomeFinal !== instance.evolution_instance_name) {
        const cli = getSupa();
        if (cli) {
          await cli.from('wa_instancias').update({
            evolution_instance_name: nomeFinal,
          }).eq('id', instance.id);
        }
      }
      // 2. Atualiza activeName -> dispara o useEffect de busca de QR com nome novo
      setActiveName(nomeFinal);
      setState('loading');
      setAttempt(a => a + 1);
    } catch (e) {
      setErrorMsg(e.message || 'Erro ao atualizar nome');
    } finally {
      setValidandoNome(false);
    }
  };

  // 1) Buscar QR (so quando state === 'loading')
  React.useEffect(() => {
    if (state !== 'loading') return;
    let alive = true;
    setQrBase64(null); setErrorMsg('');

    const buscarQR = async () => {
      try {
        // Tenta connect direto via Edge Function (usa master key server-side)
        let resp;
        let foiCriada = false;
        try {
          resp = await evoAdmin.connect(activeName);
        } catch (e) {
          // Se nao existe (404), cria a instancia ja com o template Brava
          if (e.status === 404 || /not found|nao encontrado|does not exist/i.test(e.message || '')) {
            resp = await evoAdmin.create(activeName, BRAVA_INSTANCE_TEMPLATE);
            foiCriada = true;
            console.log('[Brava] Instancia criada com template Brava (webhook+settings):', activeName);
          } else {
            throw e;
          }
        }
        // Garantia extra: aplica template via setWebhook/setSettings em background.
        if (!foiCriada) {
          (async () => {
            try {
              await evoAdmin.setWebhook(activeName, BRAVA_INSTANCE_TEMPLATE.webhook);
              await evoAdmin.setSettings(activeName, BRAVA_INSTANCE_TEMPLATE.settings);
              console.log('[Brava] Config espelhada na instancia:', activeName);
            } catch (err) {
              console.warn('[Brava] Falha ao espelhar config:', err.message);
            }
          })();
        }
        if (!alive) return;
        // Resposta da Evo varia: pode vir { base64, code }, { qrcode: { base64, code } }, { instance: {...}, qrcode: {...} }
        const qr =
          resp?.base64
          || resp?.qrcode?.base64
          || resp?.qrcode?.code
          || resp?.qr
          || resp?.code
          || (typeof resp === 'string' ? resp : null);
        if (qr) {
          setQrBase64(qr.startsWith('data:') ? qr : ('data:image/png;base64,' + qr.replace(/^data:image\/png;base64,/,'')));
          setState('qr');
        } else {
          // Pode ja estar conectada
          const st = await evoAdmin.state(activeName).catch(() => null);
          const real = st?.instance?.state || st?.state;
          if (real === 'open') { setState('open'); return; }
          throw new Error('Evolution nao retornou QR code. Resposta: ' + JSON.stringify(resp).slice(0,180));
        }
      } catch (e) {
        if (!alive) return;
        setState('error');
        setErrorMsg(e.message || 'Erro ao buscar QR code');
      }
    };
    buscarQR();
    return () => { alive = false; };
  }, [state, activeName, attempt]);

  // 2) Polling do connectionState (a cada 2s enquanto estiver no estado qr/connecting)
  React.useEffect(() => {
    if (state !== 'qr' && state !== 'connecting') return;
    let alive = true;
    const tick = async () => {
      try {
        const st = await evoAdmin.state(activeName);
        const real = st?.instance?.state || st?.state;
        if (!alive) return;
        if (real === 'open') {
          setState('open');
          // Espelha config Brava (idempotente) - garante que webhook + settings
          // estao corretos ANTES de chegar a primeira mensagem real
          try {
            await evoAdmin.setWebhook(activeName, BRAVA_INSTANCE_TEMPLATE.webhook);
            await evoAdmin.setSettings(activeName, BRAVA_INSTANCE_TEMPLATE.settings);
          } catch (e) { console.warn('[Brava] Espelhamento pos-conexao falhou:', e.message); }
          // Sincroniza dados do perfil (ownerJid, profileName, profilePicUrl) com o banco
          // A Edge Function fetchInfo busca da Evolution + UPDATE em wa_instancias num so call
          try {
            await evoAdmin.fetchInfo(activeName);
            console.log('[Brava] Perfil sincronizado:', activeName);
          } catch (e) { console.warn('[Brava] Falha ao sincronizar perfil:', e.message); }
          showToast?.(`${instance.nome} conectado com sucesso!`, 'success');
          // Nao auto-fecha mais — usuario clica no botao "Abrir conversas" pra fechar
        } else if (real === 'connecting') {
          setState('connecting');
        }
      } catch {} // silencioso, vai tentar de novo
    };
    const t = setInterval(tick, 2000);
    tick();
    return () => { alive = false; clearInterval(t); };
  }, [state, cfg, instance.id, onClose]);

  const lbl = { fontSize:11, color:'var(--t3)', fontFamily:'var(--f-m)', textTransform:'uppercase', letterSpacing:'.06em' };

  return (
    <div onClick={onClose} style={{position:'fixed', inset:0, background:'rgba(0,0,0,.85)', display:'grid', placeItems:'center', zIndex:9999, animation:'fade-in .15s'}}>
      <div onClick={e=>e.stopPropagation()} style={{
        width:'min(440px, 94vw)', background:'#000',
        border:'1px solid #1F1F2A', borderRadius:14,
        padding:'24px 28px', boxShadow:'0 24px 80px rgba(0,0,0,.85), 0 0 0 1px rgba(30,144,255,.06)',
      }}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:18}}>
          <div>
            <div style={{fontFamily:'var(--f-d)', fontSize:18, fontWeight:600, color:'#F5F5F7'}}>
              Conectar {(instance.nome || '').replace(/^WhatsApp\s+/i, '')}
            </div>
            <div style={{fontSize:12, color:'#A0A0AA', marginTop:4}}>
              Escaneie o QR code com o WhatsApp do seu celular
            </div>
          </div>
          <button onClick={onClose} style={{
            background:'transparent', border:'none', color:'#6E6E78',
            cursor:'pointer', padding:6, lineHeight:1, fontSize:20,
          }}>×</button>
        </div>

        {/* Conteudo principal */}
        <div style={{
          minHeight:280, display:'flex', flexDirection:'column',
          alignItems:'center', justifyContent:'center',
          padding:'16px 0', gap:14,
        }}>
          {state === 'checking' && (
            <>
              <div style={{
                width:48, height:48, border:'3px solid rgba(30,144,255,.18)',
                borderTopColor:'#1E90FF', borderRadius:'50%',
                animation:'spin 1s linear infinite',
              }}/>
              <div style={{fontSize:13, color:'#A0A0AA'}}>Verificando instância...</div>
            </>
          )}

          {state === 'setup' && (
            <div style={{width:'100%', maxWidth:340}}>
              {/* Avatar do agente com sabre azul circulando (ref ao "circulo de IA") */}
              <div style={{
                position:'relative', width:80, height:80, margin:'0 auto 18px',
              }}>
                {/* Ring sabre rotacionando */}
                <div style={{
                  position:'absolute', inset:0, borderRadius:'50%',
                  background:'conic-gradient(from 0deg, transparent 0%, transparent 60%, rgba(30,144,255,.6) 80%, #1E90FF 95%, rgba(30,144,255,.6) 100%)',

                <div style={{

                <div style={{

          {state === 'loading' && (
            <>

              }}/>
              <div style={{fontSize:13, color:'#A0A0AA'}}>Gerando QR code...</div>

          {(state === 'qr' || state === 'connecting') && qrBase64 && (
            <>
              <div style={{
                padding:12, background:'#fff', borderRadius:10,

/* ─── Modal: Adicionar novo WhatsApp ─────────────────────────────────
   Cria do zero: registro em wa_instancias + instance na Evolution.
   Depois delega pro WhatsAppPairingModal pra fazer o QR/pareamento. */
function NewWhatsAppModal({ onClose, onCreated }) {
  // Dados do form
  const [displayName, setDisplayName] = React.useState('');      // "WhatsApp Jhonattan"
  const [instanceName, setInstanceName] = React.useState('');    // "JhonattanItiuba" (tecnico)
  const [privado, setPrivado] = React.useState(false);           // privado pro user logado?
  const [salvando, setSalvando] = React.useState(false);
  const [erro, setErro] = React.useState('');

  // Auto-gera o nome tecnico a partir do display (CamelCase sem espacos)
  const onDisplayChange = (val) => {
    setDisplayName(val);
    // Se o usuario nao customizou o instance ainda, gera automatico
    if (!instanceName || _autoTecnicoDe(displayName) === instanceName) {
      setInstanceName(_autoTecnicoDe(val));
    }
  };

  const displayValido = displayName.trim().length >= 3;
  const instanceValido = /^[A-Za-z0-9_-]{3,32}$/.test(instanceName.trim());
  const formValido = displayValido && instanceValido;

  const salvar = async () => {
    if (!formValido) return;
    setSalvando(true); setErro('');
    try {
      const cli = getSupa();
      if (!cli) throw new Error('Supabase nao disponivel');

      // 1. Verifica se ja existe alguem com esse instance_name (UNIQUE)
      const { data: existente } = await cli.from('wa_instancias')
        .select('id, nome')
        .eq('evolution_instance_name', instanceName.trim())
        .maybeSingle();
      if (existente) {
        throw new Error(`Ja existe uma instancia "${existente.nome}" com esse nome tecnico. Escolha outro.`);
      }

      // 2. Pega workspace ativo (Brava Central por enquanto - hardcoded)
      //    Quando tiver multi-workspace real, le do contexto do user logado.
      const workspaceId = '4ad72dbb-60cd-4251-8c11-cbf964012c29'; // Brava Central

      // 3. Cria registro no Supabase (status=close, aguardando pareamento)
      const { data, error } = await cli.from('wa_instancias').insert({
        workspace_id: workspaceId,
        nome: displayName.trim(),
        evolution_url: 'https://lickingbuffalo-evolution.cloudfy.live',
        evolution_instance_name: instanceName.trim(),
        // Apikey global compartilhada do servidor Evolution
        evolution_apikey: 'D5E5DC9D636D-49C5-AF9C-CB1F6E0089F1',
        status: 'close',
        owner_email: privado ? (SESSAO?.email || null) : null,
        // IA fica DESATIVADA por padrao (seguranca: evita respostas automaticas
        // em WhatsApp pessoal). O usuario ativa depois em Configuracoes quando
        // estiver pronto, sem risco de IA responder mensagem inesperada.
        // Configs (model, prompt, timings) ja vem prontas pra so ligar e usar.
        ai_enabled_global: false,
        ai_model: 'claude-opus-4-5',
        ai_typing_enabled: true,
        ai_thinking_seconds: 3.0,
        ai_split_enabled: true,
        ai_reading_seconds: 2.5,
      }).select().single();

      if (error) throw error;

      showToast?.(`${data.nome} criada. Escaneie o QR pra conectar.`, 'success');
      // Notifica o parent (switcher) pra abrir o modal de pareamento
      onCreated && onCreated(data);
    } catch (e) {
      setErro(e.message || 'Erro ao criar instancia');
    } finally {
      setSalvando(false);
    }
  };

  return (
    <div onClick={onClose} style={{position:'fixed', inset:0, background:'rgba(0,0,0,.75)', display:'grid', placeItems:'center', zIndex:9999, animation:'fade-in .15s'}}>
      <div onClick={e=>e.stopPropagation()} style={{
        width:'min(440px, 94vw)', background:'var(--bg-2)',
        border:'1px solid var(--border)', borderRadius:14,
        padding:'24px 28px', boxShadow:'0 24px 60px rgba(0,0,0,.6)',
      }}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:18}}>
          <div>
            <div style={{fontFamily:'var(--f-d)', fontSize:18, fontWeight:600, color:'var(--t1)'}}>
              Adicionar WhatsApp
            </div>
            <div style={{fontSize:12, color:'var(--t3)', marginTop:4}}>
              Cria uma nova instância. Próxima etapa: escanear QR.
            </div>
          </div>
          <button onClick={onClose} disabled={salvando} style={{
            background:'transparent', border:'none', color:'var(--t3)',
            cursor: salvando ? 'not-allowed' : 'pointer', padding:6, lineHeight:1, fontSize:20,
          }}>×</button>
        </div>

        <div style={{display:'flex', flexDirection:'column', gap:14}}>
          {/* Nome de exibicao */}
          <div>
            <label style={{display:'block', fontSize:11, color:'var(--t3)', fontFamily:'var(--f-m)', textTransform:'uppercase', letterSpacing:'.06em', marginBottom:6}}>
              Nome de exibição
            </label>
            <input
              type="text" value={displayName}
              onChange={e => onDisplayChange(e.target.value)}
              placeholder="ex: WhatsApp Vendas"
              maxLength={48} autoFocus
              style={_modalInputStyle}
            />
            <div style={{fontSize:11, color:'var(--t3)', marginTop:4}}>
              Como vai aparecer no switcher (pode ter espaço e acento)
            </div>
          </div>

          {/* Nome tecnico (instance Evolution) */}
          <div>
            <label style={{display:'block', fontSize:11, color:'var(--t3)', fontFamily:'var(--f-m)', textTransform:'uppercase', letterSpacing:'.06em', marginBottom:6}}>
              Nome técnico (instância)
            </label>
            <input
              type="text" value={instanceName}
              onChange={e => setInstanceName(e.target.value.replace(/[^A-Za-z0-9_-]/g, ''))}
              placeholder="ex: WhatsAppVendas"
              maxLength={32}
              style={{
                ..._modalInputStyle,
                borderColor: instanceName && !instanceValido ? '#A32D2D' : 'var(--border)',
              }}
            />
            <div style={{fontSize:11, color: instanceName && !instanceValido ? '#A32D2D' : 'var(--t3)', marginTop:4}}>
              {instanceName && !instanceValido
                ? 'Use 3-32 caracteres alfanuméricos, _ ou -. Sem espaços.'
                : 'Identificador único no servidor Evolution (gerado automático do nome)'}
            </div>
          </div>

          {/* Quem pode ver — seletor segmentado (2 opcoes claras) */}
          <div>
            <label style={{display:'block', fontSize:11, color:'var(--t3)', fontFamily:'var(--f-m)', textTransform:'uppercase', letterSpacing:'.06em', marginBottom:6}}>
              Quem pode ver este WhatsApp

            <div style={{
              display:'grid', gridTemplateColumns:'1fr 1fr', gap:6,
              padding:4, background:'var(--bg-3)',
              border:'1px solid var(--border)', borderRadius:8,
            }}>
              <button type="button" onClick={() => setPrivado(false)} style={{
                padding:'10px 12px', borderRadius:6, border:'none', cursor:'pointer',
                background: !privado ? 'var(--purple)' : 'transparent',
                color: !privado ? '#fff' : 'var(--t2)',
                fontSize:12.5, fontWeight:600, fontFamily:'var(--f-b)',
                display:'flex', alignItems:'center', justifyContent:'center', gap:6,
                transition:'background .15s, color .15s',
              }}>
                <Icon name="UsersRound" size={13}/>
                Todos do workspace
              </button>
              <button type="button" onClick={() => setPrivado(true)} style={{
                padding:'10px 12px', borderRadius:6, border:'none', cursor:'pointer',
                background: privado ? 'var(--purple)' : 'transparent',
                color: privado ? '#fff' : 'var(--t2)',
                fontSize:12.5, fontWeight:600, fontFamily:'var(--f-b)',
                display:'flex', alignItems:'center', justifyContent:'center', gap:6,
                transition:'background .15s, color .15s',
              }}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                Somente eu
              </button>
            </div>
            <div style={{fontSize:11, color:'var(--t3)', marginTop:6, lineHeight:1.4}}>
              {privado
                ? `Só ${SESSAO?.email || 'você'} verá este WhatsApp no switcher`
                : 'Todos do workspace verão (compartilhado da empresa)'}
            </div>
          </div>

          {erro && (
            <div style={{
              padding:'10px 12px', background:'rgba(163,45,45,.10)',
              border:'1px solid rgba(163,45,45,.30)',
              borderRadius:6, fontSize:12, color:'#E5544D',
            }}>

        </div>

        <div style={{display:'flex', gap:8, marginTop:18, justifyContent:'flex-end'}}>
          <button onClick={onClose} disabled={salvando} style={{
            padding:'10px 18px', background:'transparent', border:'1px solid var(--border)',
            borderRadius:8, color:'var(--t2)', cursor: salvando ? 'not-allowed' : 'pointer',
            fontSize:13, fontFamily:'var(--f-b)',
          }}>
            Cancelar
          </button>
          <button onClick={salvar} disabled={!formValido || salvando} style={{
            padding:'10px 20px',
            background: formValido && !salvando ? 'var(--purple)' : 'var(--bg-3)',
            border:'none', borderRadius:8,
            color: formValido && !salvando ? '#fff' : 'var(--t3)',
            cursor: formValido && !salvando ? 'pointer' : 'not-allowed',
            fontSize:13, fontWeight:600, fontFamily:'var(--f-b)',
            opacity: salvando ? 0.7 : 1,
          }}>

// Helpers usados pelo NewWhatsAppModal
const _modalInputStyle = {
  width:'100%', padding:'10px 12px',
  background:'var(--bg-3)', border:'1px solid var(--border)',
  borderRadius:8, color:'var(--t1)', fontSize:14,
  outline:'none', fontFamily:'var(--f-b)',
  transition:'border-color .15s', boxSizing:'border-box',
};
function _autoTecnicoDe(display) {
  // Remove acentos, espacos, especiais. Mantem alfanumerico em CamelCase.
  // ̀-ͯ = combining diacritical marks (acentos depois de NFD)
  return display
    .normalize('NFD').replace(/[̀-ͯ]/g, '')     // tira acentos
    .replace(/[^A-Za-z0-9 ]/g, '')                        // tira simbolos
    .split(/\s+/).filter(Boolean)                          // separa palavras
    .map(w => w.charAt(0).toUpperCase() + w.slice(1))     // CamelCase
    .join('')
    .slice(0, 32);
}

// Style helper pros itens do sub-menu de acoes (Conectar/Desconectar/Excluir)
const _menuItemStyle = (color) => ({
  width:'100%', padding:'8px 10px', display:'flex', alignItems:'center', gap:8,
  background:'transparent', border:'none', borderRadius:6,
  color: color, fontSize:12.5, fontWeight:500, fontFamily:'var(--f-b)',
  cursor:'pointer', textAlign:'left',
  transition:'background .12s',
});

/* ─── Switcher de WhatsApp (multi-instancia) ───────────────────────────
   Dropdown no header pra trocar entre Brava Company, Jhonattan, etc.
   Cada instancia mantem isolamento total no banco (instancia_id). */
function WhatsAppSwitcher({ setPage }) {
  const { instances, loading } = useWaInstances();
  const activeId = useActiveInstanceId();
  const [aberto, setAberto] = React.useState(false);
  const [pairingInstance, setPairingInstance] = React.useState(null); // instance pra modal QR
  const [novoModalAberto, setNovoModalAberto] = React.useState(false); // modal "Adicionar WhatsApp"
  const [menuInstanceId, setMenuInstanceId] = React.useState(null);   // sub-menu "..." aberto pra qual instancia
  const [acaoCarregando, setAcaoCarregando] = React.useState(null);   // {id, action} acao em curso

  const active = instances.find(i => i.id === activeId) || instances[0];

  // ─── Ações plug/unplug por instância ────────────────────────────────
  const handleReconectar = async (inst) => {
    setMenuInstanceId(null);
    setAberto(false);
    setPairingInstance(inst);
  };

  const handleAtualizarPerfil = async (inst) => {
    setMenuInstanceId(null);
    setAcaoCarregando({ id: inst.id, action: 'sync' });
    try {
      await evoAdmin.fetchInfo(inst.evolution_instance_name);
      showToast?.(`Perfil de ${inst.nome.replace(/^WhatsApp\s+/i,'')} atualizado`, 'success');
    } catch (e) {
      showToast?.(`Erro ao atualizar perfil: ${e.message}`, 'error');
    } finally {
      setAcaoCarregando(null);
    }
  };

  const handleDesconectar = async (inst) => {
    if (!confirm(`Desconectar "${inst.nome}"?\n\nA sessão do WhatsApp será encerrada no celular. Você pode reconectar depois escaneando um novo QR.\n\nHistorico de mensagens e contatos é preservado.`)) return;
    setMenuInstanceId(null);
    setAcaoCarregando({ id: inst.id, action: 'logout' });
    try {
      // 1. Logout na Evolution (encerra sessao Baileys)
      await evoAdmin.logout(inst.evolution_instance_name).catch(() => null);
      // 2. UPDATE status no Supabase pra close
      const cli = getSupa();
      if (cli) {
        await cli.from('wa_instancias').update({ status: 'close' }).eq('id', inst.id);
      }
      showToast?.(`${inst.nome} desconectado`, 'success');
    } catch (e) {
      showToast?.(`Erro ao desconectar: ${e.message}`, 'error');
    } finally {
      setAcaoCarregando(null);
    }
  };

  const handleExcluir = async (inst) => {
    const confirmText = inst.nome.replace(/^WhatsApp\s+/i, '');
    const r = prompt(`Excluir "${inst.nome}" permanentemente?\n\nEsta ação NÃO PODE ser desfeita. Vai apagar:\n- Instância da Evolution (sessão Baileys)\n- Registro no banco (wa_instancias)\n- Histórico de mensagens/chats/contatos vinculados\n\nDigite o nome "${confirmText}" pra confirmar:`);
    if (r !== confirmText) {
      if (r !== null) showToast?.('Nome digitado nao bateu, exclusao cancelada', 'info');
      return;
    }
    setMenuInstanceId(null);
    setAcaoCarregando({ id: inst.id, action: 'delete' });
    try {
      // 1. Delete na Evolution (remove sessao Baileys + dados de chat)
      await evoAdmin.delete(inst.evolution_instance_name).catch((e) => {
        console.warn('[Brava] Falha ao deletar instancia da Evolution:', e.message);
      });
      // 2. Delete cascade do Supabase (manualmente: msgs/chats/contatos/eventos primeiro pq FK)
      const cli = getSupa();
      if (cli) {
        await cli.from('wa_eventos_log').delete().eq('instancia_id', inst.id);
        await cli.from('wa_mensagens').delete().eq('instancia_id', inst.id);
        await cli.from('wa_chats').delete().eq('instancia_id', inst.id);
        await cli.from('wa_contatos').delete().eq('instancia_id', inst.id);
        await cli.from('wa_instancias').delete().eq('id', inst.id);
      }
      // 3. Se era a ativa, troca pra primeira disponivel
      if (inst.id === activeId) {
        const restantes = instances.filter(i => i.id !== inst.id);
        if (restantes.length > 0) {
          setActiveInstanceId(restantes[0].id);
        } else {
          setActiveInstanceId(null);
        }
      }
      showToast?.(`${inst.nome} excluído com sucesso`, 'success');
    } catch (e) {
      showToast?.(`Erro ao excluir: ${e.message}`, 'error');
    } finally {
      setAcaoCarregando(null);
    }
  };

  // Fecha ao clicar fora
  React.useEffect(() => {
    if (!aberto) return;
    const fechar = (e) => {
      if (!e.target.closest('.wa-switcher')) { setAberto(false); setMenuInstanceId(null); }
    };
    document.addEventListener('click', fechar);
    return () => document.removeEventListener('click', fechar);
  }, [aberto]);

  // Fecha o sub-menu quando o dropdown principal fecha
  React.useEffect(() => {
    if (!aberto) setMenuInstanceId(null);
  }, [aberto]);

  if (loading || instances.length === 0) {
    return (
      <div style={{display:'flex',alignItems:'center',gap:8,padding:'6px 12px',background:'var(--bg-3)',borderRadius:8,fontSize:12,color:'var(--t3)'}}>
        <Icon name="MessageCircle" size={14}/>
        {loading ? 'Carregando...' : 'Sem WhatsApp'}
      </div>
    );

              apikey: novaInstance.evolution_apikey,
            });
            setTimeout(() => setPairingInstance(novaInstance), 200);
          }}

      )}
    </div>
  );

                  <div style={{width:32, height:32, borderRadius:8, background:n.cor+'22', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0}}>
                    <Icon name={n.icon} size={15} style={{color:n.cor}}/>
                  </div>
                  <div style={{flex:1, minWidth:0}}>

            <div style={{padding:10, textAlign:'center', display:'flex', justifyContent:'space-between', alignItems:'center'}}>

/* ─── Dashboard ─── */
function Dashboard({ onImpersonate, pipelineCols, setPage, onNovoCliente, onExportar, busca }) {
  // RECORRENCIA reativa: re-renderiza quando user edita/cria/exclui na aba MRR
  const recorrencia = useRecorrencia();
  const { list: clientesMestre } = useClientes();
  const { list: statusConfig } = useStatusConfig();
  const equipeReal = useEquipeReal();

  // MRR total ativo (status_fase = ativo, fonte unificada)
  const mrrTotalAtivo = React.useMemo(() => {
    return recorrencia
      .filter(r => r.status_fase === 'ativo')
      .reduce((s, r) => s + (r.mensal || 0), 0);
  }, [recorrencia]);

  // Clientes mestre ativos (não projetos — contagem de clientes únicos com status ativo)
  const totalClientesAtivos = React.useMemo(() => {
    return clientesMestre.filter(c => c.status === 'ativo').length;
  }, [clientesMestre]);

  // Stats globais REAIS do Supabase (atualizam via Realtime conforme msgs chegam)
  const supaStats = useSupaGlobalStats();

  // Contadores em cascata escalonada (animacao suave de 0 -> valor)
  const clientes   = useCount(totalClientesAtivos,    8000,  80);
  const mrr        = useCount(mrrTotalAtivo,          8000, 220);
  const conversas  = useCount(supaStats.msgsHoje,     2500, 360); // valor real do banco
  const chamados   = useCount(3,                      8000, 500);

  // MRR dinamico: mesma fonte do KPI, mas usado pro grafico 7d
  const mrrAtivoHoje = mrrTotalAtivo;

  // Gera a curva dos 7 dias com pequena variacao realista crescente
  const chartData = React.useMemo(() => {
    const dias = ['Seg','Ter','Qua','Qui','Sex','Sáb','Hoje'];
    const hoje = new Date();
    const diaSemana = hoje.getDay(); // 0=dom, 1=seg, ...
    // Curva de crescimento ate o valor de hoje (10-15% acumulado na semana)
    const fatores = [.78, .82, .86, .89, .92, .95, 1.0];
    return dias.map((day, i) => ({
      day: i === 6 ? 'Hoje' : day,
      v: Math.round(mrrAtivoHoje * fatores[i]),
      today: i === 6,
    }));
  }, [mrrAtivoHoje]);
  const maxV = Math.max(...chartData.map(d => d.v));

  // Sprint K: Acesso Rápido lê do BANCO (clientes mestre) + status_fase real

    (recorrencia || []).forEach(p => {
      if (!p.cliente_id) return;
      if (!m.has(p.cliente_id)) m.set(p.cliente_id, []);
      m.get(p.cliente_id).push(p);
    });
    return m;
  }, [recorrencia]);

  // Filtro pela busca global (nome, nicho, doc, email)
  const clientesList = React.useMemo(() => {
    let arr = clientesMestre || [];
    if (busca) {
      const q = busca.toLowerCase();
      arr = arr.filter(c =>
        (c.nome||'').toLowerCase().includes(q) ||
        (c.nicho||'').toLowerCase().includes(q) ||
        (c.nome_fantasia||'').toLowerCase().includes(q) ||
        (c.contato_email||'').toLowerCase().includes(q)
      );
    }
    // Ordena por ordem da fase + nome (ativos primeiro)
    const cfgByKey = new Map((statusConfig||[]).map(s => [s.key, s.ordem]));
    return arr.sort((a, b) => {
      // 'ativo'=60 vem ANTES de 'lead'=10, então ordem decrescente nas fases avançadas
      const oa = cfgByKey.get(a.status) ?? 99;
      const ob = cfgByKey.get(b.status) ?? 99;
      // Decrescente: maior ordem (mais avançado) primeiro
      if (oa !== ob) return ob - oa;
      return (a.nome||'').localeCompare(b.nome||'');
    });
  }, [clientesMestre, busca, statusConfig]);

  // Fechar menu de acoes ao clicar fora
  useEffect(() => {
    if (!menuAberto) return;
    const fechar = e => { if (!e.target.closest('.cliente-acoes-menu') && !e.target.closest('.cliente-acoes-btn')) setMenuAberto(null); };

        </div>

        </div>
      </div>

      {/* KPIs */}
      <div className="kpi-grid">
        <div className="kpi">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
            <div className="kpi__label">Clientes ativos</div>
            <div className="kpi__icon" style={{background:'rgba(123,63,228,.12)'}}>
              <Icon name="Building2" size={17} style={{color:'var(--purple)'}}/>
            </div>
          </div>
          <div className="kpi__value" style={{color:'var(--t1)'}}>{clientes}</div>
          <div className="kpi__delta up"><Icon name="TrendingUp" size={12}/>+3 este mês</div>
        </div>

        <div className="kpi">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
            <div className="kpi__label">MRR</div>
            <div className="kpi__icon" style={{background:'rgba(30,144,255,.12)'}}>
              <Icon name="TrendingUp" size={17} style={{color:'var(--blue)'}}/>
            </div>
          </div>
          <div className="kpi__value" style={{fontSize:26, color:'var(--t1)'}}>R$ {mrr.toLocaleString('pt-BR')}</div>
          <div className="kpi__delta up"><Icon name="TrendingUp" size={12}/>+12% vs mês anterior</div>
        </div>

        <div className="kpi">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
            <div className="kpi__label">Conversas processadas</div>
            <div className="kpi__icon" style={{background:'rgba(29,158,117,.12)'}}>
              <Icon name="MessageCircle" size={17} style={{color:'var(--success)'}}/>
            </div>
          </div>
          <div className="kpi__value" style={{color:'var(--t1)'}}>{conversas.toLocaleString('pt-BR')}</div>
          <div className="kpi__delta up"><Icon name="TrendingUp" size={12}/>em todos os tenants hoje</div>

        <div className="kpi">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
            <div className="kpi__label">Chamados abertos</div>

          <div className="kpi__delta" style={{color:'var(--t3)'}}><Icon name="Clock" size={12}/>2 aguardando resposta</div>

          {(statusConfig||[]).map((s) => {
            const qtd = recorrencia.filter(r => (r.status_fase || 'lead') === s.key).length;
            const total = recorrencia.length || 1;
            const pct = Math.round((qtd/total)*100);
            return { ...s, qtd, pct };
          }).filter(p => p.qtd > 0).map((p) => (
            <div key={p.key}>
              <div className="stat-row">
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <div style={{width:8,height:8,borderRadius:'50%',background:p.cor,flexShrink:0}}/>
                  <div className="stat-label">{p.label}</div>
                </div>
                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                  <div className="stat-label">{p.qtd}</div>
                  <div className="stat-val">{p.pct}%</div>
                </div>
              </div>
              <div className="progress" style={{marginBottom:6}}>
                <div className="progress__fill" style={{width:`${p.pct}%`,background:p.cor}}/>
              </div>
            </div>
          ))}
        </div>

        <div className="card">
          <div className="card__head">
            <div className="card__title">Equipe Brava</div>
            <span style={{fontSize:11, color:'var(--t3)'}}>{equipeReal.length} {equipeReal.length === 1 ? 'membro' : 'membros'}</span>
          </div>
          {equipeReal.length === 0 ? (
            <div style={{padding:'14px 0', textAlign:'center', color:'var(--t3)', fontSize:12.5}}>Nenhum membro cadastrado ainda.</div>
          ) : equipeReal.map((u) => (
            <div key={u.id} className="stat-row">
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <div style={{position:'relative'}}>
                  <div style={{
                    width:30, height:30, borderRadius:'50%',
                    background: u.foto_url ? `var(--bg-3) url('${u.foto_url}') center/cover no-repeat` : 'var(--bg-3)',
                    display:'flex', alignItems:'center', justifyContent:'center',
                    fontSize:10, fontWeight:700,
                    color: u.foto_url ? 'transparent' : 'var(--t2)',
                    overflow:'hidden',
                  }}>
                    {(u.nome || u.email || '?').split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase()}
                  </div>
                  <div style={{position:'absolute',bottom:0,right:0,width:8,height:8,borderRadius:'50%',background:'var(--success)',border:'2px solid var(--bg-2)'}}/>
                </div>
                <div>
                  <div style={{fontSize:13,fontWeight:600,color:'var(--t1)'}}>{u.nome || u.email}</div>
                  <div style={{fontSize:11,color:'var(--t3)', textTransform:'capitalize'}}>{u.role || 'Membro'}</div>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// Helper: gera URL de login do cliente. Externos abrem em outra aba.
function clienteLoginUrl(c) {
  if (c.loginUrl) return c.loginUrl;
  const slug = c.slug || c.nome.toLowerCase().replace(/[^a-z0-9]/g,'');
  return `/app/?login=1&workspace=${slug}`;
}

// Helper: busca a logoUrl do cliente pelo nome (usado em Chamados, Pipeline, etc.)
function getClienteLogo(nome) {
  if (!nome) return null;
  const c = CLIENTES_CRM.find(x => x.nome === nome || nome.indexOf(x.nome) === 0);
  return c?.logoUrl || null;
}

/* ─── Store reativo de clientes (CRUD + persist + events) ─── */
function getClientesReactivos() {
  let edits = {}, deleted = [], extras = [];
  try { edits = JSON.parse(localStorage.getItem('brava_edits_crm') || '{}'); } catch {}
  try { deleted = JSON.parse(localStorage.getItem('brava_deleted_crm') || '[]'); } catch {}
  try { extras = JSON.parse(localStorage.getItem('brava_extra_crm') || '[]'); } catch {}
  const merged = [...CLIENTES_CRM, ...extras].filter(c => !deleted.includes(c.nome));
  return merged.map(c => edits[c.nome] ? {...c, ...edits[c.nome]} : c);
}

const fireClientesChanged = () => window.dispatchEvent(new Event('brava_clientes_changed'));

function editClienteStore(nome, patch) {
  let edits = {};
  try { edits = JSON.parse(localStorage.getItem('brava_edits_crm') || '{}'); } catch {}
  edits[nome] = { ...(edits[nome] || {}), ...patch };
  localStorage.setItem('brava_edits_crm', JSON.stringify(edits));
  fireClientesChanged();
}

function deleteClienteStore(nome) {
  let deleted = [];
  try { deleted = JSON.parse(localStorage.getItem('brava_deleted_crm') || '[]'); } catch {}
  if (!deleted.includes(nome)) {
    deleted.push(nome);
    localStorage.setItem('brava_deleted_crm', JSON.stringify(deleted));
  }
  // Tambem remove dos extras se foi adicionado pelo usuario
  let extras = [];
  try { extras = JSON.parse(localStorage.getItem('brava_extra_crm') || '[]'); } catch {}
  const novosExtras = extras.filter(c => c.nome !== nome);
  if (novosExtras.length !== extras.length) {
    localStorage.setItem('brava_extra_crm', JSON.stringify(novosExtras));
  }
  fireClientesChanged();
}

function undoDeleteClienteStore(nome) {
  let deleted = [];
  try { deleted = JSON.parse(localStorage.getItem('brava_deleted_crm') || '[]'); } catch {}
  localStorage.setItem('brava_deleted_crm', JSON.stringify(deleted.filter(n => n !== nome)));
  fireClientesChanged();
}

function useClientesReactivos() {
  const [list, setList] = React.useState(() => getClientesReactivos());
  React.useEffect(() => {
    const refresh = () => setList(getClientesReactivos());
    window.addEventListener('brava_clientes_changed', refresh);
    window.addEventListener('storage', refresh);
    return () => {
      window.removeEventListener('brava_clientes_changed', refresh);
      window.removeEventListener('storage', refresh);
    };
  }, []);
  return list;
}

/* Hook: detecta se IA esta processando (heuristica frontend, sem precisar mexer no banco)
   Logica: cliente acabou de mandar msg (< 15s) e IA ta ativa no chat => "IA digitando" */
function useIaProcessando(msgs, iaAtivaNoChat) {
  const [agora, setAgora] = React.useState(Date.now());
  React.useEffect(() => {
    if (!iaAtivaNoChat) return;
    const t = setInterval(() => setAgora(Date.now()), 1000);
    return () => clearInterval(t);
  }, [iaAtivaNoChat]);
  if (!iaAtivaNoChat || !msgs?.length) return false;
  const last = msgs[msgs.length - 1];
  if (!last || last.from !== 'in') return false;
  const dt = agora - (last.timestamp || 0);
  // Janela de 15s · cobre leitura (~2.5s) + debounce (~2.5s) + Claude (~3-5s) + typing (~3s) com folga
  return dt > 800 && dt < 15000;
}

/* ✨ Renderiza texto no padrão WhatsApp.
   Suporta:
   - Quebras de linha (\n preservadas)
   - *bold*  → **bold**
   - _italic_ → italic
   - ~strike~ → strike
   - ```mono``` → monospace inline
   - URLs → anchor clicável
   - Parágrafos com espaço duplo entre eles */
function renderWaText(text) {
  if (!text) return null;
  const linhas = String(text).split('\n');
  return linhas.map((linha, lineIdx) => (
    <React.Fragment key={lineIdx}>
      {lineIdx > 0 && <br/>}
      {linha === '' && lineIdx > 0 && <span style={{display:'inline-block', height:4}}/>}
      {_parseWaFormatting(linha)}
    </React.Fragment>
  ));
}

// Parse inline: *bold*, _italic_, ~strike~, ```mono```, URLs
function _parseWaFormatting(linha) {
  if (!linha) return null;
  // Regex que captura todos os tokens: ```...```, *...*, _..._, ~...~, URL, ou texto livre
  // Ordem importa: mono primeiro (3 backticks), depois URL, depois bold/italic/strike
  const RE = /(```([^`]+)```)|((?:https?:\/\/|www\.)[^\s<>"']+)|(\*([^*\n]+)\*)|(_([^_\n]+)_)|(~([^~\n]+)~)|([^*_~`\s]+|\s+|.)/g;
  const out = [];
  let m;
  let key = 0;
  while ((m = RE.exec(linha)) !== null) {
    if (m[2] !== undefined) {
      // mono
      out.push(<code key={key++} style={{
        fontFamily:'JetBrains Mono, Consolas, monospace', fontSize:'.9em',
        background:'rgba(128,128,128,.18)', padding:'1px 5px', borderRadius:3,
      }}>{m[2]}</code>);
    } else if (m[3] !== undefined) {
      // url
      const url = m[3];
      const href = url.startsWith('http') ? url : 'https://' + url;
      out.push(<a key={key++} href={href} target="_blank" rel="noopener noreferrer" style={{
        color:'var(--wa-link, #53bdeb)', textDecoration:'underline', wordBreak:'break-all',
      }} onClick={e => e.stopPropagation()}>{url}</a>);
    } else if (m[5] !== undefined) {
      // bold
      out.push(<strong key={key++} style={{fontWeight:600}}>{_parseWaFormatting(m[5])}</strong>);
    } else if (m[7] !== undefined) {
      // italic
      out.push(<em key={key++}>{_parseWaFormatting(m[7])}</em>);
    } else if (m[9] !== undefined) {
      // strike
      out.push(<span key={key++} style={{textDecoration:'line-through', opacity:.7}}>{_parseWaFormatting(m[9])}</span>);
    } else if (m[10] !== undefined) {
      // texto/espaço
      out.push(m[10]);
    }
  }
  return out;
}

function Conversas({ pipelineCols, moverNoPipeline }) {
  // === Instancia WhatsApp ativa (pra tela vazia mostrar nome/foto/numero corretos) ===
  const activeInstanceId = useActiveInstanceId();
  const { instances: waInstances } = useWaInstances();
  const activeInstance = React.useMemo(
    () => waInstances.find(i => i.id === activeInstanceId) || waInstances[0] || null,
    [waInstances, activeInstanceId]
  );

  // === Sync histórico (puxa conversas dos últimos N dias do Evolution) ===
  const [syncOpen, setSyncOpen] = React.useState(false);
  const [syncState, setSyncState] = React.useState({
    running:false, days:10, processed:0, total:0, chats:0, messages:0, errors:[], done:false,
  });

  async function runSyncHistory(days) {
    const instanceName = activeInstance?.evolution_instance_name;
    if (!instanceName) {
      showToast?.('Instância sem nome Evolution configurado', 'error');
      return;
    }
    setSyncState({ running:true, days, processed:0, total:0, chats:0, messages:0, errors:[], done:false });

    let offset = 0;
    let totalMessages = 0;
    let totalChats = 0;
    let errorsAcc = [];
    let isDone = false;
    let totalChatsReported = 0;
    let safety = 0;

    while (!isDone && safety < 100) {
      safety++;
      try {
        const res = await fetch(`${SUPA_CFG.url}/functions/v1/wa-sync-history`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ instanceName, daysBack: days, offset, batchSize: 15 }),
        });
        const data = await res.json();
        if (!data.ok) {
          errorsAcc.push(data.error || 'erro desconhecido');
          break;
        }
        totalMessages += data.messages || 0;
        totalChats = Math.max(totalChats, data.chats || 0);
        totalChatsReported = data.totalChats || totalChatsReported;
        if (data.errors?.length) errorsAcc = errorsAcc.concat(data.errors);
        isDone = !!data.done;
        const nextOffset = data.nextOffset != null ? data.nextOffset : (offset + (data.processed || 1));

        setSyncState({
          running:!isDone, days,
          processed: nextOffset,
          total: totalChatsReported,
          chats: totalChats,
          messages: totalMessages,
          errors: errorsAcc,
          done: isDone,
        });

        if (nextOffset === offset && !isDone) break; // não avançou — break
        offset = nextOffset;
      } catch (e) {
        errorsAcc.push(String(e));
        break;
      }
    }

    setSyncState(s => ({ ...s, running:false, done:true, errors: errorsAcc, chats: totalChats, messages: totalMessages, total: totalChatsReported }));

    // Garante que o admin esteja lendo do Supabase (sync alimenta Supabase, faz sentido)
    try {
