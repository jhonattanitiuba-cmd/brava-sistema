// ═══════════════════════════════════════════════════════════════

// Mapa LocalStorage card.id → uuid no banco (preenchido on-demand)
const _pipeCardDbCache = new Map(); // cardKey -> { dbId, checklist, comments, etiquetaIds, descricao, agente_id, contact_jid, data_vencimento }
const _pipeCardSubs = new Set();
function _notifyPipeCard(key) { _pipeCardSubs.forEach(fn => { try { fn(key); } catch {} }); }

// Hook: indexador global (rodar 1x no app, popula cache de TODOS os cards do workspace)
function usePipelineDbIndex() {
  React.useEffect(() => {
    const cli = getSupa();
    if (!cli) return;
    let alive = true;
    const carregar = async () => {
      try {
        const { data: cards } = await cli.from('pipeline_cards')
          .select('id, titulo, descricao, agente_id, contact_jid, data_vencimento, instancia_id, foto_url')
          .is('archived_at', null);
        if (!alive || !cards) return;
        // Carrega checklist + comments + etiquetas + anexos em batch
        const cardIds = cards.map(c => c.id);
        const fallback = ['00000000-0000-0000-0000-000000000000'];
        const [check, comm, etiq, anex] = await Promise.all([
          cli.from('pipeline_card_checklist').select('card_id, done').in('card_id', cardIds.length ? cardIds : fallback),
          cli.from('pipeline_card_comments').select('card_id').in('card_id', cardIds.length ? cardIds : fallback),
          cli.from('pipeline_card_etiquetas').select('card_id, etiqueta_id').in('card_id', cardIds.length ? cardIds : fallback),
          cli.from('pipeline_card_anexos').select('card_id').in('card_id', cardIds.length ? cardIds : fallback),
        ]);
        _pipeCardDbCache.clear();
        cards.forEach(c => {
          const cks = (check.data || []).filter(x => x.card_id === c.id);
          const cms = (comm.data || []).filter(x => x.card_id === c.id);
          const ets = (etiq.data || []).filter(x => x.card_id === c.id).map(x => x.etiqueta_id);
          const ans = (anex.data || []).filter(x => x.card_id === c.id);
          _pipeCardDbCache.set(c.titulo, {
            dbId: c.id,
            descricao: c.descricao,
            agente_id: c.agente_id,
            contact_jid: c.contact_jid,
            instancia_id: c.instancia_id,
            data_vencimento: c.data_vencimento,
            foto_url: c.foto_url,
            checklistDone: cks.filter(x => x.done).length,
            checklistTotal: cks.length,
            commentsCount: cms.length,
            etiquetaIds: ets,
            anexosCount: ans.length,
          });
        });
        _notifyPipeCard(null);
      } catch (e) { console.warn('pipe index:', e); }
    };
    carregar();
    const ch = cli.channel('rt:pipeline_index')
      .on('postgres_changes', { event:'*', schema:'public', table:'pipeline_cards' }, carregar)
      .on('postgres_changes', { event:'*', schema:'public', table:'pipeline_card_checklist' }, carregar)
      .on('postgres_changes', { event:'*', schema:'public', table:'pipeline_card_comments' }, carregar)
      .on('postgres_changes', { event:'*', schema:'public', table:'pipeline_card_etiquetas' }, carregar)
      .on('postgres_changes', { event:'*', schema:'public', table:'pipeline_card_anexos' }, carregar)
      .subscribe();
    return () => { alive = false; cli.removeChannel(ch); };
  }, []);
}

// Hook: re-render quando dados de pipeline cards mudam
function usePipeCardsTick() {
  const [tick, setTick] = React.useState(0);
  React.useEffect(() => {
    const fn = () => setTick(t => t+1);
    _pipeCardSubs.add(fn);
    return () => _pipeCardSubs.delete(fn);
  }, []);
  return tick;
}

// Cria card no banco se não existir, retorna db record
async function ensurePipelineCardInDb(card, workspaceId) {
  const cli = getSupa();
  if (!cli || !workspaceId) return null;
  // Procura existente pelo titulo
  const { data: existing } = await cli.from('pipeline_cards')
    .select('*').eq('workspace_id', workspaceId).eq('titulo', card.nome).maybeSingle();
  if (existing) return existing;
  // Cria
  const { data: novo } = await cli.from('pipeline_cards').insert({
    workspace_id: workspaceId,
    titulo: card.nome,
    descricao: card.sub || null,
    contact_jid: card.jid || null,
  }).select().single();
  return novo;
}

// Mini-badges nos cards do pipeline
function PipelineCardBadges({ cardKey, cardNome }) {
  usePipeCardsTick();
  const dbData = _pipeCardDbCache.get(cardNome);
  if (!dbData) return null;
  const { checklistDone, checklistTotal, commentsCount, etiquetaIds } = dbData;
  if (checklistTotal === 0 && commentsCount === 0 && etiquetaIds.length === 0 && !dbData.data_vencimento) return null;
  return (
    <div style={{display:'flex', alignItems:'center', gap:8, marginTop:8, marginLeft:34, flexWrap:'wrap'}}>
      {checklistTotal > 0 && (
        <span style={{
          display:'inline-flex', alignItems:'center', gap:3, fontSize:10.5,
          color: checklistDone === checklistTotal ? '#1D9E75' : 'var(--t3)',
          fontFamily:'var(--f-m)', fontWeight:600,
        }}>
          <Icon name={checklistDone === checklistTotal ? 'Check' : 'Square'} size={11}/>
          {checklistDone}/{checklistTotal}
        </span>
      )}
      {commentsCount > 0 && (
        <span style={{display:'inline-flex', alignItems:'center', gap:3, fontSize:10.5, color:'var(--t3)', fontFamily:'var(--f-m)'}}>
          <Icon name="MessageCircle" size={11}/>{commentsCount}
        </span>
      )}
      {dbData.data_vencimento && (() => {
        const venc = new Date(dbData.data_vencimento);
        const dias = Math.ceil((venc - Date.now()) / 86400000);
        const cor = dias < 0 ? '#A32D2D' : dias < 3 ? '#BA7517' : 'var(--t3)';
        return (
          <span style={{display:'inline-flex', alignItems:'center', gap:3, fontSize:10.5, color:cor, fontFamily:'var(--f-m)', fontWeight:600}}>
            <Icon name="Clock" size={11}/>
            {venc.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'})}
          </span>
        );
      })()}
      {(dbData.anexosCount || 0) > 0 && (
        <span style={{display:'inline-flex', alignItems:'center', gap:3, fontSize:10.5, color:'var(--t3)', fontFamily:'var(--f-m)'}}>
          <Icon name="Paperclip" size={11}/>{dbData.anexosCount}
        </span>
      )}
      {etiquetaIds.length > 0 && (
        <span style={{display:'inline-flex', alignItems:'center', gap:3, fontSize:10.5, color:'var(--blue)', fontFamily:'var(--f-m)'}}>
          <Icon name="Tag" size={11}/>{etiquetaIds.length}
        </span>
      )}
    </div>
  );
}

// ✨ Label de seção reutilizável com ícone azul à esquerda
function SecaoLabel({ icon, children, count }) {
  return (
    <div style={{
      display:'flex', alignItems:'center', gap:8, marginBottom:10,
      fontSize:11, color:'var(--t2)', fontWeight:600,
      letterSpacing:'.06em', textTransform:'uppercase',
    }}>
      <Icon name={icon} size={13} style={{color:'var(--blue)', flexShrink:0}}/>
      <span style={{flex:1}}>{children}</span>
      {count != null && count > 0 && (
        <span style={{
          padding:'2px 7px', borderRadius:999,
          background:'rgba(30,144,255,.12)', color:'var(--blue)',
          fontSize:10.5, letterSpacing:0,
        }}>{count}</span>
      )}
    </div>
  );
}

// Modal completo de detalhe do card (estilo Trello)
function PipelineCardDetalheModal({ card, colNome, colCor, onClose, onArchive }) {
  const [dbCard, setDbCard] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [checklist, setChecklist] = React.useState([]);
  const [comments, setComments] = React.useState([]);
  const [descricao, setDescricao] = React.useState('');
  const [editaDesc, setEditaDesc] = React.useState(false);
  const [novoCheck, setNovoCheck] = React.useState('');
  const [novoComent, setNovoComent] = React.useState('');
  const [agenteId, setAgenteId] = React.useState(null);
  const [dataVenc, setDataVenc] = React.useState('');
  const [fotoUrl, setFotoUrl] = React.useState(null);
  const [anexos, setAnexos] = React.useState([]);
  const [novoLinkUrl, setNovoLinkUrl] = React.useState('');
  const [novoLinkNome, setNovoLinkNome] = React.useState('');
  const [mostrarFormLink, setMostrarFormLink] = React.useState(false);
  const [uploadingAnexo, setUploadingAnexo] = React.useState(false);
  const anexoFileInputRef = React.useRef(null);
  const [uploadingFoto, setUploadingFoto] = React.useState(false);
  const fileInputRef = React.useRef(null);
  const { membros } = useTeamMembers();
  // ✨ Etiquetas do card (popover + chips aplicadas)
  const [etiquetasAberto, setEtiquetasAberto] = React.useState(false);
  const { list: todasEtiquetasModal } = useEtiquetas();
  const etiquetasAplicadasIds = usePipelineCardEtiquetas(dbCard?.id);
  const etiquetasAplicadas = todasEtiquetasModal.filter(e => etiquetasAplicadasIds.includes(e.id));

  // Carrega dados do banco (cria card se necessário)
  React.useEffect(() => {
    let alive = true;
    (async () => {
      const cli = getSupa();
      if (!cli) return;
      const { data: ws } = await cli.from('workspace_members').select('workspace_id').limit(1).maybeSingle();
      const wsId = ws?.workspace_id;
      if (!wsId) { setLoading(false); return; }
      const db = await ensurePipelineCardInDb(card, wsId);
      if (!alive || !db) return;
      setDbCard(db);
      setDescricao(db.descricao || '');
      setAgenteId(db.agente_id || null);
      setDataVenc(db.data_vencimento || '');
      setFotoUrl(db.foto_url || null);
      // Carrega checklist + comments + anexos
      const [chk, com, anx] = await Promise.all([
        cli.from('pipeline_card_checklist').select('*').eq('card_id', db.id).order('ordem'),
        cli.from('pipeline_card_comments').select('*').eq('card_id', db.id).order('created_at', { ascending: false }),
        cli.from('pipeline_card_anexos').select('*').eq('card_id', db.id).order('uploaded_at', { ascending: false }),
      ]);
      if (alive) {
        setChecklist(chk.data || []);
        setComments(com.data || []);
        setAnexos(anx.data || []);
        setLoading(false);
      }
    })();
    return () => { alive = false; };
  }, [card.nome]);

  const salvarCampo = async (campo, valor) => {
    if (!dbCard) return;
    const cli = getSupa();
    await cli.from('pipeline_cards').update({ [campo]: valor || null }).eq('id', dbCard.id);
    setDbCard(c => ({ ...c, [campo]: valor }));
  };

  const toggleCheck = async (ck) => {
    const cli = getSupa();
    const novo = !ck.done;
    setChecklist(arr => arr.map(c => c.id === ck.id ? {...c, done: novo, done_at: novo ? new Date().toISOString() : null} : c));
    await cli.from('pipeline_card_checklist').update({ done: novo, done_at: novo ? new Date().toISOString() : null }).eq('id', ck.id);
  };
  const addCheck = async () => {
    if (!novoCheck.trim() || !dbCard) return;
    const cli = getSupa();
    const { data } = await cli.from('pipeline_card_checklist').insert({
      card_id: dbCard.id, titulo: novoCheck.trim(), ordem: checklist.length + 1,
    }).select().single();
    if (data) {
      setChecklist(arr => [...arr, data]);
      setNovoCheck('');
    }
  };
  const removeCheck = async (ck) => {
    const cli = getSupa();
    await cli.from('pipeline_card_checklist').delete().eq('id', ck.id);
    setChecklist(arr => arr.filter(c => c.id !== ck.id));
  };

  const addComment = async () => {
    if (!novoComent.trim() || !dbCard) return;
    const cli = getSupa();
    const { data: sess } = await cli.auth.getSession();
    const { data } = await cli.from('pipeline_card_comments').insert({
      card_id: dbCard.id, user_id: sess?.session?.user?.id, texto: novoComent.trim(),
    }).select().single();
    if (data) {
      setComments(arr => [data, ...arr]);
      setNovoComent('');
    }
  };

  // ✨ Remove comentário (só do próprio user OU admin/owner do workspace)
  const removeComment = async (c) => {
    if (!confirm('Apagar este comentário?')) return;
    try {
      const cli = getSupa();
      await cli.from('pipeline_card_comments').delete().eq('id', c.id);
      setComments(arr => arr.filter(x => x.id !== c.id));
    } catch (e) { showToast?.('Erro: ' + (e.message || e), 'error'); }
  };

  // ✨ Upload de foto do card
  const onUploadFoto = async (e) => {
    const file = e.target?.files?.[0];
    if (!file || !dbCard) return;
    if (file.size > 3 * 1024 * 1024) { showToast?.('Arquivo > 3MB. Reduza ou comprima.', 'error'); return; }
    if (!file.type.startsWith('image/')) { showToast?.('Só imagens (JPG/PNG/WEBP/GIF)', 'error'); return; }
    setUploadingFoto(true);
    try {
      const cli = getSupa();
      const ext = file.name.split('.').pop()?.toLowerCase() || 'jpg';
      const path = `${dbCard.id}/${Date.now()}.${ext}`;
      // Remove foto antiga (se houver) pra não acumular lixo
      if (fotoUrl) {
        const oldPath = fotoUrl.split('/pipeline-cards/')[1];
        if (oldPath) await cli.storage.from('pipeline-cards').remove([oldPath]).catch(()=>{});
      }
      const { error: upErr } = await cli.storage.from('pipeline-cards').upload(path, file, {
        cacheControl: '3600', upsert: false, contentType: file.type,
      });
      if (upErr) throw upErr;
      const { data: { publicUrl } } = cli.storage.from('pipeline-cards').getPublicUrl(path);
      await salvarCampo('foto_url', publicUrl);
      setFotoUrl(publicUrl);
      showToast?.('Foto atualizada', 'success');
    } catch (err) {
      showToast?.('Erro: ' + (err.message || err), 'error');
    } finally {
      setUploadingFoto(false);
      if (fileInputRef.current) fileInputRef.current.value = '';
    }
  };
  // ✨ Anexos: upload PDF/arquivo
  const onUploadAnexo = async (e) => {
    const file = e.target?.files?.[0];
    if (!file || !dbCard) return;
    if (file.size > 20 * 1024 * 1024) { showToast?.('Arquivo > 20MB. Reduza ou comprima.', 'error'); return; }
    setUploadingAnexo(true);
    try {
      const cli = getSupa();
      const ext = file.name.split('.').pop()?.toLowerCase() || 'pdf';
      const path = `${dbCard.id}/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.\-_]/g, '_')}`;
      const { error: upErr } = await cli.storage.from('pipeline-anexos').upload(path, file, {
        cacheControl: '3600', upsert: false, contentType: file.type || 'application/octet-stream',
      });
      if (upErr) throw upErr;
      const { data: { publicUrl } } = cli.storage.from('pipeline-anexos').getPublicUrl(path);
      const { data: sess } = await cli.auth.getSession();
      const { data: novo } = await cli.from('pipeline_card_anexos').insert({
        card_id: dbCard.id,
        tipo: 'file',
        nome: file.name,
        url: publicUrl,
        mime: file.type || 'application/octet-stream',
        tamanho_bytes: file.size,
        storage_path: path,
        uploaded_by: sess?.session?.user?.id,
      }).select().single();
      if (novo) setAnexos(arr => [novo, ...arr]);
      showToast?.('Arquivo anexado', 'success');
    } catch (err) {
      showToast?.('Erro: ' + (err.message || err), 'error');
    } finally {
      setUploadingAnexo(false);
      if (anexoFileInputRef.current) anexoFileInputRef.current.value = '';
    }
  };

  const adicionarLink = async () => {
    if (!novoLinkUrl.trim() || !dbCard) return;
    let url = novoLinkUrl.trim();
    if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
    try {
      const cli = getSupa();
      const { data: sess } = await cli.auth.getSession();
      const nome = novoLinkNome.trim() || url.replace(/^https?:\/\//, '').slice(0, 50);
      const { data: novo } = await cli.from('pipeline_card_anexos').insert({
        card_id: dbCard.id,
        tipo: 'link',
        nome,
        url,
        uploaded_by: sess?.session?.user?.id,
      }).select().single();
      if (novo) {
        setAnexos(arr => [novo, ...arr]);
        setNovoLinkUrl('');
        setNovoLinkNome('');
        setMostrarFormLink(false);
        showToast?.('Link adicionado', 'success');
      }
    } catch (err) {
      showToast?.('Erro: ' + (err.message || err), 'error');
    }
  };

  const removerAnexo = async (anx) => {
    if (!confirm(`Remover "${anx.nome}"?`)) return;
    try {
      const cli = getSupa();
      // Se for arquivo, remove do storage também
      if (anx.tipo === 'file' && anx.storage_path) {
        await cli.storage.from('pipeline-anexos').remove([anx.storage_path]).catch(() => {});
      }
      await cli.from('pipeline_card_anexos').delete().eq('id', anx.id);
      setAnexos(arr => arr.filter(a => a.id !== anx.id));
      showToast?.('Removido', 'success');
    } catch (err) {
      showToast?.('Erro: ' + (err.message || err), 'error');
    }
  };

  const removerFoto = async () => {
    if (!fotoUrl || !confirm('Remover a foto deste card?')) return;
    try {
      const cli = getSupa();
      const oldPath = fotoUrl.split('/pipeline-cards/')[1];
      if (oldPath) await cli.storage.from('pipeline-cards').remove([oldPath]).catch(()=>{});
      await salvarCampo('foto_url', null);
      setFotoUrl(null);
      showToast?.('Foto removida', 'success');
    } catch (err) {
      showToast?.('Erro: ' + (err.message || err), 'error');
    }
  };

  const arquivar = async () => {
    if (!confirm('Arquivar este card? Pode ser recuperado depois.')) return;
    try {
      if (dbCard) {
        const cli = getSupa();
        await cli.from('pipeline_cards').update({ archived_at: new Date().toISOString() }).eq('id', dbCard.id);
        // Limpa cache do índice pra sumir badges/estado em tempo real
        try { _pipeCardDbCache.delete(card.nome); _notifyPipeCard(card.nome); } catch {}
      }
      // Remove o card do estado local do Pipeline (localStorage)
      try { onArchive?.(card); } catch {}
      showToast?.('Card arquivado', 'success');
      onClose();
    } catch (e) {
      showToast?.('Erro: ' + (e.message || e), 'error');
    }
  };

  const doneCount = checklist.filter(c => c.done).length;
  const agenteObj = membros.find(m => m.user_id === agenteId);

  return (
    <div onClick={(e)=>{if(e.target===e.currentTarget) onClose();}} style={{
      position:'fixed', inset:0, background:'rgba(0,0,0,.7)', backdropFilter:'blur(4px)',
      zIndex:10000, display:'flex', alignItems:'center', justifyContent:'center', padding:20,
    }}>
      <div style={{
        background:'var(--bg)', borderRadius:14, width:680, maxWidth:'95vw', maxHeight:'90vh',
        border:'1px solid var(--border)', display:'flex', flexDirection:'column', overflow:'hidden',
      }}>
        {/* Header */}
        <div style={{padding:'18px 22px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', gap:12}}>
          {/* ✨ Avatar editável — click upload */}
          <div style={{position:'relative', flexShrink:0}}>
            <input ref={fileInputRef} type="file" accept="image/*" onChange={onUploadFoto} style={{display:'none'}}/>
            <div onClick={()=>!uploadingFoto && fileInputRef.current?.click()}
              title={uploadingFoto ? 'Enviando...' : 'Clique pra trocar a foto'}
              style={{cursor: uploadingFoto ? 'wait' : 'pointer', position:'relative'}}>
              <ClienteAvatar
                nome={card.nome}
                init={card.init}
                color={card.color}
                logoUrl={fotoUrl || card.logoUrl}
                size={42}/>
              {/* Overlay câmera no hover */}
              <div style={{
                position:'absolute', inset:0, borderRadius:'50%',
                background:'rgba(0,0,0,.55)', display:'flex', alignItems:'center', justifyContent:'center',
                opacity: uploadingFoto ? 1 : 0,
                transition:'opacity .15s',
              }}
                onMouseEnter={e => e.currentTarget.style.opacity = '1'}
                onMouseLeave={e => e.currentTarget.style.opacity = uploadingFoto ? '1' : '0'}>
                <Icon name={uploadingFoto ? 'RefreshCw' : 'Image'} size={14} style={{color:'#fff'}}/>
              </div>
            </div>
            {fotoUrl && (
              <button onClick={removerFoto} title="Remover foto" style={{
                position:'absolute', top:-4, right:-4, width:18, height:18, borderRadius:'50%',
                background:'#E5544D', color:'#fff', border:'2px solid var(--bg-2)',
                fontSize:9, fontWeight:700, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center',
                padding:0, lineHeight:1,
              }}>×</button>
            )}
          </div>
          <div style={{flex:1, minWidth:0}}>
            <h3 style={{margin:0, fontSize:17, color:'var(--t1)', fontFamily:'var(--f-d)', fontWeight:600}}>{card.nome}</h3>
            <div style={{fontSize:12, color:'var(--t3)', marginTop:2, display:'flex', alignItems:'center', gap:6}}>
              <span style={{width:8, height:8, borderRadius:'50%', background: colCor}}/>
              {colNome}
              {checklist.length > 0 && <span>· {doneCount}/{checklist.length} entregues</span>}
            </div>
          </div>
          <button onClick={onClose} style={{
            width:32, height:32, borderRadius:8, border:'none', background:'transparent',
            color:'var(--t3)', cursor:'pointer', fontSize:18,
          }}>×</button>
        </div>

        <div style={{flex:1, overflowY:'auto', padding:'18px 22px'}}>
          {loading ? <div style={{padding:30, textAlign:'center', color:'var(--t3)'}}>Carregando...</div> : (
            <>
              {/* DESCRIÇÃO */}
              <div style={{marginBottom:20}}>
                <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:8,
                  fontSize:11, color:'var(--t2)', fontWeight:600, letterSpacing:'.06em', textTransform:'uppercase'}}>
                  <Icon name="Pencil" size={13} style={{color:'var(--blue)'}}/>
                  <span style={{flex:1}}>Descrição</span>
                  {!editaDesc && descricao && <button onClick={()=>setEditaDesc(true)} style={{fontSize:11, color:'var(--blue)', background:'transparent', border:'none', cursor:'pointer', letterSpacing:0, textTransform:'none', fontWeight:500}}>editar</button>}
                </div>
                {editaDesc || !descricao ? (
                  <>
                    <textarea
                      value={descricao} onChange={e=>setDescricao(e.target.value)}
                      onBlur={() => { salvarCampo('descricao', descricao); setEditaDesc(false); }}
                      autoFocus={editaDesc}
                      placeholder="Adicione uma descrição..."
                      rows={3}
                      style={{
                        width:'100%', padding:'10px 12px', borderRadius:7,
                        background:'var(--bg-3)', border:'1px solid var(--border)',
                        color:'var(--t1)', fontSize:13.5, outline:'none', resize:'vertical', fontFamily:'inherit',
                      }}
                    />
                  </>
                ) : (
                  <div onClick={()=>setEditaDesc(true)} style={{
                    padding:'10px 12px', background:'var(--bg-3)', borderRadius:7,
                    color:'var(--t1)', fontSize:13.5, cursor:'pointer', whiteSpace:'pre-wrap',
                  }}>{descricao}</div>
                )}
              </div>

              {/* ATRIBUIÇÃO + VENCIMENTO */}
              <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:14, marginBottom:20}}>
                <div>
                  <SecaoLabel icon="UserCircle">Atribuído</SecaoLabel>
                  <select value={agenteId || ''} onChange={e=>{setAgenteId(e.target.value || null); salvarCampo('agente_id', e.target.value || null);}}
                    style={{
                      width:'100%', padding:'8px 10px', borderRadius:7,
                      background:'var(--bg-3)', border:'1px solid var(--border)', color:'var(--t1)', fontSize:13,
                    }}>
                    <option value="">— Ninguém</option>
                    {membros.map(m => <option key={m.user_id} value={m.user_id}>{m.nome || m.email}</option>)}
                  </select>
                </div>
                <div>
                  <SecaoLabel icon="Clock">Vencimento</SecaoLabel>
                  <input type="date" value={dataVenc} onChange={e=>{setDataVenc(e.target.value); salvarCampo('data_vencimento', e.target.value || null);}}
                    style={{
                      width:'100%', padding:'8px 10px', borderRadius:7,
                      background:'var(--bg-3)', border:'1px solid var(--border)', color:'var(--t1)', fontSize:13,
                    }}/>
                </div>
              </div>

              {/* ETIQUETAS */}
              <div style={{marginBottom:20, position:'relative'}}>
                <SecaoLabel icon="Tag" count={etiquetasAplicadas.length}>Etiquetas</SecaoLabel>
                <div style={{display:'flex', flexWrap:'wrap', alignItems:'center', gap:6}}>
                  {etiquetasAplicadas.map(e => (
                    <EtiquetaChip key={e.id} etiqueta={e} size="md"
                      onRemove={() => dbCard && removeEtiquetaCard(dbCard.id, e.id)}/>
                  ))}
                  <button onClick={()=>setEtiquetasAberto(v=>!v)} disabled={!dbCard} style={{
                    padding:'4px 10px', borderRadius:999, border:'1px dashed var(--border)',
                    background: etiquetasAberto ? 'rgba(30,144,255,.10)' : 'transparent',
                    color: etiquetasAberto ? 'var(--blue)' : 'var(--t2)',
                    fontSize:12, cursor: dbCard ? 'pointer' : 'not-allowed',
                    display:'inline-flex', alignItems:'center', gap:5, transition:'all .15s',
                  }}
                    onMouseEnter={e=>{if(dbCard && !etiquetasAberto){e.currentTarget.style.borderColor='var(--blue)'; e.currentTarget.style.color='var(--blue)';}}}
                    onMouseLeave={e=>{if(!etiquetasAberto){e.currentTarget.style.borderColor='var(--border)'; e.currentTarget.style.color='var(--t2)';}}}>
                    <Icon name="Plus" size={11}/>
                    {etiquetasAplicadas.length === 0 ? 'Etiqueta' : 'Adicionar'}
                  </button>
                  {etiquetasAberto && dbCard && (
                    <EtiquetasPopover cardId={dbCard.id} anchor="left"
                      onClose={()=>setEtiquetasAberto(false)}/>
                  )}
                </div>
              </div>

              {/* CHECKLIST */}
              <div style={{marginBottom:20}}>
                <SecaoLabel icon="Check" count={checklist.length > 0 ? `${doneCount}/${checklist.length}` : null}>Checklist</SecaoLabel>
                {checklist.length > 0 && (
                  <div style={{height:4, background:'var(--bg-3)', borderRadius:2, overflow:'hidden', marginBottom:10}}>
                    <div style={{height:'100%', width:`${(doneCount/checklist.length)*100}%`, background:'var(--blue)', transition:'width .25s'}}/>
                  </div>
                )}
                {checklist.map(ck => (
                  <div key={ck.id} style={{display:'flex', alignItems:'center', gap:9, padding:'6px 8px', borderRadius:6, cursor:'pointer'}}
                    onMouseEnter={e=>e.currentTarget.style.background='rgba(30,144,255,.06)'}
                    onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                    <input type="checkbox" checked={ck.done} onChange={()=>toggleCheck(ck)}
                      style={{width:16, height:16, cursor:'pointer', accentColor:'var(--blue)'}}/>
                    <span style={{flex:1, fontSize:13.5, color: ck.done ? 'var(--t3)' : 'var(--t1)', textDecoration: ck.done ? 'line-through' : 'none'}}>{ck.titulo}</span>
                    <button onClick={()=>removeCheck(ck)} style={{width:22, height:22, padding:0, border:'none', background:'transparent', color:'var(--t3)', cursor:'pointer', opacity:.4}}
                      onMouseEnter={e=>e.currentTarget.style.opacity='1'} onMouseLeave={e=>e.currentTarget.style.opacity='.4'}>
                      <Icon name="X" size={11}/>
                    </button>
                  </div>
                ))}
                <div style={{display:'flex', gap:6, marginTop:6}}>
                  <input value={novoCheck} onChange={e=>setNovoCheck(e.target.value)}
                    onKeyDown={e => e.key === 'Enter' && addCheck()}
                    placeholder="Adicionar item..."
                    style={{flex:1, padding:'7px 10px', borderRadius:6, background:'var(--bg-3)', border:'1px solid var(--border)', color:'var(--t1)', fontSize:12.5, outline:'none'}}/>

// PIPELINE PROJETOS — Sprint F.2
// Lê projetos (projetos) agrupados por status_fase (fin_status_config)
// Drag-and-drop atualiza status_fase no banco, click abre Cliente 360
// ═════════════════════════════════════════════════════════════════
function PipelineProjetos() {
  const { list: statusConfig } = useStatusConfig();
  const projetos = useRecorrencia();
  const { list: clientes } = useClientes();
  const [drag, setDrag] = React.useState(null);
  const [colHover, setColHover] = React.useState(null);
  const [clienteDetalhe, setClienteDetalhe] = React.useState(null);

  // Agrupa projetos por status_fase
  const colunas = React.useMemo(() => {
    return (statusConfig || []).map(s => ({
      ...s,
      projetos: (projetos || []).filter(p => (p.status_fase || 'lead') === s.key),
    }));
  }, [statusConfig, projetos]);

  const moverProjeto = async (projetoId, novoStatus) => {
    const cli = getSupa();
    if (!cli) { showToast?.('Sem conexão com banco','error'); return; }
    const { error } = await cli.from('projetos').update({
      status_fase: novoStatus,
      status: novoStatus, // mantém legado em sync
      data_ultima_mudanca_fase: new Date().toISOString(),
    }).eq('id', projetoId);
    if (error) {
      console.error('moverProjeto erro:', error);
      showToast?.('Erro ao mover: '+error.message,'error');
      return;
    }
    const cfg = (statusConfig || []).find(s => s.key === novoStatus);
    showToast?.(`✓ Movido para "${cfg?.label || novoStatus}"`, 'success');
  };

  const onDragStart = (e, projeto, colKey) => {
    setDrag({ projeto, fromCol: colKey });
    e.dataTransfer.effectAllowed = 'move';
  };

  const onColDragOver = (e, colKey) => {
    e.preventDefault();
    setColHover(colKey);
  };

  const onDrop = (e, colKey) => {
    e.preventDefault();
    if (drag && drag.fromCol !== colKey) {
      moverProjeto(drag.projeto.id, colKey);
    }
    setDrag(null); setColHover(null);
  };

  const onDragEnd = () => { setDrag(null); setColHover(null); };

  // Abre Cliente 360 do cliente vinculado ao projeto
  const abrirClienteDoProjeto = (proj) => {
    if (!proj.cliente_id) {
      showToast?.('Projeto sem cliente mestre vinculado. Edite o projeto pra vincular.','info');
      return;
    }
    const cli = clientes.find(c => c.id === proj.cliente_id);
    if (cli) setClienteDetalhe(cli);
  };

  const fmt = (v) => Number(v||0).toLocaleString('pt-BR', {minimumFractionDigits:0});
  const totalProjetos = projetos?.length || 0;
  const mrrTotal = (projetos||[]).reduce((s,p) => s + Number(p.mensal||0), 0);

  return (
    <div style={{padding:'28px 32px', overflowX:'auto', height:'calc(100vh - 60px)', display:'flex', flexDirection:'column'}}>
      <div className="page-head" style={{flexShrink:0, marginBottom:14}}>
        <div>
          <div className="page-head__title">Projetos / Pipeline</div>
          <div className="page-head__sub">
            {totalProjetos} projetos · R$ {fmt(mrrTotal)}/mês recorrente · arraste entre fases pra atualizar status
          </div>
        </div>
      </div>

      <div style={{display:'flex', gap:12, flex:1, overflowX:'auto', overflowY:'hidden', paddingBottom:16}}
        onDragEnd={onDragEnd}>
        {colunas.map(col => {
          const isHover = colHover === col.key && drag;
          const colMrr = col.projetos.reduce((s,p) => s + Number(p.mensal||0), 0);
          return (
            <div key={col.key} style={{
                width:280, flexShrink:0, display:'flex', flexDirection:'column', gap:0,
                transition:'transform .15s',
                transform: isHover ? 'translateY(-2px)' : 'none',
              }}
              onDragOver={e => onColDragOver(e, col.key)}
              onDragLeave={e => { if (!e.currentTarget.contains(e.relatedTarget)) setColHover(null); }}
              onDrop={e => onDrop(e, col.key)}>

              {/* Header coluna */}
              <div style={{
                display:'flex', alignItems:'center', gap:8,
                padding:'10px 14px', marginBottom:10,
                background:'var(--bg-2)',
                border:`1px solid ${isHover ? col.cor : col.cor+'44'}`,
                borderTop:`3px solid ${col.cor}`,
                borderRadius:'10px 10px 0 0',
                boxShadow: isHover ? `0 0 0 2px ${col.cor}33` : 'none',
                transition:'all .2s',
              }}>
                <Icon name={col.icone} size={14} style={{color:col.cor, flexShrink:0}}/>
                <span style={{flex:1, fontFamily:'var(--f-d)', fontWeight:600, fontSize:13, color:'var(--t1)'}}>{col.label}</span>
                <span style={{fontFamily:'var(--f-m)', fontSize:11, color:'var(--t3)', background:'var(--bg-3)', padding:'2px 7px', borderRadius:999}}>{col.projetos.length}</span>
              </div>

              {/* Sub-header com MRR */}
              {colMrr > 0 && (
                <div style={{padding:'4px 8px 8px', fontSize:11, color:'var(--t3)', fontFamily:'var(--f-m)'}}>
                  R$ {fmt(colMrr)}/mês
                </div>
              )}

              {/* Cards (projetos) */}
              <div style={{
                flex:1, overflowY:'auto', display:'flex', flexDirection:'column', gap:8, paddingRight:2,
                padding:'2px 4px 2px 0',
                borderRadius:8,
                background: isHover ? `${col.cor}08` : 'transparent',
                transition:'background .2s',
              }}>
                {col.projetos.length === 0 && !isHover && (
                  <div style={{padding:'26px 14px', textAlign:'center', border:'1.5px dashed var(--border)', borderRadius:10, color:'var(--t3)', fontSize:11.5}}>
                    <Icon name="Inbox" size={24} style={{color:'var(--t3)', opacity:.4, margin:'0 auto 6px'}}/>
                    <div>Sem projetos</div>
                  </div>
                )}
                {col.projetos.map(p => {
                  const clienteObj = clientes.find(c => c.id === p.cliente_id);
                  const grupo = p.cliente_grupo || clienteObj?.nome || p.cliente;
                  return (
                    <div key={p.id}
                      draggable
                      onDragStart={e => onDragStart(e, p, col.key)}
                      onClick={() => abrirClienteDoProjeto(p)}
                      style={{
                        padding:'12px 14px',
                        background:'var(--bg-2)',
                        border:`1px solid var(--border)`,
                        borderLeft: `3px solid ${col.cor}`,
                        borderRadius:9,
                        cursor:'grab',
                        transition:'all .15s',
                      }}
                      onMouseEnter={e => { e.currentTarget.style.borderColor='var(--blue)'; e.currentTarget.style.transform='translateX(2px)'; }}
                      onMouseLeave={e => { e.currentTarget.style.borderColor='var(--border)'; e.currentTarget.style.transform='translateX(0)'; }}>
                      <div style={{fontSize:13, color:'var(--t1)', fontWeight:600, marginBottom:3, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{p.cliente}</div>
                      {grupo && grupo !== p.cliente && (
                        <div style={{fontSize:10.5, color:'var(--t3)', marginBottom:6}}>{grupo}</div>
                      )}
                      <div style={{display:'flex', gap:8, fontSize:11, color:'var(--t3)', marginTop:6, alignItems:'center'}}>
                        {Number(p.mensal||0) > 0 && (
                          <span style={{color:'#1D9E75', fontFamily:'var(--f-m)', fontWeight:600}}>R$ {fmt(p.mensal)}/mês</span>
                        )}
                        {Number(p.implementacao||0) > 0 && (
                          <span style={{color:'var(--t3)'}}>· R$ {fmt(p.implementacao)} impl</span>
                        )}
                      </div>
                      {(p.nicho || p.tipo_projeto) && (
                        <div style={{display:'flex', gap:6, marginTop:6, flexWrap:'wrap'}}>
                          {p.nicho && <span style={{fontSize:10, padding:'1px 6px', borderRadius:5, background:'var(--bg-3)', color:'var(--t3)'}}>{p.nicho}</span>}
                          {p.e_repasse_terceiros && <span style={{fontSize:10, padding:'1px 6px', borderRadius:5, background:'rgba(186,117,23,.15)', color:'#BA7517', fontWeight:600}}>REPASSE</span>}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>

      {clienteDetalhe && <Cliente360Modal cliente={clienteDetalhe} onClose={()=>setClienteDetalhe(null)}/>}
    </div>
  );
}

function Pipeline({ cols, setCols }) {
  // ✨ Indexa cards no banco pra mostrar badges nos cards
  usePipelineDbIndex();
  const [editando, setEditando] = useState(null);
  const [novoNome, setNovoNome] = useState('');
  const [drag, setDrag] = useState(null);
  const [dropTarget, setDropTarget] = useState(null);
  const [colHover, setColHover] = useState(null);
  // ✨ Modal de detalhe do card (estilo Trello)
  const [detalheCard, setDetalheCard] = React.useState(null); // { card, colNome, colCor }

  const updateCol = (id, patch) => setCols(cs => cs.map(c => c.id===id ? {...c,...patch} : c));
  const addCol = () => {
    const id = 'col_'+Date.now();
    setCols(cs => [...cs, {id, nome:'Nova coluna', cor:'#6E6E78', cards:[]}]);
    setEditando({colId:id, tipo:'nome'});
    setNovoNome('Nova coluna');
  };
  const removeCol = id => {
    if (!confirm('Remover esta coluna e todos os cards dela?')) return;
    setCols(cs => cs.filter(c => c.id!==id));
  };
  const addCard = colId => {
    const nome = prompt('Nome do cliente:');
    if (!nome) return;
    setCols(cs => cs.map(c => c.id===colId ? {...c, cards:[...c.cards, {id:Date.now()+'', nome, sub:'', nicho:'', color:'#7B3FE4', init:nome.slice(0,2).toUpperCase()}]} : c));
  };

  // Move com posição específica (suporta reordenar dentro da mesma coluna)
  const moveTo = (cardId, fromColId, toColId, toIdx) => {
    setCols(cs => {
      const novas = cs.map(c => ({...c, cards: [...c.cards]}));
      const fromC = novas.find(c => c.id === fromColId);
      const toC   = novas.find(c => c.id === toColId);
      if (!fromC || !toC) return cs;
      const fromIdx = fromC.cards.findIndex(k => k.id === cardId);
      if (fromIdx < 0) return cs;
      const [card] = fromC.cards.splice(fromIdx, 1);
      // ajusta o índice se mover dentro da mesma coluna pra trás
      const insertAt = (fromColId === toColId && toIdx > fromIdx) ? toIdx - 1 : toIdx;
      toC.cards.splice(Math.min(insertAt, toC.cards.length), 0, card);
      return novas;
    });
  };

  const onDragStart = (e, card, colId, idx) => {
    setDrag({ card, fromCol: colId, fromIdx: idx });
    e.dataTransfer.effectAllowed = 'move';
    // Cria um ghost transparente customizado
    try {
      const ghost = e.currentTarget.cloneNode(true);
      ghost.style.position = 'absolute';
      ghost.style.top = '-9999px';
      ghost.style.left = '-9999px';
      ghost.style.width = e.currentTarget.offsetWidth + 'px';
      ghost.style.transform = 'rotate(3deg)';
      ghost.style.opacity = '0.95';
      ghost.style.boxShadow = '0 16px 40px rgba(0,0,0,.5)';
      document.body.appendChild(ghost);
      e.dataTransfer.setDragImage(ghost, 20, 20);
      setTimeout(() => ghost.remove(), 0);
    } catch (err) {}
  };

  const onCardDragOver = (e, colId, idx) => {
    e.preventDefault();
    e.stopPropagation();
    if (!drag) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const meio = rect.top + rect.height / 2;
    const novoIdx = e.clientY < meio ? idx : idx + 1;
    if (dropTarget?.colId !== colId || dropTarget?.idx !== novoIdx) {
      setDropTarget({ colId, idx: novoIdx });
    }
  };

  const onColDragOver = (e, colId) => {
    e.preventDefault();
    setColHover(colId);
    // Se não tem dropTarget na coluna, coloca no final
    if (drag && (!dropTarget || dropTarget.colId !== colId)) {
      const col = cols.find(c => c.id === colId);
      if (col) setDropTarget({ colId, idx: col.cards.length });
    }
  };

  const onDrop = (e) => {
    e.preventDefault();
    if (drag && dropTarget) {
      moveTo(drag.card.id, drag.fromCol, dropTarget.colId, dropTarget.idx);
      if (drag.fromCol !== dropTarget.colId) {
        showToast(`${drag.card.nome} movido para "${cols.find(c=>c.id===dropTarget.colId)?.nome}"`, 'success');
      }
    }
    setDrag(null); setDropTarget(null); setColHover(null);
  };

  const onDragEnd = () => { setDrag(null); setDropTarget(null); setColHover(null); };

  return (
    <div style={{padding:'28px 32px',overflowX:'auto',height:'calc(100vh - 60px)',display:'flex',flexDirection:'column'}}>
      <div className="page-head" style={{flexShrink:0}}>
        <div>
          <div className="page-head__title">Pipeline de Clientes</div>
          <div className="page-head__sub">{cols.reduce((s,c)=>s+c.cards.length,0)} clientes · {cols.length} colunas · arraste cards entre colunas ou reordene dentro da mesma</div>
        </div>
        <div className="page-head__actions">
          <button className="btn btn-outline" onClick={addCol}><Icon name="Plus" size={14}/>Nova coluna</button>
        </div>
      </div>

      <div style={{display:'flex',gap:14,flex:1,overflowX:'auto',overflowY:'hidden',paddingBottom:16}}
        onDragEnd={onDragEnd}>
        {cols.map(col => {
          const isHover = colHover === col.id && drag;
          return (
          <div key={col.id} style={{
              width:280, flexShrink:0, display:'flex', flexDirection:'column', gap:0,
              transition:'transform .15s',
              transform: isHover ? 'translateY(-2px)' : 'none',
            }}
            onDragOver={e => onColDragOver(e, col.id)}
            onDragLeave={e => { if (!e.currentTarget.contains(e.relatedTarget)) setColHover(null); }}
            onDrop={onDrop}>

            {/* Header coluna */}
            <div style={{
              display:'flex',alignItems:'center',gap:8,
              padding:'10px 14px',marginBottom:10,
              background:'var(--bg-2)',
              border:`1px solid ${isHover ? col.cor : col.cor+'44'}`,
              borderTop:`3px solid ${col.cor}`,
              borderRadius:'10px 10px 0 0',
              boxShadow: isHover ? `0 0 0 2px ${col.cor}33` : 'none',
              transition:'all .2s',
            }}>
              <div style={{position:'relative'}}>
                <div onClick={()=>setEditando(editando?.colId===col.id&&editando?.tipo==='cor'?null:{colId:col.id,tipo:'cor'})}
                  style={{width:16,height:16,borderRadius:'50%',background:col.cor,cursor:'pointer',border:'2px solid rgba(255,255,255,.2)',flexShrink:0}}/>
                {editando?.colId===col.id && editando?.tipo==='cor' && (
                  <div style={{position:'absolute',top:24,left:0,zIndex:100,background:'var(--bg-3)',border:'1px solid var(--border)',borderRadius:10,padding:10,display:'flex',gap:6,flexWrap:'wrap',width:140,boxShadow:'0 8px 24px rgba(0,0,0,.4)'}}>
                    {CORES.map(c=>(
                      <div key={c} onClick={()=>{updateCol(col.id,{cor:c});setEditando(null);}}
                        style={{width:22,height:22,borderRadius:'50%',background:c,cursor:'pointer',border:col.cor===c?'2px solid #fff':'2px solid transparent',transition:'border .15s'}}/>
                    ))}
                  </div>
                )}
              </div>

              {editando?.colId===col.id && editando?.tipo==='nome'
                ? <input autoFocus value={novoNome} onChange={e=>setNovoNome(e.target.value)}
                    onBlur={()=>{updateCol(col.id,{nome:novoNome});setEditando(null);}}
                    onKeyDown={e=>{if(e.key==='Enter'){updateCol(col.id,{nome:novoNome});setEditando(null);}if(e.key==='Escape')setEditando(null);}}
                    style={{flex:1,background:'var(--bg-3)',border:'1px solid var(--purple)',borderRadius:6,padding:'2px 8px',fontSize:13,color:'var(--t1)',outline:'none'}}/>
                : <span onClick={()=>{setEditando({colId:col.id,tipo:'nome'});setNovoNome(col.nome);}}
                    style={{flex:1,fontFamily:'var(--f-d)',fontWeight:600,fontSize:13.5,color:'var(--t1)',cursor:'pointer'}}
                    title="Clique para renomear">{col.nome}</span>
              }

              <span style={{fontFamily:'var(--f-m)',fontSize:11,color:'var(--t3)',background:'var(--bg-3)',padding:'2px 7px',borderRadius:999}}>{col.cards.length}</span>
              <button onClick={()=>removeCol(col.id)} title="Remover coluna"
                style={{width:20,height:20,borderRadius:4,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--t3)',cursor:'pointer',transition:'color .15s'}}
                onMouseEnter={e=>e.currentTarget.style.color='#fca5a5'}
                onMouseLeave={e=>e.currentTarget.style.color='var(--t3)'}>
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
              </button>
            </div>

            {/* Cards */}
            <div style={{
              flex:1, overflowY:'auto', display:'flex', flexDirection:'column', gap:8, paddingRight:2,
              padding:'2px 4px 2px 0',
              borderRadius:8,
              background: isHover ? `${col.cor}08` : 'transparent',
              transition:'background .2s',
            }}>
              {col.cards.length === 0 && !isHover && (
                <div style={{padding:'30px 16px', textAlign:'center', border:'1.5px dashed var(--border)', borderRadius:10, color:'var(--t3)', fontSize:12}}>
                  <Icon name="Inbox" size={28} style={{color:'var(--t3)', opacity:.4, margin:'0 auto 8px'}}/>
                  <div>Arraste um card aqui<br/>ou clique em + Adicionar</div>
                </div>
              )}
              {col.cards.map((card, idx) => {
                const showPlaceholderBefore = dropTarget?.colId === col.id && dropTarget?.idx === idx && drag?.card.id !== card.id;
                const isDragging = drag?.card.id === card.id;
                return (
                  <React.Fragment key={card.id}>
                    {showPlaceholderBefore && <DragPlaceholder cor={col.cor} h={drag?.height || 60}/>}
                    <div draggable
                      onDragStart={e => {
                        const h = e.currentTarget.offsetHeight;
                        setDrag({ card, fromCol: col.id, fromIdx: idx, height: h });
                        e.dataTransfer.effectAllowed = 'move';
                      }}
                      onDragEnd={onDragEnd}
                      onDragOver={e => onCardDragOver(e, col.id, idx)}
                      onClick={() => setDetalheCard({ card, colNome: col.nome, colCor: col.cor })}
                      style={{
                        background:'var(--bg-2)', border:'1px solid var(--border-soft)',
                        borderLeft:`3px solid ${card.color}`, borderRadius:10,
                        padding:'12px 14px', cursor:'grab',
                        transition:'all .18s cubic-bezier(.22,1,.36,1)',
                        opacity: isDragging ? 0.35 : 1,
                        transform: isDragging ? 'scale(.97)' : 'scale(1)',
                        boxShadow: isDragging ? 'none' : '0 1px 0 rgba(0,0,0,.05)',
                      }}
                      onMouseDown={e => e.currentTarget.style.cursor = 'grabbing'}
                      onMouseUp={e => e.currentTarget.style.cursor = 'grab'}
                      onMouseEnter={e => { if (!drag) { e.currentTarget.style.borderColor = 'rgba(123,63,228,.4)'; e.currentTarget.style.transform = 'translateY(-1px)'; e.currentTarget.style.boxShadow = '0 4px 12px rgba(0,0,0,.15)'; }}}
                      onMouseLeave={e => { if (!drag) { e.currentTarget.style.borderColor = 'var(--border-soft)'; e.currentTarget.style.transform = 'translateY(0)'; e.currentTarget.style.boxShadow = '0 1px 0 rgba(0,0,0,.05)'; }}}>
                      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:card.sub?6:0}}>
                        <ClienteAvatar
                          nome={card.nome} init={card.init} color={card.color}
                          logoUrl={_pipeCardDbCache.get(card.nome)?.foto_url || card.logoUrl}
                          size={28}/>
                        <div style={{fontWeight:600,fontSize:13,color:'var(--t1)',flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{card.nome}</div>
                      </div>
                      {card.sub && <div style={{fontSize:11.5,color:'var(--t3)',marginLeft:34}}>{card.sub}</div>}
                      {card.nicho && <div style={{fontSize:11,color:'var(--t2)',marginLeft:34,marginTop:2}}>{card.nicho}</div>}
                      {/* ✨ Indicadores rápidos do card (checklist/comments/etiquetas) */}
                      <PipelineCardBadges cardKey={card.id} cardNome={card.nome}/>
                    </div>
                  </React.Fragment>
                );
              })}
              {/* Placeholder no fim da lista */}
              {dropTarget?.colId === col.id && dropTarget?.idx >= col.cards.length && drag && drag.fromCol !== col.id && (
                <DragPlaceholder cor={col.cor} h={drag.height || 60}/>
              )}
              {dropTarget?.colId === col.id && dropTarget?.idx >= col.cards.length && drag?.fromCol === col.id && drag?.fromIdx !== col.cards.length - 1 && (
                <DragPlaceholder cor={col.cor} h={drag.height || 60}/>
              )}

              {/* Adicionar card */}
              <button onClick={()=>addCard(col.id)} style={{
                width:'100%',padding:'9px',borderRadius:9,border:'1px dashed var(--border)',
                background:'transparent',color:'var(--t3)',fontSize:12.5,cursor:'pointer',
                display:'flex',alignItems:'center',justifyContent:'center',gap:5,
                transition:'all .15s',
              }}
                onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--purple)';e.currentTarget.style.color='#c4a8ff';}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--t3)';}}>
                <Icon name="Plus" size={13}/>Adicionar
              </button>
            </div>
          </div>
        );})}
      </div>
      {/* ✨ Modal de detalhe do card (estilo Trello) */}
      {detalheCard && (
        <PipelineCardDetalheModal
          card={detalheCard.card}
          colNome={detalheCard.colNome}
          colCor={detalheCard.colCor}
          onClose={() => setDetalheCard(null)}
          onArchive={(cardArquivado) => {
            // Remove o card de todas as colunas (atualiza pipelineCols + localStorage)
            setCols(cs => cs.map(c => ({
              ...c,
              cards: c.cards.filter(k => k.id !== cardArquivado.id && k.nome !== cardArquivado.nome),
            })));
          }}
        />
      )}
    </div>
  );
}

function exportarCSV() {
  const lista = getRecorrencia();

  const rows = [['Cliente','Serviço','Nicho','Status','Implementação','Mensal','Dia Pagamento','Pago no mês','Dias atraso']];
  lista.forEach(r => {
    const stPag = statusPagamentoMes(r, pagamentos);

    const dAtraso = stPag.kind === 'atrasado' ? stPag.dias : 0;
    rows.push([r.cliente, r.servico, r.nicho, r.status, r.impl, r.mensal, r.dia, pagoMes, dAtraso]);
  });
  const csv = rows.map(r => r.map(c => `"${(''+c).replace(/"/g,'""')}"`).join(',')).join('\n');

/* ══════════════════════════════════════════════════════════════════════════
   AGENDA · inspirada no Google Calendar
   - Store reativo de eventos com persistencia em localStorage
   - Visualizacoes: Mes / Semana / Dia
   - Mini-calendario lateral (sidebar)
   - Modal de criar/editar evento com cor, hora inicio/fim, descricao
   ══════════════════════════════════════════════════════════════════════════ */

const AGENDA_KEY = 'brava_agenda_events';
const fireAgendaChanged = () => window.dispatchEvent(new Event('brava_agenda_changed'));

function _readAgenda() {
  try { return JSON.parse(localStorage.getItem(AGENDA_KEY) || '[]'); } catch { return []; }
}
function _writeAgenda(arr) {
  localStorage.setItem(AGENDA_KEY, JSON.stringify(arr));
  fireAgendaChanged();
}
function addAgendaEvent(ev) {
  const arr = _readAgenda();
  const novo = { id: `ev_${Date.now()}_${Math.random().toString(36).slice(2,7)}`, ...ev };
  arr.push(novo);
  _writeAgenda(arr);
  return novo.id;
}
function updateAgendaEvent(id, patch) {
  const arr = _readAgenda();
  const i = arr.findIndex(e => e.id === id);
  if (i < 0) return;
  arr[i] = { ...arr[i], ...patch };
  _writeAgenda(arr);
}
function deleteAgendaEvent(id) {
  _writeAgenda(_readAgenda().filter(e => e.id !== id));
}
function useAgenda() {
  const [list, setList] = React.useState(() => _readAgenda());
  React.useEffect(() => {
    const refresh = () => setList(_readAgenda());
    window.addEventListener('brava_agenda_changed', refresh);
    window.addEventListener('storage', refresh);
    return () => {
      window.removeEventListener('brava_agenda_changed', refresh);
      window.removeEventListener('storage', refresh);
    };
  }, []);
  return list;
}

const agISO = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const agParseISO = s => { if (!s) return new Date(); const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); };
const agSameDay = (a,b) => a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
const agAddDays = (d, n) => { const x = new Date(d); x.setDate(x.getDate()+n); return x; };
const agStartOfWeek = d => { const x = new Date(d); x.setDate(x.getDate() - x.getDay()); x.setHours(0,0,0,0); return x; };
const agStartOfMonth = d => new Date(d.getFullYear(), d.getMonth(), 1);
const agEndOfMonth = d => new Date(d.getFullYear(), d.getMonth()+1, 0);
const agMinutosDoDia = hhmm => { if (!hhmm) return 0; const [h,m]=hhmm.split(':').map(Number); return h*60 + (m||0); };
const agMinAHHMM = min => `${String(Math.floor(min/60)).padStart(2,'0')}:${String(min%60).padStart(2,'0')}`;

/* ── Mini calendario na sidebar ── */
function AgendaMiniCal({ refDate, selected, onPick, events }) {
  const inicioMes = agStartOfMonth(refDate);
  const fimMes = agEndOfMonth(refDate);
  const firstWeekday = inicioMes.getDay();
  const totalDias = fimMes.getDate();
  const cells = [];
  for (let i = 0; i < firstWeekday; i++) cells.push(null);
  for (let i = 1; i <= totalDias; i++) cells.push(new Date(refDate.getFullYear(), refDate.getMonth(), i));
  while (cells.length % 7) cells.push(null);

  const hoje = new Date();
  const eventDays = new Set(events.map(e => e.data));

  return (
    <div style={{marginBottom:18}}>
      <div style={{
        display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:2, marginBottom:6,
      }}>
        {AG_DIAS.map(d => (
          <div key={d} style={{textAlign:'center', fontSize:10, color:'var(--t3)', fontFamily:'var(--f-m)', textTransform:'uppercase', letterSpacing:'.06em', padding:'4px 0'}}>{d[0]}</div>
        ))}
      </div>
      <div style={{display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:2}}>
        {cells.map((d, i) => {
          if (!d) return <div key={i} style={{aspectRatio:'1', }}/>;
          const isHoje = agSameDay(d, hoje);
          const isSel  = agSameDay(d, selected);
          const tem    = eventDays.has(agISO(d));
          return (
            <button key={i} onClick={()=>onPick(d)} style={{
              aspectRatio:'1', minHeight:28,
              display:'flex', alignItems:'center', justifyContent:'center',
              fontSize:11.5, fontFamily:'var(--f-b)',
              borderRadius:'50%',
              background: isSel ? 'var(--purple)' : isHoje ? 'rgba(123,63,228,.15)' : 'transparent',
              color: isSel ? '#fff' : isHoje ? 'var(--purple)' : 'var(--t1)',
              border:'none', cursor:'pointer',
              fontWeight: isSel || isHoje ? 700 : 500,
              position:'relative',
              transition:'background .15s',
            }}
              onMouseEnter={e => { if (!isSel) e.currentTarget.style.background = 'rgba(255,255,255,.06)'; }}
              onMouseLeave={e => { if (!isSel) e.currentTarget.style.background = isHoje ? 'rgba(123,63,228,.15)' : 'transparent'; }}
            >
              {d.getDate()}
              {tem && !isSel && <span style={{position:'absolute', bottom:3, width:3, height:3, borderRadius:'50%', background:'var(--blue)'}}/>}
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* ── Vista MES ── */
function AgendaVistaMes({ refDate, events, onSelectDay, onEditEvent, onNew }) {
  const inicio = agStartOfMonth(refDate);
  const fim = agEndOfMonth(refDate);
  const inicioGrade = agAddDays(inicio, -inicio.getDay());
  const semanas = [];
  let d = new Date(inicioGrade);
  while (d <= fim || semanas.length < 5 || (semanas.length === 5 && d.getDay() !== 0)) {
    const linha = [];
    for (let i = 0; i < 7; i++) { linha.push(new Date(d)); d = agAddDays(d, 1); }
    semanas.push(linha);
    if (semanas.length >= 6) break;
  }

  const hoje = new Date();
  const evPorDia = {};
  events.forEach(e => {
    (evPorDia[e.data] = evPorDia[e.data] || []).push(e);
  });
  Object.values(evPorDia).forEach(arr => arr.sort((a,b) => agMinutosDoDia(a.inicio) - agMinutosDoDia(b.inicio)));

  return (
    <div style={{display:'flex', flexDirection:'column', height:'100%', minHeight:0}}>
      <div style={{display:'grid', gridTemplateColumns:'repeat(7,1fr)', borderBottom:'1px solid var(--border-soft)'}}>

            {d.slice(0,3)}
          </div>
        ))}
      </div>
      <div style={{flex:1, display:'grid', gridTemplateRows:`repeat(${semanas.length}, 1fr)`, minHeight:0}}>
        {semanas.map((semana, si) => (
          <div key={si} style={{display:'grid', gridTemplateColumns:'repeat(7,1fr)', borderBottom: si===semanas.length-1 ? 'none' : '1px solid var(--border-soft)'}}>
            {semana.map((dia, di) => {
              const isHoje = agSameDay(dia, hoje);
              const isMesAtual = dia.getMonth() === refDate.getMonth();
              const evs = evPorDia[agISO(dia)] || [];
              const visiveis = evs.slice(0,3);
              const ocultos  = evs.length - visiveis.length;
              return (
                <div key={di} onClick={()=>onSelectDay(dia)} style={{
                  borderRight: di===6 ? 'none' : '1px solid var(--border-soft)',
                  padding:'6px 6px 4px',
                  background: isHoje ? 'rgba(123,63,228,.05)' : 'transparent',

                      width:24, height:24, borderRadius:'50%',

                      fontFamily:'var(--f-m)',
                    }}>{dia.getDate()}</span>
                  </div>
                  <div style={{display:'flex', flexDirection:'column', gap:2, overflow:'hidden'}}>
                    {visiveis.map(ev => {
                      const hex = AG_COR_HEX(ev.cor);
                      return (
                        <button key={ev.id} onClick={e => { e.stopPropagation(); onEditEvent(ev); }} style={{
                          textAlign:'left', display:'flex', alignItems:'center', gap:5,
                          background: ev.diaTodo ? hex : 'transparent',
                          color: ev.diaTodo ? '#fff' : 'var(--t1)',
                          border:'none', padding: ev.diaTodo ? '2px 6px' : '1px 4px',
                          borderRadius:4, cursor:'pointer',
                          fontSize:11.5, fontWeight:500, fontFamily:'var(--f-b)',
                          whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis',
                        }}>
                          {!ev.diaTodo && <span style={{width:6, height:6, borderRadius:'50%', background:hex, flexShrink:0}}/>}
                          {!ev.diaTodo && <span style={{color:'var(--t2)', fontSize:11}}>{ev.inicio}</span>}
                          <span style={{overflow:'hidden', textOverflow:'ellipsis'}}>{ev.titulo}</span>
                        </button>
                      );

                      <button onClick={e=>{e.stopPropagation(); onSelectDay(dia);}} style={{
                        background:'transparent', border:'none', cursor:'pointer',

                display:'inline-flex', alignItems:'center', justifyContent:'center',
                width:34, height:34, borderRadius:'50%',
                background: isHoje ? 'rgba(123,63,228,.15)' : 'transparent',
              }}>{d.getDate()}</div>
            </div>
          );
        })}
      </div>

      {/* Grid de horas com scroll */}
      <div className="agenda-timeline-grid" style={{flex:1, overflow:'auto', position:'relative'}}>
        <div style={{display:'grid', gridTemplateColumns:`60px repeat(${dias}, 1fr)`, position:'relative'}}>
          {/* Coluna de horas */}
          <div>
            {horas.map(h => (
              <div key={h} style={{height:ROW_H, borderBottom:'1px solid var(--border-soft)', position:'relative'}}>
                <span style={{
                  position:'absolute', top:-7, right:8,
                  fontSize:10, color:'var(--t3)', fontFamily:'var(--f-m)',
                  background:'var(--bg-2)', padding:'0 4px',
                }}>{String(h).padStart(2,'0')}:00</span>
              </div>
            ))}
          </div>

          {/* Colunas dos dias */}
          {colunas.map((dia, ci) => {
            const isoData = agISO(dia);
            const evs = (porData[isoData] || []).filter(e => !e.diaTodo);
            const isHoje = agSameDay(dia, hoje);
            return (
              <div key={ci} style={{borderLeft:'1px solid var(--border-soft)', position:'relative'}}>
                {horas.map(h => (
                  <div key={h} onClick={()=>onNew({data: isoData, inicio: agMinAHHMM(h*60), fim: agMinAHHMM((h+1)*60)})}
                    style={{
                      height:ROW_H, borderBottom:'1px solid var(--border-soft)',
                      cursor:'pointer', transition:'background .12s',
                    }}
                    onMouseEnter={e=>e.currentTarget.style.background='rgba(123,63,228,.04)'}
                    onMouseLeave={e=>e.currentTarget.style.background='transparent'}
                  />
                ))}
                {/* Linha "agora" */}
                {isHoje && (
                  <div style={{
                    position:'absolute', left:0, right:0,
                    top: (agora / 60) * ROW_H,
                    borderTop:'2px solid #A32D2D',
                    zIndex:2, pointerEvents:'none',
                  }}>
                    <div style={{width:8, height:8, borderRadius:'50%', background:'#A32D2D', marginLeft:-4, marginTop:-5}}/>
                  </div>
                )}
                {/* Eventos posicionados absolute */}
                {evs.map(ev => {
                  const ini = agMinutosDoDia(ev.inicio);
                  const fim = agMinutosDoDia(ev.fim);
                  const top = (ini / 60) * ROW_H;
                  const altura = Math.max(((fim - ini) / 60) * ROW_H - 2, 22);
                  const hex = AG_COR_HEX(ev.cor);
                  return (
                    <button key={ev.id} onClick={e=>{e.stopPropagation(); onEditEvent(ev);}} style={{
                      position:'absolute', left:4, right:4,
                      top, height:altura,
                      background: `${hex}22`,
                      borderLeft: `3px solid ${hex}`,
                      borderRadius:6,
                      padding:'4px 8px',
                      textAlign:'left',
                      display:'flex', flexDirection:'column', gap:2,
                      overflow:'hidden',
                      cursor:'pointer',
                      transition:'background .15s, box-shadow .15s',
                    }}
                      onMouseEnter={e=>{e.currentTarget.style.background = `${hex}33`; e.currentTarget.style.boxShadow=`0 4px 12px ${hex}33`;}}
                      onMouseLeave={e=>{e.currentTarget.style.background = `${hex}22`; e.currentTarget.style.boxShadow='none';}}
                    >
                      <div style={{fontSize:12, fontWeight:600, color:'var(--t1)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>{ev.titulo}</div>
                      <div style={{fontSize:11, color:'var(--t2)', fontFamily:'var(--f-m)'}}>{ev.inicio} - {ev.fim}</div>
                      {ev.local && altura > 50 && (
                        <div style={{fontSize:10.5, color:'var(--t3)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>📍 {ev.local}</div>
                      )}
                    </button>
                  );
                })}
                {/* Eventos dia inteiro no topo */}
                {(porData[isoData] || []).filter(e => e.diaTodo).slice(0,2).map((ev, idx) => {
                  const hex = AG_COR_HEX(ev.cor);
                  return (
                    <button key={ev.id} onClick={e=>{e.stopPropagation(); onEditEvent(ev);}} style={{
                      position:'absolute', left:4, right:4, top: 2 + idx*22,
                      background:hex, color:'#fff',
                      border:'none', borderRadius:4,
                      padding:'2px 6px',
                      textAlign:'left',
                      fontSize:11, fontWeight:600,
                      whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis',
                      cursor:'pointer', zIndex:3,
                    }}>{ev.titulo}</button>
                  );
                })}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function Agenda() {
  const events = useAgenda();
  const [refDate, setRefDate] = useState(() => new Date());
  const [vista, setVista] = useState(() => localStorage.getItem('brava_agenda_vista') || 'semana'); // mes / semana / dia
  const [editando, setEditando] = useState(null);

  React.useEffect(() => { localStorage.setItem('brava_agenda_vista', vista); }, [vista]);

  // Scroll inicial pra hora 7h na timeline
  React.useEffect(() => {
    if (vista === 'semana' || vista === 'dia') {
      const t = setTimeout(() => {
        const scroller = document.querySelector('.agenda-timeline-grid');
        if (scroller) scroller.scrollTop = 7 * 48; // 7h * 48px
      }, 50);
      return () => clearTimeout(t);
    }
  }, [vista, refDate]);

  const tituloPeriodo = React.useMemo(() => {
    if (vista === 'mes') {
      return `${AG_MESES[refDate.getMonth()]} de ${refDate.getFullYear()}`;
    }
    if (vista === 'dia') {
      return `${AG_DIAS_LONGO[refDate.getDay()]}, ${refDate.getDate()} de ${AG_MESES[refDate.getMonth()]}`;
    }
    // semana
    const ini = agStartOfWeek(refDate);
    const fim = agAddDays(ini, 6);
    if (ini.getMonth() === fim.getMonth()) {
      return `${ini.getDate()} a ${fim.getDate()} de ${AG_MESES[ini.getMonth()]} de ${ini.getFullYear()}`;
    }
    return `${ini.getDate()} ${AG_MESES_CURTO[ini.getMonth()]} – ${fim.getDate()} ${AG_MESES_CURTO[fim.getMonth()]} de ${fim.getFullYear()}`;
  }, [refDate, vista]);

  const navPeriodo = (d) => {
    const x = new Date(refDate);
    if (vista === 'mes') x.setMonth(x.getMonth() + d);
    else if (vista === 'semana') x.setDate(x.getDate() + 7*d);
    else x.setDate(x.getDate() + d);
    setRefDate(x);
  };

  const novoEvento = (preset = {}) => {
    const base = { data: agISO(refDate), inicio:'09:00', fim:'10:00', cor:'roxo' };
    setEditando({ ...base, ...preset });
  };

  return (
    <div className="page" style={{display:'flex', flexDirection:'column', minHeight:'calc(100vh - 130px)', paddingBottom:0}}>
      <div className="page-head">
        <div>
          <div className="page-head__title">Agenda</div>
          <div className="page-head__sub">
            {events.length === 0
              ? 'Crie seu primeiro evento clicando em uma data ou no botao abaixo'
              : `${events.length} evento${events.length===1?'':'s'} na sua agenda`}
          </div>
        </div>
        <div className="page-head__actions" style={{display:'flex', gap:10}}>
          <button onClick={()=>setRefDate(new Date())} className="btn btn-outline">Hoje</button>
          <button onClick={()=>novoEvento()} className="btn btn-primary"><Icon name="Plus" size={14}/>Novo evento</button>
        </div>
      </div>

      {/* Toolbar de navegacao */}
      <div style={{display:'flex', alignItems:'center', gap:14, marginBottom:14, flexWrap:'wrap'}}>
        <div style={{display:'flex', alignItems:'center', gap:4}}>
          <button onClick={()=>navPeriodo(-1)} title="Anterior" style={{
            width:34, height:34, borderRadius:'50%', border:'1px solid var(--border)',
            background:'transparent', color:'var(--t1)', cursor:'pointer',
            display:'flex', alignItems:'center', justifyContent:'center',
          }}><Icon name="ChevronLeft" size={16}/></button>
          <button onClick={()=>navPeriodo(1)} title="Próximo" style={{
            width:34, height:34, borderRadius:'50%', border:'1px solid var(--border)',
            background:'transparent', color:'var(--t1)', cursor:'pointer',
            display:'flex', alignItems:'center', justifyContent:'center',
          }}><Icon name="ChevronRight" size={16}/></button>
        </div>
        <div style={{fontFamily:'var(--f-d)', fontSize:20, fontWeight:600, color:'var(--t1)', textTransform:'capitalize', flex:1}}>
          {tituloPeriodo}
        </div>
        <div style={{display:'flex', background:'var(--bg-3)', border:'1px solid var(--border)', borderRadius:8, padding:3}}>
          {[
            {k:'dia',    l:'Dia'},
            {k:'semana', l:'Semana'},
            {k:'mes',    l:'Mês'},
          ].map(o => (
            <button key={o.k} onClick={()=>setVista(o.k)} style={{
              padding:'6px 14px', borderRadius:6,
              border:'none', cursor:'pointer',
              fontSize:13, fontWeight:500, fontFamily:'var(--f-b)',
              background: vista===o.k ? 'var(--purple)' : 'transparent',
              color:    vista===o.k ? '#fff' : 'var(--t2)',
              transition:'all .15s',
            }}>{o.l}</button>
          ))}
        </div>
      </div>

      {/* Layout: sidebar (mini-cal) + main */}
      <div style={{display:'grid', gridTemplateColumns:'240px 1fr', gap:16, flex:1, minHeight:0}} className="agenda-layout">
        {/* Sidebar */}
        <aside style={{
          background:'var(--bg-2)', border:'1px solid var(--border-soft)',
          borderRadius:12, padding:14,
          display:'flex', flexDirection:'column',
          minHeight:0, overflow:'hidden',
        }}>
          <button onClick={()=>novoEvento()} className="btn btn-primary" style={{marginBottom:14, justifyContent:'center'}}>
            <Icon name="Plus" size={14}/>Criar
          </button>
          <AgendaMiniCal refDate={refDate} selected={refDate} onPick={d=>setRefDate(d)} events={events}/>

          <div style={{fontSize:11, color:'var(--t3)', fontFamily:'var(--f-m)', textTransform:'uppercase', letterSpacing:'.06em', marginBottom:8}}>Próximos eventos</div>
          <div style={{flex:1, overflowY:'auto', display:'flex', flexDirection:'column', gap:6}}>
            {events
              .filter(e => agParseISO(e.data) >= new Date(new Date().setHours(0,0,0,0)))
              .sort((a,b) => agParseISO(a.data) - agParseISO(b.data) || agMinutosDoDia(a.inicio) - agMinutosDoDia(b.inicio))
              .slice(0,8)
              .map(ev => {
                const hex = AG_COR_HEX(ev.cor);
                const d = agParseISO(ev.data);
                return (
                  <button key={ev.id} onClick={()=>setEditando(ev)} style={{
                    display:'flex', gap:8, alignItems:'flex-start',
                    background:'transparent', border:'none', cursor:'pointer',
                    textAlign:'left', padding:'6px 4px', borderRadius:6,
                  }}
                    onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,.04)'}
                    onMouseLeave={e=>e.currentTarget.style.background='transparent'}
                  >
                    <div style={{width:3, alignSelf:'stretch', background:hex, borderRadius:2, flexShrink:0}}/>
                    <div style={{minWidth:0, flex:1}}>
                      <div style={{fontSize:12.5, fontWeight:600, color:'var(--t1)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>{ev.titulo}</div>
                      <div style={{fontSize:11, color:'var(--t3)', fontFamily:'var(--f-m)', marginTop:1}}>
                        {d.getDate()}/{String(d.getMonth()+1).padStart(2,'0')} · {ev.diaTodo ? 'Dia todo' : ev.inicio}
                      </div>
                    </div>
                  </button>
                );
              })}
            {events.length === 0 && (
              <div style={{fontSize:12, color:'var(--t3)', padding:'12px 0', textAlign:'center'}}>Nenhum evento agendado</div>
            )}
          </div>
        </aside>

        {/* Main view */}
        <section style={{
          background:'var(--bg-2)', border:'1px solid var(--border-soft)',
          borderRadius:12, overflow:'hidden',
          display:'flex', flexDirection:'column', minHeight:0,
        }}>
          {vista === 'mes' && <AgendaVistaMes refDate={refDate} events={events} onSelectDay={d=>{setRefDate(d); setVista('dia');}} onEditEvent={setEditando} onNew={(d)=>novoEvento({data: agISO(d)})}/>}
          {vista === 'semana' && <AgendaVistaTimeline refDate={refDate} events={events} onEditEvent={setEditando} onNew={novoEvento} dias={7}/>}
          {vista === 'dia' && <AgendaVistaTimeline refDate={refDate} events={events} onEditEvent={setEditando} onNew={novoEvento} dias={1}/>}
        </section>
      </div>

      <style>{`
        @media (max-width: 980px) {
          .agenda-layout { grid-template-columns: 1fr !important; }
          .agenda-layout > aside { display: none !important; }
        }
      `}</style>

      {editando && <AgendaEventoModal ev={editando} onClose={()=>setEditando(null)}/>}
    </div>
  );
}
