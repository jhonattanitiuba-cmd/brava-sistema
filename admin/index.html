/* Modal de historico/gestao de pagamentos do cliente */
function ModalPagamentos({ rec, pagamentos, onClose }) {
  const [refresh, setRefresh] = useState(0);
  const hoje = new Date();
  const diaVenc = parseDiaVenc(rec.dia);

  // Lista os ultimos 12 meses para gerir
  const meses = React.useMemo(() => {
    const arr = [];
    for (let i = 11; i >= 0; i--) {
      const d = new Date(hoje.getFullYear(), hoje.getMonth() - i, 1);
      arr.push({
        ym: YM(d),
        label: d.toLocaleDateString('pt-BR',{month:'short', year:'numeric'}).replace('.','').replace(' de ','/'),
        date: d,
        isAtual: i === 0,
        isFuturo: false,
      });
    }
    return arr;
  }, [refresh]);

  const togglePago = (ym, atualReg) => {
    if (atualReg?.pago) {
      setPagamento(rec.__id, ym, null); // desmarca
    } else {
      setPagamento(rec.__id, ym, { pago:true, data: hojeISO() });
    }
    setRefresh(r => r+1);
  };

  if (!rec.mensal || rec.mensal <= 0) {
    return (
      <div onClick={onClose} style={{position:'fixed', inset:0, background:'rgba(0,0,0,.7)', backdropFilter:'blur(4px)', display:'grid', placeItems:'center', zIndex:9998, padding:20}}>
        <div onClick={e=>e.stopPropagation()} style={{width:'min(480px, 95vw)', background:'var(--bg)', border:'1px solid var(--border)', borderRadius:14, overflow:'hidden'}}>
          <div style={{padding:'18px 22px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', gap:12}}>
            <div style={{width:38, height:38, borderRadius:9, background:'rgba(186,117,23,.15)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0}}>
              <Icon name="AlertCircle" size={17} style={{color:'#BA7517'}}/>
            </div>
            <div style={{flex:1, minWidth:0}}>
              <h3 style={{margin:0, fontSize:16, color:'var(--t1)', fontFamily:'var(--f-d)', fontWeight:600}}>{rec.cliente}</h3>
              <div style={{fontSize:12, color:'var(--t3)', marginTop:2}}>Sem mensalidade configurada</div>
            </div>
            <button onClick={onClose} style={{width:32, height:32, borderRadius:8, border:'none', background:'transparent', color:'var(--t3)', cursor:'pointer', fontSize:18}}>×</button>
          </div>
          <div style={{padding:'18px 22px'}}>
            <div style={{fontSize:13, color:'var(--t2)', lineHeight:1.5}}>Este contrato não tem mensalidade configurada. Edite o cliente para definir um valor mensal e dia de vencimento.</div>
          </div>
          <div style={{padding:'12px 22px', borderTop:'1px solid var(--border)', display:'flex', justifyContent:'flex-end'}}>
            <button onClick={onClose} style={{padding:'8px 18px', borderRadius:7, border:'none', background:'var(--blue)', color:'#fff', fontSize:13, fontWeight:600, cursor:'pointer'}}>Fechar</button>
          </div>
        </div>
      </div>
    );
  }

  const pagosCount = meses.filter(m => pagamentos[rec.__id]?.[m.ym]?.pago).length;
  return (
    <div onClick={onClose} style={{position:'fixed', inset:0, background:'rgba(0,0,0,.7)', backdropFilter:'blur(4px)', display:'grid', placeItems:'center', zIndex:9998, padding:20, animation:'fade-in .15s'}}>
      <div onClick={e=>e.stopPropagation()} style={{width:'min(580px, 95vw)', maxHeight:'90vh', background:'var(--bg)', border:'1px solid var(--border)', borderRadius:14, display:'flex', flexDirection:'column', overflow:'hidden'}}>
        {/* Header */}
        <div style={{padding:'18px 22px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', gap:12}}>
          <div style={{width:38, height:38, borderRadius:9, background:'rgba(30,144,255,.12)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0}}>
            <Icon name="History" size={17} style={{color:'var(--blue)'}}/>
          </div>
          <div style={{flex:1, minWidth:0}}>
            <h3 style={{margin:0, fontSize:17, color:'var(--t1)', fontFamily:'var(--f-d)', fontWeight:600}}>{rec.cliente}</h3>
            <div style={{fontSize:12, color:'var(--t3)', marginTop:2}}>
              R$ {rec.mensal.toLocaleString('pt-BR')}/mês · vence dia {diaVenc || '–'}
            </div>
          </div>
          <button onClick={onClose} style={{width:32, height:32, borderRadius:8, border:'none', background:'transparent', color:'var(--t3)', cursor:'pointer', fontSize:18}}>×</button>
        </div>

        {/* Body */}
        <div style={{flex:1, overflowY:'auto', padding:'18px 22px'}}>
          <SecaoLabel icon="History" count={pagosCount > 0 ? `${pagosCount}/${meses.length}` : null}>Histórico de pagamentos (12 meses)</SecaoLabel>
          <div style={{display:'grid', gap:6}}>
            {meses.map(m => {
              const reg = pagamentos[rec.__id]?.[m.ym];
              let badge;
              if (reg?.pago) {
                badge = { label:`Pago · ${formatBR(reg.data)}`, color:'#1D9E75' };
              } else if (diaVenc) {
                const venc = new Date(m.date.getFullYear(), m.date.getMonth(), Math.min(diaVenc, ultimoDiaMes(m.date.getFullYear(), m.date.getMonth())));
                const h = new Date(hoje.getFullYear(), hoje.getMonth(), hoje.getDate());
                const dDias = Math.round((h - venc) / (24*60*60*1000));
                if (dDias < 0) badge = { label:`Vence em ${-dDias}d`, color:'#BA7517' };
                else if (dDias === 0) badge = { label:'Vence hoje', color:'#BA7517' };
                else badge = { label:`Atrasado ${dDias}d`, color:'#A32D2D' };
              } else {
                badge = { label:'Sem vencimento', color:'#6E6E78' };
              }
              return (
                <div key={m.ym} style={{
                  display:'grid', gridTemplateColumns:'90px 1fr auto', gap:12, alignItems:'center',
                  padding:'10px 12px', background: m.isAtual ? 'rgba(30,144,255,.08)' : 'var(--bg-3)',
                  border: m.isAtual ? '1px solid rgba(30,144,255,.35)' : '1px solid var(--border-soft)',
                  borderRadius:8
                }}>
                  <div style={{fontFamily:'var(--f-m)', fontSize:12, color:'var(--t2)', textTransform:'capitalize'}}>{m.label}</div>
                  <div>
                    <span style={{fontSize:11, padding:'3px 9px', borderRadius:999, background:badge.color+'22', color:badge.color, border:`1px solid ${badge.color}44`, fontWeight:500}}>{badge.label}</span>
                  </div>
                  <button onClick={()=>togglePago(m.ym, reg)} style={{
                    background: reg?.pago ? 'transparent' : '#1D9E75',
                    color: reg?.pago ? 'var(--t3)' : '#fff',
                    border: reg?.pago ? '1px solid var(--border)' : 'none',
                    padding:'5px 12px', fontSize:12, fontWeight:500, borderRadius:6, cursor:'pointer',
                  }}>{reg?.pago ? 'Desmarcar' : 'Marcar pago'}</button>
                </div>
              );
            })}
          </div>
        </div>

        {/* Footer */}
        <div style={{padding:'12px 22px', borderTop:'1px solid var(--border)', display:'flex', justifyContent:'flex-end'}}>
          <button onClick={onClose} style={{padding:'8px 18px', borderRadius:7, border:'none', background:'var(--blue)', color:'#fff', fontSize:13, fontWeight:600, cursor:'pointer'}}>Fechar</button>
        </div>
      </div>
    </div>
  );
}

// Sub-tab: Recorrência (era MRR completo, agora componente da aba Recorrência do Financeiro)
function FinRecorrencia({ onNovoContrato }) {
  const recorrencia = useRecorrencia();
  const pagamentos = usePagamentos();
  const { list: statusConfig } = useStatusConfig();

  const [filtro, setFiltro] = useState('todos');
  const [busca, setBusca] = useState('');
  const [sortCol, setSortCol] = useState('impl');
  const [sortAsc, setSortAsc] = useState(false);
  const [editando, setEditando] = useState(null);       // rec sendo editado ou {} para novo (modal)
  const [gerindoPag, setGerindoPag] = useState(null);   // rec para abrir modal pagamentos

  // ─── Inline editing ────────────────────────────────────────────────────────
  // inlineEdit: { rowId, field: 'cliente'|'servico'|...|'all' } ou null
  // field='all' = modo linha inteira (botao lápis)
  const [inlineEdit, setInlineEdit] = useState(null);
  const [inlineVals, setInlineVals] = useState({});     // { [campo]: string }
  const [flashRow,   setFlashRow]   = useState(null);   // rowId pra flash verde 600ms

  const _parseInlineField = (field, raw) => {
    if (['impl','mensal'].includes(field))
      return parseFloat(String(raw).replace(/[^\d.,]/g,'').replace(',','.')) || 0;
    if (field === 'dia') {
      const n = parseInt(raw);
      return (!isNaN(n) && n >= 1 && n <= 31) ? `Dia ${n}` : '';
    }
    return String(raw).trim();
  };

  const startInlineRow = (r) => {
    setInlineEdit({ rowId: r.__id, field: 'all' });
    setInlineVals({
      cliente: r.cliente || '',
      servico: r.servico || '',
      nicho:   r.nicho   || '',
      impl:    String(r.impl   || 0),
      mensal:  String(r.mensal || 0),
      dia:     r.dia ? String(parseInt(r.dia)) : '',
      status:  r.status  || 'Comercial',
    });
  };

  const startInlineCell = (r, field) => {
    if (inlineEdit?.rowId === r.__id) return; // ja em edicao dessa linha
    let val = r[field];
    if (field === 'dia') val = val ? String(parseInt(val)) : '';
    // Pra status, inicializa também status_fase (a UI usa o novo campo)
    if (field === 'status') {
      setInlineEdit({ rowId: r.__id, field });
      setInlineVals({ status_fase: r.status_fase || r.status || 'lead' });
      return;
    }
    setInlineEdit({ rowId: r.__id, field });
    setInlineVals({ [field]: String(val ?? '') });
  };

  const cancelInline = React.useCallback(() => {
    setInlineEdit(null);
    setInlineVals({});
  }, []);

  const _flashAndClear = (rowId) => {
    setFlashRow(rowId);
    setTimeout(() => setFlashRow(null), 600);
  };

  const saveInlineRow = React.useCallback(async (rowId) => {
    const vals = inlineVals; // snapshot
    cancelInline();
    const patch = {};
    ['cliente','servico','nicho','impl','mensal','dia','status','status_fase'].forEach(f => {
      if (vals[f] !== undefined) patch[f] = _parseInlineField(f, vals[f]);
    });
    if (!patch.cliente) return; // campo obrigatorio
    await editRecorrencia(rowId, patch);
    _flashAndClear(rowId);
  }, [inlineVals, cancelInline]);

  const saveInlineCell = React.useCallback(async (rowId, field) => {
    const raw = inlineVals[field];
    cancelInline();
    if (raw === undefined) return;
    await editRecorrencia(rowId, { [field]: _parseInlineField(field, raw) });
    _flashAndClear(rowId);
  }, [inlineVals, cancelInline]);

  const handleCellKey = (e, rowId, field, isRowMode) => {
    if (e.key === 'Enter')  { e.preventDefault(); isRowMode ? saveInlineRow(rowId) : saveInlineCell(rowId, field); }
    if (e.key === 'Escape') { e.preventDefault(); cancelInline(); }
    if (e.key === 'Tab')    { e.preventDefault(); saveInlineCell(rowId, field); }
  };

  // Fechar edição ao clicar fora da tabela
  React.useEffect(() => {
    if (!inlineEdit) return;
    const onOut = (e) => { if (!e.target.closest('.mrr-table')) cancelInline(); };
    document.addEventListener('mousedown', onOut);
    return () => document.removeEventListener('mousedown', onOut);
  }, [inlineEdit, cancelInline]);

  // Estilos reutilizáveis
  const inpStyle = (field) => ({
    background:'transparent', border:'1px solid rgba(123,63,228,.6)',
    borderRadius:4, color:'var(--t1)', fontSize:13, outline:'none',
    padding:'2px 6px', width:'100%', fontFamily:'var(--f-b)',
    textAlign: ['impl','mensal'].includes(field) ? 'right' : 'left',
  });

  const totalImpl = recorrencia.reduce((s,r) => s+(r.impl||0), 0);
  const totalMRR  = recorrencia.reduce((s,r) => s+(r.mensal||0), 0);
  const ativos    = recorrencia.filter(r=>['Em Prod','Ativo'].includes(r.status));
  const mrrAtivo  = ativos.reduce((s,r) => s+(r.mensal||0), 0);

  // Pagamentos do mes atual: total atrasado + numero de contratos atrasados
  const { totalAtrasado, qtdAtrasados, qtdPendentes, qtdPagosMes } = React.useMemo(() => {
    let totalA = 0, qtdA = 0, qtdP = 0, qtdPg = 0;
    recorrencia.forEach(r => {
      const st = statusPagamentoMes(r, pagamentos);
      if (st.kind === 'atrasado') { totalA += r.mensal; qtdA++; }
      else if (st.kind === 'pendente') qtdP++;
      else if (st.kind === 'pago') qtdPg++;
    });
    return { totalAtrasado: totalA, qtdAtrasados: qtdA, qtdPendentes: qtdP, qtdPagosMes: qtdPg };
  }, [recorrencia, pagamentos]);

  const filtrados = recorrencia
    .filter(r => {
      if (filtro === 'atrasados') {
        const st = statusPagamentoMes(r, pagamentos);
        if (st.kind !== 'atrasado') return false;
      } else if (filtro !== 'todos' && r.status !== filtro) {
        return false;
      }
      if (busca && !r.cliente.toLowerCase().includes(busca.toLowerCase()) && !r.nicho.toLowerCase().includes(busca.toLowerCase())) return false;
      return true;
    })
    .sort((a,b) => {
      const v = sortAsc ? 1 : -1;
      if (sortCol === 'impl') return ((a.impl||0) - (b.impl||0)) * v;
      if (sortCol === 'mensal') return ((a.mensal||0) - (b.mensal||0)) * v;
      if (sortCol === 'atraso') {
        const da = diasAtraso(a) ?? -999;
        const db = diasAtraso(b) ?? -999;
        return (da - db) * v;
      }
      return a.cliente.localeCompare(b.cliente) * v;
    });

  const col = (label, key) => (
    <th onClick={()=>{ if(sortCol===key) setSortAsc(v=>!v); else { setSortCol(key); setSortAsc(false); }}}
      style={{padding:'10px 14px',textAlign:'left',fontFamily:'var(--f-b)',fontSize:13,color:'#F5F5F7',fontWeight:700,cursor:'pointer',userSelect:'none',whiteSpace:'nowrap',borderBottom:'1px solid #2A2A3A'}}>
      {label} {sortCol===key ? (sortAsc?'↑':'↓') : ''}
    </th>
  );

  const fmt = v => v > 0 ? `R$ ${v.toLocaleString('pt-BR')}` : '–';

  const tickMensalPorContrato = recorrencia.filter(r=>r.mensal>0).length || 1;

  return (
    <div>
      {/* Cabeçalho compacto da tab + ações */}
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-end', marginBottom:18}}>
        <div style={{fontSize:13, color:'var(--t3)'}}>{recorrencia.length} contratos cadastrados</div>
        <div style={{display:'flex', gap:10}}>
          <button onClick={()=>setEditando({})} className="btn btn-primary"><Icon name="Plus" size={14}/>Novo contrato</button>
          <button onClick={exportarCSV} className="btn btn-outline"><Icon name="Download" size={14}/>Exportar</button>
        </div>
      </div>

      {/* KPIs · incluindo Atrasados em destaque */}
      <div className="kpi-grid" style={{gridTemplateColumns:'repeat(5,1fr)',marginBottom:24}}>
        {[
          {label:'Receita potencial mensal', val:`R$ ${totalMRR.toLocaleString('pt-BR')}`, icon:'TrendingUp', color:'#1E90FF'},
          {label:'Receita ativa mensal',     val:`R$ ${mrrAtivo.toLocaleString('pt-BR')}`, icon:'CheckCircle2', color:'#1D9E75'},
          {label:'Implantações (único)',     val:`R$ ${totalImpl.toLocaleString('pt-BR')}`,icon:'ScrollText', color:'#7B3FE4'},
          {label:'Ticket médio por contrato',val:`R$ ${Math.round(totalMRR/tickMensalPorContrato).toLocaleString('pt-BR')}`, icon:'BarChart3', color:'#BA7517'},
          {label:`Em atraso (${qtdAtrasados})`, val:`R$ ${totalAtrasado.toLocaleString('pt-BR')}`, icon:'AlertCircle', color:'#A32D2D', highlight:qtdAtrasados>0, onClick:()=>setFiltro('atrasados')},
        ].map((k,i) => (
          <div key={i} className="kpi" onClick={k.onClick} style={{
            cursor:k.onClick?'pointer':'default',
            border: k.highlight ? '1px solid #A32D2D66' : '1px solid var(--border)',
            background: k.highlight ? 'linear-gradient(135deg, rgba(163,45,45,.08), transparent)' : undefined,
          }}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
              <div className="kpi__label">{k.label}</div>
              <div className="kpi__icon" style={{background:k.color+'22'}}><Icon name={k.icon} size={17} style={{color:k.color}}/></div>
            </div>
            <div className="kpi__value" style={{color:k.highlight?'#ff8585':'var(--t1)',fontSize:22}}>{k.val}</div>
          </div>
        ))}
      </div>

      {/* Banner alerta de atraso */}
      {qtdAtrasados > 0 && filtro !== 'atrasados' && (
        <div onClick={()=>setFiltro('atrasados')} style={{
          padding:'12px 16px', marginBottom:14, cursor:'pointer',
          background:'rgba(163,45,45,.08)', border:'1px solid #A32D2D55',
          borderRadius:10, display:'flex', alignItems:'center', gap:12,
        }}>
          <Icon name="AlertCircle" size={18} style={{color:'#ff8585'}}/>
          <div style={{flex:1, fontSize:13.5, color:'var(--t1)'}}>
            <strong style={{color:'#ff8585'}}>{qtdAtrasados} {qtdAtrasados===1?'contrato em atraso':'contratos em atraso'}</strong>
            {' '}somando <strong>R$ {totalAtrasado.toLocaleString('pt-BR')}</strong> · clique para filtrar
          </div>
          <Icon name="ChevronRight" size={16} style={{color:'var(--t3)'}}/>
        </div>
      )}

      {/* Projeção 12 meses · empilhada por status */}
      <ProjecaoMRR data={recorrencia}/>

      {/* Filtros + busca */}
      <div className="card" style={{padding:'16px 18px',marginBottom:14}}>
        <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
          <div style={{display:'flex',alignItems:'center',gap:8,padding:'7px 12px',background:'var(--bg-3)',border:'1px solid var(--border)',borderRadius:8,flex:'1',minWidth:180}}>
            <Icon name="Search" size={13} style={{color:'var(--t3)'}}/>
            <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="Buscar cliente ou nicho…" style={{background:'none',border:'none',outline:'none',fontSize:13,color:'var(--t1)',width:'100%'}}/>
          </div>
          {['todos','atrasados','Em Prod','Ativo','Implementação','Comercial','Proposta Apresentada','Em breve'].map(f => {
            const isAtraso = f === 'atrasados';
            const cor = isAtraso ? '#A32D2D' : (SC[f]||'var(--purple)');
            const count = isAtraso ? qtdAtrasados : recorrencia.filter(r=>r.status===f).length;
            return (
              <button key={f} onClick={()=>setFiltro(f)} style={{
                padding:'6px 12px',borderRadius:7,fontSize:12,fontWeight:500,cursor:'pointer',
                background:filtro===f ? cor+'22' : 'transparent',
                color:filtro===f ? (isAtraso?'#ff8585':(SC[f]||'#c4a8ff')) : '#6E6E78',
                border:`1px solid ${filtro===f ? cor+'55' : 'transparent'}`,
                transition:'all .15s',
              }}>{f==='todos'?'Todos':isAtraso?'Em atraso':f} {filtro===f && f!=='todos' && `(${count})`}</button>
            );
          })}
        </div>
      </div>

      {/* Tabela compacta — cabe sem scroll horizontal */}
      <style>{`
        .mrr-table th, .mrr-table td { padding: 8px 8px !important; font-size: 12.5px !important; }
        .mrr-table .col-servico, .mrr-table .col-nicho { max-width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        @media (max-width: 1200px) {
          .mrr-table .col-servico { display: none; }
        }
        @media (max-width: 980px) {
          .mrr-table .col-nicho { display: none; }
        }
      `}</style>
      <div className="card" style={{padding:0,overflow:'hidden'}}>
        <div style={{overflowX:'auto'}}>
          <table className="mrr-table" style={{width:'100%',borderCollapse:'collapse',fontSize:12.5}}>
            <thead>
              <tr style={{background:'#000000'}}>
                {col('Cliente','cliente')}
                <th className="col-servico" style={{padding:'8px 8px',textAlign:'left',fontFamily:'var(--f-b)',fontSize:12.5,color:'#F5F5F7',fontWeight:700,borderBottom:'1px solid #2A2A3A'}}>Serviço</th>
                <th className="col-nicho" style={{padding:'8px 8px',textAlign:'left',fontFamily:'var(--f-b)',fontSize:12.5,color:'#F5F5F7',fontWeight:700,borderBottom:'1px solid #2A2A3A'}}>Nicho</th>
                {col('Impl.','impl')}
                {col('Mensal','mensal')}
                <th style={{padding:'8px 8px',textAlign:'left',fontFamily:'var(--f-b)',fontSize:12.5,color:'#F5F5F7',fontWeight:700,borderBottom:'1px solid #2A2A3A'}}>Venc.</th>
                {col('Pago mês','atraso')}
                <th style={{padding:'8px 8px',textAlign:'left',fontFamily:'var(--f-b)',fontSize:12.5,color:'#F5F5F7',fontWeight:700,borderBottom:'1px solid #2A2A3A'}}>Status</th>
                <th style={{padding:'8px 8px',textAlign:'right',fontFamily:'var(--f-b)',fontSize:12.5,color:'#F5F5F7',fontWeight:700,borderBottom:'1px solid #2A2A3A'}}>Ações</th>
              </tr>
            </thead>
            <tbody>
              {filtrados.map((r,i) => {
                const stPag    = statusPagamentoMes(r, pagamentos);
                const ymAtual  = YM(new Date());
                const regAtual = pagamentos[r.__id]?.[ymAtual];
                const isRowEd  = inlineEdit?.rowId === r.__id && inlineEdit?.field === 'all';
                const isCellEd = (f) => inlineEdit?.rowId === r.__id && (inlineEdit?.field === f || isRowEd);
                const isFlash  = flashRow === r.__id;
                const rowBg    = isFlash ? 'rgba(29,158,117,.08)'
                               : stPag.kind === 'atrasado' ? 'rgba(163,45,45,.05)' : 'transparent';

                // Helper: render célula editável
                const EditCell = ({field, value, style={}, children}) => (
                  isCellEd(field) ? (
                    <input
                      autoFocus={inlineEdit?.field === field || (isRowEd && field === 'cliente')}
                      value={inlineVals[field] ?? String(value ?? '')}
                      onChange={e => setInlineVals(v => ({...v, [field]: e.target.value}))}
                      onKeyDown={e => handleCellKey(e, r.__id, field, isRowEd)}
                      onBlur={() => !isRowEd && saveInlineCell(r.__id, field)}
                      style={{...inpStyle(field), ...style}}
                    />
                  ) : (
                    <span
                      onClick={() => startInlineCell(r, field)}
                      title="Clique para editar"
                      style={{display:'block', cursor:'text', minWidth:40, ...style}}
                    >{children ?? (value || '–')}</span>
                  )
                );

                return (
                  <tr key={r.__id||i} style={{
                    borderBottom:'1px solid var(--border-soft)',
                    transition:'background .2s',
                    background: rowBg,
                    outline: isRowEd ? '1px solid rgba(123,63,228,.3)' : 'none',
                  }}
                    onMouseEnter={e=>{ if (!isRowEd) e.currentTarget.style.background = stPag.kind==='atrasado' ? 'rgba(163,45,45,.10)' : 'rgba(255,255,255,.03)'; }}
                    onMouseLeave={e=>{ if (!isRowEd) e.currentTarget.style.background = rowBg; }}>

                    {/* Cliente */}
                    <td style={{padding:'11px 14px',fontWeight:600,color:'var(--t1)',whiteSpace:'nowrap'}}>
                      <EditCell field="cliente" value={r.cliente}/>
                    </td>

                    {/* Serviço */}
                    <td className="col-servico" style={{padding:'8px 8px',color:'var(--t2)',whiteSpace:'nowrap'}}>
                      <EditCell field="servico" value={r.servico}/>
                    </td>

                    {/* Nicho */}
                    <td className="col-nicho" style={{padding:'8px 8px',color:'var(--t2)'}}>
                      <EditCell field="nicho" value={r.nicho}/>
                    </td>

                    {/* Implementação */}
                    <td style={{padding:'11px 14px',fontFamily:'var(--f-m)',textAlign:'right',color: r.impl>0?'#F5F5F7':'#6E6E78'}}>
                      {isCellEd('impl') ? (
                        <input autoFocus={inlineEdit?.field==='impl'}
                          value={inlineVals.impl ?? String(r.impl||0)}
                          onChange={e=>setInlineVals(v=>({...v, impl:e.target.value}))}
                          onKeyDown={e=>handleCellKey(e,r.__id,'impl',isRowEd)}
                          onBlur={()=>!isRowEd&&saveInlineCell(r.__id,'impl')}
                          style={{...inpStyle('impl'),width:90}}/>
                      ) : (
                        <span onClick={()=>startInlineCell(r,'impl')} title="Clique para editar" style={{cursor:'text',display:'block'}}>{fmt(r.impl)}</span>
                      )}
                    </td>

                    {/* Mensal */}
                    <td style={{padding:'11px 14px',fontFamily:'var(--f-m)',textAlign:'right',color:r.mensal>0?'#1D9E75':'#6E6E78',fontWeight:r.mensal>0?600:400}}>
                      {isCellEd('mensal') ? (
                        <input autoFocus={inlineEdit?.field==='mensal'}
                          value={inlineVals.mensal ?? String(r.mensal||0)}
                          onChange={e=>setInlineVals(v=>({...v,mensal:e.target.value}))}
                          onKeyDown={e=>handleCellKey(e,r.__id,'mensal',isRowEd)}
                          onBlur={()=>!isRowEd&&saveInlineCell(r.__id,'mensal')}
                          style={{...inpStyle('mensal'),width:90}}/>
                      ) : (
                        <span onClick={()=>startInlineCell(r,'mensal')} title="Clique para editar" style={{cursor:'text',display:'block'}}>{fmt(r.mensal)}</span>
                      )}
                    </td>

                    {/* Venc. */}
                    <td style={{padding:'11px 14px',color:'var(--t2)',fontFamily:'var(--f-m)',fontSize:12}}>
                      {isCellEd('dia') ? (
                        <input autoFocus={inlineEdit?.field==='dia'}
                          value={inlineVals.dia ?? (r.dia?String(parseInt(r.dia)):'')}
                          onChange={e=>setInlineVals(v=>({...v,dia:e.target.value}))}
                          onKeyDown={e=>handleCellKey(e,r.__id,'dia',isRowEd)}
                          onBlur={()=>!isRowEd&&saveInlineCell(r.__id,'dia')}
                          placeholder="1-31"
                          style={{...inpStyle('dia'),width:50}}/>
                      ) : (
                        <span onClick={()=>startInlineCell(r,'dia')} title="Clique para editar" style={{cursor:'text',display:'block'}}>{r.dia||'–'}</span>
                      )}
                    </td>

                    {/* Pagamento mês atual */}
                    <td style={{padding:'11px 14px'}}>
                      <span style={{fontSize:11,padding:'3px 9px',borderRadius:999,background:stPag.color+'22',color:stPag.color,border:`1px solid ${stPag.color}44`,fontWeight:500,whiteSpace:'nowrap'}}>{stPag.label}</span>
                    </td>

                    {/* Status — usa fin_status_config (status_fase) */}
                    <td style={{padding:'11px 14px'}}>
                      {(() => {
                        const sf = r.status_fase || r.status || 'lead';
                        const cfg = getStatusByKey(statusConfig, sf);
                        if (isCellEd('status')) {
                          const currentValue = inlineVals.status_fase || sf;
                          return (
                            <select autoFocus
                              value={currentValue}
                              onChange={async (e) => {
                                const novo = e.target.value;
                                // Atualiza estado local imediatamente
                                setInlineVals(v=>({...v, status_fase: novo}));
                                // Salva direto no banco (sem esperar blur — UX mais fluida)
                                cancelInline();
                                await editRecorrencia(r.__id, { status_fase: novo, status: novo });
                                _flashAndClear(r.__id);
                              }}
                              onKeyDown={e=>{ if(e.key==='Escape') cancelInline(); }}
                              onBlur={cancelInline}
                              style={{background:'var(--bg-3)',border:`1px solid ${cfg.cor}`,borderRadius:4,color:'var(--t1)',fontSize:11,outline:'none',padding:'3px 6px',cursor:'pointer'}}>
                              {(statusConfig||[]).map(s=><option key={s.key} value={s.key}>{s.label}</option>)}
                            </select>
                          );
                        }
                        return (
                          <span onClick={(e)=>{e.stopPropagation();startInlineCell(r,'status');}} title="Clique para mudar fase" style={{cursor:'pointer'}}>
                            <span style={{fontSize:11,padding:'3px 9px',borderRadius:999,background:cfg.cor+'22',color:cfg.cor,border:`1px solid ${cfg.cor}44`,fontWeight:600,display:'inline-flex',alignItems:'center',gap:4}}>
                              <Icon name={cfg.icone} size={10}/>{cfg.label}
                            </span>
                          </span>
                        );
                      })()}
                    </td>

                    {/* Ações */}
                    <td style={{padding:'11px 14px',textAlign:'right',whiteSpace:'nowrap'}}>
                      {r.mensal > 0 && (
                        <button onClick={()=>{
                          if (regAtual?.pago) setPagamento(r.__id, ymAtual, null);
                          else setPagamento(r.__id, ymAtual, { pago:true, data: hojeISO() });
                        }} title={regAtual?.pago?'Desmarcar pagamento do mês':'Marcar como pago (mês atual)'}
                          style={{
                            background: regAtual?.pago ? 'transparent' : '#1D9E7522',
                            color:'#1D9E75',
                            border:'1px solid #1D9E7555',
                            borderRadius:6, padding:'5px 9px', fontSize:11, cursor:'pointer', marginRight:6,
                          }}>
                          {regAtual?.pago ? '✓ Pago' : 'Marcar pago'}
                        </button>
                      )}
                      <button onClick={()=>setGerindoPag(r)} title="Gerir pagamentos / histórico"
                        style={{background:'transparent',border:'1px solid var(--border)',borderRadius:6,padding:'5px 8px',cursor:'pointer',color:'var(--t2)',marginRight:6}}>
                        <Icon name="CalendarCheck" size={13}/>
                      </button>
                      {/* Lápis: modo linha inteira — sem modal */}
                      {isRowEd ? (
                        <button onClick={()=>saveInlineRow(r.__id)} title="Salvar edições"
                          style={{background:'rgba(29,158,117,.15)',border:'1px solid #1D9E7555',borderRadius:6,padding:'5px 8px',cursor:'pointer',color:'#1D9E75'}}>
                          <Icon name="Check" size={13}/>
                        </button>
                      ) : (
                        <button onClick={()=>startInlineRow(r)} title="Editar linha inteira"
                          style={{background:'transparent',border:'1px solid var(--border)',borderRadius:6,padding:'5px 8px',cursor:'pointer',color:'var(--t2)'}}>
                          <Icon name="Pencil" size={13}/>
                        </button>
                      )}
                    </td>
                  </tr>
                );
              })}
              {filtrados.length === 0 && (
                <tr><td colSpan={9} style={{padding:'40px 20px', textAlign:'center', color:'var(--t3)', fontSize:13}}>Nenhum contrato encontrado para os filtros atuais.</td></tr>
              )}
            </tbody>
            <tfoot>
              <tr style={{background:'var(--bg-3)',borderTop:'2px solid var(--border)'}}>
                <td style={{padding:'12px 14px',fontWeight:700,color:'var(--t1)',fontFamily:'var(--f-d)'}} colSpan={3}>TOTAL ({filtrados.length} contratos)</td>
                <td style={{padding:'12px 14px',fontFamily:'var(--f-m)',fontWeight:700,color:'var(--t1)',textAlign:'right'}}>R$ {filtrados.reduce((s,r)=>s+(r.impl||0),0).toLocaleString('pt-BR')}</td>
                <td style={{padding:'12px 14px',fontFamily:'var(--f-m)',fontWeight:700,color:'#1D9E75',textAlign:'right'}}>R$ {filtrados.reduce((s,r)=>s+(r.mensal||0),0).toLocaleString('pt-BR')}/mês</td>
                <td colSpan={4}/>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>

      {/* Resumo do mes */}
      <div style={{display:'flex', gap:14, marginTop:14, flexWrap:'wrap', fontSize:12.5, color:'var(--t2)'}}>

// ─────────────────────────────────────────────────────────────────
// Helpers de cálculo financeiro (entradas, saídas, saldo, projeção)
// ─────────────────────────────────────────────────────────────────
function calcEntradasMes(recorrencia, pagamentos, ym) {
  let pago = 0, pendente = 0, atrasado = 0;
  recorrencia.forEach(r => {
    if (!r.mensal || r.mensal <= 0) return;
    const reg = pagamentos[r.__id]?.[ym];
    if (reg?.pago) pago += r.mensal;
    else {
      const st = statusPagamentoMes(r, pagamentos);
      if (st.kind === 'atrasado') atrasado += r.mensal;
      else if (st.kind === 'pendente') pendente += r.mensal;
    }
  });
  return { pago, pendente, atrasado, total: pago + pendente + atrasado };
}

function calcSaidasMes(despesas, despesasPag, ym) {
  let pago = 0, pendente = 0;
  despesas.forEach(d => {
    if (!d.ativo) return;
    const valor = parseFloat(d.valor) || 0;
    if (!valor) return;
    // Só conta despesas que se aplicam a esse mês
    if (d.recorrente && d.dia_vencimento) {
      const reg = despesasPag[d.id]?.[ym];
      if (reg?.pago) pago += (reg.valor_pago ?? valor);
      else pendente += valor;
    } else if (!d.recorrente && d.data_unica && d.data_unica.slice(0,7) === ym) {
      const reg = despesasPag[d.id]?.[ym];
      if (reg?.pago) pago += (reg.valor_pago ?? valor);
      else pendente += valor;
    }
  });
  return { pago, pendente, total: pago + pendente };
}

// Saldo unificado do caixa: usado tanto no FinDashboard quanto no FinCaixa.
// Garante que o número seja o mesmo nas duas telas (conciliado).
// = soma de TODAS as entradas (lançamentos manuais + pagamentos MRR confirmados)
//   menos TODAS as saídas (lançamentos manuais + despesas pagas)
function calcSaldoCaixaTotal(recorrencia, pagamentos, despesas, despesasPag, caixa) {
  let entradasMrr = 0, saidasDespesas = 0;
  Object.entries(pagamentos || {}).forEach(([clienteId, meses]) => {
    Object.values(meses).forEach(info => {
      if (info?.pago) {
        const rec = (recorrencia || []).find(r => r.__id === clienteId);
        if (rec) entradasMrr += Number(rec.mensal) || 0;
      }
    });
  });
  Object.entries(despesasPag || {}).forEach(([despId, meses]) => {
    Object.values(meses).forEach(info => {
      if (info?.pago) {
        const desp = (despesas || []).find(d => d.id === despId);
        if (desp) saidasDespesas += Number(info.valor_pago ?? desp.valor) || 0;
      }
    });
  });
  const lancManuais = (caixa || []).reduce(
    (s, l) => s + (l.tipo === 'entrada' ? Number(l.valor) : -Number(l.valor)), 0
  );
  return entradasMrr - saidasDespesas + lancManuais;
}

function FinDashboard({ mesFiltro, recorrencia, pagamentos, despesas, despesasPag, caixa }) {
  // mesFiltro = "YYYY-MM" (vem do Financeiro pai), default = mês atual
  const ymHoje = mesFiltro || YM(new Date());
  const [ano, mes] = ymHoje.split('-').map(Number);
  const refDate = new Date(ano, mes - 1, 1);
  const mesAtualLabel = refDate.toLocaleDateString('pt-BR', { month:'long' });
  const extratoReal = useExtratoBancario();

  // Cálculo REAL baseado no extrato bancário (dados importados do BTG) — usa mesFiltro
  const inicioMes = new Date(ano, mes - 1, 1).toISOString().slice(0,10);
  const fimMes = new Date(ano, mes, 0).toISOString().slice(0,10);
  const movimentoMes = (extratoReal || []).filter(e => !e.ignorado && e.data >= inicioMes && e.data <= fimMes);
  const entradasReais = movimentoMes.filter(e => e.valor > 0).reduce((s,e) => s + Number(e.valor), 0);
  const saidasReais = Math.abs(movimentoMes.filter(e => e.valor < 0).reduce((s,e) => s + Number(e.valor), 0));

  const recPotencialMensal = recorrencia.reduce((s,r) => s + (r.mensal||0), 0);

  // Saldo banco real = saldo da última entrada do extrato (se tiver saldo_apos)
  const ultimaTransacao = [...(extratoReal||[])].sort((a,b) => b.data.localeCompare(a.data))[0];

    },
    {
      label:`Entradas em ${mesAtualLabel} (real)`, val:`R$ ${entradasReais.toLocaleString('pt-BR', {minimumFractionDigits:2})}`,
      icon:'ArrowDownCircle', color:'#1D9E75',
      sub:`${movimentoMes.filter(e=>e.valor>0).length} entradas no extrato BTG`,
    },
    {
      label:`Saídas em ${mesAtualLabel} (real)`, val:`R$ ${saidasReais.toLocaleString('pt-BR', {minimumFractionDigits:2})}`,
      icon:'ArrowUpCircle', color:'#A32D2D',
      sub:`${movimentoMes.filter(e=>e.valor<0).length} saídas no extrato BTG`,
    },
    {
      label:`Lucro real do mês`, val:`R$ ${lucroReal.toLocaleString('pt-BR', {minimumFractionDigits:2})}`,
      icon:'DollarSign', color: lucroReal >= 0 ? '#1D9E75' : '#A32D2D',

      icon:'Wallet', color: saldoBancoReal >= 0 ? '#1E90FF' : '#A32D2D',
      sub: ultimaTransacao ? `Após movimento de ${new Date(ultimaTransacao.data).toLocaleDateString('pt-BR')}` : 'Sem dados',
    },
  ];

  return (

      <div className="kpi-grid" style={{gridTemplateColumns:'repeat(3,1fr)', marginBottom:22}}>
        {KPIS.map((k,i) => (
          <div key={i} className="kpi">

function CompararEntradasSaidas({ extrato }) {
  const hoje = new Date();
  const meses = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(hoje.getFullYear(), hoje.getMonth() - i, 1);
    const inicio = new Date(d.getFullYear(), d.getMonth(), 1).toISOString().slice(0,10);
    const fim = new Date(d.getFullYear(), d.getMonth()+1, 0).toISOString().slice(0,10);
    const movs = (extrato || []).filter(e => !e.ignorado && e.data >= inicio && e.data <= fim);
    const entradas = movs.filter(e => e.valor > 0).reduce((s,e) => s + Number(e.valor), 0);
    const saidas = Math.abs(movs.filter(e => e.valor < 0).reduce((s,e) => s + Number(e.valor), 0));
    meses.push({
      label: d.toLocaleDateString('pt-BR', { month:'short' }).replace('.',''),
      entradas, saidas, lucro: entradas - saidas, eAtual: i === 0,
    });
  }
  const maxBar = Math.max(1, ...meses.flatMap(m => [m.entradas, m.saidas]));

  return (
    <div className="card" style={{padding:'22px 24px', marginBottom:14}}>
      <div className="card__head" style={{marginBottom:16}}>
        <div className="card__title" style={{fontSize:15}}>Entradas vs Saídas · últimos 6 meses</div>
      </div>
      <div style={{display:'flex', alignItems:'flex-end', gap:18, height:180, padding:'0 4px'}}>
        {meses.map((m, i) => (
          <div key={i} style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:6, height:'100%'}}>
            <div style={{flex:1, width:'100%', display:'flex', alignItems:'flex-end', justifyContent:'center', gap:5}}>
              <div title={`Entrada: R$ ${m.entradas.toLocaleString('pt-BR')}`}
                style={{
                  flex:1, maxWidth:18,
                  height:`${(m.entradas / maxBar) * 100}%`, minHeight:m.entradas > 0 ? 3 : 0,
                  background:'#1D9E75', borderRadius:'4px 4px 0 0', opacity: m.eAtual ? 1 : 0.7,
                }}/>
              <div title={`Saída: R$ ${m.saidas.toLocaleString('pt-BR')}`}
                style={{
                  flex:1, maxWidth:18,
                  height:`${(m.saidas / maxBar) * 100}%`, minHeight:m.saidas > 0 ? 3 : 0,
                  background:'#A32D2D', borderRadius:'4px 4px 0 0', opacity: m.eAtual ? 1 : 0.7,
                }}/>
            </div>
            <div style={{fontFamily:'var(--f-m)', fontSize:10, color: m.eAtual ? 'var(--blue)' : 'var(--t3)', fontWeight: m.eAtual ? 700 : 500}}>{m.label}</div>
            <div style={{fontSize:10.5, color: m.lucro >= 0 ? '#1D9E75' : '#ff8585', fontFamily:'var(--f-m)', fontWeight:600}}>
              {m.lucro >= 0 ? '+' : ''}{m.lucro >= 1000 || m.lucro <= -1000 ? `${(m.lucro/1000).toFixed(1)}k` : m.lucro}
            </div>
          </div>
        ))}
      </div>
      <div style={{display:'flex', gap:18, marginTop:14, paddingTop:12, borderTop:'1px solid var(--border-soft)'}}>
        <div style={{display:'flex', alignItems:'center', gap:6}}>
          <div style={{width:12, height:12, borderRadius:3, background:'#1D9E75'}}/><span style={{fontSize:12, color:'var(--t2)'}}>Entradas pagas</span>
        </div>

        </div>
      </div>
    </div>
  );
}

                <button onClick={()=>setCategorizandoExtrato(e)} style={{

                }}>
                  <Icon name="Plus" size={11}/>Categorizar

            ))}

        </div>

            <Icon name="Search" size={13} style={{color:'var(--t3)'}}/>

              style={{background:'none', border:'none', outline:'none', fontSize:13, color:'var(--t1)', width:'100%'}}/>
          </div>
          {['todas', ...CATEGORIAS_DESPESA].map(c => {

            const ativo = filtroCat === c;
            return (
              <button key={c} onClick={()=>setFiltroCat(c)} style={{
                padding:'6px 12px', borderRadius:7, fontSize:12, fontWeight:500, cursor:'pointer',
                background: ativo ? cor + '22' : 'transparent',
                color: ativo ? cor : 'var(--t3)',
                border:`1px solid ${ativo ? cor + '55' : 'transparent'}`,
              }}>{c === 'todas' ? 'Todas' : c}</button>

      </div>

      {/* Tabela */}
      <div className="card" style={{padding:0, overflow:'hidden'}}>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%', borderCollapse:'collapse', fontSize:13.5}}>
            <thead>
              <tr style={{background:'#000'}}>
                {['Descrição','Categoria','Valor','Tipo','Status do mês','Ações'].map(h => (
                  <th key={h} style={{padding:'10px 14px', textAlign:h==='Ações'?'right':'left', fontFamily:'var(--f-b)', fontSize:13, color:'#F5F5F7', fontWeight:700, borderBottom:'1px solid #2A2A3A'}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtrados.length === 0 && (
                <tr><td colSpan={6} style={{padding:40, textAlign:'center', color:'var(--t3)'}}>Nenhuma despesa cadastrada</td></tr>
              )}
              {filtrados.map(d => {
                const reg = despesasPag[d.id]?.[ymHoje];
                const pago = !!reg?.pago;
                const cor = CATEGORIAS_COR[d.categoria] || '#6E6E78';
                return (
                  <tr key={d.id} style={{borderBottom:'1px solid var(--border-soft)', opacity: d.ativo ? 1 : 0.5}}>
                    <td style={{padding:'10px 14px', color:'var(--t1)'}}>{d.descricao}</td>
                    <td style={{padding:'10px 14px'}}>
                      <span style={{padding:'3px 9px', borderRadius:999, background:cor+'22', color:cor, fontSize:11.5, fontWeight:500, border:`1px solid ${cor}44`}}>{d.categoria}</span>
                    </td>
                    <td style={{padding:'10px 14px', color:'var(--t1)', fontFamily:'var(--f-m)', fontWeight:600}}>R$ {Number(d.valor).toLocaleString('pt-BR')}</td>
                    <td style={{padding:'10px 14px', color:'var(--t2)', fontSize:12.5}}>
                      {d.recorrente ? `Mensal · dia ${d.dia_vencimento || '?'}` : `Avulso · ${d.data_unica ? formatBR(d.data_unica) : '—'}`}
                    </td>
                    <td style={{padding:'10px 14px'}}>
                      <button onClick={()=>setDespesaPagamento(d.id, ymHoje, pago ? null : { pago:true, data: hojeISO(), valor_pago: d.valor })}
                        style={{
                          padding:'4px 10px', borderRadius:999, fontSize:11.5, fontWeight:500, cursor:'pointer',
                          background: pago ? 'rgba(29,158,117,.15)' : 'transparent',
                          color: pago ? '#1D9E75' : 'var(--t3)',
                          border: pago ? '1px solid #1D9E7544' : '1px solid var(--border)',
                        }}>
                        {pago ? `✓ Pago em ${formatBR(reg.data)}` : 'Marcar pago'}
                      </button>
                    </td>
                    <td style={{padding:'10px 14px', textAlign:'right'}}>
                      <button onClick={()=>setGerindoPag(d)} title="Histórico" style={{ background:'transparent', border:'none', cursor:'pointer', color:'var(--t3)', padding:4, marginRight:4 }}><Icon name="Clock" size={14}/></button>
                      <button onClick={()=>setEditando(d)} title="Editar" style={{ background:'transparent', border:'none', cursor:'pointer', color:'var(--blue)', padding:4 }}><Icon name="Pencil" size={14}/></button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {editando && <DespesaModal despesa={editando} onClose={()=>setEditando(null)}/>}
      {gerindoPag && <DespesaHistoricoModal despesa={gerindoPag} despesasPag={despesasPag} onClose={()=>setGerindoPag(null)}/>}
      {categorizandoExtrato && <CategorizarExtratoModal lanc={categorizandoExtrato} onClose={()=>setCategorizandoExtrato(null)}/>}
    </div>
  );
}

// Modal CRUD de despesa
// Categoriza uma SAÍDA do extrato bancário em uma despesa real categorizada
// Cria fin_caixa_lancamentos + vincula no extrato (conciliado_caixa_id)
function CategorizarExtratoModal({ lanc, onClose }) {
  const [descricao, setDescricao] = React.useState(lanc.descricao || '');
  const [categoria, setCategoria] = React.useState('Outro');
  const [criarDespesaRecorrente, setCriarDespesaRecorrente] = React.useState(false);
  const [salvando, setSalvando] = React.useState(false);
  const valor = Math.abs(Number(lanc.valor || 0));

  const salvar = async () => {
    setSalvando(true);
    const cli = getSupa();
    if (!cli) { setSalvando(false); return; }
    // 1) Cria lançamento de caixa categorizado (saída)
    const { data: caixa, error: errCaixa } = await cli.from('fin_caixa_lancamentos').insert({
      tipo: 'saida', descricao, categoria, valor, data: lanc.data,
      origem: 'banco', observacao: `Categorizado do extrato (${lanc.fonte || 'manual'})`,
    }).select().single();
    if (errCaixa) { setSalvando(false); showToast?.('Erro: '+errCaixa.message,'error'); return; }
    // 2) Vincula no extrato
    await cli.from('fin_extrato_bancario').update({ conciliado_caixa_id: caixa.id }).eq('id', lanc.id);
    _bravaEmit('caixa', { op:'insert', id: caixa.id });
    _bravaEmit('extrato', { op:'vincular', id: lanc.id });
    // 3) Se marcado, cria também despesa recorrente
    if (criarDespesaRecorrente) {
      await addDespesa({
        descricao, categoria, valor, recorrente:true,
        dia_vencimento: new Date(lanc.data).getDate(),
      });
    }
    showToast?.(`✓ ${descricao} categorizada como ${categoria}`,'success');
    setSalvando(false); onClose();
  };

  const inp = { width:'100%', padding:'10px 12px', background:'var(--bg-3)', border:'1px solid var(--border)', borderRadius:8, color:'var(--t1)', fontSize:13, outline:'none' };

  return (
    <div onClick={(e)=>{if(e.target===e.currentTarget)onClose();}} style={{position:'fixed', inset:0, background:'rgba(0,0,0,.7)', zIndex:9999, display:'flex', alignItems:'center', justifyContent:'center', padding:20}}>
      <div style={{width:'min(520px, 95vw)', background:'var(--bg)', border:'1px solid var(--border)', borderRadius:12, padding:22}}>
        <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:14}}>
          <div style={{width:38, height:38, borderRadius:9, background:'rgba(245,166,35,.15)', display:'flex', alignItems:'center', justifyContent:'center'}}>
            <Icon name="Plus" size={17} style={{color:'#F5A623'}}/>
          </div>
          <div>
            <h3 style={{margin:0, fontSize:16, color:'var(--t1)'}}>Categorizar saída do banco</h3>
            <div style={{fontSize:11.5, color:'var(--t3)', marginTop:2}}>{new Date(lanc.data).toLocaleDateString('pt-BR')} · R$ {valor.toLocaleString('pt-BR', {minimumFractionDigits:2})}</div>
          </div>
        </div>

        <div style={{padding:'10px 14px', background:'var(--bg-2)', borderRadius:8, marginBottom:14, fontSize:12, color:'var(--t2)'}}>
          <div style={{color:'var(--t3)', fontSize:10.5, textTransform:'uppercase', letterSpacing:.4, marginBottom:3}}>Descrição original do extrato</div>
          {lanc.descricao}
        </div>

        <div style={{marginBottom:12}}>
          <label style={{fontSize:11, color:'var(--t3)', marginBottom:5, display:'block'}}>Descrição amigável</label>
          <input style={inp} value={descricao} onChange={e=>setDescricao(e.target.value)} placeholder="Ex: Aluguel sala, Internet Vivo..."/>
        </div>

        <div style={{marginBottom:14}}>
          <label style={{fontSize:11, color:'var(--t3)', marginBottom:5, display:'block'}}>Categoria</label>
          <select style={inp} value={categoria} onChange={e=>setCategoria(e.target.value)}>
            {CATEGORIAS_DESPESA.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
        </div>

        <div style={{padding:'10px 12px', background:'var(--bg-3)', border:'1px solid var(--border)', borderRadius:8, marginBottom:14, display:'flex', alignItems:'center', gap:10}}>
          <input type="checkbox" id="recDesp" checked={criarDespesaRecorrente} onChange={e=>setCriarDespesaRecorrente(e.target.checked)} style={{cursor:'pointer'}}/>
          <label htmlFor="recDesp" style={{flex:1, fontSize:12.5, color:'var(--t2)', cursor:'pointer'}}>
            <strong style={{color:'var(--t1)'}}>Também criar despesa recorrente</strong>
            <div style={{fontSize:11, color:'var(--t3)', marginTop:1}}>Útil se isto se repete todo mês (ex: aluguel, internet)</div>
          </label>
        </div>

        <div style={{display:'flex', justifyContent:'flex-end', gap:8}}>
          <button onClick={onClose} style={{padding:'8px 14px', borderRadius:7, border:'1px solid var(--border)', background:'transparent', color:'var(--t2)', fontSize:13, cursor:'pointer'}}>Cancelar</button>
          <button onClick={salvar} disabled={salvando || !descricao.trim()} style={{padding:'8px 16px', borderRadius:7, border:'none', background: salvando ? 'var(--bg-3)' : 'var(--blue)', color:'#fff', fontSize:13, fontWeight:600, cursor: salvando ? 'wait' : 'pointer'}}>
            {salvando ? 'Salvando...' : 'Categorizar'}
          </button>
        </div>
      </div>
    </div>
  );
}

function DespesaModal({ despesa, onClose }) {
  const novo = !despesa.id;
  const [form, setForm] = useState({
    descricao: despesa.descricao || '',
    categoria: despesa.categoria || 'Outro',
    valor: despesa.valor ?? 0,
    recorrente: despesa.recorrente ?? true,
    dia_vencimento: despesa.dia_vencimento ?? 10,
    data_unica: despesa.data_unica || hojeISO(),
    ativo: despesa.ativo ?? true,
    observacao: despesa.observacao || '',
  });
  const set = (k,v) => setForm(f => ({...f, [k]:v}));

  const salvar = async () => {
    if (!form.descricao.trim()) { showToast?.('Informe a descrição','warn'); return; }
    const patch = {
      ...form,
      valor: Number(form.valor)||0,
      dia_vencimento: form.recorrente ? (parseInt(form.dia_vencimento)||null) : null,
      data_unica: form.recorrente ? null : form.data_unica,
    };
    if (novo) await addDespesa(patch); else await editDespesa(despesa.id, patch);
    showToast?.(novo ? 'Despesa adicionada' : 'Despesa atualizada', 'success');
    onClose();
  };
  const remover = async () => {
    if (!confirm(`Remover "${despesa.descricao}"?`)) return;
    await deleteDespesa(despesa.id);
    showToast?.('Despesa removida', 'success');
    onClose();
  };

  const inp = { width:'100%', padding:'10px 12px', background:'var(--bg-3)', border:'1px solid var(--border)', borderRadius:8, color:'var(--t1)', fontSize:13.5, outline:'none', fontFamily:'var(--f-b)' };

  return (
    <div onClick={onClose} style={{position:'fixed', inset:0, background:'rgba(0,0,0,.7)', backdropFilter:'blur(4px)', display:'grid', placeItems:'center', zIndex:9998, padding:20}}>
      <div onClick={e=>e.stopPropagation()} style={{width:'min(540px, 95vw)', maxHeight:'90vh', background:'var(--bg)', border:'1px solid var(--border)', borderRadius:14, display:'flex', flexDirection:'column', overflow:'hidden'}}>
        {/* Header */}
        <div style={{padding:'18px 22px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', gap:12}}>
          <div style={{width:38, height:38, borderRadius:9, background:'rgba(30,144,255,.12)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0}}>
            <Icon name="CreditCard" size={17} style={{color:'var(--blue)'}}/>
          </div>
          <div style={{flex:1, minWidth:0}}>
            <h3 style={{margin:0, fontSize:17, color:'var(--t1)', fontFamily:'var(--f-d)', fontWeight:600}}>{novo ? 'Nova despesa' : 'Editar despesa'}</h3>
            <div style={{fontSize:12, color:'var(--t3)', marginTop:2}}>Atualiza o fluxo de caixa em tempo real</div>
          </div>
          <button onClick={onClose} style={{width:32, height:32, borderRadius:8, border:'none', background:'transparent', color:'var(--t3)', cursor:'pointer', fontSize:18}}>×</button>
        </div>

        {/* Body */}
        <div style={{flex:1, overflowY:'auto', padding:'18px 22px'}}>
          <div style={{marginBottom:18}}>
            <SecaoLabel icon="Pencil">Descrição</SecaoLabel>
            <input style={inp} value={form.descricao} onChange={e=>set('descricao', e.target.value)} placeholder="Ex: Aluguel escritório" autoFocus/>
          </div>

          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:14, marginBottom:18}}>
            <div>
              <SecaoLabel icon="Tag">Categoria</SecaoLabel>
              <select style={inp} value={form.categoria} onChange={e=>set('categoria', e.target.value)}>
                {CATEGORIAS_DESPESA.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
            </div>
            <div>
              <SecaoLabel icon="DollarSign">Valor (R$)</SecaoLabel>
              <input style={inp} type="number" min="0" step="0.01" value={form.valor} onChange={e=>set('valor', e.target.value)}/>
            </div>
          </div>

          <div style={{marginBottom:18}}>
            <SecaoLabel icon="Repeat">Tipo de cobrança</SecaoLabel>
            <div style={{display:'flex', gap:8}}>
              {[
                { v:true,  label:'Mensal recorrente', icon:'Repeat' },
                { v:false, label:'Avulso (uma vez)',  icon:'Clock'  },
              ].map(o => (
                <button key={String(o.v)} onClick={()=>set('recorrente', o.v)} style={{
                  flex:1, padding:'10px', borderRadius:8,
                  background: form.recorrente === o.v ? 'rgba(30,144,255,.12)' : 'var(--bg-3)',
                  color: form.recorrente === o.v ? 'var(--blue)' : 'var(--t2)',
                  border: form.recorrente === o.v ? '1px solid var(--blue)' : '1px solid var(--border)',
                  fontSize:12.5, cursor:'pointer', display:'inline-flex', alignItems:'center', justifyContent:'center', gap:7, fontWeight:500,
                }}>
                  <Icon name={o.icon} size={13}/>{o.label}
                </button>
              ))}
            </div>
          </div>

          {form.recorrente ? (
            <div style={{marginBottom:18}}>
              <SecaoLabel icon="Calendar">Dia do vencimento</SecaoLabel>
              <input style={inp} type="number" min="1" max="31" value={form.dia_vencimento || ''} onChange={e=>set('dia_vencimento', e.target.value)} placeholder="1 a 31"/>
            </div>
          ) : (
            <div style={{marginBottom:18}}>
              <SecaoLabel icon="Calendar">Data do pagamento</SecaoLabel>
              <input style={inp} type="date" value={form.data_unica} onChange={e=>set('data_unica', e.target.value)}/>
            </div>
          )}

          <div style={{marginBottom:18}}>
            <SecaoLabel icon="MessageCircle">Observação (opcional)</SecaoLabel>
            <textarea style={{...inp, resize:'vertical', fontFamily:'inherit', minHeight:62}} value={form.observacao} onChange={e=>set('observacao', e.target.value)} rows={2} placeholder="Detalhes extras, contato do fornecedor, etc."/>
          </div>

          <label style={{display:'flex', alignItems:'center', gap:10, padding:'10px 12px', background:'var(--bg-3)', border:'1px solid var(--border)', borderRadius:8, cursor:'pointer'}}>
            <input type="checkbox" checked={form.ativo} onChange={e=>set('ativo', e.target.checked)} style={{accentColor:'var(--blue)', width:16, height:16, cursor:'pointer'}}/>
            <div style={{flex:1}}>
              <div style={{fontSize:13, color:'var(--t1)', fontWeight:500}}>Despesa ativa</div>
              <div style={{fontSize:11.5, color:'var(--t3)', marginTop:1}}>Entra no cálculo do saldo e do fluxo de caixa</div>
            </div>
          </label>
        </div>

        {/* Footer */}
        <div style={{padding:'12px 22px', borderTop:'1px solid var(--border)', display:'flex', justifyContent:'space-between', gap:10}}>
          {!novo
            ? <button onClick={remover} style={{padding:'8px 14px', borderRadius:7, border:'none', background:'transparent', color:'#E5544D', fontSize:12.5, fontWeight:600, cursor:'pointer', display:'inline-flex', alignItems:'center', gap:5}}><Icon name="Trash2" size={12}/>Remover</button>
            : <span/>}
          <div style={{display:'flex', gap:10}}>
            <button onClick={onClose} style={{padding:'8px 16px', borderRadius:7, border:'1px solid var(--border)', background:'transparent', color:'var(--t2)', fontSize:13, fontWeight:500, cursor:'pointer'}}>Cancelar</button>
            <button onClick={salvar} style={{padding:'8px 18px', borderRadius:7, border:'none', background:'var(--blue)', color:'#fff', fontSize:13, fontWeight:600, cursor:'pointer', display:'inline-flex', alignItems:'center', gap:6}}>
              <Icon name="Check" size={13}/>{novo ? 'Adicionar' : 'Salvar'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// Modal histórico de pagamentos da despesa
function DespesaHistoricoModal({ despesa, despesasPag, onClose }) {
  const hoje = new Date();
  const meses = React.useMemo(() => {
    const arr = [];
    for (let i = 11; i >= 0; i--) {
      const d = new Date(hoje.getFullYear(), hoje.getMonth() - i, 1);
      arr.push({ ym: YM(d), label: d.toLocaleDateString('pt-BR', {month:'short', year:'numeric'}).replace('.','').replace(' de ','/'), date: d, isAtual: i === 0 });
    }
    return arr;
  }, []);
  const valor = parseFloat(despesa.valor) || 0;

  const pagosCount = meses.filter(m => despesasPag[despesa.id]?.[m.ym]?.pago).length;
  return (
    <div onClick={onClose} style={{position:'fixed', inset:0, background:'rgba(0,0,0,.7)', backdropFilter:'blur(4px)', display:'grid', placeItems:'center', zIndex:9998, padding:20}}>
      <div onClick={e=>e.stopPropagation()} style={{width:'min(560px, 95vw)', maxHeight:'90vh', background:'var(--bg)', border:'1px solid var(--border)', borderRadius:14, display:'flex', flexDirection:'column', overflow:'hidden'}}>
        {/* Header */}
        <div style={{padding:'18px 22px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', gap:12}}>
          <div style={{width:38, height:38, borderRadius:9, background:'rgba(30,144,255,.12)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0}}>
            <Icon name="History" size={17} style={{color:'var(--blue)'}}/>
          </div>
          <div style={{flex:1, minWidth:0}}>
            <h3 style={{margin:0, fontSize:17, color:'var(--t1)', fontFamily:'var(--f-d)', fontWeight:600}}>{despesa.descricao}</h3>
            <div style={{fontSize:12, color:'var(--t3)', marginTop:2}}>R$ {valor.toLocaleString('pt-BR')} · {despesa.categoria}</div>
          </div>
          <button onClick={onClose} style={{width:32, height:32, borderRadius:8, border:'none', background:'transparent', color:'var(--t3)', cursor:'pointer', fontSize:18}}>×</button>
        </div>

        {/* Body */}
        <div style={{flex:1, overflowY:'auto', padding:'18px 22px'}}>
          <SecaoLabel icon="History" count={pagosCount > 0 ? `${pagosCount}/${meses.length}` : null}>Histórico de pagamentos (12 meses)</SecaoLabel>
          <div style={{display:'grid', gap:6}}>
            {meses.map(m => {
              const reg = despesasPag[despesa.id]?.[m.ym];
              return (
                <div key={m.ym} style={{display:'grid', gridTemplateColumns:'90px 1fr auto', gap:12, alignItems:'center', padding:'10px 12px', background: m.isAtual ? 'rgba(30,144,255,.08)' : 'var(--bg-3)', border: m.isAtual ? '1px solid rgba(30,144,255,.35)' : '1px solid var(--border-soft)', borderRadius:8}}>
                  <div style={{fontFamily:'var(--f-m)', fontSize:12, color:'var(--t2)', textTransform:'capitalize'}}>{m.label}</div>
                  <div style={{fontSize:12, color:'var(--t3)'}}>{reg?.pago ? `Pago em ${formatBR(reg.data)} · R$ ${(reg.valor_pago ?? valor).toLocaleString('pt-BR')}` : 'Não pago'}</div>
                  <button onClick={()=>setDespesaPagamento(despesa.id, m.ym, reg?.pago ? null : { pago:true, data: hojeISO(), valor_pago: valor })}
                    style={{
                      background: reg?.pago ? 'transparent' : '#1D9E75',
                      color: reg?.pago ? 'var(--t3)' : '#fff',
                      border: reg?.pago ? '1px solid var(--border)' : 'none',
                      padding:'5px 12px', fontSize:12, fontWeight:500, borderRadius:6, cursor:'pointer',
                    }}>{reg?.pago ? 'Desmarcar' : 'Marcar pago'}</button>
                </div>
              );
