    dia:     rec.dia || '',
    status:  rec.status || 'Comercial',
  });
  const set = (k,v) => setForm(f => ({...f, [k]:v}));

  const salvar = () => {
    if (!form.cliente.trim()) { showToast?.('Informe o nome do cliente','warn'); return; }
    const patch = { ...form, impl: Number(form.impl)||0, mensal: Number(form.mensal)||0 };
    if (novo) addRecorrencia(patch);
    else      editRecorrencia(rec.__id, patch);
    showToast?.(novo ? 'Cliente adicionado' : 'Cliente atualizado', 'success');
    onClose();
  };

  const remover = () => {
    if (!confirm(`Remover "${rec.cliente}" do controle de recorrencia?`)) return;
    deleteRecorrencia(rec.__id);
    showToast?.('Cliente removido', 'success');
    onClose();
  };

  const lbl = { display:'block', fontSize:11, color:'var(--t3)', fontFamily:'var(--f-m)', textTransform:'uppercase', letterSpacing:'.06em', marginBottom:6 };
  const inp = { width:'100%', padding:'9px 12px', background:'var(--bg-3)', border:'1px solid var(--border)', borderRadius:8, color:'var(--t1)', fontSize:14, outline:'none', fontFamily:'var(--f-b)' };

  return (
    <div onClick={onClose} style={{position:'fixed', inset:0, background:'rgba(0,0,0,.65)', display:'grid', placeItems:'center', zIndex:9998, animation:'fade-in .15s'}}>
      <div onClick={e=>e.stopPropagation()} style={{
        width:'min(560px, 92vw)', background:'var(--bg-2)', border:'1px solid var(--border)',
        borderRadius:14, padding:'22px 24px', boxShadow:'0 24px 60px rgba(0,0,0,.5)'
      }}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:18}}>
          <div>
            <div style={{fontFamily:'var(--f-d)', fontSize:18, fontWeight:600, color:'var(--t1)', letterSpacing:'-.01em'}}>
              {novo ? 'Novo contrato' : 'Editar contrato'}
            </div>
            <div style={{fontSize:12, color:'var(--t3)', marginTop:2}}>Atualiza MRR/Dashboard em tempo real</div>
          </div>
          <button onClick={onClose} style={{background:'none', border:'none', cursor:'pointer', color:'var(--t3)', padding:6}}><Icon name="XCircle" size={18}/></button>
        </div>

        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:14}}>
          <div style={{gridColumn:'span 2'}}>
            <label style={lbl}>Cliente</label>
            <input style={inp} value={form.cliente} onChange={e=>set('cliente', e.target.value)} placeholder="Nome do cliente / contrato"/>
          </div>
          <div>
            <label style={lbl}>Serviço</label>
            <input style={inp} value={form.servico} onChange={e=>set('servico', e.target.value)} placeholder="IA + CRM, Site, etc."/>
          </div>
          <div>
            <label style={lbl}>Nicho</label>
            <input style={inp} value={form.nicho} onChange={e=>set('nicho', e.target.value)} placeholder="Saúde, Indústria, etc."/>
          </div>
          <div>
            <label style={lbl}>Implementação (R$)</label>
            <input style={inp} type="number" min="0" value={form.impl} onChange={e=>set('impl', e.target.value)}/>
          </div>
          <div>
            <label style={lbl}>Mensal (R$)</label>
            <input style={inp} type="number" min="0" value={form.mensal} onChange={e=>set('mensal', e.target.value)}/>
          </div>
          <div>
            <label style={lbl}>Dia do vencimento</label>
            <input style={inp} value={form.dia} onChange={e=>set('dia', e.target.value)} placeholder="Ex: Dia 10"/>
          </div>
          <div>
            <label style={lbl}>Status</label>
            <select style={inp} value={form.status} onChange={e=>set('status', e.target.value)}>
              {STATUS_OPTS.map(s => <option key={s} value={s}>{s}</option>)}
            </select>
          </div>
        </div>

        <div style={{display:'flex', gap:10, justifyContent:'space-between', marginTop:22, paddingTop:16, borderTop:'1px solid var(--border-soft)'}}>
          {!novo
            ? <button onClick={remover} className="btn" style={{background:'#A32D2D22', color:'#ff8585', border:'1px solid #A32D2D55'}}><Icon name="Trash2" size={14}/>Remover</button>
            : <span/>}
          <div style={{display:'flex', gap:10}}>
            <button onClick={onClose} className="btn btn-outline">Cancelar</button>
            <button onClick={salvar} className="btn btn-primary"><Icon name="Check" size={14}/>{novo ? 'Adicionar' : 'Salvar'}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* Modal de historico/gestao de pagamentos do cliente */
function ModalPagamentos({ rec, pagamentos, onClose }) {
  const [refresh, setRefresh] = useState(0);
  const hoje = new Date();
  const diaVenc = parseDiaVenc(rec.dia);

  // Lista os ultimos 12 meses para gerir
  const meses = React.useMemo(() => {
    const arr = [];
    for (let i = 11; i >= 0; i--) {
      const d = new Date(hoje.getFullYear(), hoje.getMonth() - i, 1);
      arr.push({
        ym: YM(d),
        label: d.toLocaleDateString('pt-BR',{month:'short', year:'numeric'}).replace('.','').replace(' de ','/'),
        date: d,
        isAtual: i === 0,
        isFuturo: false,
      });
    }
    return arr;
  }, [refresh]);

  const togglePago = (ym, atualReg) => {
    if (atualReg?.pago) {
      setPagamento(rec.__id, ym, null); // desmarca
    } else {
      setPagamento(rec.__id, ym, { pago:true, data: hojeISO() });
    }
    setRefresh(r => r+1);
  };

  if (!rec.mensal || rec.mensal <= 0) {
    return (
      <div onClick={onClose} style={{position:'fixed', inset:0, background:'rgba(0,0,0,.65)', display:'grid', placeItems:'center', zIndex:9998}}>
        <div onClick={e=>e.stopPropagation()} style={{width:'min(460px,92vw)', background:'var(--bg-2)', border:'1px solid var(--border)', borderRadius:14, padding:24}}>
          <div style={{fontFamily:'var(--f-d)', fontSize:16, fontWeight:600, color:'var(--t1)', marginBottom:8}}>{rec.cliente}</div>
          <div style={{fontSize:13, color:'var(--t2)'}}>Este contrato nao tem mensalidade configurada. Edite o cliente para definir um valor mensal e dia de vencimento.</div>
          <button onClick={onClose} className="btn btn-primary" style={{marginTop:18, width:'100%'}}>Fechar</button>
        </div>
      </div>
    );
  }

  return (
    <div onClick={onClose} style={{position:'fixed', inset:0, background:'rgba(0,0,0,.65)', display:'grid', placeItems:'center', zIndex:9998, animation:'fade-in .15s'}}>
      <div onClick={e=>e.stopPropagation()} style={{
        width:'min(560px, 94vw)', maxHeight:'88vh', overflow:'auto',
        background:'var(--bg-2)', border:'1px solid var(--border)',
        borderRadius:14, padding:'22px 24px'
      }}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:18}}>
          <div>
            <div style={{fontFamily:'var(--f-d)', fontSize:18, fontWeight:600, color:'var(--t1)'}}>{rec.cliente}</div>
            <div style={{fontSize:13, color:'var(--t3)', marginTop:3}}>
              R$ {rec.mensal.toLocaleString('pt-BR')}/mês · vence dia {diaVenc || '—'}
            </div>
          </div>
          <button onClick={onClose} style={{background:'none', border:'none', cursor:'pointer', color:'var(--t3)', padding:6}}><Icon name="XCircle" size={18}/></button>
        </div>

        <div style={{fontSize:11, color:'var(--t3)', fontFamily:'var(--f-m)', textTransform:'uppercase', letterSpacing:'.06em', marginBottom:10}}>Histórico (12 meses)</div>
        <div style={{display:'grid', gap:6}}>
          {meses.map(m => {
            const reg = pagamentos[rec.__id]?.[m.ym];
            const refForStatus = { ...rec };
            // calcula status pra cada mes considerando vencimento do mes
            let badge;
            if (reg?.pago) {
              badge = { label:`Pago · ${formatBR(reg.data)}`, color:'#1D9E75' };
            } else if (diaVenc) {
              const venc = new Date(m.date.getFullYear(), m.date.getMonth(), Math.min(diaVenc, ultimoDiaMes(m.date.getFullYear(), m.date.getMonth())));
              const h = new Date(hoje.getFullYear(), hoje.getMonth(), hoje.getDate());
              const dDias = Math.round((h - venc) / (24*60*60*1000));
              if (dDias < 0) badge = { label:`Vence em ${-dDias}d`, color:'#BA7517' };
              else if (dDias === 0) badge = { label:'Vence hoje', color:'#BA7517' };
              else badge = { label:`Atrasado ${dDias}d`, color:'#A32D2D' };
            } else {
              badge = { label:'Sem vencimento', color:'#6E6E78' };
            }
            return (
              <div key={m.ym} style={{
                display:'grid', gridTemplateColumns:'90px 1fr auto', gap:12, alignItems:'center',
                padding:'10px 12px', background: m.isAtual ? 'rgba(123,63,228,.08)' : 'var(--bg-3)',
                border: m.isAtual ? '1px solid rgba(123,63,228,.35)' : '1px solid var(--border-soft)',
                borderRadius:8
              }}>
                <div style={{fontFamily:'var(--f-m)', fontSize:12, color:'var(--t2)', textTransform:'capitalize'}}>{m.label}</div>
                <div>
                  <span style={{fontSize:11, padding:'3px 9px', borderRadius:999, background:badge.color+'22', color:badge.color, border:`1px solid ${badge.color}44`, fontWeight:500}}>{badge.label}</span>
                </div>
                <button onClick={()=>togglePago(m.ym, reg)} className="btn btn-sm" style={{
                  background: reg?.pago ? 'transparent' : '#1D9E75',
                  color: reg?.pago ? '#6E6E78' : '#fff',
                  border: reg?.pago ? '1px solid var(--border)' : 'none',
                  padding:'5px 11px', fontSize:12,
                }}>
                  {reg?.pago ? 'Desmarcar' : 'Marcar pago'}
                </button>
              </div>
            );
          })}
        </div>

        <button onClick={onClose} className="btn btn-outline" style={{marginTop:18, width:'100%'}}>Fechar</button>
      </div>
    </div>
  );
}

function MRR() {
  const recorrencia = useRecorrencia();
  const pagamentos = usePagamentos();

  const [filtro, setFiltro] = useState('todos');
  const [busca, setBusca] = useState('');
  const [sortCol, setSortCol] = useState('impl');
  const [sortAsc, setSortAsc] = useState(false);
  const [editando, setEditando] = useState(null);   // rec sendo editado ou {} para novo
  const [gerindoPag, setGerindoPag] = useState(null); // rec para abrir modal pagamentos

  const totalImpl = recorrencia.reduce((s,r) => s+(r.impl||0), 0);
  const totalMRR  = recorrencia.reduce((s,r) => s+(r.mensal||0), 0);
  const ativos    = recorrencia.filter(r=>['Em Prod','Ativo'].includes(r.status));
  const mrrAtivo  = ativos.reduce((s,r) => s+(r.mensal||0), 0);

  // Pagamentos do mes atual: total atrasado + numero de contratos atrasados
  const { totalAtrasado, qtdAtrasados, qtdPendentes, qtdPagosMes } = React.useMemo(() => {
    let totalA = 0, qtdA = 0, qtdP = 0, qtdPg = 0;
    recorrencia.forEach(r => {
      const st = statusPagamentoMes(r, pagamentos);
      if (st.kind === 'atrasado') { totalA += r.mensal; qtdA++; }
      else if (st.kind === 'pendente') qtdP++;
      else if (st.kind === 'pago') qtdPg++;
    });
    return { totalAtrasado: totalA, qtdAtrasados: qtdA, qtdPendentes: qtdP, qtdPagosMes: qtdPg };
  }, [recorrencia, pagamentos]);

  const filtrados = recorrencia
    .filter(r => {
      if (filtro === 'atrasados') {
        const st = statusPagamentoMes(r, pagamentos);
        if (st.kind !== 'atrasado') return false;
      } else if (filtro !== 'todos' && r.status !== filtro) {
        return false;
      }
      if (busca && !r.cliente.toLowerCase().includes(busca.toLowerCase()) && !r.nicho.toLowerCase().includes(busca.toLowerCase())) return false;
      return true;
    })
    .sort((a,b) => {
      const v = sortAsc ? 1 : -1;
      if (sortCol === 'impl') return ((a.impl||0) - (b.impl||0)) * v;
      if (sortCol === 'mensal') return ((a.mensal||0) - (b.mensal||0)) * v;
      if (sortCol === 'atraso') {
        const da = diasAtraso(a) ?? -999;
        const db = diasAtraso(b) ?? -999;
        return (da - db) * v;
      }
      return a.cliente.localeCompare(b.cliente) * v;
    });

  const col = (label, key) => (
    <th onClick={()=>{ if(sortCol===key) setSortAsc(v=>!v); else { setSortCol(key); setSortAsc(false); }}}
      style={{padding:'10px 14px',textAlign:'left',fontFamily:'var(--f-b)',fontSize:13,color:'#F5F5F7',fontWeight:700,cursor:'pointer',userSelect:'none',whiteSpace:'nowrap',borderBottom:'1px solid #2A2A3A'}}>
      {label} {sortCol===key ? (sortAsc?'↑':'↓') : ''}
    </th>
  );

  const fmt = v => v > 0 ? `R$ ${v.toLocaleString('pt-BR')}` : '—';

  const tickMensalPorContrato = recorrencia.filter(r=>r.mensal>0).length || 1;

  return (
    <div className="page">
      <div className="page-head">
        <div>
          <div className="page-head__title">MRR · Controle de Recorrência</div>
          <div className="page-head__sub">Base: CRM TECNOLOGIA · {recorrencia.length} contratos</div>
        </div>
        <div className="page-head__actions" style={{display:'flex',gap:10}}>
          <button onClick={()=>setEditando({})} className="btn btn-primary"><Icon name="Plus" size={14}/>Novo contrato</button>
          <button onClick={exportarCSV} className="btn btn-outline"><Icon name="Download" size={14}/>Exportar</button>
        </div>
      </div>

      {/* KPIs — incluindo Atrasados em destaque */}
      <div className="kpi-grid" style={{gridTemplateColumns:'repeat(5,1fr)',marginBottom:24}}>
        {[
          {label:'MRR Total',          val:`R$ ${totalMRR.toLocaleString('pt-BR')}`, icon:'TrendingUp', color:'#1E90FF'},
          {label:'MRR Ativo (Prod+Ativo)', val:`R$ ${mrrAtivo.toLocaleString('pt-BR')}`, icon:'CheckCircle2', color:'#1D9E75'},
          {label:'Implementação total',val:`R$ ${totalImpl.toLocaleString('pt-BR')}`,icon:'ScrollText',color:'#7B3FE4'},
          {label:'Ticket médio mensal',val:`R$ ${Math.round(totalMRR/tickMensalPorContrato).toLocaleString('pt-BR')}`, icon:'BarChart3', color:'#BA7517'},
          {label:`Em atraso (${qtdAtrasados})`, val:`R$ ${totalAtrasado.toLocaleString('pt-BR')}`, icon:'AlertCircle', color:'#A32D2D', highlight:qtdAtrasados>0, onClick:()=>setFiltro('atrasados')},
        ].map((k,i) => (
          <div key={i} className="kpi" onClick={k.onClick} style={{
            cursor:k.onClick?'pointer':'default',
            border: k.highlight ? '1px solid #A32D2D66' : '1px solid var(--border)',
            background: k.highlight ? 'linear-gradient(135deg, rgba(163,45,45,.08), transparent)' : undefined,
          }}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
              <div className="kpi__label">{k.label}</div>
              <div className="kpi__icon" style={{background:k.color+'22'}}><Icon name={k.icon} size={17} style={{color:k.color}}/></div>
            </div>
            <div className="kpi__value" style={{color:k.highlight?'#ff8585':'var(--t1)',fontSize:22}}>{k.val}</div>
          </div>
        ))}
      </div>

      {/* Banner alerta de atraso */}
      {qtdAtrasados > 0 && filtro !== 'atrasados' && (
        <div onClick={()=>setFiltro('atrasados')} style={{
          padding:'12px 16px', marginBottom:14, cursor:'pointer',
          background:'rgba(163,45,45,.08)', border:'1px solid #A32D2D55',
          borderRadius:10, display:'flex', alignItems:'center', gap:12,
        }}>
          <Icon name="AlertCircle" size={18} style={{color:'#ff8585'}}/>
          <div style={{flex:1, fontSize:13.5, color:'var(--t1)'}}>
            <strong style={{color:'#ff8585'}}>{qtdAtrasados} {qtdAtrasados===1?'contrato em atraso':'contratos em atraso'}</strong>
            {' '}somando <strong>R$ {totalAtrasado.toLocaleString('pt-BR')}</strong> · clique para filtrar
          </div>
          <Icon name="ChevronRight" size={16} style={{color:'var(--t3)'}}/>
        </div>
      )}

      {/* Projeção 12 meses — empilhada por status */}
      <ProjecaoMRR data={recorrencia}/>

      {/* Filtros + busca */}
      <div className="card" style={{padding:'16px 18px',marginBottom:14}}>
        <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
          <div style={{display:'flex',alignItems:'center',gap:8,padding:'7px 12px',background:'var(--bg-3)',border:'1px solid var(--border)',borderRadius:8,flex:'1',minWidth:180}}>
            <Icon name="Search" size={13} style={{color:'var(--t3)'}}/>
            <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="Buscar cliente ou nicho…" style={{background:'none',border:'none',outline:'none',fontSize:13,color:'var(--t1)',width:'100%'}}/>
          </div>
          {['todos','atrasados','Em Prod','Ativo','Implementação','Comercial','Proposta Apresentada','Em breve'].map(f => {
            const isAtraso = f === 'atrasados';
            const cor = isAtraso ? '#A32D2D' : (SC[f]||'var(--purple)');
            const count = isAtraso ? qtdAtrasados : recorrencia.filter(r=>r.status===f).length;
            return (
              <button key={f} onClick={()=>setFiltro(f)} style={{
                padding:'6px 12px',borderRadius:7,fontSize:12,fontWeight:500,cursor:'pointer',
                background:filtro===f ? cor+'22' : 'transparent',
                color:filtro===f ? (isAtraso?'#ff8585':(SC[f]||'#c4a8ff')) : '#6E6E78',
                border:`1px solid ${filtro===f ? cor+'55' : 'transparent'}`,
                transition:'all .15s',
              }}>{f==='todos'?'Todos':isAtraso?'Em atraso':f} {filtro===f && f!=='todos' && `(${count})`}</button>
            );
          })}
        </div>
      </div>

      {/* Tabela */}
      <div className="card" style={{padding:0,overflow:'hidden'}}>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:13.5}}>
            <thead>
              <tr style={{background:'#000000'}}>
                {col('Cliente','cliente')}
                <th style={{padding:'10px 14px',textAlign:'left',fontFamily:'var(--f-b)',fontSize:13,color:'#F5F5F7',fontWeight:700,borderBottom:'1px solid #2A2A3A'}}>Serviço</th>
                <th style={{padding:'10px 14px',textAlign:'left',fontFamily:'var(--f-b)',fontSize:13,color:'#F5F5F7',fontWeight:700,borderBottom:'1px solid #2A2A3A'}}>Nicho</th>
                {col('Implementação','impl')}
                {col('Mensal','mensal')}
                <th style={{padding:'10px 14px',textAlign:'left',fontFamily:'var(--f-b)',fontSize:13,color:'#F5F5F7',fontWeight:700,borderBottom:'1px solid #2A2A3A'}}>Venc.</th>
                {col('Pagamento (mês atual)','atraso')}
                <th style={{padding:'10px 14px',textAlign:'left',fontFamily:'var(--f-b)',fontSize:13,color:'#F5F5F7',fontWeight:700,borderBottom:'1px solid #2A2A3A'}}>Status</th>
                <th style={{padding:'10px 14px',textAlign:'right',fontFamily:'var(--f-b)',fontSize:13,color:'#F5F5F7',fontWeight:700,borderBottom:'1px solid #2A2A3A'}}>Ações</th>
              </tr>
            </thead>
            <tbody>
              {filtrados.map((r,i) => {
                const stPag = statusPagamentoMes(r, pagamentos);
                const ymAtual = YM(new Date());
                const regAtual = pagamentos[r.__id]?.[ymAtual];
                return (
                  <tr key={r.__id||i} style={{
                    borderBottom:'1px solid var(--border-soft)',
                    transition:'background .12s',
                    background: stPag.kind==='atrasado' ? 'rgba(163,45,45,.05)' : 'transparent',
                  }}
                    onMouseEnter={e=>e.currentTarget.style.background = stPag.kind==='atrasado' ? 'rgba(163,45,45,.10)' : 'rgba(255,255,255,.03)'}
                    onMouseLeave={e=>e.currentTarget.style.background = stPag.kind==='atrasado' ? 'rgba(163,45,45,.05)' : 'transparent'}>
                    <td style={{padding:'11px 14px',fontWeight:600,color:'var(--t1)',whiteSpace:'nowrap'}}>{r.cliente}</td>
                    <td style={{padding:'11px 14px',color:'var(--t2)',whiteSpace:'nowrap'}}>{r.servico||'—'}</td>
                    <td style={{padding:'11px 14px',color:'var(--t2)'}}>{r.nicho}</td>
                    <td style={{padding:'11px 14px',fontFamily:'var(--f-m)',color: r.impl>0?'#F5F5F7':'#6E6E78',textAlign:'right'}}>{fmt(r.impl)}</td>
                    <td style={{padding:'11px 14px',fontFamily:'var(--f-m)',color: r.mensal>0?'#1D9E75':'#6E6E78',fontWeight:r.mensal>0?600:400,textAlign:'right'}}>{fmt(r.mensal)}</td>
                    <td style={{padding:'11px 14px',color:'var(--t2)',fontFamily:'var(--f-m)',fontSize:12}}>{r.dia||'—'}</td>

                    </td>
                    <td style={{padding:'11px 14px'}}>
                      {r.status && <span style={{fontSize:11,padding:'3px 9px',borderRadius:999,background:(SC[r.status]||'#6E6E78')+'18',color:SC[r.status]||'#6E6E78',border:`1px solid ${(SC[r.status]||'#6E6E78')}33`,fontWeight:500}}>{r.status}</span>}

                    <td style={{padding:'11px 14px',textAlign:'right',whiteSpace:'nowrap'}}>
                      {r.mensal > 0 && (
                        <button onClick={()=>{
                          if (regAtual?.pago) setPagamento(r.__id, ymAtual, null);
                          else setPagamento(r.__id, ymAtual, { pago:true, data: hojeISO() });
                        }} title={regAtual?.pago?'Desmarcar pagamento do mês':'Marcar como pago (mês atual)'}
                          style={{
                            background: regAtual?.pago ? 'transparent' : '#1D9E7522',
                            color: regAtual?.pago ? '#1D9E75' : '#1D9E75',
                            border: `1px solid ${regAtual?.pago ? '#1D9E7555' : '#1D9E7555'}`,
                            borderRadius:6, padding:'5px 9px', fontSize:11, cursor:'pointer', marginRight:6,
                          }}>
                          {regAtual?.pago ? '✓ Pago' : 'Marcar pago'}
                        </button>
                      )}
                      <button onClick={()=>setGerindoPag(r)} title="Gerir pagamentos / histórico"

                      <button onClick={()=>setEditando(r)} title="Editar contrato"
                        style={{background:'transparent', border:'1px solid var(--border)', borderRadius:6, padding:'5px 8px', cursor:'pointer', color:'var(--t2)'}}>
                        <Icon name="Pencil" size={13}/>
                      </button>
                    </td>
                  </tr>
                );
              })}
              {filtrados.length === 0 && (
                <tr><td colSpan={9} style={{padding:'40px 20px', textAlign:'center', color:'var(--t3)', fontSize:13}}>Nenhum contrato encontrado para os filtros atuais.</td></tr>
              )}
            </tbody>
            <tfoot>
              <tr style={{background:'var(--bg-3)',borderTop:'2px solid var(--border)'}}>
                <td style={{padding:'12px 14px',fontWeight:700,color:'var(--t1)',fontFamily:'var(--f-d)'}} colSpan={3}>TOTAL ({filtrados.length} contratos)</td>
                <td style={{padding:'12px 14px',fontFamily:'var(--f-m)',fontWeight:700,color:'var(--t1)',textAlign:'right'}}>R$ {filtrados.reduce((s,r)=>s+(r.impl||0),0).toLocaleString('pt-BR')}</td>
                <td style={{padding:'12px 14px',fontFamily:'var(--f-m)',fontWeight:700,color:'#1D9E75',textAlign:'right'}}>R$ {filtrados.reduce((s,r)=>s+(r.mensal||0),0).toLocaleString('pt-BR')}/mês</td>
                <td colSpan={4}/>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>

      {/* Resumo do mes */}
      <div style={{display:'flex', gap:14, marginTop:14, flexWrap:'wrap', fontSize:12.5, color:'var(--t2)'}}>
        <div>✓ <strong style={{color:'#1D9E75'}}>{qtdPagosMes}</strong> pagos no mês</div>
        <div>● <strong style={{color:'#BA7517'}}>{qtdPendentes}</strong> pendentes</div>
        <div>⚠ <strong style={{color:'#ff8585'}}>{qtdAtrasados}</strong> atrasados</div>
      </div>

      {editando && <ModalRec rec={editando} onClose={()=>setEditando(null)}/>}
      {gerindoPag && <ModalPagamentos rec={gerindoPag} pagamentos={pagamentos} onClose={()=>setGerindoPag(null)}/>}
    </div>
  );
}

  { id:'proposta',   nome:'Proposta',    cor:'#BA7517', cards: CLIENTES_CRM.filter(c=>c.status==='Proposta Apresentada').map(c=>({id:c.nome,nome:c.nome,sub:c.servico,nicho:c.nicho,color:c.color,init:c.init,logoUrl:c.logoUrl})) },

];

const CORES = ['#6E6E78','#7B3FE4','#1E90FF','#1D9E75','#BA7517','#A32D2D','#185FA5','#E040FB','#FF6D00','#00BCD4'];

// Placeholder visual durante drag (renomeado pra não conflitar com PageEmBreve)
function DragPlaceholder({ cor, h }) {
  return (
    <div style={{
      height: h, borderRadius: 10,
      background: `${cor}15`,
      border: `2px dashed ${cor}66`,
      animation: 'fade-in .12s ease',
      transition: 'all .2s',
    }}/>
  );
}

function Pipeline({ cols, setCols }) {
  const [editando, setEditando] = useState(null);
  const [novoNome, setNovoNome] = useState('');
  // dragState: { card, fromCol, fromIdx, height }
  const [drag, setDrag] = useState(null);
  // dropTarget: { colId, idx }  → onde vai inserir
  const [dropTarget, setDropTarget] = useState(null);
  // colHover: id da coluna sendo hover
  const [colHover, setColHover] = useState(null);

  const updateCol = (id, patch) => setCols(cs => cs.map(c => c.id===id ? {...c,...patch} : c));
  const addCol = () => {
    const id = 'col_'+Date.now();
    setCols(cs => [...cs, {id, nome:'Nova coluna', cor:'#6E6E78', cards:[]}]);
    setEditando({colId:id, tipo:'nome'});
    setNovoNome('Nova coluna');
  };
  const removeCol = id => {
    if (!confirm('Remover esta coluna e todos os cards dela?')) return;
    setCols(cs => cs.filter(c => c.id!==id));
  };
  const addCard = colId => {
    const nome = prompt('Nome do cliente:');
    if (!nome) return;
    setCols(cs => cs.map(c => c.id===colId ? {...c, cards:[...c.cards, {id:Date.now()+'', nome, sub:'', nicho:'', color:'#7B3FE4', init:nome.slice(0,2).toUpperCase()}]} : c));
  };

  // Move com posição específica (suporta reordenar dentro da mesma coluna)
  const moveTo = (cardId, fromColId, toColId, toIdx) => {
    setCols(cs => {
      const novas = cs.map(c => ({...c, cards: [...c.cards]}));
      const fromC = novas.find(c => c.id === fromColId);
      const toC   = novas.find(c => c.id === toColId);
      if (!fromC || !toC) return cs;
      const fromIdx = fromC.cards.findIndex(k => k.id === cardId);
      if (fromIdx < 0) return cs;
      const [card] = fromC.cards.splice(fromIdx, 1);
      // ajusta o índice se mover dentro da mesma coluna pra trás
      const insertAt = (fromColId === toColId && toIdx > fromIdx) ? toIdx - 1 : toIdx;
      toC.cards.splice(Math.min(insertAt, toC.cards.length), 0, card);
      return novas;
    });
  };

  const onDragStart = (e, card, colId, idx) => {
    setDrag({ card, fromCol: colId, fromIdx: idx });
    e.dataTransfer.effectAllowed = 'move';
    // Cria um ghost transparente customizado
    try {
      const ghost = e.currentTarget.cloneNode(true);
      ghost.style.position = 'absolute';
      ghost.style.top = '-9999px';
      ghost.style.left = '-9999px';
      ghost.style.width = e.currentTarget.offsetWidth + 'px';
      ghost.style.transform = 'rotate(3deg)';
      ghost.style.opacity = '0.95';
      ghost.style.boxShadow = '0 16px 40px rgba(0,0,0,.5)';
      document.body.appendChild(ghost);
      e.dataTransfer.setDragImage(ghost, 20, 20);
      setTimeout(() => ghost.remove(), 0);
    } catch (err) {}
  };

  const onCardDragOver = (e, colId, idx) => {
    e.preventDefault();
    e.stopPropagation();
    if (!drag) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const meio = rect.top + rect.height / 2;
    const novoIdx = e.clientY < meio ? idx : idx + 1;
    if (dropTarget?.colId !== colId || dropTarget?.idx !== novoIdx) {
      setDropTarget({ colId, idx: novoIdx });
    }
  };

  const onColDragOver = (e, colId) => {
    e.preventDefault();
    setColHover(colId);
    // Se não tem dropTarget na coluna, coloca no final
    if (drag && (!dropTarget || dropTarget.colId !== colId)) {
      const col = cols.find(c => c.id === colId);
      if (col) setDropTarget({ colId, idx: col.cards.length });
    }
  };

  const onDrop = (e) => {
    e.preventDefault();
    if (drag && dropTarget) {
      moveTo(drag.card.id, drag.fromCol, dropTarget.colId, dropTarget.idx);
      if (drag.fromCol !== dropTarget.colId) {
        showToast(`${drag.card.nome} movido para "${cols.find(c=>c.id===dropTarget.colId)?.nome}"`, 'success');
      }
    }
    setDrag(null); setDropTarget(null); setColHover(null);
  };

  const onDragEnd = () => { setDrag(null); setDropTarget(null); setColHover(null); };

  return (
    <div style={{padding:'28px 32px',overflowX:'auto',height:'calc(100vh - 60px)',display:'flex',flexDirection:'column'}}>
      <div className="page-head" style={{flexShrink:0}}>
        <div>
          <div className="page-head__title">Pipeline de Clientes</div>
          <div className="page-head__sub">{cols.reduce((s,c)=>s+c.cards.length,0)} clientes · {cols.length} colunas · arraste cards entre colunas ou reordene dentro da mesma</div>
        </div>
        <div className="page-head__actions">
          <button className="btn btn-outline" onClick={addCol}><Icon name="Plus" size={14}/>Nova coluna</button>
        </div>
      </div>

      <div style={{display:'flex',gap:14,flex:1,overflowX:'auto',overflowY:'hidden',paddingBottom:16}}
        onDragEnd={onDragEnd}>
        {cols.map(col => {
          const isHover = colHover === col.id && drag;
          return (
          <div key={col.id} style={{
              width:280, flexShrink:0, display:'flex', flexDirection:'column', gap:0,
              transition:'transform .15s',
              transform: isHover ? 'translateY(-2px)' : 'none',
            }}
            onDragOver={e => onColDragOver(e, col.id)}
            onDragLeave={e => { if (!e.currentTarget.contains(e.relatedTarget)) setColHover(null); }}
            onDrop={onDrop}>

            {/* Header coluna */}
            <div style={{
              display:'flex',alignItems:'center',gap:8,
              padding:'10px 14px',marginBottom:10,
              background:'var(--bg-2)',
              border:`1px solid ${isHover ? col.cor : col.cor+'44'}`,
              borderTop:`3px solid ${col.cor}`,
              borderRadius:'10px 10px 0 0',
              boxShadow: isHover ? `0 0 0 2px ${col.cor}33` : 'none',
              transition:'all .2s',
            }}>
              <div style={{position:'relative'}}>
                <div onClick={()=>setEditando(editando?.colId===col.id&&editando?.tipo==='cor'?null:{colId:col.id,tipo:'cor'})}
                  style={{width:16,height:16,borderRadius:'50%',background:col.cor,cursor:'pointer',border:'2px solid rgba(255,255,255,.2)',flexShrink:0}}/>
                {editando?.colId===col.id && editando?.tipo==='cor' && (
                  <div style={{position:'absolute',top:24,left:0,zIndex:100,background:'var(--bg-3)',border:'1px solid var(--border)',borderRadius:10,padding:10,display:'flex',gap:6,flexWrap:'wrap',width:140,boxShadow:'0 8px 24px rgba(0,0,0,.4)'}}>
                    {CORES.map(c=>(
                      <div key={c} onClick={()=>{updateCol(col.id,{cor:c});setEditando(null);}}
                        style={{width:22,height:22,borderRadius:'50%',background:c,cursor:'pointer',border:col.cor===c?'2px solid #fff':'2px solid transparent',transition:'border .15s'}}/>
                    ))}
                  </div>
                )}
              </div>

              {editando?.colId===col.id && editando?.tipo==='nome'
                ? <input autoFocus value={novoNome} onChange={e=>setNovoNome(e.target.value)}
                    onBlur={()=>{updateCol(col.id,{nome:novoNome});setEditando(null);}}
                    onKeyDown={e=>{if(e.key==='Enter'){updateCol(col.id,{nome:novoNome});setEditando(null);}if(e.key==='Escape')setEditando(null);}}
                    style={{flex:1,background:'var(--bg-3)',border:'1px solid var(--purple)',borderRadius:6,padding:'2px 8px',fontSize:13,color:'var(--t1)',outline:'none'}}/>
                : <span onClick={()=>{setEditando({colId:col.id,tipo:'nome'});setNovoNome(col.nome);}}
                    style={{flex:1,fontFamily:'var(--f-d)',fontWeight:600,fontSize:13.5,color:'var(--t1)',cursor:'pointer'}}
                    title="Clique para renomear">{col.nome}</span>
              }

              <span style={{fontFamily:'var(--f-m)',fontSize:11,color:'var(--t3)',background:'var(--bg-3)',padding:'2px 7px',borderRadius:999}}>{col.cards.length}</span>
              <button onClick={()=>removeCol(col.id)} title="Remover coluna"
                style={{width:20,height:20,borderRadius:4,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--t3)',cursor:'pointer',transition:'color .15s'}}
                onMouseEnter={e=>e.currentTarget.style.color='#fca5a5'}
                onMouseLeave={e=>e.currentTarget.style.color='var(--t3)'}>
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
              </button>
            </div>

            {/* Cards */}
            <div style={{
              flex:1, overflowY:'auto', display:'flex', flexDirection:'column', gap:8, paddingRight:2,
              padding:'2px 4px 2px 0',
              borderRadius:8,
              background: isHover ? `${col.cor}08` : 'transparent',
              transition:'background .2s',
            }}>
              {col.cards.length === 0 && !isHover && (
                <div style={{padding:'30px 16px', textAlign:'center', border:'1.5px dashed var(--border)', borderRadius:10, color:'var(--t3)', fontSize:12}}>
                  <Icon name="Inbox" size={28} style={{color:'var(--t3)', opacity:.4, margin:'0 auto 8px'}}/>
                  <div>Arraste um card aqui<br/>ou clique em + Adicionar</div>
                </div>
              )}
              {col.cards.map((card, idx) => {
                const showPlaceholderBefore = dropTarget?.colId === col.id && dropTarget?.idx === idx && drag?.card.id !== card.id;
                const isDragging = drag?.card.id === card.id;
                return (
                  <React.Fragment key={card.id}>
                    {showPlaceholderBefore && <DragPlaceholder cor={col.cor} h={drag?.height || 60}/>}
                    <div draggable
                      onDragStart={e => {
                        const h = e.currentTarget.offsetHeight;
                        setDrag({ card, fromCol: col.id, fromIdx: idx, height: h });
                        e.dataTransfer.effectAllowed = 'move';
                      }}
                      onDragEnd={onDragEnd}
                      onDragOver={e => onCardDragOver(e, col.id, idx)}
                      style={{
                        background:'var(--bg-2)', border:'1px solid var(--border-soft)',
                        borderLeft:`3px solid ${card.color}`, borderRadius:10,
                        padding:'12px 14px', cursor:'grab',
                        transition:'all .18s cubic-bezier(.22,1,.36,1)',
                        opacity: isDragging ? 0.35 : 1,
                        transform: isDragging ? 'scale(.97)' : 'scale(1)',
                        boxShadow: isDragging ? 'none' : '0 1px 0 rgba(0,0,0,.05)',
                      }}
                      onMouseDown={e => e.currentTarget.style.cursor = 'grabbing'}
                      onMouseUp={e => e.currentTarget.style.cursor = 'grab'}
                      onMouseEnter={e => { if (!drag) { e.currentTarget.style.borderColor = 'rgba(123,63,228,.4)'; e.currentTarget.style.transform = 'translateY(-1px)'; e.currentTarget.style.boxShadow = '0 4px 12px rgba(0,0,0,.15)'; }}}
                      onMouseLeave={e => { if (!drag) { e.currentTarget.style.borderColor = 'var(--border-soft)'; e.currentTarget.style.transform = 'translateY(0)'; e.currentTarget.style.boxShadow = '0 1px 0 rgba(0,0,0,.05)'; }}}>
                      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:card.sub?6:0}}>
                        <ClienteAvatar nome={card.nome} init={card.init} color={card.color} logoUrl={card.logoUrl} size={28}/>
                        <div style={{fontWeight:600,fontSize:13,color:'var(--t1)',flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{card.nome}</div>
                      </div>
                      {card.sub && <div style={{fontSize:11.5,color:'var(--t3)',marginLeft:34}}>{card.sub}</div>}
                      {card.nicho && <div style={{fontSize:11,color:'var(--t2)',marginLeft:34,marginTop:2}}>{card.nicho}</div>}
                    </div>
                  </React.Fragment>
                );
              })}
              {/* Placeholder no fim da lista */}
              {dropTarget?.colId === col.id && dropTarget?.idx >= col.cards.length && drag && drag.fromCol !== col.id && (
                <DragPlaceholder cor={col.cor} h={drag.height || 60}/>
              )}
              {dropTarget?.colId === col.id && dropTarget?.idx >= col.cards.length && drag?.fromCol === col.id && drag?.fromIdx !== col.cards.length - 1 && (
                <DragPlaceholder cor={col.cor} h={drag.height || 60}/>
              )}

              {/* Adicionar card */}
              <button onClick={()=>addCard(col.id)} style={{
                width:'100%',padding:'9px',borderRadius:9,border:'1px dashed var(--border)',
                background:'transparent',color:'var(--t3)',fontSize:12.5,cursor:'pointer',
                display:'flex',alignItems:'center',justifyContent:'center',gap:5,
                transition:'all .15s',
              }}
                onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--purple)';e.currentTarget.style.color='#c4a8ff';}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--t3)';}}>
                <Icon name="Plus" size={13}/>Adicionar
              </button>
            </div>
          </div>
        );})}
      </div>
    </div>
  );
}

function exportarCSV() {
  const lista = getRecorrencia();
  const pagamentos = getPagamentos();
  const ym = YM(new Date());
  const rows = [['Cliente','Serviço','Nicho','Status','Implementação','Mensal','Dia Pagamento','Pago no mês','Dias atraso']];
  lista.forEach(r => {
    const stPag = statusPagamentoMes(r, pagamentos);
    const pagoMes = pagamentos[r.__id]?.[ym]?.pago ? 'Sim' : 'Não';
    const dAtraso = stPag.kind === 'atrasado' ? stPag.dias : 0;
    rows.push([r.cliente, r.servico, r.nicho, r.status, r.impl, r.mensal, r.dia, pagoMes, dAtraso]);
  });
  const csv = rows.map(r => r.map(c => `"${(''+c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `brava_relatorio_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  showToast('Relatório exportado com sucesso', 'success');
}

/* ══════════════════════════════════════════════════════════════════════════
   AGENDA — inspirada no Google Calendar
   - Store reativo de eventos com persistencia em localStorage
   - Visualizacoes: Mes / Semana / Dia
   - Mini-calendario lateral (sidebar)
   - Modal de criar/editar evento com cor, hora inicio/fim, descricao
   ══════════════════════════════════════════════════════════════════════════ */

const AGENDA_KEY = 'brava_agenda_events';
const fireAgendaChanged = () => window.dispatchEvent(new Event('brava_agenda_changed'));

function _readAgenda() {
  try { return JSON.parse(localStorage.getItem(AGENDA_KEY) || '[]'); } catch { return []; }
}
function _writeAgenda(arr) {
  localStorage.setItem(AGENDA_KEY, JSON.stringify(arr));
  fireAgendaChanged();
}
function addAgendaEvent(ev) {
  const arr = _readAgenda();
  const novo = { id: `ev_${Date.now()}_${Math.random().toString(36).slice(2,7)}`, ...ev };
  arr.push(novo);
  _writeAgenda(arr);
  return novo.id;
}
function updateAgendaEvent(id, patch) {
  const arr = _readAgenda();
  const i = arr.findIndex(e => e.id === id);
  if (i < 0) return;
  arr[i] = { ...arr[i], ...patch };
  _writeAgenda(arr);
}
function deleteAgendaEvent(id) {
  _writeAgenda(_readAgenda().filter(e => e.id !== id));
}
function useAgenda() {
  const [list, setList] = React.useState(() => _readAgenda());
  React.useEffect(() => {
    const refresh = () => setList(_readAgenda());
    window.addEventListener('brava_agenda_changed', refresh);
    window.addEventListener('storage', refresh);
    return () => {
      window.removeEventListener('brava_agenda_changed', refresh);
      window.removeEventListener('storage', refresh);
    };
  }, []);
  return list;
}

const agParseISO = s => { if (!s) return new Date(); const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); };
const agSameDay = (a,b) => a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
const agAddDays = (d, n) => { const x = new Date(d); x.setDate(x.getDate()+n); return x; };
const agStartOfWeek = d => { const x = new Date(d); x.setDate(x.getDate() - x.getDay()); x.setHours(0,0,0,0); return x; };
const agStartOfMonth = d => new Date(d.getFullYear(), d.getMonth(), 1);
const agEndOfMonth = d => new Date(d.getFullYear(), d.getMonth()+1, 0);
const agMinutosDoDia = hhmm => { if (!hhmm) return 0; const [h,m]=hhmm.split(':').map(Number); return h*60 + (m||0); };

/* ── Mini calendario na sidebar ── */
function AgendaMiniCal({ refDate, selected, onPick, events }) {
  const inicioMes = agStartOfMonth(refDate);
  const fimMes = agEndOfMonth(refDate);
  const firstWeekday = inicioMes.getDay();
  const totalDias = fimMes.getDate();
  const cells = [];
  for (let i = 0; i < firstWeekday; i++) cells.push(null);
  for (let i = 1; i <= totalDias; i++) cells.push(new Date(refDate.getFullYear(), refDate.getMonth(), i));
  while (cells.length % 7) cells.push(null);

  const hoje = new Date();
  const eventDays = new Set(events.map(e => e.data));

  return (
    <div style={{marginBottom:18}}>
      <div style={{
        display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:2, marginBottom:6,
      }}>
        {AG_DIAS.map(d => (
          <div key={d} style={{textAlign:'center', fontSize:10, color:'var(--t3)', fontFamily:'var(--f-m)', textTransform:'uppercase', letterSpacing:'.06em', padding:'4px 0'}}>{d[0]}</div>
        ))}
      </div>
      <div style={{display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:2}}>
        {cells.map((d, i) => {
          if (!d) return <div key={i} style={{aspectRatio:'1', }}/>;
          const isHoje = agSameDay(d, hoje);
          const isSel  = agSameDay(d, selected);
          const tem    = eventDays.has(agISO(d));
          return (
            <button key={i} onClick={()=>onPick(d)} style={{
              aspectRatio:'1', minHeight:28,
              display:'flex', alignItems:'center', justifyContent:'center',
              fontSize:11.5, fontFamily:'var(--f-b)',
              borderRadius:'50%',
              background: isSel ? 'var(--purple)' : isHoje ? 'rgba(123,63,228,.15)' : 'transparent',
              color: isSel ? '#fff' : isHoje ? 'var(--purple)' : 'var(--t1)',
              border:'none', cursor:'pointer',
              fontWeight: isSel || isHoje ? 700 : 500,
              position:'relative',
              transition:'background .15s',
            }}
              onMouseEnter={e => { if (!isSel) e.currentTarget.style.background = 'rgba(255,255,255,.06)'; }}
              onMouseLeave={e => { if (!isSel) e.currentTarget.style.background = isHoje ? 'rgba(123,63,228,.15)' : 'transparent'; }}
            >
              {d.getDate()}
              {tem && !isSel && <span style={{position:'absolute', bottom:3, width:3, height:3, borderRadius:'50%', background:'var(--blue)'}}/>}
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* ── Vista MES ── */
function AgendaVistaMes({ refDate, events, onSelectDay, onEditEvent, onNew }) {
  const inicio = agStartOfMonth(refDate);
  const fim = agEndOfMonth(refDate);
  const inicioGrade = agAddDays(inicio, -inicio.getDay());
  const semanas = [];
  let d = new Date(inicioGrade);
  while (d <= fim || semanas.length < 5 || (semanas.length === 5 && d.getDay() !== 0)) {
    const linha = [];
    for (let i = 0; i < 7; i++) { linha.push(new Date(d)); d = agAddDays(d, 1); }
    semanas.push(linha);
    if (semanas.length >= 6) break;
  }

  const hoje = new Date();
  const evPorDia = {};
  events.forEach(e => {
    (evPorDia[e.data] = evPorDia[e.data] || []).push(e);
  });
  Object.values(evPorDia).forEach(arr => arr.sort((a,b) => agMinutosDoDia(a.inicio) - agMinutosDoDia(b.inicio)));

  return (
    <div style={{display:'flex', flexDirection:'column', height:'100%', minHeight:0}}>
      <div style={{display:'grid', gridTemplateColumns:'repeat(7,1fr)', borderBottom:'1px solid var(--border-soft)'}}>
        {AG_DIAS_LONGO.map((d,i) => (
          <div key={d} style={{padding:'10px 12px', fontSize:11, color:'var(--t3)', fontFamily:'var(--f-m)', textTransform:'uppercase', letterSpacing:'.08em'}}>
            {d.slice(0,3)}
          </div>
        ))}
      </div>
      <div style={{flex:1, display:'grid', gridTemplateRows:`repeat(${semanas.length}, 1fr)`, minHeight:0}}>
        {semanas.map((semana, si) => (
          <div key={si} style={{display:'grid', gridTemplateColumns:'repeat(7,1fr)', borderBottom: si===semanas.length-1 ? 'none' : '1px solid var(--border-soft)'}}>
            {semana.map((dia, di) => {
              const isHoje = agSameDay(dia, hoje);
              const isMesAtual = dia.getMonth() === refDate.getMonth();
              const evs = evPorDia[agISO(dia)] || [];
              const visiveis = evs.slice(0,3);
              const ocultos  = evs.length - visiveis.length;
              return (
                <div key={di} onClick={()=>onSelectDay(dia)} style={{
                  borderRight: di===6 ? 'none' : '1px solid var(--border-soft)',
                  padding:'6px 6px 4px',
                  background: isHoje ? 'rgba(123,63,228,.05)' : 'transparent',
                  cursor:'pointer',
                  overflow:'hidden',
                  display:'flex', flexDirection:'column',
                  minHeight:0,
                }}
                  onDoubleClick={(e) => { e.stopPropagation(); onNew(dia); }}>
                  <div style={{display:'flex', justifyContent:'flex-end', marginBottom:4}}>
                    <span style={{
                      width:24, height:24, borderRadius:'50%',
                      display:'flex', alignItems:'center', justifyContent:'center',
                      fontSize:12, fontWeight: isHoje?700:500,
                      background: isHoje ? 'var(--purple)' : 'transparent',
                      color: isHoje ? '#fff' : isMesAtual ? 'var(--t1)' : 'var(--t3)',
                      fontFamily:'var(--f-m)',
                    }}>{dia.getDate()}</span>
                  </div>
                  <div style={{display:'flex', flexDirection:'column', gap:2, overflow:'hidden'}}>
                    {visiveis.map(ev => {
                      const hex = AG_COR_HEX(ev.cor);
                      return (
                        <button key={ev.id} onClick={e => { e.stopPropagation(); onEditEvent(ev); }} style={{
                          textAlign:'left', display:'flex', alignItems:'center', gap:5,
                          background: ev.diaTodo ? hex : 'transparent',
                          color: ev.diaTodo ? '#fff' : 'var(--t1)',
                          border:'none', padding: ev.diaTodo ? '2px 6px' : '1px 4px',
                          borderRadius:4, cursor:'pointer',
                          fontSize:11.5, fontWeight:500, fontFamily:'var(--f-b)',
                          whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis',
                        }}>
                          {!ev.diaTodo && <span style={{width:6, height:6, borderRadius:'50%', background:hex, flexShrink:0}}/>}
                          {!ev.diaTodo && <span style={{color:'var(--t2)', fontSize:11}}>{ev.inicio}</span>}
                          <span style={{overflow:'hidden', textOverflow:'ellipsis'}}>{ev.titulo}</span>
                        </button>
                      );
                    })}
                    {ocultos > 0 && (
                      <button onClick={e=>{e.stopPropagation(); onSelectDay(dia);}} style={{
                        background:'transparent', border:'none', cursor:'pointer',
                        textAlign:'left', padding:'1px 4px',
                        fontSize:11, color:'var(--t3)', fontWeight:500,
                      }}>+ {ocultos} mais</button>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── Vista SEMANA / DIA (timeline) ── */
function AgendaVistaTimeline({ refDate, events, onEditEvent, onNew, dias = 7 }) {
  const inicio = dias === 7 ? agStartOfWeek(refDate) : new Date(refDate);
  const colunas = Array.from({length:dias}, (_,i) => agAddDays(inicio, i));
  const horas = Array.from({length:24}, (_,i) => i); // 0-23
  const ROW_H = 48; // altura de cada hora
  const hoje = new Date();
  const agora = hoje.getHours() * 60 + hoje.getMinutes();

  // Mapeia eventos por coluna (data ISO)
  const porData = {};
  events.forEach(e => { (porData[e.data] = porData[e.data] || []).push(e); });

  return (
    <div style={{display:'flex', flexDirection:'column', height:'100%', minHeight:0, overflow:'hidden'}}>
      {/* Cabecalho dias */}
      <div style={{display:'grid', gridTemplateColumns:`60px repeat(${dias}, 1fr)`, borderBottom:'1px solid var(--border-soft)', flexShrink:0}}>
        <div/>
        {colunas.map((d,i) => {
          const isHoje = agSameDay(d, hoje);
          return (
            <div key={i} style={{padding:'10px 8px', textAlign:'center', borderLeft:'1px solid var(--border-soft)'}}>
              <div style={{fontSize:11, color:'var(--t3)', textTransform:'uppercase', fontFamily:'var(--f-m)', letterSpacing:'.06em'}}>{AG_DIAS[d.getDay()]}</div>
              <div style={{
                marginTop:4, fontSize:22, fontFamily:'var(--f-d)', fontWeight:600,
                color: isHoje ? 'var(--purple)' : 'var(--t1)',
                display:'inline-flex', alignItems:'center', justifyContent:'center',
                width:34, height:34, borderRadius:'50%',
                background: isHoje ? 'rgba(123,63,228,.15)' : 'transparent',
              }}>{d.getDate()}</div>
            </div>
          );
        })}
      </div>

      {/* Grid de horas com scroll */}
      <div className="agenda-timeline-grid" style={{flex:1, overflow:'auto', position:'relative'}}>
        <div style={{display:'grid', gridTemplateColumns:`60px repeat(${dias}, 1fr)`, position:'relative'}}>
          {/* Coluna de horas */}
          <div>
            {horas.map(h => (
              <div key={h} style={{height:ROW_H, borderBottom:'1px solid var(--border-soft)', position:'relative'}}>
                <span style={{
                  position:'absolute', top:-7, right:8,
                  fontSize:10, color:'var(--t3)', fontFamily:'var(--f-m)',
                  background:'var(--bg-2)', padding:'0 4px',
                }}>{String(h).padStart(2,'0')}:00</span>
              </div>
            ))}
          </div>

          {/* Colunas dos dias */}
          {colunas.map((dia, ci) => {
            const isoData = agISO(dia);
            const evs = (porData[isoData] || []).filter(e => !e.diaTodo);
            const isHoje = agSameDay(dia, hoje);
            return (
              <div key={ci} style={{borderLeft:'1px solid var(--border-soft)', position:'relative'}}>
                {horas.map(h => (
                  <div key={h} onClick={()=>onNew({data: isoData, inicio: agMinAHHMM(h*60), fim: agMinAHHMM((h+1)*60)})}
                    style={{
                      height:ROW_H, borderBottom:'1px solid var(--border-soft)',
                      cursor:'pointer', transition:'background .12s',
                    }}
                    onMouseEnter={e=>e.currentTarget.style.background='rgba(123,63,228,.04)'}
                    onMouseLeave={e=>e.currentTarget.style.background='transparent'}
                  />
                ))}
                {/* Linha "agora" */}
                {isHoje && (
                  <div style={{
                    position:'absolute', left:0, right:0,
                    top: (agora / 60) * ROW_H,
                    borderTop:'2px solid #A32D2D',
                    zIndex:2, pointerEvents:'none',
                  }}>
                    <div style={{width:8, height:8, borderRadius:'50%', background:'#A32D2D', marginLeft:-4, marginTop:-5}}/>
                  </div>
                )}
                {/* Eventos posicionados absolute */}
                {evs.map(ev => {
                  const ini = agMinutosDoDia(ev.inicio);
                  const fim = agMinutosDoDia(ev.fim);
                  const top = (ini / 60) * ROW_H;
                  const altura = Math.max(((fim - ini) / 60) * ROW_H - 2, 22);
                  const hex = AG_COR_HEX(ev.cor);
                  return (
                    <button key={ev.id} onClick={e=>{e.stopPropagation(); onEditEvent(ev);}} style={{
                      position:'absolute', left:4, right:4,
                      top, height:altura,
                      background: `${hex}22`,
                      borderLeft: `3px solid ${hex}`,
                      borderRadius:6,
                      padding:'4px 8px',
                      textAlign:'left',
                      display:'flex', flexDirection:'column', gap:2,
                      overflow:'hidden',
                      cursor:'pointer',
                      transition:'background .15s, box-shadow .15s',
                    }}
                      onMouseEnter={e=>{e.currentTarget.style.background = `${hex}33`; e.currentTarget.style.boxShadow=`0 4px 12px ${hex}33`;}}
                      onMouseLeave={e=>{e.currentTarget.style.background = `${hex}22`; e.currentTarget.style.boxShadow='none';}}
                    >
                      <div style={{fontSize:12, fontWeight:600, color:'var(--t1)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>{ev.titulo}</div>
                      <div style={{fontSize:11, color:'var(--t2)', fontFamily:'var(--f-m)'}}>{ev.inicio} - {ev.fim}</div>
                      {ev.local && altura > 50 && (
                        <div style={{fontSize:10.5, color:'var(--t3)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>📍 {ev.local}</div>
                      )}
                    </button>
                  );
                })}
                {/* Eventos dia inteiro no topo */}
                {(porData[isoData] || []).filter(e => e.diaTodo).slice(0,2).map((ev, idx) => {
                  const hex = AG_COR_HEX(ev.cor);
                  return (
                    <button key={ev.id} onClick={e=>{e.stopPropagation(); onEditEvent(ev);}} style={{
                      position:'absolute', left:4, right:4, top: 2 + idx*22,
                      background:hex, color:'#fff',
                      border:'none', borderRadius:4,
                      padding:'2px 6px',
                      textAlign:'left',
                      fontSize:11, fontWeight:600,
                      whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis',
                      cursor:'pointer', zIndex:3,
                    }}>{ev.titulo}</button>
                  );
                })}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ── Componente principal Agenda ── */
function Agenda() {
  const events = useAgenda();
  const [refDate, setRefDate] = useState(() => new Date());
  const [vista, setVista] = useState(() => localStorage.getItem('brava_agenda_vista') || 'semana'); // mes / semana / dia
  const [editando, setEditando] = useState(null);

  React.useEffect(() => { localStorage.setItem('brava_agenda_vista', vista); }, [vista]);

  // Scroll inicial pra hora 7h na timeline
  React.useEffect(() => {
    if (vista === 'semana' || vista === 'dia') {
      const t = setTimeout(() => {
        const scroller = document.querySelector('.agenda-timeline-grid');
        if (scroller) scroller.scrollTop = 7 * 48; // 7h * 48px
      }, 50);
      return () => clearTimeout(t);
    }
  }, [vista, refDate]);

  const tituloPeriodo = React.useMemo(() => {
    if (vista === 'mes') {
      return `${AG_MESES[refDate.getMonth()]} de ${refDate.getFullYear()}`;
    }
    if (vista === 'dia') {
      return `${AG_DIAS_LONGO[refDate.getDay()]}, ${refDate.getDate()} de ${AG_MESES[refDate.getMonth()]}`;
    }
    // semana
    const ini = agStartOfWeek(refDate);
    const fim = agAddDays(ini, 6);
    if (ini.getMonth() === fim.getMonth()) {
      return `${ini.getDate()} a ${fim.getDate()} de ${AG_MESES[ini.getMonth()]} de ${ini.getFullYear()}`;
    }
    return `${ini.getDate()} ${AG_MESES_CURTO[ini.getMonth()]} – ${fim.getDate()} ${AG_MESES_CURTO[fim.getMonth()]} de ${fim.getFullYear()}`;
  }, [refDate, vista]);

  const navPeriodo = (d) => {
    const x = new Date(refDate);
    if (vista === 'mes') x.setMonth(x.getMonth() + d);
    else if (vista === 'semana') x.setDate(x.getDate() + 7*d);
    else x.setDate(x.getDate() + d);
    setRefDate(x);
  };

  const novoEvento = (preset = {}) => {
    const base = { data: agISO(refDate), inicio:'09:00', fim:'10:00', cor:'roxo' };
    setEditando({ ...base, ...preset });
  };

  return (
    <div className="page" style={{display:'flex', flexDirection:'column', minHeight:'calc(100vh - 130px)', paddingBottom:0}}>
      <div className="page-head">
        <div>
          <div className="page-head__title">Agenda</div>
          <div className="page-head__sub">
            {events.length === 0
              ? 'Crie seu primeiro evento clicando em uma data ou no botao abaixo'
              : `${events.length} evento${events.length===1?'':'s'} na sua agenda`}
          </div>
        </div>
        <div className="page-head__actions" style={{display:'flex', gap:10}}>
          <button onClick={()=>setRefDate(new Date())} className="btn btn-outline">Hoje</button>
          <button onClick={()=>novoEvento()} className="btn btn-primary"><Icon name="Plus" size={14}/>Novo evento</button>
        </div>
      </div>

      {/* Toolbar de navegacao */}
      <div style={{display:'flex', alignItems:'center', gap:14, marginBottom:14, flexWrap:'wrap'}}>
        <div style={{display:'flex', alignItems:'center', gap:4}}>
          <button onClick={()=>navPeriodo(-1)} title="Anterior" style={{
            width:34, height:34, borderRadius:'50%', border:'1px solid var(--border)',
            background:'transparent', color:'var(--t1)', cursor:'pointer',
            display:'flex', alignItems:'center', justifyContent:'center',
          }}><Icon name="ChevronLeft" size={16}/></button>
          <button onClick={()=>navPeriodo(1)} title="Próximo" style={{
            width:34, height:34, borderRadius:'50%', border:'1px solid var(--border)',
            background:'transparent', color:'var(--t1)', cursor:'pointer',
            display:'flex', alignItems:'center', justifyContent:'center',
          }}><Icon name="ChevronRight" size={16}/></button>
        </div>
        <div style={{fontFamily:'var(--f-d)', fontSize:20, fontWeight:600, color:'var(--t1)', textTransform:'capitalize', flex:1}}>
          {tituloPeriodo}
        </div>
        <div style={{display:'flex', background:'var(--bg-3)', border:'1px solid var(--border)', borderRadius:8, padding:3}}>
          {[
            {k:'dia',    l:'Dia'},
            {k:'semana', l:'Semana'},
            {k:'mes',    l:'Mês'},
          ].map(o => (
            <button key={o.k} onClick={()=>setVista(o.k)} style={{
              padding:'6px 14px', borderRadius:6,
              border:'none', cursor:'pointer',
              fontSize:13, fontWeight:500, fontFamily:'var(--f-b)',
              background: vista===o.k ? 'var(--purple)' : 'transparent',
              color:    vista===o.k ? '#fff' : 'var(--t2)',
              transition:'all .15s',
            }}>{o.l}</button>
          ))}
        </div>
      </div>

      {/* Layout: sidebar (mini-cal) + main */}
      <div style={{display:'grid', gridTemplateColumns:'240px 1fr', gap:16, flex:1, minHeight:0}} className="agenda-layout">
        {/* Sidebar */}
        <aside style={{
          background:'var(--bg-2)', border:'1px solid var(--border-soft)',
          borderRadius:12, padding:14,
          display:'flex', flexDirection:'column',
          minHeight:0, overflow:'hidden',
        }}>
          <button onClick={()=>novoEvento()} className="btn btn-primary" style={{marginBottom:14, justifyContent:'center'}}>
            <Icon name="Plus" size={14}/>Criar
          </button>
          <AgendaMiniCal refDate={refDate} selected={refDate} onPick={d=>setRefDate(d)} events={events}/>

          <div style={{fontSize:11, color:'var(--t3)', fontFamily:'var(--f-m)', textTransform:'uppercase', letterSpacing:'.06em', marginBottom:8}}>Próximos eventos</div>
          <div style={{flex:1, overflowY:'auto', display:'flex', flexDirection:'column', gap:6}}>
            {events
              .filter(e => agParseISO(e.data) >= new Date(new Date().setHours(0,0,0,0)))
              .sort((a,b) => agParseISO(a.data) - agParseISO(b.data) || agMinutosDoDia(a.inicio) - agMinutosDoDia(b.inicio))
              .slice(0,8)
              .map(ev => {
                const hex = AG_COR_HEX(ev.cor);
                const d = agParseISO(ev.data);
                return (
                  <button key={ev.id} onClick={()=>setEditando(ev)} style={{
                    display:'flex', gap:8, alignItems:'flex-start',
                    background:'transparent', border:'none', cursor:'pointer',
                    textAlign:'left', padding:'6px 4px', borderRadius:6,
                  }}
                    onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,.04)'}
                    onMouseLeave={e=>e.currentTarget.style.background='transparent'}
                  >
                    <div style={{width:3, alignSelf:'stretch', background:hex, borderRadius:2, flexShrink:0}}/>
                    <div style={{minWidth:0, flex:1}}>
                      <div style={{fontSize:12.5, fontWeight:600, color:'var(--t1)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>{ev.titulo}</div>
                      <div style={{fontSize:11, color:'var(--t3)', fontFamily:'var(--f-m)', marginTop:1}}>
                        {d.getDate()}/{String(d.getMonth()+1).padStart(2,'0')} · {ev.diaTodo ? 'Dia todo' : ev.inicio}
                      </div>
                    </div>
                  </button>
                );
              })}
            {events.length === 0 && (
              <div style={{fontSize:12, color:'var(--t3)', padding:'12px 0', textAlign:'center'}}>Nenhum evento agendado</div>
            )}
          </div>
        </aside>

        {/* Main view */}
        <section style={{
          background:'var(--bg-2)', border:'1px solid var(--border-soft)',
          borderRadius:12, overflow:'hidden',
          display:'flex', flexDirection:'column', minHeight:0,
        }}>
          {vista === 'mes' && <AgendaVistaMes refDate={refDate} events={events} onSelectDay={d=>{setRefDate(d); setVista('dia');}} onEditEvent={setEditando} onNew={(d)=>novoEvento({data: agISO(d)})}/>}
          {vista === 'semana' && <AgendaVistaTimeline refDate={refDate} events={events} onEditEvent={setEditando} onNew={novoEvento} dias={7}/>}
          {vista === 'dia' && <AgendaVistaTimeline refDate={refDate} events={events} onEditEvent={setEditando} onNew={novoEvento} dias={1}/>}
        </section>
      </div>

      <style>{`
        @media (max-width: 980px) {
          .agenda-layout { grid-template-columns: 1fr !important; }
          .agenda-layout > aside { display: none !important; }
        }
      `}</style>

      {editando && <AgendaEventoModal ev={editando} onClose={()=>setEditando(null)}/>}
    </div>
  );
}

/* ─── App ─── */
function App() {
  // Persistência via localStorage
  // Sempre comeca em Dashboard ao logar (ignora ultima pagina salva)
  const [page, setPage] = useState('dashboard');
  const [collapsed, setCollapsed] = useState(() => localStorage.getItem('brava_collapsed') === '1');
  const [impersonate, setImpersonate] = useState(null);
  const [pipelineCols, setPipelineCols] = useState(() => {
    try { const s = localStorage.getItem('brava_pipeline'); if (s) return JSON.parse(s); } catch(e){}
    return PIPELINE_INIT;
  });
  const [busca, setBusca] = useState('');
  const [notifAberta, setNotifAberta] = useState(false);
  const [novoClienteAberto, setNovoClienteAberto] = useState(false);
  const [extraCRM, setExtraCRM] = useState(() => {
    try { const s = localStorage.getItem('brava_extra_crm'); if (s) return JSON.parse(s); } catch(e){}
    return [];
  });

  // Persistir
  useEffect(() => { localStorage.setItem('brava_page', page); }, [page]);
  useEffect(() => { localStorage.setItem('brava_collapsed', collapsed?'1':'0'); }, [collapsed]);
  useEffect(() => { localStorage.setItem('brava_pipeline', JSON.stringify(pipelineCols)); }, [pipelineCols]);
  useEffect(() => { localStorage.setItem('brava_extra_crm', JSON.stringify(extraCRM)); }, [extraCRM]);

  const moverNoPipeline = (nomeCliente, paraColId) => {
    setPipelineCols(cs => {
      const card = cs.flatMap(c=>c.cards).find(k=>k.nome===nomeCliente);
      if (!card) return cs;
      return cs.map(c => {
        if (c.cards.some(k=>k.nome===nomeCliente)) return {...c, cards: c.cards.filter(k=>k.nome!==nomeCliente)};
        if (c.id === paraColId) return {...c, cards:[...c.cards, card]};
        return c;
      });
    });
  };

  const [shortcutsOpen, setShortcutsOpen] = useState(false);
  useKeyboardShortcuts({ setNovoCliente: setNovoClienteAberto, setShortcutsOpen });

  // Cadastrar novo cliente
  const cadastrarCliente = (cliente) => {
    setExtraCRM(arr => [...arr, cliente]);
    const colMap = { 'Comercial':'lead', 'Proposta Apresentada':'proposta', 'Implementação':'impl', 'Ativo':'ativo', 'Em Prod':'prod', 'Em breve':'lead' };
    const colId = colMap[cliente.status] || 'lead';
    setPipelineCols(cs => cs.map(c => c.id === colId ? {...c, cards:[...c.cards, {id:cliente.nome+Date.now(), nome:cliente.nome, sub:cliente.servico, nicho:cliente.nicho, color:cliente.color, init:cliente.init, logoUrl:cliente.logoUrl}]} : c));
    showToast(`Cliente ${cliente.nome} cadastrado com sucesso`, 'success');
  };

  useEffect(() => {
    const app = document.querySelector('.app');
    if (app) app.style.gridTemplateColumns = collapsed ? '0 1fr' : 'var(--sidebar) 1fr';
  }, [collapsed]);

  // Toast de boas-vindas no primeiro acesso pós-checkout
  useEffect(() => {
    if (SESSAO.welcome) {
      setTimeout(() => {
        showToast(`Bem-vindo à Brava, ${SESSAO.nome.split(' ')[0]}! Seu workspace está pronto.`, 'success');
        // Marca como já visto pra não mostrar de novo
        const s = JSON.parse(localStorage.getItem('brava_sessao') || '{}');
        s.welcome = false;
        localStorage.setItem('brava_sessao', JSON.stringify(s));
      }, 1200);
    }
  }, []);

  // Fechar notificações ao clicar fora
  useEffect(() => {
    if (!notifAberta) return;
    const close = e => { if (!e.target.closest('.header__actions')) setNotifAberta(false); };
    document.addEventListener('click', close);
    return () => document.removeEventListener('click', close);
  }, [notifAberta]);

  if (impersonate) return (
    <>
      <ImpersonateBanner cliente={impersonate} onSair={() => setImpersonate(null)}/>
      <ClientWorkspace cliente={impersonate}/>
    </>
  );

  return (
    <div className="app">
      <ThemeToggle/>
      <Sidebar page={page} setPage={setPage} collapsed={collapsed} setCollapsed={setCollapsed}/>
      <Header page={page} collapsed={collapsed} setCollapsed={setCollapsed} setPage={setPage} busca={busca} setBusca={setBusca} notifAberta={notifAberta} setNotifAberta={setNotifAberta}/>
      <main className="main">
        {page === 'dashboard' ? <Dashboard onImpersonate={setImpersonate} pipelineCols={pipelineCols} setPage={setPage} onNovoCliente={()=>setNovoClienteAberto(true)} onExportar={exportarCSV} busca={busca}/>
          : page === 'clientes' ? <Conversas pipelineCols={pipelineCols} moverNoPipeline={moverNoPipeline}/>
          : page === 'mrr'      ? <MRR/>
          : page === 'pipeline' ? <Pipeline cols={pipelineCols} setCols={setPipelineCols}/>
          : page === 'agenda'   ? <Agenda/>
          : page === 'analytics'? <Analytics/>
          : page === 'chamados' ? <Chamados/>
          : page === 'equipe'   ? <Equipe/>
          : page === 'logs'     ? <Logs/>
          : page === 'config'   ? <Config/>
          : <Placeholder page={page}/>}
      </main>
      {novoClienteAberto && <NovoClienteModal onClose={()=>setNovoClienteAberto(false)} onSalvar={cadastrarCliente}/>}
      <ShortcutsModal open={shortcutsOpen} onClose={()=>setShortcutsOpen(false)}/>
      <AIChat/>
      <ToastContainer/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

// Splash de login → ao sumir, marca body.boot-ready (libera animacoes CSS)
// e dispara evento "brava_boot_ready" (libera os contadores useCount).
const BOOT_SPLASH_MS = 1400;
function bravaRevealApp() {
  if (document.body.classList.contains('boot-ready')) return;
  const l = document.getElementById('brava-loading');
  if (l) { l.style.opacity = '0'; setTimeout(() => l.remove(), 400); }
  // Espera o fade do splash antes de liberar as animacoes do dashboard
  setTimeout(() => {
    document.body.classList.add('boot-ready');
    window.dispatchEvent(new Event('brava_boot_ready'));
  }, 380);
}
setTimeout(bravaRevealApp, BOOT_SPLASH_MS);
// Fail-safe: se algo travar, ainda libera em 8s
setTimeout(bravaRevealApp, 8000);
</script>
</body>
</html>
