<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Brava Company © Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ─── Tokens fixos ─── */
:root {
  --purple:#7B3FE4; --blue:#1E90FF;
  --grad:linear-gradient(90deg,#7B3FE4 0%,#1E90FF 100%);
  --success:#1D9E75; --warning:#BA7517; --danger:#A32D2D; --info:#185FA5;
  --f-d:"Space Grotesk",sans-serif; --f-b:"Inter",sans-serif; --f-m:"JetBrains Mono",monospace;
  --sidebar:240px; --header:60px;
}

/* ─── Modo escuro (default) ─── */
:root, [data-theme="dark"] {
  --bg:#000000; --bg-1:#0E0E14; --bg-2:#15151E; --bg-3:#1B1B27;
  --border:#2A2A3A; --border-soft:#1F1F2A;
  --t1:#F5F5F7; --t2:#A0A0AA; --t3:#6E6E78;
  --shadow:0 1px 0 rgba(255,255,255,.04) inset,0 8px 24px rgba(0,0,0,.45);
  --logo:url("app/brava-logo-white.png");
}

/* ─── Modo claro ─── */
[data-theme="light"] {
  --bg:#F0F0F0; --bg-1:#F0F0F0; --bg-2:#FFFFFF; --bg-3:#F5F5F5;
  --border:#D8D8D8; --border-soft:#E6E6E6;
  --t1:#0A0A0F; --t2:#4A4A52; --t3:#8E8E94;
  --shadow:0 1px 2px rgba(20,20,40,.06),0 6px 20px rgba(20,20,40,.06);
  --logo:url("app/brava-logo-dark.png");
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:var(--f-b);font-size:15px;-webkit-font-smoothing:antialiased;transition:background .2s,color .2s;}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,select,textarea{font:inherit;color:inherit;}
a{color:inherit;text-decoration:none;}
svg{display:block;flex-shrink:0;}

/* ─── WhatsApp tokens (paleta extraida do WhatsApp Web 2024+) ─── */
:root, [data-theme="dark"] {
  --wa-sidebar-bg:    #111B21;             /* fundo lista de conversas */
  --wa-sidebar-hover: rgba(255,255,255,.04);
  --wa-header-bg:     #202C33;             /* topo do chat + topo da lista */
  --wa-chat-bg:       #0B141A;             /* area das mensagens */
  --wa-input-bg:      #202C33;             /* barra de digitar */
  --wa-msg-out-bg:    #005C4B;             /* bolha saida */
  --wa-msg-in-bg:     #202C33;             /* bolha entrada */
  --wa-msg-out-text:  #E9EDEF;
  --wa-msg-in-text:   #E9EDEF;
  --wa-text-primary:  #E9EDEF;
  --wa-text-secondary:#8696A0;
  --wa-border:        #222D34;             /* separadores sutis */
  --wa-search-bg:     #202C33;             /* search igual header (era #2A3942 = mais claro) */
  --wa-active-bg:     #2A3942;             /* conversa selecionada */
  --wa-green:         #25D366;
  --wa-green-dark:    #00A884;
  --wa-unread-bg:     #25D366;             /* badge nao-lidas verde mais vibrante */
}
[data-theme="light"] {
  --wa-sidebar-bg:    #FFFFFF;             /* lista branca pura */
  --wa-sidebar-hover: rgba(11,20,26,.04);
  --wa-header-bg:     #F0F2F5;             /* topo cinza sutil */
  --wa-chat-bg:       #EFEAE2;             /* chat bege */
  --wa-input-bg:      #F0F2F5;
  --wa-msg-out-bg:    #D9FDD3;             /* verde claro saida */
  --wa-msg-in-bg:     #FFFFFF;
  --wa-msg-out-text:  #111B21;
  --wa-msg-in-text:   #111B21;
  --wa-text-primary:  #111B21;
  --wa-text-secondary:#667781;
  --wa-border:        #E9EDEF;
  --wa-search-bg:     #F0F2F5;
  --wa-active-bg:     #F0F2F5;
  --wa-green:         #25D366;
  --wa-green-dark:    #128C7E;
  --wa-unread-bg:     #25D366;
}

/* Pattern do fundo do chat — branco translucido em dark, preto sutil em light */
.wa-chat-pattern {
  background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.025'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
[data-theme="light"] .wa-chat-pattern {
  background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23000000' fill-opacity='0.025'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4h-4z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}

/* ─── Layout ─── */
.app{display:grid;grid-template-columns:var(--sidebar) 1fr;grid-template-rows:var(--header) 1fr;height:100vh;overflow:hidden;}

/* ─── Sidebar — slide horizontal natural (esquerda quando fecha, da esquerda quando abre) ─── */
.sidebar{
  grid-row:1/-1;
  background:#000000;
  border-right:1px solid #1F1F2A;
  display:flex;flex-direction:column;
  overflow:hidden;
  transition: width .5s cubic-bezier(.65,0,.35,1),
              opacity .4s cubic-bezier(.22,1,.36,1),
              transform .5s cubic-bezier(.65,0,.35,1),
              border-color .35s ease;
  transform-origin: left center;
}
.sidebar.collapsed{
  /* Fechando: encolhe largura E desliza pra esquerda E fade */
  width:0; overflow:hidden; border-right:none;
  opacity:0; transform: translateX(-32px);
}
.sidebar.collapsed > * { pointer-events: none; }
/* Abrindo: children entram da esquerda em cascata */
.sidebar:not(.collapsed) > * {
  animation: sidebar-slide-in .5s cubic-bezier(.22,1,.36,1) both;
}
.sidebar:not(.collapsed) > *:nth-child(1) { animation-delay: .05s; }
.sidebar:not(.collapsed) > *:nth-child(2) { animation-delay: .12s; }
.sidebar:not(.collapsed) > *:nth-child(3) { animation-delay: .20s; }
.sidebar:not(.collapsed) > *:nth-child(4) { animation-delay: .28s; }
@keyframes sidebar-slide-in {
  0% { opacity: 0; transform: translateX(-20px); }
  100% { opacity: 1; transform: translateX(0); }
}

/* ─── Animacoes de entrada do Dashboard ───
   Importante: o splash de login (#brava-loading) fica visivel por uns segundos
   no boot. As animacoes ficam PAUSADAS ate o splash sumir (body.boot-ready),
   pra que o usuario as veja efetivamente. */
@keyframes dash-fade-up {
  0%   { opacity: 0; transform: translateY(16px); }
  100% { opacity: 1; transform: translateY(0); }
}
.page-head           { opacity: 0; }
.kpi-grid > *        { opacity: 0; }
.grid-mrr > *        { opacity: 0; }
.grid-3 > *          { opacity: 0; }

body.boot-ready .page-head    { animation: dash-fade-up .6s cubic-bezier(.22,1,.36,1) both; }
body.boot-ready .kpi-grid > * { animation: dash-fade-up .55s cubic-bezier(.22,1,.36,1) both; }
body.boot-ready .kpi-grid > *:nth-child(1) { animation-delay: .08s; }
body.boot-ready .kpi-grid > *:nth-child(2) { animation-delay: .16s; }
body.boot-ready .kpi-grid > *:nth-child(3) { animation-delay: .24s; }
body.boot-ready .kpi-grid > *:nth-child(4) { animation-delay: .32s; }
body.boot-ready .grid-mrr > * { animation: dash-fade-up .6s cubic-bezier(.22,1,.36,1) both; animation-delay: .45s; }
body.boot-ready .grid-mrr > *:nth-child(2) { animation-delay: .55s; }
body.boot-ready .grid-3 > * { animation: dash-fade-up .6s cubic-bezier(.22,1,.36,1) both; animation-delay: .7s; }
body.boot-ready .grid-3 > *:nth-child(2) { animation-delay: .78s; }
body.boot-ready .grid-3 > *:nth-child(3) { animation-delay: .86s; }

/* Respeita prefers-reduced-motion */
@media (prefers-reduced-motion: reduce) {
  .page-head, .kpi-grid > *, .grid-mrr > *, .grid-3 > * { animation: none !important; opacity: 1 !important; }
  .sidebar:not(.collapsed) > * { animation: none !important; }
}

.sidebar__nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 10px;border-radius:10px;
  font-size:13.5px;color:#A0A0AA;font-weight:500;
  cursor:pointer;transition:background .15s,color .15s;
  position:relative;
}
.nav-item:hover{background:rgba(255,255,255,.06);color:#F5F5F7;}
.nav-item.active{
  background:rgba(123,63,228,.18);
  color:#F5F5F7;
}
.nav-item.active::before{
  content:'';position:absolute;left:0;top:20%;bottom:20%;
  width:2.5px;border-radius:999px;
  background:var(--grad);
}
.nav-badge{
  margin-left:auto;min-width:18px;height:18px;
  padding:0 5px;border-radius:999px;
  background:var(--grad);color:#fff;
  font-family:var(--f-m);font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
}
.nav-divider{height:1px;background:#1F1F2A;margin:8px 10px;}
.nav-item.danger:hover{background:rgba(163,45,45,.18);color:#fca5a5;}

/* ─── Header ─── */
/* ─── Header — sempre preto ─── */
.header{
  background:#000000;
  border-bottom:1px solid #1F1F2A;
  display:flex;align-items:center;gap:16px;
  padding:0 28px;
}
.header__breadcrumb{flex:1;display:flex;align-items:center;gap:8px;font-size:13px;color:#6E6E78;}
.header__breadcrumb span{color:#F5F5F7;font-weight:600;}
.header__search{
  display:flex;align-items:center;gap:8px;
  padding:7px 14px;
  background:#0E0E14;border:1px solid #2A2A3A;border-radius:8px;
  font-size:13px;color:#6E6E78;
  width:260px;white-space:nowrap;flex-shrink:0;
  cursor:text;transition:border-color .15s;
}
.header__search:hover{border-color:#A0A0AA;}
.header__actions{display:flex;align-items:center;gap:8px;}
.header__icon{
  width:34px;height:34px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  color:#A0A0AA;cursor:pointer;transition:background .15s,color .15s;
  position:relative;
}
.header__icon:hover{background:#1B1B27;color:#F5F5F7;}
.header__notif{
  position:absolute;top:5px;right:5px;
  width:8px;height:8px;border-radius:50%;
  background:var(--purple);border:2px solid #000;
}
.header__avatar{
  width:32px;height:32px;border-radius:50%;
  background:var(--grad);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--f-d);font-weight:700;font-size:12px;color:#fff;
  cursor:pointer;flex-shrink:0;
}

/* ─── Main content ─── */
.main{overflow-y:auto;padding:28px 32px;background:var(--bg);color:var(--t1);}
.page{max-width:1440px;margin:0 auto;}

/* ─── Page header ─── */
.page-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;gap:16px;}
.page-head__title{font-family:var(--f-d);font-size:22px;font-weight:600;letter-spacing:-.02em;}
.page-head__sub{font-size:13px;color:var(--t2);margin-top:3px;}
.page-head__actions{display:flex;gap:8px;flex-shrink:0;}

/* ─── Botões ─── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:7px;
  padding:0 16px;height:36px;border-radius:9px;
  font-size:13.5px;font-weight:500;
  transition:transform .12s,box-shadow .15s,opacity .15s;
  white-space:nowrap;
}
.btn:hover{transform:translateY(-1px);}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--grad);color:#fff;box-shadow:0 4px 14px rgba(123,63,228,.3);}
.btn-primary:hover{box-shadow:0 8px 20px rgba(123,63,228,.45);}
.btn-outline{border:1px solid var(--border);color:var(--t2);background:transparent;}
.btn-outline:hover{border-color:var(--t2);color:var(--t1);}
.btn-ghost{color:var(--t2);}
.btn-ghost:hover{background:var(--bg-2);color:var(--t1);}

/* ─── KPI Cards ─── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.kpi{
  background:var(--bg-2);border:1px solid var(--border-soft);border-radius:14px;
  padding:20px 22px;
  transition:border-color .2s,transform .2s;
  cursor:default;
}
.kpi:hover{border-color:rgba(123,63,228,.3);transform:translateY(-2px);}
.kpi__label{font-size:12.5px;color:var(--t2);font-weight:500;font-family:var(--f-b);letter-spacing:0;text-transform:none;}
.kpi__value{font-family:var(--f-d);font-size:32px;font-weight:700;letter-spacing:-.03em;margin:8px 0 4px;line-height:1;color:var(--t1);}
.kpi__value.grad{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.kpi__delta{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:500;}
.kpi__delta.up{color:var(--success);}
.kpi__delta.down{color:var(--danger);}
.kpi__icon{float:right;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-top:-4px;}

/* Responsivo: 4 col → 2 col em tablet → 1 col em mobile */
@media (max-width: 1080px){
  .kpi-grid{grid-template-columns:repeat(2,1fr);}
  .kpi__value{font-size:26px;}
}
@media (max-width: 560px){
  .kpi-grid{grid-template-columns:1fr;gap:10px;}
  .kpi{padding:16px 18px;}
  .kpi__value{font-size:24px;}
}

/* ─── Grid 2 colunas ─── */
.grid-2{display:grid;grid-template-columns:1.4fr 1fr;gap:14px;margin-bottom:14px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px;}
@media (max-width: 1080px){ .grid-2{grid-template-columns:1fr;} .grid-3{grid-template-columns:1fr;} }

/* ─── Card genérico ─── */
.card{background:var(--bg-2);border:1px solid var(--border-soft);border-radius:14px;padding:22px;}
.card__head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.card__title{font-family:var(--f-d);font-size:14px;font-weight:600;letter-spacing:-.01em;color:var(--t1);}
.card__action{font-size:12px;color:var(--blue);font-weight:500;cursor:pointer;}
.card__action:hover{text-decoration:underline;}

/* ─── Gráfico de barras ─── */
.chart{display:flex;align-items:flex-end;gap:8px;height:120px;padding-top:8px;}
.chart-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;}
.chart-bar{width:100%;border-radius:5px 5px 0 0;min-height:4px;transition:opacity .2s;}
.chart-bar:hover{opacity:.8;}
.chart-bar.today{background:var(--grad);}
.chart-bar.past{background:rgba(123,63,228,.45);}
.chart-label{font-family:var(--f-m);font-size:9.5px;color:var(--t2);}
[data-theme="light"] .chart-bar.past{background:rgba(123,63,228,.3);}
[data-theme="light"] .chart-bar{min-height:6px;}

/* ─── Lista de conversas ─── */
.conv-list{display:flex;flex-direction:column;gap:0;}
.conv-list--scroll {
  max-height: 480px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: rgba(123,63,228,.35) transparent;
  padding-right: 4px;
}
.conv-list--scroll::-webkit-scrollbar { width: 6px; }
.conv-list--scroll::-webkit-scrollbar-track { background: transparent; }
.conv-list--scroll::-webkit-scrollbar-thumb {
  background: rgba(123,63,228,.35);
  border-radius: 999px;
  transition: background .15s;
}
.conv-list--scroll::-webkit-scrollbar-thumb:hover { background: rgba(123,63,228,.6); }
.conv-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 0;border-bottom:1px solid var(--border-soft);
  cursor:pointer;transition:background .15s;border-radius:8px;
  padding-left:6px;padding-right:6px;
}
.conv-item:last-child{border-bottom:none;}
.conv-item:hover{background:var(--status-bg,rgba(255,255,255,.03));}
[data-theme="light"] .conv-item:hover{background:rgba(0,0,0,.04);}
.conv-avatar{
  width:44px;height:44px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--f-d);font-weight:700;font-size:14px;color:#fff;
  flex-shrink:0;overflow:hidden;
}
.conv-avatar img { display:block; }
.conv-meta{flex:1;min-width:0;}
.conv-name{font-size:13.5px;font-weight:600;color:var(--t1);}
.conv-preview{font-size:12px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.conv-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.conv-time{font-family:var(--f-m);font-size:10px;color:var(--t3);}
.conv-badge{min-width:18px;height:18px;padding:0 5px;border-radius:999px;background:var(--grad);color:#fff;font-size:10px;font-weight:700;font-family:var(--f-m);display:flex;align-items:center;justify-content:center;}
.conv-tag{font-size:10px;padding:2px 7px;border-radius:4px;font-family:var(--f-m);}
.conv-tag.ia{background:rgba(123,63,228,.2);color:#c4a8ff;}
.conv-tag.hot{background:rgba(163,45,45,.18);color:#fca5a5;}
.conv-tag.ok{background:rgba(29,158,117,.15);color:#6ee7b7;}

/* ─── Agente IA card ─── */
.ia-status{display:flex;align-items:center;gap:10px;padding:14px 16px;background:rgba(123,63,228,.08);border:1px solid rgba(123,63,228,.2);border-radius:12px;margin-bottom:14px;}
.ia-dot{width:10px;height:10px;border-radius:50%;background:var(--success);box-shadow:0 0 8px var(--success);flex-shrink:0;animation:pulse-dot 2s ease infinite;}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 0 0 rgba(29,158,117,.6);}50%{box-shadow:0 0 0 5px rgba(29,158,117,0);}}
.ia-info{flex:1;}
.ia-name{font-size:13.5px;font-weight:600;}
.ia-sub{font-size:11.5px;color:var(--t2);margin-top:1px;}

/* ─── Stat row ─── */
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border-soft);}
.stat-row:last-child{border-bottom:none;}
.stat-label{font-size:13px;color:#A0A0AA;}
.stat-val{font-family:var(--f-d);font-size:14px;font-weight:600;color:#F5F5F7;}

/* ─── Badge plano ─── */
.plan-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;background:rgba(123,63,228,.15);border:1px solid rgba(123,63,228,.25);font-size:11.5px;font-family:var(--f-m);color:#c4a8ff;letter-spacing:.04em;}

/* ─── Progress bar ─── */
.progress{height:6px;background:var(--border);border-radius:999px;overflow:hidden;margin-top:8px;}
.progress__fill{height:100%;border-radius:999px;background:var(--grad);transition:width .6s cubic-bezier(.22,1,.36,1);}

/* ─── Empty / Placeholder ─── */
.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:60px 24px;color:var(--t3);text-align:center;}
.placeholder svg{opacity:.35;}
.placeholder p{font-size:14px;max-width:280px;line-height:1.5;}

/* ─── Scrollbar ─── */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:999px;}

/* ─── Animações globais ─── */
@keyframes fade-up{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes fade-in{from{opacity:0;}to{opacity:1;}}
@keyframes scale-in{from{opacity:0;transform:scale(.96);}to{opacity:1;transform:scale(1);}}
@keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
@keyframes glow-pulse{0%,100%{box-shadow:0 0 0 0 rgba(123,63,228,.4);}50%{box-shadow:0 0 0 6px rgba(123,63,228,0);}}
@keyframes ripple{from{transform:scale(0);opacity:.6;}to{transform:scale(2);opacity:0;}}
@keyframes toast-in{from{opacity:0;transform:translateY(20px) scale(.95);}to{opacity:1;transform:translateY(0) scale(1);}}

.page{animation:fade-up .35s cubic-bezier(.22,1,.36,1);}

// Fail-safe: garante que o loading some mesmo se React falhar
window.addEventListener('error', function(e) {
  console.error('[Brava] Erro carregando:', e.message);
  var l = document.getElementById('brava-loading');
  if (l) { l.style.opacity = '0'; setTimeout(function(){ l.remove(); }, 400); }
});
// Fail-safe duplo: se nada mais escondeu o splash em 9.5s, escondemos forcado
setTimeout(function() {
  var l = document.getElementById('brava-loading');
  if (l) { l.style.opacity = '0'; setTimeout(function(){ l.remove(); }, 400); }
  if (!document.body.classList.contains('boot-ready')) {
    document.body.classList.add('boot-ready');
    window.dispatchEvent(new Event('brava_boot_ready'));
  }
}, 9500);
// Aplica modo claro por padrao no boot
if (!document.documentElement.getAttribute('data-theme')) {
  document.documentElement.setAttribute('data-theme', 'light');
}

/* ─── Sessão (lida da URL na primeira carga, persistida em localStorage) ─── */
const DEFAULT_SESSAO = { nome: 'Jhonattan Itiuba', email: 'diretoria@brava.company', plano: 'admin', role: 'Diretoria', welcome: false };

function carregarSessao() {
  try {
    const url = new URLSearchParams(window.location.search);
    const userUrl = url.get('user');
    const emailUrl = url.get('email');
    if (userUrl && emailUrl) {
      const sessao = {
        nome: userUrl,
        email: emailUrl,
        plano: url.get('plano') || 'performance',
        role: url.get('role') || 'Owner',
        welcome: url.get('welcome') === '1',
        logado_em: new Date().toISOString(),
      };
      const tema = url.get('theme');
      if (tema) document.documentElement.setAttribute('data-theme', tema);
      localStorage.setItem('brava_sessao', JSON.stringify(sessao));
      window.history.replaceState({}, '', '/');
      return sessao;
    }
    const s = localStorage.getItem('brava_sessao');
    if (s) {
      const parsed = JSON.parse(s);
      // Garante que campos obrigatórios existam
      return { ...DEFAULT_SESSAO, ...parsed };
    }
  } catch(e) {
    console.warn('[Brava] Erro ao carregar sessão, usando default:', e);
  }
  return DEFAULT_SESSAO;
}

/* ─── Counter animado ─── */
// useCount com suporte a delay (stagger) e transicoes suaves em updates.
// Primeira renderizacao: anima 0 -> target somente APOS o splash de login sumir
// (evento "brava_boot_ready" emitido por bravaRevealApp). Assim os numeros
// realmente sobem na frente do usuario.
// Atualizacoes (target muda depois): interpola valor anterior -> novo (~420ms)
function useCount(target, duration = 1200, delay = 0) {
  const [v, setV] = useState(0);
  const fromRef = React.useRef(0);
  const firstRef = React.useRef(true);
  useEffect(() => {
    let raf, timer, cleanup;
    const from = firstRef.current ? 0 : fromRef.current;
    const dur  = firstRef.current ? duration : 420;
    const isFirst = firstRef.current;
    firstRef.current = false;

    const run = () => {
      let s = null;
      const step = ts => {
        if (!s) s = ts;
        const p = Math.min((ts - s) / dur, 1);
        const eased = 1 - Math.pow(1 - p, 3);
        const val = Math.round(from + (target - from) * eased);
        setV(val);
        fromRef.current = val;
        if (p < 1) raf = requestAnimationFrame(step);
      };
      timer = setTimeout(() => { raf = requestAnimationFrame(step); }, isFirst ? delay : 0);
    };

    if (isFirst && !document.body.classList.contains('boot-ready')) {
      // Espera o splash sumir antes de comecar a animacao
      const start = () => { window.removeEventListener('brava_boot_ready', start); run(); };
      window.addEventListener('brava_boot_ready', start);
      cleanup = () => window.removeEventListener('brava_boot_ready', start);
    } else {
      run();
    }

    return () => {
      if (cleanup) cleanup();
      clearTimeout(timer);
      if (raf) cancelAnimationFrame(raf);
    };
  }, [target, duration, delay]);
  return v;
}

/* Badge que mostra total de nao-lidas reais do WhatsApp (Evolution).
   Quando Evolution nao esta configurada, usa o fallback (mock numerico). */
function SidebarUnreadBadge({ fallback }) {
  const cfg = useEvoConfig();
  const total = useEvoUnreadTotal();
  // Tambem dispara notificacoes do browser para mensagens novas que chegam
  useEvoMessageNotifications();
  if (cfg) {
    if (total <= 0) return null;
    return <span className="nav-badge">{total > 99 ? '99+' : total}</span>;
  }
  return fallback ? <span className="nav-badge">{fallback}</span> : null;
}

function Dashboard({ onImpersonate, pipelineCols, setPage, onNovoCliente, onExportar, busca }) {
  // RECORRENCIA reativa: re-renderiza quando user edita/cria/exclui na aba MRR
  const recorrencia = useRecorrencia();

  // MRR total ativo (puxa do banco financeiro RECORRENCIA reativo)
  const mrrTotalAtivo = React.useMemo(() => {
    return recorrencia
      .filter(r => ['Em Prod', 'Ativo'].includes(r.status))
      .reduce((s, r) => s + (r.mensal || 0), 0);
  }, [recorrencia]);

  // Contadores em cascata escalonada — sincronizada com o fade-in dos cards.
  // Duracao 8s (suave, 0 -> valor final) com pequeno stagger entre eles.
  const clientes   = useCount(21,            8000,  80);

  const chamados   = useCount(3,             8000, 500);

  const mrrAtivoHoje = mrrTotalAtivo;

  // Gera a curva dos 7 dias com pequena variacao realista crescente
  const chartData = React.useMemo(() => {
    const dias = ['Seg','Ter','Qua','Qui','Sex','Sáb','Hoje'];
    const hoje = new Date();
    const diaSemana = hoje.getDay(); // 0=dom, 1=seg, ...
    // Curva de crescimento ate o valor de hoje (10-15% acumulado na semana)
    const fatores = [.78, .82, .86, .89, .92, .95, 1.0];
    return dias.map((day, i) => ({
      day: i === 6 ? 'Hoje' : day,
      v: Math.round(mrrAtivoHoje * fatores[i]),
      today: i === 6,

  }, [mrrAtivoHoje]);
  const maxV = Math.max(...chartData.map(d => d.v));

    : clientesCRM;

    setMenuAberto(null);
    if (typeof showToast === 'function') showToast(`${c.nome}: ${novoStatus}`, 'success');

// Helper: gera URL de login do cliente. Externos abrem em outra aba.
function clienteLoginUrl(c) {
  if (c.loginUrl) return c.loginUrl;
  const slug = c.slug || c.nome.toLowerCase().replace(/[^a-z0-9]/g,'');
  return `/app/?login=1&workspace=${slug}`;
}

// Helper: busca a logoUrl do cliente pelo nome (usado em Chamados, Pipeline, etc.)
function getClienteLogo(nome) {
  if (!nome) return null;
  const c = CLIENTES_CRM.find(x => x.nome === nome || nome.indexOf(x.nome) === 0);
  return c?.logoUrl || null;
}

/* ─── Store reativo de clientes (CRUD + persist + events) ─── */
function getClientesReactivos() {
  let edits = {}, deleted = [], extras = [];
  try { edits = JSON.parse(localStorage.getItem('brava_edits_crm') || '{}'); } catch {}
  try { deleted = JSON.parse(localStorage.getItem('brava_deleted_crm') || '[]'); } catch {}
  try { extras = JSON.parse(localStorage.getItem('brava_extra_crm') || '[]'); } catch {}
  const merged = [...CLIENTES_CRM, ...extras].filter(c => !deleted.includes(c.nome));
  return merged.map(c => edits[c.nome] ? {...c, ...edits[c.nome]} : c);
}

const fireClientesChanged = () => window.dispatchEvent(new Event('brava_clientes_changed'));

function editClienteStore(nome, patch) {
  let edits = {};
  try { edits = JSON.parse(localStorage.getItem('brava_edits_crm') || '{}'); } catch {}
  edits[nome] = { ...(edits[nome] || {}), ...patch };
  localStorage.setItem('brava_edits_crm', JSON.stringify(edits));
  fireClientesChanged();
}

function deleteClienteStore(nome) {
  let deleted = [];
  try { deleted = JSON.parse(localStorage.getItem('brava_deleted_crm') || '[]'); } catch {}
  if (!deleted.includes(nome)) {
    deleted.push(nome);
    localStorage.setItem('brava_deleted_crm', JSON.stringify(deleted));
  }
  // Tambem remove dos extras se foi adicionado pelo usuario
  let extras = [];
  try { extras = JSON.parse(localStorage.getItem('brava_extra_crm') || '[]'); } catch {}
  const novosExtras = extras.filter(c => c.nome !== nome);
  if (novosExtras.length !== extras.length) {
    localStorage.setItem('brava_extra_crm', JSON.stringify(novosExtras));
  }
  fireClientesChanged();
}

function undoDeleteClienteStore(nome) {
  let deleted = [];
  try { deleted = JSON.parse(localStorage.getItem('brava_deleted_crm') || '[]'); } catch {}
  localStorage.setItem('brava_deleted_crm', JSON.stringify(deleted.filter(n => n !== nome)));
  fireClientesChanged();
}

function useClientesReactivos() {
  const [list, setList] = React.useState(() => getClientesReactivos());
  React.useEffect(() => {
    const refresh = () => setList(getClientesReactivos());
    window.addEventListener('brava_clientes_changed', refresh);
    window.addEventListener('storage', refresh);
    return () => {
      window.removeEventListener('brava_clientes_changed', refresh);
      window.removeEventListener('storage', refresh);
    };
  }, []);
  return list;
}

  if (p.includes('plano') || p.includes('performance') || p.includes('scale') || p.includes('essencial'))
    return `Por status: **5 em produção**, 2 ativos, 5 em implementação, 7 em negociação comercial, 2 em proposta/prospecção. Nichos: Automobilístico, Indústria, Imobiliário, Turismo, Arquitetura, Saúde, Estética, Agro, Aviação e mais. Ticket médio estimado: R$ ${Math.round(SYSTEM_DATA.mrr/SYSTEM_DATA.clientes).toLocaleString('pt-BR')}/mês.`;
  if (p.includes('equipe') || p.includes('time'))
    return `A equipe Brava tem **${SYSTEM_DATA.equipe.length} membros**: ${SYSTEM_DATA.equipe.join(', ')}. Todos online agora.`;
  if (p.includes('churn') || p.includes('cancelamento') || p.includes('saiu'))
    return `Nenhum cancelamento este mês. Taxa de churn: **0%**. O cliente mais antigo está há 8 meses na plataforma.`;
  return `Posso te ajudar com informações sobre **clientes, MRR, chamados, conversas, saúde da plataforma, planos e equipe**. O que você quer saber?`;
}

/* Label de presenca em tempo real: online/digitando/gravando/visto por ultimo */
function PresenceLabel({ contato, usandoReal }) {
  const presence = useEvoPresence(usandoReal ? contato?.id : null);
  if (!contato) return null;
  if (!usandoReal) return <span style={{fontSize:12, color:'var(--wa-green)', marginTop:1}}>{contato?.status==='online' ? 'online' : 'visto por último às 22:30'}</span>;
  if (!presence) return <span style={{fontSize:12, color:'var(--wa-text-secondary)', marginTop:1}}>clique para ver perfil</span>;
  const s = presence.state;
  let label = 'online', cor = 'var(--wa-green)';
  if (s === 'composing')      label = 'digitando...';
  else if (s === 'recording') label = 'gravando áudio...';
  else if (s === 'paused')    { label = 'pausou de digitar'; cor = 'var(--wa-text-secondary)'; }
  else if (s === 'unavailable') { label = 'offline'; cor = 'var(--wa-text-secondary)'; }
  return <span style={{fontSize:12, color:cor, marginTop:1, fontStyle: (s==='composing' || s==='recording') ? 'italic' : 'normal'}}>{label}</span>;
}

  useEffect(() => {
    if (!usandoReal || !realMsgs.length) return;
    const maxRealTs = Math.max(...realMsgs.map(m => m.timestamp || 0));
    setMsgsOtimistas(arr => arr.filter(o => (o.timestamp||0) > maxRealTs));
  }, [realMsgs.length, usandoReal]);

  // Fase atual do contato no pipeline
  const faseAtual = (pipelineCols||[]).find(col =>
    col.cards.some(k => k.nome === contato?.name)
  );
  const mudarFase = (colId) => {
    if (moverNoPipeline && contato) moverNoPipeline(contato.name, colId);
  };

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior:'smooth' }); }, [ativo, msgs.length]);

  // Envio de mensagem real
  const enviar = async () => {
    const texto = msg.trim();
    if (!texto || !contato) return;
    if (!usandoReal) { setMsg(''); return; } // mock: nao tenta enviar
    const numero = (contato.id || '').replace('@s.whatsapp.net','').replace('@c.us','');
    const tsAgora = Date.now();
    // UI otimista
    setMsgsOtimistas(arr => [...arr, {
      id: 'opt_' + tsAgora,
      conversaId: contato.id,
      from: 'out',
      text: texto,
      time: evoHHMM(tsAgora),
      timestamp: tsAgora,
      pending: true,
      kind: 'text',
    }]);
    setMsg('');
    setEnviando(true);
    try {
      await evo.sendText(numero, texto);
    } catch (e) {
      showToast?.('Erro ao enviar: ' + (e.message || 'desconhecido'), 'error');
      setMsgsOtimistas(arr => arr.map(o => o.id === 'opt_' + tsAgora ? {...o, failed:true, pending:false} : o));
    } finally {
      setEnviando(false);
    }
  };

  // Envio universal (imagem, video, audio, doc — detecta pelo mimetype)
  const enviarArquivo = async (file) => {
    if (!file || !contato || !usandoReal) return;
    if (file.size > 64 * 1024 * 1024) { showToast?.('Arquivo muito grande (max 64MB)', 'warn'); return; }
    const mime = file.type || 'application/octet-stream';
    let mediatype = 'document';
    let kindUI = 'document';
    if (mime.startsWith('image/')) { mediatype = 'image'; kindUI = 'image'; }
    else if (mime.startsWith('video/')) { mediatype = 'video'; kindUI = 'video'; }
    else if (mime.startsWith('audio/')) { mediatype = 'audio'; kindUI = 'audio'; }
    const caption = msg.trim();
    const numero = (contato.id || '').replace('@s.whatsapp.net','').replace('@c.us','');
    const tsAgora = Date.now();
    const reader = new FileReader();
    reader.onload = async (e) => {
      const dataUrl = e.target.result;
      const base64  = dataUrl.split(',')[1];
      setMsgsOtimistas(arr => [...arr, {
        id: 'opt_' + tsAgora, conversaId: contato.id, from:'out',
        text: caption, time: evoHHMM(tsAgora), timestamp: tsAgora, pending:true,
        kind: kindUI, meta:{ kind:kindUI, caption, fileName: file.name, mimetype: mime, fileLength: file.size },
        previewDataUrl: kindUI === 'image' ? dataUrl : undefined,
      }]);
      setMsg('');
      setEnviando(true);
      try {
        await evo.sendMedia(numero, base64, mediatype, caption, file.name, mime);
        showToast?.(`${file.name} enviado`, 'success');
      } catch (err) {
        showToast?.('Erro ao enviar: ' + (err.message || ''), 'error');
        setMsgsOtimistas(arr => arr.map(o => o.id === 'opt_' + tsAgora ? {...o, failed:true, pending:false} : o));
      } finally { setEnviando(false); }
    };
    reader.readAsDataURL(file);
  };
  // alias para compat
  const enviarImagem = enviarArquivo;

  // Gravar e enviar audio (PTT)
  const toggleGravacao = async () => {
    if (!usandoReal || !contato) { showToast?.('Configure a Evolution primeiro', 'warn'); return; }
    if (gravando) {
      // Parar gravacao
      try { recorderRef.current?.mediaRecorder?.stop(); } catch {}
      return;
    }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio:true });
      const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus'
                 : MediaRecorder.isTypeSupported('audio/ogg;codecs=opus')  ? 'audio/ogg;codecs=opus'
                 : 'audio/webm';
      const mediaRecorder = new MediaRecorder(stream, { mimeType: mime });
      const chunks = [];
      const inicioTs = Date.now();
      recorderRef.current = { mediaRecorder, stream, inicioTs };
      mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
      mediaRecorder.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        setGravando(false); setGravandoSec(0);
        if (!chunks.length) return;
        const blob = new Blob(chunks, { type: mime });
        const reader = new FileReader();
        reader.onload = async (ev) => {
          const dataUrl = ev.target.result;
          const base64 = dataUrl.split(',')[1];
          const numero = (contato.id || '').replace('@s.whatsapp.net','').replace('@c.us','');
          const tsAgora = Date.now();
          const dur = Math.round((Date.now() - inicioTs) / 1000);
          setMsgsOtimistas(arr => [...arr, {
            id: 'opt_' + tsAgora, conversaId: contato.id, from:'out',
            text:'', time: evoHHMM(tsAgora), timestamp: tsAgora, pending:true,
            kind:'audio', meta:{ kind:'audio', ptt:true, seconds: dur },
          }]);
          setEnviando(true);
          try {
            await evo.sendWhatsAppAudio(numero, base64);
          } catch (err) {
            showToast?.('Erro ao enviar audio: ' + (err.message || ''), 'error');
            setMsgsOtimistas(arr => arr.map(o => o.id === 'opt_' + tsAgora ? {...o, failed:true, pending:false} : o));
          } finally { setEnviando(false); }
        };
        reader.readAsDataURL(blob);
      };
      mediaRecorder.start();
      setGravando(true);
      setGravandoSec(0);
      const timerId = setInterval(() => {
        if (!recorderRef.current) { clearInterval(timerId); return; }
        setGravandoSec(Math.round((Date.now() - recorderRef.current.inicioTs) / 1000));
      }, 250);
    } catch (e) {
      showToast?.('Permissao de microfone negada', 'warn');
    }
  };
  const cancelarGravacao = () => {
    try { recorderRef.current?.stream?.getTracks().forEach(t => t.stop()); } catch {}
    recorderRef.current = null;
    setGravando(false); setGravandoSec(0);
  };

  const filtrados = fonteContatos.filter(c => {
    if (busca && !c.name.toLowerCase().includes(busca.toLowerCase())) return false;
    if (filtro === 'nao_lidas') return c.unread > 0;
    if (filtro === 'ia') return c.tag === 'ia';
    if (filtro === 'minhas') return !c.tag;
    return true;
  });

  const S = { // atalhos para tokens WA via CSS vars (usados via style)
    sidebarBg:   'var(--wa-sidebar-bg)',
    headerBg:    'var(--wa-header-bg)',
    chatBg:      'var(--wa-chat-bg)',
    inputBg:     'var(--wa-input-bg)',
    msgOut:      'var(--wa-msg-out-bg)',
    msgIn:       'var(--wa-msg-in-bg)',
    textPrimary: 'var(--wa-text-primary)',
    textSec:     'var(--wa-text-secondary)',
    border:      'var(--wa-border)',
    searchBg:    'var(--wa-search-bg)',
    activeBg:    'var(--wa-active-bg)',
    green:       'var(--wa-green)',
    unread:      'var(--wa-unread-bg)',
  };

  return (
    <div style={{ display:'grid', gridTemplateColumns:`320px 1fr ${sidebarAberta?'264px':'0'}`, height:'calc(100vh - 60px)', overflow:'hidden', margin:'-28px -32px', transition:'grid-template-columns .25s cubic-bezier(.22,1,.36,1)' }}>

      {/* ── Coluna 1: Lista ── */}
      <div style={{ display:'flex', flexDirection:'column', background:S.sidebarBg, borderRight:`1px solid ${S.border}`, overflow:'hidden' }}>
        {/* Header */}
        <div style={{ padding:'14px 16px 10px', background:S.headerBg, borderBottom:`1px solid ${S.border}`, flexShrink:0 }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10 }}>
            <span style={{ fontFamily:'var(--f-d)', fontWeight:700, fontSize:17, color:S.textPrimary }}>WhatsApp</span>
            <div style={{ display:'flex', gap:6 }}>
              {['Filter','Plus'].map(ic => (
                <div key={ic} style={{ width:34, height:34, borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', color:S.textSec, cursor:'pointer', transition:'background .15s' }}
                  onMouseEnter={e=>e.currentTarget.style.background='rgba(128,128,128,.1)'}
                  onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                  <Icon name={ic} size={18}/>
                </div>
              ))}
            </div>
          </div>
          {/* Busca */}
          <div style={{ display:'flex', alignItems:'center', gap:8, padding:'7px 12px', background:S.searchBg, borderRadius:8 }}>
            <Icon name="Search" size={14} style={{color:S.textSec, flexShrink:0}}/>
            <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="Pesquisar ou começar uma nova conversa" style={{ background:'none', border:'none', outline:'none', fontSize:13.5, color:S.textPrimary, width:'100%' }}/>
          </div>
          {/* Filtros */}
          <div style={{ display:'flex', gap:4, marginTop:8 }}>
            {(() => {
              const naoLidasCount = fonteContatos.reduce((s,c) => s + (c.unread > 0 ? 1 : 0), 0);
              return [['todas','Todas'],['nao_lidas','Não lidas'],['ia','IA'],['minhas','Minhas']].map(([k,l]) => {
                const showCount = k === 'nao_lidas' && naoLidasCount > 0;
                return (
                  <button key={k} onClick={()=>setFiltro(k)} style={{
                    padding:'4px 10px', borderRadius:999, fontSize:11.5, fontWeight:500, cursor:'pointer',
                    display:'inline-flex', alignItems:'center', gap:5,
                    background: filtro===k ? 'rgba(37,211,102,.15)' : 'transparent',
                    color: filtro===k ? 'var(--wa-green)' : S.textSec,
                    border: filtro===k ? '1px solid rgba(37,211,102,.3)' : '1px solid transparent',
                    transition:'all .15s',
                  }}>
                    {l}
                    {showCount && <span style={{
                      minWidth:18, height:18, borderRadius:999,
                      background:'var(--wa-green)', color:'#fff',
                      fontSize:10.5, fontWeight:700, fontFamily:'var(--f-m)',
                      display:'inline-flex', alignItems:'center', justifyContent:'center', padding:'0 5px',
                    }}>{naoLidasCount}</span>}
                  </button>
                );
              });
            })()}
          </div>
        </div>

        {/* Banner status Evolution */}
        {usandoReal && (
          <div style={{
            padding:'8px 14px', fontSize:11, fontFamily:'var(--f-m)',
            color: realChatsError ? '#ff8585' : 'var(--wa-green)',
            background: realChatsError ? 'rgba(163,45,45,.08)' : 'rgba(37,211,102,.06)',
            borderBottom:`1px solid ${S.border}`,
            display:'flex', alignItems:'center', gap:8,
          }}>
            <div style={{width:6, height:6, borderRadius:'50%', background: realChatsError ? '#ff8585' : 'var(--wa-green)', boxShadow: realChatsError ? '' : '0 0 6px var(--wa-green)'}}/>
            <span style={{flex:1}}>
              {realChatsError
                ? `Erro Evolution: ${realChatsError.slice(0,60)}`
                : `${evoCfg?.instance} · ${realChats.length} conversa${realChats.length===1?'':'s'}${realChatsLoading?' · atualizando':''}`}
            </span>
            <span title={socketConnected ? 'WebSocket conectado — atualiza em tempo real' : 'Sem WebSocket — usando polling'} style={{
              fontSize:10, padding:'1px 6px', borderRadius:4,
              background: socketConnected ? 'rgba(37,211,102,.15)' : 'rgba(110,110,120,.15)',
              color: socketConnected ? 'var(--wa-green)' : S.textSec,
              fontWeight:600, letterSpacing:'.02em',
            }}>{socketConnected ? '⚡ TEMPO REAL' : 'POLLING'}</span>
            <button onClick={()=>setEscondeRuido(!escondeRuido)} title={escondeRuido ? 'Mostrar tudo (incluindo @lid)' : 'Esconder ruido (@lid)'} style={{
              background:'none', border:'none', cursor:'pointer',
              color: escondeRuido ? S.textSec : 'var(--wa-green)',
              padding:0, fontSize:11,
            }}>
              <Icon name={escondeRuido ? 'EyeOff' : 'Eye'} size={13}/>
            </button>
          </div>
        )}

        {/* Lista */}
        <div style={{ flex:1, overflowY:'auto' }}>
          {usandoReal && realChats.length === 0 && !realChatsLoading && !realChatsError && (
            <div style={{padding:'24px 18px', textAlign:'center', color:S.textSec, fontSize:13}}>
              Nenhuma conversa ainda. Mensagens novas aparecerao aqui em segundos.
            </div>
          )}
          {filtrados.map(c => (
            <div key={c.id} onClick={()=>setAtivo(c.id)} style={{
              display:'flex', alignItems:'flex-start', gap:12,
              padding:'12px 16px',
              background: ativo===c.id ? S.activeBg : 'transparent',
              borderBottom:`1px solid ${S.border}`,
              cursor:'pointer', transition:'background .12s',
            }}
              onMouseEnter={e=>{ if(ativo!==c.id) e.currentTarget.style.background='var(--wa-sidebar-hover)'; }}
              onMouseLeave={e=>{ if(ativo!==c.id) e.currentTarget.style.background='transparent'; }}
            >
              <div style={{ position:'relative', flexShrink:0 }}>
                {usandoReal
                  ? <EvoAvatar remoteJid={c.id} name={c.name} init={c.init} color={c.color} size={46}/>
                  : <div style={{ width:46, height:46, borderRadius:'50%', background:c.color, display:'flex', alignItems:'center', justifyContent:'center', fontFamily:'var(--f-d)', fontWeight:700, fontSize:15, color:'#fff' }}>{c.init}</div>
                }
                {c.status==='online' && !usandoReal && <div style={{ position:'absolute', bottom:1, right:1, width:11, height:11, borderRadius:'50%', background:'var(--wa-green)', border:`2px solid ${S.sidebarBg}` }}/>}
              </div>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', gap:8 }}>
                  <span style={{ fontSize:14.5, fontWeight:500, color:S.textPrimary, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{c.name}</span>
                  <span style={{ fontSize:11, color: c.unread>0 ? S.green : S.textSec, whiteSpace:'nowrap', flexShrink:0, textTransform:'lowercase' }}>{c.time}</span>
                </div>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:3, gap:8 }}>
                  <span style={{ fontSize:13, color:S.textSec, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', flex:1, minWidth:0 }}>{c.preview}</span>
                  {c.unread > 0 && <span style={{ minWidth:19, height:19, borderRadius:999, background:S.unread, color:'#fff', fontSize:11, fontWeight:700, display:'flex', alignItems:'center', justifyContent:'center', padding:'0 5px', flexShrink:0 }}>{c.unread}</span>}
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* ── Coluna 2: Chat ── */}
      <div style={{ display:'flex', flexDirection:'column', overflow:'hidden' }}>
        {!contato ? (
          <div style={{flex:1, display:'flex', alignItems:'center', justifyContent:'center', background:S.chatBg, color:S.textSec, fontSize:14, textAlign:'center', padding:40}}>
            {usandoReal
              ? (realChatsLoading ? 'Carregando conversas...' : 'Selecione uma conversa a esquerda')
              : 'Selecione uma conversa'}
          </div>
        ) : (<>
        {/* Header chat */}
        <div style={{ padding:'10px 16px', background:S.headerBg, borderBottom:`1px solid ${S.border}`, display:'flex', alignItems:'center', gap:12, flexShrink:0 }}>
          <div style={{ position:'relative' }}>
            {usandoReal
              ? <EvoAvatar remoteJid={contato?.id} name={contato?.name} init={contato?.init} color={contato?.color} size={40}/>
              : <div style={{ width:40, height:40, borderRadius:'50%', background:contato?.color, display:'flex', alignItems:'center', justifyContent:'center', fontFamily:'var(--f-d)', fontWeight:700, fontSize:14, color:'#fff' }}>{contato?.init}</div>
            }
            {contato?.status==='online' && !usandoReal && <div style={{ position:'absolute', bottom:0, right:0, width:11, height:11, borderRadius:'50%', background:'var(--wa-green)', border:`2px solid ${S.headerBg}` }}/>}
          </div>
          <div style={{ flex:1 }}>
            <div style={{ fontWeight:600, fontSize:15, color:S.textPrimary, display:'flex', alignItems:'center', gap:8 }}>
              {contato?.name}
              {contato?.isGroup && <span style={{fontSize:10, padding:'1px 6px', borderRadius:4, background:'rgba(123,63,228,.18)', color:'var(--purple)', fontFamily:'var(--f-m)', fontWeight:600, letterSpacing:'.04em'}}>GRUPO</span>}
            </div>
            <PresenceLabel contato={contato} usandoReal={usandoReal}/>
          </div>
          <div style={{ display:'flex', gap:4, alignItems:'center' }}>
            <button onClick={()=>setIaAtiva(v=>!v)} style={{
              display:'flex', alignItems:'center', gap:6, padding:'5px 12px', borderRadius:999,
              background: iaAtiva ? 'rgba(37,211,102,.12)' : 'transparent',
              border: `1px solid ${iaAtiva ? 'rgba(37,211,102,.35)' : S.border}`,
              color: iaAtiva ? 'var(--wa-green)' : S.textSec,
              fontSize:11, fontFamily:'var(--f-m)', fontWeight:600, cursor:'pointer', transition:'all .2s',
            }}>
              <div style={{ width:6, height:6, borderRadius:'50%', background: iaAtiva ? 'var(--wa-green)' : S.textSec, boxShadow: iaAtiva ? '0 0 6px var(--wa-green)' : '' }}/>
              IA {iaAtiva ? 'ATIVA' : 'PAUSADA'}
            </button>
            <div onClick={()=>setSidebarAberta(v=>!v)} style={{
              width:36, height:36, borderRadius:'50%',
              display:'flex', alignItems:'center', justifyContent:'center',
              color: sidebarAberta ? 'var(--wa-green)' : S.textSec,
              cursor:'pointer', transition:'background .15s, color .15s',
              background: sidebarAberta ? 'rgba(37,211,102,.12)' : 'transparent',
            }}
              onMouseEnter={e=>e.currentTarget.style.background='rgba(128,128,128,.1)'}
              onMouseLeave={e=>e.currentTarget.style.background=sidebarAberta?'rgba(37,211,102,.12)':'transparent'}
              title={sidebarAberta ? 'Fechar contato' : 'Ver contato'}
            >
              <Icon name="UserCircle" size={20}/>
            </div>
            {['Search','Phone','MoreVertical'].map(ic => (
              <div key={ic} style={{ width:36, height:36, borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', color:S.textSec, cursor:'pointer', transition:'background .15s' }}
                onMouseEnter={e=>e.currentTarget.style.background='rgba(128,128,128,.1)'}
                onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                <Icon name={ic} size={18}/>
              </div>
            ))}
          </div>
        </div>

        {/* Mensagens */}
        <div className="wa-chat-pattern" style={{ flex:1, overflowY:'auto', padding:'16px 10%', display:'flex', flexDirection:'column', gap:4, background:S.chatBg }}>
          {msgs.map((m,i) => {
            const dayKey = evoDayKey(m.timestamp);
            const prevDayKey = i > 0 ? evoDayKey(msgs[i-1].timestamp) : null;
            const mostraSeparador = i === 0 || dayKey !== prevDayKey;
            return (
            <React.Fragment key={m.id || i}>
              {mostraSeparador && (
                <div style={{display:'flex', justifyContent:'center', margin:'12px 0 8px'}}>
                  <div style={{
                    background:S.msgIn, color:S.textSec,
                    fontSize:11.5, fontFamily:'var(--f-m)', fontWeight:600, letterSpacing:'.04em',
                    padding:'5px 12px', borderRadius:7, boxShadow:'0 1px 2px rgba(0,0,0,.15)',
                    textTransform:'uppercase',
                  }}>{evoDayLabel(m.timestamp)}</div>
                </div>
              )}
            <div style={{ display:'flex', flexDirection: m.from==='out' ? 'row-reverse' : 'row', gap:6, marginBottom:2, alignItems:'flex-end' }}>
              {m.from==='out' && m.ia && (
                <div style={{ width:24, height:24, borderRadius:'50%', background:'var(--wa-green)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, marginBottom:4 }}>
                  <Icon name="Sparkles" size={11} style={{color:'#fff'}}/>
                </div>
              )}
              <div style={{
                maxWidth:'65%', padding: m.kind === 'image' ? '4px' : '7px 12px 6px', fontSize:13.5, lineHeight:1.5,
                borderRadius: m.from==='out' ? '8px 0px 8px 8px' : '0px 8px 8px 8px',
                background: m.from==='out' ? S.msgOut : S.msgIn,
                color: m.from==='out' ? 'var(--wa-msg-out-text)' : 'var(--wa-msg-in-text)',
                boxShadow:'0 1px 2px rgba(0,0,0,.1)',
                opacity: m.pending ? .65 : (m.failed ? .8 : 1),
                position:'relative',
              }}>
                {/* Sender em grupo */}
                {m.from==='in' && contato?.isGroup && m.raw?.pushName && (
                  <div style={{fontSize:11.5, fontWeight:600, color: evoColorFromString(m.raw.key?.participant || m.raw.pushName), marginBottom:2}}>
                    {m.raw.pushName}
                  </div>
                )}
                {/* Imagem */}
                {m.kind === 'image' && (
                  <div>
                    {m.previewDataUrl
                      ? <img src={m.previewDataUrl} alt="" style={{maxWidth:'100%', borderRadius:6, display:'block'}}/>
                      : <MediaImage message={m} S={S}/>
                    }
                    {m.meta?.caption && <div style={{padding:'6px 8px 2px'}}>{m.meta.caption}</div>}
                  </div>
                )}
                {/* Audio */}
                {m.kind === 'audio' && <MediaAudio message={m} S={S}/>}
                {/* Documento com botao baixar real */}
                {m.kind === 'document' && <MediaDocument message={m} S={S}/>}
                {/* Outros tipos (video, sticker, location, contact) */}
                {(m.kind === 'video' || m.kind === 'sticker' || m.kind === 'location' || m.kind === 'contact') && (
                  <div style={{display:'flex', alignItems:'center', gap:8, padding:'2px 0'}}>
                    <span style={{fontSize:18}}>{
                      m.kind === 'video'    ? '🎥' :
                      m.kind === 'location' ? '📍' :
                      m.kind === 'contact'  ? '👤' : '😀'
                    }</span>
                    <span>{m.text || m.meta?.displayName || m.kind}</span>
                  </div>
                )}
                {/* Texto puro */}
                {m.kind === 'text' && m.text}
                {/* Status/hora */}
                <div style={{ fontSize:10.5, color:S.textSec, marginTop:3, textAlign:'right', display:'flex', alignItems:'center', gap:4, justifyContent:'flex-end', padding: m.kind === 'image' ? '0 8px 4px' : 0 }}>
                  {m.failed && <span style={{color:'#ff8585', fontSize:9.5}}>falhou</span>}
                  {m.pending && !m.failed && <Icon name="Clock" size={10}/>}
                  {m.ia && <span style={{ fontSize:9.5, background:'rgba(37,211,102,.2)', color:'var(--wa-green)', padding:'1px 5px', borderRadius:3, fontFamily:'var(--f-m)' }}>IA</span>}
                  {m.time}
                  {m.from==='out' && !m.pending && !m.failed && (() => {
                    // 0=erro 1=pendente 2=enviado(✓) 3=entregue(✓✓) 4/5=lido(✓✓ azul)
                    const s = m.statusNum ?? 2;
                    const cor = s >= 4 ? '#53BDEB' : 'currentColor';
                    if (s === 0) return <span style={{color:'#ff8585', fontSize:9.5}}>!</span>;
                    if (s === 1) return <Icon name="Clock" size={9} style={{opacity:.6}}/>;
                    if (s === 2) {
                      // 1 check
                      return <svg width="12" height="10" viewBox="0 0 12 11" fill={cor}><path d="M9.071.653a.75.75 0 0 0-1.036.218l-5.64 8.65-2.28-2.28a.75.75 0 0 0-1.06 1.06l2.95 2.95a.75.75 0 0 0 1.11-.077l6.17-9.46a.75.75 0 0 0-.214-1.061z"/></svg>;
                    }
                    // s >= 3 (entregue/lido) — 2 checks
                    return <svg width="15" height="10" viewBox="0 0 16 11" fill={cor}><path d="M11.071.653a.75.75 0 0 0-1.036.218l-5.64 8.65-2.28-2.28a.75.75 0 0 0-1.06 1.06l2.95 2.95a.75.75 0 0 0 1.11-.077l6.17-9.46a.75.75 0 0 0-.214-1.061zm3 0a.75.75 0 0 0-1.036.218l-5.64 8.65-.52-.52a.75.75 0 1 0-1.06 1.06l1.19 1.19a.75.75 0 0 0 1.11-.077l6.17-9.46a.75.75 0 0 0-.214-1.061z"/></svg>;
                  })()}
                </div>
              </div>
            </div>
            </React.Fragment>
            );
          })}
          <div ref={bottomRef}/>
        </div>

        {/* Input */}
        <div style={{ padding:'8px 12px', background:S.inputBg, borderTop:`1px solid ${S.border}`, flexShrink:0 }}>
          {iaAtiva && (
            <div style={{ display:'flex', alignItems:'center', gap:6, padding:'5px 10px', marginBottom:6, background:'rgba(37,211,102,.08)', border:'1px solid rgba(37,211,102,.2)', borderRadius:6, fontSize:12, color:'var(--wa-green)' }}>
              <Icon name="Sparkles" size={12}/> IA ativa — responde automaticamente. Digite para assumir.
            </div>
          )}
          {gravando ? (
            <div style={{display:'flex', alignItems:'center', gap:10, padding:'4px 4px'}}>
              <div onClick={cancelarGravacao} title="Cancelar gravacao" style={{
                width:36, height:36, borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center',
                color:'#A32D2D', cursor:'pointer',
              }}><Icon name="Trash2" size={18}/></div>
              <div style={{flex:1, display:'flex', alignItems:'center', gap:10, padding:'10px 14px', background:'rgba(163,45,45,.08)', borderRadius:21}}>
                <div style={{width:8, height:8, borderRadius:'50%', background:'#A32D2D', animation:'fade-up .8s infinite alternate'}}/>
                <span style={{fontSize:13, color:S.textPrimary, fontFamily:'var(--f-m)'}}>Gravando · {Math.floor(gravandoSec/60)}:{String(gravandoSec%60).padStart(2,'0')}</span>
              </div>
              <div onClick={toggleGravacao} title="Enviar" style={{
                width:42, height:42, borderRadius:'50%', background:'var(--wa-green)',
                display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', flexShrink:0,
              }}>
                <Icon name="Send" size={18} style={{color:'#fff'}}/>
              </div>
            </div>
          ) : (
            <div style={{ display:'flex', gap:8, alignItems:'center' }}>
              <div style={{ width:36, height:36, borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', color:S.textSec, cursor:'default', opacity:.5 }} title="Em breve">
                <Icon name="Smile" size={20}/>
              </div>
              <input ref={fileImgRef} type="file"
                accept="image/*,video/*,audio/*,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.csv,.zip,.rar,application/*"
                style={{display:'none'}}
                onChange={e=>{ const f = e.target.files?.[0]; e.target.value = ''; if (f) enviarArquivo(f); }}/>
              <div onClick={() => usandoReal ? fileImgRef.current?.click() : showToast?.('Configure a Evolution primeiro', 'warn')}
                style={{ width:36, height:36, borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', color:S.textSec, cursor:'pointer', transition:'background .15s' }}
                onMouseEnter={e=>e.currentTarget.style.background='rgba(128,128,128,.1)'}
                onMouseLeave={e=>e.currentTarget.style.background='transparent'}
                title="Anexar imagem, vídeo, áudio ou documento (PDF, Word, Excel...)"
              >
                <Icon name="Paperclip" size={20}/>
              </div>
              <input value={msg} onChange={e=>setMsg(e.target.value)}
                onKeyDown={e=>{ if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); enviar(); } }}
                placeholder={usandoReal ? `Digite uma mensagem para ${contato?.name || ''}` : 'Digite uma mensagem'}
                disabled={enviando}
                style={{
                  flex:1, height:42, padding:'0 16px', borderRadius:21,
                  background:S.searchBg, border:'none', outline:'none',
                  fontSize:14, color:S.textPrimary,
                  opacity: enviando ? .6 : 1,
                }}/>
              <div onClick={msg.trim() ? enviar : toggleGravacao} style={{
                width:42, height:42, borderRadius:'50%',
                background: 'var(--wa-green)',
                display:'flex', alignItems:'center', justifyContent:'center',
                cursor: 'pointer',
                flexShrink:0,
                opacity: enviando ? .6 : 1,
                transition:'background .15s',
              }} title={msg.trim() ? 'Enviar' : 'Gravar audio'}>
                <Icon name={msg.trim() ? 'Send' : 'Mic'} size={18} style={{color:'#fff'}}/>
              </div>
            </div>
          )}
        </div>
        </>)}
      </div>

      {/* ── Coluna 3: Contexto ── */}
      <PainelContato
        contato={contato}
        usandoReal={usandoReal}
        msgs={msgs}
        pipelineCols={pipelineCols}
        faseAtual={faseAtual}
        mudarFase={mudarFase}
        S={S}
      />
    </div>
  );
}

/* Modal Salvar/Editar contato manualmente */
function SalvarContatoModal({ jid, sugestaoNome, onClose }) {
  const existente = getContatoSalvo(jid);
  const [nome, setNome] = useState(existente?.nome || sugestaoNome || '');
  const [empresa, setEmpresa] = useState(existente?.empresa || '');
  const [tag, setTag] = useState(existente?.tag || '');
  const [nota, setNota] = useState(existente?.nota || '');

  const salvar = () => {
    if (!nome.trim()) { showToast?.('Informe o nome', 'warn'); return; }
    salvarContato(jid, {
      nome: nome.trim(),
      empresa: empresa.trim(),
      tag: tag.trim(),
      nota: nota.trim(),
    });
    showToast?.(`${nome.trim()} salvo`, 'success');
    onClose();
  };

  const remover = () => {
    if (!confirm(`Remover "${existente?.nome}" dos contatos salvos?`)) return;
    removerContatoSalvo(jid);
    showToast?.('Contato removido', 'success');
    onClose();
  };

  const lbl = { display:'block', fontSize:11, color:'var(--t3)', fontFamily:'var(--f-m)', textTransform:'uppercase', letterSpacing:'.06em', marginBottom:6 };
  const inp = { width:'100%', padding:'9px 12px', background:'var(--bg-3)', border:'1px solid var(--border)', borderRadius:8, color:'var(--t1)', fontSize:14, outline:'none', fontFamily:'var(--f-b)' };

  return (
    <div onClick={onClose} style={{position:'fixed', inset:0, background:'rgba(0,0,0,.65)', display:'grid', placeItems:'center', zIndex:9998, animation:'fade-in .15s'}}>
      <div onClick={e=>e.stopPropagation()} style={{
        width:'min(480px, 92vw)', background:'var(--bg-2)', border:'1px solid var(--border)',
        borderRadius:14, padding:'22px 24px', boxShadow:'0 24px 60px rgba(0,0,0,.5)'
      }}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:18}}>
          <div>
            <div style={{fontFamily:'var(--f-d)', fontSize:18, fontWeight:600, color:'var(--t1)'}}>
              {existente ? 'Editar contato' : 'Salvar contato'}
            </div>
            <div style={{fontSize:12, color:'var(--t3)', marginTop:3, fontFamily:'var(--f-m)'}}>{evoFormatPhone(jid) || jid}</div>
          </div>
          <button onClick={onClose} style={{background:'none', border:'none', cursor:'pointer', color:'var(--t3)', padding:6}}><Icon name="XCircle" size={18}/></button>
        </div>

        <div style={{display:'grid', gap:14}}>
          <div>
            <label style={lbl}>Nome *</label>
            <input style={inp} value={nome} onChange={e=>setNome(e.target.value)} placeholder="Nome completo" autoFocus/>
          </div>
          <div>
            <label style={lbl}>Empresa <span style={{color:'var(--t3)', textTransform:'none', letterSpacing:0, fontFamily:'var(--f-b)'}}>(opcional)</span></label>
            <input style={inp} value={empresa} onChange={e=>setEmpresa(e.target.value)} placeholder="Ex: Garcia Sadler"/>
          </div>
          <div>
            <label style={lbl}>Etiqueta <span style={{color:'var(--t3)', textTransform:'none', letterSpacing:0, fontFamily:'var(--f-b)'}}>(opcional)</span></label>
            <input style={inp} value={tag} onChange={e=>setTag(e.target.value)} placeholder="Cliente, Lead, Fornecedor..."/>
          </div>
          <div>
            <label style={lbl}>Nota <span style={{color:'var(--t3)', textTransform:'none', letterSpacing:0, fontFamily:'var(--f-b)'}}>(opcional)</span></label>
            <textarea style={{...inp, minHeight:60, resize:'vertical'}} value={nota} onChange={e=>setNota(e.target.value)} placeholder="Lembrete sobre este contato..."/>
          </div>
        </div>

        <div style={{display:'flex', gap:10, justifyContent:'space-between', marginTop:22, paddingTop:16, borderTop:'1px solid var(--border-soft)'}}>
          {existente
            ? <button onClick={remover} className="btn" style={{background:'transparent', color:'#ff8585', border:'1px solid #A32D2D55'}}><Icon name="Trash2" size={14}/>Remover</button>
            : <span/>}
          <div style={{display:'flex', gap:10}}>
            <button onClick={onClose} className="btn btn-outline">Cancelar</button>
            <button onClick={salvar} className="btn btn-primary"><Icon name="Check" size={14}/>{existente ? 'Salvar' : 'Salvar contato'}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* Painel direito reativo — dados reais do contato (numero, 1a msg, total),
   pipeline funcional, suporte a grupos com lista de participantes. */
function PainelContato({ contato, usandoReal, msgs, pipelineCols, faseAtual, mudarFase, S }) {
  const presence = useEvoPresence(usandoReal ? contato?.id : null);
  const grupo = useEvoGroupMeta(usandoReal && contato?.isGroup ? contato.id : null);
  const salvo = useContatoSalvo(usandoReal && !contato?.isGroup ? contato?.id : null);
  const [salvarAberto, setSalvarAberto] = useState(false);

  if (!contato) {
    return (
      <div style={{ borderLeft:`1px solid ${S.border}`, overflowY:'auto', background:S.sidebarBg, padding:'16px 14px', color:S.textSec, fontSize:13, textAlign:'center' }}>
        Nenhuma conversa selecionada
      </div>
    );
  }

  // Dados reais derivados das mensagens carregadas
  const primMsg = msgs?.[0];
  const ultMsg = msgs?.[msgs.length-1];
  const totalMsgs = msgs?.length || 0;
  const primMsgDate = primMsg?.timestamp ? new Date(primMsg.timestamp) : null;
  const primMsgFmt = primMsgDate
    ? `${primMsgDate.toLocaleDateString('pt-BR')} ${primMsgDate.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}`
    : '—';

  const telefone = usandoReal
    ? (contato.isGroup ? '—' : (evoFormatPhone(evoResolveJid(contato.id)) || evoFormatPhone(contato.id) || '—'))
    : '+55 11 99999-9999';
  const origem = contato.isGroup ? 'Grupo WhatsApp' : (contato.ehLid ? 'Linked Device' : 'WhatsApp');

  // Pipeline default + match por nome
  const colsRender = pipelineCols || [
    {id:'lead',     nome:'Lead',          cor:'#6E6E78'},
    {id:'proposta', nome:'Proposta',      cor:'#BA7517'},
    {id:'impl',     nome:'Implementação', cor:'#7B3FE4'},
    {id:'ativo',    nome:'Ativo',         cor:'#1E90FF'},
    {id:'prod',     nome:'Em Produção',   cor:'#1D9E75'},
  ];

  return (
    <div style={{ borderLeft:`1px solid ${S.border}`, overflowY:'auto', background:S.sidebarBg, padding:'16px 14px', display:'flex', flexDirection:'column', gap:14 }}>
      {/* Header avatar + nome + presenca/membros */}
      <div style={{ textAlign:'center', paddingBottom:14, borderBottom:`1px solid ${S.border}` }}>
        <div style={{margin:'0 auto 10px', display:'flex', justifyContent:'center'}}>
          {usandoReal
            ? <EvoAvatar remoteJid={contato?.id} name={contato?.name} init={contato?.init} color={contato?.color} size={72}/>
            : <div style={{ width:72, height:72, borderRadius:'50%', background:contato?.color, display:'flex', alignItems:'center', justifyContent:'center', fontFamily:'var(--f-d)', fontWeight:700, fontSize:24, color:'#fff' }}>{contato?.init}</div>
          }
        </div>
        <div style={{ fontWeight:600, fontSize:16, color:S.textPrimary, display:'flex', alignItems:'center', justifyContent:'center', gap:6 }}>
          {contato?.name}
          {contato?.isGroup && <span style={{fontSize:9.5, padding:'1px 6px', borderRadius:4, background:'rgba(123,63,228,.18)', color:'var(--purple)', fontFamily:'var(--f-m)', fontWeight:600, letterSpacing:'.04em'}}>GRUPO</span>}
        </div>
        {usandoReal && !contato.isGroup && (
          <div style={{ fontSize:12, color:S.textSec, marginTop:4, fontFamily:'var(--f-m)' }}>{telefone}</div>
        )}
        {usandoReal && contato.isGroup && grupo?.participants && (
          <div style={{ fontSize:12, color:S.textSec, marginTop:4 }}>{grupo.participants.length} participantes</div>
        )}
        {presence && (
          <div style={{ fontSize:11.5, color:'var(--wa-green)', marginTop:5, fontWeight:500 }}>
            {presence.state === 'composing' ? '✏️ digitando...' :
             presence.state === 'recording' ? '🎤 gravando áudio...' :
             presence.state === 'available' ? '● online' :
             presence.state === 'unavailable' ? 'offline' : presence.state}
          </div>
        )}

        {/* Botao Salvar/Editar contato */}
        {usandoReal && !contato.isGroup && (
          <button onClick={() => setSalvarAberto(true)} style={{
            marginTop:12, padding:'7px 14px', borderRadius:8,
            background: salvo ? 'transparent' : 'var(--wa-green)',
            color: salvo ? 'var(--wa-green)' : '#fff',
            border: salvo ? '1px solid var(--wa-green)' : 'none',
            fontSize:12.5, fontWeight:600, fontFamily:'var(--f-b)',
            cursor:'pointer', display:'inline-flex', alignItems:'center', gap:6,
            transition:'all .15s',
          }}>
            <Icon name={salvo ? 'Pencil' : 'Plus'} size={13}/>
            {salvo ? 'Editar contato' : 'Salvar contato'}
          </button>
        )}
      </div>

      {/* Pipeline */}
      <div style={{ background:S.headerBg, borderRadius:10, padding:'12px 14px' }}>
        <div style={{ fontSize:11, color:S.textSec, fontWeight:600, marginBottom:10, letterSpacing:'.04em', display:'flex', justifyContent:'space-between' }}>
          <span>PIPELINE</span>
          {faseAtual && <span style={{color:faseAtual.cor||'var(--purple)', fontSize:10}}>● {faseAtual.nome}</span>}
        </div>
        {colsRender.map((col) => {
          const isAtual = faseAtual?.id === col.id;
          return (
            <div key={col.id} onClick={()=>mudarFase(col.id)} style={{
              display:'flex', alignItems:'center', gap:8, marginBottom:6,
              padding:'7px 9px', borderRadius:7, cursor:'pointer',
              background: isAtual ? (col.cor||'var(--purple)')+'18' : 'transparent',
              border: isAtual ? `1px solid ${(col.cor||'var(--purple)')}44` : '1px solid transparent',
              transition:'all .15s',
            }}
              onMouseEnter={e=>{ if(!isAtual) e.currentTarget.style.background='rgba(128,128,128,.08)'; }}
              onMouseLeave={e=>{ if(!isAtual) e.currentTarget.style.background='transparent'; }}
            >
              <div style={{ width:8, height:8, borderRadius:'50%', background: isAtual ? (col.cor||'var(--purple)') : S.border, flexShrink:0, transition:'background .15s' }}/>
              <span style={{ fontSize:13, color: isAtual ? S.textPrimary : S.textSec, fontWeight: isAtual ? 600 : 400 }}>{col.nome}</span>
              {isAtual && <span style={{ marginLeft:'auto', fontSize:10, color:col.cor||'var(--purple)', fontFamily:'var(--f-m)', fontWeight:700 }}>ATUAL</span>}
            </div>
          );
        })}
        {!faseAtual && usandoReal && (
          <div style={{ marginTop:4, fontSize:11, color:S.textSec, fontStyle:'italic' }}>
            Clique numa fase para adicionar este contato ao pipeline
          </div>
        )}
      </div>

      {/* Informacoes reais */}
      <div style={{ background:S.headerBg, borderRadius:10, padding:'12px 14px' }}>
        <div style={{ fontSize:11, color:S.textSec, fontWeight:600, marginBottom:10, letterSpacing:'.04em' }}>INFORMAÇÕES</div>
        {[
          contato.isGroup
            ? ['Tipo', `Grupo · ${grupo?.participants?.length || '?'} membros`]
            : ['Telefone', telefone],
          salvo?.empresa ? ['Empresa', salvo.empresa] : null,
          salvo?.tag ? ['Etiqueta', salvo.tag] : null,
          ['Origem',   origem],
          ['Não lidas',contato.unread > 0 ? String(contato.unread) : '—'],
          ['1ª msg',   primMsgFmt],
          ['Última',   ultMsg?.time || '—'],
          ['Total',    totalMsgs > 0 ? `${totalMsgs} mensagem${totalMsgs===1?'':'s'}` : '—'],
        ].filter(Boolean).map(([k,v]) => (
          <div key={k} style={{ display:'flex', justifyContent:'space-between', marginBottom:8, gap:8 }}>
            <span style={{ fontSize:12.5, color:S.textSec, flexShrink:0 }}>{k}</span>
            <span style={{ fontSize:12.5, color:S.textPrimary, fontWeight:500, textAlign:'right', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{v}</span>
          </div>
        ))}
      </div>

      {/* Nota salva no contato */}
      {salvo?.nota && (
        <div style={{ background:'rgba(123,63,228,.06)', border:'1px solid rgba(123,63,228,.2)', borderRadius:10, padding:'12px 14px' }}>
          <div style={{ fontSize:11, color:'var(--purple)', fontWeight:600, marginBottom:6, letterSpacing:'.04em' }}>📝 NOTA DO CONTATO</div>
          <div style={{ fontSize:13, color:S.textPrimary, lineHeight:1.5, whiteSpace:'pre-wrap' }}>{salvo.nota}</div>
        </div>
      )}

      {/* Membros (se for grupo) */}
      {contato.isGroup && grupo?.participants && grupo.participants.length > 0 && (
        <div style={{ background:S.headerBg, borderRadius:10, padding:'12px 14px' }}>
          <div style={{ fontSize:11, color:S.textSec, fontWeight:600, marginBottom:10, letterSpacing:'.04em' }}>MEMBROS · {grupo.participants.length}</div>
          <div style={{display:'flex', flexDirection:'column', gap:6, maxHeight:200, overflowY:'auto'}}>
            {grupo.participants.slice(0, 30).map((p, i) => {
              const jid = p.id || p;
              const nome = p.notify || p.name || evoFormatPhone(jid);
              const isAdmin = p.admin === 'admin' || p.admin === 'superadmin';
              return (
                <div key={jid+'-'+i} style={{display:'flex', alignItems:'center', gap:8}}>
                  <EvoAvatar remoteJid={jid} name={nome} size={24}/>
                  <span style={{fontSize:12.5, color:S.textPrimary, flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{nome}</span>
                  {isAdmin && <span style={{fontSize:9.5, padding:'1px 5px', borderRadius:3, background:'rgba(123,63,228,.18)', color:'var(--purple)', fontFamily:'var(--f-m)'}}>ADMIN</span>}
                </div>
              );
            })}
            {grupo.participants.length > 30 && (
              <div style={{fontSize:11, color:S.textSec, textAlign:'center', paddingTop:6}}>
                +{grupo.participants.length - 30} outros
              </div>
            )}
          </div>
        </div>
      )}

      {/* Notas */}
      <div style={{ background:S.headerBg, borderRadius:10, padding:'12px 14px' }}>
        <div style={{ fontSize:11, color:S.textSec, fontWeight:600, marginBottom:8, letterSpacing:'.04em' }}>ANOTAÇÕES</div>
        <textarea placeholder="Adicionar nota..." style={{
          width:'100%', minHeight:60, background:'transparent', border:'none', outline:'none',
          fontSize:13, color:S.textPrimary, resize:'vertical', lineHeight:1.6,
        }}/>
      </div>

      {salvarAberto && (
        <SalvarContatoModal
          jid={contato.id}
          sugestaoNome={evoTemNomeReal(contato.name) ? contato.name : ''}
          onClose={() => setSalvarAberto(false)}
        />
      )}
    </div>
  );
}

const CHAMADO_STATUS_COR = { 'Aberto':'#A32D2D', 'Em andamento':'#BA7517', 'Resolvido':'#1D9E75' };

function Chamados() {
  const [chamados, setChamados] = useState(() => {
    try { const s = localStorage.getItem('brava_chamados'); if (s) return JSON.parse(s); } catch(e){}
    return CHAMADOS_INIT;
  });
  useEffect(() => { localStorage.setItem('brava_chamados', JSON.stringify(chamados)); }, [chamados]);
  const [filtro, setFiltro] = useState('todos');
  const [aberto, setAberto] = useState(chamados[0]?.id);

  const filtrados = chamados.filter(c => filtro==='todos' ? true : c.status===filtro);
  const ativo = chamados.find(c => c.id===aberto) || chamados[0];

/* ─── Constantes globais ─── */
const CACHE_VERSION = 'v=8'; // bump quando trocar assets (logos, fotos, etc.)
const ASSET = (url) => url + (url.indexOf('?') >= 0 ? '&' : '?') + CACHE_VERSION;

/* ─── Helper: perfil do usuario (nome, cargo, email, telefone) ─── */
function getUserPerfil() {
  try {
    const s = localStorage.getItem('brava_user_perfil');
    return s ? JSON.parse(s) : {};
  } catch { return {}; }
}
function setUserPerfilStore(perfil) {
  try {
    // 1. Persiste perfil "rico" (nome, cargo, email, telefone)
    localStorage.setItem('brava_user_perfil', JSON.stringify(perfil));
    // 2. Sincroniza com a SESSAO em memoria + storage (para SaudacaoDinamica
    //    e tudo que le SESSAO.nome / SESSAO.email ver o valor novo na hora
    //    e tambem apos um reload).
    if (typeof SESSAO === 'object' && SESSAO) {
      if (perfil.nome)     SESSAO.nome  = perfil.nome;
      if (perfil.email)    SESSAO.email = perfil.email;
      if (perfil.cargo)    SESSAO.role  = perfil.cargo;
    }
    try {
      const s = JSON.parse(localStorage.getItem('brava_sessao') || '{}');
      if (perfil.nome)  s.nome  = perfil.nome;
      if (perfil.email) s.email = perfil.email;
      if (perfil.cargo) s.role  = perfil.cargo;
      localStorage.setItem('brava_sessao', JSON.stringify(s));
    } catch {}
    // 3. Notifica componentes
    window.dispatchEvent(new Event('brava_perfil_changed'));
  } catch (e) { console.warn('Falha ao salvar perfil', e); }
}
function getNomeExibicao() {
  const p = getUserPerfil();
  return p.nome || SESSAO.nome || 'Jhonattan Itiuba';
}
function useNomeExibicao() {
  const [nome, setNome] = React.useState(() => getNomeExibicao());
  React.useEffect(() => {
    const refresh = () => setNome(getNomeExibicao());
    window.addEventListener('brava_perfil_changed', refresh);
    window.addEventListener('storage', refresh);
    return () => {
      window.removeEventListener('brava_perfil_changed', refresh);
      window.removeEventListener('storage', refresh);
    };
  }, []);
  return nome;
}
// Hook generico: retorna o perfil completo reativo (nome, cargo, email, telefone)
function useUserPerfil() {
  const get = () => {
    const p = getUserPerfil();
    return {
      nome:     p.nome     || SESSAO.nome  || 'Jhonattan Itiuba',
      cargo:    p.cargo    || SESSAO.role  || 'Diretoria',
      email:    p.email    || SESSAO.email || 'diretoria@brava.company',
      telefone: p.telefone || '+55 11 96334-2541',
    };
  };
  const [perfil, setPerfil] = React.useState(get);
  React.useEffect(() => {
    const refresh = () => setPerfil(get());
    window.addEventListener('brava_perfil_changed', refresh);
    window.addEventListener('storage', refresh);
    return () => {
      window.removeEventListener('brava_perfil_changed', refresh);
      window.removeEventListener('storage', refresh);
    };
  }, []);
  return perfil;
}

/* ─── Header avatar: reage a mudancas de foto via evento ─── */
function HeaderUserAvatar() {
  const [foto, setFoto] = useState(() => getUserPhoto());

    window.addEventListener('brava_photo_changed', handler);
    window.addEventListener('storage', handler);

      window.removeEventListener('brava_photo_changed', handler);

}

/* ─── Saudacao dinamica baseada na hora + nome do perfil ─── */
function SaudacaoDinamica() {
  const nome = useNomeExibicao();
  const h = new Date().getHours();
  const saudacao = h < 12 ? 'Bom dia' : h < 18 ? 'Boa tarde' : 'Boa noite';
  const primeiroNome = (nome || '').split(' ')[0] || 'Jhonattan';
  return `${saudacao}, ${primeiroNome}`;
}
