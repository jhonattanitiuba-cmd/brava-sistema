<style>
/* Cursor personalizado — colinha preta slow motion */
* { cursor: none !important; }
#brava-cursor       { position:fixed; width:8px; height:8px; border-radius:50%; background:#000; pointer-events:none; z-index:99999; transform:translate(-50%,-50%); transition:none; }
#brava-cursor-tail  { position:fixed; width:18px; height:18px; border-radius:50%; background:rgba(0,0,0,.35); pointer-events:none; z-index:99998; transform:translate(-50%,-50%); transition:left .18s ease, top .18s ease; }
</style>
</head>
<body>
<div id="brava-cursor"></div>
<div id="brava-cursor-tail"></div>
<script>
(function(){
  var c  = document.getElementById('brava-cursor');
  var ct = document.getElementById('brava-cursor-tail');
  if (!c || !ct) return;
  document.addEventListener('mousemove', function(e){
    c.style.left  = e.clientX + 'px';
    c.style.top   = e.clientY + 'px';
    ct.style.left = e.clientX + 'px';
    ct.style.top  = e.clientY + 'px';
  }, { passive:true });
  /* Escala no hover de links/botões */
  document.addEventListener('mouseover', function(e){
    if (e.target.closest('a,button,[role=button]')) {
      c.style.transform  = 'translate(-50%,-50%) scale(1.6)';
      ct.style.transform = 'translate(-50%,-50%) scale(1.4)';
    }
  }, { passive:true });
  document.addEventListener('mouseout', function(e){
    if (e.target.closest('a,button,[role=button]')) {
      c.style.transform  = 'translate(-50%,-50%) scale(1)';
      ct.style.transform = 'translate(-50%,-50%) scale(1)';
    }
  }, { passive:true });
})();
</script>
<script>
/* ── Som tecnológico sutil ao entrar na página ──────────────────────
   Web Audio API: acorde digital suave (3 camadas) + fade in/out.
   Sem arquivo externo. Inicia após 800ms (espera render inicial).
   Gain total muito baixo (.035) — quase imperceptível, sensação
   subconsciente de "ambiente tech".
*/
(function() {
  function playBravaEntrance() {
    try {
      var ctx = new (window.AudioContext || window.webkitAudioContext)();
      var now = ctx.currentTime;
      var masterGain = ctx.createGain();
      masterGain.gain.setValueAtTime(0, now);
      masterGain.gain.linearRampToValueAtTime(0.038, now + 0.6);   // fade in
      masterGain.gain.setValueAtTime(0.038, now + 1.2);
      masterGain.gain.linearRampToValueAtTime(0, now + 2.2);       // fade out
      masterGain.connect(ctx.destination);

      // 3 osciladores formando um acorde tech (4a + 5a)
      [[220, 'sine'], [330, 'sine'], [440, 'triangle']].forEach(function(cfg, idx) {
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.type = cfg[1];
        osc.frequency.setValueAtTime(cfg[0], now);
        // Detuning suave — sensação digital, não "beep"
        osc.frequency.linearRampToValueAtTime(cfg[0] * 1.002, now + 1.5);
        gain.gain.setValueAtTime(0.6 - idx * 0.12, now);
        osc.connect(gain);
        gain.connect(masterGain);
        osc.start(now);
        osc.stop(now + 2.5);
      });
    } catch(e) {}
  }

  // Dispara após breve delay pra garantir que o contexto de audio
  // possa ser criado (browsers exigem interação do user em alguns casos)
  var fired = false;
  function tryPlay() {
    if (fired) return;
    fired = true;
    setTimeout(playBravaEntrance, 800);
  }

  // Tenta na carga direta
  window.addEventListener('load', tryPlay, { once: true });
  // Fallback: primeiro click/scroll (mobile e browsers restritivos)
  ['click','touchstart','scroll','keydown'].forEach(function(ev) {
    document.addEventListener(ev, tryPlay, { once: true, passive: true });
  });
})();
</script>
