<style>
/* Cursor personalizado — colinha preta slow motion */
* { cursor: none !important; }
#brava-cursor       { position:fixed; width:8px; height:8px; border-radius:50%; background:#000; pointer-events:none; z-index:99999; transform:translate(-50%,-50%); transition:none; }
#brava-cursor-tail  { position:fixed; width:18px; height:18px; border-radius:50%; background:rgba(0,0,0,.35); pointer-events:none; z-index:99998; transform:translate(-50%,-50%); transition:left .18s ease, top .18s ease; }

/* ── Intro sincronizado com áudio ──────────────────────────────────────
   Fase 1 (0→1.56s): só os blobs do fundo pulsam
   Fase 2 (1.56→5.12s): todos os elementos entram suavemente
*/

/* Oculta tudo antes do intro */
body.brava-intro-active .nav { opacity:0; transform:translateY(-16px); }
body.brava-intro-active #root > * { opacity:0; }

/* Nav entra na fase 2 */
body.brava-intro-p2 .nav {
  opacity:1 !important; transform:translateY(0) !important;
  transition: opacity .6s ease .1s, transform .6s cubic-bezier(.22,1,.36,1) .1s;
}

/* Hero h1 */
body.brava-intro-p2 .h1 {
  opacity:1 !important;
  transition: opacity .8s ease .3s, transform .8s cubic-bezier(.22,1,.36,1) .3s;
}

/* Lead / subtitulo */
body.brava-intro-p2 .lead {
  opacity:1 !important;
  transition: opacity .7s ease .6s;
}

/* CTAs */
body.brava-intro-p2 .hero-cta {
  opacity:1 !important;
  transition: opacity .7s ease .85s, transform .7s cubic-bezier(.22,1,.36,1) .85s;
}

/* Showcase (section inteira) */
body.brava-intro-p2 #root > div > div:nth-child(2) {
  opacity:1 !important;
  transition: opacity 1s ease 1.1s;
}

/* ProposalBlock e demais */
body.brava-intro-p2 #root > div > *:nth-child(n+3) {
  opacity:1 !important;
  transition: opacity .8s ease 1.4s;
}

/* Blob pulsando na fase 1 */
@keyframes intro-blob-pulse {
  0%,100% { transform:scale(1) translate(0,0); opacity:.3; }
  30%  { transform:scale(1.25) translate(3%,4%); opacity:.55; }
  60%  { transform:scale(.88) translate(-2%,-3%); opacity:.25; }
  80%  { transform:scale(1.15) translate(-3%,2%); opacity:.45; }
}
body.brava-intro-p1 .brava-intro-blob {
  animation: intro-blob-pulse 1.6s ease-in-out forwards !important;
}
</style>

<body>
<div id="brava-cursor"></div>
<div id="brava-cursor-tail"></div>

<!-- Áudio intro — toca ao carregar a página -->
<audio id="brava-intro-audio" src="/introbravasof.mp3" preload="auto"></audio>

<!-- Blobs visíveis antes do React montar (fase 1) -->
<div class="brava-intro-blob" id="brava-blob-1" style="
  position:fixed; top:-5%; left:-5%; width:55vw; height:65vh;
  background:radial-gradient(ellipse, rgba(123,63,228,.12) 0%, transparent 70%);
  pointer-events:none; z-index:-1; opacity:.3;
"></div>
<div class="brava-intro-blob" id="brava-blob-2" style="
  position:fixed; bottom:-5%; right:-5%; width:50vw; height:60vh;
  background:radial-gradient(ellipse, rgba(30,144,255,.09) 0%, transparent 70%);
  pointer-events:none; z-index:-1; opacity:.3; animation-delay:.2s !important;
"></div>

<!-- Tag de volume — canto inferior esquerdo -->
<div id="brava-sound-tag" style="
  position:fixed; bottom:18px; left:18px; z-index:9990;
  display:flex; align-items:center; gap:8px;
  padding:7px 14px 7px 10px; border-radius:999px;
  background:rgba(5,5,18,.80); backdrop-filter:blur(10px);
  border:1px solid rgba(30,144,255,.22);
  font-family:JetBrains Mono,monospace; font-size:11px;
  color:rgba(255,255,255,.55); letter-spacing:.06em;
  transition: opacity .3s; cursor:pointer;
  user-select:none;
" onclick="bravoToggleSound()" title="Alternar som ambiente">
  <span id="brava-sound-icon" style="color:#1E90FF; font-size:13px">♩</span>
  <span id="brava-sound-label">SOM · ON</span>
</div>
<script>
(function(){
  var c  = document.getElementById('brava-cursor');
  var ct = document.getElementById('brava-cursor-tail');
  if (!c || !ct) return;
  document.addEventListener('mousemove', function(e){
    c.style.left  = e.clientX + 'px';
    c.style.top   = e.clientY + 'px';
    ct.style.left = e.clientX + 'px';
    ct.style.top  = e.clientY + 'px';
  }, { passive:true });
  /* Escala no hover de links/botões */
  document.addEventListener('mouseover', function(e){
    if (e.target.closest('a,button,[role=button]')) {
      c.style.transform  = 'translate(-50%,-50%) scale(1.6)';
      ct.style.transform = 'translate(-50%,-50%) scale(1.4)';
    }
  }, { passive:true });
  document.addEventListener('mouseout', function(e){
    if (e.target.closest('a,button,[role=button]')) {
      c.style.transform  = 'translate(-50%,-50%) scale(1)';
      ct.style.transform = 'translate(-50%,-50%) scale(1)';
    }
  }, { passive:true });
})();
</script>

<script>
/* ══════════════════════════════════════════════════════════════════
   INTRO FRAME-ACCURATE — introbravasof.mp3 @ 25fps
   Cues exatos do usuário (hh:mm:ss:ff → segundos):
   00:00:00:06 = 0.24s   → Logo Brava
   00:00:01:14 = 1.56s   → Plataforma
   00:00:01:19 = 1.76s   → Planos
   00:00:01:24 = 1.96s   → Clientes
   (Perguntas) = 2.04s   → Perguntas (inferido)
   00:00:02:02 = 2.08s   → WhatsApp
   00:00:02:04 = 2.16s   → Entrar
   00:00:02:08 = 2.32s   → Hero começa
   00:00:03:04 = 3.16s   → Hero termina
   ══════════════════════════════════════════════════════════════════ */
(function() {
  var audio = document.getElementById('brava-intro-audio');
  var body  = document.body;

  /* Cues frame-accurate */
  var CUES = [
    { t:0.24,  id:'nav-logo',       ty:-8  },
    { t:1.56,  id:'nav-plataforma', ty:-6  },
    { t:1.76,  id:'nav-planos',     ty:-6  },
    { t:1.96,  id:'nav-clientes',   ty:-6  },
    { t:2.04,  id:'nav-perguntas',  ty:-6  },
    { t:2.08,  id:'nav-whatsapp',   ty:-6  },
    { t:2.16,  id:'nav-entrar',     ty:-6  },
  ];
  var HERO_START = 2.32;
  var HERO_END   = 3.16;
  var FINISH_T   = 5.12; // 00:00:05:03

  var triggered = {};
  var heroAnimDone = false;
  var finishDone   = false;
  var rafId;

  /* Espera o elemento aparecer no DOM (React monta depois) */
  function reveal(id, ty) {
    var el = document.getElementById(id);
    if (!el) return;
    el.style.transition = 'opacity .35s ease, transform .4s cubic-bezier(.22,1,.36,1)';
    el.style.opacity    = '1';
    el.style.transform  = 'translateY(0)';
  }

  /* Hero: camadas de cima pra baixo em 0.84s */
  function animateHero() {
    if (heroAnimDone) return;
    heroAnimDone = true;
    var dur = HERO_END - HERO_START; // 0.84s
    [
      { sel:'.h1',       d:0.00 },
      { sel:'.lead',     d:0.24 },
      { sel:'.hero-cta', d:0.52 },
    ].forEach(function(item) {
      var el = document.querySelector(item.sel);
      if (!el) return;
      el.style.transition = 'opacity .5s ease '+item.d+'s, transform .55s cubic-bezier(.22,1,.36,1) '+item.d+'s';
      el.style.opacity    = '1';
      el.style.transform  = 'translateY(0)';
    });
    /* Showcase e demais entram logo após */
    var rest = document.querySelectorAll('#root > div > *:not(:first-child)');
    rest.forEach(function(el, i) {
      el.style.transition = 'opacity .7s ease '+(0.6+i*0.15)+'s';
      el.style.opacity    = '1';
    });
  }

  function finishIntro() {
    if (finishDone) return;
    finishDone = true;
    if (rafId) cancelAnimationFrame(rafId);
    body.classList.remove('brava-intro-active','brava-intro-p1');
    /* Limpa estilos inline */
    document.querySelectorAll('[id^=nav-], .h1, .lead, .hero-cta, #root > div > *').forEach(function(el) {
      el.style.transition = '';
      el.style.opacity    = '';
      el.style.transform  = '';
    });
    ['brava-blob-1','brava-blob-2'].forEach(function(id){
      var el=document.getElementById(id);
      if(el){el.style.transition='opacity .8s';el.style.opacity='0';}
    });
  }

  /* RAF loop — frame-accurate (não depende de timeupdate ~250ms) */
  function syncFrame() {
    var t = audio.currentTime;

    /* Ativa cues */
    CUES.forEach(function(cue) {
      if (!triggered[cue.id] && t >= cue.t) {
        triggered[cue.id] = true;
        reveal(cue.id, cue.ty);
      }
    });

    if (t >= HERO_START) animateHero();
    if (t >= FINISH_T)   { finishIntro(); return; }

    rafId = requestAnimationFrame(syncFrame);
  }

  function hideAll() {
    /* Oculta nav itens e hero layers */
    ['nav-logo','nav-plataforma','nav-planos','nav-clientes',
     'nav-perguntas','nav-whatsapp','nav-entrar'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) { el.style.opacity='0'; el.style.transform='translateY(-8px)'; }
    });
    ['.h1','.lead','.hero-cta'].forEach(function(sel) {
      var el = document.querySelector(sel);
      if (el) { el.style.opacity='0'; el.style.transform='translateY(16px)'; }
    });
    document.querySelectorAll('#root > div > *:not(:first-child)').forEach(function(el){
      el.style.opacity='0';
    });
  }

  function startIntro() {
    body.classList.add('brava-intro-active','brava-intro-p1');
    /* Aguarda React montar (até 500ms) */
    var attempts = 0;
    (function waitMount() {
      if (document.getElementById('nav-logo') || attempts++ > 12) {
        hideAll();
        audio.volume = 0.85;
        var p = audio.play();
        if (p) p.catch(function(){
          ['click','touchstart'].forEach(function(ev){
            document.addEventListener(ev, function fn(){
              document.removeEventListener(ev,fn);
              audio.play().catch(function(){});
            }, {once:true});
          });
        });
        requestAnimationFrame(syncFrame);
      } else {
        requestAnimationFrame(waitMount);
      }
    })();
  }

  audio.addEventListener('ended', finishIntro);

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', startIntro);
  } else {
    startIntro();
  }
})();
</script>

<script>
/* ── Ruído marrom (brown noise) contínuo — ambiente tech electronico ──
   Brown noise = integração do white noise → som grave, quente, relaxante.
   Gerado por Web Audio API: sem arquivo externo, loop infinito.
   Volume baixo (.045) — presença sutil, não intrusiva.
   Tag de controle no canto inf esq com toggle ON/OFF.
*/
var _bravaAudioCtx = null;
var _bravaNoiseNode = null;
var _bravaMasterGain = null;
var _bravaSoundOn = true;

function bravoToggleSound() {
  _bravaSoundOn = !_bravaSoundOn;
  var lbl  = document.getElementById('brava-sound-label');
  var icon = document.getElementById('brava-sound-icon');
  if (_bravaMasterGain) {
    var now = _bravaAudioCtx.currentTime;
    _bravaMasterGain.gain.cancelScheduledValues(now);
    _bravaMasterGain.gain.linearRampToValueAtTime(
      _bravaSoundOn ? 0.045 : 0, now + 0.6
    );
  }
  if (lbl)  lbl.textContent  = _bravaSoundOn ? 'SOM · ON' : 'SOM · OFF';
  if (icon) icon.style.color = _bravaSoundOn ? '#1E90FF' : 'rgba(255,255,255,.3)';
}

/* Expõe o contexto compartilhado pra outros scripts (swoosh, etc) */
window._getBravaCtx = function() {
  if (!_bravaAudioCtx) {
    _bravaAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (_bravaAudioCtx.state === 'suspended') _bravaAudioCtx.resume();
  return _bravaAudioCtx;
};

function _startBrownNoise() {
  try {
    _bravaAudioCtx = window._getBravaCtx();
    var ctx = _bravaAudioCtx;
    var bufferSize = ctx.sampleRate * 4; // 4s buffer em loop
    var buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    var data   = buffer.getChannelData(0);

    // Gera brown noise: integração do white noise
    var lastOut = 0;
    for (var i = 0; i < bufferSize; i++) {
      var white = (Math.random() * 2 - 1);
      data[i] = (lastOut + (0.02 * white)) / 1.02;
      lastOut  = data[i];
      data[i] *= 3.5; // amplifica pra compensar o filtro
    }

    _bravaNoiseNode = ctx.createBufferSource();
    _bravaNoiseNode.buffer = buffer;
    _bravaNoiseNode.loop   = true;

    // Filtro passa-baixa — corta agudos, deixa só o grave warm
    var lpf = ctx.createBiquadFilter();
    lpf.type            = 'lowpass';
    lpf.frequency.value = 180;  // apenas abaixo de 180Hz
    lpf.Q.value         = 0.5;

    _bravaMasterGain = ctx.createGain();
    _bravaMasterGain.gain.setValueAtTime(0, ctx.currentTime);
    _bravaMasterGain.gain.linearRampToValueAtTime(0.045, ctx.currentTime + 2.5);

    _bravaNoiseNode.connect(lpf);
    lpf.connect(_bravaMasterGain);
    _bravaMasterGain.connect(ctx.destination);
    _bravaNoiseNode.start();
  } catch(e) { console.warn('Brown noise error:', e); }
}

(function() {
  var started = false;
  function tryStart() {
    if (started) return;
    started = true;
    _startBrownNoise();
  }
  // Desktop: autoplay direto
  window.addEventListener('load', function(){ setTimeout(tryStart, 600); }, { once:true });
  // Mobile/Safari: precisa de interação
  ['click','touchstart','keydown'].forEach(function(ev){
    document.addEventListener(ev, tryStart, { once:true, passive:true });
  });
})();
</script>
