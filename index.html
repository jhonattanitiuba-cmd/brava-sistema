<style id="__om-edit-overrides"></style>
<style>
/* Cursor personalizado — colinha preta slow motion */
* { cursor: none !important; }
#brava-cursor       { position:fixed; width:8px; height:8px; border-radius:50%; background:#000; pointer-events:none; z-index:99999; transform:translate(-50%,-50%); transition:none; }
#brava-cursor-tail  { position:fixed; width:18px; height:18px; border-radius:50%; background:rgba(0,0,0,.35); pointer-events:none; z-index:99998; transform:translate(-50%,-50%); transition:left .18s ease, top .18s ease; }

/* ── Intro: CSS esconde ANTES do React renderizar (zero flash) ──────────
   body.brava-intro-active é adicionado pelo script inline ANTES de tudo.
   Cada elemento é escondido via CSS, revelado pelo RAF loop com JS inline.
*/
/* Barra inteira escondida acima — desce primeiro */
body.brava-intro-active .nav {
  opacity:0;
  transform:translateY(-100%);
}
/* Logo: aparece DEPOIS da barra, deslizando suave */
body.brava-intro-active #nav-logo {
  opacity:0;
  transform:translateY(-14px);
}
/* Demais itens do menu — mesma posição que já estavam */
body.brava-intro-active #nav-plataforma,
body.brava-intro-active #nav-planos,
body.brava-intro-active #nav-clientes,
body.brava-intro-active #nav-perguntas,
body.brava-intro-active #nav-whatsapp,
body.brava-intro-active #nav-entrar {
  opacity:0;
  transform:translateY(-10px);
}
/* Hero — cada LINHA escondida individualmente p/ cascata */
body.brava-intro-active .h1-line,
body.brava-intro-active .lead-line {
  opacity:0;
  transform:translateY(18px);
  display:block;
}
body.brava-intro-active .cta-item {
  opacity:0;
  transform:translateY(14px);
}
/* Showcase e seções abaixo */
body.brava-intro-active #root > div > *:not(:first-child) {
  opacity:0;
}
/* Blobs pulsam na fase 1 */
@keyframes intro-blob-pulse {
  0%,100% { transform:scale(1) translate(0,0); opacity:.3; }
  35% { transform:scale(1.3) translate(4%,5%); opacity:.6; }
  65% { transform:scale(.85) translate(-3%,-4%); opacity:.22; }
}
body.brava-intro-p1 .brava-intro-blob {
  animation: intro-blob-pulse 1.6s ease-in-out forwards !important;
}
</style>

<body>
<!-- ▼ PRIMEIRO script da página — aplica a classe ANTES de qualquer renderização ▼ -->
<script>document.body.classList.add('brava-intro-active','brava-intro-p1');</script>
<div id="brava-cursor"></div>
<div id="brava-cursor-tail"></div>

<!-- Áudio intro — toca ao carregar a página (autoplay+playsinline aumenta sucesso) -->
<audio id="brava-intro-audio" src="/introbravasof.mp3" preload="auto" autoplay playsinline></audio>

<!-- Blobs visíveis antes do React montar (fase 1) -->
<div class="brava-intro-blob" id="brava-blob-1" style="
  position:fixed; top:-5%; left:-5%; width:55vw; height:65vh;
  background:radial-gradient(ellipse, rgba(123,63,228,.12) 0%, transparent 70%);
  pointer-events:none; z-index:-1; opacity:.3;
"></div>
<div class="brava-intro-blob" id="brava-blob-2" style="
  position:fixed; bottom:-5%; right:-5%; width:50vw; height:60vh;
  background:radial-gradient(ellipse, rgba(30,144,255,.09) 0%, transparent 70%);
  pointer-events:none; z-index:-1; opacity:.3; animation-delay:.2s !important;
"></div>

<!-- Toggle de som — iPhone style, canto inferior esquerdo -->
<div id="brava-sound-tag" onclick="bravoToggleSound()" title="Som ambiente" style="
  position:fixed; bottom:20px; left:20px; z-index:9990;
  display:flex; align-items:center; gap:9px;
  padding:6px 9px 6px 9px; border-radius:999px;
  background:rgba(8,8,22,.78); backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.07);
  box-shadow:0 2px 14px rgba(0,0,0,.35);
  cursor:pointer; user-select:none;
">
  <!-- Ícone speaker SVG — azul ON, apagado OFF -->
  <svg id="brava-sound-icon" width="13" height="13" viewBox="0 0 24 24" fill="none"
       stroke="#1E90FF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"
       style="flex-shrink:0;transition:stroke .25s;">
    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
    <path id="brava-sound-wave1" d="M15.54 8.46a5 5 0 0 1 0 7.07" style="transition:opacity .25s;"/>
    <path id="brava-sound-wave2" d="M19.07 4.93a10 10 0 0 1 0 14.14" style="transition:opacity .25s;"/>
    <!-- Linha de mudo — só aparece quando OFF -->
    <line id="brava-sound-mute" x1="3" y1="3" x2="21" y2="21"
          stroke-width="2" style="opacity:0;transition:opacity .25s;"/>
  </svg>
  <!-- Pill toggle — estilo iPhone -->
  <div id="brava-toggle-track" style="
    width:40px; height:22px; border-radius:11px;
    background:#1E90FF; position:relative;
    transition:background .28s cubic-bezier(.4,0,.2,1);
    flex-shrink:0;
  ">
    <div id="brava-toggle-knob" style="
      position:absolute; top:2px; left:2px;
      width:18px; height:18px; border-radius:50%;
      background:#fff;
      box-shadow:0 1px 5px rgba(0,0,0,.4);
      transform:translateX(18px);
      transition:transform .28s cubic-bezier(.4,0,.2,1);
    "></div>
  </div>
</div>
<script>
(function(){
  var c  = document.getElementById('brava-cursor');
  var ct = document.getElementById('brava-cursor-tail');
  if (!c || !ct) return;
  document.addEventListener('mousemove', function(e){
    c.style.left  = e.clientX + 'px';
    c.style.top   = e.clientY + 'px';
    ct.style.left = e.clientX + 'px';
    ct.style.top  = e.clientY + 'px';
  }, { passive:true });
  /* Escala no hover de links/botões */
  document.addEventListener('mouseover', function(e){
    if (e.target.closest('a,button,[role=button]')) {
      c.style.transform  = 'translate(-50%,-50%) scale(1.6)';
      ct.style.transform = 'translate(-50%,-50%) scale(1.4)';
    }
  }, { passive:true });
  document.addEventListener('mouseout', function(e){
    if (e.target.closest('a,button,[role=button]')) {
      c.style.transform  = 'translate(-50%,-50%) scale(1)';
      ct.style.transform = 'translate(-50%,-50%) scale(1)';
    }
  }, { passive:true });
})();
</script>

<script>
/* ══════════════════════════════════════════════════════════════════
   INTRO FRAME-ACCURATE — introbravasof.mp3 @ 25fps   (zero-delay)

   RELÓGIO DUPLO — animação NUNCA depende do autoplay de áudio:
   • performance.now() → relógio primário, começa imediatamente
   • audio.currentTime → sincroniza quando browser permite autoplay
   Se o áudio for bloqueado, a animação roda igual; o som entra
   assim que o browser liberar (primeiro clique/tecla).

   Cues (hh:mm:ss:ff @ 25fps → segundos):
   00:00:00:06 → 0.24s  Logo
   00:00:01:14 → 1.56s  Plataforma
   00:00:01:19 → 1.76s  Planos
   00:00:01:24 → 1.96s  Clientes
                 2.04s  Perguntas
   00:00:02:02 → 2.08s  WhatsApp
   00:00:02:04 → 2.16s  Entrar
   00:00:02:08 → 2.32s  Hero (h1 → lead → cta, 0.84s)
   00:00:05:03 → 5.12s  Fim
   ══════════════════════════════════════════════════════════════════ */
(function () {
  var audio = document.getElementById('brava-intro-audio');
  if (!audio) return;
  var body = document.body;

  body.classList.add('brava-intro-active', 'brava-intro-p1');

  /* Ordem: barra desce do topo → logo entra → demais itens (timing original) */
  var CUES = [
    { t:0.00,  sel:'.nav',        kind:'bar'  },  /* barra primeiro */
    { t:0.40,  id:'nav-logo',     kind:'soft' },  /* logo após barra */
    { t:1.56,  id:'nav-plataforma' },
    { t:1.76,  id:'nav-planos'     },
    { t:1.96,  id:'nav-clientes'   },
    { t:2.04,  id:'nav-perguntas'  },
    { t:2.08,  id:'nav-whatsapp'   },
    { t:2.16,  id:'nav-entrar'     },
  ];
  var HERO_START = 2.32;
  var FINISH_T   = 5.12;

  /* ── Relógio duplo ─────────────────────────────────────────────
     _startPerfTs : performance.now() no momento que o RAF começa
     _audioLive   : true quando audio.play() foi bem-sucedido
     getClock()   : retorna o tempo em segundos desde o início     */
  var _startPerfTs = null;
  var _audioLive   = false;

  function getClock() {
    if (_audioLive && !audio.paused && audio.currentTime > 0)
      return audio.currentTime;           /* mais preciso quando tocando */
    if (_startPerfTs === null) return 0;
    return (performance.now() - _startPerfTs) / 1000;
  }

  var triggered    = {};
  var pending      = [];
  var heroAnimDone = false;
  var finishDone   = false;
  var rafId;

  /* Transição por tipo:
     bar  → barra inteira descendo do topo (.6s suave)
     soft → logo aparecendo após barra (.5s suave)
     padrão → links do menu (.35s rápido) */
  function transitionFor(kind) {
    if (kind === 'bar')  return 'opacity .55s ease, transform .6s cubic-bezier(.22,1,.36,1)';
    if (kind === 'soft') return 'opacity .5s ease, transform .55s cubic-bezier(.22,1,.36,1)';
    return 'opacity .35s ease, transform .4s cubic-bezier(.22,1,.36,1)';
  }

  function doReveal(el, kind) {
    el.style.transition = transitionFor(kind);
    el.style.opacity    = '1';
    el.style.transform  = 'translateY(0)';
  }

  function cueEl(cue) {
    return cue.id ? document.getElementById(cue.id) : document.querySelector(cue.sel);
  }

  function reveal(cue) {
    var el = cueEl(cue);
    if (el) doReveal(el, cue.kind);
    else    pending.push(cue);
  }

  function flushPending() {
    if (!pending.length) return;
    var left = [];
    for (var i = 0; i < pending.length; i++) {
      var cue = pending[i];
      var el  = cueEl(cue);
      if (el) doReveal(el, cue.kind);
      else    left.push(cue);
    }
    pending = left;
  }

  function animateHero() {
    if (heroAnimDone) return;
    heroAnimDone = true;
    /* Cascata linha por linha — do topo até os botões.
       Cada linha tem seu próprio delay; duração ~.55s, gap .14s entre linhas. */
    var lines = [];
    document.querySelectorAll('.h1-line').forEach(function (el) { lines.push(el); });
    document.querySelectorAll('.lead-line').forEach(function (el) { lines.push(el); });
    document.querySelectorAll('.cta-item').forEach(function (el) { lines.push(el); });
    var GAP = 0.14;
    lines.forEach(function (el, i) {
      var d = i * GAP;
      el.style.transition = 'opacity .55s ease ' + d + 's, transform .6s cubic-bezier(.22,1,.36,1) ' + d + 's';
      el.style.opacity    = '1';
      el.style.transform  = 'translateY(0)';
    });
    /* Showcase e seções abaixo entram em cascata após o Hero terminar */
    var heroEnd = lines.length * GAP + 0.4;
    document.querySelectorAll('#root > div > *:not(:first-child)').forEach(function (el, i) {
      el.style.transition = 'opacity .7s ease ' + (heroEnd + i * 0.15) + 's';
      el.style.opacity    = '1';
    });
  }

  function finishIntro() {
    if (finishDone) return;
    finishDone = true;
    if (rafId) cancelAnimationFrame(rafId);
    body.classList.remove('brava-intro-active', 'brava-intro-p1');
    document.querySelectorAll('.nav, [id^=nav-], .h1, .h1-line, .lead, .lead-line, .hero-cta, .cta-item, #root > div > *').forEach(function (el) {
      el.style.transition = '';
      el.style.opacity    = '';
      el.style.transform  = '';
    });
    ['brava-blob-1', 'brava-blob-2'].forEach(function (id) {
      var el = document.getElementById(id);
      if (el) { el.style.transition = 'opacity .8s'; el.style.opacity = '0'; }
    });
  }

  function syncFrame(ts) {
    /* Inicia o relógio performance no primeiro frame */
    if (_startPerfTs === null) _startPerfTs = ts;

    var t = getClock();
    flushPending();

    CUES.forEach(function (cue) {
      var key = cue.id || cue.sel;
      if (!triggered[key] && t >= cue.t) {
        triggered[key] = true;
        reveal(cue);
      }
    });

    if (t >= HERO_START) animateHero();
    if (t >= FINISH_T)   { finishIntro(); return; }
    rafId = requestAnimationFrame(syncFrame);
  }

  /* ── Disparo agressivo de áudio ─────────────────────────────────
     1. Aguarda o áudio ter dados (canplay) antes de tentar tocar
     2. Tenta play() — autoplay attribute já está no <audio>
     3. Se falhar, escuta TODA interação possível e retoca sincronizado
     4. pageshow/visibilitychange também disparam (volta de cache, etc) */
  var _playAttempts = 0;

  function attemptPlay(syncToClock) {
    _playAttempts++;
    audio.volume = 0.42;  /* metade do volume original — não assusta */
    audio.muted  = false;
    if (syncToClock) {
      var t = getClock();
      if (t < FINISH_T) audio.currentTime = t;
    }
    var p = audio.play();
    if (!p) { _audioLive = true; return Promise.resolve(); }
    return p.then(function () { _audioLive = true; });
  }

  function installInteractionFallback() {
    var fired = false;
    function fire() {
      if (fired) return;
      fired = true;
      events.forEach(function (ev) { window.removeEventListener(ev, fire, true); });
      attemptPlay(true).catch(function () {});
    }
    var events = ['pointerdown','touchstart','keydown','click','mousedown','touchend'];
    events.forEach(function (ev) {
      window.addEventListener(ev, fire, { capture: true, passive: true });
    });
    /* Volta de bfcache (F5 em alguns browsers) */
    window.addEventListener('pageshow', function () {
      if (!_audioLive && !finishDone) attemptPlay(true).catch(function () {});
    });
    /* Aba volta a ficar visível */
    document.addEventListener('visibilitychange', function () {
      if (document.visibilityState === 'visible' && !_audioLive && !finishDone) {
        attemptPlay(true).catch(function () {});
      }
    });
  }

  function tryPlayAudio() {
    /* Se o áudio ainda não tem dados suficientes, espera canplay */
    if (audio.readyState < 2) {
      audio.addEventListener('canplay', function once() {
        audio.removeEventListener('canplay', once);
        attemptPlay(false).catch(function () { installInteractionFallback(); });
      }, { once: true });
      /* Mesmo assim tenta agora — autoplay attr pode ter funcionado */
      attemptPlay(false).catch(function () {});
    } else {
      attemptPlay(false).catch(function () { installInteractionFallback(); });
    }
    /* Sempre instala o fallback de interação (defensivo) */
    installInteractionFallback();
  }

  audio.addEventListener('ended', finishIntro);

  /* ── Disparo imediato: RAF + áudio em paralelo ── */
  requestAnimationFrame(syncFrame); /* animação começa SEM depender de áudio */
  tryPlayAudio();
})();
</script>

<script>
/* ── Ruído marrom (brown noise) contínuo — ambiente tech electronico ──
   Brown noise = integração do white noise → som grave, quente, relaxante.
   Gerado por Web Audio API: sem arquivo externo, loop infinito.
   Volume baixo (.045) — presença sutil, não intrusiva.
   Tag de controle no canto inf esq com toggle ON/OFF.
*/
var _bravaAudioCtx = null;
var _bravaNoiseNode = null;
var _bravaMasterGain = null;
var _bravaSoundOn = true;

function bravoToggleSound() {
  _bravaSoundOn = !_bravaSoundOn;
  /* Brown noise */
  if (_bravaMasterGain) {
    var now = _bravaAudioCtx.currentTime;
    _bravaMasterGain.gain.cancelScheduledValues(now);
    _bravaMasterGain.gain.linearRampToValueAtTime(_bravaSoundOn ? 0.034 : 0, now + 0.5);
  }
  /* Toggle pill */
  var track = document.getElementById('brava-toggle-track');
  var knob  = document.getElementById('brava-toggle-knob');
  var icon  = document.getElementById('brava-sound-icon');
  var w1    = document.getElementById('brava-sound-wave1');
  var w2    = document.getElementById('brava-sound-wave2');
  var mute  = document.getElementById('brava-sound-mute');
  if (track) track.style.background   = _bravaSoundOn ? '#1E90FF' : 'rgba(255,255,255,.13)';
  if (knob)  knob.style.transform     = _bravaSoundOn ? 'translateX(18px)' : 'translateX(0)';
  if (icon)  icon.setAttribute('stroke', _bravaSoundOn ? '#1E90FF' : 'rgba(255,255,255,.28)');
  if (w1)    w1.style.opacity   = _bravaSoundOn ? '1' : '0';
  if (w2)    w2.style.opacity   = _bravaSoundOn ? '1' : '0';
  if (mute)  mute.style.opacity = _bravaSoundOn ? '0' : '1';
}

/* Expõe o contexto compartilhado pra outros scripts (swoosh, etc) */
window._getBravaCtx = function() {
  if (!_bravaAudioCtx) {
    _bravaAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (_bravaAudioCtx.state === 'suspended') _bravaAudioCtx.resume();
  return _bravaAudioCtx;
};

function _startBrownNoise() {
  try {
    _bravaAudioCtx = window._getBravaCtx();
    var ctx = _bravaAudioCtx;
    var bufferSize = ctx.sampleRate * 4; // 4s buffer em loop
    var buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    var data   = buffer.getChannelData(0);

    // Gera brown noise: integração do white noise
    var lastOut = 0;
    for (var i = 0; i < bufferSize; i++) {
      var white = (Math.random() * 2 - 1);
      data[i] = (lastOut + (0.02 * white)) / 1.02;
      lastOut  = data[i];
      data[i] *= 3.5; // amplifica pra compensar o filtro
    }

    _bravaNoiseNode = ctx.createBufferSource();
    _bravaNoiseNode.buffer = buffer;
    _bravaNoiseNode.loop   = true;

    // Filtro passa-baixa — corta agudos, deixa só o grave warm
    var lpf = ctx.createBiquadFilter();
    lpf.type            = 'lowpass';
    lpf.frequency.value = 180;  // apenas abaixo de 180Hz
    lpf.Q.value         = 0.5;

    _bravaMasterGain = ctx.createGain();
    _bravaMasterGain.gain.setValueAtTime(0, ctx.currentTime);
    _bravaMasterGain.gain.linearRampToValueAtTime(0.034, ctx.currentTime + 2.5);

    _bravaNoiseNode.connect(lpf);
    lpf.connect(_bravaMasterGain);
    _bravaMasterGain.connect(ctx.destination);
    _bravaNoiseNode.start();
  } catch(e) { console.warn('Brown noise error:', e); }
}

(function() {
  var started = false;
  function tryStart() {
    if (started) return;
    started = true;
    _startBrownNoise();
  }
  // Desktop: autoplay direto
  window.addEventListener('load', function(){ setTimeout(tryStart, 600); }, { once:true });
  // Mobile/Safari: precisa de interação
  ['click','touchstart','keydown'].forEach(function(ev){
    document.addEventListener(ev, tryStart, { once:true, passive:true });
  });
})();
</script>
